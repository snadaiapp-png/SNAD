name: ${COMPOSE_PROJECT_NAME:-snad}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sanad}
      POSTGRES_USER: ${POSTGRES_USER:-sanad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run make bootstrap to generate POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C
    ports:
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sanad} -d ${POSTGRES_DB:-sanad}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - data

  backend:
    build:
      context: ./apps/sanad-platform
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-container}
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sanad}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sanad}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Run make bootstrap to generate POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Run make bootstrap to generate JWT_SECRET}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      SANAD_CORS_ALLOWED_ORIGINS: ${SANAD_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      BOOTSTRAP_ENABLED: ${BOOTSTRAP_ENABLED:-false}
      APPLICATION_BASE_URL: ${APPLICATION_BASE_URL:-http://localhost:3000}
      SECURITY_NOTIFICATION_PROVIDER: ${SECURITY_NOTIFICATION_PROVIDER:-disabled}
      SECURITY_NOTIFICATION_FROM: ${SECURITY_NOTIFICATION_FROM:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_SANAD: ${LOG_LEVEL_SANAD:-INFO}
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
        -XX:+ExitOnOutOfMemoryError
        -Dfile.encoding=UTF-8
        -Duser.timezone=UTC
    ports:
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - edge
      - data

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - edge

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.27}
    profiles: ["devtools"]
    restart: unless-stopped
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: 1000
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    ports:
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${MAILPIT_UI_PORT:-8025}:8025"
    volumes:
      - mailpit-data:/data
    networks:
      - edge

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    profiles: ["platform"]
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Run make bootstrap to generate REDIS_PASSWORD}
    ports:
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Run make bootstrap to generate REDIS_PASSWORD}
    networks:
      - data

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3}
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - edge
      - observability

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12}
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Run make bootstrap to generate GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${SNAD_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability

networks:
  edge:
    driver: bridge
  data:
    driver: bridge
    internal: true
  observability:
    driver: bridge

volumes:
  postgres-data:
  mailpit-data:
  redis-data:
  prometheus-data:
  grafana-data:
