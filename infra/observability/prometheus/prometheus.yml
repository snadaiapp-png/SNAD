global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: snad
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: snad-backend
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets:
          - backend:8080
        labels:
          service: sanad-platform

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
        labels:
          service: otel-collector
