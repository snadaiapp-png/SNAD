crm_runtime:
  postgres:
    major: 18
    patch: 18.4
    image: pgvector/pgvector:0.8.4-pg18
    extensions:
      pgvector: 0.8.4
      pg_stat_statements: bundled
      pg_trgm: bundled
      unaccent: bundled
  valkey:
    version: 9.1.0
    image: valkey/valkey:9.1-alpine
  opensearch:
    version: 3.6.0
    image: opensearchproject/opensearch:3.6.0
    dashboards_image: opensearchproject/opensearch-dashboards:3.6.0
  clamav:
    version: 1.5.2
    image: clamav/clamav:1.5.2
  k6:
    version: 2.1.0
    image: grafana/k6:2.1.0
  prometheus:
    major: 3
    image: prom/prometheus:v3
  grafana:
    major: 12
    image: grafana/grafana:12

policies:
  production_images: pin_by_digest_before_release
  database_source_of_truth: postgresql
  search_source_of_truth: false
  cache_source_of_truth: false
  attachment_local_mode: filesystem_volume
  attachment_production_mode: managed_s3_compatible
  attachment_scan_required: true
