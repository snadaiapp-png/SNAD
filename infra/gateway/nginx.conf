worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;

  log_format main_json escape=json '{"time":"$time_iso8601","remote":"$remote_addr","request":"$request","status":$status,"bytes":$body_bytes_sent,"request_time":$request_time,"upstream_time":"$upstream_response_time","request_id":"$request_id"}';
  access_log /var/log/nginx/access.log main_json;

  upstream snad_backend {
    server backend:8080;
    keepalive 64;
  }

  upstream snad_web {
    server web:3000;
    keepalive 32;
  }

  server {
    listen 8080;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'" always;

    location = /gateway-health {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location ~ ^/(api|actuator|v3/api-docs) {
      limit_req zone=api_per_ip burst=60 nodelay;
      limit_conn connections_per_ip 40;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 5s;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      proxy_pass http://snad_backend;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_pass http://snad_web;
    }
  }
}
