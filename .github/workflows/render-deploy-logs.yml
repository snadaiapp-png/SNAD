name: Render Deploy Logs

on:
  workflow_dispatch:
    inputs:
      deploy_id:
        description: 'Render deploy ID (e.g. dep-d93taedaeets73ehtisg). Leave empty to list recent deploys.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  fetch-logs:
    name: Fetch Render deploy logs
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      DEPLOY_ID: ${{ inputs.deploy_id }}
    steps:
      - name: Fetch service details
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Service details ==="
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            | jq '{id, name, status, serviceDetails: {disk: .serviceDetails.disk, plan: .serviceDetails.plan, region: .region, dockerfilePath: .dockerfilePath, dockerContext: .dockerContext, numInstances: .numInstances, envSpecificDetails: .envSpecificDetails}}'

      - name: List recent deploys (raw JSON)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Recent deploys (raw) ==="
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=10" \
            > /tmp/deploys.json
          # Show raw structure of first deploy to understand the schema
          echo "=== First deploy raw structure ==="
          jq '.[0]' /tmp/deploys.json
          echo "=== All deploys summary ==="
          jq '[.[] | {id, status, commit: .commit, createdAt, finishedAt, trigger}]' /tmp/deploys.json

      - name: Fetch deploy details and logs (if deploy_id provided)
        if: ${{ inputs.deploy_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Deploy $DEPLOY_ID details ==="
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
            | jq '.'

          echo "=== Trying /logs endpoint ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID/logs" \
            -o /tmp/logs1.json -w "HTTP %{http_code}\n" || true
          head -c 500 /tmp/logs1.json 2>/dev/null || true
          echo ""

          echo "=== Trying /events endpoint ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID/events" \
            -o /tmp/events1.json -w "HTTP %{http_code}\n" || true
          head -c 2000 /tmp/events1.json 2>/dev/null || true
          echo ""

          echo "=== Trying service events endpoint ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/events?limit=20" \
            -o /tmp/events2.json -w "HTTP %{http_code}\n" || true
          head -c 5000 /tmp/events2.json 2>/dev/null || true
          echo ""

      - name: List env vars keys (no values)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Render env vars (keys only, values redacted) ==="
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq '[.[]? | (.envVar // .) | {key, hasValue: ((.value // "") | length > 0)}]'
