name: Render Deploy Logs

on:
  workflow_dispatch:
    inputs:
      deploy_id:
        description: 'Render deploy ID (e.g. dep-d93taedaeets73ehtisg)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  fetch-logs:
    name: Fetch Render deploy logs
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      DEPLOY_ID: ${{ inputs.deploy_id }}
    steps:
      - name: Fetch deploy details
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Deploy details ==="
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
            | jq '.'
      - name: Fetch deploy logs (first 200 lines)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Deploy logs (last 200 lines) ==="
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID/logs?limit=200" \
            > /tmp/logs.json || true
          if [ -s /tmp/logs.json ]; then
            jq -r '.[] | .text // .' /tmp/logs.json 2>/dev/null | tail -200 || cat /tmp/logs.json | tail -200
          else
            echo "No logs returned"
          fi
      - name: List all recent deploys
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Recent deploys ==="
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=10" \
            | jq '[.[]? | {id, status: (.status // .deploy.status), commit: (.commit.id // .commitId // .commit)[0:7], createdAt: (.createdAt // .created_at), finishedAt: (.finishedAt // .finished_at)}]'
