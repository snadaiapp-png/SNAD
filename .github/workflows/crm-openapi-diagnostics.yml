name: CRM OpenAPI Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/**'
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/web/**'
      - '.github/workflows/crm-openapi-diagnostics.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm-openapi-diagnostics-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    name: Capture and synchronize CRM runtime OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feature head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Start backend
        working-directory: apps/sanad-platform
        env:
          JWT_SECRET: ci-only-non-production-validation-key-1234567890
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            > /tmp/crm-openapi-backend.log 2>&1 &
          echo $! > /tmp/crm-openapi-backend.pid

      - name: Capture runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-openapi-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-openapi-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              python3 -m json.tool /tmp/platform-openapi.json > docs/crm/contracts/openapi/crm-openapi.json
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm-openapi-backend.log
          exit 1

      - name: Generate TypeScript contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run generate:crm-api
          npm run typecheck

      - name: Validate generated contract
        run: |
          set -euo pipefail
          python scripts/crm/semantic-openapi-diff.py \
            --committed docs/crm/contracts/openapi/crm-openapi.json \
            --runtime /tmp/platform-openapi.json
          git diff --check

      - name: Upload runtime OpenAPI
        uses: actions/upload-artifact@v4
        with:
          name: crm-runtime-openapi-${{ github.sha }}
          path: docs/crm/contracts/openapi/crm-openapi.json
          if-no-files-found: error
          retention-days: 1

      - name: Commit synchronized contracts
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/crm/contracts/openapi/crm-openapi.json \
            apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo 'Contracts are already synchronized.'
            exit 0
          fi
          git commit -m 'chore(crm): synchronize generated API contracts'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-openapi-backend.pid ]; then
            kill "$(cat /tmp/crm-openapi-backend.pid)" 2>/dev/null || true
          fi
