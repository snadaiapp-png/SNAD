name: Compile Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: compile-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  observe-crm-final-state:
    name: Observe exact CRM closure workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Query current CRM closure runs read-only
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ea7ef51d1ec96d87893ee8d193eb122619029aaa
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/crm-final-state"
          mkdir -p "$evidence"
          for workflow in \
            publish-render-image.yml \
            crm-idempotency-production-reconciliation.yml \
            crm-g1-production-closure.yml \
            crm-007-final-production-closure.yml; do
            raw="$RUNNER_TEMP/${workflow%.yml}-raw.json"
            output="$evidence/${workflow%.yml}.json"
            gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?per_page=30" \
              > "$raw"
            jq --arg workflow "$workflow" --arg sha "$RELEASE_SHA" \
              '{workflow:$workflow,observed_at:(now|todate),exact_sha:$sha,runs:[.workflow_runs[]|select(.head_sha==$sha)|{id,name,event,status,conclusion,head_sha,head_branch,run_number,run_attempt,created_at,updated_at,html_url}]}' \
              "$raw" > "$output"
            cat "$output"
          done
          find "$evidence" -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$evidence/SHA256SUMS.txt"
      - name: Upload exact CRM closure observation
        uses: actions/upload-artifact@v4
        with:
          name: crm-final-state-observation-${{ github.run_id }}
          path: ${{ runner.temp }}/crm-final-state
          if-no-files-found: error
          retention-days: 1

  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Package and capture diagnostics
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          test "$CANDIDATE_SHA" = "$(git rev-parse HEAD^2 2>/dev/null || git rev-parse HEAD)" || {
            echo "Checked out merge ref; binding artifact metadata to PR head $CANDIDATE_SHA"
          }
          mvn -B -ntp clean package -DskipTests -Dgit.commit="$CANDIDATE_SHA" 2>&1 | tee compile.log
          test -s target/sanad-platform-0.1.0-SNAPSHOT.jar
      - name: Create immutable provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-provenance
          cp apps/sanad-platform/target/sanad-platform-0.1.0-SNAPSHOT.jar release-provenance/backend.jar
          sha256sum release-provenance/backend.jar > release-provenance/SHA256SUMS
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "tested_checkout_sha=$(git rev-parse HEAD)"
            echo "workflow_run=$GITHUB_RUN_ID"
            echo "workflow_attempt=$GITHUB_RUN_ATTEMPT"
            cat release-provenance/SHA256SUMS
          } > release-provenance/RELEASE-PROVENANCE.txt
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-diagnostics
          path: apps/sanad-platform/compile.log
          if-no-files-found: error
          retention-days: 7
      - name: Upload release provenance
        uses: actions/upload-artifact@v4
        with:
          name: stage07-backend-release-provenance
          path: release-provenance/
          if-no-files-found: error
          retention-days: 90
