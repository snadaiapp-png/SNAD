name: Compile Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: compile-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-crm007-source-fix:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'fix/crm007-nullable-exclusion-final'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: fix/crm007-nullable-exclusion-final
          fetch-depth: 0
      - name: Apply source-only correction
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/ci/apply_crm007_nullable_exclusion_final.py ]; then
            echo "Source correction already committed."
            exit 0
          fi
          python scripts/ci/apply_crm007_nullable_exclusion_final.py
          git checkout HEAD -- \
            .github/workflows/crm-idempotency-production-reconciliation.yml \
            .github/workflows/crm-007-final-production-closure.yml
          git diff --check
          git status --short
      - name: Commit source and PostgreSQL regression only
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/ci/apply_crm007_nullable_exclusion_final.py ]; then
            echo "Applicator unexpectedly still exists."
            exit 1
          fi
          if git diff --quiet && git diff --cached --quiet; then
            echo "No source changes remain to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/sanad-platform/src/main/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationRepository.java \
            apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationNullableFilterPostgresTest.java \
            scripts/ci/apply_crm007_nullable_exclusion_final.py
          git commit -m "fix(crm): bind nullable mutation exclusions as PostgreSQL UUID"
          git push origin HEAD:fix/crm007-nullable-exclusion-final

  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Package and capture diagnostics
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          test "$CANDIDATE_SHA" = "$(git rev-parse HEAD^2 2>/dev/null || git rev-parse HEAD)" || {
            echo "Checked out merge ref; binding artifact metadata to PR head $CANDIDATE_SHA"
          }
          mvn -B -ntp clean package -DskipTests -Dgit.commit="$CANDIDATE_SHA" 2>&1 | tee compile.log
          test -s target/sanad-platform-0.1.0-SNAPSHOT.jar
      - name: Create immutable provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-provenance
          cp apps/sanad-platform/target/sanad-platform-0.1.0-SNAPSHOT.jar release-provenance/backend.jar
          sha256sum release-provenance/backend.jar > release-provenance/SHA256SUMS
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "tested_checkout_sha=$(git rev-parse HEAD)"
            echo "workflow_run=$GITHUB_RUN_ID"
            echo "workflow_attempt=$GITHUB_RUN_ATTEMPT"
            cat release-provenance/SHA256SUMS
          } > release-provenance/RELEASE-PROVENANCE.txt
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-diagnostics
          path: apps/sanad-platform/compile.log
          if-no-files-found: error
          retention-days: 7
      - name: Upload release provenance
        uses: actions/upload-artifact@v4
        with:
          name: stage07-backend-release-provenance
          path: release-provenance/
          if-no-files-found: error
          retention-days: 90
