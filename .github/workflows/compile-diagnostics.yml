name: Compile Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compile-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-crm007-fix:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'fix/crm007-nullable-exclusion-final'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: fix/crm007-nullable-exclusion-final
          fetch-depth: 0
      - name: Apply exact patch in isolated workspace
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ci/apply_crm007_nullable_exclusion_final.py
          test ! -e scripts/ci/apply_crm007_nullable_exclusion_final.py
          git diff --check
          export_dir="$RUNNER_TEMP/crm007-patched"
          rm -rf "$export_dir"
          mkdir -p "$export_dir/source" "$export_dir/workflows"
          cp apps/sanad-platform/src/main/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationRepository.java \
            "$export_dir/source/JdbcAddressCommunicationRepository.java"
          cp apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationNullableFilterPostgresTest.java \
            "$export_dir/source/JdbcAddressCommunicationNullableFilterPostgresTest.java"
          cp .github/workflows/crm-idempotency-production-reconciliation.yml \
            "$export_dir/workflows/crm-idempotency-production-reconciliation.yml"
          cp .github/workflows/crm-007-final-production-closure.yml \
            "$export_dir/workflows/crm-007-final-production-closure.yml"
          (
            cd "$export_dir"
            find source workflows -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          )
      - name: Upload exact patched files
        uses: actions/upload-artifact@v4
        with:
          name: crm007-final-patched-files-${{ github.run_id }}
          path: ${{ runner.temp }}/crm007-patched
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Package and capture diagnostics
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          test "$CANDIDATE_SHA" = "$(git rev-parse HEAD^2 2>/dev/null || git rev-parse HEAD)" || {
            echo "Checked out merge ref; binding artifact metadata to PR head $CANDIDATE_SHA"
          }
          mvn -B -ntp clean package -DskipTests -Dgit.commit="$CANDIDATE_SHA" 2>&1 | tee compile.log
          test -s target/sanad-platform-0.1.0-SNAPSHOT.jar
      - name: Create immutable provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-provenance
          cp apps/sanad-platform/target/sanad-platform-0.1.0-SNAPSHOT.jar release-provenance/backend.jar
          sha256sum release-provenance/backend.jar > release-provenance/SHA256SUMS
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "tested_checkout_sha=$(git rev-parse HEAD)"
            echo "workflow_run=$GITHUB_RUN_ID"
            echo "workflow_attempt=$GITHUB_RUN_ATTEMPT"
            cat release-provenance/SHA256SUMS
          } > release-provenance/RELEASE-PROVENANCE.txt
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-diagnostics
          path: apps/sanad-platform/compile.log
          if-no-files-found: error
          retention-days: 7
      - name: Upload release provenance
        uses: actions/upload-artifact@v4
        with:
          name: stage07-backend-release-provenance
          path: release-provenance/
          if-no-files-found: error
          retention-days: 90
