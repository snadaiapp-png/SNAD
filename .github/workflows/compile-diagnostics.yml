name: Compile Diagnostics

on:
  # This workflow is a required status check and must report on every pull request.
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compile-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compile and capture diagnostics
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -o pipefail
          mvn -B -ntp clean compile 2>&1 | tee compile.log
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-diagnostics
          path: apps/sanad-platform/compile.log
          if-no-files-found: error
          retention-days: 3
