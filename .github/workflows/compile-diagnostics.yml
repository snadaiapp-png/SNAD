name: Compile Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-bff-v2-hotfix:
    if: github.head_ref == 'hotfix/crm-007-bff-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/crm-007-bff-v2
          fetch-depth: 0
      - name: Add API v2 forwarding and regression tests
        shell: bash
        run: |
          set -euo pipefail
          echo 'Applying CRM-007 BFF v2 hotfix on synchronized PR head'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          python3 - <<'PY'
          from pathlib import Path

          route = Path('apps/web/app/api/platform/[...path]/route.ts')
          text = route.read_text(encoding='utf-8')
          old = '  return value === "/api/v1" || value.startsWith("/api/v1/") ? value : null;'
          new = '''  const supportedApiRoot =
              value === "/api/v1" || value.startsWith("/api/v1/")
              || value === "/api/v2" || value.startsWith("/api/v2/");
            return supportedApiRoot ? value : null;'''
          if text.count(old) != 1:
              raise SystemExit('Expected backendPath v1-only guard was not found exactly once')
          route.write_text(text.replace(old, new), encoding='utf-8')

          test = Path('apps/web/app/api/platform/[...path]/route.test.ts')
          text = test.read_text(encoding='utf-8')
          anchor = '''  it("retries one transient 503 for an idempotent GET", async () => {'''
          case = '''  it("forwards CRM v2 requests through the same-origin BFF", async () => {
            vi.mocked(fetch).mockResolvedValue(
              new Response(JSON.stringify({ data: [] }), {
                status: 200,
                headers: { "content-type": "application/json" },
              }),
            );

            const response = await GET(
              request("/api/v2/crm/accounts/11111111-1111-4111-8111-111111111111/addresses?limit=1", {
                headers: { authorization: "Bearer crm-access-token" },
              }),
              context("api", "v2", "crm", "accounts", "11111111-1111-4111-8111-111111111111", "addresses"),
            );

            expect(response.status).toBe(200);
            const [url, init] = vi.mocked(fetch).mock.calls[0];
            expect(url).toBe("https://sanad-backend.example.com/api/v2/crm/accounts/11111111-1111-4111-8111-111111111111/addresses?limit=1");
            expect((init?.headers as Headers).get("authorization")).toBe("Bearer crm-access-token");
          });

          it("continues to reject unsupported API versions", async () => {
            const response = await GET(
              request("/api/v3/crm/accounts"),
              context("api", "v3", "crm", "accounts"),
            );

            expect(response.status).toBe(404);
            expect(fetch).not.toHaveBeenCalled();
          });

'''
          if text.count(anchor) != 1:
              raise SystemExit('Test insertion anchor was not found exactly once')
          test.write_text(text.replace(anchor, case + anchor), encoding='utf-8')
          PY
          git checkout origin/main -- .github/workflows/compile-diagnostics.yml
          git add apps/web/app/api/platform/'[...path]'/route.ts apps/web/app/api/platform/'[...path]'/route.test.ts .github/workflows/compile-diagnostics.yml
          git commit -m 'fix(web): forward CRM API v2 through production BFF'
          git push origin HEAD:refs/heads/hotfix/crm-007-bff-v2
