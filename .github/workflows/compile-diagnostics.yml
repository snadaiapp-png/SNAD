name: Compile Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: compile-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  observe-crm007:
    name: Observe CRM-007 workflow runs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Query CRM-007 workflow runs read-only
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/crm007-run-observation"
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/crm-007-final-production-closure.yml/runs?per_page=10" \
            --jq '{observed_at: now | todate, runs: [.workflow_runs[] | {id,name,event,status,conclusion,head_sha,run_number,run_attempt,created_at,updated_at,html_url}]}' \
            > "$RUNNER_TEMP/crm007-run-observation/runs.json"
          cat "$RUNNER_TEMP/crm007-run-observation/runs.json"
          sha256sum "$RUNNER_TEMP/crm007-run-observation/runs.json" > "$RUNNER_TEMP/crm007-run-observation/SHA256SUMS.txt"
      - name: Upload CRM-007 run observation
        uses: actions/upload-artifact@v4
        with:
          name: crm007-run-observation-${{ github.run_id }}
          path: ${{ runner.temp }}/crm007-run-observation
          if-no-files-found: error
          retention-days: 1

  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Package and capture diagnostics
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          test "$CANDIDATE_SHA" = "$(git rev-parse HEAD^2 2>/dev/null || git rev-parse HEAD)" || {
            echo "Checked out merge ref; binding artifact metadata to PR head $CANDIDATE_SHA"
          }
          mvn -B -ntp clean package -DskipTests -Dgit.commit="$CANDIDATE_SHA" 2>&1 | tee compile.log
          test -s target/sanad-platform-0.1.0-SNAPSHOT.jar
      - name: Create immutable provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-provenance
          cp apps/sanad-platform/target/sanad-platform-0.1.0-SNAPSHOT.jar release-provenance/backend.jar
          sha256sum release-provenance/backend.jar > release-provenance/SHA256SUMS
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "tested_checkout_sha=$(git rev-parse HEAD)"
            echo "workflow_run=$GITHUB_RUN_ID"
            echo "workflow_attempt=$GITHUB_RUN_ATTEMPT"
            cat release-provenance/SHA256SUMS
          } > release-provenance/RELEASE-PROVENANCE.txt
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-diagnostics
          path: apps/sanad-platform/compile.log
          if-no-files-found: error
          retention-days: 7
      - name: Upload release provenance
        uses: actions/upload-artifact@v4
        with:
          name: stage07-backend-release-provenance
          path: release-provenance/
          if-no-files-found: error
          retention-days: 90
