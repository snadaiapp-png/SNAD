name: Render Deployment Status Probe

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/render-status-probe.yml

permissions:
  contents: read

jobs:
  probe:
    name: Read latest Render deployment state
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Validate provider credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"

      - name: Read latest deployments
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
            > /tmp/deploys.json

          jq -e 'length > 0' /tmp/deploys.json >/dev/null
          jq '[.[]? | (.deploy // .) | {
            id,
            status,
            commit: (.commit.id // .commitId // "unknown"),
            createdAt: (.createdAt // null),
            updatedAt: (.updatedAt // null),
            finishedAt: (.finishedAt // null)
          }]' /tmp/deploys.json > render-deployment-status.json

          jq -r '.[0] | "LATEST_DEPLOYMENT_ID=\(.id)\nLATEST_STATUS=\(.status)\nLATEST_COMMIT=\(.commit)"' render-deployment-status.json

      - name: Upload status evidence
        uses: actions/upload-artifact@v4
        with:
          name: render-deployment-status-${{ github.run_id }}
          path: render-deployment-status.json
          retention-days: 7
