name: CRM Contract Sync

on:
  push:
    branches:
      - crm/006-contact-relationship-model
    paths:
      - '.github/workflows/crm-contract-sync.yml'

permissions:
  contents: write

concurrency:
  group: crm-contract-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Synchronize runtime OpenAPI and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: crm/006-contact-relationship-model
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Start backend
        working-directory: apps/sanad-platform
        env:
          JWT_SECRET: ci-only-non-production-validation-key-1234567890
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            > /tmp/crm-contract-sync-backend.log 2>&1 &
          echo $! > /tmp/crm-contract-sync-backend.pid

      - name: Fetch runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-contract-sync-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-contract-sync-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              python3 -m json.tool /tmp/platform-openapi.json > docs/crm/contracts/openapi/crm-openapi.json
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm-contract-sync-backend.log
          exit 1

      - name: Generate TypeScript client contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run generate:crm-api
          npm run typecheck

      - name: Validate semantic contract
        run: |
          set -euo pipefail
          python scripts/crm/semantic-openapi-diff.py \
            --committed docs/crm/contracts/openapi/crm-openapi.json \
            --runtime /tmp/platform-openapi.json
          git diff --check

      - name: Commit generated contracts
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/crm/contracts/openapi/crm-openapi.json \
            apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo 'Contracts are already synchronized.'
            exit 0
          fi
          git commit -m 'chore(crm): synchronize generated API contracts'
          git push origin HEAD:crm/006-contact-relationship-model

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-contract-sync-backend.pid ]; then
            kill "$(cat /tmp/crm-contract-sync-backend.pid)" 2>/dev/null || true
          fi
