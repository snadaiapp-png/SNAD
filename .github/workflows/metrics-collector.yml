# ============================================================
# SANAD Platform — Metrics Collector
# ============================================================
# Runs every 15 minutes to collect health and availability
# metrics across the SANAD platform stack. Produces a JSON
# artifact and a human-readable summary. When any check
# fails, a "degraded" label is applied to the latest open
# metrics-tracking issue.
# ============================================================

name: Metrics Collector

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:

permissions:
  contents: read
  issues: write               # Required to label issues

concurrency:
  group: metrics-collector
  cancel-in-progress: true

env:
  BACKEND_URL: https://sanad-backend-mcrj.onrender.com
  FRONTEND_URL: https://snad-app.vercel.app

jobs:
  collect-metrics:
    name: Collect Platform Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -------------------------------------------------------
      # Step 1: Check backend health (status + response time)
      # -------------------------------------------------------
      - name: Check backend health
        id: backend
        shell: bash
        run: |
          set -euo pipefail

          url='${{ env.BACKEND_URL }}/actuator/health'
          start_ms=$(date +%s%3N)

          result=$(curl --silent --show-error --location \
            --connect-timeout 15 --max-time 60 \
            --write-out '\n%{http_code}' "$url" || true)

          end_ms=$(date +%s%3N)
          elapsed_ms=$(( end_ms - start_ms ))

          body=$(printf '%s' "$result" | sed '$d')
          status_code=$(printf '%s' "$result" | tail -n 1)

          # Treat connection failures as status 000
          status_code="${status_code:-000}"

          if [ "$status_code" = '200' ] && printf '%s' "$body" | grep -q '"status":"UP"'; then
            healthy="true"
          else
            healthy="false"
          fi

          echo "status_code=$status_code"   >> "$GITHUB_OUTPUT"
          echo "response_time_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "healthy=$healthy"            >> "$GITHUB_OUTPUT"

          if [ "$healthy" = 'true' ]; then
            echo "Backend healthy (HTTP $status_code, ${elapsed_ms}ms)"
          else
            echo "Backend UNHEALTHY (HTTP $status_code, ${elapsed_ms}ms)"
          fi

      # -------------------------------------------------------
      # Step 2: Check frontend health (status + response time)
      # -------------------------------------------------------
      - name: Check frontend health
        id: frontend
        shell: bash
        run: |
          set -euo pipefail

          url='${{ env.FRONTEND_URL }}'
          start_ms=$(date +%s%3N)

          result=$(curl --silent --show-error --location \
            --connect-timeout 15 --max-time 60 \
            --write-out '\n%{http_code}' "$url" || true)

          end_ms=$(date +%s%3N)
          elapsed_ms=$(( end_ms - start_ms ))

          status_code=$(printf '%s' "$result" | tail -n 1)
          status_code="${status_code:-000}"

          # 200/301/302 are all acceptable for a Vercel-hosted SPA
          if [ "$status_code" = '200' ] || [ "$status_code" = '301' ] || [ "$status_code" = '302' ]; then
            healthy="true"
          else
            healthy="false"
          fi

          echo "status_code=$status_code"     >> "$GITHUB_OUTPUT"
          echo "response_time_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "healthy=$healthy"             >> "$GITHUB_OUTPUT"

          if [ "$healthy" = 'true' ]; then
            echo "Frontend healthy (HTTP $status_code, ${elapsed_ms}ms)"
          else
            echo "Frontend UNHEALTHY (HTTP $status_code, ${elapsed_ms}ms)"
          fi

      # -------------------------------------------------------
      # Step 3: Check API endpoint availability
      # -------------------------------------------------------
      - name: Check API endpoint availability
        id: api-endpoints
        shell: bash
        run: |
          set -euo pipefail

          declare -A endpoints=(
            ["health"]="/actuator/health"
            ["login"]="/api/auth/login"
            ["me"]="/api/auth/me"
            ["organizations"]="/api/organizations"
          )

          results_json="{}"
          all_ok="true"

          for name in "${!endpoints[@]}"; do
            path="${endpoints[$name]}"
            url="${{ env.BACKEND_URL }}${path}"
            start_ms=$(date +%s%3N)

            status_code=$(curl --silent --output /dev/null \
              --connect-timeout 10 --max-time 30 \
              --write-out '%{http_code}' "$url" || echo "000")

            end_ms=$(date +%s%3N)
            elapsed_ms=$(( end_ms - start_ms ))

            # For unauthenticated endpoints, 200 is expected.
            # For authenticated endpoints, 401/403 means the service is
            # reachable and enforcing auth — that counts as available.
            case "$status_code" in
              200|301|302|401|403)
                available="true"
                ;;
              *)
                available="false"
                all_ok="false"
                ;;
            esac

            echo "$name: HTTP $status_code (${elapsed_ms}ms) — available=$available"

            # Build JSON object using jq for safety
            results_json=$(printf '%s' "$results_json" | jq \
              --arg name "$name" \
              --arg code "$status_code" \
              --arg ms "$elapsed_ms" \
              --arg avail "$available" \
              '. + { ($name): { status_code: ($code | tonumber), response_time_ms: ($ms | tonumber), available: ($avail == "true") } }')
          done

          echo "all_ok=$all_ok" >> "$GITHUB_OUTPUT"
          echo "results_json=$results_json" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------
      # Step 4: Assemble metrics JSON artifact
      # -------------------------------------------------------
      - name: Assemble metrics JSON
        id: assemble
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          run_id="${{ github.run_id }}"
          run_number="${{ github.run_number }}"

          overall_healthy="true"
          if [ "${{ steps.backend.outputs.healthy }}" != "true" ] || \
             [ "${{ steps.frontend.outputs.healthy }}" != "true" ] || \
             [ "${{ steps.api-endpoints.outputs.all_ok }}" != "true" ]; then
            overall_healthy="false"
          fi

          jq -n \
            --arg ts "$timestamp" \
            --arg run_id "$run_id" \
            --arg run_number "$run_number" \
            --arg overall "$overall_healthy" \
            --arg backend_status "${{ steps.backend.outputs.status_code || '000' }}" \
            --arg backend_ms "${{ steps.backend.outputs.response_time_ms || '0' }}" \
            --arg backend_healthy "${{ steps.backend.outputs.healthy || 'false' }}" \
            --arg frontend_status "${{ steps.frontend.outputs.status_code || '000' }}" \
            --arg frontend_ms "${{ steps.frontend.outputs.response_time_ms || '0' }}" \
            --arg frontend_healthy "${{ steps.frontend.outputs.healthy || 'false' }}" \
            --argjson api_results "${{ steps.api-endpoints.outputs.results_json || '{}' }}" \
            '{
              timestamp: $ts,
              run_id: $run_id,
              run_number: ($run_number | tonumber),
              overall_healthy: ($overall == "true"),
              backend: {
                status_code: ($backend_status | tonumber),
                response_time_ms: ($backend_ms | tonumber),
                healthy: ($backend_healthy == "true")
              },
              frontend: {
                status_code: ($frontend_status | tonumber),
                response_time_ms: ($frontend_ms | tonumber),
                healthy: ($frontend_healthy == "true")
              },
              api_endpoints: $api_results
            }' > metrics.json

          echo "overall_healthy=$overall_healthy" >> "$GITHUB_OUTPUT"
          echo "Metrics JSON assembled — overall_healthy=$overall_healthy"

      # -------------------------------------------------------
      # Step 5: Upload metrics artifact
      # -------------------------------------------------------
      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.run_id }}
          path: metrics.json
          if-no-files-found: error
          retention-days: 30

      # -------------------------------------------------------
      # Step 6: Write GITHUB_STEP_SUMMARY
      # -------------------------------------------------------
      - name: Write metrics summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          overall="${{ steps.assemble.outputs.overall_healthy || 'false' }}"
          backend_healthy="${{ steps.backend.outputs.healthy || 'false' }}"
          frontend_healthy="${{ steps.frontend.outputs.healthy || 'false' }}"
          api_all_ok="${{ steps.api-endpoints.outputs.all_ok || 'false' }}"

          if [ "$overall" = "true" ]; then
            status_icon=":green_circle:"
            status_text="HEALTHY"
          else
            status_icon=":red_circle:"
            status_text="DEGRADED"
          fi

          {
            echo "## SANAD Platform Metrics"
            echo ""
            echo "| Check | Status | HTTP | Response Time |"
            echo "|-------|--------|------|---------------|"
            printf '| Backend | %s | %s | %sms |\n' \
              "$([ "$backend_healthy" = "true" ] && echo 'OK' || echo 'FAIL')" \
              "${{ steps.backend.outputs.status_code || 'N/A' }}" \
              "${{ steps.backend.outputs.response_time_ms || 'N/A' }}"
            printf '| Frontend | %s | %s | %sms |\n' \
              "$([ "$frontend_healthy" = "true" ] && echo 'OK' || echo 'FAIL')" \
              "${{ steps.frontend.outputs.status_code || 'N/A' }}" \
              "${{ steps.frontend.outputs.response_time_ms || 'N/A' }}"
            echo ""
            echo "### API Endpoint Availability"
            echo ""
            echo "| Endpoint | HTTP | Response Time | Available |"
            echo "|----------|------|---------------|-----------|"

            # Parse the JSON for each known endpoint
            for name in health login me organizations; do
              ep_status=$(jq -r ".${name}.status_code // \"N/A\"" metrics.json)
              ep_ms=$(jq -r ".${name}.response_time_ms // \"N/A\"" metrics.json)
              ep_avail=$(jq -r ".${name}.available // false" metrics.json)
              if [ "$ep_avail" = "true" ]; then
                avail_text="OK"
              else
                avail_text="FAIL"
              fi
              printf '| %s | %s | %sms | %s |\n' "$name" "$ep_status" "$ep_ms" "$avail_text"
            done

            echo ""
            echo "$status_icon **Overall: $status_text**"
            echo ""
            echo "- Collected at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Run ID: ${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # -------------------------------------------------------
      # Step 7: Apply "degraded" label if any check failed
      # -------------------------------------------------------
      - name: Apply degraded label on failure
        if: failure() || steps.assemble.outputs.overall_healthy == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          # Find the most recent open metrics-tracking issue
          issue_number=$(gh issue list \
            --label "metrics" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$issue_number" ]; then
            # No open metrics issue — create one
            timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
            issue_number=$(gh issue create \
              --title "Metrics Tracking — Service Degradation Detected" \
              --body "## Automated Metrics Alert\n\nDegradation detected at **$timestamp**.\n\nThis issue is automatically managed by the metrics-collector workflow.\nWhen all checks recover, the \`degraded\` label will be removed.\n\n*Auto-created by metrics-collector workflow.*" \
              --label "metrics" \
              --label "degraded" \
              2>/dev/null | grep -oE '[0-9]+' || echo "")
            echo "Created metrics issue #$issue_number"
          else
            # Add degraded label if not already present
            gh issue edit "$issue_number" --add-label "degraded" 2>/dev/null || true
            echo "Added degraded label to issue #$issue_number"

            # Comment with current failure details
            timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
            gh issue comment "$issue_number" --body "Degradation detected at $timestamp — Backend: ${{ steps.backend.outputs.healthy }}, Frontend: ${{ steps.frontend.outputs.healthy }}, API endpoints: ${{ steps.api-endpoints.outputs.all_ok }}" 2>/dev/null || true
          fi

      # -------------------------------------------------------
      # Step 8: Remove "degraded" label when all checks pass
      # -------------------------------------------------------
      - name: Remove degraded label on recovery
        if: success() && steps.assemble.outputs.overall_healthy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          issue_number=$(gh issue list \
            --label "metrics" \
            --label "degraded" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --remove-label "degraded" 2>/dev/null || true
            timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
            gh issue comment "$issue_number" --body "All checks recovered at $timestamp. Removed degraded label." 2>/dev/null || true
            echo "Removed degraded label from issue #$issue_number"
          else
            echo "No degraded metrics issues found — all clear"
          fi
