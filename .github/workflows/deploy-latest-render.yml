name: Deploy Latest to Render

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        type: string
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy latest commit to Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    if: github.event.inputs.confirm == 'deploy'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Get current commit SHA
        id: sha
        shell: bash
        run: |
          SHA=$(git ls-remote "https://github.com/${{ github.repository }}.git" refs/heads/main | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Trigger deploy on Render
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Triggering deploy ==="
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          echo "Response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          echo "Deploy ID: $DEPLOY_ID"
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_ENV"
          test -n "$DEPLOY_ID" || { echo "::error::Failed to get deploy ID"; exit 1; }

      - name: Wait for deploy to complete (max 20 min)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Waiting for deploy $deploy_id ==="
          for i in $(seq 1 80); do
            sleep 15
            STATUS=$(curl --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" \
              | jq -r '.status // .deploy.status // empty')
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy is LIVE!"
              exit 0
            fi
            if [ "$STATUS" = "update_failed" ] || [ "$STATUS" = "deactivated" ]; then
              echo "::error::Deploy failed with status: $STATUS"
              exit 1
            fi
          done
          echo "::error::Deploy did not complete within 20 minutes"
          exit 1

      - name: Wait for backend to become healthy
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Waiting for backend health ==="
          for i in $(seq 1 40); do
            sleep 15
            STATUS=$(curl --silent --show-error --max-time 10 \
              -o /dev/null -w '%{http_code}' \
              https://sanad-backend-mcrj.onrender.com/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after $((i * 15))s"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "::warning::Backend not healthy yet, but deploy completed"

      - name: Test critical endpoints
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing endpoints ==="

          echo "--- Health ---"
          curl --silent --max-time 15 https://sanad-backend-mcrj.onrender.com/actuator/health | jq '.'

          echo "--- Login (should NOT be 500) ---"
          LOGIN_STATUS=$(curl --silent --show-error --max-time 15 -o /tmp/login.json -w '%{http_code}' \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"wrong"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/login)
          echo "Login status: $LOGIN_STATUS"
          echo "Response: $(cat /tmp/login.json)"

          echo "--- Forgot-password (should NOT be 500) ---"
          FORGOT_STATUS=$(curl --silent --show-error --max-time 15 -o /tmp/forgot.json -w '%{http_code}' \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"test@example.com"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/forgot-password)
          echo "Forgot-password status: $FORGOT_STATUS"
          echo "Response: $(cat /tmp/forgot.json)"

          echo "--- Auth me (should be 401) ---"
          ME_STATUS=$(curl --silent --show-error --max-time 15 -o /dev/null -w '%{http_code}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/me)
          echo "Auth me status: $ME_STATUS"

          if [ "$LOGIN_STATUS" = "500" ] || [ "$FORGOT_STATUS" = "500" ]; then
            echo "::error::Endpoints still returning 500 — fix did not work"
            exit 1
          fi

          echo ""
          echo "=== DEPLOY VERIFIED ==="
