name: CRM-007 Focused Policy Sync

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm007-focused-policy-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Add policy acceptance coverage
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/crm007-focused-acceptance.yml')
          text=path.read_text(encoding='utf-8')
          text=text.replace("- 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/AddressCommunication**'",
                            "- 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/AddressCommunication**'\n      - 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/CommunicationPolicyHttpIntegrationTest.java'")
          text=text.replace("AddressCommunicationOperationsHttpIntegrationTest' test",
                            "AddressCommunicationOperationsHttpIntegrationTest,CommunicationPolicyHttpIntegrationTest' test")
          text=text.replace("'CrmAddressCommunicationMigrationUpgradeTest',\n", "'CrmAddressCommunicationMigrationUpgradeTest',\n            'CommunicationPolicyHttpIntegrationTest',\n")
          text=text.replace('total < 12', 'total < 13')
          path.write_text(text,encoding='utf-8')
          PY
          git rm .github/workflows/crm007-focused-policy-sync.yml
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/crm007-focused-acceptance.yml
          git commit -am 'ci(crm): include policy in CRM-007 focused acceptance'
          git push origin HEAD:${{ github.head_ref }}
