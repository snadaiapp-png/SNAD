name: CRM 002G UI Auth Operator

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >-
      github.event.issue.pull_request &&
      github.event.issue.number == 501 &&
      github.event.comment.body == '/patch-crm-ui-auth-501'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout governed execution branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: crm/002g-execute-final-acceptance-gate
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply browser-session authentication patch
        run: python3 scripts/crm/patch_crm_e2e_ui_auth.py

      - name: Validate generated TypeScript and diff
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm ci
          npx tsc --noEmit --pretty false
          cd ../..
          git diff --check

      - name: Commit and push implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "snad-crm-governance-bot"
          git config user.email "snad-crm-governance-bot@users.noreply.github.com"
          git add -A
          git commit -m "test(crm): authenticate acceptance browser contexts"
          git push origin HEAD:crm/002g-execute-final-acceptance-gate
