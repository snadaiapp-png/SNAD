name: Production Smoke Test

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: 'Frontend URL (optional; production Vercel URL is used by default)'
        required: false
        default: ''
        type: string
      backend_url:
        description: 'Render backend URL override (optional)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

concurrency:
  group: pilot-production-smoke
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Vercel Frontend, BFF, and Render Backend Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FRONTEND_URL: ${{ github.event.inputs.frontend_url || vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}
      BACKEND_URL: ${{ github.event.inputs.backend_url || vars.PRODUCTION_BACKEND_BASE_URL || 'https://sanad-backend-mcrj.onrender.com' }}
      ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}

    steps:
      - name: Validate target URLs
        shell: bash
        run: |
          set -euo pipefail
          test "${FRONTEND_URL%/}" = 'https://snad-app.vercel.app' || {
            echo '::error::Frontend target must be the production Vercel origin.'
            exit 1
          }
          test "${BACKEND_URL%/}" = 'https://sanad-backend-mcrj.onrender.com' || {
            echo '::error::Backend target must be the production Render origin.'
            exit 1
          }

      - name: Run deployment smoke checks
        shell: bash
        run: |
          set -euo pipefail
          FRONTEND_URL="${FRONTEND_URL%/}"
          BACKEND_URL="${BACKEND_URL%/}"
          PASS=0
          FAIL=0

          check_code() {
            local name="$1"
            local expected="$2"
            local method="$3"
            local url="$4"
            shift 4
            local actual
            actual=$(curl --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              --output /dev/null --write-out '%{http_code}' \
              --request "$method" "$url" "$@" || true)
            actual="${actual:-000}"
            if [ "$actual" = "$expected" ]; then
              echo "$name: PASS ($actual)"
              PASS=$((PASS + 1))
            else
              echo "$name: FAIL (expected $expected, got $actual)"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "=== SNAD Vercel/Render Smoke Test ==="
          check_code "Frontend root" "200" "GET" "$FRONTEND_URL/"
          check_code "Control Plane page" "200" "GET" "$FRONTEND_URL/control-plane"
          check_code "Backend health" "200" "GET" "$BACKEND_URL/actuator/health"
          check_code "Backend liveness" "200" "GET" "$BACKEND_URL/actuator/health/liveness"
          check_code "Backend readiness" "200" "GET" "$BACKEND_URL/actuator/health/readiness"
          check_code "Backend no-auth boundary" "401" "GET" "$BACKEND_URL/api/v1/auth/me"
          check_code "Vercel BFF no-auth boundary" "401" "GET" \
            "$FRONTEND_URL/api/platform/api/v1/auth/me"

          STATUS_JSON=$(curl --silent --show-error --location \
            --connect-timeout 10 --max-time 30 \
            "$FRONTEND_URL/api/system/backend-status" || true)
          if STATUS_JSON="$STATUS_JSON" python3 - <<'PY'
          import json
          import os
          import sys

          try:
              data = json.loads(os.environ.get("STATUS_JSON", ""))
          except json.JSONDecodeError:
              sys.exit(1)
          valid = (
              data.get("configured") is True
              and data.get("reachable") is True
              and data.get("statusCode") == 200
              and "targetHost" not in data
          )
          sys.exit(0 if valid else 1)
          PY
          then
            echo "Frontend backend-status: PASS"
            PASS=$((PASS + 1))
          else
            echo "Frontend backend-status: FAIL"
            FAIL=$((FAIL + 1))
          fi

          if [ -n "${ADMIN_EMAIL:-}" ] && [ -n "${ADMIN_PASSWORD:-}" ]; then
            LOGIN_BODY=$(mktemp)
            trap 'rm -f "$LOGIN_BODY"' EXIT

            LOGIN_CODE=$(curl --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              --output "$LOGIN_BODY" --write-out '%{http_code}' \
              --request POST "$FRONTEND_URL/api/platform/api/v1/auth/login" \
              --header 'Content-Type: application/json' \
              --header "Origin: $FRONTEND_URL" \
              --data "$(ADMIN_EMAIL="$ADMIN_EMAIL" ADMIN_PASSWORD="$ADMIN_PASSWORD" python3 - <<'PY'
          import json
          import os
          print(json.dumps({"email": os.environ["ADMIN_EMAIL"], "password": os.environ["ADMIN_PASSWORD"]}))
          PY
              )" || true)

            TOKEN=$(LOGIN_BODY="$LOGIN_BODY" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          try:
              payload = json.loads(Path(os.environ["LOGIN_BODY"]).read_text())
          except Exception:
              payload = {}
          print(payload.get("accessToken", ""))
          PY
            )

            if [ "$LOGIN_CODE" = "200" ] && [ -n "$TOKEN" ]; then
              echo "BFF login: PASS"
              PASS=$((PASS + 1))
              check_code "BFF authenticated /auth/me" "200" "GET" \
                "$FRONTEND_URL/api/platform/api/v1/auth/me" \
                --header "Authorization: Bearer $TOKEN"
              check_code "BFF logout" "204" "POST" \
                "$FRONTEND_URL/api/platform/api/v1/auth/logout" \
                --header "Authorization: Bearer $TOKEN" \
                --header "Origin: $FRONTEND_URL"
            else
              echo "BFF login: FAIL (HTTP ${LOGIN_CODE:-000})"
              FAIL=$((FAIL + 1))
            fi
          else
            echo "BFF authenticated checks: SKIPPED (admin secrets not configured)"
          fi

          echo "=== Results: $PASS passed, $FAIL failed ==="
          test "$FAIL" -eq 0
