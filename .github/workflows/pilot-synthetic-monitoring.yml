name: Pilot Synthetic Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: read

concurrency:
  group: pilot-synthetic-monitoring
  cancel-in-progress: true

env:
  BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_BASE_URL || 'https://sanad-backend-mcrj.onrender.com' }}
  FRONTEND_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}

jobs:
  synthetic-check:
    name: Render Backend and Vercel Frontend Integration Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate monitoring configuration
        shell: bash
        run: |
          set -euo pipefail
          test "${BACKEND_URL%/}" = 'https://sanad-backend-mcrj.onrender.com' || {
            echo '::error::PRODUCTION_BACKEND_BASE_URL must be the production Render origin.'
            exit 1
          }
          test "${FRONTEND_URL%/}" = 'https://snad-app.vercel.app' || {
            echo '::error::WEB_PRODUCTION_BASE_URL must be the production Vercel origin.'
            exit 1
          }

      - name: Check backend health
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          url="${BACKEND_URL%/}/actuator/health"
          start=$(date +%s)
          response=''
          code='000'

          for attempt in $(seq 1 4); do
            result=$(curl --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              --write-out '\n%{http_code}' "$url" || true)
            response=$(printf '%s' "$result" | sed '$d')
            code=$(printf '%s' "$result" | tail -n 1)
            code="${code:-000}"

            if [ "$code" = '200' ] && printf '%s' "$response" | grep -q '"status"[[:space:]]*:[[:space:]]*"UP"'; then
              elapsed=$(($(date +%s)-start))
              echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
              echo "Backend health passed in ${elapsed}s"
              exit 0
            fi

            echo "Attempt ${attempt} failed with HTTP ${code}"
            [ "$attempt" = '4' ] || sleep 10
          done

          echo "Backend health failed. Last HTTP status: ${code}"
          exit 1

      - name: Check frontend integration
        id: frontend
        shell: bash
        run: |
          set -euo pipefail
          url="${FRONTEND_URL%/}/api/system/backend-status"
          start=$(date +%s)
          result=$(curl --silent --show-error --location \
            --connect-timeout 10 --max-time 40 \
            --write-out '\n%{http_code}' "$url")
          response=$(printf '%s' "$result" | sed '$d')
          code=$(printf '%s' "$result" | tail -n 1)
          elapsed=$(($(date +%s)-start))

          test "$code" = '200'
          STATUS_JSON="$response" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ['STATUS_JSON'])
          assert data.get('configured') is True
          assert data.get('reachable') is True
          assert data.get('statusCode') == 200
          assert 'targetHost' not in data
          PY

          echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
          echo "Frontend integration passed in ${elapsed}s"

      - name: Publish monitoring summary
        if: always()
        shell: bash
        run: |
          {
            echo '## SANAD Render Integration Monitoring'
            echo ''
            echo "- Checked at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Backend health duration: ${{ steps.backend.outputs.elapsed_seconds || 'failed' }} seconds"
            echo "- Frontend integration duration: ${{ steps.frontend.outputs.elapsed_seconds || 'failed' }} seconds"
            echo '- Backend source: production Render service'
          } >> "$GITHUB_STEP_SUMMARY"
