name: Executive Health Production Verification
run-name: "Executive Health verification #${{ github.run_number }}"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: executive-health-production-verification
  cancel-in-progress: false

jobs:
  verify:
    name: Controlled Production Verification
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      WEB_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}
      SANAD_ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      SANAD_ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      IDENTITY_B_EMAIL: ${{ secrets.IDENTITY_B_EMAIL }}
      IDENTITY_B_PASSWORD: ${{ secrets.IDENTITY_B_PASSWORD }}
      VERIFY_CORRELATION_ID: executive-health-${{ github.run_id }}-${{ github.run_attempt }}
      VERIFY_REASON: Production verification run ${{ github.run_id }} attempt ${{ github.run_attempt }}
    steps:
      - name: Admin Login
        shell: bash
        run: |
          set -euo pipefail
          LOGIN_PAYLOAD=$(jq -n \
            --arg email "$SANAD_ADMIN_EMAIL" \
            --arg password "$SANAD_ADMIN_PASSWORD" \
            '{email: $email, password: $password}')
          LOGIN=$(curl -sS --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$LOGIN_PAYLOAD" \
            "$BACKEND_URL/api/v1/auth/login")
          TOKEN=$(echo "$LOGIN" | jq -r '.accessToken // empty')
          echo "::add-mask::$TOKEN"
          test -n "$TOKEN" || { echo "::error::Admin login failed"; exit 1; }
          echo "ADMIN_LOGIN=PASS"
          echo "ADMIN_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Health API contract and completeness
        shell: bash
        run: |
          set -euo pipefail
          CODE=$(curl -sS --max-time 30 \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -o /tmp/health.json \
            -w '%{http_code}' \
            "$BACKEND_URL/api/v1/control-plane/health")
          echo "Health API HTTP: $CODE"
          test "$CODE" = "200" || { echo "::error::Health API failed"; cat /tmp/health.json; exit 1; }
          jq -e 'type == "object"' /tmp/health.json >/dev/null
          jq -e '.overallStatus == "HEALTHY"' /tmp/health.json >/dev/null
          jq -e '(.healthScore | type == "number") and .healthScore >= 0 and .healthScore <= 100' /tmp/health.json >/dev/null
          jq -e '(.riskLevel | type == "string") and (.riskLevel | length > 0)' /tmp/health.json >/dev/null
          jq -e '.partial == false' /tmp/health.json >/dev/null
          jq -e '.dataCompletenessScore == 100' /tmp/health.json >/dev/null
          jq -e '(.degradedComponents | type == "array") and (.degradedComponents | length == 0)' /tmp/health.json >/dev/null
          jq -e '(.collectionErrors | type == "array") and (.collectionErrors | length == 0)' /tmp/health.json >/dev/null
          jq -e '(.runtime | type == "object") and (.dataPressure | type == "object")' /tmp/health.json >/dev/null
          jq -e '(.services | type == "array") and (.tenants | type == "array") and (.forecast | type == "array") and (.availableActions | type == "array")' /tmp/health.json >/dev/null
          jq -e '(.generatedAt | type == "string") and (.generatedAt | length > 0)' /tmp/health.json >/dev/null
          echo "HEALTH_API_CONTRACT=PASS"
          jq '{overallStatus, healthScore, riskLevel, partial, dataCompletenessScore, serviceCount: (.services | length), tenantCount: (.tenants | length), forecastPoints: (.forecast | length)}' /tmp/health.json

      - name: RBAC Unauthenticated
        shell: bash
        run: |
          set -euo pipefail
          CODE=$(curl -sS --max-time 15 -o /dev/null -w '%{http_code}' "$BACKEND_URL/api/v1/control-plane/health")
          test "$CODE" = "401" || { echo "::error::Expected 401 got $CODE"; exit 1; }
          echo "RBAC_UNAUTH=PASS"

      - name: RBAC Identity B read
        shell: bash
        run: |
          set -euo pipefail
          LOGIN_PAYLOAD=$(jq -n \
            --arg email "$IDENTITY_B_EMAIL" \
            --arg password "$IDENTITY_B_PASSWORD" \
            '{email: $email, password: $password}')
          LOGIN_B=$(curl -sS --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$LOGIN_PAYLOAD" \
            "$BACKEND_URL/api/v1/auth/login")
          TOKEN_B=$(echo "$LOGIN_B" | jq -r '.accessToken // empty')
          test -n "$TOKEN_B" || { echo "::error::Identity B login failed"; exit 1; }
          echo "::add-mask::$TOKEN_B"
          CODE=$(curl -sS --max-time 15 \
            -o /dev/null \
            -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN_B" \
            "$BACKEND_URL/api/v1/control-plane/health")
          test "$CODE" = "403" || { echo "::error::Expected 403 got $CODE"; exit 1; }
          echo "IDENTITY_B_TOKEN=$TOKEN_B" >> "$GITHUB_ENV"
          echo "RBAC_IDENTITY_B_READ=PASS"

      - name: RBAC Identity B write
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n '{scope: "PLATFORM", action: "RUN_DIAGNOSTICS", reason: "Unauthorized production verification"}')
          CODE=$(curl -sS --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $IDENTITY_B_TOKEN" \
            -d "$PAYLOAD" \
            -o /dev/null \
            -w '%{http_code}' \
            "$BACKEND_URL/api/v1/control-plane/health/actions")
          test "$CODE" = "403" || { echo "::error::Expected write 403 got $CODE"; exit 1; }
          echo "RBAC_IDENTITY_B_WRITE=PASS"

      - name: RUN_DIAGNOSTICS contract
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg reason "$VERIFY_REASON" \
            '{scope: "PLATFORM", action: "RUN_DIAGNOSTICS", reason: $reason}')
          CODE=$(curl -sS --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "X-Correlation-ID: $VERIFY_CORRELATION_ID" \
            -d "$PAYLOAD" \
            -o /tmp/action.json \
            -w '%{http_code}' \
            "$BACKEND_URL/api/v1/control-plane/health/actions")
          echo "RUN_DIAGNOSTICS: $CODE"
          test "$CODE" = "200" || { echo "::error::Expected 200 got $CODE"; cat /tmp/action.json; exit 1; }
          jq -e '.action == "RUN_DIAGNOSTICS" and .scope == "PLATFORM" and .status == "SUCCESS"' /tmp/action.json >/dev/null
          jq -e '(.message | type == "string") and (.message | length > 0)' /tmp/action.json >/dev/null
          jq -e '(.executedAt | type == "string") and (.executedAt | length > 0)' /tmp/action.json >/dev/null
          jq -e '.snapshot.partial == false and .snapshot.dataCompletenessScore == 100 and (.snapshot.collectionErrors | length == 0)' /tmp/action.json >/dev/null
          echo "HEALTH_ACTION_CONTRACT=PASS"

      - name: Audit record verification
        shell: bash
        run: |
          set -euo pipefail
          CODE=$(curl -sS --max-time 30 \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -o /tmp/audit.json \
            -w '%{http_code}' \
            "$BACKEND_URL/api/v1/control-plane/audit?limit=200")
          test "$CODE" = "200" || { echo "::error::Audit API expected 200 got $CODE"; cat /tmp/audit.json; exit 1; }
          jq -e \
            --arg correlation "$VERIFY_CORRELATION_ID" \
            --arg reason "$VERIFY_REASON" \
            '[.[] | select(
              .correlationId == $correlation and
              .action == "HEALTH.ACTION.RUN_DIAGNOSTICS" and
              .resourceType == "HEALTH_PLATFORM" and
              .resourceId == "PLATFORM" and
              .reason == $reason and
              .result == "SUCCESS"
            )] | length == 1' /tmp/audit.json >/dev/null
          echo "AUDIT_RECORD=PASS"

      - name: Invalid Action
        shell: bash
        run: |
          set -euo pipefail
          CODE=$(curl -sS --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -d '{"scope":"PLATFORM","action":"INVALID","reason":"Test"}' \
            -o /dev/null \
            -w '%{http_code}' \
            "$BACKEND_URL/api/v1/control-plane/health/actions")
          test "$CODE" = "400" || { echo "::error::Expected 400 got $CODE"; exit 1; }
          echo "INVALID_ACTION=PASS"

      - name: Missing Reason
        shell: bash
        run: |
          set -euo pipefail
          CODE=$(curl -sS --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -d '{"scope":"PLATFORM","action":"RUN_DIAGNOSTICS"}' \
            -o /dev/null \
            -w '%{http_code}' \
            "$BACKEND_URL/api/v1/control-plane/health/actions")
          test "$CODE" = "400" || { echo "::error::Expected 400 got $CODE"; exit 1; }
          echo "MISSING_REASON=PASS"

      - name: Frontend
        shell: bash
        run: |
          set -euo pipefail
          CODE=$(curl -sS --max-time 30 -o /dev/null -w '%{http_code}' "$WEB_URL/control-plane")
          test "$CODE" = "200" || { echo "::error::Expected 200 got $CODE"; exit 1; }
          echo "FRONTEND=PASS"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Executive Health Production Verification"
            echo ""
            echo "- Admin Login: PASS"
            echo "- Health API contract and completeness: PASS"
            echo "- RBAC Unauthenticated: PASS"
            echo "- RBAC Identity B read/write: PASS"
            echo "- RUN_DIAGNOSTICS contract: PASS"
            echo "- Audit record: PASS"
            echo "- Invalid Action: PASS"
            echo "- Missing Reason: PASS"
            echo "- Frontend: PASS"
            echo ""
            echo "**ALL GATES: PASS**"
          } | tee -a "$GITHUB_STEP_SUMMARY"
