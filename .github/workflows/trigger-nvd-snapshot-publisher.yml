name: Trigger NVD Snapshot Publisher

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/trigger-nvd-snapshot-publisher.yml'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch publisher on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run nvd-snapshot-publisher.yml --repo "$GITHUB_REPOSITORY" --ref main
