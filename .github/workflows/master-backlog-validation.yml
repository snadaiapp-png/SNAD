name: Master Backlog Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate and validate backlog
        run: python3 scripts/generate_master_execution_backlog.py
      - name: Verify generated package
        run: |
          test -s generated/executor-23/sanad-master-execution-backlog.csv
          test -s generated/executor-23/sanad-master-execution-backlog.json
          test -s generated/executor-23/sanad-mvp-backlog.csv
          test -s generated/executor-23/sanad-backlog-summary.json
          test -s generated/executor-23/sanad-sprint-plan.csv
          test -s generated/executor-23/sanad-resource-matrix.csv
      - name: Upload backlog package
        uses: actions/upload-artifact@v4
        with:
          name: sanad-executor-23-master-execution-backlog
          path: generated/executor-23/
          retention-days: 30
