# ============================================================
# SANAD Platform — Force Clean Deploy to Render
# ------------------------------------------------------------
# Triggers a deploy with clearCache: true to force Docker
# to rebuild from scratch, ensuring the latest main commit
# (with Java V15 migration) is used.
# ============================================================

name: Force Clean Render Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        default: ''
        type: string

permissions:
  contents: read

jobs:
  force-deploy:
    name: Force clean deploy to Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    if: github.event.inputs.confirm == 'deploy'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Validate prerequisites
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID; do
            test -n "${!name:-}" || { echo "::error::$name is required"; exit 1; }
          done
          echo "Prerequisites validated."

      - name: Trigger deploy with cache clear
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggering deploy with clearCache: true..."
          
          DEPLOY_RESPONSE=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{"clearCache": "clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          
          DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.id // empty')
          COMMIT_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.commit // empty')
          
          test -n "$DEPLOY_ID" || {
            echo "::error::Failed to trigger deploy"
            echo "Response: $DEPLOY_RESPONSE"
            exit 1
          }
          
          echo "Deploy triggered successfully!"
          echo "Deploy ID: $DEPLOY_ID"
          echo "Commit: ${COMMIT_ID:-unknown}"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for deploy to complete
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for deploy $DEPLOY_ID to complete..."
          
          for i in $(seq 1 40); do
            sleep 30
            STATUS=$(curl --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status // empty')
            
            echo "[$i] Deploy status: $STATUS"
            
            case "$STATUS" in
              live)
                echo "::notice::Deploy is live!"
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Deploy failed with status: $STATUS"
                exit 1
                ;;
            esac
          done
          
          echo "::warning::Deploy did not complete in 20 minutes. Check Render dashboard."
          exit 1

      - name: Verify backend health and startup provenance
        shell: bash
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
        run: |
          set -euo pipefail
          echo "Waiting 30s for backend to start..."
          sleep 30
          
          echo "Checking backend health at $BACKEND_URL..."
          for i in $(seq 1 15); do
            sleep 15
            HTTP_CODE=$(curl --silent --output /tmp/health.json --write-out '%{http_code}' \
              --max-time 30 "${BACKEND_URL}/actuator/health" || true)
            
            echo "[$i] HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/health.json)
              echo "Health status: $STATUS"
              if [ "$STATUS" = "UP" ]; then
                echo "::notice::Backend is UP and healthy!"
                exit 0
              fi
            fi
          done
          
          echo "::error::Backend did not become healthy after deploy"
          exit 1
