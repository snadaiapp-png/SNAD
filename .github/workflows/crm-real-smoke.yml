name: CRM Real API Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Render backend URL override (optional; production Render URL is the default)'
        required: false
        default: ''
      expected_sha:
        description: 'Deployed application commit SHA'
        required: true

permissions:
  contents: read

jobs:
  real-smoke:
    name: Authenticated two-tenant CRM API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CRM_BASE_URL: ${{ inputs.base_url || vars.PRODUCTION_BACKEND_BASE_URL || 'https://sanad-backend-mcrj.onrender.com' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate backend target and secrets
        shell: bash
        env:
          CRM_BEARER_TOKEN: ${{ secrets.CRM_SMOKE_BEARER_TOKEN }}
          CRM_SECOND_TENANT_BEARER_TOKEN: ${{ secrets.CRM_SMOKE_SECOND_TENANT_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          test "${CRM_BASE_URL%/}" = 'https://sanad-backend-mcrj.onrender.com' || {
            echo '::error::CRM smoke is restricted to the production Render backend.'
            exit 1
          }
          test -n "${CRM_BEARER_TOKEN:-}"
          test -n "${CRM_SECOND_TENANT_BEARER_TOKEN:-}"
          test "$CRM_BEARER_TOKEN" != "$CRM_SECOND_TENANT_BEARER_TOKEN"

      - name: Verify backend health
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ inputs.expected_sha }}"
          curl --fail --silent --show-error --location --max-time 30 \
            "${CRM_BASE_URL%/}/actuator/health" >/dev/null

      - name: Run real CRM smoke
        shell: bash
        run: bash scripts/crm/real-crm-smoke.sh | tee crm-smoke.log
        env:
          CRM_BEARER_TOKEN: ${{ secrets.CRM_SMOKE_BEARER_TOKEN }}
          CRM_SECOND_TENANT_BEARER_TOKEN: ${{ secrets.CRM_SMOKE_SECOND_TENANT_BEARER_TOKEN }}
          CRM_TESTED_SHA: ${{ inputs.expected_sha }}
          CRM_SMOKE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          CRM_SMOKE_EVIDENCE_FILE: crm-smoke-evidence.json

      - name: Validate evidence schema and tested SHA
        shell: bash
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          with open('crm-smoke-evidence.json', encoding='utf-8') as handle:
              evidence = json.load(handle)
          assert evidence['schema'] == 'snad.crm.smoke.v1'
          assert evidence['result'] == 'PASS'
          assert evidence['tested_sha'] == os.environ['EXPECTED_SHA']
          assert all(value == 'PASS' for value in evidence['checks'].values())
          print(json.dumps(evidence, indent=2, sort_keys=True))
          PY

      - name: Upload CRM smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-real-smoke-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            crm-smoke-evidence.json
            crm-smoke.log
          if-no-files-found: error
          retention-days: 30
