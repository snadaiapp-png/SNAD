name: Render Flyway Runtime Remediation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/render-flyway-runtime-remediation.yml'
      - 'apps/sanad-platform/CRM_CONTACT_FIX_ROLLOUT.md'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: render-flyway-runtime-remediation
  cancel-in-progress: false

jobs:
  remediate:
    name: Enforce Flyway runtime, redeploy exact image, and verify migration
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PROD_JDBC_URL: ${{ secrets.PROD_JDBC_URL }}
      PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
      RENDER_BASE_URL: https://sanad-backend-mcrj.onrender.com
      IMAGE_REF: ghcr.io/${{ github.repository_owner }}/snad-backend:${{ github.sha }}

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Enforce direct Render Flyway configuration
        shell: bash
        run: |
          set -euo pipefail
          for value in "$RENDER_API_KEY" "$RENDER_SERVICE_ID" "$PROD_JDBC_URL" "$PROD_DB_USER" "$PROD_DB_PASSWORD"; do
            test -n "$value" || { echo "::error::A required Production secret is missing"; exit 1; }
            echo "::add-mask::$value"
          done
          [[ "$RENDER_SERVICE_ID" == srv-* ]]
          [[ "$PROD_JDBC_URL" == jdbc:postgresql://* ]]

          set_render_var() {
            local key="$1" value="$2"
            jq -n --arg value "$value" '{value:$value}' > "$RUNNER_TEMP/render-env-${key}.json"
            curl --fail-with-body --silent --show-error --max-time 45 \
              -X PUT \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H 'Accept: application/json' \
              -H 'Content-Type: application/json' \
              --data @"$RUNNER_TEMP/render-env-${key}.json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars/${key}" \
              > "$RUNNER_TEMP/render-env-${key}-updated.json"

            curl --fail-with-body --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H 'Accept: application/json' \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars/${key}" \
              > "$RUNNER_TEMP/render-env-${key}-verified.json"
            test "$(jq -r '(.envVar // .).value // empty' "$RUNNER_TEMP/render-env-${key}-verified.json")" = "$value"
          }

          set_render_var SPRING_PROFILES_ACTIVE prod
          set_render_var FLYWAY_ENABLED true
          set_render_var FLYWAY_LOCATIONS 'classpath:db/migration,classpath:db/vendor/{vendor}'

      - name: Wait for exact immutable image publication
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PUBLISHED=false
          for attempt in $(seq 1 120); do
            curl --fail-with-body --silent --show-error --max-time 30 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/publish-render-image.yml/runs?head_sha=${GITHUB_SHA}&event=push&per_page=20" \
              > "$RUNNER_TEMP/publish-runs.json"
            if jq -e --arg sha "$GITHUB_SHA" '.workflow_runs[] | select(.head_sha == $sha and .status == "completed" and .conclusion == "success")' "$RUNNER_TEMP/publish-runs.json" >/dev/null; then
              PUBLISHED=true
              break
            fi
            if jq -e --arg sha "$GITHUB_SHA" '.workflow_runs[] | select(.head_sha == $sha and .status == "completed" and (.conclusion != "success"))' "$RUNNER_TEMP/publish-runs.json" >/dev/null; then
              echo "::error::Exact-SHA backend image publication failed"
              exit 1
            fi
            sleep 10
          done
          test "$PUBLISHED" = "true" || { echo "::error::Exact-SHA image was not published"; exit 1; }

      - name: Redeploy exact image after configuration enforcement
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg image "$IMAGE_REF" '{imageUrl:$image}' > "$RUNNER_TEMP/render-deploy-request.json"
          curl --fail-with-body --silent --show-error --max-time 60 \
            -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            --data @"$RUNNER_TEMP/render-deploy-request.json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            > "$RUNNER_TEMP/render-deploy-created.json"
          DEPLOY_ID="$(jq -r '(.deploy // .).id // empty' "$RUNNER_TEMP/render-deploy-created.json")"
          test -n "$DEPLOY_ID"
          echo "deployment_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

          STATUS=""
          for attempt in $(seq 1 180); do
            curl --fail-with-body --silent --show-error --max-time 30 \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H 'Accept: application/json' \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              > "$RUNNER_TEMP/render-deploy-state.json"
            STATUS="$(jq -r '(.deploy // .).status // empty' "$RUNNER_TEMP/render-deploy-state.json")"
            case "$STATUS" in
              live) break ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Render deployment failed: ${STATUS}"
                exit 1
                ;;
            esac
            sleep 10
          done
          test "$STATUS" = "live" || { echo "::error::Render deployment did not become live"; exit 1; }
          test "$(jq -r '(.deploy // .).image.ref // .imageRef // empty' "$RUNNER_TEMP/render-deploy-state.json")" = "$IMAGE_REF"

      - name: Verify health and Flyway reconciliation read-only
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          for path in /actuator/health /actuator/health/liveness /actuator/health/readiness; do
            CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/health.json" -w '%{http_code}' "${RENDER_BASE_URL}${path}")"
            test "$CODE" = "200"
            jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null
          done

          PSQL_URL="${PROD_JDBC_URL#jdbc:}"
          export PGPASSWORD="$PROD_DB_PASSWORD"
          export PGOPTIONS='-c default_transaction_read_only=on'

          MIGRATION_COUNT="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT count(*) FROM flyway_schema_history WHERE version='20260721.1' AND type='SQL' AND success=true")"
          FAILED_COUNT="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT count(*) FROM flyway_schema_history WHERE success=false")"
          CONTACT_COLUMNS="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT count(*) FROM information_schema.columns WHERE table_schema='public' AND table_name='crm_contacts' AND column_name IN ('legal_name','preferred_name','middle_name','pronouns','source')")"
          RELATIONSHIP_TABLES="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('crm_contact_relationship_roles','crm_contact_account_relationships','crm_contact_relationship_history','crm_contact_ownership_history')")"

          test "$MIGRATION_COUNT" = "1" || { echo "::error::Flyway 20260721.1 is not recorded as SQL / true"; exit 1; }
          test "$FAILED_COUNT" = "0" || { echo "::error::Failed Flyway history rows exist"; exit 1; }
          test "$CONTACT_COLUMNS" = "5" || { echo "::error::Contact reconciliation columns are incomplete"; exit 1; }
          test "$RELATIONSHIP_TABLES" = "4" || { echo "::error::Contact relationship tables are incomplete"; exit 1; }

          EVIDENCE_DIR="$RUNNER_TEMP/render-flyway-runtime-remediation"
          mkdir -p "$EVIDENCE_DIR"
          jq -n \
            --arg source_sha "$GITHUB_SHA" \
            --arg image_ref "$IMAGE_REF" \
            --arg deployment_id "${{ steps.deploy.outputs.deployment_id }}" \
            --arg migration_count "$MIGRATION_COUNT" \
            --arg failed_count "$FAILED_COUNT" \
            --arg columns "$CONTACT_COLUMNS" \
            --arg tables "$RELATIONSHIP_TABLES" \
            '{result:"PASS",source_sha:$source_sha,image_ref:$image_ref,render_deployment_id:$deployment_id,flyway_20260721_1:{type:"SQL",success:true,row_count:($migration_count|tonumber)},failed_flyway_rows:($failed_count|tonumber),contact_columns:($columns|tonumber),relationship_tables:($tables|tonumber),database_mode:"READ_ONLY",manual_sql:"NONE",flyway_repair:"NONE"}' \
            > "$EVIDENCE_DIR/execution-summary.json"
          sha256sum "$EVIDENCE_DIR/execution-summary.json" > "$EVIDENCE_DIR/SHA256SUMS.txt"

      - name: Upload immutable remediation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-flyway-runtime-remediation-${{ github.run_id }}
          path: ${{ runner.temp }}/render-flyway-runtime-remediation
          if-no-files-found: error
          retention-days: 90

      - name: Dispatch CRM-G1 final production closure
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg ref main '{ref:$ref}' > "$RUNNER_TEMP/g1-dispatch.json"
          CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/g1-dispatch-response.txt" -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -H 'Content-Type: application/json' \
            --data @"$RUNNER_TEMP/g1-dispatch.json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/crm-g1-production-closure.yml/dispatches")"
          test "$CODE" = "204"

      - name: Record remediation success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY="Render Flyway runtime remediation PASS. Exact SHA: ${GITHUB_SHA}. Exact image redeployed after enforcing SPRING_PROFILES_ACTIVE=prod, FLYWAY_ENABLED=true and vendor-aware FLYWAY_LOCATIONS. Flyway 20260721.1 = SQL / true; Contact reconciliation schema = 5 columns / 4 tables; database verification was read-only. CRM-G1 final closure was dispatched. Evidence: ${RUN_URL}."
          gh issue comment 563 --repo "$GITHUB_REPOSITORY" --body "$BODY"
          gh issue comment 571 --repo "$GITHUB_REPOSITORY" --body "$BODY"

      - name: Record remediation failure
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY="Render Flyway runtime remediation FAILED closed. No Flyway repair, schema-history edit, or manual Production SQL was performed. Evidence: ${RUN_URL}. CRM-G1 and CRM-007 remain open."
          gh issue comment 563 --repo "$GITHUB_REPOSITORY" --body "$BODY"
          gh issue comment 571 --repo "$GITHUB_REPOSITORY" --body "$BODY"
