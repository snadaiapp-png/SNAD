name: Web CI

# ============================================================
# SANAD Platform - Frontend Continuous Integration Pipeline
# ------------------------------------------------------------
# Runs on push to main, pull requests targeting main, and
# manual workflow_dispatch.
#
# Frontend project: apps/web (Next.js 16, npm)
# ============================================================

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Next.js Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: SDS Compliance Check
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running SNAD Design System compliance check..."
          python3 scripts/ci/check-design-system-compliance.py

      - name: Logo Governance Check
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running SNAD Logo Governance check..."
          python3 scripts/ci/check-logo-governance.py

      - name: Brand Name Governance Check
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running SNAD Brand Name Governance check..."
          python3 scripts/ci/check-brand-name-governance.py

      - name: Lint
        run: npm run lint

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee "$RUNNER_TEMP/vitest.log"

      - name: Upload Vitest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanad-web-vitest-${{ github.run_id }}
          path: ${{ runner.temp }}/vitest.log
          if-no-files-found: error
          retention-days: 14

      - name: Build Next.js application
        run: npm run build

      - name: Performance Budget Check
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running SNAD Performance Budget check..."
          python3 scripts/ci/check-performance-budget.py

      - name: Upload Next.js build output
        uses: actions/upload-artifact@v4
        with:
          name: sanad-web-next-build
          path: apps/web/.next/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
