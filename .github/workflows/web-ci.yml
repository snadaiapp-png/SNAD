name: Web CI

# ============================================================
# SANAD Platform - Frontend Continuous Integration Pipeline
# ------------------------------------------------------------
# Runs on push to main, pull requests targeting main, and
# manual workflow_dispatch.
#
# Frontend project: apps/web (Next.js 16, npm)
# ============================================================

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Next.js Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Next.js application
        run: npm run build

      - name: Upload Next.js build output
        uses: actions/upload-artifact@v4
        with:
          name: sanad-web-next-build
          path: apps/web/.next/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
