name: Web CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Next.js Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        id: tests
        continue-on-error: true
        run: npm test > test-output.log 2>&1

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-diagnostics
          path: apps/web/test-output.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: |
          tail -n 120 test-output.log
          exit 1

      - name: Build Next.js application
        run: npm run build

      - name: Upload Next.js build output
        uses: actions/upload-artifact@v4
        with:
          name: sanad-web-next-build
          path: apps/web/.next/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
