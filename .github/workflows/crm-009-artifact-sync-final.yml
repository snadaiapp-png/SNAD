name: CRM-009 Final Artifact Commit

on:
  push:
    branches:
      - feature/crm-009-workflow-ai-implementation-20260723
    paths:
      - '.github/workflows/crm-009-artifact-sync-final.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm-009-final-artifact-commit
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890
  BASE_SHA: 74c6618a60ecd983086553cf75f71b5a6c8d2c9a
  EXPECTED_CRM_PATHS: '107'
  EXPECTED_CRM_OPERATIONS: '140'

jobs:
  commit-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/crm-009-workflow-ai-implementation-20260723
          fetch-depth: 0
          persist-credentials: true

      - name: Restore branch scope and remove superseded temporary workflows
        run: |
          set -euo pipefail
          git checkout "$BASE_SHA" -- upload/pasted_image_*.png
          rm -f .github/workflows/crm-009-contract-sync.yml
          rm -f .github/workflows/crm-009-finalize-artifacts.yml
          rm -f .github/workflows/crm-009-finalize-v2.yml
          rm -f .github/workflows/crm-009-artifact-final-sync.yml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile backend and tests
        working-directory: apps/sanad-platform
        run: mvn -B -ntp -DskipTests compile test-compile

      - name: Start backend
        working-directory: apps/sanad-platform
        run: |
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081" \
            >/tmp/crm-009-final-artifact-backend.log 2>&1 &
          echo $! >/tmp/crm-009-final-artifact-backend.pid

      - name: Generate runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-009-final-artifact-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-009-final-artifact-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then break; fi
            sleep 2
          done
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output docs/crm/contracts/openapi/crm-openapi.json \
            --prefix /api/v2/crm \
            --expected-paths "$EXPECTED_CRM_PATHS" \
            --expected-operations "$EXPECTED_CRM_OPERATIONS"

      - name: Focused backend gates
        working-directory: apps/sanad-platform
        run: mvn -B -ntp -Dtest='CrmOpenApiContractTest,PlatformApiCountTest,ServiceJwtProviderTest,ProductionCommandAdapterContextTest,ProductionCommandAdapterGuardTest' test

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Generate TypeScript and lint frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts
          npm run lint

      - name: Commit exact artifacts
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(crm-009): commit final runtime contracts and restore branch scope'
          git push origin HEAD:feature/crm-009-workflow-ai-implementation-20260723

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-009-final-artifact-backend.pid ]; then
            kill "$(cat /tmp/crm-009-final-artifact-backend.pid)" 2>/dev/null || true
          fi
