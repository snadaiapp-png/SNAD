name: Setup Identity B
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  setup:
    name: Setup Identity B
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      BACKEND_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      IDENTITY_B_EMAIL: identity-b@sanad-pilot.com
    steps:
      - name: Disable notifications
        shell: bash
        run: |
          set -euo pipefail
          CURRENT=$(curl -s --header "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          UPDATED=$(echo "$CURRENT" | jq '[.[]? | (.envVar // .) | if .key == "SECURITY_NOTIFICATION_PROVIDER" then .value = "disabled" else . end]')
          curl -s --write-out '%{http_code}' --request PUT --header "Authorization: Bearer $RENDER_API_KEY" --header "Content-Type: application/json" --data "$UPDATED" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" -o /dev/null | tail -c 4 | grep -q "200" || exit 1
      - name: Deploy and wait
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_ID=$(curl -s --request POST --header "Authorization: Bearer $RENDER_API_KEY" --header "Content-Type: application/json" --data '{}' "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" | jq -r '.id')
          for i in $(seq 1 80); do
            sleep 15
            STATUS=$(curl -s --header "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status')
            [ "$STATUS" = "live" ] && exit 0
            [ "$STATUS" = "update_failed" ] && exit 1
          done
          exit 1
      - name: Register Identity B
        shell: bash
        run: |
          set -euo pipefail
          sleep 15
          RESPONSE=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -d "{\"displayName\":\"Pilot User\",\"email\":\"$IDENTITY_B_EMAIL\",\"organizationName\":\"Pilot Org\",\"regionCode\":\"SA\",\"countryCode\":\"+966\",\"mobileNumber\":\"5000000000\",\"acceptTerms\":true}" "$BACKEND_URL/api/v1/auth/register" -w '\n%{http_code}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "409" ] || exit 1
          echo "Identity B registered: $IDENTITY_B_EMAIL"
      - name: Restore notifications
        shell: bash
        run: |
          set -euo pipefail
          CURRENT=$(curl -s --header "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          UPDATED=$(echo "$CURRENT" | jq '[.[]? | (.envVar // .) | if .key == "SECURITY_NOTIFICATION_PROVIDER" then .value = "resend" else . end]')
          curl -s --write-out '%{http_code}' --request PUT --header "Authorization: Bearer $RENDER_API_KEY" --header "Content-Type: application/json" --data "$UPDATED" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" -o /dev/null | tail -c 4 | grep -q "200" || exit 1
      - name: Deploy restore
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_ID=$(curl -s --request POST --header "Authorization: Bearer $RENDER_API_KEY" --header "Content-Type: application/json" --data '{}' "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" | jq -r '.id')
          for i in $(seq 1 80); do
            sleep 15
            STATUS=$(curl -s --header "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status')
            [ "$STATUS" = "live" ] && exit 0
            [ "$STATUS" = "update_failed" ] && exit 1
          done
          exit 1
      - name: Set password via admin reset
        shell: bash
        run: |
          set -euo pipefail
          ADMIN_PASS="${{ secrets.SANAD_ADMIN_PASSWORD }}"
          LOGIN=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -d "{\"email\":\"${{ secrets.SANAD_ADMIN_EMAIL }}\",\"password\":\"$ADMIN_PASS\"}" "$BACKEND_URL/api/v1/auth/login")
          ADMIN_TOKEN=$(echo "$LOGIN" | jq -r '.accessToken // empty')
          test -n "$ADMIN_TOKEN" || exit 1
          CP_TENANT="${{ secrets.BOOTSTRAP_TENANT_ID }}"
          TENANTS=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" "$BACKEND_URL/api/v1/control-plane/tenants")
          OTHER_TENANT=$(echo "$TENANTS" | jq -r --arg cp "$CP_TENANT" '[.[] | select(.id != $cp)] | .[0].id // empty')
          test -n "$OTHER_TENANT" || exit 1
          ORGS=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" "$BACKEND_URL/api/v1/control-plane/tenants/$OTHER_TENANT/organizations")
          ORG_ID=$(echo "$ORGS" | jq -r '.[0].id')
          MEMBERS=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" "$BACKEND_URL/api/v1/control-plane/tenants/$OTHER_TENANT/organizations/$ORG_ID/memberships")
          USER_ID=$(echo "$MEMBERS" | jq -r --arg email "$IDENTITY_B_EMAIL" '[.[] | select(.email == $email)] | .[0].userId // empty')
          test -n "$USER_ID" || exit 1
          curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $ADMIN_TOKEN" -d '{"locale":"ar"}' "$BACKEND_URL/api/v1/auth/admin-reset-password/$USER_ID" -o /dev/null -w "Admin reset: %{http_code}\n"
          echo "Identity B Email: $IDENTITY_B_EMAIL"
          echo "Identity B Tenant: $OTHER_TENANT"
          echo "Identity B User ID: $USER_ID"
