name: Set Identity B Password
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  set-password:
    name: Set Identity B password via DB
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
    steps:
      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null
          pip3 install bcrypt -q
      - name: Fetch DB credentials
        shell: bash
        run: |
          set -euo pipefail
          RENDER_ENV=$(curl -s --header "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          DATABASE_URL=$(echo "$RENDER_ENV" | jq -r '[.[]? | (.envVar // .)] | .[] | select(.key == "DATABASE_URL") | .value')
          DATABASE_PASSWORD=$(echo "$RENDER_ENV" | jq -r '[.[]? | (.envVar // .)] | .[] | select(.key == "DATABASE_PASSWORD") | .value')
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$DATABASE_PASSWORD"
          RAW="${DATABASE_URL#jdbc:}"; RAW="${RAW#postgresql://}"; RAW="${RAW#https://}"
          HOST_PORT="${RAW%%/*}"; DB_PART="${RAW#*/}"; DB_NAME="${DB_PART%%\?*}"
          PGHOST="${HOST_PORT%%:*}"; PGPORT="${HOST_PORT#*:}"; PGPORT="${PGPORT:-5432}"
          echo "PGHOST=$PGHOST" >> $GITHUB_ENV
          echo "PGPORT=$PGPORT" >> $GITHUB_ENV
          echo "PGDATABASE=$DB_NAME" >> $GITHUB_ENV
          echo "PGPASSWORD=$DATABASE_PASSWORD" >> $GITHUB_ENV
      - name: Set password
        shell: bash
        run: |
          set -euo pipefail
          IDENTITY_B_EMAIL="identity-b@sanad-pilot.com"
          IDENTITY_B_PASS="PilotB2026!Secure"
          
          # Generate bcrypt hash
          BCRYPT_HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'$IDENTITY_B_PASS', bcrypt.gensalt()).decode())")
          echo "::add-mask::$BCRYPT_HASH"
          
          # Set password
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="UPDATE users SET password_hash = '$BCRYPT_HASH', password_set_at = NOW(), password_set_by = 'admin-setup', must_change_password = false WHERE email = '$IDENTITY_B_EMAIL';"
          
          # Verify
          RESULT=$(psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --tuples-only --no-align --command="SELECT email, status, tenant_id FROM users WHERE email = '$IDENTITY_B_EMAIL';")
          echo "Identity B: $RESULT"
          
          echo "============================================"
          echo "IDENTITY B PASSWORD SET"
          echo "Email: $IDENTITY_B_EMAIL"
          echo "Password: (set via DB)")
          echo "============================================"
      - name: Verify login
        shell: bash
        run: |
          set -euo pipefail
          sleep 5
          RESPONSE=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -d '{"email":"identity-b@sanad-pilot.com","password":"PilotB2026!Secure"}' "https://sanad-backend-mcrj.onrender.com/api/v1/auth/login" -w '\n%{http_code}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Login: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "âś“ Identity B login SUCCESSFUL"
            echo "$BODY" | jq '{email: .user.email, tenantId: .user.tenantId, status: .user.status}' 2>/dev/null || echo "$BODY"
          else
            echo "::error::Identity B login failed"
            echo "$BODY"
            exit 1
          fi
