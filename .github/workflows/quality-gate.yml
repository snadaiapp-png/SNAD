  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - repository-policy
      - migration-immutability
      - backend-tests
      - backend-postgres-integration
      - flyway-validation
      - frontend
      - python-tests
      - secret-scan
      - dependency-scan
      - container-smoke
      - security-regression
      - api-contract
      - tenant-isolation
      - audit-idempotency
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check repository-policy
        if: needs.repository-policy.result != 'success'
        run: exit 1
      - name: Check migration-immutability
        if: needs.migration-immutability.result != 'success'
        run: exit 1
      - name: Check backend-tests
        if: needs.backend-tests.result != 'success'
        run: exit 1
      - name: Check backend-postgres-integration
        if: needs.backend-postgres-integration.result != 'success'
        run: exit 1
      - name: Check flyway-validation
        if: needs.flyway-validation.result != 'success'
        run: exit 1
      - name: Check frontend
        if: needs.frontend.result != 'success'
        run: exit 1
      - name: Check python-tests
        if: needs.python-tests.result != 'success'
        run: exit 1
      - name: Check secret-scan
        if: needs.secret-scan.result != 'success'
        run: exit 1
      - name: Check dependency-scan
        if: needs.dependency-scan.result != 'success'
        run: exit 1
      - name: Check container-smoke
        if: needs.container-smoke.result != 'success'
        run: exit 1
      - name: Check security-regression
        if: needs.security-regression.result != 'success'
        run: exit 1
      - name: Check api-contract
        if: needs.api-contract.result != 'success'
        run: exit 1
      - name: Check tenant-isolation
        if: needs.tenant-isolation.result != 'success'
        run: exit 1
      - name: Check audit-idempotency
        if: needs.audit-idempotency.result != 'success'
        run: exit 1
      - name: Reconcile closure-debt register (Stage 04A.3.6.2 final gate)
        run: python3 scripts/ci/check_closure_debt_register.py docs/infrastructure-hardening/closure-debt-register.json
      - name: All checks passed
        run: 'echo "QUALITY GATE: PASS — 14 mandatory jobs + 1 aggregation job"'
