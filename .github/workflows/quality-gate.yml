  api-contract:
    name: api-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanad_api_contract
          POSTGRES_USER: sanad
          POSTGRES_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ${{ format('jwt-secret-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: 1. Backend contract tests + runtime OpenAPI generation
        working-directory: apps/sanad-platform
        run: |
          # OpenApiContractExportTest runs the app and writes
          # build/api-contract/openapi-current.json (Method B: SpringBootTest)
          ./mvnw -B -ntp test \
            -Dtest="OpenApiContractExportTest,ErrorModelIntegrationTest,GlobalExceptionHandlerActuatorExclusionTest,TenantAwarePaginationIntegrationTest"
      - name: 2. Validate generated OpenAPI is non-trivial
        run: |
          CURRENT="apps/sanad-platform/build/api-contract/openapi-current.json"
          if [ ! -f "$CURRENT" ]; then
            echo "FAIL: runtime OpenAPI not generated at $CURRENT"
            exit 1
          fi
          SIZE=$(wc -c <"$CURRENT")
          if [ "$SIZE" -lt 5000 ]; then
            echo "FAIL: runtime OpenAPI is suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "Runtime OpenAPI: $CURRENT ($SIZE bytes)"
      - name: 3. Run oasdiff compatibility check (breaking-change detection + fixtures)
        run: bash scripts/ci/check-api-contract-compatibility.sh
      - name: 4. Upload current OpenAPI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-current
          path: apps/sanad-platform/build/api-contract/openapi-current.json
          retention-days: 14
      - name: 5. Upload diff report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-diff-report
          path: apps/sanad-platform/build/api-contract/diff-report.txt
          retention-days: 14
      - name: 6. API inventory parity check
        run: |
          # Verify the committed API inventory (JSON) matches the runtime OpenAPI path count.
          python3 -c "
          import json, yaml, pathlib, sys
          current = json.loads(pathlib.Path('apps/sanad-platform/build/api-contract/openapi-current.json').read_text())
          inventory = json.loads(pathlib.Path('docs/api-contracts/03-api-inventory.json').read_text())
          runtime_paths = set(current.get('paths', {}).keys())
          inventory_endpoints = set()
          for ep in inventory.get('endpoints', []):
            p = ep.get('path', '')
            if p:
              inventory_endpoints.add(p)
          missing = inventory_endpoints - runtime_paths
          extra = runtime_paths - inventory_endpoints
          # Allow extra runtime paths (new endpoints added) but flag missing ones.
          if missing:
            print(f'FAIL: inventory endpoints missing from runtime: {sorted(missing)}')
            sys.exit(1)
          print(f'API inventory parity: PASS (inventory={len(inventory_endpoints)}, runtime={len(runtime_paths)})')
          "

  tenant-isolation:
    name: tenant-isolation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanad_tenant_isolation
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ${{ format('jwt-secret-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
      DATABASE_URL: jdbc:postgresql://localhost:5432/sanad_tenant_isolation
      DATABASE_DRIVER: org.postgresql.Driver
      SANAD_CORS_ALLOWED_ORIGINS: https://snad-app.vercel.app
      PGPASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Provision migration, runtime, and fixture DB roles (Stage 04A.3.2)
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1 || true
          psql -h localhost -U postgres -d sanad_tenant_isolation -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'sanad_migration_owner') THEN
                CREATE ROLE sanad_migration_owner WITH LOGIN PASSWORD '${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}' CREATEDB;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'sanad_runtime_app') THEN
                CREATE ROLE sanad_runtime_app WITH LOGIN PASSWORD '${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}'
                  NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'sanad_fixture_ci') THEN
                CREATE ROLE sanad_fixture_ci WITH LOGIN PASSWORD '${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}'
                  NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION BYPASSRLS;
              END IF;
            END
            \$\$;
          "
          psql -h localhost -U postgres -d sanad_tenant_isolation -c "
            GRANT ALL ON SCHEMA public TO sanad_migration_owner;
            GRANT USAGE ON SCHEMA public TO sanad_runtime_app;
            GRANT USAGE ON SCHEMA public TO sanad_fixture_ci;
          "
          echo "Roles provisioned:"
          psql -h localhost -U postgres -d sanad_tenant_isolation -c "SELECT rolname, rolsuper, rolbypassrls FROM pg_roles WHERE rolname IN ('sanad_migration_owner','sanad_runtime_app','sanad_fixture_ci');"
      - name: Run Flyway migrations as migration_owner
        working-directory: apps/sanad-platform
        env:
          FLYWAY_DATABASE_USERNAME: sanad_migration_owner
          FLYWAY_DATABASE_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
          DATABASE_USERNAME: sanad_migration_owner
          DATABASE_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
        run: |
          ./mvnw -B -ntp test -Dtest="FlywayValidationTest" \
            -Dspring.profiles.active=prod \
            -Ddatabase.url="${DATABASE_URL}" \
            -Ddatabase.username="${DATABASE_USERNAME}" \
            -Ddatabase.password="${DATABASE_PASSWORD}" \
            -Ddatabase.driver="${DATABASE_DRIVER}"
      - name: Grant runtime and fixture role privileges (post-migration)
        run: |
          psql -h localhost -U postgres -d sanad_tenant_isolation -c "
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO sanad_runtime_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO sanad_runtime_app;
            GRANT SELECT, INSERT, UPDATE, DELETE
            ON organizations, organization_memberships, users, roles,
               role_capabilities, user_role_assignments, refresh_tokens,
               password_reset_tokens, tenants, access_capabilities,
               audit_events, idempotency_records, audit_chain_heads,
               platform_security_audit_events
            TO sanad_fixture_ci;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO sanad_fixture_ci;
          "
      - name: Run mandatory tenant isolation tests (15 classes, PostgreSQL 16)
        working-directory: apps/sanad-platform
        env:
          DATABASE_USERNAME: sanad_runtime_app
          DATABASE_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
          RUN_TENANT_POSTGRES_TESTS: "true"
          TENANT_FIXTURE_DATABASE_USERNAME: sanad_fixture_ci
          TENANT_FIXTURE_DATABASE_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
          TENANT_FIXTURE_DATABASE_URL: ${{ env.DATABASE_URL }}
          TENANT_FIXTURE_DATABASE_DRIVER: ${{ env.DATABASE_DRIVER }}
          TENANT_MIGRATION_DATABASE_USERNAME: sanad_migration_owner
          TENANT_MIGRATION_DATABASE_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
          TENANT_MIGRATION_DATABASE_URL: ${{ env.DATABASE_URL }}
          TENANT_MIGRATION_DATABASE_DRIVER: ${{ env.DATABASE_DRIVER }}
        run: |
          ./mvnw -B -ntp test \
            -Dtest="TenantTransactionManagerWiringTest,TenantTransactionConnectionBindingIntegrationTest,TenantRuntimeRoleIntegrationTest,TenantRlsIntegrationTest,TenantConnectionPoolLeakageTest,TenantAuthenticationUnderRlsIntegrationTest,TenantCrudIsolationIntegrationTest,TenantNestedResourceIsolationTest,TenantCapabilityBindingIntegrationTest,TenantSessionBindingIntegrationTest,TenantMassAssignmentTest,TenantEnumerationProtectionTest,TenantAwarePaginationIntegrationTest,TenantMigrationOwnerForceRlsIntegrationTest,TenantFixtureRoleIntegrationTest" \
            -Dspring.profiles.active=tenant-postgres-test \
            -Ddatabase.url="${DATABASE_URL}" \
            -Ddatabase.username="${DATABASE_USERNAME}" \
            -Ddatabase.password="${DATABASE_PASSWORD}" \
            -Ddatabase.driver="${DATABASE_DRIVER}" \
            -Dtenant.fixture.database.url="${DATABASE_URL}" \
            -Dtenant.fixture.database.username="${TENANT_FIXTURE_DATABASE_USERNAME}" \
            -Dtenant.fixture.database.password="${TENANT_FIXTURE_DATABASE_PASSWORD}" \
            -Dtenant.fixture.database.driver="${DATABASE_DRIVER}" \
            -Dtenant.migration.database.url="${DATABASE_URL}" \
            -Dtenant.migration.database.username="${TENANT_MIGRATION_DATABASE_USERNAME}" \
            -Dtenant.migration.database.password="${TENANT_MIGRATION_DATABASE_PASSWORD}" \
            -Dtenant.migration.database.driver="${DATABASE_DRIVER}"
      - name: Upload tenant isolation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenant-isolation-evidence
          path: |
            apps/sanad-platform/target/surefire-reports/
          retention-days: 14
      - name: Verify runtime role is non-superuser and non-BYPASSRLS
        run: |
          RESULT=$(psql -h localhost -U postgres -d sanad_tenant_isolation -tAc "
            SELECT rolname, rolsuper, rolbypassrls, rolcreatedb, rolcreaterole, rolreplication
            FROM pg_roles WHERE rolname = 'sanad_runtime_app';
          ")
          echo "Runtime role: $RESULT"
          echo "$RESULT" | grep -q "sanad_runtime_app|f|f|f|f|f" || {
            echo "FAIL: sanad_runtime_app does not have the required flags (NOSUPERUSER, NOBYPASSRLS, etc.)"
            exit 1
          }
          echo "Runtime role verification: PASS"
      - name: Run static tenant isolation gate (Stage 04A.1 — Python)
        run: python3 scripts/ci/check_tenant_isolation.py
      - name: Verify tenant domain inventory coverage
        run: |
          python3 -c "
          import json, pathlib, sys
          inv = json.loads(pathlib.Path('docs/tenant-isolation/04-tenant-domain-inventory.json').read_text())
          exceptions = json.loads(pathlib.Path('docs/tenant-isolation/04-global-table-exceptions.json').read_text())
          tenant_owned = [e for e in inv['entities'] if e['classification'] == 'TENANT_OWNED']
          rls_tables = set(exceptions['rlsProtectedTables'])
          for e in tenant_owned:
              if e['table'] not in rls_tables:
                  print(f'FAIL: TENANT_OWNED table {e[\"table\"]} not in RLS-protected list')
                  sys.exit(1)
          print(f'Tenant isolation inventory: PASS ({len(tenant_owned)} tenant-owned tables, all RLS-protected)')
          "

