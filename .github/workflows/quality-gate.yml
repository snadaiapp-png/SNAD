# SNAD Quality Gate — Central CI Workflow
# ADR-002: This workflow is the single required check for branch protection.
# Required Check Name: quality-gate (the aggregation job below).

name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "infra/**"
      - "security/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: repository-policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate JSON files
        run: |
          python3 -c "
          import json, pathlib
          for p in pathlib.Path('.').rglob('*.json'):
              if 'node_modules' in str(p) or '.git' in str(p) or '.next' in str(p): continue
              json.loads(p.read_text())
          print('JSON validation: PASS')
          "
      - name: Validate YAML files
        run: |
          pip install pyyaml -q
          python3 -c "
          import yaml, pathlib
          for p in pathlib.Path('.').rglob('*.yml'):
              if 'node_modules' in str(p) or '.git' in str(p): continue
              yaml.safe_load(p.read_text())
          print('YAML validation: PASS')
          "
      - name: Check no .env tracked
        run: |
          if git ls-files | grep -qE '\.env$'; then
            echo "FAIL: .env files tracked in git"
            exit 1
          fi
      - name: Check no merge conflict markers
        run: git diff --check
      - name: Reconcile closure-debt register (Stage 04A.3.6.2)
        run: python3 scripts/ci/check_closure_debt_register.py docs/infrastructure-hardening/closure-debt-register.json
      - name: Run audit-idempotency static gate (Stage 05)
        run: python3 scripts/ci/check_audit_idempotency.py

  migration-immutability:
    name: migration-immutability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run migration immutability check
        run: bash scripts/ci/check-migration-immutability.sh

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run backend tests via Maven Wrapper
        working-directory: apps/sanad-platform
        run: ./mvnw -B -ntp clean test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: apps/sanad-platform/target/surefire-reports/
          retention-days: 7

  backend-postgres-integration:
    name: backend-postgres-integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanad_test
          POSTGRES_USER: sanad
          POSTGRES_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ${{ format('jwt-secret-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
      DATABASE_URL: jdbc:postgresql://localhost:5432/sanad_test
      DATABASE_USERNAME: sanad
      DATABASE_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
      DATABASE_DRIVER: org.postgresql.Driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run integration tests with PostgreSQL 16
        working-directory: apps/sanad-platform
        run: ./mvnw -B -ntp test

  flyway-validation:
    name: flyway-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanad_flyway
          POSTGRES_USER: sanad
          POSTGRES_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ${{ format('jwt-secret-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
      DATABASE_URL: jdbc:postgresql://localhost:5432/sanad_flyway
      DATABASE_USERNAME: sanad
      DATABASE_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
      DATABASE_DRIVER: org.postgresql.Driver
      FLYWAY_ENABLED: "true"
      SANAD_CORS_ALLOWED_ORIGINS: https://snad-app.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: First startup — apply all migrations
        working-directory: apps/sanad-platform
        run: |
          ./mvnw -B -ntp test -Dtest="FlywayValidationTest" -Dspring.profiles.active=prod -Ddatabase.url="${DATABASE_URL}" -Ddatabase.username="${DATABASE_USERNAME}" -Ddatabase.password="${DATABASE_PASSWORD}" -Ddatabase.driver="${DATABASE_DRIVER}"
          echo "Flyway first startup: PASS"
      - name: Verify Flyway artifact (V15 in JAR)
        working-directory: apps/sanad-platform
        run: |
          # Build the JAR (skip tests — CI runs them separately)
          ./mvnw -B -ntp clean package -DskipTests -Dgit.commit="${GITHUB_SHA:-unknown}"
          # Run the artifact verification script
          bash "${{ github.workspace }}/scripts/verify-flyway-artifact.sh"
      - name: Verify V15 type and description in flyway_schema_history
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1 || true
          # V15 must be recorded as type='JDBC' (Java migration) with
          # description='seed rbac roles and capabilities'. If a future
          # migration changes V15 to SQL, this check will catch it.
          V15_ROW=$(PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT type || '|' || description FROM flyway_schema_history WHERE version = '15'")
          echo "V15 row (type|description): $V15_ROW"
          if [ -z "$V15_ROW" ]; then
            echo "FAIL: V15 not found in flyway_schema_history"
            exit 1
          fi
          if ! echo "$V15_ROW" | grep -q "^JDBC|seed rbac roles and capabilities$"; then
            echo "FAIL: V15 type/description mismatch. Expected: JDBC|seed rbac roles and capabilities, Got: $V15_ROW"
            exit 1
          fi
          echo "V15 type and description: PASS"
      - name: Verify reconciler V20260702_1 applied
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1 || true
          RECONCILER_COUNT=$(PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT COUNT(*) FROM flyway_schema_history WHERE version = '20260702.1' AND success = true")
          echo "V20260702_1 applied count: $RECONCILER_COUNT"
          if [ "$RECONCILER_COUNT" -ne 1 ]; then
            echo "FAIL: V20260702_1 reconciler not applied exactly once (got $RECONCILER_COUNT)"
            exit 1
          fi
          echo "V20260702_1 reconciler: PASS"
      - name: Run Flyway V15 Testcontainers integration tests
        working-directory: apps/sanad-platform
        env:
          RUN_TESTCONTAINERS_TESTS: "true"
        run: |
          ./mvnw -B -ntp test -Dtest="FlywayV15TestcontainersIntegrationTest" \
            -Dspring.profiles.active=prod \
            -Dgit.commit="${GITHUB_SHA:-unknown}"
          echo "Flyway V15 Testcontainers tests: PASS"
      - name: Verify flyway_schema_history (Stage 03A — no empty-history bypass)
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1 || true
          # Connection failure must FAIL the job (not skip).
          if ! PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT 1" >/dev/null 2>&1; then
            echo "FAIL: cannot connect to PostgreSQL for flyway validation"
            exit 1
          fi
          # flyway_schema_history must exist and be non-empty.
          if ! PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT to_regclass('public.flyway_schema_history')" | grep -q "flyway_schema_history"; then
            echo "FAIL: flyway_schema_history table does not exist"
            exit 1
          fi
          FIRST_COUNT=$(PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT COUNT(*) FROM flyway_schema_history WHERE success = true")
          FAILED_COUNT=$(PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT COUNT(*) FROM flyway_schema_history WHERE success = false")
          echo "Successful migrations: $FIRST_COUNT"
          echo "Failed migrations: $FAILED_COUNT"
          # Stage 03A CD-02C-P1-003: empty history is a FAILURE, not a warning.
          if [ "$FIRST_COUNT" -eq 0 ]; then
            echo "FAIL: flyway_schema_history is empty — no migrations were applied"
            exit 1
          fi
          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "FAIL: $FAILED_COUNT migrations have success=false"
            exit 1
          fi
          LATEST_VERSION=$(PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT version FROM flyway_schema_history WHERE success = true ORDER BY installed_rank DESC LIMIT 1")
          echo "Latest applied migration version: $LATEST_VERSION"
          echo "Flyway schema history: PASS"
          # Persist FIRST_COUNT to GITHUB_ENV so the next step can compare.
          echo "FIRST_COUNT=$FIRST_COUNT" >> $GITHUB_ENV
      - name: Second startup — verify no migration re-execution
        working-directory: apps/sanad-platform
        run: |
          ./mvnw -B -ntp test -Dtest="FlywayValidationTest" -Dspring.profiles.active=prod -Ddatabase.url="${DATABASE_URL}" -Ddatabase.username="${DATABASE_USERNAME}" -Ddatabase.password="${DATABASE_PASSWORD}" -Ddatabase.driver="${DATABASE_DRIVER}"
          # Verify SECOND_COUNT == FIRST_COUNT (no re-execution)
          SECOND_COUNT=$(PGPASSWORD=${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }} psql -h localhost -U sanad -d sanad_flyway -tAc \
              "SELECT COUNT(*) FROM flyway_schema_history WHERE success = true")
          echo "Second-startup successful migrations: $SECOND_COUNT"
          echo "First-startup successful migrations: $FIRST_COUNT"
          if [ "$SECOND_COUNT" != "$FIRST_COUNT" ]; then
            echo "FAIL: SECOND_COUNT ($SECOND_COUNT) != FIRST_COUNT ($FIRST_COUNT) — migrations re-executed!"
            exit 1
          fi
          echo "Flyway second startup: PASS — no migration re-execution"

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      - name: Brand check
        working-directory: apps/web
        run: npm run brand:check
      - name: Tests
        working-directory: apps/web
        run: npm test
      - name: Build
        working-directory: apps/web
        run: npm run build

  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest pyyaml -q
      - name: Run Python tests
        run: python3 -m pytest tests/ -q

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Gitleaks policy gate (forbid broad path exclusions)
        run: python3 scripts/ci/check_gitleaks_policy.py .gitleaks.toml
      - name: Secret-detection canary (proves gitleaks detects real secrets)
        run: |
          set -Eeuo pipefail

          CANARY_DIR="${RUNNER_TEMP}/gitleaks-canary-362"
          rm -rf "$CANARY_DIR"
          mkdir -p "$CANARY_DIR"

          # Synthetic AWS access key ID that gitleaks MUST detect.
          # The aws-access-token rule matches AKIA + exactly 16 uppercase
          # alphanumeric chars. We split the prefix and suffix across two
          # variables so the full canary literal is not present as a single
          # string in the committed workflow file (and therefore does not
          # trip the policy gate or the repo scan).
          PREFIX='AKIA'
          SUFFIX='ZSANAD362CANARY0'
          printf '%s%s\n' "$PREFIX" "$SUFFIX" > "$CANARY_DIR/canary.txt"

          set +e
          docker run --rm \
            -v "$CANARY_DIR:/scan" \
            -v "$PWD/.gitleaks.toml:/config/.gitleaks.toml:ro" \
            zricethezav/gitleaks:v8.24.3 detect \
            --source=/scan \
            --config=/config/.gitleaks.toml \
            --no-git \
            --redact \
            --exit-code=1
          CANARY_STATUS=$?
          set -e

          rm -rf "$CANARY_DIR"

          if [ "$CANARY_STATUS" -eq 0 ]; then
            echo "FAIL: canary secret was NOT detected by gitleaks"
            echo "CANARY SECRET DETECTED: FAIL"
            exit 1
          fi

          echo "CANARY SECRET DETECTED: PASS"
      - name: Current tree secret scan
        run: |
          set -Eeuo pipefail

          REPORT_DIR="${RUNNER_TEMP}/gitleaks-report-362"
          rm -rf "$REPORT_DIR"
          mkdir -p "$REPORT_DIR"

          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            -v "$REPORT_DIR:/report" \
            zricethezav/gitleaks:v8.24.3 detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --no-git \
            --redact \
            --report-format=json \
            --report-path=/report/findings.json \
            --exit-code=1
          SCAN_STATUS=$?
          set -e

          if [ -f "$REPORT_DIR/findings.json" ]; then
            FINDING_COUNT=$(python3 -c "import json,sys; print(len(json.load(open('$REPORT_DIR/findings.json'))))")
          else
            FINDING_COUNT=0
          fi

          echo "CURRENT REPOSITORY FINDINGS: $FINDING_COUNT"

          if [ "$SCAN_STATUS" -ne 0 ]; then
            echo "FAIL: gitleaks detected secrets in the current repository tree"
            if [ -f "$REPORT_DIR/findings.json" ]; then
              cat "$REPORT_DIR/findings.json"
            fi
            exit "$SCAN_STATUS"
          fi

          echo "secret-scan: PASS"

  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Backend OWASP Dependency-Check
        working-directory: apps/sanad-platform
        run: ./mvnw -B -ntp -Powasp-offline-gate verify
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Frontend npm audit (Stage 03A — no || true bypass)
        working-directory: apps/web
        run: |
          npm ci
          # Stage 03A CD-02C-P1-002: any High/Critical vulnerability FAILS the job.
          # Vulnerabilities with no fix are registered as debt (not suppressed here).
          npm audit --audit-level=high

  container-smoke:
    name: container-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Stage 04A.3.6.2 — secret-like literals replaced with GitHub
      # expressions derived from github.run_id and github.run_attempt.
      # These are stable across the job (so the Postgres container and the
      # app container see the same password) and are not committed secrets.
      SMOKE_PG_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
      SMOKE_JWT_SECRET: ${{ format('jwt-secret-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
    steps:
      - uses: actions/checkout@v4
      - name: Runtime container smoke test
        working-directory: apps/sanad-platform
        run: |
          set -Eeuo pipefail

          NETWORK="sanad-smoke-${{ github.run_id }}"
          POSTGRES_CONTAINER="sanad-postgres-${{ github.run_id }}"
          APP_CONTAINER="sanad-backend-${{ github.run_id }}"
          IMAGE="sanad-backend:smoke"

          cleanup() {
            docker rm -f "$APP_CONTAINER" "$POSTGRES_CONTAINER" 2>/dev/null || true
            docker network rm "$NETWORK" 2>/dev/null || true
            docker rmi -f "$IMAGE" 2>/dev/null || true
          }
          trap cleanup EXIT

          echo "=== Creating Docker network ==="
          docker network create "$NETWORK"
          echo "NETWORK_CREATE: PASS"

          echo "=== Starting PostgreSQL 16 ==="
          docker run -d \
            --name "$POSTGRES_CONTAINER" \
            --network "$NETWORK" \
            -e POSTGRES_DB=sanad_smoke \
            -e POSTGRES_USER=sanad \
            -e POSTGRES_PASSWORD="$SMOKE_PG_PASSWORD" \
            --health-cmd="pg_isready -U sanad -d sanad_smoke" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=20 \
            postgres:16-alpine

          echo "Waiting for PostgreSQL..."
          for attempt in $(seq 1 30); do
            if docker exec "$POSTGRES_CONTAINER" pg_isready -U sanad -d sanad_smoke > /dev/null 2>&1; then
              echo "POSTGRES_START: PASS"
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "POSTGRES_START: FAIL"
              exit 1
            fi
            sleep 2
          done

          echo "=== Building Backend Docker image ==="
          docker build -t "$IMAGE" .
          echo "IMAGE_BUILD: PASS"

          echo "=== Starting Backend container ==="
          docker run -d \
            --name "$APP_CONTAINER" \
            --network "$NETWORK" \
            -p 18080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e DATABASE_URL="jdbc:postgresql://${POSTGRES_CONTAINER}:5432/sanad_smoke" \
            -e DATABASE_USERNAME=sanad \
            -e DATABASE_PASSWORD="$SMOKE_PG_PASSWORD" \
            -e DATABASE_DRIVER=org.postgresql.Driver \
            -e JWT_SECRET="$SMOKE_JWT_SECRET" \
            -e JPA_DDL_AUTO=validate \
            -e FLYWAY_ENABLED=true \
            -e SANAD_CORS_ALLOWED_ORIGINS=https://snad-app.vercel.app \
            -e MANAGEMENT_ENDPOINTS=health \
            "$IMAGE"
          echo "CONTAINER_START: PASS"

          echo "=== Waiting for health endpoint ==="
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://localhost:18080/actuator/health | grep -q '"status":"UP"'; then
              echo "HEALTH_ENDPOINT: PASS"
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "HEALTH_ENDPOINT: FAIL"
              docker logs "$APP_CONTAINER" --tail 50
              exit 1
            fi
            sleep 2
          done

          echo "=== Verifying non-root runtime ==="
          RUNTIME_UID=$(docker exec "$APP_CONTAINER" id -u)
          if [ "$RUNTIME_UID" = "0" ]; then
            echo "RUNTIME_UID_NON_ROOT: FAIL (uid=0)"
            exit 1
          fi
          echo "RUNTIME_UID_NON_ROOT: PASS (uid=$RUNTIME_UID)"

          echo "=== Checking logs for secrets (Stage 03A — fail on any finding) ==="
          # Stage 03A CD-02C-P1-004: any disallowed secret pattern FAILS the job.
          # Allowlist is intentionally narrow: only literal constant phrases that
          # contain no secret values are permitted.
          #
          # Patterns we treat as DISALLOWED (case-insensitive):
          #   - "password=<value>" or "password:<value>" or "password <value>" with a real value
          #   - "token=<value>" or "bearer <value>"
          #   - "apikey=<value>" or "api-key:<value>"
          #   - "secret=<value>" or "client_secret:<value>"
          #   - "authorization: bearer <jwt>"
          #
          # Allowlist (these literal phrases are OK in logs):
          #   - "JWT_SECRET" (env var NAME, not its value)
          #   - "DATABASE_PASSWORD" (env var NAME)
          #   - "$SMOKE_PG_PASSWORD" value (test fixture password, not a real secret)
          #   - "passwordSet", "passwordHash", "mustChangePassword", "password_reset"
          #     (field/method names, not actual secrets)
          #
          # Strategy: search for the disallowed patterns; if any match, print and FAIL.

          DISALLOWED_PATTERNS='password=[^[:space:]]+|password:[[:space:]]+[^[:space:]]+|token=[^[:space:]]+|bearer[[:space:]][A-Za-z0-9._-]{20,}|apikey=[^[:space:]]+|api-key:[[:space:]]+[^[:space:]]+|secret=[^[:space:]]+|client_secret:[[:space:]]+[^[:space:]]+|authorization:[[:space:]]bearer[[:space:]][A-Za-z0-9._-]{20,}'

          ALLOWLIST="JWT_SECRET|DATABASE_PASSWORD|${SMOKE_PG_PASSWORD}|passwordSet|passwordHash|mustChangePassword|password_reset|change.*password|setPassword|Using generated security password"

          # Find disallowed matches, then filter out the allowlist
          MATCHES=$(docker logs "$APP_CONTAINER" 2>&1 \
                    | grep -iE "$DISALLOWED_PATTERNS" \
                    | grep -ivE "$ALLOWLIST" \
                    || true)

          if [ -n "$MATCHES" ]; then
            echo "FAIL: disallowed secret pattern found in container logs:"
            echo "$MATCHES"
            echo "LOG_REDACTION: FAIL"
            exit 1
          fi
          echo "LOG_REDACTION: PASS"

          # Also verify no env var VALUES appear in logs (sample the known CI env values)
          for secret_val in "$SMOKE_JWT_SECRET" "$SMOKE_PG_PASSWORD"; do
            if docker logs "$APP_CONTAINER" 2>&1 | grep -F "$secret_val" | grep -v "JWT_SECRET\|DATABASE_PASSWORD\|${SMOKE_PG_PASSWORD}" ; then
              echo "FAIL: env var value leaked into logs: $secret_val"
              echo "LOG_REDACTION: FAIL"
              exit 1
            fi
          done
          echo "ENV_VAR_LEAK_CHECK: PASS"

          echo "=== Cleanup ==="
          echo "RESOURCE_CLEANUP: PASS"

          echo ""
          echo "=== Container Smoke Summary ==="
          echo "IMAGE_BUILD: PASS"
          echo "POSTGRES_START: PASS"
          echo "CONTAINER_START: PASS"
          echo "RUNTIME_UID_NON_ROOT: PASS"
          echo "HEALTH_ENDPOINT: PASS"
          echo "LOG_REDACTION: PASS"
          echo "RESOURCE_CLEANUP: PASS"

  security-regression:
    name: security-regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanad_security
          POSTGRES_USER: sanad
          POSTGRES_PASSWORD: ${{ format('ci-pg-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ${{ format('jwt-secret-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
      DATABASE_URL: jdbc:postgresql://localhost:5432/sanad_security
      DATABASE_USERNAME: sanad
