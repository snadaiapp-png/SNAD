name: Performance Baseline

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/**'
      - 'performance/k6/**'
      - '.github/workflows/performance-baseline.yml'
      - 'docs/production-readiness/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-baseline-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  backend-health-baseline:
    name: Backend Health Load Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Start backend on local CI profile
        working-directory: apps/sanad-platform
        run: |
          mkdir -p ../../performance/results
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8080 --management.endpoints.web.exposure.include=health,info --management.endpoint.health.show-details=always" \
            > ../../performance/results/backend-startup.log 2>&1 &
          echo $! > /tmp/sanad-perf-app.pid

      - name: Wait for health
        run: |
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/sanad-perf-app.pid)" 2>/dev/null; then
              echo "::error::sanad local performance app process exited before becoming healthy"
              cat performance/results/backend-startup.log || true
              exit 1
            fi

            code=$(curl -sS -o /tmp/perf-health.json -w '%{http_code}' http://localhost:8080/actuator/health || true)
            echo "attempt=$attempt health_http=$code"
            [ -s /tmp/perf-health.json ] && cat /tmp/perf-health.json || true
            echo
            if [ "$code" = '200' ]; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::SANAD local profile did not become healthy for performance baseline"
          cat performance/results/backend-startup.log || true
          exit 1

      - name: Run k6 baseline
        run: |
          mkdir -p performance/results
          docker run --rm --network host \
            -e BASE_URL=http://localhost:8080 \
            -v "$PWD/performance/k6:/scripts:ro" \
            -v "$PWD/performance/results:/results" \
            grafana/k6:latest run \
            --summary-export=/results/health-baseline-summary.json \
            /scripts/health-baseline.js

      - name: Publish baseline summary
        if: always()
        run: |
          {
            echo '## SANAD Performance Baseline'
            echo ''
            echo '- Scenario: 10 constant virtual users for 60 seconds'
            echo '- Endpoint: `/actuator/health`'
            echo '- Failure threshold: less than 1%'
            echo '- p95 target: below 500 ms'
            echo '- p99 target: below 1000 ms'
            echo '- Scope: CI baseline only; not a production capacity certification'
            echo '- Runtime profile: local CI health baseline using H2-backed startup path'
            echo '- Startup log artifact: `backend-startup.log`'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline-results
          path: performance/results/
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/sanad-perf-app.pid ]; then
            kill "$(cat /tmp/sanad-perf-app.pid)" 2>/dev/null || true
          fi
