name: Performance Baseline

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/**'
      - 'performance/k6/**'
      - '.github/workflows/performance-baseline.yml'
      - 'docs/production-readiness/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-baseline-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  backend-health-baseline:
    name: Backend Health Load Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanad_perf
          POSTGRES_USER: sanad_perf
          POSTGRES_PASSWORD: perf_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build backend image
        working-directory: apps/sanad-platform
        run: docker build -t sanad-backend:perf-ci .
      - name: Start backend
        run: |
          docker run -d --name sanad-perf-app \
            --network host \
            -e SERVER_PORT=8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e JWT_SECRET \
            -e DATABASE_URL=jdbc:postgresql://localhost:5432/sanad_perf \
            -e DATABASE_USERNAME=sanad_perf \
            -e DATABASE_PASSWORD=perf_ci_only \
            -e DATABASE_DRIVER=org.postgresql.Driver \
            -e JPA_DDL_AUTO=validate \
            -e FLYWAY_ENABLED=true \
            -e SANAD_CORS_ALLOWED_ORIGINS=https://snad-app.vercel.app \
            -e MANAGEMENT_ENDPOINTS=health \
            sanad-backend:perf-ci
      - name: Wait for readiness
        run: |
          for attempt in $(seq 1 36); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health/readiness || true)
            if [ "$code" = '200' ]; then
              exit 0
            fi
            sleep 5
          done
          docker logs sanad-perf-app || true
          exit 1
      - name: Run k6 baseline
        run: |
          mkdir -p performance/results
          docker run --rm --network host \
            -e BASE_URL=http://localhost:8080 \
            -v "$PWD/performance/k6:/scripts:ro" \
            -v "$PWD/performance/results:/results" \
            grafana/k6:latest run \
            --summary-export=/results/health-baseline-summary.json \
            /scripts/health-baseline.js
      - name: Publish baseline summary
        if: always()
        run: |
          {
            echo '## SANAD Performance Baseline'
            echo ''
            echo '- Scenario: 10 constant virtual users for 60 seconds'
            echo '- Endpoint: `/actuator/health`'
            echo '- Failure threshold: less than 1%'
            echo '- p95 target: below 500 ms'
            echo '- p99 target: below 1000 ms'
            echo '- Scope: CI baseline only; not a production capacity certification'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline-results
          path: performance/results/
          if-no-files-found: warn
          retention-days: 14
      - name: Cleanup
        if: always()
        run: docker rm -f sanad-perf-app || true
