name: Performance Baseline

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/**'
      - 'performance/k6/**'
      - '.github/workflows/performance-baseline.yml'
      - 'docs/production-readiness/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-baseline-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  backend-health-baseline:
    name: Backend Health Load Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        working-directory: apps/sanad-platform
        run: docker build -t sanad-backend:perf-ci .

      - name: Start backend
        run: |
          docker run -d --name sanad-perf-app \
            --network host \
            -e SERVER_PORT=8080 \
            -e SPRING_PROFILES_ACTIVE=local \
            -e JWT_SECRET \
            -e MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info \
            -e MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always \
            sanad-backend:perf-ci

      - name: Wait for health
        run: |
          for attempt in $(seq 1 90); do
            if ! docker ps --format '{{.Names}}' | grep -qx 'sanad-perf-app'; then
              echo "::error::sanad-perf-app is not running"
              docker ps -a || true
              docker logs sanad-perf-app || true
              exit 1
            fi

            code=$(curl -sS -o /tmp/perf-health.json -w '%{http_code}' http://localhost:8080/actuator/health || true)
            echo "attempt=$attempt health_http=$code"
            [ -s /tmp/perf-health.json ] && cat /tmp/perf-health.json || true
            echo
            if [ "$code" = '200' ]; then
              exit 0
            fi
            sleep 5
          done
          docker ps -a || true
          docker logs sanad-perf-app || true
          exit 1

      - name: Run k6 baseline
        run: |
          mkdir -p performance/results
          docker run --rm --network host \
            -e BASE_URL=http://localhost:8080 \
            -v "$PWD/performance/k6:/scripts:ro" \
            -v "$PWD/performance/results:/results" \
            grafana/k6:latest run \
            --summary-export=/results/health-baseline-summary.json \
            /scripts/health-baseline.js

      - name: Publish baseline summary
        if: always()
        run: |
          {
            echo '## SANAD Performance Baseline'
            echo ''
            echo '- Scenario: 10 constant virtual users for 60 seconds'
            echo '- Endpoint: `/actuator/health`'
            echo '- Failure threshold: less than 1%'
            echo '- p95 target: below 500 ms'
            echo '- p99 target: below 1000 ms'
            echo '- Scope: CI baseline only; not a production capacity certification'
            echo '- Runtime profile: local CI health baseline using H2-backed startup path'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline-results
          path: performance/results/
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup
        if: always()
        run: docker rm -f sanad-perf-app || true
