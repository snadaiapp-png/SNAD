name: Setup Identity B v2
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  setup:
    name: Setup Identity B via SQL
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}
      BACKEND_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      SANAD_ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      SANAD_ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      IDENTITY_B_EMAIL: identity-b@sanad-pilot.com
    steps:
      - name: Install PostgreSQL client
        shell: bash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null
      - name: Fetch DB credentials from Render
        shell: bash
        run: |
          set -euo pipefail
          RENDER_ENV=$(curl -s --header "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          DATABASE_URL=$(echo "$RENDER_ENV" | jq -r '[.[]? | (.envVar // .)] | .[] | select(.key == "DATABASE_URL") | .value')
          DATABASE_PASSWORD=$(echo "$RENDER_ENV" | jq -r '[.[]? | (.envVar // .)] | .[] | select(.key == "DATABASE_PASSWORD") | .value')
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$DATABASE_PASSWORD"
          RAW_URL="${DATABASE_URL#jdbc:}"; RAW_URL="${RAW_URL#postgresql://}"; RAW_URL="${RAW_URL#https://}"
          HOST_PORT="${RAW_URL%%/*}"; DB_PART="${RAW_URL#*/}"; DB_NAME="${DB_PART%%\?*}"
          PGHOST="${HOST_PORT%%:*}"; PGPORT="${HOST_PORT#*:}"; PGPORT="${PGPORT:-5432}"
          echo "PGHOST=$PGHOST" >> $GITHUB_ENV
          echo "PGPORT=$PGPORT" >> $GITHUB_ENV
          echo "PGDATABASE=$DB_NAME" >> $GITHUB_ENV
          echo "PGPASSWORD=$DATABASE_PASSWORD" >> $GITHUB_ENV
      - name: Create tenant + user + role via SQL
        shell: bash
        run: |
          set -euo pipefail
          # Generate UUIDs
          TENANT_ID=$(uuidgen)
          ORG_ID=$(uuidgen)
          USER_ID=$(uuidgen)
          MEMBERSHIP_ID=$(uuidgen)
          ROLE_ID=$(uuidgen)
          
          echo "::add-mask::$TENANT_ID"
          echo "::add-mask::$ORG_ID"
          echo "::add-mask::$USER_ID"
          
          # Create tenant
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="
            INSERT INTO tenants (id, name, subdomain, status, locale, timezone, currency_code, created_at, updated_at)
            VALUES ('$TENANT_ID', 'Pilot Test Tenant', 'pilot-test-b', 'ACTIVE', 'ar-SA', 'Asia/Riyadh', 'SAR', NOW(), NOW());"
          echo "Tenant created: $TENANT_ID"
          
          # Create organization
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="
            INSERT INTO organizations (id, tenant_id, name, description, status, created_at, updated_at)
            VALUES ('$ORG_ID', '$TENANT_ID', 'Pilot Org', 'Primary organization', 'ACTIVE', NOW(), NOW());"
          echo "Organization created: $ORG_ID"
          
          # Create user (without password — will use forgot-password to set it)
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="
            INSERT INTO users (id, tenant_id, email, display_name, status, must_change_password, created_at, updated_at)
            VALUES ('$USER_ID', '$TENANT_ID', '$IDENTITY_B_EMAIL', 'Pilot User', 'ACTIVE', false, NOW(), NOW());"
          echo "User created: $USER_ID"
          
          # Create membership
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="
            INSERT INTO organization_memberships (id, tenant_id, organization_id, user_id, email, display_name, role_code, status, created_at, updated_at)
            VALUES ('$MEMBERSHIP_ID', '$TENANT_ID', '$ORG_ID', '$USER_ID', '$IDENTITY_B_EMAIL', 'Pilot User', 'MEMBER', 'ACTIVE', NOW(), NOW());"
          echo "Membership created"
          
          # Create MEMBER role (non-admin)
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="
            INSERT INTO roles (id, tenant_id, code, name, description, status, created_at, updated_at)
            VALUES ('$ROLE_ID', '$TENANT_ID', 'MEMBER', 'Member', 'Basic read access', 'ACTIVE', NOW(), NOW());"
          echo "MEMBER role created"
          
          # Assign MEMBER role to user (non-admin)
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="
            INSERT INTO user_role_assignments (id, tenant_id, user_id, role_id, organization_id, status, created_at, updated_at)
            VALUES ('$(uuidgen)', '$TENANT_ID', '$USER_ID', '$ROLE_ID', NULL, 'ACTIVE', NOW(), NOW());"
          echo "Role assigned"
          
          echo "============================================"
          echo "IDENTITY B CREATED VIA SQL"
          echo "============================================"
          echo "Email: $IDENTITY_B_EMAIL"
          echo "Tenant ID: $TENANT_ID"
          echo "User ID: $USER_ID"
          echo "Role: MEMBER (non-admin)"
          echo "============================================"
      - name: Set password via admin reset + forgot-password
        shell: bash
        run: |
          set -euo pipefail
          sleep 5
          # Login as admin
          LOGIN=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -d "{\"email\":\"$SANAD_ADMIN_EMAIL\",\"password\":\"$SANAD_ADMIN_PASSWORD\"}" "$BACKEND_URL/api/v1/auth/login")
          ADMIN_TOKEN=$(echo "$LOGIN" | jq -r '.accessToken // empty')
          test -n "$ADMIN_TOKEN" || { echo "::error::Admin login failed"; exit 1; }
          echo "::add-mask::$ADMIN_TOKEN"
          echo "Admin logged in"
          
          # Find Identity B tenant
          TENANTS=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" "$BACKEND_URL/api/v1/control-plane/tenants")
          OTHER_TENANT=$(echo "$TENANTS" | jq -r --arg cp "$CONTROL_PLANE_TENANT_ID" '[.[] | select(.id != $cp)] | .[0].id // empty')
          echo "Identity B tenant: $OTHER_TENANT"
          test -n "$OTHER_TENANT" || { echo "::error::No second tenant found"; exit 1; }
          
          # Find org in that tenant
          ORGS=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" "$BACKEND_URL/api/v1/control-plane/tenants/$OTHER_TENANT/organizations")
          ORG_ID=$(echo "$ORGS" | jq -r '.[0].id // empty')
          
          # Find user ID
          MEMBERS=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" "$BACKEND_URL/api/v1/control-plane/tenants/$OTHER_TENANT/organizations/$ORG_ID/memberships")
          USER_ID=$(echo "$MEMBERS" | jq -r --arg email "$IDENTITY_B_EMAIL" '[.[] | select(.email == $email)] | .[0].userId // empty')
          echo "Identity B user ID: $USER_ID"
          test -n "$USER_ID" || { echo "::error::User not found"; exit 1; }
          
          # Admin reset password — sends reset email via Resend
          RESET=$(curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $ADMIN_TOKEN" -d '{"locale":"ar"}' "$BACKEND_URL/api/v1/auth/admin-reset-password/$USER_ID" -w '\n%{http_code}')
          RESET_CODE=$(echo "$RESET" | tail -1)
          echo "Admin reset: $RESET_CODE"
          
          # The reset email will be sent to identity-b@sanad-pilot.com
          # but onboarding@resend.dev can only send to the Resend account owner
          # So we need to set the password directly via DB
          # Generate a bcrypt hash for the password
          IDENTITY_B_PASS="PilotB2026!Secure"
          BCRYPT_HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'$IDENTITY_B_PASS', bcrypt.gensalt()).decode())")
          echo "::add-mask::$BCRYPT_HASH"
          
          # Set password directly in DB
          psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$PGDATABASE" --no-psqlrc --set=ON_ERROR_STOP=1 --command="UPDATE users SET password_hash = '$BCRYPT_HASH', password_set_at = NOW(), password_set_by = 'admin-reset', must_change_password = false WHERE id = '$USER_ID';"
          echo "Password set for Identity B"
          
          # Verify login works
          LOGIN_B=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -d "{\"email\":\"$IDENTITY_B_EMAIL\",\"password\":\"$IDENTITY_B_PASS\"}" "$BACKEND_URL/api/v1/auth/login" -w '\n%{http_code}')
          LOGIN_B_CODE=$(echo "$LOGIN_B" | tail -1)
          echo "Identity B login: $LOGIN_B_CODE"
          
          if [ "$LOGIN_B_CODE" = "200" ]; then
            echo "✓ Identity B login SUCCESSFUL"
          else
            echo "::error::Identity B login failed ($LOGIN_B_CODE)"
          fi
          
          echo "============================================"
          echo "IDENTITY B READY"
          echo "Email: $IDENTITY_B_EMAIL"
          echo "Password: (set via DB)")
          echo "Tenant: $OTHER_TENANT"
          echo "============================================"
