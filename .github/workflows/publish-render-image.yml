name: Publish Render Backend Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/sanad-platform/**"
      - ".github/workflows/publish-render-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-render-backend-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/snad-backend

jobs:
  build-and-push:
    name: Build and publish backend image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/sanad-platform
          file: apps/sanad-platform/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record published image
        run: |
          {
            echo "## Render backend image"
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Source: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
