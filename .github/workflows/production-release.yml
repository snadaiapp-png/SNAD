name: SANAD Production Release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact current main commit to deploy
        required: true
      pull_request_number:
        description: Pull request used for release evidence
        required: true
        default: "222"
      rollback_on_failure:
        description: Redeploy the previous successful commit when verification fails
        type: boolean
        required: true
        default: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sanad-production-release
  cancel-in-progress: true

env:
  PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
  WEB_PRODUCTION_BASE_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}

jobs:
  deploy-and-verify:
    name: Deploy exact commit and verify production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 55
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Validate protected release inputs
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID PRODUCTION_BASE_URL WEB_PRODUCTION_BASE_URL; do
            test -n "${!name:-}" || { echo "::error::$name is required"; exit 1; }
          done
          [[ "${{ inputs.commit_sha }}" =~ ^[0-9a-f]{40}$ ]]
          [[ "$PRODUCTION_BASE_URL" == https://* ]]
          [[ "$WEB_PRODUCTION_BASE_URL" == https://* ]]

      - name: Verify target is current main head
        id: target
        shell: bash
        run: |
          set -euo pipefail
          remote_main=$(git ls-remote "https://github.com/$GITHUB_REPOSITORY.git" refs/heads/main | awk '{print $1}')
          test "$remote_main" = "${{ inputs.commit_sha }}" || {
            echo "::error::Requested commit is not the current main head"
            exit 1
          }
          echo "sha=$remote_main" >> "$GITHUB_OUTPUT"

      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client >/dev/null

      - name: Validate Render runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            > /tmp/render-env.json
          test "$(jq 'length' /tmp/render-env.json)" -lt 100 || {
            echo "::error::Cannot prove complete Render environment pagination"
            exit 1
          }
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          required=(SPRING_PROFILES_ACTIVE DATABASE_URL DATABASE_USERNAME DATABASE_PASSWORD JWT_SECRET BOOTSTRAP_ENABLED SANAD_CONTROL_PLANE_TENANT_ID)
          for key in "${required[@]}"; do
            jq -e --arg key "$key" 'any(.[]; .key == $key and ((.value // "") | length > 0))' /tmp/render-env-normalized.json >/dev/null || {
              echo "::error::Required Render environment value is missing: $key"
              exit 1
            }
          done
          test "$(jq -r '.[] | select(.key == "BOOTSTRAP_ENABLED") | .value' /tmp/render-env-normalized.json)" = "false"
          control_tenant_id=$(jq -r '.[] | select(.key == "SANAD_CONTROL_PLANE_TENANT_ID") | .value' /tmp/render-env-normalized.json)
          database_username=$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value' /tmp/render-env-normalized.json)
          [[ "$control_tenant_id" =~ ^[0-9a-fA-F-]{36}$ ]]
          echo "::add-mask::$control_tenant_id"
          echo "::add-mask::$database_username"
          echo "CONTROL_PLANE_TENANT_ID=$control_tenant_id" >> "$GITHUB_ENV"
          echo "DATABASE_USERNAME=$database_username" >> "$GITHUB_ENV"

      - name: Verify Control Plane tenant in production database
        run: bash scripts/production/verify-control-plane-tenant.sh

      - name: Capture previous live commit
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=20" > /tmp/render-deploys.json
          previous=$(jq -r '[.[]? | (.deploy // .) | select((.status // "") == "live")][0].commit.id // empty' /tmp/render-deploys.json)
          echo "sha=$previous" >> "$GITHUB_OUTPUT"

      - name: Trigger exact Render commit
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg commit "${{ steps.target.outputs.sha }}" '{commitId:$commit,clearCache:"do_not_clear"}' > render-request.json
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @render-request.json \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" > render-deployment.json
          deploy_id=$(jq -r '(.deploy // .).id // empty' render-deployment.json)
          test -n "$deploy_id"
          echo "id=$deploy_id" >> "$GITHUB_OUTPUT"

      - name: Wait for Render deployment
        shell: bash
        run: |
          set -euo pipefail
          deploy_id='${{ steps.deploy.outputs.id }}'
          for attempt in $(seq 1 270); do
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" > render-deployment-state.json
            status=$(jq -r '(.deploy // .).status // "pending"' render-deployment-state.json)
            echo "Render status: $status"
            case "$status" in
              live) exit 0 ;;
              build_failed|update_failed|canceled|deactivated)
                jq '{id,status,commit,createdAt,finishedAt,reason}' render-deployment-state.json || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::Render deployment timed out"
          exit 1

      - name: Wait for production readiness
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 72); do
            code=$(curl --silent --show-error --output /tmp/readiness.json --write-out '%{http_code}' --max-time 20 "$PRODUCTION_BASE_URL/actuator/health/readiness" || true)
            if [ "$code" = "200" ] && jq -e '.status == "UP"' /tmp/readiness.json >/dev/null 2>&1; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::Production readiness did not become UP"
          exit 1

      - name: Verify Flyway production compatibility
        run: bash scripts/production/verify-flyway.sh

      - name: Verify production security boundary
        run: bash scripts/production/verify-auth-contract.sh

      - name: Verify Vercel Control Plane and BFF
        shell: bash
        run: |
          set -euo pipefail
          control_status=$(curl --silent --show-error --location --output /tmp/control-plane.html --write-out '%{http_code}' --max-time 60 "$WEB_PRODUCTION_BASE_URL/control-plane")
          test "$control_status" = "200"
          bff_status=$(curl --silent --show-error --output /tmp/control-plane-api.json --write-out '%{http_code}' --max-time 90 "$WEB_PRODUCTION_BASE_URL/api/platform/api/v1/control-plane/dashboard" || true)
          case "$bff_status" in 401|403) ;; *) exit 1 ;; esac

      - name: Write sanitized release evidence
        if: success()
        shell: bash
        run: |
          jq -n \
            --arg commit "${{ steps.target.outputs.sha }}" \
            --arg deployment "${{ steps.deploy.outputs.id }}" \
            --arg previous "${{ steps.previous.outputs.sha }}" \
            --arg backendUrl "$PRODUCTION_BASE_URL" \
            --arg webUrl "$WEB_PRODUCTION_BASE_URL" \
            '{result:"DEPLOYMENT_VERIFIED",commit:$commit,deploymentId:$deployment,previousCommit:$previous,backendUrl:$backendUrl,webUrl:$webUrl,health:"UP",readiness:"UP",flyway:"PASS",securityBoundary:"PASS",vercelControlPlane:"UP",vercelBff:"CONNECTED"}' \
            > production-release-evidence.json

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-release-${{ github.run_id }}
          path: |
            render-deployment.json
            render-deployment-state.json
            production-release-evidence.json
            render-rollback.json
          if-no-files-found: warn
          retention-days: 90

      - name: Record verified deployment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "Render production deployment passed for exact commit \`${{ steps.target.outputs.sha }}\`, deployment \`${{ steps.deploy.outputs.id }}\`. Readiness, Control Plane tenant, Flyway, security boundary, Vercel Control Plane and BFF checks passed."

      - name: Roll back failed release
        if: failure() && inputs.rollback_on_failure && steps.previous.outputs.sha != ''
        shell: bash
        run: |
          jq -n --arg commit '${{ steps.previous.outputs.sha }}' '{commitId:$commit,clearCache:"do_not_clear"}' > rollback-request.json
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @rollback-request.json \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" > render-rollback.json

      - name: Record failed release
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "Production release verification FAILED for commit \`${{ inputs.commit_sha }}\`. Rollback was requested when a previous live commit was available. Evidence: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
