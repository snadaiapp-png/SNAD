name: Setup Resend Direct

# ============================================================
# SANAD Platform — Setup Resend direct integration on Render
# ------------------------------------------------------------
# This workflow configures the backend to call Resend API directly,
# eliminating the need for the Vercel email-proxy middleware.
#
# Required inputs:
#   - resend_api_key: https://resend.com/api-keys (format: re_xxxxxxxx)
#   - email_from: Verified sender (e.g. "SANAD <noreply@yourdomain.com>")
#
# After this workflow:
#   1. Sets SECURITY_NOTIFICATION_RESEND_API_KEY on Render
#   2. Sets SECURITY_NOTIFICATION_FROM on Render
#   3. Sets SECURITY_NOTIFICATION_PROVIDER=resend on Render
#   4. Triggers Render deploy
#   5. Tests forgot-password endpoint
# ============================================================

on:
  workflow_dispatch:
    inputs:
      resend_api_key:
        description: 'Resend API key (format: re_xxxxxxxx)'
        required: true
        type: string
      email_from:
        description: 'Verified sender email (e.g. "SANAD <noreply@yourdomain.com>")'
        required: true
        type: string

permissions:
  contents: read

jobs:
  setup:
    name: Setup Resend on Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RESEND_API_KEY: ${{ inputs.resend_api_key }}
      EMAIL_FROM: ${{ inputs.email_from }}
    steps:
      - name: Validate Resend API key format
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RESEND_API_KEY" =~ ^re_[a-zA-Z0-9_-]+$ ]] || {
            echo "::error::Resend API key must start with 're_' (got: ${RESEND_API_KEY:0:5}...)"
            exit 1
          }
          echo "Resend API key format OK"

      - name: Test Resend API key validity
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing Resend API key ==="
          STATUS=$(curl --silent --show-error --max-time 15 -o /tmp/resend-test.json -w '%{http_code}' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            "https://api.resend.com/domains")
          echo "HTTP: $STATUS"
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "::error::Resend API key is invalid or unauthorized"
            cat /tmp/resend-test.json
            exit 1
          fi
          echo "Resend API key is valid"
          echo "Domains response:"
          cat /tmp/resend-test.json | jq '.' 2>/dev/null || cat /tmp/resend-test.json

      - name: Set SECURITY_NOTIFICATION_PROVIDER=resend on Render
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SECURITY_NOTIFICATION_PROVIDER=resend ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SECURITY_NOTIFICATION_PROVIDER\",\"value\":\"resend\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set SECURITY_NOTIFICATION_RESEND_API_KEY on Render
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SECURITY_NOTIFICATION_RESEND_API_KEY ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SECURITY_NOTIFICATION_RESEND_API_KEY\",\"value\":\"$RESEND_API_KEY\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set SECURITY_NOTIFICATION_FROM on Render
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SECURITY_NOTIFICATION_FROM ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SECURITY_NOTIFICATION_FROM\",\"value\":\"$EMAIL_FROM\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Trigger Render deploy
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Triggering Render deploy ==="
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          echo "Deploy triggered: $DEPLOY_ID"

      - name: Wait for deploy to complete
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Waiting for deploy (max 8 minutes) ==="
          for i in $(seq 1 32); do
            sleep 15
            STATUS=$(curl --silent --show-error --max-time 10 \
              -o /dev/null -w '%{http_code}' \
              https://sanad-backend-mcrj.onrender.com/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after $((i * 15))s"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS; waiting..."
          done
          echo "::warning::Backend did not become healthy within 8 minutes"
          echo "The deploy may still be in progress. Check Render dashboard."

      - name: Test forgot-password endpoint
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing forgot-password ==="
          RESPONSE=$(curl --silent --show-error --max-time 30 \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"snad.ai.app@gmail.com"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/forgot-password)
          echo "Response: $RESPONSE"
          echo ""
          echo "=== SETUP COMPLETE ==="
          echo "Check your email inbox (snad.ai.app@gmail.com) for the reset link."
          echo "If no email arrives, check Resend dashboard: https://resend.com/emails"
