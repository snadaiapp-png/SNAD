# ============================================================
# SANAD — NVD Snapshot Publisher (Incremental, Datafeed)
# ============================================================
# R12J: Uses GitHub-hosted runner with GitHub Releases as storage.
# Consumes verified NVD Data Feed from the Feed Mirror Publisher.
# Does NOT have NVD_API_KEY. Does NOT contact NVD API directly.
# ============================================================

name: NVD Snapshot Publisher

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: snad-nvd-snapshot-single-writer
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: "12.1.0"
  PYTHONUNBUFFERED: "1"
  NVD_SNAPSHOT_BACKEND: github-releases
  NVD_SOURCE_MODE: datafeed

jobs:
  publish:
    name: Publish Incremental NVD Snapshot (Datafeed)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: nvd-publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml pytest
          sudo apt-get install -y zstd || true

      - name: Verify latest-pointer regression fix
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pytest tests/security/test_nvd_latest_pointer_promotion.py -q
          python3 -m py_compile scripts/security/run_nvd_snapshot_publisher.py

      - name: Run Incremental Publisher (Datafeed Mode)
        id: publisher
        continue-on-error: true
        shell: bash
        env:
          NVD_SNAPSHOT_BACKEND: github-releases
          NVD_SOURCE_MODE: datafeed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -o pipefail
          WORK_DIR="${{ runner.temp }}/nvd-work"
          CANONICAL_DIR="${{ runner.temp }}/nvd-canonical"
          LKG_DIR="${{ runner.temp }}/nvd-lkg"
          LOG_DIR="${{ runner.temp }}/nvd-publisher-evidence"
          rm -rf "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR" "$LOG_DIR"
          mkdir -p "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR" "$LOG_DIR"

          python3 scripts/security/run_nvd_snapshot_publisher.py \
            --mode incremental \
            --source-mode datafeed \
            --update-timeout-minutes 180 \
            --work-dir "$WORK_DIR" \
            --canonical-dir "$CANONICAL_DIR" \
            --lkg-dir "$LKG_DIR" \
            --publisher-commit-sha "${{ github.sha }}" \
            --publisher-run-id "${{ github.run_id }}" \
            2>&1 | tee "$LOG_DIR/publisher.log"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"

      - name: Upload publisher diagnostics
        id: diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nvd-snapshot-publisher-${{ github.run_id }}
          path: ${{ runner.temp }}/nvd-publisher-evidence/
          if-no-files-found: warn
          retention-days: 14

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NVD Snapshot Publisher — R12J (Datafeed Mode)"
            echo ""
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**SHA:** \`${{ github.sha }}\`"
            echo "**Mode:** Incremental (datafeed source)"
            echo "**Backend:** GitHub Releases"
            echo "**NVD_API_KEY:** NOT USED"
            echo "**Publisher outcome:** ${{ steps.publisher.outcome }}"
            echo "**Publisher exit code:** ${{ steps.publisher.outputs.exit_code }}"
            echo "**Diagnostics upload:** ${{ steps.diagnostics.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Final enforcement
        if: always()
        shell: bash
        run: |
          [[ '${{ steps.publisher.outcome }}' == 'success' ]] || {
            echo '::error::NVD Snapshot Publisher failed'
            exit 1
          }
          [[ '${{ steps.diagnostics.outcome }}' == 'success' ]] || {
            echo '::error::Publisher diagnostics upload failed'
            exit 1
          }
