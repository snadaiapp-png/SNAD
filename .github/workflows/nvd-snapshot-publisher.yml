# ============================================================
# SANAD — NVD Snapshot Publisher (Incremental)
# ============================================================
# EXEC-PROMPT-010R12F Section 18.2 — incremental publisher that
# runs on a 6-hour schedule. Uses the shared
# scripts/security/publish_nvd_snapshot.py with --mode incremental.
#
# R12F: MUST NOT cold bootstrap. If no canonical or remote LKG
# exists, the publisher fails with:
#   "No verified canonical or remote snapshot exists.
#    Run NVD Snapshot Bootstrap before enabling incremental publishing."
#
# Shares the same concurrency group as the Bootstrap workflow
# (snad-nvd-snapshot-single-writer) to enforce single-writer.
# ============================================================

name: NVD Snapshot Publisher

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read
  actions: read
  id-token: write
  packages: write

concurrency:
  group: snad-nvd-snapshot-single-writer
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: "12.1.0"
  PYTHONUNBUFFERED: "1"
  CANONICAL_DIR: /var/lib/snad/dependency-check-data/canonical
  WORK_DIR_BASE: /var/lib/snad/dependency-check-data/work
  LKG_DIR: /var/lib/snad/dependency-check-data/lkg

jobs:
  publish:
    name: Publish Incremental NVD Snapshot
    runs-on:
      - self-hosted
      - linux
      - x64
      - snad-nvd-publisher
    # R12F: 4-hour timeout for incremental updates.
    timeout-minutes: 240
    environment: nvd-publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify runner environment
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner name: ${{ runner.name }}"
          test -d /var/lib/snad/dependency-check-data || {
            echo "::error::Persistent directory /var/lib/snad/dependency-check-data does not exist."
            exit 1
          }
          mkdir -p "${{ env.CANONICAL_DIR }}" "${{ env.WORK_DIR_BASE }}" "${{ env.LKG_DIR }}"
          for cmd in java mvn python3 tar zstd; do
            command -v "$cmd" >/dev/null 2>&1 || {
              echo "::error::Required command '$cmd' not found."
              exit 1
            }
          done
          # R12F: check ORAS if GHCR backend
          if [ "${{ vars.NVD_SNAPSHOT_BACKEND }}" = "ghcr" ]; then
            command -v oras >/dev/null 2>&1 || {
              echo "::error::ORAS required for GHCR backend but not found."
              exit 1
            }
          fi

      - name: Verify NVD_API_KEY present
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY is required in nvd-publisher environment."
            exit 1
          fi
          echo "NVD_API_KEY is configured."

      - name: Verify storage backend configured
        shell: bash
        run: |
          BACKEND="${{ vars.NVD_SNAPSHOT_BACKEND }}"
          if [ -z "$BACKEND" ]; then
            echo "::error::NVD_SNAPSHOT_BACKEND is not set."
            exit 1
          fi
          echo "Storage backend: $BACKEND"

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml pytest
          if [ "${{ vars.NVD_SNAPSHOT_BACKEND }}" = "s3" ]; then
            python3 -m pip install --quiet boto3
          fi

      - name: Configure AWS credentials via OIDC
        if: vars.NVD_SNAPSHOT_BACKEND == 's3'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ vars.NVD_SNAPSHOT_WRITER_ROLE }}
          aws-region: ${{ vars.NVD_SNAPSHOT_REGION }}
          role-session-name: snad-nvd-publisher-${{ github.run_id }}

      - name: Verify storage readiness
        shell: bash
        env:
          NVD_SNAPSHOT_BACKEND: ${{ vars.NVD_SNAPSHOT_BACKEND }}
          NVD_SNAPSHOT_BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
          NVD_SNAPSHOT_PREFIX: ${{ vars.NVD_SNAPSHOT_PREFIX }}
          NVD_SNAPSHOT_REGION: ${{ vars.NVD_SNAPSHOT_REGION }}
          NVD_SNAPSHOT_ENDPOINT: ${{ vars.NVD_SNAPSHOT_ENDPOINT }}
        run: |
          python3 scripts/security/verify_nvd_storage_readiness.py
          echo "Storage readiness: VERIFIED"

      - name: Run Incremental Publisher
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          NVD_SNAPSHOT_BACKEND: ${{ vars.NVD_SNAPSHOT_BACKEND }}
          NVD_SNAPSHOT_BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
          NVD_SNAPSHOT_PREFIX: ${{ vars.NVD_SNAPSHOT_PREFIX }}
          NVD_SNAPSHOT_REGION: ${{ vars.NVD_SNAPSHOT_REGION }}
          NVD_SNAPSHOT_ROLE: ${{ vars.NVD_SNAPSHOT_WRITER_ROLE }}
          NVD_SNAPSHOT_ENDPOINT: ${{ vars.NVD_SNAPSHOT_ENDPOINT }}
        run: |
          set -euo pipefail
          WORK_DIR="${{ env.WORK_DIR_BASE }}/${{ github.run_id }}"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          python3 scripts/security/publish_nvd_snapshot.py \
            --mode incremental \
            --update-timeout-minutes 180 \
            --work-dir "$WORK_DIR" \
            --canonical-dir "${{ env.CANONICAL_DIR }}" \
            --lkg-dir "${{ env.LKG_DIR }}" \
            --publisher-commit-sha "${{ github.sha }}" \
            --publisher-run-id "${{ github.run_id }}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NVD Snapshot Publisher — R12F (Incremental)"
            echo ""
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**SHA:** \`${{ github.sha }}\`"
            echo "**Mode:** Incremental"
            echo "**Backend:** ${{ vars.NVD_SNAPSHOT_BACKEND }}"
          } >> "$GITHUB_STEP_SUMMARY"
