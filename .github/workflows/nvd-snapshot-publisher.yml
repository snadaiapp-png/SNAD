name: NVD Snapshot Publisher

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches:
      - stage0910-unified
      - stage0910-unified-rebased
    paths:
      - '.github/workflows/nvd-snapshot-publisher.yml'
      - 'scripts/security/**'
      - 'tests/security/**'

permissions:
  contents: write
  actions: read

concurrency:
  group: snad-nvd-snapshot-single-writer
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: '12.1.0'
  PYTHONUNBUFFERED: '1'
  NVD_SNAPSHOT_BACKEND: github-releases
  NVD_SOURCE_MODE: datafeed

jobs:
  publish:
    name: Publish Incremental NVD Snapshot (Datafeed)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: nvd-publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml pytest
          sudo apt-get update -qq
          sudo apt-get install -y zstd

      - name: Verify GitHub Releases idempotency regression tests
        shell: bash
        run: python3 -m pytest tests/security/test_nvd_github_releases_idempotency.py -q

      - name: Run Incremental Publisher (Datafeed Mode)
        id: publisher
        shell: bash
        env:
          NVD_SNAPSHOT_BACKEND: github-releases
          NVD_SOURCE_MODE: datafeed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -uo pipefail
          WORK_DIR="${{ runner.temp }}/nvd-work"
          CANONICAL_DIR="${{ runner.temp }}/nvd-canonical"
          LKG_DIR="${{ runner.temp }}/nvd-lkg"
          LOG_FILE="${{ runner.temp }}/nvd-publisher.log"
          rm -rf "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"
          mkdir -p "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"

          set +e
          python3 -c 'from scripts.security.nvd_github_releases_idempotency import install_github_releases_idempotency_patch as install; install(); import runpy; runpy.run_path("scripts/security/publish_nvd_snapshot.py", run_name="__main__")' \
            --mode incremental \
            --source-mode datafeed \
            --update-timeout-minutes 180 \
            --work-dir "$WORK_DIR" \
            --canonical-dir "$CANONICAL_DIR" \
            --lkg-dir "$LKG_DIR" \
            --publisher-commit-sha "${{ github.sha }}" \
            --publisher-run-id "${{ github.run_id }}" \
            2>&1 | tee "$LOG_FILE"
          result=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$result" >> "$GITHUB_OUTPUT"
          if [ "$result" -ne 0 ]; then
            echo "::error::NVD publisher failed with exit code $result"
            exit "$result"
          fi

      - name: Upload publisher diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nvd-publisher-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/nvd-publisher.log
            ${{ runner.temp }}/nvd-work/**
            ${{ runner.temp }}/nvd-canonical/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo '## NVD Snapshot Publisher'
            echo ''
            echo "- Run ID: ${{ github.run_id }}"
            echo "- SHA: \`${{ github.sha }}\`"
            echo '- Mode: Incremental datafeed'
            echo '- Backend: GitHub Releases'
            echo "- Publisher exit code: \`${{ steps.publisher.outputs.exit_code }}\`"
            echo '- NVD_API_KEY: not used'
          } >> "$GITHUB_STEP_SUMMARY"
