# ============================================================
# SANAD — NVD Snapshot Publisher (Incremental, GitHub Releases)
# ============================================================
# R12H: Uses GitHub-hosted runner with GitHub Releases as storage.
# Runs every 6 hours. Downloads previous snapshot from GitHub
# Releases, applies incremental update, publishes new snapshot.
# ============================================================

name: NVD Snapshot Publisher

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: snad-nvd-snapshot-single-writer
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: "12.1.0"
  PYTHONUNBUFFERED: "1"
  NVD_SNAPSHOT_BACKEND: github-releases

jobs:
  publish:
    name: Publish Incremental NVD Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: nvd-publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml pytest
          sudo apt-get install -y zstd || true

      - name: Verify NVD_API_KEY present
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY is required in nvd-publisher environment."
            exit 1
          fi
          echo "NVD_API_KEY is configured."

      - name: Run Incremental Publisher
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          NVD_SNAPSHOT_BACKEND: github-releases
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          WORK_DIR="${{ runner.temp }}/nvd-work"
          CANONICAL_DIR="${{ runner.temp }}/nvd-canonical"
          LKG_DIR="${{ runner.temp }}/nvd-lkg"
          rm -rf "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"
          mkdir -p "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"

          python3 scripts/security/publish_nvd_snapshot.py \
            --mode incremental \
            --update-timeout-minutes 180 \
            --work-dir "$WORK_DIR" \
            --canonical-dir "$CANONICAL_DIR" \
            --lkg-dir "$LKG_DIR" \
            --publisher-commit-sha "${{ github.sha }}" \
            --publisher-run-id "${{ github.run_id }}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NVD Snapshot Publisher — GitHub Releases Backend"
            echo ""
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**SHA:** \`${{ github.sha }}\`"
            echo "**Mode:** Incremental"
            echo "**Backend:** GitHub Releases"
          } >> "$GITHUB_STEP_SUMMARY"
