name: Windows Native Backend Release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/**'
      - 'deploy/windows-native/**'
      - '.github/workflows/windows-native-release.yml'

permissions:
  contents: read

concurrency:
  group: windows-native-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build executable JAR
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -ntp clean package -DskipTests -Dgit.commit="$CANDIDATE_SHA"
          test -s target/sanad-platform-0.1.0-SNAPSHOT.jar

      - name: Assemble Windows-native release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p windows-native-release/app windows-native-release/scripts windows-native-release/config
          cp apps/sanad-platform/target/sanad-platform-0.1.0-SNAPSHOT.jar windows-native-release/app/sanad-backend.jar
          cp deploy/windows-native/Start-Sanad.ps1 windows-native-release/scripts/
          cp deploy/windows-native/Stop-Sanad.ps1 windows-native-release/scripts/
          cp deploy/windows-native/Install-SanadTask.ps1 windows-native-release/scripts/
          cp deploy/windows-native/Migrate-RenderDatabase.ps1 windows-native-release/scripts/
          cp deploy/windows-native/sanad.env.example windows-native-release/config/
          cp deploy/windows-native/README.md windows-native-release/
          sha256sum windows-native-release/app/sanad-backend.jar > windows-native-release/SHA256SUMS.txt
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "workflow_run=$GITHUB_RUN_ID"
            echo "workflow_attempt=$GITHUB_RUN_ATTEMPT"
            cat windows-native-release/SHA256SUMS.txt
          } > windows-native-release/RELEASE-PROVENANCE.txt

      - name: Upload Windows-native release
        uses: actions/upload-artifact@v4
        with:
          name: sanad-windows-native-release
          path: windows-native-release/
          if-no-files-found: error
          retention-days: 90
