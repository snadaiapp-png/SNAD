name: Create External PostgreSQL (Neon) and Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'create-external-db' to create a free Neon PostgreSQL database"
        required: true
        default: "no"
      neon_api_key:
        description: "Neon API key (get one at https://console.neon.tech - leave empty to skip)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  create-db:
    name: Create external PostgreSQL and link to Render
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    steps:
      - name: Confirm
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "create-external-db" ]; then exit 1; fi

      - name: Check for Neon API key
        env:
          NEON_API_KEY: ${{ github.event.inputs.neon_api_key }}
        run: |
          if [ -z "${NEON_API_KEY}" ]; then
            echo "ERROR: Neon API key is required."
            echo "Get a free API key at: https://console.neon.tech"
            echo "Then re-run this workflow with the key in the neon_api_key input."
            exit 1
          fi
          echo "Neon API key provided (length: ${#NEON_API_KEY})"

      - name: Create Neon PostgreSQL project
        id: create
        env:
          NEON_API_KEY: ${{ github.event.inputs.neon_api_key }}
        run: |
          set -euo pipefail
          echo "=== Creating Neon PostgreSQL project ==="
          STATUS=$(curl -sS -o /tmp/neon-create.json -w "%{http_code}" --max-time 60 \
            -X POST "https://console.neon.tech/api/v2/projects" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{
              "project": {
                "name": "sanad-production"
              }
            }')
          echo "Create project HTTP ${STATUS}"
          cat /tmp/neon-create.json | python3 -m json.tool 2>/dev/null | head -40

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Failed to create Neon project."
            cat /tmp/neon-create.json
            exit 1
          fi

          # Extract connection string
          CONNECTION_STRING=$(python3 -c "
          import json
          with open('/tmp/neon-create.json') as f:
              d = json.load(f)
          # Neon returns connection string in multiple places
          cs = d.get('connectionStrings', [{}])[0].get('connectionString', '')
          if not cs:
              cs = d.get('connection_uri', '')
          if not cs:
              # Try from project endpoint
              cs = d.get('project', {}).get('connection_uri', '')
          print(cs)
          " 2>/dev/null || echo "")

          if [ -z "${CONNECTION_STRING}" ]; then
            echo "ERROR: Could not extract connection string from Neon response."
            echo "Full response:"
            cat /tmp/neon-create.json
            exit 1
          fi

          echo "Connection string found (length: ${#CONNECTION_STRING}, not displayed)"
          echo "CONNECTION_STRING=${CONNECTION_STRING}" >> "$GITHUB_ENV"

      - name: Set DATABASE_URL on Render sanad-backend
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "=== Setting DATABASE_URL on Render sanad-backend ==="

          # Fetch existing env vars
          curl -sS --max-time 30 \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" > /tmp/env-vars.json

          # Build payload with DATABASE_URL set to the Neon connection string
          python3 - <<'PYEOF' > /tmp/payload.json
          import json, os
          with open('/tmp/env-vars.json') as f:
              data = json.load(f)
          items = []
          found = False
          conn = os.environ['CONNECTION_STRING']
          if isinstance(data, list):
              for item in data:
                  ev = item.get('envVar', item) if isinstance(item, dict) else {}
                  key = ev.get('key', '') if isinstance(ev, dict) else ''
                  val = ev.get('value', '') if isinstance(ev, dict) else ''
                  if not key:
                      continue
                  if key == 'DATABASE_URL':
                      items.append({'key': key, 'value': conn})
                      found = True
                  else:
                      items.append({'key': key, 'value': val})
          if not found:
              items.append({'key': 'DATABASE_URL', 'value': conn})
          print(json.dumps(items))
          PYEOF

          STATUS=$(curl -sS -o /tmp/render-response.json -w "%{http_code}" \
            --max-time 60 \
            -X PUT "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data @/tmp/payload.json)
          echo "PUT returned HTTP ${STATUS}"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ]; then
            echo "Failed!"
            cat /tmp/render-response.json
            exit 1
          fi
          echo "✅ DATABASE_URL set on sanad-backend (Neon PostgreSQL)"

      - name: Trigger Render deploy and wait
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "=== Triggering deploy ==="
          HTTP_STATUS=$(curl -sS -o /tmp/deploy.json -w "%{http_code}" --max-time 30 \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Deploy trigger HTTP ${HTTP_STATUS}"
          DEPLOY_ID=$(python3 -c "import json; print(json.load(open('/tmp/deploy.json')).get('id',''))" 2>/dev/null || echo "")
          echo "Deploy ID: ${DEPLOY_ID}"

          echo "=== Waiting for deploy ==="
          for i in $(seq 1 40); do
            sleep 20
            STATUS=$(curl -sS --max-time 15 \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "  Attempt ${i}: status = ${STATUS}"
            if [ "$STATUS" = "live" ]; then echo "✅ DEPLOY LIVE!"; exit 0; fi
            case "$STATUS" in
              build_failed|update_failed|canceled|deactivated) echo "❌ FAILED: ${STATUS}"; exit 1 ;;
            esac
          done
          echo "⏰ TIMEOUT"; exit 1

      - name: Verify health and bootstrap endpoint
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: |
          sleep 15
          echo "=== Health ==="
          curl -sS -w "\nHTTP %{http_code}\n" --max-time 30 "${PRODUCTION_BASE_URL}/actuator/health"
          echo ""
          echo "=== Bootstrap endpoint ==="
          curl -sS -w "\nHTTP %{http_code}\n" --max-time 30 \
            -X POST "${PRODUCTION_BASE_URL}/api/v1/internal/control-plane/bootstrap-admin" \
            -H "Content-Type: application/json" -d '{}'
          echo ""
          echo "=== access-check endpoint ==="
          curl -sS -w "\nHTTP %{http_code}\n" --max-time 30 \
            "${PRODUCTION_BASE_URL}/api/v1/control-plane/access-check"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/neon-create.json /tmp/env-vars.json /tmp/payload.json /tmp/render-response.json /tmp/deploy.json
