name: Backup Restore Validation

on:
  # This workflow is a required status check and must report on every pull request.
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backup-restore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  logical-backup-restore:
    name: PostgreSQL Logical Backup and Restore
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanad_source
          POSTGRES_USER: sanad_recovery
          POSTGRES_PASSWORD: recovery_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve expected schema version
        run: |
          expected_version=$(
            find apps/sanad-platform/src/main/resources/db/migration \
              -maxdepth 1 \
              -type f \
              -name 'V*__*.sql' \
              -printf '%f\n' \
            | awk -F'__' '
                NF >= 2 {
                  version = $1
                  sub(/^V/, "", version)
                  print version
                }
              ' \
            | sort -V \
            | tail -n 1
          )

          test -n "$expected_version"

          if [[ "$expected_version" == V* || "$expected_version" == *.sql ]]; then
            echo "::error::Invalid migration version resolution: filename was not normalized"
            exit 1
          fi

          if ! [[ "$expected_version" =~ ^[0-9]+([._][0-9]+)*$ ]]; then
            echo "::error::Unexpected migration version format"
            exit 1
          fi

          normalized_expected="${expected_version//_/.}"
          echo "EXPECTED_SCHEMA_VERSION=$normalized_expected" >> "$GITHUB_ENV"
          echo "Resolved expected schema version (raw): $expected_version"
          echo "Resolved expected schema version (normalized): $normalized_expected"

      - name: Verify schema version resolver regression cases
        shell: bash
        run: |
          set -euo pipefail

          resolved=$(
            printf '%s\n' \
              'V1__initial.sql' \
              'V15__previous.sql' \
              'V20260629_2__add_user_mobile_contact.sql' \
            | awk -F'__' '
                NF >= 2 {
                  version = $1
                  sub(/^V/, "", version)
                  print version
                }
              ' \
            | sort -V \
            | tail -n 1
          )

          test "$resolved" = "20260629_2"
          normalized="${resolved//_/.}"
          test "$normalized" = "20260629.2"

      - name: Apply SQL migrations to source database
        shell: bash
        run: |
          set -euo pipefail

          migration_dir="apps/sanad-platform/src/main/resources/db/migration"

          docker run --rm --network host -e PGPASSWORD=recovery_ci_only postgres:16-alpine \
            psql -h localhost -U sanad_recovery -d sanad_source -v ON_ERROR_STOP=1 \
            -c "CREATE TABLE IF NOT EXISTS flyway_schema_history (installed_rank INT PRIMARY KEY, version VARCHAR(50), description VARCHAR(200), type VARCHAR(20), script VARCHAR(1000), checksum INT, installed_by VARCHAR(100), installed_on TIMESTAMP DEFAULT NOW(), execution_time INT DEFAULT 0, success BOOLEAN NOT NULL);"

          rank=1
          while IFS= read -r file; do
            filename=$(basename "$file")
            version=${filename%%__*}
            version=${version#V}
            normalized_version=${version//_/.}
            description=${filename#*__}
            description=${description%.sql}

            already_applied=$(docker run --rm --network host -e PGPASSWORD=recovery_ci_only postgres:16-alpine \
              psql -h localhost -U sanad_recovery -d sanad_source -At \
              -c "SELECT COUNT(*) FROM flyway_schema_history WHERE version='${normalized_version}' AND success=true;" | tr -d '[:space:]')

            if [ "$already_applied" = "0" ]; then
              echo "Applying migration: $filename"
              docker run --rm --network host -e PGPASSWORD=recovery_ci_only \
                -v "$PWD/$migration_dir:/migrations:ro" postgres:16-alpine \
                psql -h localhost -U sanad_recovery -d sanad_source -v ON_ERROR_STOP=1 -f "/migrations/$filename"

              docker run --rm --network host -e PGPASSWORD=recovery_ci_only postgres:16-alpine \
                psql -h localhost -U sanad_recovery -d sanad_source -v ON_ERROR_STOP=1 \
                -c "INSERT INTO flyway_schema_history (installed_rank, version, description, type, script, installed_by, success) VALUES (${rank}, '${normalized_version}', '${description}', 'SQL', '${filename}', 'sanad_recovery', true);"
            else
              echo "Migration already applied: $filename"
            fi

            rank=$((rank + 1))
          done < <(find "$migration_dir" -maxdepth 1 -type f -name 'V*__*.sql' -printf '%p\n' | sort -V)

          actual_version=$(docker run --rm --network host -e PGPASSWORD=recovery_ci_only postgres:16-alpine \
            psql -h localhost -U sanad_recovery -d sanad_source -At \
            -c "SELECT version FROM flyway_schema_history WHERE success=true ORDER BY installed_rank DESC LIMIT 1;" | tr -d '[:space:]')

          echo "SOURCE_VERSION=$actual_version" >> "$GITHUB_ENV"
          test "$actual_version" = "$EXPECTED_SCHEMA_VERSION"

      - name: Capture source schema evidence
        run: |
          docker run --rm --network host -e PGPASSWORD=recovery_ci_only postgres:16-alpine \
            psql -h localhost -U sanad_recovery -d sanad_source -v ON_ERROR_STOP=1 \
            -c "SELECT version, success FROM flyway_schema_history ORDER BY installed_rank;" \
            -c "SELECT COUNT(*) AS application_table_count FROM information_schema.tables WHERE table_schema='public' AND table_name <> 'flyway_schema_history';"

      - name: Create compressed logical backup
        run: |
          start_epoch=$(date +%s)
          docker run --rm --network host -e PGPASSWORD=recovery_ci_only \
            -v "$PWD:/work" postgres:16-alpine \
            pg_dump -h localhost -U sanad_recovery -d sanad_source \
            --format=custom --no-owner --no-privileges --file=/work/sanad_source.dump
          echo "BACKUP_DURATION_SECONDS=$(($(date +%s)-start_epoch))" >> "$GITHUB_ENV"
          test -s sanad_source.dump

      - name: Create isolated restore database
        run: |
          docker run --rm --network host -e PGPASSWORD=recovery_ci_only postgres:16-alpine \
            psql -h localhost -U sanad_recovery -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE sanad_restore OWNER sanad_recovery;"

      - name: Restore backup and measure recovery time
        run: |
          start_epoch=$(date +%s)
          docker run --rm --network host -e PGPASSWORD=recovery_ci_only \
            -v "$PWD:/work" postgres:16-alpine \
            pg_restore -h localhost -U sanad_recovery -d sanad_restore \
            --no-owner --no-privileges --exit-on-error /work/sanad_source.dump
          echo "RESTORE_DURATION_SECONDS=$(($(date +%s)-start_epoch))" >> "$GITHUB_ENV"

      - name: Validate restored schema and migration state
        run: |
          query() {
            local db="$1" sql="$2"
            docker run --rm --network host -e PGPASSWORD=recovery_ci_only postgres:16-alpine \
              psql -h localhost -U sanad_recovery -d "$db" -At -c "$sql"
          }
          source_tables=$(query sanad_source "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name <> 'flyway_schema_history';" | tr -d '[:space:]')
          restored_tables=$(query sanad_restore "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name <> 'flyway_schema_history';" | tr -d '[:space:]')
          source_version=$(query sanad_source "SELECT version FROM flyway_schema_history WHERE success=true ORDER BY installed_rank DESC LIMIT 1;" | tr -d '[:space:]')
          restored_version=$(query sanad_restore "SELECT version FROM flyway_schema_history WHERE success=true ORDER BY installed_rank DESC LIMIT 1;" | tr -d '[:space:]')
          echo "SOURCE_VERSION=$source_version" >> "$GITHUB_ENV"
          echo "RESTORED_VERSION=$restored_version" >> "$GITHUB_ENV"
          test -n "$source_version"
          test "$source_tables" = "$restored_tables"
          test "$source_version" = "$restored_version"
          test "$source_version" = "$EXPECTED_SCHEMA_VERSION"

      - name: Write recovery evidence summary
        if: success()
        run: |
          {
            echo "## Backup and Restore Validation"
            echo ""
            echo "- Result: PASSED"
            echo "- Expected schema version: ${EXPECTED_SCHEMA_VERSION}"
            echo "- Source schema version: ${SOURCE_VERSION}"
            echo "- Restored schema version: ${RESTORED_VERSION}"
            echo "- Backup duration: ${BACKUP_DURATION_SECONDS}s"
            echo "- Restore duration: ${RESTORE_DURATION_SECONDS}s"
            echo "- Validation scope: PostgreSQL SQL migrations, logical backup, isolated restore, schema/version parity"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backup artifact for audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recovery-validation-dump
          path: sanad_source.dump
          if-no-files-found: warn
          retention-days: 1

      - name: Cleanup containers
        if: always()
        run: rm -f sanad_source.dump
