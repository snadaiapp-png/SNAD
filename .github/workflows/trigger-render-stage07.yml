name: Trigger Render Stage 07

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-render-stage07.yml'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch protected production workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run production-release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f commit_sha="$GITHUB_SHA" \
            -f pull_request_number=227 \
            -f rollback_on_failure=true
