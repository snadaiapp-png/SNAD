name: Find and Set Database URL

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'find-db' to find the Render PostgreSQL database and set DATABASE_URL"
        required: true
        default: "no"

permissions:
  contents: read

jobs:
  find-db:
    name: Find PostgreSQL database and set DATABASE_URL
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10
    steps:
      - name: Confirm
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "find-db" ]; then exit 1; fi

      - name: List all Render services to find PostgreSQL database
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          echo "=== List all services ==="
          curl -sS --max-time 30 \
            "https://api.render.com/v1/services?limit=20" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" > /tmp/services.json
          python3 -c "
          import json
          with open('/tmp/services.json') as f:
              data = json.load(f)
          if isinstance(data, list):
              for item in data:
                  svc = item.get('service', item) if isinstance(item, dict) else {}
                  sid = svc.get('id', '?')
                  name = svc.get('name', '?')
                  stype = svc.get('type', '?')
                  status = svc.get('status', '?')
                  print(f'  id={sid[:20]}  name={name}  type={stype}  status={status}')
          "

      - name: Find PostgreSQL database service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          echo "=== Looking for PostgreSQL database services ==="
          DB_SERVICE_ID=$(python3 -c "
          import json
          with open('/tmp/services.json') as f:
              data = json.load(f)
          if isinstance(data, list):
              for item in data:
                  svc = item.get('service', item) if isinstance(item, dict) else {}
                  if svc.get('type') == 'psql':
                      print(svc.get('id', ''))
                      break
          ")
          echo "PostgreSQL service ID: ${DB_SERVICE_ID}"
          echo "db_service_id=${DB_SERVICE_ID}" >> "$GITHUB_ENV"

          if [ -z "${DB_SERVICE_ID}" ]; then
            echo "No PostgreSQL database service found!"
            echo "The operator must create a PostgreSQL database in Render and link it to sanad-backend."
            exit 1
          fi

      - name: Get PostgreSQL connection string
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          DB_SERVICE_ID="${{ env.db_service_id }}"
          echo "=== Fetching PostgreSQL database details ==="
          curl -sS --max-time 30 \
            "https://api.render.com/v1/services/${DB_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" > /tmp/db-service.json
          python3 -c "
          import json
          with open('/tmp/db-service.json') as f:
              d = json.load(f)
          # Print only non-sensitive fields
          print(f'  name: {d.get(\"name\")}')
          print(f'  type: {d.get(\"type\")}')
          print(f'  status: {d.get(\"status\")}')
          print(f'  region: {d.get(\"region\")}')
          print(f'  plan: {d.get(\"plan\")}')
          # The connection string is in d.get('connectionInfo', {})
          ci = d.get('connectionInfo', {})
          if ci:
              # Don't print the actual connection string — just that it exists
              has_url = bool(ci.get('databaseUrl') or ci.get('psqlConnectionString'))
              print(f'  has connection string: {has_url}')
              # Print host only (not credentials)
              host = ci.get('host', ci.get('hostname', ''))
              if host:
                  print(f'  host: {host}')
              port = ci.get('port', '')
              if port:
                  print(f'  port: {port}')
              dbname = ci.get('database', ci.get('dbname', ''))
              if dbname:
                  print(f'  database: {dbname}')
          else:
              print('  no connectionInfo found')
          " 2>/dev/null || echo "(could not parse db-service.json)"

      - name: Get database env vars (to find DATABASE_URL value)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          DB_SERVICE_ID="${{ env.db_service_id }}"
          echo "=== Fetching database env vars ==="
          curl -sS --max-time 30 \
            "https://api.render.com/v1/services/${DB_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" > /tmp/db-env-vars.json
          python3 -c "
          import json
          with open('/tmp/db-env-vars.json') as f:
              data = json.load(f)
          if isinstance(data, list):
              for item in data:
                  ev = item.get('envVar', item) if isinstance(item, dict) else {}
                  key = ev.get('key', '') if isinstance(ev, dict) else ''
                  val = ev.get('value', '') if isinstance(ev, dict) else ''
                  if key:
                      # Don't print the full value if it looks like a connection string
                      if 'URL' in key.upper() or 'CONNECT' in key.upper():
                          print(f'  {key}: (value exists, length={len(val)})')
                      else:
                          print(f'  {key}: {val}')
          "

      - name: Get the full connection string and set it on sanad-backend
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          DB_SERVICE_ID="${{ env.db_service_id }}"
          echo "=== Getting connection string from database service ==="
          # The connection string is in the service detail's connectionInfo
          CONNECTION_STRING=$(python3 -c "
          import json
          with open('/tmp/db-service.json') as f:
              d = json.load(f)
          ci = d.get('connectionInfo', {})
          url = ci.get('databaseUrl') or ci.get('psqlConnectionString') or ci.get('connectionString') or ''
          print(url)
          ")
          
          if [ -z "${CONNECTION_STRING}" ]; then
            echo "No connection string found in connectionInfo. Trying env vars..."
            CONNECTION_STRING=$(python3 -c "
            import json
            with open('/tmp/db-env-vars.json') as f:
                data = json.load(f)
            if isinstance(data, list):
                for item in data:
                    ev = item.get('envVar', item) if isinstance(item, dict) else {}
                    key = ev.get('key', '') if isinstance(ev, dict) else ''
                    val = ev.get('value', '') if isinstance(ev, dict) else ''
                    if key == 'DATABASE_URL' and val:
                        print(val)
                        break
            ")
          fi

          if [ -z "${CONNECTION_STRING}" ]; then
            echo "ERROR: Could not find the PostgreSQL connection string."
            echo "The operator must manually copy it from the Render PostgreSQL database dashboard."
            exit 1
          fi

          echo "Found connection string (length: ${#CONNECTION_STRING}, not displayed for security)"
          echo "=== Setting DATABASE_URL on sanad-backend ==="

          # Fetch existing env vars from sanad-backend
          curl -sS --max-time 30 \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" > /tmp/backend-env-vars.json

          # Build updated payload with DATABASE_URL set to the real connection string
          python3 - <<PYEOF > /tmp/payload.json
          import json
          with open('/tmp/backend-env-vars.json') as f:
              data = json.load(f)
          items = []
          found = False
          conn_string = """${CONNECTION_STRING}"""
          if isinstance(data, list):
              for item in data:
                  ev = item.get('envVar', item) if isinstance(item, dict) else {}
                  key = ev.get('key', '') if isinstance(ev, dict) else ''
                  val = ev.get('value', '') if isinstance(ev, dict) else ''
                  if not key:
                      continue
                  if key == 'DATABASE_URL':
                      items.append({'key': key, 'value': conn_string})
                      found = True
                  else:
                      items.append({'key': key, 'value': val})
          if not found:
              items.append({'key': 'DATABASE_URL', 'value': conn_string})
          print(json.dumps(items))
          PYEOF

          echo "=== PUTting updated env vars on sanad-backend ==="
          STATUS=$(curl -sS -o /tmp/render-response.json -w "%{http_code}" \
            --max-time 60 \
            -X PUT "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data @/tmp/payload.json)
          echo "PUT returned HTTP ${STATUS}"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ]; then
            echo "Failed! Response:"
            cat /tmp/render-response.json
            exit 1
          fi
          echo "✅ DATABASE_URL set on sanad-backend with real PostgreSQL connection string"

      - name: Trigger deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "=== Triggering deploy ==="
          HTTP_STATUS=$(curl -sS -o /tmp/deploy.json -w "%{http_code}" --max-time 30 \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Deploy trigger HTTP ${HTTP_STATUS}"
          DEPLOY_ID=$(python3 -c "import json; print(json.load(open('/tmp/deploy.json')).get('id',''))" 2>/dev/null || echo "")
          echo "Deploy ID: ${DEPLOY_ID}"
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_ENV"

      - name: Wait for deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          DEPLOY_ID="${{ env.deploy_id }}"
          for i in $(seq 1 30); do
            sleep 20
            STATUS=$(curl -sS --max-time 15 \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "  Attempt ${i}: status = ${STATUS}"
            if [ "$STATUS" = "live" ]; then echo "✅ LIVE!"; exit 0; fi
            case "$STATUS" in
              build_failed|update_failed|canceled|deactivated) echo "❌ FAILED: ${STATUS}"; exit 1 ;;
            esac
          done
          echo "⏰ TIMEOUT"; exit 1

      - name: Verify health
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: |
          sleep 15
          echo "=== Health ==="
          curl -sS -w "\nHTTP %{http_code}\n" --max-time 30 "${PRODUCTION_BASE_URL}/actuator/health"
          echo "=== Bootstrap ==="
          curl -sS -w "\nHTTP %{http_code}\n" --max-time 30 \
            -X POST "${PRODUCTION_BASE_URL}/api/v1/internal/control-plane/bootstrap-admin" \
            -H "Content-Type: application/json" -d '{}'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/services.json /tmp/db-service.json /tmp/db-env-vars.json /tmp/backend-env-vars.json /tmp/payload.json /tmp/render-response.json /tmp/deploy.json
