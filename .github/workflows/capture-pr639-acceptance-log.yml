name: Capture PR639 Acceptance Progress

on:
  push:
    branches:
      - diag/crm007-run-status
    paths:
      - .github/workflows/capture-pr639-acceptance-log.yml

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/crm007-run-status
      - name: Capture sanitized acceptance log tail
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '88613930596'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/diagnostics
          curl --fail-with-body --silent --show-error --location --max-time 120 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            > "$RUNNER_TEMP/acceptance.log"
          python3 - <<'PY'
          from pathlib import Path
          text = Path('/home/runner/work/_temp/acceptance.log').read_text(encoding='utf-8-sig', errors='replace')
          lines = []
          for line in text.splitlines()[-500:]:
              lowered = line.lower()
              if any(word in lowered for word in ('password', 'authorization:', 'cookie:', 'secret', 'token:')):
                  continue
              lines.append(line.replace('::add-mask::', 'MASKED:'))
          Path('evidence/diagnostics/pr639-acceptance-log-tail.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evidence/diagnostics/pr639-acceptance-log-tail.txt
          git commit -m 'docs(diag): record PR639 acceptance progress'
          git push origin HEAD:diag/crm007-run-status
