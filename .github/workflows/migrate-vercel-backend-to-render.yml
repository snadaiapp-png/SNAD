name: Migrate Vercel Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/migrate-vercel-backend-to-render.yml
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  statuses: write

concurrency:
  group: migrate-vercel-backend-to-render
  cancel-in-progress: true

jobs:
  migrate:
    name: Purge tunnel variables, redeploy, and verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    env:
      PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
      PRODUCTION_BACKEND_BASE_URL: https://sanad-backend-mcrj.onrender.com
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      GH_TOKEN: ${{ github.token }}
      CI: '1'

    steps:
      - name: Checkout exact main SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Mark purge verification pending
        shell: bash
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='vercel/ngrok-purge' \
            -f description='Purging Vercel tunnel variables and verifying Render routing'

      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID GH_TOKEN; do
            test -n "${!name:-}" || { echo "::error::Missing Production secret or token: $name"; exit 1; }
            echo "::add-mask::${!name}"
          done
          test "$PRODUCTION_WEB_BASE_URL" = 'https://snad-app.vercel.app'
          test "$PRODUCTION_BACKEND_BASE_URL" = 'https://sanad-backend-mcrj.onrender.com'

      - name: Eliminate legacy GitHub backend variables
        shell: bash
        run: |
          set -euo pipefail

          gh variable set PRODUCTION_BASE_URL --body "$PRODUCTION_BACKEND_BASE_URL"
          gh variable set PRODUCTION_BACKEND_BASE_URL --body "$PRODUCTION_BACKEND_BASE_URL"

          for scope in Production production; do
            if gh variable list --env "$scope" >/dev/null 2>&1; then
              gh variable set PRODUCTION_BASE_URL --env "$scope" --body "$PRODUCTION_BACKEND_BASE_URL"
              gh variable set PRODUCTION_BACKEND_BASE_URL --env "$scope" --body "$PRODUCTION_BACKEND_BASE_URL"
            fi
          done

      - name: Link exact Vercel project
        shell: bash
        run: |
          set -euo pipefail
          npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Purge ngrok-compatible Vercel configuration
        shell: bash
        run: |
          set -euo pipefail

          for environment in production preview; do
            printf '%s\n' "$PRODUCTION_BACKEND_BASE_URL" | \
              npx --yes vercel@latest env update BACKEND_API_BASE_URL "$environment" --yes --token "$VERCEL_TOKEN"
          done

          for environment in production preview development; do
            npx --yes vercel@latest env rm NEXT_PUBLIC_API_BASE_URL "$environment" --yes --token "$VERCEL_TOKEN" || true
          done

      - name: Verify persisted Vercel environment values
        shell: bash
        run: |
          set -euo pipefail

          for environment in production preview; do
            env_file="$RUNNER_TEMP/vercel-${environment}.env"
            npx --yes vercel@latest env pull "$env_file" --yes --environment="$environment" --token "$VERCEL_TOKEN"

            grep -Eq '^BACKEND_API_BASE_URL="?https://sanad-backend-mcrj\.onrender\.com"?$' "$env_file"
            ! grep -Eq '^NEXT_PUBLIC_API_BASE_URL=' "$env_file"
            ! grep -Eqi 'ngrok|localhost|127\.0\.0\.1' "$env_file"
            rm -f "$env_file"
          done

      - name: Force a fresh Vercel Production deployment
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="$(npx --yes vercel@latest deploy --prod --force --yes --token "$VERCEL_TOKEN" | tail -n 1)"
          [[ "$DEPLOYMENT_URL" == https://*.vercel.app ]] || {
            echo "::error::Vercel CLI did not return a production deployment URL"
            exit 1
          }
          echo "deployment_id=vercel-cli" >> "$GITHUB_OUTPUT"
          echo "deployment_url=${DEPLOYMENT_URL#https://}" >> "$GITHUB_OUTPUT"

      - name: Verify Render and the Vercel BFF route
        shell: bash
        run: |
          set -euo pipefail

          DIRECT_CODE="$(curl --silent --show-error --max-time 30 -o "$RUNNER_TEMP/render-health.json" -w '%{http_code}' "${PRODUCTION_BACKEND_BASE_URL}/actuator/health")"
          test "$DIRECT_CODE" = "200"
          jq -e '.status == "UP"' "$RUNNER_TEMP/render-health.json" >/dev/null

          STATUS_CODE="000"
          BFF_CODE="000"
          for attempt in $(seq 1 36); do
            STATUS_CODE="$(curl --silent --show-error --max-time 30 -o "$RUNNER_TEMP/backend-status.json" -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/system/backend-status" || true)"
            BFF_CODE="$(curl --silent --show-error --max-time 30 -o "$RUNNER_TEMP/auth-me.json" -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/platform/api/v1/auth/me" || true)"
            if [ "$STATUS_CODE" = "200" ] && [ "$BFF_CODE" = "401" ] && \
               jq -e '.configured == true and .reachable == true and .statusCode == 200 and has("targetHost") == false' "$RUNNER_TEMP/backend-status.json" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          test "$STATUS_CODE" = "200"
          jq -e '.configured == true and .reachable == true and .statusCode == 200 and has("targetHost") == false' "$RUNNER_TEMP/backend-status.json" >/dev/null
          test "$BFF_CODE" = "401"
          ! grep -Eqi 'ngrok|localhost|127\.0\.0\.1' "$RUNNER_TEMP/backend-status.json" "$RUNNER_TEMP/auth-me.json"

      - name: Publish migration summary
        if: success()
        shell: bash
        run: |
          {
            echo '## Vercel tunnel configuration eliminated'
            echo ''
            echo "- Release SHA: \`${GITHUB_SHA}\`"
            echo "- Deployment ID: \`${{ steps.deploy.outputs.deployment_id }}\`"
            echo "- Deployment URL: \`${{ steps.deploy.outputs.deployment_url }}\`"
            echo '- Production BACKEND_API_BASE_URL: **Render-pinned**'
            echo '- Preview BACKEND_API_BASE_URL: **Render-pinned**'
            echo '- NEXT_PUBLIC_API_BASE_URL: **removed from Production, Preview, and Development**'
            echo '- Persisted Vercel environment verification: **PASS**'
            echo '- Render health: **UP**'
            echo '- Vercel BFF routing: **PASS**'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark purge verification successful
        if: success()
        shell: bash
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='success' \
            -f context='vercel/ngrok-purge' \
            -f description='Vercel Production and Preview are Render-only; tunnel variables removed'

      - name: Mark purge verification failed
        if: failure()
        shell: bash
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='failure' \
            -f context='vercel/ngrok-purge' \
            -f description='Vercel tunnel purge or Render routing verification failed'
