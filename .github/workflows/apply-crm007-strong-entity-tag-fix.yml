name: Finalize CRM-007 Strong Entity Tag Fix

on:
  push:
    branches:
      - fix/crm007-strong-entity-tag-transport
    paths:
      - .github/workflows/apply-crm007-strong-entity-tag-fix.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/crm007-strong-entity-tag-transport
          fetch-depth: 0

      - name: Make entity tags statically non-null and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/web/e2e/crm-007-production-closure.spec.ts")
          text = path.read_text()
          replacements = {
              'const addressEtag = addressHeaders["x-snad-entity-tag"];':
                  'const addressEtag = addressHeaders["x-snad-entity-tag"] ?? "";',
              'const updatedAddressEtag = updatedAddressHeaders["x-snad-entity-tag"];':
                  'const updatedAddressEtag = updatedAddressHeaders["x-snad-entity-tag"] ?? "";',
              'const communicationEtag = communicationHeaders["x-snad-entity-tag"];':
                  'const communicationEtag = communicationHeaders["x-snad-entity-tag"] ?? "";',
              'expect(addressEtag?.startsWith("W/")).toBe(false);':
                  'expect(addressEtag.startsWith("W/")).toBe(false);',
              'expect(updatedAddressEtag?.startsWith("W/")).toBe(false);':
                  'expect(updatedAddressEtag.startsWith("W/")).toBe(false);',
              'expect(communicationEtag?.startsWith("W/")).toBe(false);':
                  'expect(communicationEtag.startsWith("W/")).toBe(false);',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match for {old!r}, found {count}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY

          git rm .github/workflows/apply-crm007-strong-entity-tag-fix.yml
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/e2e/crm-007-production-closure.spec.ts
          git commit -m 'test(crm): require non-weak entity tag transport'
          git push origin HEAD:fix/crm007-strong-entity-tag-transport
