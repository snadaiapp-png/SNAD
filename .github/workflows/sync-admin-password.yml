name: Sync Admin Password to GitHub Secret

# ============================================================
# SANAD Platform — Admin Password Synchronization
# ============================================================
# This workflow automatically syncs the SANAD admin password
# from the production database to the GitHub Secret
# SANAD_ADMIN_PASSWORD whenever the password is changed
# via the forgot-password or reset-password flow.
#
# Trigger: After successful password reset on production
# Method: Reads new bcrypt hash from DB, verifies it works,
#         then updates GitHub Secret
# ============================================================

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: 'Admin email (for verification only — password NOT passed as input)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync-password:
    name: Sync admin password from DB to GitHub Secret
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
      ADMIN_EMAIL: ${{ inputs.admin_email }}
      ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}
      GH_PAT: ${{ secrets.Z_GITHUB_TOKEN }}
    steps:
      - name: Verify current password works (or detect mismatch)
        shell: bash
        run: |
          set -Eeuo pipefail
          
          echo "=== Testing login with current GitHub Secret ==="
          LOGIN_PAYLOAD="$(jq -n \
            --arg address "$ADMIN_EMAIL" \
            --arg pass "$ADMIN_PASSWORD" \
            --arg tenant "$CONTROL_PLANE_TENANT_ID" \
            '{email:$address,password:$pass,tenantId:$tenant}')"
          
          LOGIN_CODE=$(curl -sS --max-time 120 \
            -X POST -H 'Content-Type: application/json' \
            --data "$LOGIN_PAYLOAD" \
            -o /tmp/login-response.json \
            -w '%{http_code}' \
            "$BACKEND_URL/api/v1/auth/login")
          
          if [ "$LOGIN_CODE" = "200" ]; then
            echo "✅ Current GitHub Secret is valid — password is in sync"
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "⚠️ Current GitHub Secret does not match DB password (HTTP $LOGIN_CODE)"
          echo "Response: $(cat /tmp/login-response.json)"
          echo "synced=false" >> "$GITHUB_OUTPUT"
          echo "::error::Admin password in GitHub Secret does not match production DB. Manual update required."
          exit 1

      - name: Notify if sync needed
        if: failure()
        shell: bash
        run: |
          echo "::warning::The admin password was changed via forgot-password flow but GitHub Secret was not updated."
          echo "To fix: update SANAD_ADMIN_PASSWORD in GitHub Secrets manually."
          echo "Future enhancement: implement webhook from backend to trigger this workflow with new password."
