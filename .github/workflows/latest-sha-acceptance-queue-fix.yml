name: Latest SHA Acceptance Queue Fix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/latest-sha-acceptance-queue-fix.yml'

permissions:
  contents: write

jobs:
  update-concurrency:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run only acceptance for latest SHA
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          paths = [
              Path('.github/workflows/crm-authenticated-acceptance.yml'),
              Path('.github/workflows/playwright-ci.yml'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if text.count('cancel-in-progress: false') != 1:
                  raise SystemExit(f'Unexpected concurrency configuration in {path}')
              path.write_text(text.replace('cancel-in-progress: false', 'cancel-in-progress: true'), encoding='utf-8')
          PY
          git diff --check
          git config user.name 'snad-ci-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/crm-authenticated-acceptance.yml .github/workflows/playwright-ci.yml
          git commit -m 'ci: prioritize acceptance for latest PR head'
          git push origin HEAD:${{ github.head_ref }}
