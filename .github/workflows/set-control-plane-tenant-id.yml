# ============================================================
# SANAD Platform — Set Control Plane Tenant ID in Render
# ------------------------------------------------------------
# Uses BOOTSTRAP_TENANT_ID from GitHub production secrets
# and sets it as SANAD_CONTROL_PLANE_TENANT_ID in Render.
# Setting env vars on Render triggers an automatic deploy.
# ============================================================

name: Set Control Plane Tenant ID

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "set" to confirm'
        required: true
        default: ''
        type: string

permissions:
  contents: read

jobs:
  set-control-plane-tenant:
    name: Set SANAD_CONTROL_PLANE_TENANT_ID in Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    if: github.event.inputs.confirm == 'set'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}

    steps:
      - name: Validate prerequisites
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID CONTROL_PLANE_TENANT_ID; do
            test -n "${!name:-}" || { echo "::error::$name is required"; exit 1; }
          done
          [[ "$CONTROL_PLANE_TENANT_ID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$ ]] || {
            echo "::error::CONTROL_PLANE_TENANT_ID is not a valid UUID"
            exit 1
          }
          echo "All prerequisites validated. Tenant UUID is valid."

      - name: Set SANAD_CONTROL_PLANE_TENANT_ID in Render
        shell: bash
        run: |
          set -euo pipefail
          echo "Setting SANAD_CONTROL_PLANE_TENANT_ID in Render..."
          
          # Get current env vars
          CURRENT_ENV=$(curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          
          # Update or add SANAD_CONTROL_PLANE_TENANT_ID
          NEW_ENV=$(echo "$CURRENT_ENV" | jq --arg tenantId "$CONTROL_PLANE_TENANT_ID" \
            'map(if .key == "SANAD_CONTROL_PLANE_TENANT_ID" then .value = $tenantId else . end) + 
             (if any(.key == "SANAD_CONTROL_PLANE_TENANT_ID") then [] else [{"key": "SANAD_CONTROL_PLANE_TENANT_ID", "value": $tenantId}] end)')
          
          # Push updated env vars — this triggers an automatic deploy on Render
          HTTP_CODE=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "$NEW_ENV" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          
          echo "Render PUT env-vars HTTP status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Failed to set env var in Render (HTTP $HTTP_CODE)"
            exit 1
          fi
          
          echo "::notice::SANAD_CONTROL_PLANE_TENANT_ID set in Render successfully."
          echo "Render will automatically deploy with the new env var."

      - name: Wait for automatic deploy and verify health
        shell: bash
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
        run: |
          set -euo pipefail
          echo "Waiting 60s for Render to start automatic deploy..."
          sleep 60
          
          echo "Checking backend health at $BACKEND_URL..."
          for i in $(seq 1 20); do
            sleep 30
            HTTP_CODE=$(curl --silent --output /tmp/health.json --write-out '%{http_code}' \
              --max-time 30 "${BACKEND_URL}/actuator/health" || true)
            
            echo "[$i] HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/health.json)
              echo "Status: $STATUS"
              if [ "$STATUS" = "UP" ]; then
                echo "::notice::Backend is UP after env var update!"
                exit 0
              fi
            fi
          done
          echo "::warning::Backend health check did not return UP within 10 minutes."
          echo "The env var was set successfully. Render may still be deploying."
          echo "Check Render dashboard for deploy status."
          exit 0
