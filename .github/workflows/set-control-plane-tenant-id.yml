# ============================================================
# SANAD Platform — Set Control Plane Tenant ID in Render
# ------------------------------------------------------------
# Uses BOOTSTRAP_TENANT_ID from GitHub production secrets
# and sets it as SANAD_CONTROL_PLANE_TENANT_ID in Render.
# ============================================================

name: Set Control Plane Tenant ID

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "set" to confirm'
        required: true
        default: ''
        type: string

permissions:
  contents: read

jobs:
  set-control-plane-tenant:
    name: Set SANAD_CONTROL_PLANE_TENANT_ID in Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    if: github.event.inputs.confirm == 'set'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}

    steps:
      - name: Validate prerequisites
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID CONTROL_PLANE_TENANT_ID; do
            test -n "${!name:-}" || { echo "::error::$name is required"; exit 1; }
          done
          
          # Validate UUID format
          [[ "$CONTROL_PLANE_TENANT_ID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$ ]] || {
            echo "::error::CONTROL_PLANE_TENANT_ID is not a valid UUID"
            exit 1
          }
          
          echo "All prerequisites validated. Tenant UUID is valid."

      - name: Set SANAD_CONTROL_PLANE_TENANT_ID in Render
        shell: bash
        run: |
          set -euo pipefail
          echo "Setting SANAD_CONTROL_PLANE_TENANT_ID in Render..."
          
          # Get current env vars
          echo "Render API response code: $(echo "$CURRENT_ENV" | jq -r "if type == "array" then "OK" else .message // .error // "unknown" end" 2>/dev/null || echo "parse error")"
          CURRENT_ENV=$(curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          
          # Update or add SANAD_CONTROL_PLANE_TENANT_ID
          NEW_ENV=$(echo "$CURRENT_ENV" | jq --arg tenantId "$CONTROL_PLANE_TENANT_ID" \
            'map(if .key == "SANAD_CONTROL_PLANE_TENANT_ID" then .value = $tenantId else . end) + 
             (if any(.key == "SANAD_CONTROL_PLANE_TENANT_ID") then [] else [{"key": "SANAD_CONTROL_PLANE_TENANT_ID", "value": $tenantId}] end)')
          
          # Push updated env vars
          curl --silent --show-error \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "$NEW_ENV" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" > /dev/null
          
          echo "Render env vars updated successfully."

      - name: Trigger new deploy
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggering deploy on Render..."
          
          DEPLOY_RESPONSE=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{"clearCache": false}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          
          DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.id // empty')
          test -n "$DEPLOY_ID" || { echo "::error::Failed to trigger deploy"; exit 1; }
          
          echo "Deploy triggered: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for deploy to go live
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for deploy $DEPLOY_ID..."
          
          for i in $(seq 1 40); do
            sleep 30
            STATUS=$(curl --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status // empty')
            
            echo "[$i] Deploy status: $STATUS"
            
            case "$STATUS" in
              live) echo "::notice::Deploy is live!"; exit 0 ;;
              build_failed|update_failed|canceled|deactivated) echo "::error::Deploy failed: $STATUS"; exit 1 ;;
            esac
          done
          echo "::warning::Deploy did not complete in 20 minutes."
          exit 1

      - name: Verify backend health
        shell: bash
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
        run: |
          set -euo pipefail
          echo "Verifying backend health at $BACKEND_URL..."
          
          for i in $(seq 1 12); do
            sleep 15
            HTTP_CODE=$(curl --silent --output /tmp/health.json --write-out '%{http_code}' \
              --max-time 30 "${BACKEND_URL}/actuator/health" || true)
            
            echo "[$i] HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/health.json)
              echo "Status: $STATUS"
              test "$STATUS" = "UP" && { echo "::notice::Backend is UP!"; exit 0; }
            fi
          done
          echo "::error::Backend health check failed"
          exit 1
