name: Set Control Plane Tenant ID

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "set" to confirm'
        required: true
        default: ''
        type: string

permissions:
  contents: read

jobs:
  set-control-plane-tenant:
    name: Validate and set SANAD_CONTROL_PLANE_TENANT_ID
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    if: github.event.inputs.confirm == 'set'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.SANAD_CONTROL_PLANE_TENANT_ID }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}

    steps:
      - name: Checkout production contract
        uses: actions/checkout@v4

      - name: Validate protected prerequisites
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID CONTROL_PLANE_TENANT_ID PRODUCTION_DATABASE_URL DATABASE_USERNAME DATABASE_PASSWORD BACKEND_URL; do
            test -n "${!name:-}" || { echo "::error::$name is required"; exit 1; }
          done
          [[ "$BACKEND_URL" == https://* ]]
          echo "::add-mask::$CONTROL_PLANE_TENANT_ID"

      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client >/dev/null

      - name: Verify Control Plane tenant in production database
        shell: bash
        run: bash scripts/production/verify-control-plane-tenant.sh

      - name: Update Render environment and verify read-back
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/render-current.json /tmp/render-flat.json /tmp/render-updated.json /tmp/render-response.json /tmp/render-verify.json /tmp/render-verify-flat.json' EXIT

          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            > /tmp/render-current.json

          [ "$(jq 'length' /tmp/render-current.json)" -lt 100 ] || {
            echo "::error::Cannot prove complete Render environment pagination."
            exit 1
          }

          jq '[.[]? | (.envVar // .) | {key, value}] | sort_by(.key)' \
            /tmp/render-current.json > /tmp/render-flat.json

          previous_count=$(jq 'length' /tmp/render-flat.json)
          jq --arg tenant "$CONTROL_PLANE_TENANT_ID" '
            map(select(.key != "SANAD_CONTROL_PLANE_TENANT_ID"))
            + [{key:"SANAD_CONTROL_PLANE_TENANT_ID",value:$tenant}]
            | sort_by(.key)
          ' /tmp/render-flat.json > /tmp/render-updated.json

          [ "$(jq 'length' /tmp/render-updated.json)" -ge "$previous_count" ] || {
            echo "::error::Render environment keys would be removed."
            exit 1
          }

          status=$(curl --silent --show-error \
            --output /tmp/render-response.json \
            --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --data @/tmp/render-updated.json \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")

          case "$status" in
            200|201|202) ;;
            *) echo "::error::Render environment update failed with HTTP $status"; exit 1 ;;
          esac

          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            > /tmp/render-verify.json
          jq '[.[]? | (.envVar // .) | {key, value}] | sort_by(.key)' \
            /tmp/render-verify.json > /tmp/render-verify-flat.json

          jq -e --arg tenant "$CONTROL_PLANE_TENANT_ID" '
            any(.[]; .key == "SANAD_CONTROL_PLANE_TENANT_ID" and .value == $tenant)
          ' /tmp/render-verify-flat.json >/dev/null || {
            echo "::error::Control Plane tenant read-back verification failed."
            exit 1
          }

          jq -e --slurpfile verified /tmp/render-verify-flat.json '
            all(.[]; .key as $key | any($verified[0][]; .key == $key))
          ' /tmp/render-flat.json >/dev/null || {
            echo "::error::Render environment key preservation failed."
            exit 1
          }

          echo "SANAD_CONTROL_PLANE_TENANT_ID: VERIFIED"
          echo "Render environment key preservation: VERIFIED"

      - name: Verify backend health after update
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            status=$(curl --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              --output /tmp/health.json --write-out '%{http_code}' \
              "${BACKEND_URL%/}/actuator/health" || true)
            if [ "$status" = "200" ] && jq -e '.status == "UP"' /tmp/health.json >/dev/null 2>&1; then
              echo "Backend health: UP"
              exit 0
            fi
            echo "Health attempt $attempt/24 returned HTTP ${status:-000}."
            sleep 15
          done
          echo "::error::Backend did not become healthy after the Render environment update."
          exit 1
