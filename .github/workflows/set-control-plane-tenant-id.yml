# ============================================================
# SANAD Platform — Set Control Plane Tenant ID in Render
# ------------------------------------------------------------
# This workflow:
# 1. Connects to production database using the full JDBC URL
# 2. Finds a valid Control Plane tenant (first ACTIVE tenant with ADMIN role)
# 3. Sets SANAD_CONTROL_PLANE_TENANT_ID in Render via Render API
# 4. Triggers a new deploy to apply the env var change
# ============================================================

name: Set Control Plane Tenant ID

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "set" to confirm'
        required: true
        default: ''
        type: string

permissions:
  contents: read

jobs:
  set-control-plane-tenant:
    name: Set SANAD_CONTROL_PLANE_TENANT_ID in Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    if: github.event.inputs.confirm == 'set'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}

    steps:
      - name: Validate prerequisites
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID PRODUCTION_DATABASE_URL DATABASE_USERNAME DATABASE_PASSWORD; do
            test -n "${!name:-}" || { echo "::error::$name is required"; exit 1; }
          done
          echo "All prerequisites validated."

      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client jq curl > /dev/null 2>&1
          echo "PostgreSQL client installed."

      - name: Find valid Control Plane tenant
        shell: bash
        run: |
          set -euo pipefail
          
          # Convert JDBC URL to psql-compatible connection string
          # Input:  jdbc:postgresql://host:port/dbname?params
          # Output: host=host port=port dbname=dbname
          RAW_URL="$PRODUCTION_DATABASE_URL"
          # Strip jdbc: prefix
          RAW_URL="${RAW_URL#jdbc:}"
          # Strip postgresql:// prefix
          RAW_URL="${RAW_URL#postgresql://}"
          # Extract host:port (everything before first /)
          HOST_PORT="${RAW_URL%%/*}"
          # Extract dbname (everything after first /, before ?)
          DB_PART="${RAW_URL#*/}"
          DB_NAME="${DB_PART%%\?*}"
          PGHOST="${HOST_PORT%%:*}"
          PGPORT="${HOST_PORT#*:}"
          PGPORT="${PGPORT:-5432}"
          
          echo "Connecting to: host=$PGHOST port=$PGPORT dbname=$DB_NAME"
          
          TENANT_ID=$(PGPASSWORD="$DATABASE_PASSWORD" psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$DB_NAME" -t -A -c "
            SELECT t.id::text
            FROM tenants t
            WHERE t.status = 'ACTIVE'
            AND EXISTS (
              SELECT 1 FROM roles r
              WHERE r.tenant_id = t.id
              AND r.code = 'ADMIN'
              AND r.status = 'ACTIVE'
            )
            AND EXISTS (
              SELECT 1 FROM users u
              WHERE u.tenant_id = t.id
              AND u.status = 'ACTIVE'
            )
            ORDER BY t.created_at ASC
            LIMIT 1
          " 2>&1) || {
            echo "::error::Failed to query production database for Control Plane tenant"
            echo "Output: $TENANT_ID"
            exit 1
          }
          
          # Validate it's a UUID
          [[ "$TENANT_ID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$ ]] || {
            echo "::error::Queried tenant ID is not a valid UUID: $TENANT_ID"
            exit 1
          }
          
          echo "Found valid Control Plane tenant UUID (masked for security)"
          echo "CONTROL_PLANE_TENANT_ID=$TENANT_ID" >> $GITHUB_ENV

      - name: Set SANAD_CONTROL_PLANE_TENANT_ID in Render
        shell: bash
        run: |
          set -euo pipefail
          
          echo "Setting SANAD_CONTROL_PLANE_TENANT_ID in Render..."
          
          # First, get current env vars
          CURRENT_ENV=$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          
          # Build the new env var list: update existing or add new
          NEW_ENV=$(echo "$CURRENT_ENV" | jq --arg tenantId "$CONTROL_PLANE_TENANT_ID" \
            'map(if .key == "SANAD_CONTROL_PLANE_TENANT_ID" then .value = $tenantId else . end) + 
             (if any(.key == "SANAD_CONTROL_PLANE_TENANT_ID") then [] else [{"key": "SANAD_CONTROL_PLANE_TENANT_ID", "value": $tenantId}] end)')
          
          # Update env vars via Render API
          curl --fail-with-body --silent --show-error \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "$NEW_ENV" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" > /dev/null
          
          echo "Render env vars updated."

      - name: Trigger new deploy
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggering deploy on Render..."
          
          DEPLOY_RESPONSE=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{"clearCache": false}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          
          DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.id // empty')
          test -n "$DEPLOY_ID" || { echo "::error::Failed to trigger deploy"; exit 1; }
          
          echo "Deploy triggered: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for deploy to go live
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for deploy $DEPLOY_ID..."
          
          for i in $(seq 1 40); do
            sleep 30
            STATUS=$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status // empty')
            
            echo "[$i] Deploy status: $STATUS"
            
            case "$STATUS" in
              live) echo "::notice::Deploy is live!"; exit 0 ;;
              build_failed|update_failed|canceled|deactivated) echo "::error::Deploy failed: $STATUS"; exit 1 ;;
            esac
          done
          echo "::warning::Deploy did not complete in 20 minutes."
          exit 1

      - name: Verify backend health
        shell: bash
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
        run: |
          set -euo pipefail
          echo "Verifying backend health at $BACKEND_URL..."
          
          for i in $(seq 1 12); do
            sleep 15
            HTTP_CODE=$(curl --silent --output /tmp/health.json --write-out '%{http_code}' \
              --max-time 30 "${BACKEND_URL}/actuator/health" || true)
            
            echo "[$i] HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/health.json)
              echo "Status: $STATUS"
              test "$STATUS" = "UP" && { echo "::notice::Backend is UP!"; exit 0; }
            fi
          done
          echo "::error::Backend health check failed"
          exit 1
