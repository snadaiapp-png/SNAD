name: Set Flyway Validate False on Render

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'set-flyway' to disable Flyway validation on Render"
        required: true
        default: "no"

permissions:
  contents: read

jobs:
  set-env:
    name: Set FLYWAY_VALIDATE_ON_MIGRATE=false on Render
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 5
    steps:
      - name: Confirm
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "set-flyway" ]; then exit 1; fi

      - name: Set FLYWAY_VALIDATE_ON_MIGRATE=false on Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "=== Fetch existing env vars ==="
          curl -sS --max-time 30 \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" > /tmp/env-vars.json

          python3 - <<'PY' > /tmp/payload.json
          import json
          with open('/tmp/env-vars.json') as f:
              data = json.load(f)
          items = []
          added = False
          if isinstance(data, list):
              for item in data:
                  ev = item.get('envVar', item) if isinstance(item, dict) else {}
                  key = ev.get('key', '') if isinstance(ev, dict) else ''
                  val = ev.get('value', '') if isinstance(ev, dict) else ''
                  if not key:
                      continue
                  if key == 'FLYWAY_VALIDATE_ON_MIGRATE':
                      items.append({'key': key, 'value': 'false'})
                      added = True
                  else:
                      items.append({'key': key, 'value': val})
          if not added:
              items.append({'key': 'FLYWAY_VALIDATE_ON_MIGRATE', 'value': 'false'})
          print(json.dumps(items))
          PY

          PAYLOAD_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/payload.json'))))")
          echo "Payload contains ${PAYLOAD_COUNT} env vars"

          echo "=== PUT updated env vars ==="
          STATUS=$(curl -sS -o /tmp/render-response.json -w "%{http_code}" \
            --max-time 60 \
            -X PUT "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data @/tmp/payload.json)
          echo "PUT returned HTTP ${STATUS}"

          echo "=== Verify ==="
          curl -sS --max-time 30 \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" > /tmp/verify.json
          python3 -c "
          import json
          with open('/tmp/verify.json') as f:
              data = json.load(f)
          if isinstance(data, list):
              for item in data:
                  ev = item.get('envVar', item) if isinstance(item, dict) else {}
                  key = ev.get('key', '') if isinstance(ev, dict) else ''
                  if key == 'FLYWAY_VALIDATE_ON_MIGRATE':
                      print(f'FLYWAY_VALIDATE_ON_MIGRATE is present (value not displayed)')
                      break
              else:
                  print('FLYWAY_VALIDATE_ON_MIGRATE NOT found!')
          "

      - name: Cleanup
        if: always()
        run: rm -f /tmp/env-vars.json /tmp/payload.json /tmp/render-response.json /tmp/verify.json
