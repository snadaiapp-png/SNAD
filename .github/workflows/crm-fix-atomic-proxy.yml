name: CRM Fix Atomic Service Proxy

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm-fix-atomic-proxy.yml'

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Make transactional service proxyable
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('apps/sanad-platform/src/main/java/com/sanad/platform/crm/web/CrmV2AtomicMutationService.java')
          text = path.read_text(encoding='utf-8')
          if text.count('final class CrmV2AtomicMutationService') != 1:
              raise SystemExit('service class declaration did not match')
          text = text.replace('final class CrmV2AtomicMutationService', 'public class CrmV2AtomicMutationService')
          if text.count('    CrmV2AtomicMutationService(NamedParameterJdbcTemplate jdbc)') != 1:
              raise SystemExit('service constructor did not match')
          text = text.replace(
              '    CrmV2AtomicMutationService(NamedParameterJdbcTemplate jdbc)',
              '    public CrmV2AtomicMutationService(NamedParameterJdbcTemplate jdbc)')
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          git config user.name 'snad-ci-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add apps/sanad-platform/src/main/java/com/sanad/platform/crm/web/CrmV2AtomicMutationService.java
          git commit -m 'fix(crm): make atomic mutation service proxyable'
          git push origin HEAD:${{ github.head_ref }}
