name: Recreate Vercel Render Backend Variables

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/recreate-vercel-render-backend-vars.yml
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: recreate-vercel-render-backend-vars
  cancel-in-progress: true

jobs:
  recreate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Production
    env:
      RENDER_URL: https://sanad-backend-mcrj.onrender.com
      WEB_URL: https://snad-app.vercel.app
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      GH_TOKEN: ${{ github.token }}
      CI: '1'

    steps:
      - uses: actions/checkout@v6

      - name: Mark pending
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending -f context=vercel/render-vars \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f description='Recreating Vercel backend variables as Render-only values'

      - name: Validate inputs and link project
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_ORG_ID"
          npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Pre-warm and verify Render before cutover operations
        shell: bash
        run: |
          set -euo pipefail
          render_code='000'
          for attempt in $(seq 1 24); do
            render_code="$(curl -sS --max-time 30 -o "$RUNNER_TEMP/render-prewarm.json" -w '%{http_code}' "$RENDER_URL/actuator/health" || true)"
            if [ "$render_code" = '200' ] && jq -e '.status == "UP"' "$RUNNER_TEMP/render-prewarm.json" >/dev/null 2>&1; then
              echo "Render is UP before environment and alias changes."
              exit 0
            fi
            [ "$attempt" = '24' ] || sleep 5
          done
          echo "::error::Render did not become UP before cutover operations; last HTTP ${render_code}."
          exit 1

      - name: Verify active production monitors are Render-pinned
        shell: bash
        run: |
          set -euo pipefail
          files=(
            .github/workflows/uptime-monitor.yml
            .github/workflows/pilot-synthetic-monitoring.yml
            .github/workflows/metrics-collector-v2.yml
            .github/workflows/smoke-test.yml
            .github/workflows/crm-real-smoke.yml
          )
          for file in "${files[@]}"; do
            grep -q 'https://sanad-backend-mcrj.onrender.com' "$file"
            ! grep -Eq 'vars\.(PRODUCTION_BASE_URL|PRODUCTION_BACKEND_BASE_URL|BACKEND_PRODUCTION_URL)' "$file"
            ! grep -Eqi 'ngrok|localhost|127\.0\.0\.1' "$file"
          done

      - name: Recreate backend variables and remove public override
        shell: bash
        run: |
          set -euo pipefail
          for environment in production preview; do
            if ! printf '%s\n' "$RENDER_URL" | npx --yes vercel@latest env update BACKEND_API_BASE_URL "$environment" --yes --token "$VERCEL_TOKEN"; then
              npx --yes vercel@latest env rm BACKEND_API_BASE_URL "$environment" --yes --token "$VERCEL_TOKEN" || true
              printf '%s\n' "$RENDER_URL" | npx --yes vercel@latest env add BACKEND_API_BASE_URL "$environment" --token "$VERCEL_TOKEN"
            fi
          done
          for environment in production preview development; do
            npx --yes vercel@latest env rm NEXT_PUBLIC_API_BASE_URL "$environment" --yes --token "$VERCEL_TOKEN" || true
          done

      - name: Verify persisted Vercel environments are Render-only
        shell: bash
        run: |
          set -euo pipefail
          for environment in production preview; do
            env_file="$RUNNER_TEMP/vercel-${environment}.env"
            npx --yes vercel@latest env pull "$env_file" --yes --environment="$environment" --token "$VERCEL_TOKEN"
            grep -Eq '^BACKEND_API_BASE_URL="?https://sanad-backend-mcrj\.onrender\.com"?$' "$env_file"
            ! grep -Eq '^NEXT_PUBLIC_API_BASE_URL=' "$env_file"
            ! grep -Eqi 'ngrok|localhost|127\.0\.0\.1' "$env_file"
            rm -f "$env_file"
          done

      - name: Await clean exact-SHA deployment and restore Production aliases
        id: exact
        shell: bash
        run: |
          set -euo pipefail
          MATCHED=false
          DEPLOYMENT_URL=''

          for attempt in $(seq 1 120); do
            curl --fail-with-body --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_ORG_ID}&target=production&limit=100" \
              > "$RUNNER_TEMP/deployments.json"

            jq --arg sha "$GITHUB_SHA" \
              '[.deployments[] | select((.meta.githubCommitSha // "") == $sha
                and (.readyState // .state // "") == "READY"
                and (.meta.gitDirty // "0") != "1")]
               | sort_by(.createdAt) | reverse | first // empty' \
              "$RUNNER_TEMP/deployments.json" > "$RUNNER_TEMP/exact-deployment.json"

            DEPLOYMENT_HOST="$(jq -r '.url // empty' "$RUNNER_TEMP/exact-deployment.json")"
            if [ -n "$DEPLOYMENT_HOST" ]; then
              DEPLOYMENT_URL="https://${DEPLOYMENT_HOST#https://}"
              MATCHED=true
              break
            fi
            sleep 5
          done

          test "$MATCHED" = true || { echo "::error::No clean READY Vercel deployment exists for exact current SHA ${GITHUB_SHA}"; exit 1; }

          for alias in \
            snad-app.vercel.app \
            snad-app-snad-team.vercel.app \
            snad-app-abdulrhmanahmeedsenen-snad-team.vercel.app; do
            npx --yes vercel@latest alias set "$DEPLOYMENT_URL" "$alias" \
              --token "$VERCEL_TOKEN" --scope snad-team
          done

          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Verify exact alias identity
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v13/deployments/snad-app.vercel.app?teamId=${VERCEL_ORG_ID}" \
            > "$RUNNER_TEMP/alias.json"

          test "$(jq -r '.meta.githubCommitSha // empty' "$RUNNER_TEMP/alias.json")" = "$GITHUB_SHA"
          test "$(jq -r '.readyState // .state // empty' "$RUNNER_TEMP/alias.json")" = READY
          test "$(jq -r '.target // empty' "$RUNNER_TEMP/alias.json")" = production
          test "$(jq -r '.meta.gitDirty // "0"' "$RUNNER_TEMP/alias.json")" != 1

      - name: Wake and verify Render
        shell: bash
        run: |
          set -euo pipefail
          render_code='000'
          for attempt in $(seq 1 24); do
            render_code="$(curl -sS --max-time 30 -o /tmp/render.json -w '%{http_code}' "$RENDER_URL/actuator/health" || true)"
            if [ "$render_code" = '200' ] && jq -e '.status == "UP"' /tmp/render.json >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          test "$render_code" = '200'
          jq -e '.status == "UP"' /tmp/render.json >/dev/null

      - name: Verify live Vercel BFF route
        shell: bash
        run: |
          set -euo pipefail
          status_code='000'
          auth_code='000'
          for attempt in $(seq 1 24); do
            status_code="$(curl -sS --max-time 30 -o /tmp/status.json -w '%{http_code}' https://snad-app.vercel.app/api/system/backend-status || true)"
            auth_code="$(curl -sS --max-time 30 -o /tmp/auth.json -w '%{http_code}' https://snad-app.vercel.app/api/platform/api/v1/auth/me || true)"
            if [ "$status_code" = '200' ] && [ "$auth_code" = '401' ] && \
               jq -e '.configured == true and .reachable == true and .statusCode == 200 and has("targetHost") == false' /tmp/status.json >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          test "$status_code" = '200'
          test "$auth_code" = '401'
          jq -e '.configured == true and .reachable == true and .statusCode == 200 and has("targetHost") == false' /tmp/status.json >/dev/null
          ! grep -Eqi 'ngrok|localhost|127\.0\.0\.1' /tmp/status.json /tmp/auth.json

      - name: Mark success
        if: success()
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success -f context=vercel/render-vars \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f description='Exact-SHA Vercel aliases and Render-only routing verified'

      - name: Mark failure
        if: failure()
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure -f context=vercel/render-vars \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f description='Vercel exact-SHA alias or Render routing verification failed'
