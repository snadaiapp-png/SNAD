# ============================================================
# SANAD — One-Time Admin Password Reset
# ============================================================
# EXEC-PROMPT-010R6: Reset admin password via direct DB update.
# Uses Production environment secrets (RENDER_API_KEY, DATABASE_URL).
# DELETE THIS WORKFLOW AFTER SUCCESSFUL USE.
# ============================================================

name: Reset Admin Password (One-Time)

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'New admin password (min 8 chars)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    steps:
      - name: Reset admin password via direct DB update
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
          NEW_PASSWORD: ${{ inputs.new_password }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          # Mask all sensitive values
          echo "::add-mask::${PRODUCTION_DATABASE_URL}"
          echo "::add-mask::${DATABASE_USERNAME}"
          echo "::add-mask::${RENDER_API_KEY}"
          echo "::add-mask::${RENDER_SERVICE_ID}"
          echo "::add-mask::${ADMIN_EMAIL}"
          echo "::add-mask::${NEW_PASSWORD}"

          # Fetch DATABASE_PASSWORD from Render (not in GitHub secrets)
          echo "Fetching DATABASE_PASSWORD from Render..."
          RENDER_ENV=$(curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")

          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/env.json

          DB_PASS=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value' /tmp/env.json)
          echo "::add-mask::${DB_PASS}"

          # Parse JDBC URL from PRODUCTION_DATABASE_URL
          DB_RAW_URL="${PRODUCTION_DATABASE_URL}"
          BASE_URL_DB=$(echo "$DB_RAW_URL" | sed 's|^jdbc:postgresql://||')
          DB_HOST=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f1)
          DB_PORT=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f2 -s)
          DB_NAME=$(echo "$BASE_URL_DB" | cut -d'/' -f2 | cut -d'?' -f1)
          [ -z "$DB_PORT" ] && DB_PORT="5432"

          export DB_HOST DB_PORT DB_NAME
          export DB_USER="$DATABASE_USERNAME"
          export DB_PASS
          export ADMIN_EMAIL
          export NEW_PASSWORD

          # Install deps
          pip install psycopg2-binary bcrypt -q 2>/dev/null || pip3 install psycopg2-binary bcrypt -q

          python3 << 'PYSCRIPT'
          import psycopg2, psycopg2.extras, bcrypt, os
          psycopg2.extras.register_uuid()

          db_host = os.environ["DB_HOST"]
          db_port = int(os.environ.get("DB_PORT", "5432"))
          db_name = os.environ.get("DB_NAME", "postgres")
          db_user = os.environ["DB_USER"]
          db_pass = os.environ["DB_PASS"]
          admin_email = os.environ["ADMIN_EMAIL"]
          new_password = os.environ["NEW_PASSWORD"]

          print(f"Connecting to {db_host}:{db_port}/{db_name} as {db_user}...")

          conn = psycopg2.connect(
              host=db_host, port=db_port, dbname=db_name,
              user=db_user, password=db_pass, connect_timeout=15, sslmode="require"
          )
          conn.autocommit = True
          cur = conn.cursor()

          # Find the admin user
          cur.execute(
              "SELECT id, email, status, tenant_id, display_name FROM users WHERE LOWER(email) = LOWER(%s) LIMIT 1",
              (admin_email,)
          )
          user = cur.fetchone()

          if user:
              user_id, email, status, tenant_id, display_name = user
              print(f"ADMIN USER FOUND:")
              print(f"  ID: {user_id}")
              print(f"  Email: {email}")
              print(f"  Status: {status}")
              print(f"  Tenant ID: {tenant_id}")
              print(f"  Display Name: {display_name}")

              # Set new password
              hashed = bcrypt.hashpw(new_password.encode('utf-8'), bcrypt.gensalt(12))
              password_hash = hashed.decode('utf-8')

              cur.execute(
                  """UPDATE users
                     SET password_hash = %s,
                         must_change_password = false,
                         password_set_at = NOW(),
                         password_set_by = 'manual-reset-010R6',
                         session_version = session_version + 1
                     WHERE id = %s""",
                  (password_hash, user_id)
              )
              print(f"\n✅ PASSWORD HAS BEEN RESET SUCCESSFULLY")
              print(f"You can now login with:")
              print(f"  Email: {email}")
              print(f"  Password: <the new password you provided>")
              print(f"\nAll previous sessions have been invalidated (session_version incremented).")

              # Also delete all existing refresh tokens
              cur.execute("DELETE FROM refresh_tokens WHERE user_id = %s", (user_id,))
              print(f"All refresh tokens revoked for this user.")
          else:
              print(f"❌ No user found with email: {admin_email}")
              # List all users (without exposing emails fully)
              cur.execute("SELECT id, email, status, tenant_id FROM users LIMIT 20")
              rows = cur.fetchall()
              print(f"\nUsers in database ({len(rows)}):")
              for row in rows:
                  uid, uemail, ustatus, utid = row
                  masked_email = uemail[:3] + "***" + uemail[uemail.index("@"):] if "@" in uemail else uemail[:3] + "***"
                  print(f"  {uid} | {masked_email} | {ustatus} | tenant={utid}")

          cur.close()
          conn.close()
          PYSCRIPT

          rm -f /tmp/env.json

      - name: Cleanup
        if: always()
        run: rm -f /tmp/env.json
