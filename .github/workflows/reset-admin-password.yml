# ============================================================
# SANAD — One-Time Admin Password Reset (v3)
# ============================================================
# Handles JDBC, postgres://, postgresql:// URL formats.
# Fetches DATABASE_URL from Render API as fallback.
# DELETE THIS WORKFLOW AFTER SUCCESSFUL USE.
# ============================================================

name: Reset Admin Password (One-Time)

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'New admin password (min 8 chars)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    steps:
      - name: Reset admin password via direct DB update
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
          NEW_PASSWORD: ${{ inputs.new_password }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          echo "::add-mask::${PRODUCTION_DATABASE_URL}"
          echo "::add-mask::${DATABASE_USERNAME}"
          echo "::add-mask::${RENDER_API_KEY}"
          echo "::add-mask::${RENDER_SERVICE_ID}"
          echo "::add-mask::${ADMIN_EMAIL}"
          echo "::add-mask::${NEW_PASSWORD}"

          echo "Fetching env vars from Render..."
          RENDER_ENV=$(curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")

          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/env.json

          DB_PASS=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value' /tmp/env.json)
          echo "::add-mask::${DB_PASS}"

          RENDER_DB_URL=$(jq -r '.[] | select(.key == "DATABASE_URL") | .value' /tmp/env.json)
          echo "::add-mask::${RENDER_DB_URL}"

          DB_RAW_URL="${RENDER_DB_URL:-${PRODUCTION_DATABASE_URL}}"

          echo "Parsing DATABASE_URL (prefix: $(echo "$DB_RAW_URL" | cut -c1-15))..."

          if echo "$DB_RAW_URL" | grep -q '^jdbc:postgresql://'; then
            BASE_URL_DB=$(echo "$DB_RAW_URL" | sed 's|^jdbc:postgresql://||')
            DB_HOST=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f1)
            DB_PORT=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f2 -s)
            DB_NAME=$(echo "$BASE_URL_DB" | cut -d'/' -f2 | cut -d'?' -f1)
          elif echo "$DB_RAW_URL" | grep -qE '^postgres(ql)?://'; then
            BASE_URL_DB=$(echo "$DB_RAW_URL" | sed 's|^postgresql://||; s|^postgres://||')
            CREDLESS=$(echo "$BASE_URL_DB" | sed 's|^[^@]*@||')
            DB_HOST=$(echo "$CREDLESS" | cut -d'/' -f1 | cut -d':' -f1)
            DB_PORT=$(echo "$CREDLESS" | cut -d'/' -f1 | cut -d':' -f2 -s)
            DB_NAME=$(echo "$CREDLESS" | cut -d'/' -f2 | cut -d'?' -f1)
          else
            echo "::error::Unsupported DATABASE_URL format"
            exit 1
          fi

          [ -z "$DB_PORT" ] && DB_PORT="5432"
          [ -z "$DB_NAME" ] && DB_NAME="postgres"

          echo "Parsed: host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME}"

          export DB_HOST DB_PORT DB_NAME
          export DB_USER="$DATABASE_USERNAME"
          export DB_PASS ADMIN_EMAIL NEW_PASSWORD

          pip install psycopg2-binary bcrypt -q 2>/dev/null || pip3 install psycopg2-binary bcrypt -q

          python3 << 'PYSCRIPT'
          import psycopg2, psycopg2.extras, bcrypt, os
          psycopg2.extras.register_uuid()

          db_host = os.environ["DB_HOST"]
          db_port = int(os.environ.get("DB_PORT", "5432"))
          db_name = os.environ.get("DB_NAME", "postgres")
          db_user = os.environ["DB_USER"]
          db_pass = os.environ["DB_PASS"]
          admin_email = os.environ["ADMIN_EMAIL"]
          new_password = os.environ["NEW_PASSWORD"]

          print(f"Connecting to {db_host}:{db_port}/{db_name}...")
          conn = psycopg2.connect(
              host=db_host, port=db_port, dbname=db_name,
              user=db_user, password=db_pass, connect_timeout=30, sslmode="require"
          )
          conn.autocommit = True
          cur = conn.cursor()

          cur.execute(
              "SELECT id, email, status, tenant_id, display_name FROM users WHERE LOWER(email) = LOWER(%s) LIMIT 1",
              (admin_email,))
          user = cur.fetchone()

          if user:
              user_id, email, status, tenant_id, display_name = user
              print(f"ADMIN USER FOUND:")
              print(f"  ID: {user_id}")
              print(f"  Email: {email}")
              print(f"  Status: {status}")
              print(f"  Tenant ID: {tenant_id}")

              hashed = bcrypt.hashpw(new_password.encode('utf-8'), bcrypt.gensalt(12))
              cur.execute(
                  """UPDATE users SET password_hash=%s, must_change_password=false,
                     password_set_at=NOW(), password_set_by='manual-reset-010R6',
                     session_version=session_version+1 WHERE id=%s""",
                  (hashed.decode('utf-8'), user_id))
              print(f"\n✅ PASSWORD RESET SUCCESSFULLY")
              print(f"  Email: {email}")
              print(f"  Password: <the new password you provided>")
              print(f"  All sessions invalidated.")

              cur.execute("DELETE FROM refresh_tokens WHERE user_id = %s", (user_id,))
              print(f"  All refresh tokens revoked.")
          else:
              print(f"❌ No user found with email: {admin_email}")
              cur.execute("SELECT id, email, status FROM users LIMIT 20")
              for row in cur.fetchall():
                  uid, uemail, ustatus = row
                  masked = uemail[:3]+"***"+uemail[uemail.index("@"):] if "@" in uemail else uemail[:3]+"***"
                  print(f"  {uid} | {masked} | {ustatus}")

          cur.close()
          conn.close()
          PYSCRIPT

          rm -f /tmp/env.json

      - name: Cleanup
        if: always()
        run: rm -f /tmp/env.json
