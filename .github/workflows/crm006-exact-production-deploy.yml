name: CRM-006 Exact Production Deployment

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm006-exact-production-deploy.yml'

permissions:
  contents: read

concurrency:
  group: crm006-exact-production-deploy
  cancel-in-progress: false

jobs:
  deploy-and-verify:
    name: Deploy CRM-006 merge SHA and verify production
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: Production
    env:
      RELEASE_SHA: d0fe9bdd2aec9f080450b509e9d1a53c9d0ec275
      GITHUB_REPOSITORY_ID: '1271479061'
      PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}

    steps:
      - name: Checkout exact CRM-006 merge SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0

      - name: Validate protected configuration and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          for name in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID; do
            test -n "${!name:-}" || { echo "::error::Missing Production secret: $name"; exit 1; }
            echo "::add-mask::${!name}"
          done
          [[ "$PRODUCTION_WEB_BASE_URL" == https://* ]]
          git fetch origin main
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main || {
            echo "::error::Release SHA is not contained in current main"; exit 1;
          }

      - name: Deploy exact SHA to Vercel Production
        id: vercel
        shell: bash
        run: |
          set -euo pipefail
          rm -rf crm006-evidence
          mkdir -p crm006-evidence
          TEAM_QUERY="teamId=${VERCEL_TEAM_ID}"

          jq -n \
            --arg name 'snad-app' \
            --arg project "$VERCEL_PROJECT_ID" \
            --arg sha "$RELEASE_SHA" \
            --argjson repo_id "$GITHUB_REPOSITORY_ID" \
            '{
              name:$name,
              project:$project,
              target:"production",
              gitSource:{type:"github",repoId:$repo_id,ref:"main",sha:$sha},
              gitMetadata:{
                remoteUrl:"https://github.com/snadaiapp-png/SNAD",
                commitRef:"main",
                commitSha:$sha,
                dirty:false,
                ci:true,
                ciType:"github-actions",
                ciGitProviderUsername:"snadaiapp-png",
                ciGitRepoVisibility:"public"
              },
              meta:{githubCommitSha:$sha,release:"CRM-006"}
            }' > crm006-evidence/vercel-create-request.json

          CREATE_CODE="$(curl --silent --show-error --max-time 60 \
            -X POST \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data @crm006-evidence/vercel-create-request.json \
            -o crm006-evidence/vercel-create-response.json \
            -w '%{http_code}' \
            "https://api.vercel.com/v13/deployments?forceNew=1&${TEAM_QUERY}" || true)"
          echo "$CREATE_CODE" > crm006-evidence/vercel-create-http-status.txt
          if [[ ! "$CREATE_CODE" =~ ^2 ]]; then
            echo "::error::Vercel create deployment returned HTTP $CREATE_CODE"
            cat crm006-evidence/vercel-create-response.json
            exit 1
          fi

          DEPLOYMENT_ID="$(jq -r '.id // .uid // empty' crm006-evidence/vercel-create-response.json)"
          test -n "$DEPLOYMENT_ID" || { cat crm006-evidence/vercel-create-response.json; exit 1; }

          STATE=''
          for attempt in $(seq 1 150); do
            DETAIL_CODE="$(curl --silent --show-error --max-time 30 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -o crm006-evidence/vercel-deployment-detail.json \
              -w '%{http_code}' \
              "https://api.vercel.com/v13/deployments/${DEPLOYMENT_ID}?${TEAM_QUERY}" || true)"
            if [[ "$DETAIL_CODE" =~ ^2 ]]; then
              STATE="$(jq -r '.readyState // .state // empty' crm006-evidence/vercel-deployment-detail.json)"
              case "$STATE" in
                READY) break ;;
                ERROR|CANCELED)
                  echo "::error::Vercel deployment failed with state $STATE"
                  cat crm006-evidence/vercel-deployment-detail.json
                  exit 1
                  ;;
              esac
            fi
            sleep 10
          done

          test "$STATE" = 'READY'
          VERCEL_SHA="$(jq -r '.meta.githubCommitSha // .gitSource.sha // empty' crm006-evidence/vercel-deployment-detail.json)"
          VERCEL_TARGET="$(jq -r '.target // empty' crm006-evidence/vercel-deployment-detail.json)"
          VERCEL_URL="$(jq -r '.url // empty' crm006-evidence/vercel-deployment-detail.json)"
          test "$VERCEL_SHA" = "$RELEASE_SHA"
          test "$VERCEL_TARGET" = 'production'
          test -n "$VERCEL_URL"

          jq -n \
            --arg sha "$RELEASE_SHA" \
            --arg id "$DEPLOYMENT_ID" \
            --arg url "$VERCEL_URL" \
            '{release_sha:$sha,deployment_id:$id,deployment_url:$url,target:"production",ready_state:"READY",deployed_commit_sha:$sha,result:"PASS"}' \
            > crm006-evidence/crm006-vercel-deployment.json
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "deployment_url=$VERCEL_URL" >> "$GITHUB_OUTPUT"

      - name: Verify production routes, backend routing and BFF connectivity
        shell: bash
        run: |
          set -euo pipefail
          for path in / /crm/contacts /crm/accounts; do
            code="$(curl -sS --show-error --max-time 30 -o /dev/null -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}${path}")"
            jq -n --arg path "$path" --arg code "$code" '{path:$path,http_status:($code|tonumber),expected:200,result:(if $code=="200" then "PASS" else "FAIL" end)}' \
              >> crm006-evidence/route-smoke.jsonl
            test "$code" = '200' || { echo "::error::$path returned $code"; exit 1; }
          done

          for attempt in $(seq 1 24); do
            CODE="$(curl -sS --show-error --max-time 30 -o crm006-evidence/backend-status.json -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/system/backend-status" || true)"
            if [ "$CODE" = '200' ] && jq -e '.configured == true and .reachable == true and .statusCode == 200' crm006-evidence/backend-status.json >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          test "$CODE" = '200'
          jq -e '.configured == true and .reachable == true and .statusCode == 200' crm006-evidence/backend-status.json >/dev/null

          auth_code="$(curl -sS --show-error --max-time 30 -o crm006-evidence/auth-me.json -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/platform/api/v1/auth/me" || true)"
          echo "$auth_code" > crm006-evidence/auth-me-http-status.txt
          test "$auth_code" = '401' || { echo "::error::Unauthenticated BFF auth/me returned $auth_code"; cat crm006-evidence/auth-me.json; exit 1; }

      - name: Upload CRM-006 production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm006-exact-production-${{ github.run_id }}
          path: crm006-evidence/
          if-no-files-found: error
          retention-days: 90

      - name: Publish result
        if: success()
        run: |
          echo '## CRM-006 exact-SHA production deployment passed' >> "$GITHUB_STEP_SUMMARY"
          echo "- Release SHA: \`$RELEASE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment ID: \`${{ steps.vercel.outputs.deployment_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment URL: \`${{ steps.vercel.outputs.deployment_url }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo '- Routes: /, /crm/contacts, /crm/accounts = HTTP 200' >> "$GITHUB_STEP_SUMMARY"
          echo '- Backend routing = configured/reachable/statusCode PASS' >> "$GITHUB_STEP_SUMMARY"
          echo '- Unauthenticated BFF auth/me = HTTP 401' >> "$GITHUB_STEP_SUMMARY"
