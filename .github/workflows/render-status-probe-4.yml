name: Render Deployment Status Probe 4

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/render-status-probe-4.yml

permissions:
  contents: read

jobs:
  probe:
    name: Read latest Render deployment safely
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Read latest provider deployment
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
            > /tmp/deploys.json

          jq '[.[]? | (.deploy // .)]' /tmp/deploys.json > /tmp/deploys-flat.json
          jq -e 'length > 0' /tmp/deploys-flat.json >/dev/null
          jq '.[0]' /tmp/deploys-flat.json > render-latest-deployment.json

          echo "LATEST_DEPLOYMENT_ID=$(jq -r '.id // "unknown"' render-latest-deployment.json)"
          echo "LATEST_STATUS=$(jq -r '.status // "unknown"' render-latest-deployment.json)"
          echo "LATEST_COMMIT=$(jq -r '.commit.id // .commitId // "unknown"' render-latest-deployment.json)"
          echo "UPDATED_AT=$(jq -r '.updatedAt // "unknown"' render-latest-deployment.json)"
          echo "FINISHED_AT=$(jq -r '.finishedAt // "unknown"' render-latest-deployment.json)"

      - name: Upload status evidence
        uses: actions/upload-artifact@v4
        with:
          name: render-latest-deployment-${{ github.run_id }}
          path: render-latest-deployment.json
          retention-days: 7
