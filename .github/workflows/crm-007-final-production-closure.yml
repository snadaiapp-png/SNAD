name: CRM-007 Final Production Closure

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/crm-007-final-production-closure.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-007-final-production-closure
  cancel-in-progress: false

jobs:
  verify:
    name: Direct Render PostgreSQL and CRM-007 closure proof
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      WEB_BASE_URL: https://snad-app.vercel.app
      RENDER_BASE_URL: https://sanad-backend-mcrj.onrender.com
      PROD_JDBC_URL: ${{ secrets.PROD_JDBC_URL }}
      PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      CRM_TENANT_A_EMAIL: ${{ secrets.CRM_TENANT_A_EMAIL || secrets.AUTH_SMOKE_TENANT_A_EMAIL }}
      CRM_TENANT_A_PASSWORD: ${{ secrets.CRM_TENANT_A_PASSWORD || secrets.AUTH_SMOKE_TENANT_A_PASSWORD }}
      CRM_TENANT_B_EMAIL: ${{ secrets.CRM_TENANT_B_EMAIL || secrets.AUTH_SMOKE_TENANT_B_EMAIL }}
      CRM_TENANT_B_PASSWORD: ${{ secrets.CRM_TENANT_B_PASSWORD || secrets.AUTH_SMOKE_TENANT_B_PASSWORD }}

    steps:
      - name: Checkout exact current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Execute direct production closure proof
        shell: bash
        run: |
          set -euo pipefail
          for value in \
            "$PROD_JDBC_URL" "$PROD_DB_USER" "$PROD_DB_PASSWORD" \
            "$VERCEL_TOKEN" "$VERCEL_TEAM_ID" "$RENDER_API_KEY" "$RENDER_SERVICE_ID" \
            "$CRM_TENANT_A_EMAIL" "$CRM_TENANT_A_PASSWORD" \
            "$CRM_TENANT_B_EMAIL" "$CRM_TENANT_B_PASSWORD"; do
            test -n "$value" || { echo "::error::A required Production secret is missing"; exit 1; }
            echo "::add-mask::$value"
          done
          [[ "$PROD_JDBC_URL" == jdbc:postgresql://* ]]
          [[ "$RENDER_SERVICE_ID" == srv-* ]]
          test "${CRM_TENANT_A_EMAIL,,}" != "${CRM_TENANT_B_EMAIL,,}"

          RELEASE_SHA="$(git rev-parse HEAD)"
          REMOTE_MAIN_SHA="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$RELEASE_SHA" = "$REMOTE_MAIN_SHA" || { echo "::error::Checkout is not current main"; exit 1; }
          EVIDENCE_DIR="$RUNNER_TEMP/crm-007-final-evidence"
          mkdir -p "$EVIDENCE_DIR"
          STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          HOST="${WEB_BASE_URL#https://}"
          VERCEL_MATCH=""
          for attempt in $(seq 1 90); do
            curl --fail-with-body --silent --show-error --max-time 60 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v13/deployments/${HOST}?teamId=${VERCEL_TEAM_ID}" \
              > "$EVIDENCE_DIR/vercel-deployment.json"
            LIVE_SHA="$(jq -r '.meta.githubCommitSha // empty' "$EVIDENCE_DIR/vercel-deployment.json")"
            STATE="$(jq -r '.readyState // .state // empty' "$EVIDENCE_DIR/vercel-deployment.json")"
            TARGET="$(jq -r '.target // empty' "$EVIDENCE_DIR/vercel-deployment.json")"
            if [ "$LIVE_SHA" = "$RELEASE_SHA" ] && [ "$STATE" = "READY" ] && [ "$TARGET" = "production" ]; then
              VERCEL_MATCH=1
              break
            fi
            sleep 10
          done
          test -n "$VERCEL_MATCH" || { echo "::error::Vercel did not reach exact release SHA"; exit 1; }
          VERCEL_DEPLOYMENT_ID="$(jq -r '.id // .uid // empty' "$EVIDENCE_DIR/vercel-deployment.json")"
          test -n "$VERCEL_DEPLOYMENT_ID"

          curl --fail-with-body --silent --show-error --max-time 60 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            > "$EVIDENCE_DIR/render-service.json"
          curl --fail-with-body --silent --show-error --max-time 60 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=50" \
            > "$EVIDENCE_DIR/render-deploys.json"
          jq '[if type == "array" then .[] else (.deploys // .items // [])[] end
              | (.deploy // .) | select(.status == "live")]
              | sort_by(.finishedAt // .updatedAt // .createdAt) | reverse | first' \
            "$EVIDENCE_DIR/render-deploys.json" > "$EVIDENCE_DIR/render-live-deploy.json"
          RENDER_DEPLOYMENT_ID="$(jq -r '.id // empty' "$EVIDENCE_DIR/render-live-deploy.json")"
          RENDER_IMAGE_REF="$(jq -r '.image.ref // .imageRef // empty' "$EVIDENCE_DIR/render-live-deploy.json")"
          test -n "$RENDER_DEPLOYMENT_ID" && test -n "$RENDER_IMAGE_REF"
          [[ "$RENDER_IMAGE_REF" =~ ^ghcr\.io/snadaiapp-png/snad-backend:([0-9a-f]{40})$ ]] || {
            echo "::error::Render image is not immutable: $RENDER_IMAGE_REF"; exit 1;
          }
          BACKEND_SOURCE_SHA="${BASH_REMATCH[1]}"
          git cat-file -e "${BACKEND_SOURCE_SHA}^{commit}"
          git merge-base --is-ancestor "$BACKEND_SOURCE_SHA" "$RELEASE_SHA"
          git diff --quiet "$BACKEND_SOURCE_SHA" "$RELEASE_SHA" -- apps/sanad-platform || {
            echo "::error::Render backend tree differs from release backend tree"; exit 1;
          }
          for path in /actuator/health /actuator/health/liveness /actuator/health/readiness; do
            CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/render-health.json" -w '%{http_code}' "${RENDER_BASE_URL}${path}")"
            test "$CODE" = "200"
            jq -e '.status == "UP"' "$RUNNER_TEMP/render-health.json" >/dev/null
          done
          RENDER_OWNER_ID="$(jq -r '(.service // .).ownerId // (.service // .).owner.id // empty' "$EVIDENCE_DIR/render-service.json")"
          test -n "$RENDER_OWNER_ID" || { echo "::error::Render owner ID unavailable"; exit 1; }

          PSQL_URL="${PROD_JDBC_URL#jdbc:}"
          export PGPASSWORD="$PROD_DB_PASSWORD"
          psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -P pager=off -Atc \
            "SELECT version || '|' || type || '|' || success || '|' || installed_on
               FROM flyway_schema_history
              WHERE version IN ('20260717.100','20260717.101','20260718.1')
              ORDER BY installed_rank" > "$EVIDENCE_DIR/flyway-crm007.txt"
          test "$(wc -l < "$EVIDENCE_DIR/flyway-crm007.txt" | tr -d ' ')" = "3"
          test "$(grep -c '|SQL|t|' "$EVIDENCE_DIR/flyway-crm007.txt")" = "3"
          psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 \
            -f scripts/crm/verify-g1-tenant-isolation.sql > "$EVIDENCE_DIR/crm-g1-isolation.txt"
          COUNTS="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT
               (SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN
                 ('crm_party_addresses','crm_party_address_history','crm_communication_policies','crm_communication_methods','crm_communication_method_history')) || '|' ||
               (SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN
                 ('crm_tasks','crm_notes','crm_assignments','crm_transfers','crm_audit_logs','crm_reports','crm_phone_numbers','crm_contact_lookup_index')) || '|' ||
               (SELECT count(*) FROM pg_indexes WHERE schemaname='public' AND tablename IN
                 ('crm_tasks','crm_notes','crm_assignments','crm_transfers','crm_audit_logs','crm_reports','crm_phone_numbers','crm_contact_lookup_index') AND indexname LIKE 'idx_crm_%') || '|' ||
               (SELECT count(*) FROM pg_constraint c JOIN pg_class t ON t.oid=c.conrelid
                 WHERE c.contype='f' AND c.confrelid='tenants'::regclass AND t.relname IN
                 ('crm_tasks','crm_notes','crm_assignments','crm_transfers','crm_audit_logs','crm_reports','crm_phone_numbers','crm_contact_lookup_index'));" )"
          IFS='|' read -r CRM007_TABLES G1_TABLES G1_INDEXES G1_TENANT_FKS <<< "$COUNTS"
          test "$CRM007_TABLES" = "5"
          test "$G1_TABLES" = "8"
          test "$G1_INDEXES" = "26"
          test "$G1_TENANT_FKS" = "8"
          jq -n --argjson crm007 "$CRM007_TABLES" --argjson g1 "$G1_TABLES" \
            --argjson indexes "$G1_INDEXES" --argjson fks "$G1_TENANT_FKS" \
            '{result:"PASS",crm007_canonical_tables:$crm007,crm_g1_tables:$g1,
              crm_g1_tenant_leading_indexes:$indexes,crm_g1_tenant_foreign_keys:$fks}' \
            > "$EVIDENCE_DIR/schema-postconditions.json"

          export PLAYWRIGHT_BASE_URL="$WEB_BASE_URL"
          export CRM_TESTED_SHA="$RELEASE_SHA"
          export CRM007_EVIDENCE_FILE="$EVIDENCE_DIR/crm007-production-smoke.json"
          pushd apps/web >/dev/null
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chrome
          npx playwright test --config=playwright.crm007-production.config.ts
          cp -R crm007-production-report "$EVIDENCE_DIR/"
          popd >/dev/null
          test -f "$CRM007_EVIDENCE_FILE"

          END_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          curl --get --fail-with-body --silent --show-error --max-time 60 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            --data-urlencode "ownerId=${RENDER_OWNER_ID}" \
            --data-urlencode "resource=${RENDER_SERVICE_ID}" \
            --data-urlencode "startTime=${STARTED_AT}" --data-urlencode "endTime=${END_TIME}" \
            --data-urlencode "level=error" --data-urlencode "limit=100" \
            https://api.render.com/v1/logs > "$EVIDENCE_DIR/render-error-logs.json"
          ERROR_COUNT="$(jq 'if type=="array" then length else (.logs // .items // []) | length end' "$EVIDENCE_DIR/render-error-logs.json")"
          test "$ERROR_COUNT" = "0" || { echo "::error::Render error logs found"; exit 1; }
          curl --get --fail-with-body --silent --show-error --max-time 60 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            --data-urlencode "ownerId=${RENDER_OWNER_ID}" \
            --data-urlencode "resource=${RENDER_SERVICE_ID}" \
            --data-urlencode "startTime=${STARTED_AT}" --data-urlencode "endTime=${END_TIME}" \
            --data-urlencode "type=request" --data-urlencode "statusCode=/5../" --data-urlencode "limit=100" \
            https://api.render.com/v1/logs > "$EVIDENCE_DIR/render-5xx-logs.json"
          FIVE_XX_COUNT="$(jq 'if type=="array" then length else (.logs // .items // []) | length end' "$EVIDENCE_DIR/render-5xx-logs.json")"
          test "$FIVE_XX_COUNT" = "0" || { echo "::error::Render HTTP 5xx logs found"; exit 1; }

          FRONT_CODE="$(curl -sS --max-time 45 -o /dev/null -w '%{http_code}' "$WEB_BASE_URL")"
          STATUS_CODE="$(curl -sS --max-time 45 -o "$RUNNER_TEMP/backend-status.json" -w '%{http_code}' "${WEB_BASE_URL}/api/system/backend-status")"
          AUTH_CODE="$(curl -sS --max-time 45 -o /dev/null -w '%{http_code}' "${WEB_BASE_URL}/api/platform/api/v1/auth/me")"
          V2_CODE="$(curl -sS --max-time 45 -o /dev/null -w '%{http_code}' "${WEB_BASE_URL}/api/platform/api/v2/crm/addresses/search")"
          test "$FRONT_CODE" = "200"
          test "$STATUS_CODE" = "200"
          jq -e '.configured==true and .reachable==true and .statusCode==200' "$RUNNER_TEMP/backend-status.json" >/dev/null
          test "$AUTH_CODE" = "401"
          test "$V2_CODE" = "401"

          COMPLETED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n --arg release "$RELEASE_SHA" --arg completed "$COMPLETED_AT" \
            --arg vercel "$VERCEL_DEPLOYMENT_ID" --arg render "$RENDER_DEPLOYMENT_ID" \
            --arg image "$RENDER_IMAGE_REF" --arg backend "$BACKEND_SOURCE_SHA" \
            --argjson errors "$ERROR_COUNT" --argjson five "$FIVE_XX_COUNT" \
            '{result:"PASS",release_sha:$release,completed_at:$completed,
              vercel_deployment_id:$vercel,render_deployment_id:$render,
              render_image_ref:$image,backend_source_sha:$backend,
              render_error_logs:$errors,render_http_5xx_logs:$five,
              gates:{crm_g1_schema_and_isolation:"PASS",crm007_flyway_and_schema:"PASS",
                authenticated_two_tenant_smoke:"PASS",render_logs:"PASS",public_runtime:"PASS"}}' \
            > "$EVIDENCE_DIR/final-summary.json"
          find "$EVIDENCE_DIR" -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$EVIDENCE_DIR/SHA256SUMS.txt"
          cat "$EVIDENCE_DIR/final-summary.json"

      - name: Upload immutable evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-final-production-closure-${{ github.run_id }}
          path: ${{ runner.temp }}/crm-007-final-evidence
          if-no-files-found: warn
          retention-days: 90
