name: CRM-007 Final Production Closure

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: crm-007-final-production-closure
  cancel-in-progress: false

jobs:
  verify:
    name: CRM-007 chained final production closure
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      WEB_BASE_URL: https://snad-app.vercel.app
      RENDER_BASE_URL: https://sanad-backend-mcrj.onrender.com
      PROD_JDBC_URL: ${{ secrets.PROD_JDBC_URL }}
      PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      CRM_TENANT_A_EMAIL: ${{ secrets.CRM_TENANT_A_EMAIL || secrets.AUTH_SMOKE_TENANT_A_EMAIL }}
      CRM_TENANT_A_PASSWORD: ${{ secrets.CRM_TENANT_A_PASSWORD || secrets.AUTH_SMOKE_TENANT_A_PASSWORD }}
      CRM_TENANT_B_EMAIL: ${{ secrets.CRM_TENANT_B_EMAIL || secrets.AUTH_SMOKE_TENANT_B_EMAIL }}
      CRM_TENANT_B_PASSWORD: ${{ secrets.CRM_TENANT_B_PASSWORD || secrets.AUTH_SMOKE_TENANT_B_PASSWORD }}
      CRM_TENANT_A_FINGERPRINT: 6a86207bfa8aa7320ce9ddeaf26e8524a6df9a33f88ce42c197b451709377e8c
      CRM_TENANT_B_FINGERPRINT: e38f1f2b98f0106c2a7efb833dd356c7c86be85f7b7190e79beae749df714b47
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout exact current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false

      - name: Initialize immutable evidence
        shell: bash
        run: |
          set -euo pipefail
          EVIDENCE_DIR="$RUNNER_TEMP/crm-007-final-evidence"
          rm -rf "$EVIDENCE_DIR"
          mkdir -p "$EVIDENCE_DIR"
          echo "EVIDENCE_DIR=$EVIDENCE_DIR" >> "$GITHUB_ENV"
          jq -n --arg run "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{schema:"snad.crm007.production-closure.v3",result:"IN_PROGRESS",workflow_run:$run}' \
            > "$EVIDENCE_DIR/run-context.json"

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Verify exact release and Production preconditions
        id: preflight
        run: bash scripts/crm/crm007-final-production-closure.sh preflight

      - name: Install frontend dependencies and Chrome
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chrome

      - name: Run CRM-007 authenticated production acceptance
        id: acceptance
        working-directory: apps/web
        run: npx playwright test --config=playwright.crm007-production.config.ts

      - name: Collect lifecycle and error evidence
        if: always() && steps.preflight.outcome == 'success'
        run: bash scripts/crm/crm007-final-production-closure.sh collect "${{ steps.acceptance.outcome }}"

      - name: Finalize immutable hashes
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          find "$EVIDENCE_DIR" -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 -r sha256sum > "$EVIDENCE_DIR/SHA256SUMS.txt"

      - name: Upload immutable CRM-007 evidence
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-final-production-closure-${{ github.run_id }}
          path: ${{ runner.temp }}/crm-007-final-evidence
          if-no-files-found: error
          retention-days: 90

      - name: Create CRM-007 evidence pull request
        id: evidence
        if: success()
        env:
          RELEASE_SHA: ${{ steps.preflight.outputs.release_sha }}
          VERCEL_DEPLOYMENT_ID: ${{ steps.preflight.outputs.vercel_deployment_id }}
          RENDER_DEPLOYMENT_ID: ${{ steps.preflight.outputs.render_deployment_id }}
          RENDER_IMAGE_DIGEST: ${{ steps.preflight.outputs.render_image_digest }}
          RUN_URL: ${{ steps.preflight.outputs.run_url }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/crm/evidence
          cat > docs/crm/evidence/CRM-007-FINAL-PRODUCTION-CLOSURE.md <<EOF_DOC
          # CRM-007 Final Production Closure

          | Field | Evidence |
          |---|---|
          | Result | PASS |
          | Release SHA | ${RELEASE_SHA} |
          | Upstream CRM-G1 run | ${UPSTREAM_G1_RUN_ID} |
          | Flyway | 20260717.100, 20260717.101, 20260718.1, 20260721.1, 20260721.2 = SQL / true |
          | Database execution | Read-only; no migrate, repair, history edit, or manual SQL |
          | Authenticated lifecycle | PASS |
          | Two-tenant isolation | PASS |
          | CRM HTTP 500 during gate | 0 |
          | Vercel deployment | ${VERCEL_DEPLOYMENT_ID} |
          | Render deployment | ${RENDER_DEPLOYMENT_ID} |
          | Render image digest | ${RENDER_IMAGE_DIGEST:-not-returned-by-api} |
          | Workflow | ${RUN_URL} |
          | Artifact | ${ARTIFACT_URL} |
          | Artifact digest | ${ARTIFACT_DIGEST} |
          EOF_DOC
          branch="evidence/crm-007-final-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add docs/crm/evidence/CRM-007-FINAL-PRODUCTION-CLOSURE.md
          git commit -m "docs(crm): record CRM-007 final production closure"
          git push --set-upstream origin "$branch"
          PR_URL="$(gh pr create --base main --head "$branch" --title "CRM-007: final production closure evidence (${GITHUB_RUN_ID})" --body "CRM-007 passed the exact-SHA Production gate after CRM-G1 success. Merge this evidence before closing #563 and #571.")"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          gh pr comment 567 --repo "$GITHUB_REPOSITORY" --body "Superseded by current-SHA CRM-007 evidence: ${PR_URL}. Do not merge the obsolete draft."
          gh issue comment 563 --repo "$GITHUB_REPOSITORY" --body "CRM-007 SUCCESS. Run: ${RUN_URL}. Release: ${RELEASE_SHA}. Evidence PR: ${PR_URL}. Artifact: ${ARTIFACT_URL}. Issue remains open until both evidence PRs are merged."
          gh issue comment 571 --repo "$GITHUB_REPOSITORY" --body "CRM-007 SUCCESS after exact CRM-G1 run ${UPSTREAM_G1_RUN_ID}. Run: ${RUN_URL}. Release: ${RELEASE_SHA}. Evidence PR: ${PR_URL}. Artifact: ${ARTIFACT_URL}. Issues remain open until both evidence PRs are merged."

      - name: Publish result
        if: always()
        env:
          STATUS: ${{ job.status }}
          PR_URL: ${{ steps.evidence.outputs.pr_url }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "## CRM-007 Final Production Closure"
            echo "- Status: ${STATUS}"
            echo "- Evidence artifact: ${ARTIFACT_URL:-not-created}"
            echo "- Evidence PR: ${PR_URL:-not-created}"
          } >> "$GITHUB_STEP_SUMMARY"
