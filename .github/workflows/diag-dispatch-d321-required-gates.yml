name: Dispatch D321 Required Gates

on:
  pull_request:
    paths:
      - '.github/workflows/diag-dispatch-d321-required-gates.yml'

permissions:
  contents: read
  actions: write

jobs:
  dispatch-and-wait:
    name: Dispatch and verify exact D321 gates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_REF: release/d321-exact-production
      RELEASE_SHA: d3212429c66b6db663fa7eef7faa424b54cb442a
    steps:
      - name: Dispatch exact-ref required gates
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/d321-required-gates"
          mkdir -p "$OUT"
          DISPATCHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          workflows=(playwright-ci.yml production-smoke.yml crm-deployment-readiness.yml)
          jq -n --arg ref "$RELEASE_REF" '{ref:$ref}' > "$OUT/dispatch.json"
          for workflow in "${workflows[@]}"; do
            CODE="$(curl --silent --show-error --max-time 45 \
              -o "$OUT/${workflow}.response.txt" -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              -H 'Content-Type: application/json' \
              --data @"$OUT/dispatch.json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/dispatches")"
            test "$CODE" = "204" || { echo "::error::${workflow} dispatch returned ${CODE}"; exit 1; }
          done
          echo "DISPATCHED_AT=$DISPATCHED_AT" >> "$GITHUB_ENV"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

      - name: Wait for exact-SHA successful gates
        shell: bash
        run: |
          set -euo pipefail
          workflows=(playwright-ci.yml production-smoke.yml crm-deployment-readiness.yml)
          for workflow in "${workflows[@]}"; do
            COMPLETE=false
            for attempt in $(seq 1 300); do
              curl --fail-with-body --silent --show-error --max-time 45 \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?event=workflow_dispatch&branch=${RELEASE_REF}&per_page=20" \
                > "$OUT/${workflow}.runs.json"
              jq --arg sha "$RELEASE_SHA" --arg started "$DISPATCHED_AT" \
                '[.workflow_runs[] | select(.head_sha==$sha and .created_at >= $started)] | sort_by(.created_at) | first // empty' \
                "$OUT/${workflow}.runs.json" > "$OUT/${workflow}.run.json"
              RUN_ID="$(jq -r '.id // empty' "$OUT/${workflow}.run.json")"
              STATUS="$(jq -r '.status // empty' "$OUT/${workflow}.run.json")"
              CONCLUSION="$(jq -r '.conclusion // empty' "$OUT/${workflow}.run.json")"
              if [ -n "$RUN_ID" ] && [ "$STATUS" = "completed" ]; then
                test "$CONCLUSION" = "success" || { echo "::error::${workflow} exact-SHA run ${RUN_ID} concluded ${CONCLUSION}"; exit 1; }
                COMPLETE=true
                break
              fi
              sleep 10
            done
            test "$COMPLETE" = "true" || { echo "::error::${workflow} exact-SHA run did not complete"; exit 1; }
          done
          jq -n --arg sha "$RELEASE_SHA" --arg ref "$RELEASE_REF" \
            --slurpfile playwright "$OUT/playwright-ci.yml.run.json" \
            --slurpfile readiness "$OUT/production-smoke.yml.run.json" \
            --slurpfile crm "$OUT/crm-deployment-readiness.yml.run.json" \
            '{result:"PASS",release_sha:$sha,release_ref:$ref,playwright:$playwright[0],production_readiness:$readiness[0],crm_deployment_readiness:$crm[0]}' \
            > "$OUT/exact-gates-summary.json"

      - name: Upload immutable gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d321-exact-required-gates
          path: ${{ runner.temp }}/d321-required-gates
          if-no-files-found: error
          retention-days: 30
