name: CRM-007 Final Workflow Hotfix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm007-final-workflow-hotfix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Remove pre-install PyYAML dependency
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/crm007-final-verification.yml')
          text=path.read_text(encoding='utf-8')
          start=text.index('      - name: Validate workflow YAML and temporary-workflow cleanup\n')
          end=text.index('      - name: Set up JDK 21\n', start)
          replacement='''      - name: Verify temporary-workflow cleanup\n        run: |\n          set -euo pipefail\n          python3 - <<'PY2'\n          from pathlib import Path\n          temporary={\n            'crm007-contract-bootstrap.yml',\n            'crm007-compile-hotfix.yml',\n            'crm007-operations-contract-sync.yml',\n            'crm007-policy-contract-sync.yml',\n            'crm007-focused-policy-sync.yml',\n            'crm007-governance-hotfix.yml',\n            'crm007-final-contract-cleanup.yml',\n            'crm007-final-workflow-hotfix.yml',\n          }\n          present=temporary.intersection(p.name for p in Path('.github/workflows').glob('*.yml'))\n          if present:\n              raise SystemExit('Temporary CRM-007 workflows remain: '+', '.join(sorted(present)))\n          print('Temporary CRM-007 workflows are absent')\n          PY2\n'''
          path.write_text(text[:start]+replacement+text[end:],encoding='utf-8')
          PY
          git rm .github/workflows/crm007-final-workflow-hotfix.yml
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/crm007-final-verification.yml
          git commit -am 'fix(ci): make CRM-007 final verification self-contained'
          git push origin HEAD:${{ github.head_ref }}
