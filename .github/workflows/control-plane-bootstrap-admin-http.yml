name: Control Plane Bootstrap Admin (HTTP)

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/control-plane-bootstrap-admin-http.yml
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'bootstrap' to confirm one-time admin provisioning"
        required: true
        default: "no"

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    name: Bootstrap Control Plane Admin via HTTP
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 5
    steps:
      - name: Confirm
        env:
          EVENT_NAME: ${{ github.event_name }}
          CONFIRMATION: ${{ github.event.inputs.confirm }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$CONFIRMATION" != "bootstrap" ]; then
            echo "Confirmation input must be the literal string 'bootstrap'. Aborting."
            exit 1
          fi
          echo "Authorized repository-triggered bootstrap invocation accepted."

      - name: Call bootstrap endpoint
        id: call
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          CONTROL_PLANE_BOOTSTRAP_TOKEN: ${{ secrets.CONTROL_PLANE_BOOTSTRAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_BASE_URL}" ]; then
            echo "PRODUCTION_BASE_URL secret is not set"; exit 2
          fi
          if [ -z "${CONTROL_PLANE_BOOTSTRAP_TOKEN}" ]; then
            echo "CONTROL_PLANE_BOOTSTRAP_TOKEN secret is not set"; exit 2
          fi

          STATUS=$(curl -sS -o /tmp/bootstrap-response.json -w "%{http_code}" \
            --max-time 60 \
            -X POST "${PRODUCTION_BASE_URL}/api/v1/internal/control-plane/bootstrap-admin" \
            -H "Content-Type: application/json" \
            -H "X-Control-Plane-Bootstrap-Token: ${CONTROL_PLANE_BOOTSTRAP_TOKEN}" \
            --data '{}')

          SAFE_CODE=$(python3 - <<'PY'
          import json
          try:
              with open('/tmp/bootstrap-response.json') as f:
                  data = json.load(f)
              print(data.get('code', ''))
          except Exception:
              print('invalid_response')
          PY
          )
          SAFE_RESULT=$(python3 - <<'PY'
          import json
          try:
              with open('/tmp/bootstrap-response.json') as f:
                  data = json.load(f)
              if data.get('status') == 'ok' and data.get('bootstrap') == 'complete':
                  print('complete')
              else:
                  print('not_complete')
          except Exception:
              print('invalid_response')
          PY
          )

          echo "HTTP_STATUS=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "SAFE_CODE=${SAFE_CODE}" >> "$GITHUB_OUTPUT"
          echo "SAFE_RESULT=${SAFE_RESULT}" >> "$GITHUB_OUTPUT"
          echo "Bootstrap call returned HTTP ${STATUS}; result=${SAFE_RESULT}; code=${SAFE_CODE}"

          if [ "${STATUS}" != "200" ] || [ "${SAFE_RESULT}" != "complete" ]; then
            exit 1
          fi

      - name: Verify via access-check
        if: success()
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o /tmp/access-check.json -w "%{http_code}" \
            --max-time 30 \
            "${PRODUCTION_BASE_URL}/api/v1/control-plane/access-check" || true)
          echo "access-check HTTP ${STATUS}"

      - name: Record sanitized outcome
        if: always()
        uses: actions/github-script@v8
        env:
          HTTP_STATUS: ${{ steps.call.outputs.HTTP_STATUS }}
          SAFE_CODE: ${{ steps.call.outputs.SAFE_CODE }}
          SAFE_RESULT: ${{ steps.call.outputs.SAFE_RESULT }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## REM-P0-002 token-gated bootstrap attempt',
              '',
              `- HTTP status: \`${process.env.HTTP_STATUS || 'not-called'}\``,
              `- Safe result: \`${process.env.SAFE_RESULT || 'unknown'}\``,
              `- Safe code: \`${process.env.SAFE_CODE || 'none'}\``,
              `- Evidence: ${runUrl}`,
              '',
              process.env.SAFE_RESULT === 'complete'
                ? 'The production identity was atomically re-enrolled by the approved backend endpoint.'
                : 'No closure is claimed. The endpoint gate or server-side bootstrap configuration still requires correction.'
            ].join('\n');
            for (const issue_number of [516, 535, 537]) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number, body});
            }

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/bootstrap-response.json /tmp/access-check.json
          echo "Temporary files removed."
