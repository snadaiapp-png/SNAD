name: Render Release Status

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/render-release-status.yml']

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
    steps:
      - name: Inspect active release
        shell: bash
        run: |
          set -euo pipefail
          auth=(-H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json")
          curl -fsS "${auth[@]}" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" > deploys.json
          id=$(jq -r '.[0] | (.deploy // .).id' deploys.json)
          curl -fsS "${auth[@]}" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$id" > deploy.json
          echo "DEPLOY_ID=$id"
          echo "STATUS=$(jq -r '(.deploy // .).status' deploy.json)"
          echo "COMMIT=$(jq -r '(.deploy // .).commit.id // (.deploy // .).commitId' deploy.json)"
          echo "HEALTH_HTTP=$(curl -sS -o health.json -w '%{http_code}' --max-time 20 "$PRODUCTION_BASE_URL/actuator/health" || true)"
          echo "READINESS_HTTP=$(curl -sS -o readiness.json -w '%{http_code}' --max-time 20 "$PRODUCTION_BASE_URL/actuator/health/readiness" || true)"
