name: Fetch Render Service Logs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    name: Fetch Render service logs
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: List recent deploys with full details
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Recent deploys ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
            > /tmp/deploys.json
          # Show full raw structure
          jq '[.[] | .deploy | {id, status, commit: .commit.id[0:7], createdAt, finishedAt, startedAt, trigger}]' /tmp/deploys.json

      - name: Get latest deploy ID
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          LATEST=$(jq -r '.[0].deploy.id' /tmp/deploys.json)
          echo "Latest deploy ID: $LATEST"
          echo "id=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Fetch service events (last 30)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Service events (last 30) ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/events?limit=30" \
            > /tmp/events.json
          jq '[.[] | .event | {id: .id[0:20], type, timestamp, details: {instanceID: .details.instanceID, deployId: .details.deployId, deployStatus: .details.deployStatus, buildStatus: .details.buildStatus, reason: .details.reason}}]' /tmp/events.json

      - name: Try to fetch deploy logs via Render CLI
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Installing Render CLI ==="
          curl -fsSL https://raw.githubusercontent.com/render-oss/cli/main/bin/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          render --version 2>&1 | head -3

          echo "=== Fetching deploy logs ==="
          DEPLOY_ID=${{ steps.deploy.outputs.id }}
          render logs --service "$RENDER_SERVICE_ID" --deploy "$DEPLOY_ID" --token "$RENDER_API_KEY" 2>&1 | tail -100 || true

      - name: Test endpoints with verbose error output
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing login endpoint ==="
          curl --max-time 15 -v \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"test"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/login 2>&1 | tail -20

          echo ""
          echo "=== Testing forgot-password endpoint ==="
          curl --max-time 15 -v \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"test@example.com"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/forgot-password 2>&1 | tail -20

          echo ""
          echo "=== Testing registration endpoint (might give clearer error) ==="
          curl --max-time 15 -v \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"newuser@example.com","password":"TestPassword123!"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/register 2>&1 | tail -20
