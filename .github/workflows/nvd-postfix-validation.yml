name: NVD Post-Fix Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/nvd-postfix-validation.yml'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch NVD snapshot publisher on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run nvd-snapshot-publisher.yml --repo "$GITHUB_REPOSITORY" --ref main
