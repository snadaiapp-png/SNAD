name: SANAD Commercial Go-Live
run-name: "Commercial Go-Live #${{ github.run_number }} — ${{ inputs.release_sha }}"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "COMMERCIAL-GO-LIVE" to execute'
        required: true
        type: string
      release_sha:
        description: 'Exact 40-character SHA currently at main'
        required: true
        type: string

permissions:
  contents: write
  actions: read
  deployments: read
  statuses: read

concurrency:
  group: sanad-commercial-go-live
  cancel-in-progress: false

jobs:
  commercial-release:
    name: Commercial Release Evidence Validation
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 75
    env:
      RELEASE_CONFIRMATION: ${{ inputs.confirm }}
      REQUESTED_RELEASE_SHA: ${{ inputs.release_sha }}
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      WEB_PRODUCTION_BASE_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      CONTROL_PLANE_ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      CONTROL_PLANE_ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}
      CONTROL_PLANE_NON_ADMIN_EMAIL: ${{ secrets.CONTROL_PLANE_NON_ADMIN_EMAIL }}
      CONTROL_PLANE_NON_ADMIN_PASSWORD: ${{ secrets.CONTROL_PLANE_NON_ADMIN_PASSWORD }}
      CONTROL_PLANE_NON_ADMIN_TENANT_ID: ${{ secrets.CONTROL_PLANE_NON_ADMIN_TENANT_ID }}
      BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN || github.token }}

    steps:
      - name: Validate authorization and release SHA
        id: target
        shell: bash
        run: |
          set -euo pipefail
          [ "$RELEASE_CONFIRMATION" = "COMMERCIAL-GO-LIVE" ] || {
            echo "::error::Commercial release confirmation is invalid."
            exit 1
          }
          RELEASE_SHA="$REQUESTED_RELEASE_SHA"
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::release_sha must be a full lowercase 40-character SHA."
            exit 1
          }
          for name in \
            PRODUCTION_BASE_URL WEB_PRODUCTION_BASE_URL \
            RENDER_API_KEY RENDER_SERVICE_ID VERCEL_TOKEN VERCEL_PROJECT_ID \
            CONTROL_PLANE_ADMIN_EMAIL CONTROL_PLANE_ADMIN_PASSWORD CONTROL_PLANE_TENANT_ID \
            CONTROL_PLANE_NON_ADMIN_EMAIL CONTROL_PLANE_NON_ADMIN_PASSWORD CONTROL_PLANE_NON_ADMIN_TENANT_ID \
            BRANCH_PROTECTION_TOKEN
          do
            test -n "${!name:-}" || { echo "::error::$name is required."; exit 1; }
          done
          [[ "$PRODUCTION_BASE_URL" == https://* ]]
          [[ "$WEB_PRODUCTION_BASE_URL" == https://* ]]
          for value in \
            "$RENDER_API_KEY" "$RENDER_SERVICE_ID" "$VERCEL_TOKEN" "$VERCEL_PROJECT_ID" "${VERCEL_TEAM_ID:-}" \
            "$CONTROL_PLANE_ADMIN_EMAIL" "$CONTROL_PLANE_ADMIN_PASSWORD" "$CONTROL_PLANE_TENANT_ID" \
            "$CONTROL_PLANE_NON_ADMIN_EMAIL" "$CONTROL_PLANE_NON_ADMIN_PASSWORD" "$CONTROL_PLANE_NON_ADMIN_TENANT_ID" \
            "$BRANCH_PROTECTION_TOKEN"
          do
            [ -z "$value" ] || echo "::add-mask::$value"
          done
          REMOTE_MAIN_SHA="$(git ls-remote "https://github.com/$GITHUB_REPOSITORY.git" refs/heads/main | awk '{print $1}')"
          [ "$REMOTE_MAIN_SHA" = "$RELEASE_SHA" ] || {
            echo "::error::Requested SHA is not the current main head."
            exit 1
          }
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "RELEASE_SHA=$RELEASE_SHA" >> "$GITHUB_ENV"

      - name: Checkout exact release SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.release_sha }}
          fetch-depth: 0

      - name: Initialize evidence
        shell: bash
        run: |
          set -euo pipefail
          [ "$(git rev-parse HEAD)" = "$RELEASE_SHA" ]
          rm -rf evidence
          mkdir -p evidence
          jq -n --arg sha "$RELEASE_SHA" --arg runId "$GITHUB_RUN_ID" \
            '{releaseSha:$sha,runId:$runId,verifiedAt:(now|todateiso8601)}' \
            > evidence/release-sha.json

      - name: Current-tree secret scan
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DIR="$RUNNER_TEMP/gitleaks-commercial"
          mkdir -p "$REPORT_DIR"
          docker run --rm \
            -v "$PWD:/repo" -v "$REPORT_DIR:/report" \
            zricethezav/gitleaks:v8.24.3 detect \
            --source=/repo --config=/repo/.gitleaks.toml --no-git --redact \
            --report-format=json --report-path=/report/findings.json --exit-code=1
          FINDINGS=0
          if [ -f "$REPORT_DIR/findings.json" ]; then
            jq -e 'type == "array"' "$REPORT_DIR/findings.json" >/dev/null
            FINDINGS="$(jq 'length' "$REPORT_DIR/findings.json")"
          fi
          [ "$FINDINGS" -eq 0 ] || { echo "::error::Secret findings: $FINDINGS"; exit 1; }
          jq -n --argjson findings "$FINDINGS" \
            '{tool:"gitleaks",findings:$findings,result:(if $findings == 0 then "PASS" else "FAIL" end)}' \
            > evidence/secret-scan-evidence.json

      - name: Load and validate production credentials
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            > "$RUNNER_TEMP/render-env.json"
          [ "$(jq 'length' "$RUNNER_TEMP/render-env.json")" -lt 100 ] || {
            echo "::error::Render environment pagination is incomplete."
            exit 1
          }
          jq '[.[]? | (.envVar // .)]' "$RUNNER_TEMP/render-env.json" > "$RUNNER_TEMP/render-env-normalized.json"
          value() { jq -r --arg key "$1" '.[] | select(.key == $key) | .value // empty' "$RUNNER_TEMP/render-env-normalized.json" | tail -n1; }
          DATABASE_URL="$(value DATABASE_URL)"
          DATABASE_USERNAME="$(value DATABASE_USERNAME)"
          DATABASE_PASSWORD="$(value DATABASE_PASSWORD)"
          RESEND_API_KEY="$(value SECURITY_NOTIFICATION_RESEND_API_KEY)"
          for name in DATABASE_URL DATABASE_USERNAME DATABASE_PASSWORD RESEND_API_KEY; do
            [ -n "${!name}" ] || { echo "::error::$name is missing."; exit 1; }
            echo "::add-mask::${!name}"
          done
          {
            echo "DATABASE_URL=$DATABASE_URL"
            echo "DATABASE_USERNAME=$DATABASE_USERNAME"
            echo "DATABASE_PASSWORD=$DATABASE_PASSWORD"
            echo "RESEND_API_KEY=$RESEND_API_KEY"
          } >> "$GITHUB_ENV"
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client >/dev/null
          RAW_URL="${DATABASE_URL#jdbc:}"; RAW_URL="${RAW_URL#postgresql://}"; RAW_URL="${RAW_URL#https://}"
          HOST_PORT="${RAW_URL%%/*}"; DB_PART="${RAW_URL#*/}"; DB_NAME="${DB_PART%%\?*}"
          PGHOST="${HOST_PORT%%:*}"; PGPORT="${HOST_PORT#*:}"; [ "$PGPORT" != "$PGHOST" ] || PGPORT=5432
          DB_RESULT="$(PGPASSWORD="$DATABASE_PASSWORD" psql -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$DB_NAME" \
            --no-psqlrc --set=ON_ERROR_STOP=1 --tuples-only --no-align --command='SELECT 1;')"
          [ "$(tr -d '[:space:]' <<< "$DB_RESULT")" = "1" ] || { echo "::error::Database validation failed."; exit 1; }
          RESEND_STATUS="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --max-time 20 -H "Authorization: Bearer $RESEND_API_KEY" https://api.resend.com/domains)"
          [ "$RESEND_STATUS" = "200" ] || { echo "::error::Resend validation failed: $RESEND_STATUS"; exit 1; }
          jq -n --arg db "$(tr -d '[:space:]' <<< "$DB_RESULT")" --arg resend "$RESEND_STATUS" \
            '{databaseCredential:(if $db == "1" then "PASS" else "FAIL" end),resendCredential:(if $resend == "200" then "PASS" else "FAIL" end),result:(if ($db == "1" and $resend == "200") then "PASS" else "FAIL" end)}' \
            > evidence/credential-validation-evidence.json

      - name: Verify Flyway production history
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/production/verify-flyway.sh
          jq -n '{result:"PASS"}' > evidence/flyway-evidence.json

      - name: Capture previous live Render SHA
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=20" \
            > "$RUNNER_TEMP/render-deploys.json"
          PREVIOUS_SHA="$(jq -r '[.[]? | (.deploy // .) | select((.status // "") == "live")][0].commit.id // empty' "$RUNNER_TEMP/render-deploys.json")"
          echo "sha=$PREVIOUS_SHA" >> "$GITHUB_OUTPUT"

      - name: Deploy and verify exact Render SHA
        id: render
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg commit "$RELEASE_SHA" '{commitId:$commit,clearCache:"do_not_clear"}' > "$RUNNER_TEMP/render-request.json"
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" -H "Content-Type: application/json" \
            --data @"$RUNNER_TEMP/render-request.json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" > "$RUNNER_TEMP/render-created.json"
          DEPLOY_ID="$(jq -r '(.deploy // .).id // empty' "$RUNNER_TEMP/render-created.json")"
          [ -n "$DEPLOY_ID" ] || { echo "::error::Render deployment ID missing."; exit 1; }
          for attempt in $(seq 1 180); do
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" > "$RUNNER_TEMP/render-state.json"
            STATUS="$(jq -r '(.deploy // .).status // "pending"' "$RUNNER_TEMP/render-state.json")"
            case "$STATUS" in live) break ;; build_failed|update_failed|canceled|deactivated) exit 1 ;; esac
            sleep 10
          done
          STATUS="$(jq -r '(.deploy // .).status // empty' "$RUNNER_TEMP/render-state.json")"
          DEPLOYED_SHA="$(jq -r '(.deploy // .).commit.id // empty' "$RUNNER_TEMP/render-state.json")"
          [ "$STATUS" = "live" ] && [ "$DEPLOYED_SHA" = "$RELEASE_SHA" ] || {
            echo "::error::Render status/SHA verification failed."
            exit 1
          }
          jq -n --arg id "$DEPLOY_ID" --arg sha "$DEPLOYED_SHA" --arg status "$STATUS" \
            '{deploymentId:$id,commitSha:$sha,status:$status,result:(if ($status == "live" and $sha == env.RELEASE_SHA) then "PASS" else "FAIL" end)}' \
            > evidence/render-deployment.json
          echo "id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Verify backend, Control Plane and two identities
        shell: bash
        env:
          DEPLOYED_COMMIT_SHA: ${{ steps.target.outputs.release_sha }}
          CONTROL_PLANE_SMOKE_EVIDENCE_FILE: evidence/authenticated-smoke-evidence.json
        run: |
          set -euo pipefail
          for attempt in $(seq 1 72); do
            H="$(curl -sS -o "$RUNNER_TEMP/health.json" -w '%{http_code}' --max-time 20 "$PRODUCTION_BASE_URL/actuator/health" || true)"
            R="$(curl -sS -o "$RUNNER_TEMP/readiness.json" -w '%{http_code}' --max-time 20 "$PRODUCTION_BASE_URL/actuator/health/readiness" || true)"
            if [ "$H" = 200 ] && [ "$R" = 200 ] && jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null 2>&1 && jq -e '.status == "UP"' "$RUNNER_TEMP/readiness.json" >/dev/null 2>&1; then break; fi
            sleep 5
          done
          [ "$H" = 200 ] && [ "$R" = 200 ] || { echo "::error::Health/readiness failed."; exit 1; }
          jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null
          jq -e '.status == "UP"' "$RUNNER_TEMP/readiness.json" >/dev/null
          PAGE="$(curl -sS -L -o /dev/null -w '%{http_code}' --max-time 60 "$WEB_PRODUCTION_BASE_URL/control-plane")"
          [ "$PAGE" = 200 ] || { echo "::error::Control Plane page failed."; exit 1; }
          bash scripts/production/verify-control-plane-authenticated-smoke.sh
          jq -e '.result == "PASS"' evidence/authenticated-smoke-evidence.json >/dev/null
          jq -n --arg health "$H" --arg readiness "$R" --arg page "$PAGE" \
            '{healthHttp:$health,readinessHttp:$readiness,controlPlaneHttp:$page,result:"PASS"}' \
            > evidence/health-readiness-evidence.json

      - name: Verify delivered recovery message
        id: recovery
        shell: bash
        run: |
          set -euo pipefail
          REQUESTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PAYLOAD="$(jq -n --arg email "$CONTROL_PLANE_ADMIN_EMAIL" '{email:$email}')"
          CODE="$(curl -sS -o "$RUNNER_TEMP/forgot.json" -w '%{http_code}' --max-time 30 -X POST \
            -H 'Content-Type: application/json' --data "$PAYLOAD" "$PRODUCTION_BASE_URL/api/v1/auth/forgot-password")"
          [ "$CODE" = 200 ] || { echo "::error::Recovery request failed: $CODE"; exit 1; }
          MESSAGE_ID=""; DELIVERY=""; CREATED_AT=""
          for attempt in $(seq 1 30); do
            curl --fail-with-body --silent --show-error --max-time 20 \
              -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/emails?limit=100" > "$RUNNER_TEMP/emails.json"
            MESSAGE_ID="$(jq -r --arg recipient "$CONTROL_PLANE_ADMIN_EMAIL" --arg at "$REQUESTED_AT" \
              '[.data[]? | select((.created_at // "") >= $at and (((.to // []) | type) == "array") and ((.to // []) | index($recipient) != null) and ((.subject // "") | test("reset|password|إعادة|كلمة المرور"; "i")))] | sort_by(.created_at) | last | .id // empty' "$RUNNER_TEMP/emails.json")"
            if [ -n "$MESSAGE_ID" ]; then
              curl --fail-with-body --silent --show-error --max-time 20 \
                -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/emails/$MESSAGE_ID" > "$RUNNER_TEMP/email.json"
              CREATED_AT="$(jq -r '.created_at // empty' "$RUNNER_TEMP/email.json")"
              DELIVERY="$(jq -r '.last_event // .status // empty' "$RUNNER_TEMP/email.json")"
              [ "$DELIVERY" = delivered ] && break
            fi
            sleep 5
          done
          [ -n "$MESSAGE_ID" ] && [ "$DELIVERY" = delivered ] || { echo "::error::Delivered recovery message not found."; exit 1; }
          jq -n --arg id "$MESSAGE_ID" --arg requestedAt "$REQUESTED_AT" --arg createdAt "$CREATED_AT" --arg status "$DELIVERY" \
            '{messageId:$id,requestedAt:$requestedAt,createdAt:$createdAt,deliveryStatus:$status,result:(if $status == "delivered" then "PASS" else "FAIL" end)}' \
            > evidence/email-delivery-evidence.json
          echo "message_id=$MESSAGE_ID" >> "$GITHUB_OUTPUT"

      - name: Verify exact Vercel production SHA
        id: vercel
        shell: bash
        run: |
          set -euo pipefail
          TEAM_QUERY=""; [ -z "$VERCEL_TEAM_ID" ] || TEAM_QUERY="&teamId=$VERCEL_TEAM_ID"
          curl --fail-with-body --silent --show-error --max-time 30 \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=100${TEAM_QUERY}" \
            > "$RUNNER_TEMP/vercel.json"
          MATCH="$(jq -c --arg sha "$RELEASE_SHA" '[.deployments[]? | select((.meta.githubCommitSha // "") == $sha and (.target // "") == "production" and ((.readyState // .state // "") == "READY"))] | sort_by(.createdAt) | last // empty' "$RUNNER_TEMP/vercel.json")"
          [ -n "$MATCH" ] && [ "$MATCH" != null ] || { echo "::error::Matching Vercel deployment not found."; exit 1; }
          ID="$(jq -r '.uid // empty' <<< "$MATCH")"; SHA="$(jq -r '.meta.githubCommitSha // empty' <<< "$MATCH")"
          [ "$SHA" = "$RELEASE_SHA" ] || exit 1
          jq -n --arg id "$ID" --arg sha "$SHA" '{deploymentId:$id,githubCommitSha:$sha,result:(if $sha == env.RELEASE_SHA then "PASS" else "FAIL" end)}' > evidence/vercel-deployment.json
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Verify branch protection, evidence and create tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --max-time 30 \
            -H "Authorization: Bearer $BRANCH_PROTECTION_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/branches/main/protection" > "$RUNNER_TEMP/protection.json"
          REQUIRED='["Maven Test Suite","Build Next.js Web","Security Gate Summary","provenance"]'
          jq -e --argjson required "$REQUIRED" '
            (.required_status_checks.strict == true) and
            ((.required_status_checks.contexts // []) as $configured | all($required[]; . as $check | $configured | index($check) != null)) and
            (.enforce_admins.enabled == true) and
            ((.required_pull_request_reviews.required_approving_review_count // 0) >= 1) and
            (.required_pull_request_reviews.dismiss_stale_reviews == true) and
            (.required_conversation_resolution.enabled == true) and
            (.allow_force_pushes.enabled == false) and (.allow_deletions.enabled == false)' "$RUNNER_TEMP/protection.json" >/dev/null
          jq -n '{result:"PASS"}' > evidence/branch-protection-evidence.json
          for file in secret-scan-evidence credential-validation-evidence flyway-evidence render-deployment health-readiness-evidence authenticated-smoke-evidence email-delivery-evidence vercel-deployment branch-protection-evidence; do
            test -s "evidence/$file.json" && jq -e '.result == "PASS"' "evidence/$file.json" >/dev/null || { echo "::error::Evidence gate failed: $file"; exit 1; }
          done
          if grep -RIEq '"?(password|accessToken|refreshToken|cookie|resetToken|tenantId|email)"?[[:space:]]*:' evidence; then
            echo "::error::Evidence contains prohibited sensitive fields."
            exit 1
          fi
          TAG="sanad-commercial-$(date -u +%Y%m%d)-${RELEASE_SHA:0:12}"
          git config user.name "SANAD Release Bot"; git config user.email "noreply@snad.ai"
          EXISTING="$(git ls-remote --tags origin "refs/tags/$TAG^{}" | awk '{print $1}')"
          if [ -n "$EXISTING" ]; then [ "$EXISTING" = "$RELEASE_SHA" ] || exit 1; else git tag -a "$TAG" "$RELEASE_SHA" -m "SANAD Commercial Release — all gates passed"; git push origin "$TAG"; fi
          jq -n --arg releaseSha "$RELEASE_SHA" --arg releaseTag "$TAG" \
            --slurpfile render evidence/render-deployment.json --slurpfile vercel evidence/vercel-deployment.json \
            --slurpfile email evidence/email-delivery-evidence.json \
            '{releaseSha:$releaseSha,releaseTag:$releaseTag,renderDeploymentId:$render[0].deploymentId,vercelDeploymentId:$vercel[0].deploymentId,emailMessageId:$email[0].messageId,finalDecision:"COMMERCIAL GO-LIVE — GO"}' \
            > evidence/commercial-release-summary.json
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          jq . evidence/commercial-release-summary.json >> "$GITHUB_STEP_SUMMARY"

      - name: Roll back failed Render release
        if: failure() && steps.previous.outputs.sha != '' && steps.previous.outputs.sha != steps.target.outputs.release_sha
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg commit "${{ steps.previous.outputs.sha }}" '{commitId:$commit,clearCache:"do_not_clear"}' > "$RUNNER_TEMP/rollback.json"
          curl --silent --show-error -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" -H "Content-Type: application/json" \
            --data @"$RUNNER_TEMP/rollback.json" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" >/dev/null

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-release-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 365
