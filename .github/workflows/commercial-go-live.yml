name: SANAD Commercial Go-Live

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "COMMERCIAL-GO-LIVE" to execute'
        required: true
        type: string
      release_sha:
        description: 'Exact 40-character SHA currently at main'
        required: true
        type: string

permissions:
  contents: write
  actions: read
  deployments: read
  statuses: read

concurrency:
  group: sanad-commercial-go-live
  cancel-in-progress: false

jobs:
  commercial-release:
    name: Commercial Release Evidence Validation
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 75
    env:
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      WEB_PRODUCTION_BASE_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}

      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}

      CONTROL_PLANE_ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      CONTROL_PLANE_ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}

      CONTROL_PLANE_NON_ADMIN_EMAIL: ${{ secrets.CONTROL_PLANE_NON_ADMIN_EMAIL }}
      CONTROL_PLANE_NON_ADMIN_PASSWORD: ${{ secrets.CONTROL_PLANE_NON_ADMIN_PASSWORD }}
      CONTROL_PLANE_NON_ADMIN_TENANT_ID: ${{ secrets.CONTROL_PLANE_NON_ADMIN_TENANT_ID }}

      BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN || github.token }}

    steps:
      - name: Validate release authorization and protected inputs
        id: target
        shell: bash
        run: |
          set -euo pipefail

          [ "${{ inputs.confirm }}" = "COMMERCIAL-GO-LIVE" ] || {
            echo "::error::Commercial release confirmation is invalid."
            exit 1
          }

          RELEASE_SHA="${{ inputs.release_sha }}"
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::release_sha must be a full 40-character lowercase Git SHA."
            exit 1
          }

          for name in \
            PRODUCTION_BASE_URL WEB_PRODUCTION_BASE_URL \
            RENDER_API_KEY RENDER_SERVICE_ID \
            VERCEL_TOKEN VERCEL_PROJECT_ID \
            CONTROL_PLANE_ADMIN_EMAIL CONTROL_PLANE_ADMIN_PASSWORD CONTROL_PLANE_TENANT_ID \
            CONTROL_PLANE_NON_ADMIN_EMAIL CONTROL_PLANE_NON_ADMIN_PASSWORD CONTROL_PLANE_NON_ADMIN_TENANT_ID \
            BRANCH_PROTECTION_TOKEN
          do
            test -n "${!name:-}" || {
              echo "::error::$name is required in the production environment."
              exit 1
            }
          done

          [[ "$PRODUCTION_BASE_URL" == https://* ]]
          [[ "$WEB_PRODUCTION_BASE_URL" == https://* ]]

          for secret in \
            "$RENDER_API_KEY" "$RENDER_SERVICE_ID" \
            "$VERCEL_TOKEN" "$VERCEL_PROJECT_ID" "$VERCEL_TEAM_ID" \
            "$CONTROL_PLANE_ADMIN_EMAIL" "$CONTROL_PLANE_ADMIN_PASSWORD" "$CONTROL_PLANE_TENANT_ID" \
            "$CONTROL_PLANE_NON_ADMIN_EMAIL" "$CONTROL_PLANE_NON_ADMIN_PASSWORD" "$CONTROL_PLANE_NON_ADMIN_TENANT_ID" \
            "$BRANCH_PROTECTION_TOKEN"
          do
            [ -z "$secret" ] || echo "::add-mask::$secret"
          done

          REMOTE_MAIN_SHA="$(git ls-remote "https://github.com/$GITHUB_REPOSITORY.git" refs/heads/main | awk '{print $1}')"
          [ "$REMOTE_MAIN_SHA" = "$RELEASE_SHA" ] || {
            echo "::error::Requested SHA is not the current main head."
            exit 1
          }

          echo "sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "RELEASE_SHA=$RELEASE_SHA" >> "$GITHUB_ENV"

      - name: Checkout exact release SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Initialize evidence workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -rf evidence
          mkdir -p evidence
          jq -n \
            --arg sha "$RELEASE_SHA" \
            --arg runId "$GITHUB_RUN_ID" \
            '{releaseSha:$sha,runId:$runId,verifiedAt:(now|todateiso8601)}' \
            > evidence/release-sha.json

      - name: Repository secret scan
        id: secret_scan
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DIR="$RUNNER_TEMP/gitleaks-commercial"
          rm -rf "$REPORT_DIR"
          mkdir -p "$REPORT_DIR"

          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            -v "$REPORT_DIR:/report" \
            zricethezav/gitleaks:v8.24.3 detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --no-git \
            --redact \
            --report-format=json \
            --report-path=/report/findings.json \
            --exit-code=1
          SCAN_STATUS=$?
          set -e

          if [ "$SCAN_STATUS" -ne 0 ]; then
            if [ -f "$REPORT_DIR/findings.json" ]; then
              FINDING_COUNT="$(jq 'length' "$REPORT_DIR/findings.json")"
              echo "::error::Current-tree secret scan found $FINDING_COUNT finding(s)."
            else
              echo "::error::Gitleaks failed without producing a valid report."
            fi
            exit 1
          fi

          if [ -f "$REPORT_DIR/findings.json" ]; then
            jq -e 'type == "array"' "$REPORT_DIR/findings.json" >/dev/null
            FINDING_COUNT="$(jq 'length' "$REPORT_DIR/findings.json")"
          else
            FINDING_COUNT=0
          fi

          [ "$FINDING_COUNT" -eq 0 ] || {
            echo "::error::Current-tree secret scan found $FINDING_COUNT finding(s)."
            exit 1
          }

          jq -n --argjson findings "$FINDING_COUNT" '
            {
              tool:"gitleaks",
              mode:"current-tree",
              findings:$findings,
              result:(if $findings == 0 then "PASS" else "FAIL" end)
            }
          ' > evidence/secret-scan-evidence.json

          echo "finding_count=$FINDING_COUNT" >> "$GITHUB_OUTPUT"
          echo "CURRENT TREE SECRET SCAN: PASS"
          echo "FINDINGS: $FINDING_COUNT"

      - name: Read and validate Render production configuration
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            > "$RUNNER_TEMP/render-env.json"

          test "$(jq 'length' "$RUNNER_TEMP/render-env.json")" -lt 100 || {
            echo "::error::Cannot prove complete Render environment pagination."
            exit 1
          }

          jq '[.[]? | (.envVar // .)]' "$RUNNER_TEMP/render-env.json" \
            > "$RUNNER_TEMP/render-env-normalized.json"

          for key in DATABASE_URL DATABASE_USERNAME DATABASE_PASSWORD SECURITY_NOTIFICATION_RESEND_API_KEY; do
            jq -e --arg key "$key" \
              'any(.[]; .key == $key and ((.value // "") | length > 0))' \
              "$RUNNER_TEMP/render-env-normalized.json" >/dev/null || {
                echo "::error::Required Render environment value is missing: $key"
                exit 1
              }
          done

          DATABASE_URL="$(jq -r '.[] | select(.key == "DATABASE_URL") | .value' "$RUNNER_TEMP/render-env-normalized.json")"
          DATABASE_USERNAME="$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value' "$RUNNER_TEMP/render-env-normalized.json")"
          DATABASE_PASSWORD="$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value' "$RUNNER_TEMP/render-env-normalized.json")"
          RESEND_API_KEY="$(jq -r '.[] | select(.key == "SECURITY_NOTIFICATION_RESEND_API_KEY") | .value' "$RUNNER_TEMP/render-env-normalized.json")"

          for secret in "$DATABASE_URL" "$DATABASE_USERNAME" "$DATABASE_PASSWORD" "$RESEND_API_KEY"; do
            echo "::add-mask::$secret"
          done

          {
            echo "DATABASE_URL=$DATABASE_URL"
            echo "DATABASE_USERNAME=$DATABASE_USERNAME"
            echo "DATABASE_PASSWORD=$DATABASE_PASSWORD"
            echo "RESEND_API_KEY=$RESEND_API_KEY"
          } >> "$GITHUB_ENV"

          rm -f "$RUNNER_TEMP/render-env.json" "$RUNNER_TEMP/render-env-normalized.json"

      - name: Validate database and Resend credentials
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client >/dev/null

          RAW_URL="${DATABASE_URL#jdbc:}"
          RAW_URL="${RAW_URL#postgresql://}"
          RAW_URL="${RAW_URL#https://}"
          HOST_PORT="${RAW_URL%%/*}"
          DB_PART="${RAW_URL#*/}"
          DB_NAME="${DB_PART%%\?*}"
          PGHOST="${HOST_PORT%%:*}"
          PGPORT="${HOST_PORT#*:}"
          [ "$PGPORT" != "$PGHOST" ] || PGPORT=5432

          DB_RESULT="$(PGPASSWORD="$DATABASE_PASSWORD" psql \
            -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$DB_NAME" \
            --no-psqlrc --set=ON_ERROR_STOP=1 --tuples-only --no-align \
            --command='SELECT 1;')"
          [ "$(tr -d '[:space:]' <<< "$DB_RESULT")" = "1" ] || {
            echo "::error::Database credential validation failed."
            exit 1
          }

          RESEND_STATUS="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --max-time 20 \
            --header "Authorization: Bearer $RESEND_API_KEY" \
            "https://api.resend.com/domains")"
          [ "$RESEND_STATUS" = "200" ] || {
            echo "::error::Resend credential validation failed with HTTP $RESEND_STATUS."
            exit 1
          }

          jq -n \
            --arg databaseProbe "$(tr -d '[:space:]' <<< "$DB_RESULT")" \
            --arg resendHttp "$RESEND_STATUS" '
            {
              databaseCredential:{
                probe:$databaseProbe,
                result:(if $databaseProbe == "1" then "VALID" else "INVALID" end)
              },
              resendCredential:{
                httpStatus:$resendHttp,
                result:(if $resendHttp == "200" then "VALID" else "INVALID" end)
              },
              result:(
                if ($databaseProbe == "1" and $resendHttp == "200")
                then "PASS" else "FAIL" end
              )
            }
          ' > evidence/credential-validation-evidence.json

      - name: Verify Flyway production history
        id: flyway
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/production/verify-flyway.sh

          RAW_URL="${DATABASE_URL#jdbc:}"
          RAW_URL="${RAW_URL#postgresql://}"
          RAW_URL="${RAW_URL#https://}"
          HOST_PORT="${RAW_URL%%/*}"
          DB_PART="${RAW_URL#*/}"
          DB_NAME="${DB_PART%%\?*}"
          PGHOST="${HOST_PORT%%:*}"
          PGPORT="${HOST_PORT#*:}"
          [ "$PGPORT" != "$PGHOST" ] || PGPORT=5432

          HISTORY_JSON="$(PGPASSWORD="$DATABASE_PASSWORD" psql \
            -h "$PGHOST" -p "$PGPORT" -U "$DATABASE_USERNAME" -d "$DB_NAME" \
            --no-psqlrc --set=ON_ERROR_STOP=1 --tuples-only --no-align \
            --command="
              SELECT COALESCE(
                json_agg(
                  json_build_object(
                    'version', version,
                    'type', type,
                    'description', description,
                    'success', success
                  )
                  ORDER BY installed_rank
                ),
                '[]'::json
              )
              FROM flyway_schema_history
              WHERE version IN ('15','20260702.1','20260702.2','20260702.3');
            ")"

          echo "$HISTORY_JSON" | jq -e '
            length == 4 and
            all(.[]; .success == true) and
            ([.[].version] | sort) ==
              (["15","20260702.1","20260702.2","20260702.3"] | sort)
          ' >/dev/null || {
            echo "::error::Flyway production history is incomplete or contains failed migrations."
            exit 1
          }

          jq -n --argjson history "$HISTORY_JSON" '
            {
              requiredVersions:["15","20260702.1","20260702.2","20260702.3"],
              history:$history,
              result:(
                if (($history|length) == 4 and all($history[]; .success == true))
                then "PASS" else "FAIL" end
              )
            }
          ' > evidence/flyway-evidence.json

      - name: Capture previous live Render commit
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=20" \
            > "$RUNNER_TEMP/render-deploys.json"

          PREVIOUS_SHA="$(jq -r '
            [.[]? | (.deploy // .) | select((.status // "") == "live")][0].commit.id // empty
          ' "$RUNNER_TEMP/render-deploys.json")"
          echo "sha=$PREVIOUS_SHA" >> "$GITHUB_OUTPUT"
          rm -f "$RUNNER_TEMP/render-deploys.json"

      - name: Trigger exact Render release SHA
        id: render_deploy
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg commit "$RELEASE_SHA" \
            '{commitId:$commit,clearCache:"do_not_clear"}' \
            > "$RUNNER_TEMP/render-request.json"

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @"$RUNNER_TEMP/render-request.json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            > "$RUNNER_TEMP/render-deployment-created.json"

          DEPLOY_ID="$(jq -r '(.deploy // .).id // empty' "$RUNNER_TEMP/render-deployment-created.json")"
          test -n "$DEPLOY_ID" || {
            echo "::error::Render did not return a deployment ID."
            exit 1
          }
          echo "id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          rm -f "$RUNNER_TEMP/render-request.json" "$RUNNER_TEMP/render-deployment-created.json"

      - name: Wait for exact Render deployment and verify SHA
        id: render_verify
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_ID="${{ steps.render_deploy.outputs.id }}"

          for attempt in $(seq 1 180); do
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              > "$RUNNER_TEMP/render-deployment-state.json"

            STATUS="$(jq -r '(.deploy // .).status // "pending"' "$RUNNER_TEMP/render-deployment-state.json")"
            echo "Render deployment state: $STATUS"

            case "$STATUS" in
              live) break ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Render deployment entered terminal failure state: $STATUS"
                exit 1
                ;;
            esac
            sleep 10
          done

          STATUS="$(jq -r '(.deploy // .).status // empty' "$RUNNER_TEMP/render-deployment-state.json")"
          RENDER_SHA="$(jq -r '(.deploy // .).commit.id // empty' "$RUNNER_TEMP/render-deployment-state.json")"

          [ "$STATUS" = "live" ] || {
            echo "::error::Render deployment timed out before becoming live."
            exit 1
          }
          [ "$RENDER_SHA" = "$RELEASE_SHA" ] || {
            echo "::error::Render commit SHA does not match the release SHA."
            exit 1
          }

          jq '(.deploy // .) |
            {
              deploymentId:.id,
              commitSha:.commit.id,
              status:.status,
              createdAt:.createdAt,
              startedAt:.startedAt,
              finishedAt:.finishedAt,
              result:(
                if (.status == "live" and .commit.id == env.RELEASE_SHA)
                then "PASS" else "FAIL" end
              )
            }
          ' "$RUNNER_TEMP/render-deployment-state.json" \
            > evidence/render-deployment.json

          echo "sha=$RENDER_SHA" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Verify backend health and readiness
        id: health
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 72); do
            HEALTH_CODE="$(curl --silent --show-error --output "$RUNNER_TEMP/health.json" \
              --write-out '%{http_code}' --max-time 20 \
              "$PRODUCTION_BASE_URL/actuator/health" || true)"
            READINESS_CODE="$(curl --silent --show-error --output "$RUNNER_TEMP/readiness.json" \
              --write-out '%{http_code}' --max-time 20 \
              "$PRODUCTION_BASE_URL/actuator/health/readiness" || true)"

            if [ "$HEALTH_CODE" = "200" ] && [ "$READINESS_CODE" = "200" ] && \
               jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null 2>&1 && \
               jq -e '.status == "UP"' "$RUNNER_TEMP/readiness.json" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          [ "$HEALTH_CODE" = "200" ] && jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null
          [ "$READINESS_CODE" = "200" ] && jq -e '.status == "UP"' "$RUNNER_TEMP/readiness.json" >/dev/null

          jq -n \
            --arg healthHttp "$HEALTH_CODE" \
            --arg readinessHttp "$READINESS_CODE" \
            --slurpfile health "$RUNNER_TEMP/health.json" \
            --slurpfile readiness "$RUNNER_TEMP/readiness.json" '
            (
              $healthHttp == "200" and
              $readinessHttp == "200" and
              $health[0].status == "UP" and
              $readiness[0].status == "UP"
            ) as $passed |
            {
              health:{httpStatus:$healthHttp,status:$health[0].status},
              readiness:{httpStatus:$readinessHttp,status:$readiness[0].status},
              result:(if $passed then "PASS" else "FAIL" end)
            }
          ' > evidence/health-readiness-evidence.json

      - name: Verify Control Plane page and unauthenticated BFF boundary
        shell: bash
        run: |
          set -euo pipefail
          CONTROL_PLANE_CODE="$(curl --silent --show-error --location \
            --output "$RUNNER_TEMP/control-plane.html" \
            --write-out '%{http_code}' --max-time 60 \
            "$WEB_PRODUCTION_BASE_URL/control-plane")"
          [ "$CONTROL_PLANE_CODE" = "200" ] || {
            echo "::error::Control Plane page returned HTTP $CONTROL_PLANE_CODE."
            exit 1
          }

          BFF_CODE="$(curl --silent --show-error \
            --output "$RUNNER_TEMP/bff-boundary.json" \
            --write-out '%{http_code}' --max-time 90 \
            "$WEB_PRODUCTION_BASE_URL/api/platform/api/v1/control-plane/dashboard" || true)"
          case "$BFF_CODE" in
            401|403) ;;
            *)
              echo "::error::Unauthenticated BFF boundary returned HTTP $BFF_CODE."
              exit 1
              ;;
          esac

          jq -n --arg controlPlane "$CONTROL_PLANE_CODE" --arg bff "$BFF_CODE" '
            {
              controlPlane:{
                httpStatus:$controlPlane,
                result:(if $controlPlane == "200" then "PASS" else "FAIL" end)
              },
              bffSecurityBoundary:{
                httpStatus:$bff,
                result:(if ($bff == "401" or $bff == "403") then "PASS" else "FAIL" end)
              },
              result:(
                if ($controlPlane == "200" and ($bff == "401" or $bff == "403"))
                then "PASS" else "FAIL" end
              )
            }
          ' > evidence/control-plane-boundary-evidence.json

      - name: Run authenticated two-identity production smoke
        id: authenticated_smoke
        shell: bash
        env:
          DEPLOYED_COMMIT_SHA: ${{ steps.target.outputs.sha }}
          CONTROL_PLANE_SMOKE_EVIDENCE_FILE: evidence/authenticated-smoke-evidence.json
        run: |
          set -euo pipefail
          bash scripts/production/verify-control-plane-authenticated-smoke.sh
          jq -e '.result == "PASS"' evidence/authenticated-smoke-evidence.json >/dev/null

          jq '{
            schema:"sanad.tenant-isolation.production-smoke.v1",
            testedSha:.testedSha,
            runId:.runId,
            checks:{
              identityB:.checks.identityB,
              rbacDenial:.checks.rbacDenial,
              tenantIsolation:.checks.tenantIsolation
            },
            result:(
              if (
                .checks.identityB.result == "PASS" and
                .checks.rbacDenial.result == "PASS" and
                .checks.tenantIsolation.result == "PASS"
              ) then "PASS" else "FAIL" end
            )
          }' evidence/authenticated-smoke-evidence.json \
            > evidence/tenant-isolation-evidence.json

      - name: Verify recovery email with an actual delivered Resend message
        id: email_delivery
        shell: bash
        run: |
          set -euo pipefail
          REQUESTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          FORGOT_PAYLOAD="$(jq -n --arg email "$CONTROL_PLANE_ADMIN_EMAIL" '{email:$email}')"
          FORGOT_CODE="$(curl --silent --show-error \
            --output "$RUNNER_TEMP/forgot-password.json" \
            --write-out '%{http_code}' --max-time 30 \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "$FORGOT_PAYLOAD" \
            "$PRODUCTION_BASE_URL/api/v1/auth/forgot-password")"

          [ "$FORGOT_CODE" = "200" ] || {
            echo "::error::Password recovery request returned HTTP $FORGOT_CODE."
            exit 1
          }

          EMAIL_ID=""
          EMAIL_CREATED_AT=""
          EMAIL_EVENT=""

          for attempt in $(seq 1 30); do
            curl --fail-with-body --silent --show-error --max-time 20 \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              "https://api.resend.com/emails?limit=100" \
              > "$RUNNER_TEMP/resend-emails.json"

            EMAIL_ID="$(jq -r \
              --arg recipient "$CONTROL_PLANE_ADMIN_EMAIL" \
              --arg requestedAt "$REQUESTED_AT" '
              [
                .data[]?
                | select(
                    (.created_at // "") >= $requestedAt and
                    (
                      (.to // []) as $recipients |
                      (
                        (($recipients | type) == "array" and ($recipients | index($recipient) != null)) or
                        (($recipients | type) == "string" and $recipients == $recipient)
                      )
                    ) and
                    ((.subject // "") | test("reset|password|إعادة|كلمة المرور"; "i"))
                  )
              ]
              | sort_by(.created_at)
              | last
              | .id // empty
            ' "$RUNNER_TEMP/resend-emails.json")"

            if [ -n "$EMAIL_ID" ]; then
              curl --fail-with-body --silent --show-error --max-time 20 \
                -H "Authorization: Bearer $RESEND_API_KEY" \
                "https://api.resend.com/emails/$EMAIL_ID" \
                > "$RUNNER_TEMP/resend-email.json"

              EMAIL_CREATED_AT="$(jq -r '.created_at // empty' "$RUNNER_TEMP/resend-email.json")"
              EMAIL_EVENT="$(jq -r '.last_event // .status // empty' "$RUNNER_TEMP/resend-email.json")"

              if [ "$EMAIL_CREATED_AT" \> "$REQUESTED_AT" ] || [ "$EMAIL_CREATED_AT" = "$REQUESTED_AT" ]; then
                [ "$EMAIL_EVENT" = "delivered" ] && break
              fi
            fi

            sleep 5
          done

          test -n "$EMAIL_ID" || {
            echo "::error::No recovery email correlated to the current request was found."
            exit 1
          }
          [ "$EMAIL_CREATED_AT" \> "$REQUESTED_AT" ] || [ "$EMAIL_CREATED_AT" = "$REQUESTED_AT" ] || {
            echo "::error::Matched email predates the recovery request."
            exit 1
          }
          [ "$EMAIL_EVENT" = "delivered" ] || {
            echo "::error::Matched recovery email did not reach delivered state."
            exit 1
          }

          jq -n \
            --arg messageId "$EMAIL_ID" \
            --arg requestedAt "$REQUESTED_AT" \
            --arg createdAt "$EMAIL_CREATED_AT" \
            --arg deliveryStatus "$EMAIL_EVENT" '
            {
              messageId:$messageId,
              requestedAt:$requestedAt,
              createdAt:$createdAt,
              deliveryStatus:$deliveryStatus,
              result:(
                if (
                  ($messageId|length) > 0 and
                  $createdAt >= $requestedAt and
                  $deliveryStatus == "delivered"
                ) then "PASS" else "FAIL" end
              )
            }
          ' > evidence/email-delivery-evidence.json

          echo "message_id=$EMAIL_ID" >> "$GITHUB_OUTPUT"

      - name: Verify actual Vercel production deployment metadata
        id: vercel
        shell: bash
        run: |
          set -euo pipefail
          TEAM_QUERY=""
          [ -z "$VERCEL_TEAM_ID" ] || TEAM_QUERY="&teamId=$VERCEL_TEAM_ID"

          curl --fail-with-body --silent --show-error --max-time 30 \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=100${TEAM_QUERY}" \
            > "$RUNNER_TEMP/vercel-deployments.json"

          MATCH="$(jq -c --arg sha "$RELEASE_SHA" '
            [
              .deployments[]?
              | select(
                  (.meta.githubCommitSha // "") == $sha and
                  (.target // "") == "production" and
                  ((.readyState // .state // "") == "READY")
                )
            ]
            | sort_by(.createdAt)
            | last // empty
          ' "$RUNNER_TEMP/vercel-deployments.json")"

          [ -n "$MATCH" ] && [ "$MATCH" != "null" ] || {
            echo "::error::No READY Vercel production deployment matches the release SHA."
            exit 1
          }

          VERCEL_ID="$(jq -r '.uid // empty' <<< "$MATCH")"
          VERCEL_SHA="$(jq -r '.meta.githubCommitSha // empty' <<< "$MATCH")"
          VERCEL_STATE="$(jq -r '.readyState // .state // empty' <<< "$MATCH")"

          test -n "$VERCEL_ID"
          [ "$VERCEL_SHA" = "$RELEASE_SHA" ]
          [ "$VERCEL_STATE" = "READY" ]

          jq -n --argjson deployment "$MATCH" --arg releaseSha "$RELEASE_SHA" '
            {
              deploymentId:$deployment.uid,
              githubCommitSha:$deployment.meta.githubCommitSha,
              target:$deployment.target,
              readyState:($deployment.readyState // $deployment.state),
              createdAt:$deployment.createdAt,
              deploymentUrl:$deployment.url,
              result:(
                if (
                  $deployment.meta.githubCommitSha == $releaseSha and
                  $deployment.target == "production" and
                  (($deployment.readyState // $deployment.state) == "READY")
                ) then "PASS" else "FAIL" end
              )
            }
          ' > evidence/vercel-deployment.json

          echo "id=$VERCEL_ID" >> "$GITHUB_OUTPUT"
          echo "sha=$VERCEL_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify main branch protection and actual PR checks
        id: branch_protection
        shell: bash
        run: |
          set -euo pipefail

          curl --fail-with-body --silent --show-error --max-time 30 \
            -H "Authorization: Bearer $BRANCH_PROTECTION_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/branches/main/protection" \
            > "$RUNNER_TEMP/branch-protection.json"

          REQUIRED_CHECKS='["Maven Test Suite","Build Next.js Web","Security Gate Summary","provenance"]'

          jq -e --argjson required "$REQUIRED_CHECKS" '
            (.required_status_checks.strict == true) and
            ((.required_status_checks.contexts // []) as $configured |
              all($required[]; . as $check | $configured | index($check) != null)) and
            (.enforce_admins.enabled == true) and
            ((.required_pull_request_reviews.required_approving_review_count // 0) >= 1) and
            (.required_pull_request_reviews.dismiss_stale_reviews == true) and
            (.required_conversation_resolution.enabled == true) and
            (.allow_force_pushes.enabled == false) and
            (.allow_deletions.enabled == false)
          ' "$RUNNER_TEMP/branch-protection.json" >/dev/null || {
            echo "::error::Main branch protection is incomplete."
            exit 1
          }

          jq --argjson required "$REQUIRED_CHECKS" '
            {
              strictStatusChecks:.required_status_checks.strict,
              requiredChecks:$required,
              configuredChecks:(.required_status_checks.contexts // []),
              enforceAdmins:.enforce_admins.enabled,
              requiredApprovals:.required_pull_request_reviews.required_approving_review_count,
              dismissStaleReviews:.required_pull_request_reviews.dismiss_stale_reviews,
              conversationResolution:.required_conversation_resolution.enabled,
              forcePushesAllowed:.allow_force_pushes.enabled,
              deletionsAllowed:.allow_deletions.enabled
            }
            | .result = (
                if (
                  .strictStatusChecks == true and
                  (. as $evidence |
                    all($evidence.requiredChecks[]; . as $check |
                      $evidence.configuredChecks | index($check) != null)) and
                  .enforceAdmins == true and
                  .requiredApprovals >= 1 and
                  .dismissStaleReviews == true and
                  .conversationResolution == true and
                  .forcePushesAllowed == false and
                  .deletionsAllowed == false
                ) then "PASS" else "FAIL" end
              )
          ' "$RUNNER_TEMP/branch-protection.json" \
            > evidence/branch-protection-evidence.json

      - name: Validate all commercial evidence before tagging
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            release-sha.json
            secret-scan-evidence.json
            credential-validation-evidence.json
            render-deployment.json
            vercel-deployment.json
            flyway-evidence.json
            health-readiness-evidence.json
            control-plane-boundary-evidence.json
            authenticated-smoke-evidence.json
            tenant-isolation-evidence.json
            email-delivery-evidence.json
            branch-protection-evidence.json
          )

          for file in "${REQUIRED_FILES[@]}"; do
            test -s "evidence/$file" || {
              echo "::error::Required evidence file is missing: $file"
              exit 1
            }
            jq -e . "evidence/$file" >/dev/null
          done

          for file in \
            secret-scan-evidence.json \
            credential-validation-evidence.json \
            render-deployment.json \
            vercel-deployment.json \
            flyway-evidence.json \
            health-readiness-evidence.json \
            control-plane-boundary-evidence.json \
            authenticated-smoke-evidence.json \
            tenant-isolation-evidence.json \
            email-delivery-evidence.json \
            branch-protection-evidence.json
          do
            jq -e '.result == "PASS"' "evidence/$file" >/dev/null || {
              echo "::error::Evidence gate did not pass: $file"
              exit 1
            }
          done

          if grep -RIEq \
            '"?(password|accessToken|refreshToken|cookie|resetToken|tenantId|email)"?[[:space:]]*:' \
            evidence; then
            echo "::error::Evidence contains a prohibited sensitive field."
            exit 1
          fi

      - name: Create verified commercial release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${RELEASE_SHA:0:12}"
          UTC_DATE="$(date -u +%Y%m%d)"
          RELEASE_TAG="sanad-commercial-${UTC_DATE}-${SHORT_SHA}"

          git config user.name "SANAD Release Bot"
          git config user.email "noreply@snad.ai"

          EXISTING_SHA="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG^{}" | awk '{print $1}')"
          if [ -n "$EXISTING_SHA" ]; then
            [ "$EXISTING_SHA" = "$RELEASE_SHA" ] || {
              echo "::error::Release tag exists but points to another SHA."
              exit 1
            }
          else
            git tag -a "$RELEASE_TAG" "$RELEASE_SHA" \
              -m "SANAD Commercial Release — all evidence gates passed"
            git push origin "$RELEASE_TAG"
          fi

          TAGGED_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          [ "$TAGGED_SHA" = "$RELEASE_SHA" ]

          echo "name=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build evidence-derived commercial release summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail

          jq -n \
            --arg releaseSha "$RELEASE_SHA" \
            --arg releaseTag "${{ steps.tag.outputs.name }}" \
            --slurpfile secret evidence/secret-scan-evidence.json \
            --slurpfile credential evidence/credential-validation-evidence.json \
            --slurpfile render evidence/render-deployment.json \
            --slurpfile vercel evidence/vercel-deployment.json \
            --slurpfile flyway evidence/flyway-evidence.json \
            --slurpfile health evidence/health-readiness-evidence.json \
            --slurpfile boundary evidence/control-plane-boundary-evidence.json \
            --slurpfile smoke evidence/authenticated-smoke-evidence.json \
            --slurpfile isolation evidence/tenant-isolation-evidence.json \
            --slurpfile email evidence/email-delivery-evidence.json \
            --slurpfile protection evidence/branch-protection-evidence.json '
            [
              $secret[0].result,
              $credential[0].result,
              $render[0].result,
              $vercel[0].result,
              $flyway[0].result,
              $health[0].result,
              $boundary[0].result,
              $smoke[0].result,
              $isolation[0].result,
              $email[0].result,
              $protection[0].result
            ] as $results |
            (all($results[]; . == "PASS")) as $allPassed |
            {
              releaseSha:$releaseSha,
              releaseTag:$releaseTag,
              renderDeploymentId:$render[0].deploymentId,
              vercelDeploymentId:$vercel[0].deploymentId,
              repositorySecretScan:$secret[0].result,
              databaseCredential:$credential[0].databaseCredential.result,
              resendCredential:$credential[0].resendCredential.result,
              flywayHistory:$flyway[0].result,
              backendHealth:$health[0].health.status,
              backendReadiness:$health[0].readiness.status,
              controlPlane:$boundary[0].controlPlane.result,
              bffSecurityBoundary:$boundary[0].bffSecurityBoundary.result,
              adminLogin:$smoke[0].checks.adminLogin.result,
              adminRole:$smoke[0].checks.adminIdentity.result,
              controlPlaneTenant:$smoke[0].checks.adminIdentity.result,
              dashboard:$smoke[0].checks.dashboard.result,
              tenantDirectory:$smoke[0].checks.tenantDirectory.result,
              systems:$smoke[0].checks.systems.result,
              audit:$smoke[0].checks.audit.result,
              refresh:$smoke[0].checks.refresh.result,
              identityB:$smoke[0].checks.identityB.result,
              rbacDenial:$smoke[0].checks.rbacDenial.result,
              tenantIsolation:$isolation[0].result,
              logout:$smoke[0].checks.logout.result,
              postLogoutRefreshRejection:$smoke[0].checks.postLogoutRefreshRejection.result,
              authenticatedSmoke:$smoke[0].result,
              emailDelivery:$email[0].result,
              emailMessageId:$email[0].messageId,
              renderShaMatch:(
                if $render[0].commitSha == $releaseSha then "PASS" else "FAIL" end
              ),
              vercelShaMatch:(
                if $vercel[0].githubCommitSha == $releaseSha then "PASS" else "FAIL" end
              ),
              mainBranchFreeze:$protection[0].result,
              requiredStatusChecks:$protection[0].result,
              finalDecision:(
                if (
                  $allPassed and
                  $render[0].commitSha == $releaseSha and
                  $vercel[0].githubCommitSha == $releaseSha and
                  ($releaseTag|length) > 0
                )
                then "COMMERCIAL GO-LIVE — GO"
                else "COMMERCIAL GO-LIVE — NO-GO"
                end
              )
            }
          ' > evidence/commercial-release-summary.json

          jq -e '.finalDecision == "COMMERCIAL GO-LIVE — GO"' \
            evidence/commercial-release-summary.json >/dev/null || {
              echo "::error::Commercial release summary resolved to NO-GO."
              exit 1
            }

          echo "decision=$(jq -r '.finalDecision' evidence/commercial-release-summary.json)" \
            >> "$GITHUB_OUTPUT"

      - name: Publish commercial release report
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## SANAD Commercial Release Report"
            echo
            echo '```json'
            jq . evidence/commercial-release-summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Roll back failed Render release
        if: failure() && steps.previous.outputs.sha != '' && steps.previous.outputs.sha != steps.target.outputs.sha
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg commit "${{ steps.previous.outputs.sha }}" \
            '{commitId:$commit,clearCache:"do_not_clear"}' \
            > "$RUNNER_TEMP/render-rollback-request.json"

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @"$RUNNER_TEMP/render-rollback-request.json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            | jq '(.deploy // .) | {deploymentId:.id,commitSha:.commit.id,status:.status}' \
            > evidence/render-rollback.json

      - name: Upload reviewable release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-release-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 365
