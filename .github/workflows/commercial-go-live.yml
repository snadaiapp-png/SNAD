name: SANAD Commercial Go-Live
run-name: "SANAD Commercial Go-Live #${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "COMMERCIAL-GO-LIVE" to execute'
        required: true
        type: string
      release_sha:
        description: 'Exact lowercase 40-character SHA currently at main'
        required: true
        type: string

permissions:
  contents: write
  actions: read
  deployments: read
  statuses: read

concurrency:
  group: sanad-commercial-go-live
  cancel-in-progress: false

jobs:
  commercial-release:
    name: Commercial Release Evidence Validation
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 90
    env:
      RELEASE_CONFIRMATION: ${{ inputs.confirm }}
      REQUESTED_RELEASE_SHA: ${{ inputs.release_sha }}
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      WEB_PRODUCTION_BASE_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}
      CREDENTIAL_ROTATION_NOT_BEFORE: ${{ vars.CREDENTIAL_ROTATION_NOT_BEFORE }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      CONTROL_PLANE_ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      CONTROL_PLANE_ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}
      CONTROL_PLANE_NON_ADMIN_EMAIL: ${{ secrets.IDENTITY_B_EMAIL }}
      CONTROL_PLANE_NON_ADMIN_PASSWORD: ${{ secrets.IDENTITY_B_PASSWORD }}
      CONTROL_PLANE_NON_ADMIN_TENANT_ID: ${{ secrets.IDENTITY_B_TENANT_ID }}
      BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_PROXY_BEARER_TOKEN: ${{ secrets.EMAIL_PROXY_BEARER_TOKEN }}

    steps:
      - name: Validate authorization, configuration and release SHA
        id: target
        shell: bash
        run: |
          set -Eeuo pipefail
          [ "$RELEASE_CONFIRMATION" = "COMMERCIAL-GO-LIVE" ] || {
            echo "::error::Commercial release confirmation is invalid."
            exit 1
          }

          RELEASE_SHA="$REQUESTED_RELEASE_SHA"
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::release_sha must be a full lowercase 40-character SHA."
            exit 1
          }

          for name in \
            PRODUCTION_BASE_URL WEB_PRODUCTION_BASE_URL CREDENTIAL_ROTATION_NOT_BEFORE \
            RENDER_API_KEY RENDER_SERVICE_ID VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID \
            CONTROL_PLANE_ADMIN_EMAIL CONTROL_PLANE_ADMIN_PASSWORD CONTROL_PLANE_TENANT_ID \
            CONTROL_PLANE_NON_ADMIN_EMAIL CONTROL_PLANE_NON_ADMIN_PASSWORD \
            CONTROL_PLANE_NON_ADMIN_TENANT_ID BRANCH_PROTECTION_TOKEN
          do
            test -n "${!name:-}" || {
              echo "::error::$name is required in GitHub Environment production."
              exit 1
            }
          done

          [[ "$PRODUCTION_BASE_URL" == https://* ]] || exit 1
          [[ "$WEB_PRODUCTION_BASE_URL" == https://* ]] || exit 1
          [[ "$CREDENTIAL_ROTATION_NOT_BEFORE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]] || {
            echo "::error::CREDENTIAL_ROTATION_NOT_BEFORE must be a UTC ISO-8601 timestamp."
            exit 1
          }
          date -u -d "$CREDENTIAL_ROTATION_NOT_BEFORE" >/dev/null

          for value in \
            "$RENDER_API_KEY" "$RENDER_SERVICE_ID" "$VERCEL_TOKEN" "$VERCEL_PROJECT_ID" "$VERCEL_TEAM_ID" \
            "$CONTROL_PLANE_ADMIN_EMAIL" "$CONTROL_PLANE_ADMIN_PASSWORD" "$CONTROL_PLANE_TENANT_ID" \
            "$CONTROL_PLANE_NON_ADMIN_EMAIL" "$CONTROL_PLANE_NON_ADMIN_PASSWORD" \
            "$CONTROL_PLANE_NON_ADMIN_TENANT_ID" "$BRANCH_PROTECTION_TOKEN"
          do
            echo "::add-mask::$value"
          done

          REMOTE_MAIN_SHA="$(git ls-remote "https://github.com/$GITHUB_REPOSITORY.git" refs/heads/main | awk '{print $1}')"
          [ "$REMOTE_MAIN_SHA" = "$RELEASE_SHA" ] || {
            echo "::error::Requested SHA does not match the current main head."
            exit 1
          }

          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "RELEASE_SHA=$RELEASE_SHA" >> "$GITHUB_ENV"

      - name: Checkout exact release SHA
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.release_sha }}
          fetch-depth: 0

      - name: Foundation gates
        id: foundation
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/production/commercial-go-live-foundation.sh

      - name: Runtime, deployment and identity gates
        id: runtime
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/production/commercial-go-live-runtime.sh

      - name: Governance, evidence and release tag gates
        id: governance
        shell: bash
        continue-on-error: true
        run: |
          set -Eeuo pipefail
          bash scripts/production/commercial-go-live-governance.sh

      - name: Roll back failed Render release and verify exact rollback SHA
        id: rollback
        if: failure() && (steps.foundation.outcome == 'failure' || steps.runtime.outcome == 'failure') && env.PREVIOUS_RENDER_SHA != '' && env.PREVIOUS_RENDER_SHA != env.RELEASE_SHA && env.RELEASE_TAG_CREATED != 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ "$PREVIOUS_RENDER_SHA" =~ ^[0-9a-f]{40}$ ]] || exit 1
          jq -n --arg commit "$PREVIOUS_RENDER_SHA" \
            '{commitId:$commit,clearCache:"do_not_clear"}' \
            > "$RUNNER_TEMP/render-rollback-request.json"
          curl -sS --show-error --max-time 45 \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @"$RUNNER_TEMP/render-rollback-request.json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            > "$RUNNER_TEMP/render-rollback-created.json"
          ROLLBACK_ID="$(jq -r '(.deploy // .).id // empty' "$RUNNER_TEMP/render-rollback-created.json")"
          test -n "$ROLLBACK_ID" || exit 1
          for attempt in $(seq 1 180); do
            curl -sS --show-error --max-time 45 \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$ROLLBACK_ID" \
              > "$RUNNER_TEMP/render-rollback-state.json"
            STATUS="$(jq -r '(.deploy // .).status // "pending"' "$RUNNER_TEMP/render-rollback-state.json")"
            case "$STATUS" in
              live) break ;;
              build_failed|update_failed|canceled|deactivated) exit 1 ;;
            esac
            sleep 10
          done
          STATUS="$(jq -r '(.deploy // .).status // empty' "$RUNNER_TEMP/render-rollback-state.json")"
          ROLLED_BACK_SHA="$(jq -r '(.deploy // .).commit.id // empty' "$RUNNER_TEMP/render-rollback-state.json")"
          [ "$STATUS" = "live" ] && [ "$ROLLED_BACK_SHA" = "$PREVIOUS_RENDER_SHA" ] || exit 1
          echo "Render rollback verified at $ROLLED_BACK_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Finalize mandatory NO-GO evidence
        id: no_go_evidence
        if: failure() && (steps.foundation.outcome == 'failure' || steps.runtime.outcome == 'failure')
        shell: bash
        env:
          TARGET_OUTCOME: ${{ steps.target.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          FOUNDATION_OUTCOME: ${{ steps.foundation.outcome }}
          RUNTIME_OUTCOME: ${{ steps.runtime.outcome }}
          GOVERNANCE_OUTCOME: ${{ steps.governance.outcome }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
        run: |
          set -Eeuo pipefail
          mkdir -p evidence

          FAILED_GATE="UNKNOWN"
          if [ "$TARGET_OUTCOME" = "failure" ]; then
            FAILED_GATE="AUTHORIZATION_CONFIGURATION_SHA"
          elif [ "$CHECKOUT_OUTCOME" = "failure" ]; then
            FAILED_GATE="CHECKOUT_EXACT_SHA"
          elif [ "$FOUNDATION_OUTCOME" = "failure" ]; then
            FAILED_GATE="FOUNDATION"
          elif [ "$RUNTIME_OUTCOME" = "failure" ]; then
            FAILED_GATE="RUNTIME_DEPLOYMENT_IDENTITY"
          elif [ "$GOVERNANCE_OUTCOME" = "failure" ]; then
            FAILED_GATE="GOVERNANCE_EVIDENCE_RELEASE_TAG"
          elif [ "$ROLLBACK_OUTCOME" = "failure" ]; then
            FAILED_GATE="ROLLBACK"
          fi

          RELEASE_EVIDENCE_SHA="${RELEASE_SHA:-${REQUESTED_RELEASE_SHA:-UNKNOWN}}"
          SUMMARY_FILE="evidence/commercial-release-summary.json"

          if ! jq -e 'type == "object"' "$SUMMARY_FILE" >/dev/null 2>&1; then
            jq -n \
              --arg releaseSha "$RELEASE_EVIDENCE_SHA" \
              --arg runId "$GITHUB_RUN_ID" \
              '{releaseSha:$releaseSha,runId:$runId}' \
              > "$SUMMARY_FILE"
          fi

          jq \
            --arg releaseSha "$RELEASE_EVIDENCE_SHA" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg failedGate "$FAILED_GATE" \
            --arg target "$TARGET_OUTCOME" \
            --arg checkout "$CHECKOUT_OUTCOME" \
            --arg foundation "$FOUNDATION_OUTCOME" \
            --arg runtime "$RUNTIME_OUTCOME" \
            --arg governance "$GOVERNANCE_OUTCOME" \
            --arg rollback "$ROLLBACK_OUTCOME" \
            '
              .releaseSha = $releaseSha |
              .runId = $runId |
              .status = "FAILED" |
              .failedGate = $failedGate |
              .finalDecision = "COMMERCIAL GO-LIVE — NO-GO" |
              .stepOutcomes = {
                target:$target,
                checkout:$checkout,
                foundation:$foundation,
                runtime:$runtime,
                governance:$governance,
                rollback:$rollback
              }
            ' "$SUMMARY_FILE" > "$SUMMARY_FILE.tmp"

          mv "$SUMMARY_FILE.tmp" "$SUMMARY_FILE"

      - name: Publish GO decision on success
        if: success() || (steps.foundation.outcome == 'success' && steps.runtime.outcome == 'success')
        shell: bash
        run: |
          {
            echo "## SANAD Commercial Release Decision"
            echo
            echo "COMMERCIAL GO-LIVE — GO"
            echo
            echo "STATUS: OPERATIONAL"
            echo "ACCEPTANCE: ACHIEVED"
            echo
            echo "Foundation Gates: PASS"
            echo "Runtime Gates: PASS"
            echo "Governance Gates: ${{ steps.governance.outcome }}"
            echo
            echo "Release SHA: ${{ env.RELEASE_SHA }}"
            echo "Render Deployment: ${{ env.RENDER_DEPLOYMENT_ID }}"
            echo "Previous Render SHA: ${{ env.PREVIOUS_RENDER_SHA }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish mandatory NO-GO decision on failure
        if: failure() && (steps.foundation.outcome == 'failure' || steps.runtime.outcome == 'failure')
        shell: bash
        run: |
          {
            echo "## SANAD Commercial Release Decision"
            echo
            echo "COMMERCIAL GO-LIVE — NO-GO"
            echo
            echo "STATUS: BLOCKED"
            echo "ACCEPTANCE: NOT ACHIEVED"
            echo "RELEASE TAG: NOT AUTHORIZED"
            echo "COMMERCIAL LAUNCH: NOT AUTHORIZED"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-release-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 365
