name: Security Scan (OWASP)

on:
  pull_request:
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
      - '.github/workflows/security-scan.yml'
      - 'scripts/ci/**'
      - 'scripts/security/**'
      - 'tests/ci/**'
      - 'tests/security/**'
      - 'infra/aws/nvd-snapshot-reader-role.yml'
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
      - '.github/workflows/security-scan.yml'
      - 'scripts/ci/**'
      - 'scripts/security/**'
      - 'tests/ci/**'
      - 'tests/security/**'
      - 'infra/aws/nvd-snapshot-reader-role.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: '12.1.0'
  NVD_MAX_AGE_HOURS: '48'
  NVD_MIN_SIZE_BYTES: '52428800'
  NVD_CANONICAL_DIR: ${{ github.workspace }}/.cache/dependency-check-data
  EVIDENCE_DIR: ${{ github.workspace }}/artifacts/security/owasp

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install security validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pytest pyyaml boto3
          command -v gh >/dev/null
          command -v aws >/dev/null
          command -v mvn >/dev/null
          bash -n scripts/security/run_owasp_gate.sh
          python3 -m py_compile scripts/security/download_nvd_snapshot.py

      - name: Run security contract tests
        id: contract_tests
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pytest \
            tests/ci/test_parse_owasp.py \
            tests/ci/test_validate_nvd_database.py \
            tests/security/test_nvd_snapshot_consumer.py \
            tests/security/test_nvd_oidc_contract.py \
            -q
          echo 'result=pass' >> "$GITHUB_OUTPUT"

      - name: Select snapshot backend
        id: mode
        shell: bash
        env:
          CONFIGURED_BACKEND: ${{ vars.NVD_SNAPSHOT_BACKEND }}
        run: |
          set -euo pipefail
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            BACKEND='github-releases'
            MODE='pull-request-evidence'
          else
            BACKEND="${CONFIGURED_BACKEND:-github-releases}"
            MODE='acceptance'
          fi
          case "$BACKEND" in
            github-releases|s3) ;;
            *) echo "::error::Unsupported backend: $BACKEND"; exit 1 ;;
          esac
          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Snapshot backend: $BACKEND"

      - name: Validate backend configuration
        id: backend_preflight
        shell: bash
        env:
          BACKEND: ${{ steps.mode.outputs.backend }}
          ROLE_ARN: ${{ vars.NVD_SNAPSHOT_READER_ROLE }}
          AWS_REGION_VALUE: ${{ vars.NVD_SNAPSHOT_REGION }}
          BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
        run: |
          set -euo pipefail
          if [[ "$BACKEND" == 's3' ]]; then
            [[ -n "$ROLE_ARN" ]] || { echo '::error::NVD_SNAPSHOT_READER_ROLE is required'; exit 1; }
            [[ -n "$AWS_REGION_VALUE" ]] || { echo '::error::NVD_SNAPSHOT_REGION is required'; exit 1; }
            [[ -n "$BUCKET" ]] || { echo '::error::NVD_SNAPSHOT_BUCKET is required'; exit 1; }
            [[ "$ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/ ]] || { echo '::error::Invalid reader role ARN'; exit 1; }
          fi
          echo 'result=pass' >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        id: aws_credentials
        if: steps.mode.outputs.backend == 's3'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ vars.NVD_SNAPSHOT_READER_ROLE }}
          aws-region: ${{ vars.NVD_SNAPSHOT_REGION }}
          audience: sts.amazonaws.com
          role-session-name: snad-nvd-reader-${{ github.run_id }}
          role-duration-seconds: 1800
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify AWS reader identity and bucket controls
        id: aws_verification
        if: steps.mode.outputs.backend == 's3'
        shell: bash
        env:
          EXPECTED_ACCOUNT: ${{ vars.NVD_SNAPSHOT_AWS_ACCOUNT_ID }}
          BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
          PREFIX: ${{ vars.NVD_SNAPSHOT_PREFIX }}
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          IDENTITY_FILE="$EVIDENCE_DIR/aws-identity.json"
          VERSIONING_FILE="$EVIDENCE_DIR/aws-bucket-versioning.json"
          ENCRYPTION_FILE="$EVIDENCE_DIR/aws-bucket-encryption.json"
          aws sts get-caller-identity --output json > "$IDENTITY_FILE"
          ACCOUNT=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["Account"])' "$IDENTITY_FILE")
          if [[ -n "$EXPECTED_ACCOUNT" && "$ACCOUNT" != "$EXPECTED_ACCOUNT" ]]; then
            echo '::error::OIDC assumed an unexpected AWS account'
            exit 1
          fi
          aws s3api get-bucket-versioning --bucket "$BUCKET" --output json > "$VERSIONING_FILE"
          STATUS=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("Status", ""))' "$VERSIONING_FILE")
          [[ "$STATUS" == 'Enabled' ]] || { echo '::error::Snapshot bucket versioning is not enabled'; exit 1; }
          aws s3api get-bucket-encryption --bucket "$BUCKET" --output json > "$ENCRYPTION_FILE"
          aws s3api head-object \
            --bucket "$BUCKET" \
            --key "${PREFIX:-snad-nvd}/channels/verified/latest.json" \
            --output json > "$EVIDENCE_DIR/aws-latest-object.json"
          echo 'result=pass' >> "$GITHUB_OUTPUT"

      - name: Download and verify NVD snapshot and run OWASP
        id: owasp_gate
        continue-on-error: true
        shell: bash
        env:
          NVD_ACTIVE_BACKEND: ${{ steps.mode.outputs.backend }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_SNAPSHOT_BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
          NVD_SNAPSHOT_PREFIX: ${{ vars.NVD_SNAPSHOT_PREFIX }}
          NVD_SNAPSHOT_REGION: ${{ vars.NVD_SNAPSHOT_REGION }}
          NVD_SNAPSHOT_ENDPOINT: ${{ vars.NVD_SNAPSHOT_ENDPOINT }}
        run: bash scripts/security/run_owasp_gate.sh

      - name: Upload OWASP HTML, JSON, and enforcement evidence
        id: upload_evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-evidence-${{ github.run_id }}
          path: |
            apps/sanad-platform/target/dependency-check-report/dependency-check-report.html
            apps/sanad-platform/target/dependency-check-report/dependency-check-report.json
            artifacts/security/owasp/
          if-no-files-found: warn
          retention-days: 30

      - name: Write security summary
        if: always()
        shell: bash
        run: |
          TERMINAL_FILE="$EVIDENCE_DIR/terminal-enforcement.json"
          {
            echo '## OWASP Dependency-Check — Verified Offline Gate'
            echo ''
            echo "- Tested SHA: \`${{ github.sha }}\`"
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Mode: ${{ steps.mode.outputs.mode }}"
            echo "- Backend: ${{ steps.mode.outputs.backend }}"
            echo "- Contract tests: ${{ steps.contract_tests.outcome }}"
            echo "- AWS OIDC: ${{ steps.aws_credentials.outcome }}"
            echo "- AWS controls: ${{ steps.aws_verification.outcome }}"
            echo "- OWASP gate: ${{ steps.owasp_gate.outcome }}"
            echo "- Evidence upload: ${{ steps.upload_evidence.outcome }}"
            if [[ -f "$TERMINAL_FILE" ]]; then
              echo ''
              echo '### Terminal evidence'
              echo '```json'
              cat "$TERMINAL_FILE"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Final enforcement
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          [[ '${{ steps.contract_tests.outcome }}' == 'success' ]] || { echo '::error::Security contract tests failed'; exit 1; }
          [[ '${{ steps.backend_preflight.outcome }}' == 'success' ]] || { echo '::error::Backend preflight failed'; exit 1; }
          [[ '${{ steps.owasp_gate.outcome }}' == 'success' ]] || {
            echo '::error::OWASP gate failed'
            cat "$EVIDENCE_DIR/terminal-enforcement.json" 2>/dev/null || true
            exit 1
          }
          [[ '${{ steps.upload_evidence.outcome }}' == 'success' ]] || { echo '::error::Evidence upload failed'; exit 1; }
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('artifacts/security/owasp/terminal-enforcement.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          if data.get('decision') != 'pass':
              raise SystemExit(f"terminal decision is {data.get('decision')!r}")
          print('OWASP terminal enforcement PASSED.')
          PY
