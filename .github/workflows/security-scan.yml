# ============================================================
# SANAD Platform — OWASP Dependency-Check Security Scan
# ============================================================
# EXEC-PROMPT-010R3: Corrected cache key, parser, and execution policy.
#
# Key corrections (per EXEC-PROMPT-010R3 Sections 5-9):
#   1. Cache key uses step output (no shell expression in with.key)
#   2. failBuildOnCVSS=11 (non-blocking, allows report generation)
#   3. Parser extracted to scripts/ci/parse_owasp_report.py
#   4. Parser supports both JSON schemas (list + object form)
#   5. Summary is conditional on actual parser output
#   6. Suppression and exception counts tracked separately
# ============================================================

name: Security Scan (OWASP)

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: apps/sanad-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify NVD_API_KEY secret is configured
        id: check-nvd-key
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY is required for a reliable production security scan."
            echo "::error::Configure it in repository Settings → Secrets and variables → Actions."
            echo "nvd-key-present=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "✅ NVD_API_KEY is configured (value not printed)."
          echo "nvd-key-present=true" >> "$GITHUB_OUTPUT"

      # EXEC-PROMPT-010R3 Section 5: Calculate cache period in a dedicated step
      # Do NOT use shell expressions inside with.key
      - name: Calculate OWASP cache period
        id: owasp-cache-period
        shell: bash
        run: |
          echo "week=$(date -u +'%Y-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/nvd-cache
          key: nvd-cache-${{ runner.os }}-dc12.1.0-${{ steps.owasp-cache-period.outputs.week }}
          restore-keys: |
            nvd-cache-${{ runner.os }}-dc12.1.0-

      # EXEC-PROMPT-010R3 Section 7: Use failBuildOnCVSS=11 (non-blocking)
      # This allows the scanner to generate a report even when vulnerabilities
      # are found. The custom parser gate (below) is the authoritative check.
      - name: Run OWASP dependency-check
        id: owasp-scan
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail

          SCAN_EXIT_CODE=0
          mvn org.owasp:dependency-check-maven:12.1.0:check \
            -DfailBuildOnCVSS=11 \
            -Dformat=HTML,JSON \
            -DoutputDirectory=target/dependency-check-report \
            -DdataDirectory=${{ runner.temp }}/nvd-cache \
            -DnvdApiKey="${NVD_API_KEY}" \
            --batch-mode \
            --no-transfer-progress || SCAN_EXIT_CODE=$?

          echo "scan-exit-code=$SCAN_EXIT_CODE" >> "$GITHUB_OUTPUT"

          JSON_REPORT="target/dependency-check-report/dependency-check-report.json"
          if [ ! -f "$JSON_REPORT" ]; then
            echo "::error::OWASP JSON report not found at $JSON_REPORT"
            echo "scan-result=execution-error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "scan-result=completed" >> "$GITHUB_OUTPUT"

      # EXEC-PROMPT-010R3 Section 6+10: Use the tested parser script
      - name: Parse OWASP JSON report
        id: parse-report
        if: steps.owasp-scan.outputs.scan-result == 'completed'
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail

          JSON_REPORT="target/dependency-check-report/dependency-check-report.json"
          PARSER="../../scripts/ci/parse_owasp_report.py"

          if [ ! -f "$PARSER" ]; then
            echo "::error::Parser script not found at $PARSER"
            echo "parse-result=execution-error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          PARSE_OUTPUT=$(python3 "$PARSER" "$JSON_REPORT" 2>&1) || {
            echo "::error::Parser failed:"
            echo "$PARSE_OUTPUT"
            echo "parse-result=execution-error" >> "$GITHUB_OUTPUT"
            exit 1
          }

          echo "$PARSE_OUTPUT"

          # Export all outputs
          while IFS='=' read -r key value; do
            [ -n "$key" ] && echo "$key=$value" >> "$GITHUB_OUTPUT"
          done <<< "$PARSE_OUTPUT"

          echo "parse-result=success" >> "$GITHUB_OUTPUT"

      - name: Upload OWASP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report-${{ github.run_id }}
          path: apps/sanad-platform/target/dependency-check-report/
          if-no-files-found: error
          retention-days: 30

      - name: Write security scan summary
        if: always()
        shell: bash
        env:
          SCAN_RESULT: ${{ steps.owasp-scan.outputs.scan-result }}
          PARSE_RESULT: ${{ steps.parse-report.outputs.parse-result }}
          OWASP_RESULT: ${{ steps.parse-report.outputs.result }}
          HIGH: ${{ steps.parse-report.outputs.high }}
          CRITICAL: ${{ steps.parse-report.outputs.critical }}
          TOTAL_VULNS: ${{ steps.parse-report.outputs.total-vulnerabilities }}
          TOTAL_DEPS: ${{ steps.parse-report.outputs.total-dependencies }}
          SUPPRESSED: ${{ steps.parse-report.outputs.suppressed }}
          ANALYSIS_EXCEPTIONS: ${{ steps.parse-report.outputs.analysis-exceptions }}
          GITHUB_SHA_SHORT: ${{ github.sha }}
        run: |
          {
            echo '## OWASP Dependency-Check Scan'
            echo ''
            echo "**Scanned SHA:** \`$GITHUB_SHA_SHORT\`"
            echo "**Run ID:** ${{ github.run_id }}"
            echo ''

            # Determine the actual outcome from step outputs
            if [ "$SCAN_RESULT" = "execution-error" ]; then
              echo '### ⛔ OWASP DEPENDENCY-CHECK: EXECUTION ERROR'
              echo ''
              echo 'No security conclusion may be inferred.'
              echo 'The scanner failed to produce a valid report.'
              echo '**Commercial production gate remains CLOSED.**'
            elif [ "$PARSE_RESULT" = "execution-error" ]; then
              echo '### ⛔ OWASP DEPENDENCY-CHECK: EXECUTION ERROR'
              echo ''
              echo 'Report was generated but could not be parsed.'
              echo 'No security conclusion may be inferred.'
              echo '**Commercial production gate remains CLOSED.**'
            elif [ -z "$HIGH" ] || [ -z "$CRITICAL" ]; then
              echo '### ⚠️ OWASP DEPENDENCY-CHECK: INCOMPLETE'
              echo ''
              echo 'HIGH and CRITICAL counts remain unknown.'
              echo 'The scan was cancelled, timed out, or the report could not be parsed.'
              echo '**Commercial production gate remains CLOSED.**'
            elif [ "$HIGH" -gt 0 ] || [ "$CRITICAL" -gt 0 ]; then
              echo '### ❌ OWASP DEPENDENCY-CHECK: FAILED'
              echo ''
              echo "| Metric | Count |"
              echo "|--------|-------|"
              echo "| HIGH | $HIGH |"
              echo "| CRITICAL | $CRITICAL |"
              echo "| Total vulnerabilities | $TOTAL_VULNS |"
              echo "| Total dependencies | $TOTAL_DEPS |"
              echo "| Suppressed | $SUPPRESSED |"
              echo "| Analysis exceptions | $ANALYSIS_EXCEPTIONS |"
              echo ''
              echo 'Review the private report artifact for details.'
              echo '**Commercial production gate remains CLOSED.**'
            else
              echo '### ✅ OWASP DEPENDENCY-CHECK: PASS'
              echo ''
              echo "| Metric | Count |"
              echo "|--------|-------|"
              echo "| HIGH | 0 |"
              echo "| CRITICAL | 0 |"
              echo "| Total vulnerabilities | $TOTAL_VULNS |"
              echo "| Total dependencies | $TOTAL_DEPS |"
              echo "| Suppressed | $SUPPRESSED |"
              echo "| Analysis exceptions | $ANALYSIS_EXCEPTIONS |"
              echo ''
              echo "Report artifact: \`owasp-dependency-check-report-${{ github.run_id }}\`"
              echo '**Gate status:** PASSED.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if HIGH or CRITICAL findings exist
        if: steps.parse-report.outputs.parse-result == 'success'
        shell: bash
        env:
          HIGH: ${{ steps.parse-report.outputs.high }}
          CRITICAL: ${{ steps.parse-report.outputs.critical }}
        run: |
          if [ -z "$HIGH" ] || [ -z "$CRITICAL" ]; then
            echo "::error::Cannot determine HIGH/CRITICAL counts — parser did not produce output."
            exit 1
          fi
          if [ "$HIGH" -gt 0 ] || [ "$CRITICAL" -gt 0 ]; then
            echo "::error::OWASP scan found HIGH=$HIGH CRITICAL=$CRITICAL vulnerabilities."
            echo "Commercial production gate remains CLOSED."
            exit 1
          fi
          echo "✅ No HIGH or CRITICAL vulnerabilities found. Gate PASSED."
