name: Security Scan (OWASP)

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
      - 'apps/sanad-platform/src/main/resources/dependency-check-suppressions.xml'
      - '.github/workflows/security-scan.yml'
      - 'scripts/ci/parse_owasp_report.py'
      - 'scripts/ci/validate_nvd_database.py'
      - 'scripts/security/**'
      - 'tests/ci/**'
  pull_request:
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
      - 'apps/sanad-platform/src/main/resources/dependency-check-suppressions.xml'
      - '.github/workflows/security-scan.yml'
      - 'scripts/ci/parse_owasp_report.py'
      - 'scripts/ci/validate_nvd_database.py'
      - 'scripts/security/**'
      - 'tests/ci/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: '12.1.0'
  NVD_CANONICAL_DIR: ${{ github.workspace }}/.cache/dependency-check-data
  NVD_MIN_SIZE_BYTES: '52428800'
  NVD_MAX_AGE_HOURS: '48'

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python3 -m pip install pytest pyyaml --quiet

      - name: Validate security gate implementation
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pytest tests/ci/test_parse_owasp.py -q
          python3 -m pytest tests/ci/test_validate_nvd_database.py -q
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import yaml

          with open('.github/workflows/security-scan.yml', encoding='utf-8') as handle:
              yaml.safe_load(handle)
          with open('.github/workflows/nvd-database-maintenance.yml', encoding='utf-8') as handle:
              yaml.safe_load(handle)

          tree = ET.parse('apps/sanad-platform/pom.xml')
          root = tree.getroot()
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          profiles = root.find('m:profiles', ns)
          assert profiles is not None, 'No Maven profiles configured'
          profile = None
          for candidate in profiles.findall('m:profile', ns):
              profile_id = candidate.find('m:id', ns)
              if profile_id is not None and profile_id.text == 'owasp-offline-gate':
                  profile = candidate
                  break
          assert profile is not None, 'owasp-offline-gate profile is missing'
          cfg = profile.find('.//m:configuration', ns)
          assert cfg is not None, 'OWASP configuration is missing'
          assert cfg.find('m:autoUpdate', ns).text == 'false'
          assert cfg.find('m:failOnError', ns).text == 'true'
          assert cfg.find('m:failBuildOnCVSS', ns).text == '11'
          formats = [node.text for node in cfg.find('m:formats', ns).findall('m:format', ns)]
          assert 'HTML' in formats and 'JSON' in formats
          PY
          echo 'passed=true' >> "$GITHUB_OUTPUT"

      - name: Determine execution and dependency-delta mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = 'pull_request' ]; then
            echo 'execution_mode=pr' >> "$GITHUB_OUTPUT"
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            if git diff --quiet "origin/${{ github.base_ref }}...HEAD" -- \
              apps/sanad-platform/pom.xml \
              apps/sanad-platform/src/main/resources/dependency-check-suppressions.xml; then
              echo 'dependency_contract_changed=false' >> "$GITHUB_OUTPUT"
            else
              echo 'dependency_contract_changed=true' >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'execution_mode=acceptance' >> "$GITHUB_OUTPUT"
            echo 'dependency_contract_changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve and download verified NVD snapshot
        id: snapshot
        shell: bash
        env:
          CONFIGURED_BACKEND: ${{ vars.NVD_SNAPSHOT_BACKEND }}
          NVD_SNAPSHOT_BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
          NVD_SNAPSHOT_PREFIX: ${{ vars.NVD_SNAPSHOT_PREFIX }}
          NVD_SNAPSHOT_REGION: ${{ vars.NVD_SNAPSHOT_REGION }}
          NVD_SNAPSHOT_ENDPOINT: ${{ vars.NVD_SNAPSHOT_ENDPOINT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/nvd-snapshot"
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          sys.path.insert(0, '.')
          from scripts.security.nvd_snapshot_store import get_backend

          configured = os.environ.get('CONFIGURED_BACKEND', '').strip()
          candidates = []
          if configured:
              candidates.append(configured)
          if 'github-releases' not in candidates:
              candidates.append('github-releases')

          errors = []
          destination = pathlib.Path(os.environ['RUNNER_TEMP']) / 'nvd-snapshot'
          for backend_name in candidates:
              try:
                  backend = get_backend(backend_name)
                  pointer = backend.resolve_latest_verified()
                  if not pointer:
                      errors.append(f'{backend_name}: no verified latest pointer')
                      continue
                  bundle = backend.download_snapshot_bundle(pointer, destination)
                  required = {
                      'archive_path': pathlib.Path(bundle['archive_path']).resolve(),
                      'manifest_path': pathlib.Path(bundle['manifest_path']).resolve(),
                      'checksums_path': pathlib.Path(bundle['checksums_path']).resolve(),
                  }
                  missing = [name for name, path in required.items() if not path.is_file()]
                  if missing:
                      errors.append(f'{backend_name}: missing bundle files {missing}')
                      continue

                  outputs = {
                      'available': 'true',
                      'effective_backend': backend_name,
                      'snapshot_id': str(bundle['snapshot_id']),
                      **{name: str(path) for name, path in required.items()},
                  }
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
                      for key, value in outputs.items():
                          handle.write(f'{key}={value}\n')
                  print(json.dumps(outputs, indent=2))
                  raise SystemExit(0)
              except Exception as exc:
                  errors.append(f'{backend_name}: {type(exc).__name__}: {exc}')

          reason = ' | '.join(errors).replace('\n', ' ')[:1500]
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write('available=false\n')
              handle.write(f'unavailable_reason={reason}\n')
          print(f'::warning::Verified NVD snapshot unavailable: {reason}')
          PY

      - name: Verify and extract snapshot
        id: verify
        if: steps.snapshot.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.NVD_CANONICAL_DIR }}" "${{ runner.temp }}/nvd-extract"
          python3 scripts/security/verify_nvd_snapshot.py \
            --archive "${{ steps.snapshot.outputs.archive_path }}" \
            --manifest "${{ steps.snapshot.outputs.manifest_path }}" \
            --checksums "${{ steps.snapshot.outputs.checksums_path }}" \
            --expected-snapshot-id "${{ steps.snapshot.outputs.snapshot_id }}" \
            --expected-dc-version "${{ env.DEPENDENCY_CHECK_VERSION }}" \
            --min-size "${{ env.NVD_MIN_SIZE_BYTES }}" \
            --max-age-hours "${{ env.NVD_MAX_AGE_HOURS }}" \
            | tee "${{ runner.temp }}/verify-output.txt"
          python3 scripts/security/nvd_archive.py extract \
            --archive "${{ steps.snapshot.outputs.archive_path }}" \
            --destination "${{ runner.temp }}/nvd-extract"
          if [ -d "${{ runner.temp }}/nvd-extract/data" ]; then
            cp -a "${{ runner.temp }}/nvd-extract/data/." "${{ env.NVD_CANONICAL_DIR }}/"
          else
            cp -a "${{ runner.temp }}/nvd-extract/." "${{ env.NVD_CANONICAL_DIR }}/"
          fi
          echo 'result=success' >> "$GITHUB_OUTPUT"

      - name: Run OWASP Dependency-Check offline
        id: scan
        if: steps.snapshot.outputs.available == 'true' && steps.verify.outputs.result == 'success'
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            org.owasp:dependency-check-maven:${{ env.DEPENDENCY_CHECK_VERSION }}:check \
            -Powasp-offline-gate \
            -DdataDirectory="${{ env.NVD_CANONICAL_DIR }}" \
            -DautoUpdate=false \
            -DfailOnError=false \
            -DfailBuildOnCVSS=11 \
            -DossIndexAnalyzerEnabled=false \
            -DhostedSuppressionsEnabled=false \
            -DversionCheckEnabled=false \
            -DoutputDirectory=target/dependency-check-report \
            > "${{ runner.temp }}/owasp-scan.log" 2>&1
          exit_code=$?
          set -e
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          if [ -f target/dependency-check-report/dependency-check-report.json ]; then
            report=target/dependency-check-report/dependency-check-report.json
          elif [ -f target/dependency-check-report.json ]; then
            report=target/dependency-check-report.json
          else
            echo '::error::OWASP JSON report was not produced'
            tail -100 "${{ runner.temp }}/owasp-scan.log" || true
            exit 1
          fi
          if [ -f target/dependency-check-report/dependency-check-report.html ]; then
            html=target/dependency-check-report/dependency-check-report.html
          elif [ -f target/dependency-check-report.html ]; then
            html=target/dependency-check-report.html
          else
            echo '::error::OWASP HTML report was not produced'
            exit 1
          fi
          echo "json_report=${report}" >> "$GITHUB_OUTPUT"
          echo "html_report=${html}" >> "$GITHUB_OUTPUT"
          echo 'completed=true' >> "$GITHUB_OUTPUT"

      - name: Parse and enforce OWASP result
        id: result
        if: steps.scan.outputs.completed == 'true'
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          output=$(python3 ../../scripts/ci/parse_owasp_report.py "${{ steps.scan.outputs.json_report }}")
          echo "$output"
          while IFS='=' read -r key value; do
            [ -n "$key" ] && echo "$key=$value" >> "$GITHUB_OUTPUT"
          done <<< "$output"
          result=$(printf '%s\n' "$output" | awk -F= '$1=="result" {print $2}')
          dependencies=$(printf '%s\n' "$output" | awk -F= '$1=="total_dependencies" {print $2}')
          high=$(printf '%s\n' "$output" | awk -F= '$1=="high" {print $2}')
          critical=$(printf '%s\n' "$output" | awk -F= '$1=="critical" {print $2}')
          unknown=$(printf '%s\n' "$output" | awk -F= '$1=="unknown" {print $2}')
          exceptions=$(printf '%s\n' "$output" | awk -F= '$1=="analysis_exceptions" {print $2}')
          [ "$result" = 'pass' ] || { echo "::error::OWASP result is $result"; exit 1; }
          [ -n "$dependencies" ] && [ "$dependencies" -gt 0 ] || { echo '::error::No dependencies were analyzed'; exit 1; }
          [ "$high" = '0' ] || { echo "::error::HIGH vulnerabilities: $high"; exit 1; }
          [ "$critical" = '0' ] || { echo "::error::CRITICAL vulnerabilities: $critical"; exit 1; }
          [ "$unknown" = '0' ] || { echo "::error::UNKNOWN vulnerabilities: $unknown"; exit 1; }
          [ "$exceptions" = '0' ] || { echo "::error::Analysis exceptions: $exceptions"; exit 1; }

      - name: Final fail-closed decision
        if: always()
        shell: bash
        env:
          EXECUTION_MODE: ${{ steps.mode.outputs.execution_mode }}
          DEPENDENCY_CHANGED: ${{ steps.mode.outputs.dependency_contract_changed }}
          SNAPSHOT_AVAILABLE: ${{ steps.snapshot.outputs.available }}
          SNAPSHOT_REASON: ${{ steps.snapshot.outputs.unavailable_reason }}
          VERIFY_RESULT: ${{ steps.verify.outputs.result }}
          SCAN_COMPLETED: ${{ steps.scan.outputs.completed }}
          OWASP_RESULT: ${{ steps.result.outputs.result }}
        run: |
          set -euo pipefail
          if [ "$SNAPSHOT_AVAILABLE" != 'true' ]; then
            if [ "$EXECUTION_MODE" = 'pr' ] && [ "$DEPENDENCY_CHANGED" = 'false' ]; then
              echo 'PR mode: verified snapshot unavailable and dependency contract unchanged.'
              echo 'OWASP acceptance is deferred to main; parser, validator, workflow and POM gates passed.'
              exit 0
            fi
            echo "::error::Verified NVD snapshot unavailable: $SNAPSHOT_REASON"
            exit 1
          fi
          [ "$VERIFY_RESULT" = 'success' ] || { echo '::error::Snapshot verification failed'; exit 1; }
          [ "$SCAN_COMPLETED" = 'true' ] || { echo '::error::OWASP scan did not complete'; exit 1; }
          [ "$OWASP_RESULT" = 'pass' ] || { echo "::error::OWASP result is $OWASP_RESULT"; exit 1; }
          echo 'OWASP terminal security gate passed.'

      - name: Upload OWASP evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-evidence-${{ github.run_id }}
          path: |
            apps/sanad-platform/target/dependency-check-report*.json
            apps/sanad-platform/target/dependency-check-report*.html
            apps/sanad-platform/target/dependency-check-report/**
            ${{ runner.temp }}/verify-output.txt
            ${{ runner.temp }}/owasp-scan.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Write security summary
        if: always()
        shell: bash
        run: |
          {
            echo '## OWASP Dependency-Check'
            echo ''
            echo "- SHA: \`${{ github.sha }}\`"
            echo "- Execution mode: \`${{ steps.mode.outputs.execution_mode }}\`"
            echo "- Dependency contract changed: \`${{ steps.mode.outputs.dependency_contract_changed }}\`"
            echo "- Snapshot available: \`${{ steps.snapshot.outputs.available }}\`"
            echo "- Effective backend: \`${{ steps.snapshot.outputs.effective_backend }}\`"
            echo "- Snapshot ID: \`${{ steps.snapshot.outputs.snapshot_id }}\`"
            echo "- OWASP result: \`${{ steps.result.outputs.result }}\`"
            echo "- Dependencies: \`${{ steps.result.outputs.total_dependencies }}\`"
            echo "- High: \`${{ steps.result.outputs.high }}\`"
            echo "- Critical: \`${{ steps.result.outputs.critical }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
