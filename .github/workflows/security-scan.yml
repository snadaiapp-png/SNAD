# ============================================================
# SANAD Platform — OWASP Offline Security Scan (Read-Only)
# ============================================================
# EXEC-PROMPT-010R12: Offline dependency scanner.
#
# Key properties:
#   1. Read-only — never updates NVD database
#   2. Requires verified NVD database from maintenance workflow
#   3. autoUpdate=false — no network calls to NVD
#   4. ossIndexAnalyzerEnabled=false — no Sonatype OSS Index
#   5. Fail-closed — scanner exit code is enforced
#   6. Parser is authoritative gate
#   7. Final enforcement: only 'pass' is accepted
# ============================================================

name: Security Scan (OWASP)

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
      - '.github/workflows/security-scan.yml'
      - 'scripts/ci/parse_owasp_report.py'
      - 'tests/ci/'
  pull_request:
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: "12.1.0"
  NVD_CACHE_SCHEMA: "v3"

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/sanad-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        shell: bash
        run: python3 -m pip install pytest pyyaml --quiet

      - name: Test OWASP report parser
        id: parser_tests
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 -m pytest tests/ci/test_parse_owasp.py -q
          echo "parser_tests_passed=true" >> "$GITHUB_OUTPUT"

      - name: Calculate cache keys
        id: cache_keys
        shell: bash
        run: |
          echo "cache_prefix=nvd-db-${{ runner.os }}-dc-${{ env.DEPENDENCY_CHECK_VERSION }}-${{ env.NVD_CACHE_SCHEMA }}" >> "$GITHUB_OUTPUT"

      # Restore verified NVD database (read-only — scanner never writes)
      - name: Restore verified NVD database
        id: restore_cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/nvd-data
          key: ${{ steps.cache_keys.outputs.cache_prefix }}-not-exact
          restore-keys: |
            ${{ steps.cache_keys.outputs.cache_prefix }}-

      - name: Validate NVD database
        id: db_validation
        shell: bash
        run: |
          DB_DIR="${{ runner.temp }}/nvd-data"
          DB_FILE="$DB_DIR/odc.mv.db"
          MANIFEST="$DB_DIR/sanad-nvd-manifest.json"

          if [ ! -d "$DB_DIR" ]; then
            echo "::error::NVD database directory not found — run nvd-database-maintenance workflow first"
            echo "db_status=missing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ ! -f "$DB_FILE" ]; then
            echo "::error::odc.mv.db not found in cache"
            echo "db_status=missing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          DB_SIZE=$(stat -c%s "$DB_FILE" 2>/dev/null || echo 0)
          if [ "$DB_SIZE" -lt 1024 ]; then
            echo "::error::Database file too small ($DB_SIZE bytes)"
            echo "db_status=incomplete" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -f "$MANIFEST" ]; then
            echo "✅ NVD database manifest found"
            DB_SHA256=$(sha256sum "$DB_FILE" | awk '{print $1}')
            MANIFEST_SHA=$(python3 -c "import json; print(json.load(open('$MANIFEST')).get('database_sha256',''))" 2>/dev/null || echo "")
            if [ -n "$MANIFEST_SHA" ] && [ "$DB_SHA256" != "$MANIFEST_SHA" ]; then
              echo "::error::Database SHA-256 mismatch (expected: $MANIFEST_SHA, got: $DB_SHA256)"
              echo "db_status=corrupt" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "✅ Database SHA-256 verified"
          fi

          # Check freshness (max 48 hours)
          if [ -f "$MANIFEST" ]; then
            UPDATE_TS=$(python3 -c "import json; print(json.load(open('$MANIFEST')).get('update_completed_at',''))" 2>/dev/null || echo "")
            if [ -n "$UPDATE_TS" ]; then
              UPDATE_EPOCH=$(date -d "$UPDATE_TS" +%s 2>/dev/null || echo 0)
              NOW_EPOCH=$(date -u +%s)
              AGE_HOURS=$(( (NOW_EPOCH - UPDATE_EPOCH) / 3600 ))
              if [ $AGE_HOURS -gt 48 ]; then
                echo "::error::Database is stale ($AGE_HOURS hours old — max 48)"
                echo "db_status=stale" >> "$GITHUB_OUTPUT"
                exit 1
              fi
              echo "✅ Database freshness: $AGE_HOURS hours old"
            fi
          fi

          echo "✅ NVD database validation passed"
          echo "db_status=valid" >> "$GITHUB_OUTPUT"
          echo "db_dir=${{ runner.temp }}/nvd-data" >> "$GITHUB_OUTPUT"

      # OFFLINE SCAN — no NVD API calls, no OSS Index
      - name: Run OWASP dependency-check (offline)
        id: owasp_scan
        shell: bash
        run: |
          set -euo pipefail

          echo "Running OFFLINE OWASP Dependency-Check..."
          echo "NVD data directory: ${{ steps.db_validation.outputs.db_dir }}"
          echo "autoUpdate: false (no NVD API calls)"
          echo "OSS Index: disabled"

          SCAN_EXIT_CODE=0
          mvn --batch-mode --no-transfer-progress \
            org.owasp:dependency-check-maven:${{ env.DEPENDENCY_CHECK_VERSION }}:check \
            -DdataDirectory="${{ steps.db_validation.outputs.db_dir }}" \
            -DautoUpdate=false \
            -DfailOnError=true \
            -DfailBuildOnCVSS=11 \
            -Dformat=HTML \
            -Dformat=JSON \
            -DoutputDirectory=target/dependency-check-report \
            -DossIndexAnalyzerEnabled=false \
            -DhostedSuppressionsEnabled=false \
            -DversionCheckEnabled=false \
            || SCAN_EXIT_CODE=$?

          echo "scan_exit_code=$SCAN_EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$SCAN_EXIT_CODE" -ne 0 ]; then
            echo "::error::OWASP Dependency-Check exited with code $SCAN_EXIT_CODE"
            echo "scan_result=execution_error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          JSON_REPORT="target/dependency-check-report/dependency-check-report.json"
          HTML_REPORT="target/dependency-check-report/dependency-check-report.html"

          if [ ! -f "$JSON_REPORT" ]; then
            echo "::error::OWASP JSON report not found"
            echo "scan_result=execution_error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ ! -f "$HTML_REPORT" ]; then
            echo "::error::OWASP HTML report not found"
            echo "scan_result=execution_error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✅ Scanner completed (exit code 0)"
          echo "✅ JSON report generated"
          echo "✅ HTML report generated"
          echo "scan_result=completed" >> "$GITHUB_OUTPUT"

      - name: Parse OWASP JSON report
        id: parse_report
        if: steps.owasp_scan.outputs.scan_result == 'completed'
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail

          JSON_REPORT="target/dependency-check-report/dependency-check-report.json"
          PARSER="../../scripts/ci/parse_owasp_report.py"

          PARSE_OUTPUT=$(python3 "$PARSER" "$JSON_REPORT" 2>&1) || {
            echo "::error::Parser failed:"
            echo "$PARSE_OUTPUT"
            echo "parse_result=execution_error" >> "$GITHUB_OUTPUT"
            exit 1
          }

          echo "$PARSE_OUTPUT"

          while IFS='=' read -r key value; do
            [ -n "$key" ] && echo "$key=$value" >> "$GITHUB_OUTPUT"
          done <<< "$PARSE_OUTPUT"

          echo "parse_result=success" >> "$GITHUB_OUTPUT"

      - name: Upload OWASP evidence
        if: always() && steps.owasp_scan.outputs.scan_result == 'completed'
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-evidence-${{ github.run_id }}
          path: |
            apps/sanad-platform/target/dependency-check-report/
            ${{ runner.temp }}/nvd-data/sanad-nvd-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Write summary
        if: always()
        shell: bash
        env:
          PARSER_TESTS: ${{ steps.parser_tests.outputs.parser_tests_passed }}
          DB_STATUS: ${{ steps.db_validation.outputs.db_status }}
          SCAN_EXIT_CODE: ${{ steps.owasp_scan.outputs.scan_exit_code }}
          SCAN_RESULT: ${{ steps.owasp_scan.outputs.scan_result }}
          OWASP_RESULT: ${{ steps.parse_report.outputs.result }}
          TOTAL_DEPS: ${{ steps.parse_report.outputs.total_dependencies }}
          TOTAL_VULNS: ${{ steps.parse_report.outputs.total_vulnerabilities }}
          HIGH: ${{ steps.parse_report.outputs.high }}
          CRITICAL: ${{ steps.parse_report.outputs.critical }}
          UNKNOWN: ${{ steps.parse_report.outputs.unknown }}
          ANALYSIS_EXCEPTIONS: ${{ steps.parse_report.outputs.analysis_exceptions }}
          GITHUB_SHA_SHORT: ${{ github.sha }}
        run: |
          {
            echo '## OWASP Dependency-Check (Offline)'
            echo ''
            echo "**Scanned SHA:** \`$GITHUB_SHA_SHORT\`"
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**Mode:** OFFLINE (autoUpdate=false)"
            echo "**Database:** $DB_STATUS"
            echo "**Scanner exit:** $SCAN_EXIT_CODE"
            echo ''

            if [ "$PARSER_TESTS" != "true" ]; then
              echo '### ⛔ EXECUTION ERROR — Parser tests failed'
            elif [ "$DB_STATUS" != "valid" ]; then
              echo '### ⛔ EXECUTION ERROR — NVD database: '"$DB_STATUS"
              echo 'Run nvd-database-maintenance workflow first.'
            elif [ "$SCAN_RESULT" = "execution_error" ]; then
              echo '### ⛔ EXECUTION ERROR — Scanner failed (exit code: '"$SCAN_EXIT_CODE"')'
            elif [ "$OWASP_RESULT" = "failed" ]; then
              echo '### ❌ FAILED — HIGH='"$HIGH"' CRITICAL='"$CRITICAL"
            elif [ "$OWASP_RESULT" = "incomplete" ]; then
              echo '### ⚠️ INCOMPLETE — Unknown='"$UNKNOWN"' Exceptions='"$ANALYSIS_EXCEPTIONS"
            elif [ "$OWASP_RESULT" = "execution_error" ]; then
              echo '### ⛔ EXECUTION ERROR — Zero deps or parser validation failed'
            elif [ "$OWASP_RESULT" = "pass" ]; then
              echo '### ✅ PASS'
              echo ''
              echo "| Metric | Count |"
              echo "|--------|-------|"
              echo "| HIGH | 0 |"
              echo "| CRITICAL | 0 |"
              echo "| UNKNOWN | 0 |"
              echo "| Analysis exceptions | 0 |"
              echo "| Total vulnerabilities | $TOTAL_VULNS |"
              echo "| Total dependencies | $TOTAL_DEPS |"
            else
              echo '### ⛔ UNKNOWN STATE'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Final enforcement
        if: always()
        shell: bash
        env:
          PARSER_TESTS: ${{ steps.parser_tests.outputs.parser_tests_passed }}
          DB_STATUS: ${{ steps.db_validation.outputs.db_status }}
          SCAN_RESULT: ${{ steps.owasp_scan.outputs.scan_result }}
          SCAN_EXIT_CODE: ${{ steps.owasp_scan.outputs.scan_exit_code }}
          OWASP_RESULT: ${{ steps.parse_report.outputs.result }}
        run: |
          if [ "$PARSER_TESTS" != "true" ]; then
            echo "::error::Parser tests failed"; exit 1
          fi
          if [ "$DB_STATUS" != "valid" ]; then
            echo "::error::NVD database invalid: $DB_STATUS"; exit 1
          fi
          if [ "$SCAN_RESULT" != "completed" ]; then
            echo "::error::Scan did not complete (exit: $SCAN_EXIT_CODE)"; exit 1
          fi
          if [ "$SCAN_EXIT_CODE" != "0" ]; then
            echo "::error::Scanner exit code: $SCAN_EXIT_CODE"; exit 1
          fi
          if [ "$OWASP_RESULT" != "pass" ]; then
            echo "::error::OWASP result: $OWASP_RESULT — only 'pass' accepted"; exit 1
          fi
          echo "✅ OWASP PASSED all gates"
