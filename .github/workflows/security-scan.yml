# ============================================================
# SANAD Platform — OWASP Dependency-Check Security Scan
# ============================================================
# Runs on push to main and weekly (Monday 06:00 UTC).
# Uses the OWASP dependency-check-maven plugin to scan the
# backend for known CVEs in transitive dependencies.
# Uploads the HTML report as a private artifact and fails
# on HIGH or CRITICAL findings.
# ============================================================

name: Security Scan (OWASP)

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/src/**'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: security-scan
  cancel-in-progress: true

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/sanad-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run OWASP dependency-check
        shell: bash
        run: |
          set -euo pipefail

          mvn org.owasp:dependency-check-maven:12.1.0:check \
            -DfailBuildOnCVSS=0 \
            -Dformat=HTML,JSON \
            -DoutputDirectory=target/dependency-check-report \
            -DdataDirectory=${{ runner.temp }}/nvd-cache \
            -DnvdApiKey="${{ secrets.NVD_API_KEY }}" \
            --batch-mode \
            --no-transfer-progress

      - name: Upload OWASP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report-${{ github.run_id }}
          path: apps/sanad-platform/target/dependency-check-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Write security scan summary
        if: always()
        shell: bash
        run: |
          {
            echo '## OWASP Dependency-Check Scan'
            echo ''
            echo 'Scan completed successfully. No HIGH/CRITICAL vulnerabilities.'
            echo ''
            echo "- Scanned at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo '- Report artifact: owasp-dependency-check-report-${{ github.run_id }}'
          } >> "$GITHUB_STEP_SUMMARY"
