name: CRM Deployment Readiness

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/sanad-platform/**'
      - '.github/workflows/crm-deployment-readiness.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-deployment-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-readiness:
    name: CRM Deployment Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compare runtime dependencies (base vs head)
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha || github.sha }}"
          git show "${BASE_SHA}:apps/web/package.json" > /tmp/base-package.json
          node scripts/ci/compare-runtime-dependencies.mjs /tmp/base-package.json apps/web/package.json

      - name: Governance drift check
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/crm/governance-drift-check.sh
