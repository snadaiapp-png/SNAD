name: Production Smoke

# ============================================================
# SNAD Platform - Production Smoke Test
# ------------------------------------------------------------
# Verifies the Vercel production deployment is reachable and
# serves the expected SNAD / سند interface after a push to main.
# ============================================================

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/production-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-production:
    name: Verify Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for Vercel deployment
        run: sleep 45

      - name: Verify production page
        run: |
          set -euo pipefail

          for attempt in {1..24}; do
            code=$(curl -L -sS -o production.html -w '%{http_code}' https://snad-app.vercel.app || true)
            if [ "$code" = "200" ] \
              && grep -q 'SNAD' production.html \
              && grep -q 'سند' production.html \
              && grep -q 'lang="ar"' production.html \
              && grep -q 'dir="rtl"' production.html \
              && grep -q 'data-theme="light"' production.html; then
              echo "SNAD production interface is available."
              exit 0
            fi
            echo "Attempt ${attempt}: HTTP ${code}; waiting for deployment..."
            sleep 10
          done

          echo "Production interface did not become ready."
          cat production.html || true
          exit 1
