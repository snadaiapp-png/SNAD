name: One-Time Render Production Cutover

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/one-time-render-production-cutover.yml'

permissions:
  contents: write
  packages: write

concurrency:
  group: one-time-render-production-cutover
  cancel-in-progress: false

jobs:
  cutover:
    name: Deploy Render, bind Vercel, retire tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Production
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      PRODUCTION_BACKEND_BASE_URL: https://sanad-backend-mcrj.onrender.com
      PRODUCTION_WEB_BASE_URL: https://snad-app.vercel.app
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/snad-backend
      CI: '1'

    steps:
      - name: Checkout exact main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID; do
            test -n "${!name:-}" || { echo "::error::Missing Production secret: $name"; exit 1; }
            echo "::add-mask::${!name}"
          done
          [[ "$PRODUCTION_BACKEND_BASE_URL" == https://*.onrender.com ]] || exit 1
          [[ "$PRODUCTION_WEB_BASE_URL" == https://*.vercel.app ]] || exit 1

      - name: Patch repository to Render-only production
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          render_host = "sanad-backend-mcrj.onrender.com"
          old_host = "streak-train-empower.ngrok-free.dev"

          replacements = {
              Path('.github/workflows/production-smoke.yml'): [
                  (old_host, render_host),
              ],
              Path('.github/workflows/crm-g1-production-closure.yml'): [
                  (f'https://{old_host}/actuator/health', f'https://{render_host}/actuator/health'),
              ],
              Path('apps/web/app/api/system/backend-status/route.test.ts'): [
                  (old_host, render_host),
              ],
              Path('apps/web/app/api/platform/[...path]/route.ts'): [
                  ('  if (baseUrl.includes("ngrok")) {\n    headers.set("ngrok-skip-browser-warning", "any-value");\n  }\n', ''),
              ],
              Path('scripts/ci/check-production-readiness.py'): [
                  ('    hostname = urllib.parse.urlparse(url).hostname or ""\n    if "ngrok" in hostname.lower():\n        headers["ngrok-skip-browser-warning"] = "true"\n\n', ''),
              ],
              Path('apps/web/lib/api/health.ts'): [
                  ('// Tunneled local backends can take longer than a same-region hosted service.\n', '// Hosted backends are probed within the bounded BFF timeout contract.\n'),
              ],
              Path('apps/web/app/api/system/backend-status/route.ts'): [
                  ('the public ngrok / Render host', 'the private backend host'),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f'Expected text not found in {path}: {old!r}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          # Retire the local-tunnel helper so it cannot be used as a production path.
          Path('scripts/windows/connect-local-backend.ps1').write_text(
              "$ErrorActionPreference = 'Stop'\n"
              "throw 'Retired: SNAD production backend is hosted exclusively on Render. Local tunnel connection is disabled.'\n",
              encoding='utf-8',
          )

          # Disable automatic self-hosted deployment; Render becomes the only production backend publisher.
          src = Path('.github/workflows/self-hosted-deploy.yml')
          dst = Path('.github/workflows/self-hosted-deploy.yml.disabled')
          if not src.exists():
              raise SystemExit('Expected active self-hosted deployment workflow was not found')
          if dst.exists():
              dst.unlink()
          src.rename(dst)

          # Record the approved production topology.
          Path('docs/operations/RENDER-PRODUCTION-CUTOVER.md').write_text(
              "# Render Production Cutover\n\n"
              "- Production frontend: `https://snad-app.vercel.app`\n"
              "- Production backend: `https://sanad-backend-mcrj.onrender.com`\n"
              "- Vercel BFF upstream: Render only\n"
              "- Self-hosted automatic deployment: disabled\n"
              "- Local/ngrok production tunnel: retired\n"
              "- Health contract: `/actuator/health` must return HTTP 200 and `status=UP`\n"
              "- BFF unauthenticated boundary: `/api/platform/api/v1/auth/me` must return HTTP 401\n",
              encoding='utf-8',
          )

          # The one-time workflow removes itself only after the cutover succeeds.
          PY

          git diff --check
          ! grep -R --line-number --fixed-strings 'streak-train-empower.ngrok-free.dev' \
            .github/workflows apps/web scripts/ci scripts/windows
          test ! -f .github/workflows/self-hosted-deploy.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/sanad-platform
          file: apps/sanad-platform/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy immutable image to Render
        id: render
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URL="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          jq -n --arg image "$IMAGE_URL" '{imageUrl:$image}' > "$RUNNER_TEMP/render-deploy.json"
          curl --fail-with-body --silent --show-error --max-time 60 \
            -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            --data @"$RUNNER_TEMP/render-deploy.json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            > "$RUNNER_TEMP/render-created.json"
          DEPLOY_ID="$(jq -r '(.deploy // .).id // empty' "$RUNNER_TEMP/render-created.json")"
          test -n "$DEPLOY_ID"

          STATUS=""
          for attempt in $(seq 1 180); do
            curl --fail-with-body --silent --show-error --max-time 30 \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H 'Accept: application/json' \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              > "$RUNNER_TEMP/render-state.json"
            STATUS="$(jq -r '(.deploy // .).status // empty' "$RUNNER_TEMP/render-state.json")"
            case "$STATUS" in
              live) break ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Render deployment failed: $STATUS"
                exit 1
                ;;
            esac
            sleep 10
          done
          test "$STATUS" = "live"
          test "$(jq -r '(.deploy // .).image.ref // empty' "$RUNNER_TEMP/render-state.json")" = "$IMAGE_URL"
          echo "deployment_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Verify Render health, liveness, and readiness
        shell: bash
        run: |
          set -euo pipefail
          for path in /actuator/health /actuator/health/liveness /actuator/health/readiness; do
            CODE="000"
            for attempt in $(seq 1 48); do
              CODE="$(curl --silent --show-error --max-time 30 -o "$RUNNER_TEMP/health.json" -w '%{http_code}' "${PRODUCTION_BACKEND_BASE_URL}${path}" || true)"
              if [ "$CODE" = "200" ] && jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null 2>&1; then
                break
              fi
              sleep 5
            done
            test "$CODE" = "200"
            jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null
          done

      - name: Point Vercel Production BFF exclusively at Render
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$PRODUCTION_BACKEND_BASE_URL" | \
            npx --yes vercel@latest env update BACKEND_API_BASE_URL production --yes --token "$VERCEL_TOKEN"

      - name: Deploy patched frontend to Vercel Production
        shell: bash
        run: |
          set -euo pipefail
          npx --yes vercel@latest deploy --prod --force --yes --token "$VERCEL_TOKEN" \
            | tee "$RUNNER_TEMP/vercel-deploy.log"

      - name: Verify end-to-end production chain
        shell: bash
        run: |
          set -euo pipefail
          STATUS_CODE="000"
          BFF_CODE="000"
          UI_CODE="000"
          for attempt in $(seq 1 48); do
            UI_CODE="$(curl --silent --show-error --max-time 30 -o "$RUNNER_TEMP/ui.html" -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/" || true)"
            STATUS_CODE="$(curl --silent --show-error --max-time 30 -o "$RUNNER_TEMP/backend-status.json" -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/system/backend-status" || true)"
            BFF_CODE="$(curl --silent --show-error --max-time 30 -o "$RUNNER_TEMP/auth-me.json" -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/platform/api/v1/auth/me" || true)"
            if [ "$UI_CODE" = "200" ] && [ "$STATUS_CODE" = "200" ] && [ "$BFF_CODE" = "401" ] && \
               jq -e '.configured == true and .reachable == true and .statusCode == 200 and (has("targetHost") | not)' "$RUNNER_TEMP/backend-status.json" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          test "$UI_CODE" = "200"
          test "$STATUS_CODE" = "200"
          jq -e '.configured == true and .reachable == true and .statusCode == 200 and (has("targetHost") | not)' "$RUNNER_TEMP/backend-status.json" >/dev/null
          test "$BFF_CODE" = "401"

      - name: Commit Render-only topology and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-time-render-production-cutover.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'ops: make Render the exclusive production backend'
          git push origin HEAD:main

      - name: Publish cutover summary
        shell: bash
        run: |
          {
            echo '## Render-only production cutover complete'
            echo ''
            echo "- Render deployment: \`${{ steps.render.outputs.deployment_id }}\`"
            echo '- Render health/liveness/readiness: **UP**'
            echo '- Vercel BFF upstream: **Render**'
            echo '- Vercel production UI: **200**'
            echo '- Unauthenticated auth boundary: **401**'
            echo '- Self-hosted automatic deployment: **disabled**'
            echo '- Local/ngrok production tunnel: **retired**'
          } >> "$GITHUB_STEP_SUMMARY"
