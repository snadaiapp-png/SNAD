name: CRM API Contract Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm-api-contract-validation.yml'

permissions:
  contents: write

concurrency:
  group: crm-test-fixture-remediation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  remediate:
    name: Remediate isolated test fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply deterministic source transformations
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          auth = Path('apps/sanad-platform/src/test/java/com/sanad/platform/security/api/AuthApiIntegrationTest.java')
          text = auth.read_text(encoding='utf-8')
          old_cleanup = '''        roleCapabilityRepository.deleteAll();
                  userRoleGrantRepository.deleteAll();
                  refreshTokenRepository.deleteAll();
                  membershipRepository.deleteAll();
                  roleRepository.deleteAll();
                  userRepository.deleteAll();
                  organizationRepository.deleteAll();
                  tenantRepository.deleteAll();

          '''
          if old_cleanup not in text:
              raise SystemExit('AuthApiIntegrationTest cleanup block not found')
          text = text.replace(
              old_cleanup,
              '''        // Use tenant-unique fixtures instead of deleting shared platform seed data.
                  // The Spring context is intentionally shared across integration suites.
          ''',
              1,
          )
          old_email = '        testEmail = "testuser@example.com";'
          new_email = '        testEmail = "testuser-" + UUID.randomUUID() + "@example.com";'
          if old_email not in text:
              raise SystemExit('AuthApiIntegrationTest email assignment not found')
          auth.write_text(text.replace(old_email, new_email, 1), encoding='utf-8')

          rotation = Path('apps/sanad-platform/src/test/java/com/sanad/platform/security/api/CredentialRotationIntegrationTest.java')
          text = rotation.read_text(encoding='utf-8')
          old_rotation_cleanup = '''    @AfterEach
              void cleanUp() {
                  roleCapabilityRepository.deleteAll();
                  userRoleGrantRepository.deleteAll();
                  refreshTokenRepository.deleteAll();
                  membershipRepository.deleteAll();
                  roleRepository.deleteAll();
                  userRepository.deleteAll();
                  organizationRepository.deleteAll();
                  tenantRepository.deleteAll();
              }
          '''
          if old_rotation_cleanup not in text:
              raise SystemExit('CredentialRotationIntegrationTest cleanup block not found')
          text = text.replace(
              old_rotation_cleanup,
              '''    @AfterEach
              void cleanUp() {
                  // Fixtures use unique tenant and user identifiers. Do not delete global
                  // platform seed data from a shared integration-test application context.
              }
          ''',
              1,
          )
          rotation.write_text(text, encoding='utf-8')

          migration = Path('apps/sanad-platform/src/test/java/com/sanad/platform/crm/web/CrmPostgresMigrationTest.java')
          text = migration.read_text(encoding='utf-8')
          anchor = '    private static final String CRM_CONTACT_RELATIONSHIP_RBAC_VERSION = "20260717.2";'
          replacement = anchor + '\n    private static final String CRM_TIMELINE_TENANT_LIFECYCLE_VERSION = "20260717.3";'
          if anchor not in text:
              raise SystemExit('Migration version anchor not found')
          text = text.replace(anchor, replacement, 1)
          pending_anchor = '                        MigrationVersion.fromVersion(CRM_CONTACT_RELATIONSHIP_RBAC_VERSION));'
          pending_replacement = '''                        MigrationVersion.fromVersion(CRM_CONTACT_RELATIONSHIP_RBAC_VERSION),
                                  MigrationVersion.fromVersion(CRM_TIMELINE_TENANT_LIFECYCLE_VERSION));'''
          count = text.count(pending_anchor)
          if count != 2:
              raise SystemExit(f'Expected two pending migration anchors, found {count}')
          text = text.replace(pending_anchor, pending_replacement)
          assert_anchor = '        assertMigration(jdbc, CRM_CONTACT_RELATIONSHIP_RBAC_VERSION, "SQL", "crm contact relationship capabilities");'
          assert_replacement = assert_anchor + '\n        assertMigration(jdbc, CRM_TIMELINE_TENANT_LIFECYCLE_VERSION, "SQL", "crm timeline tenant lifecycle");'
          if assert_anchor not in text:
              raise SystemExit('Migration assertion anchor not found')
          text = text.replace(assert_anchor, assert_replacement, 1)
          latest_anchor = '        assertThat(latestVersion(jdbc)).isEqualTo(CRM_CONTACT_RELATIONSHIP_RBAC_VERSION);'
          if latest_anchor not in text:
              raise SystemExit('Latest migration assertion not found')
          text = text.replace(
              latest_anchor,
              '        assertThat(latestVersion(jdbc)).isEqualTo(CRM_TIMELINE_TENANT_LIFECYCLE_VERSION);',
              1,
          )
          migration.write_text(text, encoding='utf-8')
          PY

      - name: Validate transformed sources
        run: |
          set -euo pipefail
          git diff --check
          grep -q 'testuser-.*UUID.randomUUID' apps/sanad-platform/src/test/java/com/sanad/platform/security/api/AuthApiIntegrationTest.java
          grep -q 'CRM_TIMELINE_TENANT_LIFECYCLE_VERSION' apps/sanad-platform/src/test/java/com/sanad/platform/crm/web/CrmPostgresMigrationTest.java

      - name: Commit remediation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/sanad-platform/src/test/java/com/sanad/platform/security/api/AuthApiIntegrationTest.java \
            apps/sanad-platform/src/test/java/com/sanad/platform/security/api/CredentialRotationIntegrationTest.java \
            apps/sanad-platform/src/test/java/com/sanad/platform/crm/web/CrmPostgresMigrationTest.java
          git commit -m 'test: isolate security fixtures and register CRM migration'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
