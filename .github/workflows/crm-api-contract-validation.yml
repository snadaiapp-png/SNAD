name: CRM API Contract Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/**'
      - 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/**'
      - 'apps/sanad-platform/src/main/resources/db/migration/**'
      - 'apps/sanad-platform/pom.xml'
      - 'apps/web/lib/api/**'
      - 'docs/crm/contracts/**'
      - 'scripts/crm/**'
      - '.github/workflows/crm-api-contract-validation.yml'

permissions:
  contents: write

concurrency:
  group: crm-api-contract-sync-${{ github.ref }}
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  synchronize:
    name: Synchronize filtered CRM API contract
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Start backend
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            > /tmp/crm-contract-sync-backend.log 2>&1 &
          echo $! > /tmp/crm-contract-sync-backend.pid

      - name: Fetch platform runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-contract-sync-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-contract-sync-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm-contract-sync-backend.log
          exit 1

      - name: Generate filtered CRM OpenAPI
        run: |
          set -euo pipefail
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output docs/crm/contracts/openapi/crm-openapi.json \
            --prefix /api/v2/crm \
            --expected-paths 50 \
            --expected-operations 66

      - name: Generate and validate TypeScript contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts

      - name: Commit synchronized contracts
        run: |
          set -euo pipefail
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/crm/contracts/openapi/crm-openapi.json \
            apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo 'Contracts are already synchronized.'
            exit 0
          fi
          git commit -m 'chore(crm): synchronize filtered API contracts'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-contract-sync-backend.pid ]; then
            kill "$(cat /tmp/crm-contract-sync-backend.pid)" 2>/dev/null || true
          fi
