name: CRM API Contract Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm-api-contract-validation.yml'

permissions:
  contents: write

concurrency:
  group: security-fixture-remediation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  remediate:
    name: Isolate remaining security fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove global cleanup and randomize identities
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          cases = [
              (
                  Path('apps/sanad-platform/src/test/java/com/sanad/platform/security/api/ApiRegressionSuiteTest.java'),
                  '''        roleCapabilityRepository.deleteAll();
                  userRoleGrantRepository.deleteAll();
                  refreshTokenRepository.deleteAll();
                  membershipRepository.deleteAll();
                  organizationRepository.deleteAll();
                  roleRepository.deleteAll();
                  userRepository.deleteAll();
                  tenantRepository.deleteAll();

          ''',
                  '        testEmail = "regression@example.com";',
                  '        testEmail = "regression-" + UUID.randomUUID() + "@example.com";',
              ),
              (
                  Path('apps/sanad-platform/src/test/java/com/sanad/platform/security/api/TokenRevocationIntegrationTest.java'),
                  '''        roleCapabilityRepository.deleteAll();
                  userRoleGrantRepository.deleteAll();
                  passwordResetTokenRepository.deleteAll();
                  refreshTokenRepository.deleteAll();
                  membershipRepository.deleteAll();
                  organizationRepository.deleteAll();
                  roleRepository.deleteAll();
                  userRepository.deleteAll();
                  tenantRepository.deleteAll();

          ''',
                  '        testEmail = "revocation-test@example.com";',
                  '        testEmail = "revocation-test-" + UUID.randomUUID() + "@example.com";',
              ),
          ]

          for path, cleanup, old_email, new_email in cases:
              text = path.read_text(encoding='utf-8')
              if cleanup not in text:
                  raise SystemExit(f'Cleanup block not found in {path}')
              text = text.replace(
                  cleanup,
                  '''        // Use unique tenant-scoped fixtures; never delete shared platform seed data.
          ''',
                  1,
              )
              if old_email not in text:
                  raise SystemExit(f'Email assignment not found in {path}')
              text = text.replace(old_email, new_email, 1)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Validate transformed files
        run: |
          set -euo pipefail
          git diff --check
          ! grep -q 'tenantRepository.deleteAll' apps/sanad-platform/src/test/java/com/sanad/platform/security/api/ApiRegressionSuiteTest.java
          ! grep -q 'tenantRepository.deleteAll' apps/sanad-platform/src/test/java/com/sanad/platform/security/api/TokenRevocationIntegrationTest.java
      - name: Commit isolation fixes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/sanad-platform/src/test/java/com/sanad/platform/security/api/ApiRegressionSuiteTest.java \
            apps/sanad-platform/src/test/java/com/sanad/platform/security/api/TokenRevocationIntegrationTest.java
          git commit -m 'test: isolate remaining security integration fixtures'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
