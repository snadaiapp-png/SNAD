name: CRM-005 OpenAPI Sync

on:
  push:
    branches:
      - crm/005-enterprise-account-master
    paths:
      - '.github/workflows/crm-005-openapi-sync.yml'

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JWT_SECRET: ci-only-non-production-validation-key-1234567890
    steps:
      - name: Checkout execution branch
        uses: actions/checkout@v4
        with:
          ref: crm/005-enterprise-account-master
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Start platform OpenAPI runtime
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            > /tmp/crm005-openapi-backend.log 2>&1 &
          echo $! > /tmp/crm005-openapi-backend.pid

      - name: Fetch runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm005-openapi-backend.pid)" 2>/dev/null; then
              cat /tmp/crm005-openapi-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm005-openapi-backend.log
          exit 1

      - name: Generate governed CRM OpenAPI
        run: |
          set -euo pipefail
          python3 scripts/crm/generate-crm-openapi.py \
            /tmp/platform-openapi.json \
            docs/crm/contracts/openapi/crm-openapi.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          methods = {'get','post','put','patch','delete','head','options','trace'}
          spec = json.loads(Path('docs/crm/contracts/openapi/crm-openapi.json').read_text(encoding='utf-8'))
          operations = sum(1 for item in spec['paths'].values() for method in item if method in methods)
          assert len(spec['paths']) == 45, (len(spec['paths']), operations)
          assert operations == 61, (len(spec['paths']), operations)
          print(f'CRM-005 governed OpenAPI: {len(spec["paths"])} paths / {operations} operations')
          PY

      - name: Generate TypeScript contract types
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
          git checkout -- package.json package-lock.json

      - name: Commit generated artifacts
        run: |
          set -euo pipefail
          git config user.name "SANAD Governance Bot"
          git config user.email "governance@sanad.local"
          git add docs/crm/contracts/openapi/crm-openapi.json \
                  apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo "Generated artifacts already synchronized"
            exit 0
          fi
          git commit -m "docs(crm): synchronize CRM-005 API contract artifacts"
          git push origin HEAD:crm/005-enterprise-account-master

      - name: Stop runtime
        if: always()
        run: |
          if [ -f /tmp/crm005-openapi-backend.pid ]; then
            kill "$(cat /tmp/crm005-openapi-backend.pid)" 2>/dev/null || true
          fi
