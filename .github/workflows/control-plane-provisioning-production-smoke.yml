name: Control Plane Provisioning Production Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Control Plane Provisioning Smoke
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run provisioning smoke
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          CP_SMOKE_EMAIL: ${{ secrets.CONTROL_PLANE_NON_ADMIN_EMAIL }}
          CP_SMOKE_PASSWORD: ${{ secrets.CONTROL_PLANE_NON_ADMIN_PASSWORD }}
          CONTROL_PLANE_TEST_EMAIL_DOMAIN: ${{ secrets.CONTROL_PLANE_TEST_EMAIL_DOMAIN }}
        run: |
          set -euo pipefail
          bash scripts/production/verify-control-plane-provisioning-smoke.sh

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-smoke-log
          path: /tmp/cp-*.json
          if-no-files-found: warn
          retention-days: 14
