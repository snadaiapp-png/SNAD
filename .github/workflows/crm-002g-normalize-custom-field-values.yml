name: CRM 002G Normalize Custom Field Values

on:
  push:
    branches:
      - crm/002g-execute-final-acceptance-gate

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[crm-002g-custom-values-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: crm/002g-execute-final-acceptance-gate
          fetch-depth: 0

      - name: Normalize empty custom-field values response
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/web/lib/api/crm.ts')
          text = path.read_text(encoding='utf-8')
          old = '  customFieldValues: (entityType: string, entityId: string) => apiClient.get<CrmCustomFieldValues>(`${root}/custom-fields/values/${entityType}/${entityId}`, { cache: "no-store" }),\n'
          new = '''  customFieldValues: async (entityType: string, entityId: string) => {\n    const response = await apiClient.get<Partial<CrmCustomFieldValues>>(\n      `${root}/custom-fields/values/${entityType}/${entityId}`,\n      { cache: "no-store" },\n    );\n    return {\n      entityType: response.entityType ?? entityType,\n      entityId: response.entityId ?? entityId,\n      values: Array.isArray(response.values) ? response.values : [],\n    } satisfies CrmCustomFieldValues;\n  },\n'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one customFieldValues definition, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git diff --check

      - name: Commit normalization and remove transient workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SNAD CRM Acceptance Bot"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/crm-002g-normalize-custom-field-values.yml
          git add apps/web/lib/api/crm.ts
          git commit -m "fix(crm): normalize empty custom-field values response [crm-002g-custom-values-applied]"
          git push origin HEAD:crm/002g-execute-final-acceptance-gate
