name: CRM-007 Workflow Sweeper

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm007-workflow-sweeper.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm007-workflow-sweeper
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Synchronize branch before final generation
        run: |
          set -euo pipefail
          git fetch origin "${{ github.head_ref }}"
          git reset --hard "origin/${{ github.head_ref }}"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Reconcile final verification and contract expectations
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          contract=Path('.github/workflows/crm-api-contract-validation.yml')
          text=contract.read_text(encoding='utf-8')
          for old in ("EXPECTED_CRM_PATHS: '65'", "EXPECTED_CRM_PATHS: '71'"):
              text=text.replace(old,"EXPECTED_CRM_PATHS: '72'")
          for old in ("EXPECTED_CRM_OPERATIONS: '87'", "EXPECTED_CRM_OPERATIONS: '93'"):
              text=text.replace(old,"EXPECTED_CRM_OPERATIONS: '95'")
          import_header="              ('/contacts/{contactId}/communication-methods','post','Idempotency-Key'),\n"
          if "('/addresses/import','post','Idempotency-Key')" not in text:
              text=text.replace(import_header,import_header+"              ('/addresses/import','post','Idempotency-Key'),\n              ('/communication-methods/import','post','Idempotency-Key'),\n")
          contract.write_text(text,encoding='utf-8')

          test=Path('apps/sanad-platform/src/test/java/com/sanad/platform/crm/contract/CrmOpenApiContractTest.java')
          text=test.read_text(encoding='utf-8')
          for old in ('EXPECTED_PATHS = 65','EXPECTED_PATHS = 71'):
              text=text.replace(old,'EXPECTED_PATHS = 72')
          for old in ('EXPECTED_OPERATIONS = 87','EXPECTED_OPERATIONS = 93'):
              text=text.replace(old,'EXPECTED_OPERATIONS = 95')
          if '"/addresses/import", "/communication-methods/import"' not in text:
              needle='                "/accounts/{accountId}/communication-methods", "/contacts/{contactId}/communication-methods"}) {'
              repl='                "/accounts/{accountId}/communication-methods", "/contacts/{contactId}/communication-methods",\n                "/addresses/import", "/communication-methods/import"}) {'
              text=text.replace(needle,repl)
          test.write_text(text,encoding='utf-8')

          final=Path('.github/workflows/crm007-final-verification.yml')
          text=final.read_text(encoding='utf-8')
          text=text.replace("EXPECTED_CRM_PATHS: '71'","EXPECTED_CRM_PATHS: '72'")
          text=text.replace("EXPECTED_CRM_OPERATIONS: '93'","EXPECTED_CRM_OPERATIONS: '95'")
          final.write_text(text,encoding='utf-8')
          PY
      - name: Compile and start backend
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress -DskipTests compile
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            >/tmp/crm007-sweeper-backend.log 2>&1 &
          echo $! >/tmp/crm007-sweeper-backend.pid
      - name: Generate exact 72/95 contract
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm007-sweeper-backend.pid)" 2>/dev/null; then
              cat /tmp/crm007-sweeper-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then break; fi
            sleep 2
          done
          test -s /tmp/platform-openapi.json
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output /tmp/crm-openapi.runtime.json \
            --prefix /api/v2/crm \
            --expected-paths 72 \
            --expected-operations 95
          cp /tmp/crm-openapi.runtime.json docs/crm/contracts/openapi/crm-openapi.json
      - name: Generate exact TypeScript contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts
      - name: Remove all temporary CRM-007 workflows
        run: |
          set -euo pipefail
          git rm -f --ignore-unmatch \
            .github/workflows/crm007-contract-bootstrap.yml \
            .github/workflows/crm007-compile-hotfix.yml \
            .github/workflows/crm007-operations-contract-sync.yml \
            .github/workflows/crm007-policy-contract-sync.yml \
            .github/workflows/crm007-focused-policy-sync.yml \
            .github/workflows/crm007-governance-hotfix.yml \
            .github/workflows/crm007-final-contract-cleanup.yml \
            .github/workflows/crm007-final-workflow-hotfix.yml \
            .github/workflows/crm007-workflow-sweeper.yml
      - name: Commit and push with race-safe retry
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/crm-api-contract-validation.yml
          git add .github/workflows/crm007-final-verification.yml
          git add apps/sanad-platform/src/test/java/com/sanad/platform/crm/contract/CrmOpenApiContractTest.java
          git add docs/crm/contracts/openapi/crm-openapi.json
          git add apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo 'No sweep changes required.'
            exit 0
          fi
          git commit -m 'chore(crm): finalize CRM-007 contract and remove temporary workflows'
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:${{ github.head_ref }}; then exit 0; fi
            echo "Push race on attempt ${attempt}; rebasing and retrying."
            git pull --rebase origin "${{ github.head_ref }}"
          done
          exit 1
      - name: Stop backend
        if: always()
        run: if [ -f /tmp/crm007-sweeper-backend.pid ]; then kill "$(cat /tmp/crm007-sweeper-backend.pid)" 2>/dev/null || true; fi
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-sweeper-diagnostics-${{ github.sha }}
          path: |
            /tmp/crm007-sweeper-backend.log
            /tmp/platform-openapi.json
          if-no-files-found: warn
          retention-days: 7
