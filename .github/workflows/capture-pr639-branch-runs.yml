name: Capture PR639 Branch Runs

on:
  push:
    branches:
      - diag/crm007-run-status
    paths:
      - .github/workflows/capture-pr639-branch-runs.yml

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/crm007-run-status
      - name: Capture branch runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/diagnostics
          curl --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?branch=fix%2Fcrm-idempotency-baseline-reconciliation&per_page=100" \
            | jq '{runs:[.workflow_runs[] | {id,name,path,status,conclusion,event,head_sha,head_branch,created_at,updated_at,html_url}]}' \
            > evidence/diagnostics/pr639-branch-runs.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evidence/diagnostics/pr639-branch-runs.json
          git commit -m 'docs(diag): record PR639 branch workflows'
          git push origin HEAD:diag/crm007-run-status
