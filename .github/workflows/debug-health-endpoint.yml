name: Debug Health Endpoint

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Debug Health Response
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
      CONTROL_PLANE_ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      CONTROL_PLANE_ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}
    steps:
      - name: Login as admin
        shell: bash
        run: |
          set -Eeuo pipefail
          LOGIN_PAYLOAD="$(jq -n \
            --arg address "$CONTROL_PLANE_ADMIN_EMAIL" \
            --arg pass "$CONTROL_PLANE_ADMIN_PASSWORD" \
            --arg tenant "$CONTROL_PLANE_TENANT_ID" \
            '{email:$address,password:$pass,tenantId:$tenant}')"
          LOGIN_CODE="$(curl -sS --max-time 60 \
            -X POST -H 'Content-Type: application/json' \
            --data "$LOGIN_PAYLOAD" \
            -o "$RUNNER_TEMP/admin-login.json" -w '%{http_code}' \
            "$BACKEND_URL/api/v1/auth/login")"
          echo "Login code: $LOGIN_CODE"
          [ "$LOGIN_CODE" = "200" ] || { cat "$RUNNER_TEMP/admin-login.json"; exit 1; }
          ADMIN_TOKEN="$(jq -r '.accessToken // empty' "$RUNNER_TEMP/admin-login.json")"
          echo "::add-mask::$ADMIN_TOKEN"
          echo "ADMIN_TOKEN=$ADMIN_TOKEN" >> "$GITHUB_ENV"
      
      - name: Get health response
        shell: bash
        run: |
          set -Eeuo pipefail
          CODE="$(curl -sS --max-time 60 \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -o "$RUNNER_TEMP/health.json" -w '%{http_code}' \
            "$BACKEND_URL/api/v1/control-plane/health")"
          echo "Health HTTP: $CODE"
          echo "=== Health response (top-level keys) ==="
          jq 'keys' "$RUNNER_TEMP/health.json"
          echo ""
          echo "=== Health response (full, masked) ==="
          jq '.' "$RUNNER_TEMP/health.json" | head -100
      
      - name: Upload health.json
        uses: actions/upload-artifact@v4
        with:
          name: health-response
          path: ${{ runner.temp }}/health.json
