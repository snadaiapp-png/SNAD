name: CRM Contract Sync Temporary

on:
  push:
    branches:
      - crm/006-contact-relationship-model
    paths:
      - '.github/workflows/crm-contract-sync-temp.yml'

permissions:
  contents: write

concurrency:
  group: crm-contract-sync-temporary
  cancel-in-progress: false

jobs:
  sync:
    name: Synchronize filtered CRM OpenAPI and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: crm/006-contact-relationship-model
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Start backend
        working-directory: apps/sanad-platform
        env:
          JWT_SECRET: ci-only-non-production-validation-key-1234567890
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            > /tmp/crm-contract-sync-backend.log 2>&1 &
          echo $! > /tmp/crm-contract-sync-backend.pid

      - name: Fetch platform runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-contract-sync-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-contract-sync-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm-contract-sync-backend.log
          exit 1

      - name: Generate filtered CRM OpenAPI
        run: |
          set -euo pipefail
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output docs/crm/contracts/openapi/crm-openapi.json \
            --prefix /api/v2/crm \
            --expected-paths 50 \
            --expected-operations 66

      - name: Generate TypeScript contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts

      - name: Validate generated files
        run: |
          set -euo pipefail
          git diff --check
          python3 - <<'PY'
          import json
          from pathlib import Path
          spec = json.loads(Path('docs/crm/contracts/openapi/crm-openapi.json').read_text(encoding='utf-8'))
          methods = {'get', 'post', 'put', 'patch', 'delete', 'head', 'options', 'trace'}
          operations = sum(1 for item in spec['paths'].values() for method in item if method in methods)
          assert len(spec['paths']) == 50
          assert operations == 66
          assert spec['servers'] == [{'url': '/api/v2/crm'}]
          print('Generated CRM contract validated: 50 paths, 66 operations')
          PY

      - name: Commit generated contracts
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/crm/contracts/openapi/crm-openapi.json \
            apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo 'Contracts are already synchronized.'
            exit 0
          fi
          git commit -m 'chore(crm): synchronize filtered API contracts'
          git push origin HEAD:crm/006-contact-relationship-model

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-contract-sync-backend.pid ]; then
            kill "$(cat /tmp/crm-contract-sync-backend.pid)" 2>/dev/null || true
          fi
