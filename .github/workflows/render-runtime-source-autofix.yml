name: One-shot Render Runtime Source Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/render-runtime-source-autofix.yml

permissions:
  contents: write

concurrency:
  group: render-runtime-source-autofix
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'fix/render-runtime-source-of-truth'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v6
        with:
          ref: fix/render-runtime-source-of-truth
          fetch-depth: 0
          persist-credentials: true

      - name: Make Render the immutable Production upstream
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          route = Path('apps/web/app/api/platform/[...path]/route.ts')
          text = route.read_text(encoding='utf-8')
          text = text.replace(
              'const PRODUCTION_BACKEND_HOST = "sanad-backend-mcrj.onrender.com";',
              'const PRODUCTION_BACKEND_URL = "https://sanad-backend-mcrj.onrender.com";\n'
              'const PRODUCTION_BACKEND_HOST = new URL(PRODUCTION_BACKEND_URL).hostname;',
          )
          text = text.replace(
              'function backendBaseUrl(): string | null {\n'
              '  const raw = process.env.BACKEND_API_BASE_URL || process.env.NEXT_PUBLIC_API_BASE_URL || "";',
              'function backendBaseUrl(): string | null {\n'
              '  // Production routing is immutable: stale dashboard variables cannot re-enable a tunnel.\n'
              '  if (process.env.VERCEL_ENV === "production") return PRODUCTION_BACKEND_URL;\n\n'
              '  const raw = process.env.BACKEND_API_BASE_URL || process.env.NEXT_PUBLIC_API_BASE_URL || "";',
          )
          route.write_text(text, encoding='utf-8')

          health = Path('apps/web/lib/api/health.ts')
          text = health.read_text(encoding='utf-8')
          text = text.replace(
              'const SERVER_HEALTH_RETRY_DELAY_MS = 250;',
              'const SERVER_HEALTH_RETRY_DELAY_MS = 250;\n'
              'const PRODUCTION_BACKEND_URL = "https://sanad-backend-mcrj.onrender.com";',
          )
          text = text.replace(
              'function readServerBackendBaseUrl(): string {\n'
              '  // Try BACKEND_API_BASE_URL first (server-side env var), then fall back to',
              'function readServerBackendBaseUrl(): string {\n'
              '  // Production routing is immutable and must not depend on stale Vercel variables.\n'
              '  if (process.env.VERCEL_ENV === "production") return PRODUCTION_BACKEND_URL;\n\n'
              '  // Try BACKEND_API_BASE_URL first (server-side env var), then fall back to',
          )
          health.write_text(text, encoding='utf-8')

          route_test = Path('apps/web/app/api/platform/[...path]/route.render-policy.test.ts')
          text = route_test.read_text(encoding='utf-8')
          old = '''  it("rejects a non-Render backend before any upstream request", async () => {
              vi.stubEnv("BACKEND_API_BASE_URL", "https://legacy-tunnel.example");
              vi.spyOn(console, "error").mockImplementation(() => undefined);

              const response = await GET(request(), context("api", "v1", "auth", "me"));

              expect(response.status).toBe(503);
              expect(fetch).not.toHaveBeenCalled();
            });'''
          new = '''  it("ignores a stale non-Render variable and uses the immutable Render origin", async () => {
              vi.stubEnv("BACKEND_API_BASE_URL", "https://legacy-tunnel.example");
              vi.mocked(fetch).mockResolvedValue(new Response(null, { status: 401 }));

              const response = await GET(request(), context("api", "v1", "auth", "me"));

              expect(response.status).toBe(401);
              expect(fetch).toHaveBeenCalledTimes(1);
              expect(vi.mocked(fetch).mock.calls[0][0]).toBe(
                "https://sanad-backend-mcrj.onrender.com/api/v1/auth/me",
              );
            });'''
          if old not in text:
              raise SystemExit('Expected route policy test block was not found')
          route_test.write_text(text.replace(old, new), encoding='utf-8')

          health_test = Path('apps/web/lib/api/health.test.ts')
          text = health_test.read_text(encoding='utf-8')
          anchor = '''  it("uses the private server backend URL when the production client uses the same-origin BFF", async () => {'''
          test = '''  it("ignores stale Production variables and probes the immutable Render origin", async () => {
              vi.stubEnv("VERCEL_ENV", "production");
              vi.stubEnv("BACKEND_API_BASE_URL", "https://legacy-tunnel.example");
              const fetchMock = vi.fn().mockResolvedValue({
                status: 200,
                json: vi.fn().mockResolvedValue({ status: "UP" }),
              });
              vi.stubGlobal("fetch", fetchMock);

              const result = await checkBackendIntegration(new ApiClient({ baseUrl: "/api/platform" }));

              expect(fetchMock).toHaveBeenCalledWith(
                "https://sanad-backend-mcrj.onrender.com/actuator/health",
                expect.objectContaining({ method: "GET", cache: "no-store" }),
              );
              expect(result).toMatchObject({
                configured: true,
                reachable: true,
                statusCode: 200,
                targetHost: "sanad-backend-mcrj.onrender.com",
              });
            });

          '''
          if anchor not in text:
              raise SystemExit('Expected health test anchor was not found')
          health_test.write_text(text.replace(anchor, test + anchor), encoding='utf-8')

          for path, required in [
              (route, 'if (process.env.VERCEL_ENV === "production") return PRODUCTION_BACKEND_URL;'),
              (health, 'if (process.env.VERCEL_ENV === "production") return PRODUCTION_BACKEND_URL;'),
          ]:
              if required not in path.read_text(encoding='utf-8'):
                  raise SystemExit(f'Render runtime guard missing from {path}')
          PY

      - name: Validate focused policy tests and production build
        working-directory: apps/web
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm test -- --run 'app/api/platform/[...path]/route.render-policy.test.ts' 'lib/api/health.test.ts'
          npm run build

      - name: Remove helper and commit hotfix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/render-runtime-source-autofix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/app/api/platform/'[...path]'/route.ts \
                  apps/web/app/api/platform/'[...path]'/route.render-policy.test.ts \
                  apps/web/lib/api/health.ts \
                  apps/web/lib/api/health.test.ts \
                  .github/workflows/render-runtime-source-autofix.yml
          git commit -m 'fix(web): make Render the immutable Production upstream'
          git push origin HEAD:fix/render-runtime-source-of-truth
