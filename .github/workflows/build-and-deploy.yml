# ============================================================
# SANAD Platform — Build JAR in CI, Build Docker, Push to GHCR
# ------------------------------------------------------------
# Bypasses Maven build on Render (which fails due to 512MB RAM limit).
# GitHub Actions builds the JAR, creates a Docker image with it,
# pushes to ghcr.io, then triggers a Render deploy.
# Render pulls the pre-built image — no build needed on Render.
# ============================================================

name: Build and Deploy to Render

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        default: ''
        type: string
  push:
    branches:
      - main
    paths:
      - 'apps/sanad-platform/src/**'
      - 'apps/sanad-platform/pom.xml'
      - 'apps/sanad-platform/Dockerfile'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sanad-backend

jobs:
  build-and-push:
    name: Build JAR, Docker image, push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image_sha: ${{ steps.push.outputs.image_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        working-directory: apps/sanad-platform
        run: |
          mvn -B -ntp clean package -DskipTests -Dmaven.test.skip=true
          ls -la target/sanad-platform-*.jar

      - name: Verify V15 in JAR
        working-directory: apps/sanad-platform
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name 'sanad-platform-*.jar' ! -name '*.original' | head -1)
          test -n "$JAR_FILE" || { echo "FAIL: No JAR found"; exit 1; }
          jar tf "$JAR_FILE" | grep -q 'V15__seed_rbac_roles_and_capabilities.class' || { echo "FAIL: V15 not in JAR"; exit 1; }
          jar tf "$JAR_FILE" | grep -q 'FlywayJavaMigrationConfig.class' || { echo "FAIL: FlywayJavaMigrationConfig not in JAR"; exit 1; }
          echo "V15 and FlywayJavaMigrationConfig verified in JAR"

      - name: Set up Docker Buildx
        # uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        working-directory: apps/sanad-platform
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          docker build --no-cache -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${SHORT_SHA} .
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${SHORT_SHA}
          echo "image_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image pushed: ${{ env.IMAGE_NAME }}:latest and :${SHORT_SHA}"

  deploy-to-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    needs: build-and-push
    if: github.event.inputs.confirm == 'deploy'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
    steps:
      - name: Trigger Render deploy
        run: |
          set -euo pipefail
          echo "Triggering deploy on Render..."
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          test -n "$DEPLOY_ID" || { echo "::error::Failed to trigger deploy"; exit 1; }
          echo "::notice::Deploy triggered: $DEPLOY_ID"

      - name: Wait for health
        run: |
          set -euo pipefail
          echo "Waiting 60s..."
          sleep 60
          for i in $(seq 1 15); do
            sleep 30
            HTTP_CODE=$(curl --silent --output /tmp/health.json --write-out '%{http_code}' \
              --max-time 30 "${BACKEND_URL}/actuator/health" || true)
            echo "[$i] HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/health.json)
              if [ "$STATUS" = "UP" ]; then
                echo "::notice::Backend is UP!"
                exit 0
              fi
            fi
          done
          echo "::warning::Backend not yet UP. Check Render dashboard."
