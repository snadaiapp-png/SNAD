name: Restore Render Critical Env

on:
  workflow_dispatch:
    inputs:
      database_password:
        description: 'DATABASE_PASSWORD (Supabase database password)'
        required: true
        type: string
      resend_api_key:
        description: 'RESEND_API_KEY (re_xxxxxxxx)'
        required: true
        type: string
        default: 're_U8j7VFTu_L8HCjaEMrNv1KExX1ny6QtyU'
      email_from:
        description: 'SECURITY_NOTIFICATION_FROM'
        required: true
        type: string
        default: 'SANAD <onboarding@resend.dev>'

permissions:
  contents: read

jobs:
  restore:
    name: Restore critical Render env vars
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      # From GitHub Production secrets
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}
      # From user inputs
      DATABASE_PASSWORD: ${{ inputs.database_password }}
      RESEND_API_KEY: ${{ inputs.resend_api_key }}
      EMAIL_FROM: ${{ inputs.email_from }}
    steps:
      - name: Validate secrets are available
        shell: bash
        run: |
          set -euo pipefail
          test -n "$DATABASE_URL" || { echo "::error::PRODUCTION_DATABASE_URL secret is missing"; exit 1; }
          test -n "$DATABASE_USERNAME" || { echo "::error::DATABASE_USERNAME secret is missing"; exit 1; }
          test -n "$CONTROL_PLANE_TENANT_ID" || { echo "::error::BOOTSTRAP_TENANT_ID secret is missing"; exit 1; }
          echo "All required GitHub secrets are available"

      - name: Set DATABASE_URL
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting DATABASE_URL ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"DATABASE_URL\",\"value\":\"$DATABASE_URL\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set DATABASE_USERNAME
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting DATABASE_USERNAME ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"DATABASE_USERNAME\",\"value\":\"$DATABASE_USERNAME\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set DATABASE_PASSWORD
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting DATABASE_PASSWORD ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"DATABASE_PASSWORD\",\"value\":\"$DATABASE_PASSWORD\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set SANAD_CONTROL_PLANE_TENANT_ID
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SANAD_CONTROL_PLANE_TENANT_ID ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SANAD_CONTROL_PLANE_TENANT_ID\",\"value\":\"$CONTROL_PLANE_TENANT_ID\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set SECURITY_NOTIFICATION_RESEND_API_KEY
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SECURITY_NOTIFICATION_RESEND_API_KEY ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SECURITY_NOTIFICATION_RESEND_API_KEY\",\"value\":\"$RESEND_API_KEY\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set SECURITY_NOTIFICATION_FROM
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SECURITY_NOTIFICATION_FROM ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SECURITY_NOTIFICATION_FROM\",\"value\":\"$EMAIL_FROM\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Set SECURITY_NOTIFICATION_PROVIDER=resend
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SECURITY_NOTIFICATION_PROVIDER=resend ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SECURITY_NOTIFICATION_PROVIDER\",\"value\":\"resend\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Verify all env vars are set
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Verifying env vars ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq '[.[]? | (.envVar // .) | {key, valueLength: ((.value // "") | length)}] | sort_by(.key)'

      - name: Trigger Render deploy
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Triggering deploy ==="
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt..."
            RESPONSE=$(curl --silent --show-error --max-time 30 \
              --request POST \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Content-Type: application/json" \
              --header "Accept: application/json" \
              --data '{}' \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
            DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            if [ -n "$DEPLOY_ID" ]; then
              echo "Deploy ID: $DEPLOY_ID"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Could not trigger deploy. Try manually from Render dashboard."

      - name: Summary
        shell: bash
        run: |
          echo "=== ENV VARS RESTORED ==="
          echo "The following env vars have been set on Render:"
          echo "  - DATABASE_URL ✓ (from GitHub secret)"
          echo "  - DATABASE_USERNAME ✓ (from GitHub secret)"
          echo "  - DATABASE_PASSWORD ✓ (from user input)"
          echo "  - SANAD_CONTROL_PLANE_TENANT_ID ✓ (from GitHub secret)"
          echo "  - SECURITY_NOTIFICATION_RESEND_API_KEY ✓"
          echo "  - SECURITY_NOTIFICATION_FROM ✓"
          echo "  - SECURITY_NOTIFICATION_PROVIDER=resend ✓"
          echo ""
          echo "Deploy triggered. Check Render dashboard for build status."
