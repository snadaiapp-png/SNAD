# ============================================================
# SANAD Platform — CI Pipeline
# DEFECT-010: API Regression Automation
# Gate 8F Item 3: Backend Docker/Testcontainers CI
# ============================================================
# Runs on every push to main and on pull requests.
# Executes Maven tests (including Testcontainers tests that require Docker)
# and reports results.
# ============================================================

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/**'
      - '.github/workflows/ci.yml'
  # This workflow is a required status check and must report on every pull request.
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Maven Test Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/sanad-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker availability (for Testcontainers)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Docker version ==="
          docker --version
          echo "=== Docker daemon status ==="
          docker info --format '{{.ServerVersion}}' || {
            echo "::error::Docker daemon not available — Testcontainers tests will fail"
            exit 1
          }
          echo "Docker is ready for Testcontainers"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests (including Testcontainers)
        env:
          # Testcontainers reads these to connect to Docker
          TESTCONTAINERS_RYUK_DISABLED: 'false'
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
        run: mvn test -B -ntp -Dsurefire.useFile=false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: apps/sanad-platform/target/surefire-reports/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Testcontainers logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testcontainers-logs
          path: |
            apps/sanad-platform/target/surefire-reports/**/TEST-*.xml
            /tmp/testcontainers*
          if-no-files-found: warn
          retention-days: 7

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          mvn test -q -DskipTests -Dmaven.test.skip=true 2>/dev/null || echo "Maven test summary not available"
          # Parse surefire reports for summary
          find target/surefire-reports -name "*.txt" -exec grep -H "Tests run:" {} \; 2>/dev/null | \
            awk -F'[, ]' '{runs+=$4; fail+=$6; err+=$8; skip+=$10} END {print "Total: "runs" tests, "fail" failures, "err" errors, "skip" skipped"}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
