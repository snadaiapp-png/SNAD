name: CI

# ============================================================
# SANAD Platform - Backend Continuous Integration Pipeline
# ------------------------------------------------------------
# Runs on push to main, pull requests targeting main, and
# manual workflow_dispatch.
#
# Backend project: apps/sanad-platform (Maven, Java 21)
#
# Pipeline stages:
#   1. Checkout
#   2. Setup JDK 21 (Temurin)
#   3. Cache Maven repository
#   4. Compile main sources
#   5. Run all tests (unit + integration)
#   6. Package Spring Boot fat jar
#   7. Upload test reports + built jar
# ============================================================

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-package:
    name: Build, Test & Package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('apps/sanad-platform/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build (compile main sources)
        working-directory: apps/sanad-platform
        run: mvn -B -ntp clean compile

      - name: Test (mvn clean test)
        working-directory: apps/sanad-platform
        run: mvn -B -ntp clean test

      - name: Package (mvn clean package)
        working-directory: apps/sanad-platform
        run: mvn -B -ntp clean package

      - name: Upload surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: apps/sanad-platform/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: sanad-platform-jar
          path: apps/sanad-platform/target/sanad-platform-0.1.0-SNAPSHOT.jar
          if-no-files-found: error
          retention-days: 7
