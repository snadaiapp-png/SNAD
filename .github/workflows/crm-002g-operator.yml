name: CRM 002G Branch Operator

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >-
      github.event.issue.pull_request &&
      github.event.issue.number == 501 &&
      github.event.comment.body == '/apply-crm-002g' &&
      github.event.comment.user.login == 'snadaiapp-png'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout governed execution branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: crm/002g-execute-final-acceptance-gate
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply CRM-002G fixes
        run: python3 scripts/crm/apply_002g_fixes.py

      - name: Remove bootstrap-only files
        shell: bash
        run: |
          set -euo pipefail
          rm -f docs/crm/evidence/.crm-002g-trigger
          rm -f docs/crm/evidence/CRM-002G-*.md

      - name: Validate generated repository state
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/crm/validate_seed_uuids.py \
            apps/sanad-platform/src/test/resources/sql/crm-acceptance-seed.sql
          ruby -e 'require "yaml"; Dir[".github/workflows/*.{yml,yaml}"].sort.each { |f| YAML.load_file(f); puts "VALID: #{f}" }'
          git diff --check

      - name: Commit and push implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "snad-crm-governance-bot"
          git config user.email "snad-crm-governance-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix(crm): execute and prove final acceptance gate [crm-002g-applied]"
          git push origin HEAD:crm/002g-execute-final-acceptance-gate
