name: Promote Proven Equivalent Vercel Artifact

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-final-39d016.yml'

permissions:
  contents: read

jobs:
  promote:
    name: Prove web tree and promote without rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: prj_WM5fbCPCycdogZQaWFnLKDgb5bA9
      TARGET_SHA: 39d0163189ff3301e8565f7f004839a618f8a021
      CANDIDATE_SHA: c60e3a9342337f68f1adebd05a1a6a1917f66d70
      CANDIDATE_DEPLOYMENT_ID: dpl_HnvhMZF4SxSmNF5PWEXohDYkFF6Q
      PRODUCTION_HOST: snad-app.vercel.app
    steps:
      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN" || { echo "::error::VERCEL_TOKEN is missing"; exit 1; }
          test -n "$VERCEL_TEAM_ID" || { echo "::error::VERCEL_TEAM_ID is missing"; exit 1; }
          echo "::add-mask::$VERCEL_TOKEN"

      - name: Checkout repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prove immutable Vercel source equivalence
        shell: bash
        run: |
          set -euo pipefail
          git cat-file -e "${TARGET_SHA}^{commit}"
          git cat-file -e "${CANDIDATE_SHA}^{commit}"
          git merge-base --is-ancestor "$TARGET_SHA" "$CANDIDATE_SHA" || {
            echo "::error::Candidate deployment commit is not a descendant of the authorized merge SHA"
            exit 1
          }

          TARGET_WEB_TREE="$(git rev-parse "${TARGET_SHA}:apps/web")"
          CANDIDATE_WEB_TREE="$(git rev-parse "${CANDIDATE_SHA}:apps/web")"
          test "$TARGET_WEB_TREE" = "$CANDIDATE_WEB_TREE" || {
            echo "::error::apps/web tree differs from the authorized merge SHA"
            exit 1
          }

          git diff --name-only "$TARGET_SHA" "$CANDIDATE_SHA" > "$RUNNER_TEMP/changed-files.txt"
          test -s "$RUNNER_TEMP/changed-files.txt" || {
            echo "::error::Expected a diagnostic-only descendant commit"
            exit 1
          }
          if grep -Ev '^\.github/workflows/diag-crm-final-39d016\.yml$' "$RUNNER_TEMP/changed-files.txt" | grep -q .; then
            echo "::error::Candidate includes changes outside the temporary diagnostic workflow"
            cat "$RUNNER_TEMP/changed-files.txt"
            exit 1
          fi
          if grep -E '^apps/web(/|$)' "$RUNNER_TEMP/changed-files.txt" | grep -q .; then
            echo "::error::Candidate changes the Vercel project root"
            exit 1
          fi

          jq -n \
            --arg target_sha "$TARGET_SHA" \
            --arg candidate_sha "$CANDIDATE_SHA" \
            --arg target_web_tree "$TARGET_WEB_TREE" \
            --arg candidate_web_tree "$CANDIDATE_WEB_TREE" \
            --rawfile changed_files "$RUNNER_TEMP/changed-files.txt" \
            '{result:"PASS",authorized_merge_sha:$target_sha,candidate_deployment_sha:$candidate_sha,apps_web_tree_target:$target_web_tree,apps_web_tree_candidate:$candidate_web_tree,apps_web_tree_identical:true,changed_files:($changed_files|split("\n")|map(select(length>0))),changes_outside_diagnostic_workflow:false}' \
            | tee "$RUNNER_TEMP/web-tree-equivalence.json"

      - name: Verify candidate deployment identity
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v13/deployments/${CANDIDATE_DEPLOYMENT_ID}?teamId=${VERCEL_TEAM_ID}" \
            > "$RUNNER_TEMP/candidate.json"
          test "$(jq -r '.id // .uid // empty' "$RUNNER_TEMP/candidate.json")" = "$CANDIDATE_DEPLOYMENT_ID"
          test "$(jq -r '.readyState // .state // empty' "$RUNNER_TEMP/candidate.json")" = "READY"
          test "$(jq -r '.meta.githubCommitSha // empty' "$RUNNER_TEMP/candidate.json")" = "$CANDIDATE_SHA"
          jq '{id:(.id // .uid),url,state:(.readyState // .state),target,git_sha:.meta.githubCommitSha,git_ref:.meta.githubCommitRef}' "$RUNNER_TEMP/candidate.json"

      - name: Promote ready deployment without rebuild
        shell: bash
        run: |
          set -euo pipefail
          CODE="$(curl --silent --show-error --max-time 60 \
            -o "$RUNNER_TEMP/promote-response.json" \
            -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H 'Content-Type: application/json' \
            "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/promote/${CANDIDATE_DEPLOYMENT_ID}?teamId=${VERCEL_TEAM_ID}")"
          case "$CODE" in
            200|201|202) ;;
            *)
              echo "::error::Vercel promote returned HTTP ${CODE}"
              cat "$RUNNER_TEMP/promote-response.json"
              exit 1
              ;;
          esac
          echo "Vercel promote accepted with HTTP ${CODE}; no deployment build was created."

      - name: Verify production routing and application health
        shell: bash
        run: |
          set -euo pipefail
          ROUTED=false
          for attempt in $(seq 1 60); do
            curl --fail-with-body --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v13/deployments/${PRODUCTION_HOST}?teamId=${VERCEL_TEAM_ID}" \
              > "$RUNNER_TEMP/production.json"
            STATE="$(jq -r '.readyState // .state // empty' "$RUNNER_TEMP/production.json")"
            TARGET="$(jq -r '.target // empty' "$RUNNER_TEMP/production.json")"
            LIVE_SHA="$(jq -r '.meta.githubCommitSha // empty' "$RUNNER_TEMP/production.json")"
            ORIGINAL="$(jq -r '.meta.originalDeploymentId // empty' "$RUNNER_TEMP/production.json")"
            LIVE_ID="$(jq -r '.id // .uid // empty' "$RUNNER_TEMP/production.json")"
            if [ "$STATE" = "READY" ] && [ "$TARGET" = "production" ] && [ "$LIVE_SHA" = "$CANDIDATE_SHA" ] && { [ "$LIVE_ID" = "$CANDIDATE_DEPLOYMENT_ID" ] || [ "$ORIGINAL" = "$CANDIDATE_DEPLOYMENT_ID" ]; }; then
              ROUTED=true
              break
            fi
            sleep 5
          done
          test "$ROUTED" = "true" || {
            echo "::error::Production traffic did not move to the proven equivalent deployment"
            jq '{id:(.id // .uid),state:(.readyState // .state),target,git_sha:.meta.githubCommitSha,original_deployment_id:.meta.originalDeploymentId}' "$RUNNER_TEMP/production.json"
            exit 1
          }

          ROOT_CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/root.html" -w '%{http_code}' "https://${PRODUCTION_HOST}/")"
          BACKEND_CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/backend-status.json" -w '%{http_code}' "https://${PRODUCTION_HOST}/api/system/backend-status")"
          AUTH_CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/auth-me.json" -w '%{http_code}' "https://${PRODUCTION_HOST}/api/platform/api/v1/auth/me")"
          test "$ROOT_CODE" = "200"
          test "$BACKEND_CODE" = "200"
          jq -e '.configured == true and .reachable == true and .statusCode == 200' "$RUNNER_TEMP/backend-status.json" >/dev/null
          test "$AUTH_CODE" = "401"

          jq -n \
            --slurpfile production "$RUNNER_TEMP/production.json" \
            --slurpfile equivalence "$RUNNER_TEMP/web-tree-equivalence.json" \
            --arg root_http "$ROOT_CODE" \
            --arg backend_http "$BACKEND_CODE" \
            --arg auth_http "$AUTH_CODE" \
            '{result:"PASS",promotion_without_rebuild:true,production:{id:($production[0].id // $production[0].uid),state:($production[0].readyState // $production[0].state),target:$production[0].target,metadata_sha:$production[0].meta.githubCommitSha,original_deployment_id:$production[0].meta.originalDeploymentId},provenance:$equivalence[0],http:{root:($root_http|tonumber),backend_status:($backend_http|tonumber),unauthenticated_auth_me:($auth_http|tonumber)},formal_exact_metadata_sha_gate:false}' \
            | tee "$RUNNER_TEMP/promotion-evidence.json"

      - name: Upload promotion evidence
        uses: actions/upload-artifact@v4
        with:
          name: vercel-equivalent-artifact-promotion-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/web-tree-equivalence.json
            ${{ runner.temp }}/candidate.json
            ${{ runner.temp }}/production.json
            ${{ runner.temp }}/backend-status.json
            ${{ runner.temp }}/promotion-evidence.json
          if-no-files-found: error
          retention-days: 90
