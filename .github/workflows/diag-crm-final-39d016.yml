name: Diagnose Terminal Vercel Failure

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-final-39d016.yml'

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    name: Read terminal Vercel failure lines
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '88642336844'
    steps:
      - name: Print final 28 sanitized lines
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --location --max-time 60 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > "$RUNNER_TEMP/vercel.log"
          sed -E 's/\x1B\[[0-9;]*[mK]//g' "$RUNNER_TEMP/vercel.log" | tail -n 28
