name: Diagnose Exact G1 Failure

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-final-39d016.yml'

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    name: Read exact-SHA G1 failed step
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 39d0163189ff3301e8565f7f004839a618f8a021
    steps:
      - name: Locate exact G1 run and job
        shell: bash
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/crm-g1-production-closure.yml/runs?event=workflow_dispatch&branch=main&per_page=30" > "$RUNNER_TEMP/g1-runs.json"
          jq --arg sha "$TARGET_SHA" '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.created_at) | reverse | first' "$RUNNER_TEMP/g1-runs.json" > "$RUNNER_TEMP/g1-run.json"
          RUN_ID="$(jq -r '.id // empty' "$RUNNER_TEMP/g1-run.json")"
          test -n "$RUN_ID" || { echo '::error::Exact-SHA G1 run not found'; exit 1; }
          jq '{id,name,status,conclusion,head_sha,created_at,updated_at,html_url}' "$RUNNER_TEMP/g1-run.json"
          gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100" > "$RUNNER_TEMP/g1-jobs.json"
          jq '{jobs:[.jobs[] | {id,name,status,conclusion,failed_steps:[.steps[] | select(.conclusion == "failure") | {number,name,status,conclusion}]}]}' "$RUNNER_TEMP/g1-jobs.json"
