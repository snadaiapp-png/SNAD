name: Final CRM Closure 39d016

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-final-39d016.yml'

permissions:
  contents: read
  actions: write

jobs:
  deploy_vercel:
    name: Deploy exact SHA to Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: prj_WM5fbCPCycdogZQaWFnLKDgb5bA9
      TARGET_SHA: 39d0163189ff3301e8565f7f004839a618f8a021
    steps:
      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN" || { echo "::error::VERCEL_TOKEN is missing"; exit 1; }
          test -n "$VERCEL_TEAM_ID" || { echo "::error::VERCEL_TEAM_ID is missing"; exit 1; }
          echo "::add-mask::$VERCEL_TOKEN"

      - name: Checkout exact final merge SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Link immutable Vercel project
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          mkdir -p apps/web/.vercel
          jq -n --arg orgId "$VERCEL_TEAM_ID" --arg projectId "$VERCEL_PROJECT_ID" \
            '{orgId:$orgId,projectId:$projectId}' > apps/web/.vercel/project.json

      - name: Deploy exact source to Production
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="$(npx --yes vercel@latest deploy \
            --cwd apps/web \
            --prod \
            --yes \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_TEAM_ID" \
            --meta "githubCommitSha=$TARGET_SHA" \
            --meta 'githubCommitRef=main' \
            --meta 'githubOrg=snadaiapp-png' \
            --meta 'githubRepo=SNAD')"
          test -n "$DEPLOYMENT_URL" || { echo "::error::Vercel CLI returned no deployment URL"; exit 1; }
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment created: $DEPLOYMENT_URL"

      - name: Verify Production alias and exact metadata
        shell: bash
        run: |
          set -euo pipefail
          HOST='snad-app.vercel.app'
          READY=false
          for attempt in $(seq 1 120); do
            curl --fail-with-body --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v13/deployments/${HOST}?teamId=${VERCEL_TEAM_ID}" \
              > "$RUNNER_TEMP/vercel-production.json"
            LIVE_SHA="$(jq -r '.meta.githubCommitSha // empty' "$RUNNER_TEMP/vercel-production.json")"
            STATE="$(jq -r '.readyState // .state // empty' "$RUNNER_TEMP/vercel-production.json")"
            TARGET="$(jq -r '.target // empty' "$RUNNER_TEMP/vercel-production.json")"
            if [ "$LIVE_SHA" = "$TARGET_SHA" ] && [ "$STATE" = "READY" ] && [ "$TARGET" = "production" ]; then
              READY=true
              break
            fi
            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "::error::Vercel deployment reached ${STATE}"
              exit 1
            fi
            sleep 10
          done
          test "$READY" = "true" || { echo "::error::Vercel Production did not reach exact SHA"; exit 1; }
          jq '{id:(.id // .uid),url,state:(.readyState // .state),target,git_sha:.meta.githubCommitSha,git_ref:.meta.githubCommitRef}' "$RUNNER_TEMP/vercel-production.json"

  observe:
    name: Dispatch once and read exact-SHA closure
    needs: deploy_vercel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 39d0163189ff3301e8565f7f004839a618f8a021
      TARGET_WORKFLOW: crm-idempotency-production-reconciliation.yml
    steps:
      - name: Validate exact current main
        shell: bash
        run: |
          set -euo pipefail
          MAIN_SHA="$(gh api "/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          test "$MAIN_SHA" = "$TARGET_SHA" || { echo "::error::main moved from target SHA"; exit 1; }
          gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}" > "$RUNNER_TEMP/workflow.json"
          test "$(jq -r '.state' "$RUNNER_TEMP/workflow.json")" = "active"

      - name: Dispatch reconciliation only when absent
        shell: bash
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}/runs?head_sha=${TARGET_SHA}&per_page=20" > "$RUNNER_TEMP/reconciliation-runs.json"
          EXISTING="$(jq '[.workflow_runs[] | select(.head_sha == env.TARGET_SHA)] | length' "$RUNNER_TEMP/reconciliation-runs.json")"
          if [ "$EXISTING" = "0" ]; then
            jq -n --arg ref main '{ref:$ref}' > "$RUNNER_TEMP/dispatch.json"
            CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/dispatch-response.txt" -w '%{http_code}' \
              -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' -H 'Content-Type: application/json' \
              --data @"$RUNNER_TEMP/dispatch.json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}/dispatches")"
            test "$CODE" = "204" || { echo "::error::Reconciliation dispatch returned ${CODE}"; exit 1; }
          fi

      - name: Read exact-SHA production workflows
        shell: bash
        run: |
          set -euo pipefail
          sleep 4
          gh api "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&per_page=100" > "$RUNNER_TEMP/all-runs.json"
          gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}/runs?head_sha=${TARGET_SHA}&per_page=20" > "$RUNNER_TEMP/reconciliation-runs.json"
          jq -n --slurpfile all "$RUNNER_TEMP/all-runs.json" --slurpfile reconciliation "$RUNNER_TEMP/reconciliation-runs.json" \
            '{target_sha:env.TARGET_SHA,runs:(([$all[0].workflow_runs[] | select(.name | test("Publish Render Backend Image|CRM G1 Production Closure|CRM-007 Final Production Closure"; "i"))] + [$reconciliation[0].workflow_runs[] | select(.head_sha == env.TARGET_SHA)]) | unique_by(.id) | sort_by(.created_at) | map({id,name,path,event,status,conclusion,head_sha,created_at,updated_at,html_url}))}' \
            | tee "$RUNNER_TEMP/closure-runs.json"

      - name: Read jobs and steps
        shell: bash
        run: |
          set -euo pipefail
          printf '{"runs":[' > "$RUNNER_TEMP/jobs.json"
          FIRST=true
          while IFS= read -r run_id; do
            [ -n "$run_id" ] || continue
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" > "$RUNNER_TEMP/jobs-${run_id}.json"
            if [ "$FIRST" = false ]; then printf ',' >> "$RUNNER_TEMP/jobs.json"; fi
            FIRST=false
            jq -c --arg run_id "$run_id" '{run_id:($run_id|tonumber),jobs:[.jobs[] | {id,name,status,conclusion,steps:[.steps[] | {number,name,status,conclusion}]}]}' "$RUNNER_TEMP/jobs-${run_id}.json" >> "$RUNNER_TEMP/jobs.json"
          done < <(jq -r '.runs[].id' "$RUNNER_TEMP/closure-runs.json")
          printf ']}' >> "$RUNNER_TEMP/jobs.json"
          cat "$RUNNER_TEMP/jobs.json"

      - name: Upload sanitized observation
        uses: actions/upload-artifact@v4
        with:
          name: crm-final-39d016-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/closure-runs.json
            ${{ runner.temp }}/jobs.json
          if-no-files-found: error
          retention-days: 1
