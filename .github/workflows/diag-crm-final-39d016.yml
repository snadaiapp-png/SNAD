name: Diagnose Vercel CLI Failure

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-final-39d016.yml'

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    name: Read failed Vercel CLI log tail
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '88640172175'
    steps:
      - name: Download failed job log
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --location --max-time 60 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > "$RUNNER_TEMP/job.log"
          test -s "$RUNNER_TEMP/job.log"

      - name: Print sanitized failure context
        shell: bash
        run: |
          set -euo pipefail
          sed -E 's/\x1B\[[0-9;]*[mK]//g' "$RUNNER_TEMP/job.log" > "$RUNNER_TEMP/job-clean.log"
          echo '--- Vercel CLI relevant lines ---'
          grep -Ei 'vercel|error|failed|invalid|scope|project|build|npm|command|exit code' "$RUNNER_TEMP/job-clean.log" | tail -n 160 || true
          echo '--- Final 120 lines ---'
          tail -n 120 "$RUNNER_TEMP/job-clean.log"
