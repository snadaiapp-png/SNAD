name: CRM OpenAPI One-Time Sync

on:
  push:
    branches:
      - feature/crm-008b-foundation-20260722
    paths:
      - '.github/workflows/crm-openapi-sync-once.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JWT_SECRET: ci-only-non-production-validation-key-1234567890
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/crm-008b-foundation-20260722
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Start backend
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            >/tmp/crm-openapi-sync-backend.log 2>&1 &
          echo $! >/tmp/crm-openapi-sync-backend.pid
      - name: Fetch runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-openapi-sync-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-openapi-sync-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' \
              http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm-openapi-sync-backend.log
          exit 1
      - name: Generate canonical CRM contract
        run: |
          set -euo pipefail
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output docs/crm/contracts/openapi/crm-openapi.json \
            --prefix /api/v2/crm \
            --expected-paths 100 \
            --expected-operations 133
      - name: Generate TypeScript contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts
      - name: Verify generated contract
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          spec=json.loads(Path('docs/crm/contracts/openapi/crm-openapi.json').read_text(encoding='utf-8'))
          methods={'get','post','put','patch','delete','head','options','trace'}
          operations=sum(1 for item in spec['paths'].values() for method in item if method in methods)
          assert len(spec['paths']) == 100
          assert operations == 133
          for path in ['/teams','/queues','/territories','/assignment-rules','/transfers']:
              responses=spec['paths'][path]['post']['responses']
              assert '201' in responses and '200' not in responses, path
          print('Canonical ownership creation responses verified')
          PY
      - name: Commit generated artifacts
        run: |
          set -euo pipefail
          git config user.name 'snad-crm-contract-bot'
          git config user.email 'snad-crm-contract-bot@users.noreply.github.com'
          git add docs/crm/contracts/openapi/crm-openapi.json \
            apps/web/lib/api/generated/crm-api-types.ts
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m 'docs(crm-008b): resynchronize corrected runtime OpenAPI'
          git push origin HEAD:feature/crm-008b-foundation-20260722
      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-openapi-sync-backend.pid ]; then
            kill "$(cat /tmp/crm-openapi-sync-backend.pid)" 2>/dev/null || true
          fi
