name: CRM-007 Final Verification

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - crm/007-addresses-communication-methods
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm007-final-${{ github.ref }}
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890
  EXPECTED_CRM_PATHS: '72'
  EXPECTED_CRM_OPERATIONS: '95'

jobs:
  exact-head:
    name: Exact-head domain, contract, database and web acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout exact SHA
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify exact checkout and current main ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "CRM-007 branch is behind current main."
            git log --oneline --left-right HEAD...origin/main
            exit 1
          fi
          echo "verified_sha=${GITHUB_SHA}" | tee /tmp/crm007-exact-head.txt
          echo "main_sha=$(git rev-parse origin/main)" | tee -a /tmp/crm007-exact-head.txt
      - name: Validate workflow YAML and temporary-workflow cleanup
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import yaml
          errors=[]
          for path in sorted(Path('.github/workflows').glob('*.yml')):
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  errors.append(f'{path}: {exc}')
          if errors:
              raise SystemExit('\n'.join(errors))
          temporary={
            'crm007-contract-bootstrap.yml',
            'crm007-compile-hotfix.yml',
            'crm007-operations-contract-sync.yml',
            'crm007-policy-contract-sync.yml',
            'crm007-focused-policy-sync.yml',
            'crm007-governance-hotfix.yml',
            'crm007-final-contract-cleanup.yml',
          }
          present=temporary.intersection(p.name for p in Path('.github/workflows').glob('*.yml'))
          if present:
              raise SystemExit('Temporary CRM-007 workflows remain: '+', '.join(sorted(present)))
          print('Workflow YAML valid and temporary workflows absent')
          PY
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install contract dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml sqlglot
      - name: Compile backend
        working-directory: apps/sanad-platform
        run: mvn --batch-mode --no-transfer-progress -DskipTests compile
      - name: Run focused CRM-007 tests
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          docker version
          mvn --batch-mode --no-transfer-progress \
            -Dtest='AddressCommunicationUseCasesTest,AddressCommunicationHttpIntegrationTest,AddressCommunicationOperationsHttpIntegrationTest,CommunicationPolicyHttpIntegrationTest,CrmAddressCommunicationMigrationUpgradeTest,CrmOpenApiContractTest' test
      - name: Inspect actual testcase elements
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          expected={
            'AddressCommunicationUseCasesTest',
            'AddressCommunicationHttpIntegrationTest',
            'AddressCommunicationOperationsHttpIntegrationTest',
            'CommunicationPolicyHttpIntegrationTest',
            'CrmAddressCommunicationMigrationUpgradeTest',
            'CrmOpenApiContractTest',
          }
          found=set(); total=failures=errors=skipped=0
          for path in Path('target/surefire-reports').glob('TEST-*.xml'):
              root=ET.parse(path).getroot()
              name=root.attrib.get('name','').split('.')[-1]
              if name not in expected:
                  continue
              found.add(name)
              total += len(root.findall('testcase'))
              failures += int(root.attrib.get('failures','0'))
              errors += int(root.attrib.get('errors','0'))
              skipped += int(root.attrib.get('skipped','0'))
          summary=f'found={sorted(found)} cases={total} failures={failures} errors={errors} skipped={skipped}'
          print(summary)
          Path('/tmp/crm007-test-summary.txt').write_text(summary+'\n',encoding='utf-8')
          if found != expected or total < 20 or failures or errors or skipped:
              raise SystemExit(1)
          PY
      - name: CRM governance checks
        run: |
          set -euo pipefail
          bash scripts/crm/governance-drift-check.sh
          bash scripts/crm/api-contract-governance-check.sh
      - name: Start backend for runtime OpenAPI
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            >/tmp/crm007-final-backend.log 2>&1 &
          echo $! >/tmp/crm007-final-backend.pid
      - name: Generate exact runtime contract
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm007-final-backend.pid)" 2>/dev/null; then
              cat /tmp/crm007-final-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then break; fi
            sleep 2
          done
          test -s /tmp/platform-openapi.json
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output /tmp/crm-openapi.runtime.json \
            --prefix /api/v2/crm \
            --expected-paths "${EXPECTED_CRM_PATHS}" \
            --expected-operations "${EXPECTED_CRM_OPERATIONS}"
          diff -u docs/crm/contracts/openapi/crm-openapi.json /tmp/crm-openapi.runtime.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Generated TypeScript drift
        working-directory: apps/web
        run: |
          set -euo pipefail
          cp lib/api/generated/crm-api-types.ts /tmp/crm-api-types.before.ts
          npm run crm:generate-api-types
          diff -u /tmp/crm-api-types.before.ts lib/api/generated/crm-api-types.ts
      - name: Web lint, typecheck and production build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_PLATFORM_API_URL: http://localhost:8081
        run: |
          set -euo pipefail
          npm run lint
          npx tsc --noEmit
          npm run build
      - name: Stop backend
        if: always()
        run: if [ -f /tmp/crm007-final-backend.pid ]; then kill "$(cat /tmp/crm007-final-backend.pid)" 2>/dev/null || true; fi
      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-final-evidence-${{ github.sha }}
          path: |
            /tmp/crm007-exact-head.txt
            /tmp/crm007-test-summary.txt
            /tmp/crm-openapi.runtime.json
            /tmp/crm007-final-backend.log
            apps/sanad-platform/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 30
      - name: Publish summary
        if: always()
        run: |
          echo '## CRM-007 Final Verification' >> "$GITHUB_STEP_SUMMARY"
          echo "- Exact SHA: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Contract: ${EXPECTED_CRM_PATHS} paths / ${EXPECTED_CRM_OPERATIONS} operations" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/crm007-test-summary.txt ]; then
            echo "- Tests: $(cat /tmp/crm007-test-summary.txt)" >> "$GITHUB_STEP_SUMMARY"
          fi
