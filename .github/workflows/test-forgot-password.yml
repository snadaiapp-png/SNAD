name: Test Forgot Password Detailed

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email to test with'
        required: true
        type: string
        default: 'snad.ai.app@gmail.com'

permissions:
  contents: read

jobs:
  test:
    name: Test forgot-password with details
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Check Render env vars (notification-related)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Notification env vars on Render ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq '[.[]? | (.envVar // .) | select(.key | test("NOTIFICATION|RESEND|APPLICATION"; "i")) | {key, valueLength: ((.value // "") | length), valuePreview: ((.value // "") | .[0:20] + "..." // empty)}]'

      - name: Test forgot-password endpoint (verbose)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing forgot-password with verbose output ==="
          EMAIL="${{ inputs.email }}"
          echo "Email: $EMAIL"

          # Test with verbose output
          curl --max-time 30 -v \
            -X POST -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\"}" \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/forgot-password 2>&1 | tail -30

      - name: Check backend health endpoint
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Backend health ==="
          curl --silent --max-time 15 https://sanad-backend-mcrj.onrender.com/actuator/health | jq '.'

      - name: Check backend info
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Backend info (if exposed) ==="
          curl --silent --max-time 15 -o /dev/null -w "Info: %{http_code}\n" https://sanad-backend-mcrj.onrender.com/actuator/info
          curl --silent --max-time 15 -o /dev/null -w "Env: %{http_code}\n" https://sanad-backend-mcrj.onrender.com/actuator/env
          curl --silent --max-time 15 -o /dev/null -w "Health groups: %{http_code}\n" https://sanad-backend-mcrj.onrender.com/actuator/health/liveness
          curl --silent --max-time 15 -o /dev/null -w "Health readiness: %{http_code}\n" https://sanad-backend-mcrj.onrender.com/actuator/health/readiness

      - name: Test login endpoint (to isolate auth issues)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing login endpoint (should NOT 500) ==="
          STATUS=$(curl --silent --show-error --max-time 15 -o /tmp/login-resp.json -w '%{http_code}' \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"wrong"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/login)
          echo "Login status: $STATUS"
          echo "Response: $(cat /tmp/login-resp.json)"

      - name: Test forgot-password with invalid email format
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing with invalid email format (should 400, not 500) ==="
          STATUS=$(curl --silent --show-error --max-time 15 -o /tmp/invalid-resp.json -w '%{http_code}' \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"not-an-email"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/forgot-password)
          echo "Invalid email status: $STATUS"
          echo "Response: $(cat /tmp/invalid-resp.json)"
