name: Security Policy Report

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/security-policy-report.yml']

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml -q
      - name: Generate report
        run: |
          python3 scripts/ci/check_workflow_security.py > workflow-security-report.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-security-report
          path: workflow-security-report.txt
          retention-days: 7
