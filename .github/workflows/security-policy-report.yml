name: Security Policy Report

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/security-policy-report.yml']

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml -q
      - name: Generate report
        run: |
          set +e
          python3 scripts/ci/check_workflow_security.py > workflow-security-report.txt 2>&1
          EXIT_CODE=$?
          set -e
          # This workflow generates a REPORT — it does not gate merges.
          # The actual fail-closed check runs in web-ci.yml and post-merge-verification.yml.
          cat workflow-security-report.txt
          echo "Security check exit code: $EXIT_CODE"
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-security-report
          path: workflow-security-report.txt
          retention-days: 7
