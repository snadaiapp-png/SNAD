name: CRM Contract Test Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm-contract-diagnostics.yml'
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/**'
      - 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/contract/**'
      - 'docs/crm/contracts/**'

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run CRM contract tests
        working-directory: apps/sanad-platform
        run: |
          set -o pipefail
          mvn --batch-mode --no-transfer-progress -Dtest='Crm*ContractTest' test \
            2>&1 | tee /tmp/crm-contract-tests.log
      - name: Upload CRM contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-contract-diagnostics-${{ github.sha }}
          path: |
            apps/sanad-platform/target/surefire-reports/
            /tmp/crm-contract-tests.log
          if-no-files-found: warn
          retention-days: 3
