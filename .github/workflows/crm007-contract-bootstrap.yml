name: CRM-007 Contract Bootstrap

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/**'
      - 'apps/sanad-platform/src/main/resources/db/migration/**'
      - 'docs/crm/contracts/**'
      - 'apps/web/lib/api/generated/**'
      - '.github/workflows/crm007-contract-bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm007-contract-bootstrap-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  generate:
    name: Generate CRM-007 runtime contract
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Start backend
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            >/tmp/crm007-openapi-backend.log 2>&1 &
          echo $! >/tmp/crm007-openapi-backend.pid
      - name: Fetch and filter runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm007-openapi-backend.pid)" 2>/dev/null; then
              cat /tmp/crm007-openapi-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then break; fi
            sleep 2
          done
          test -s /tmp/platform-openapi.json || { cat /tmp/crm007-openapi-backend.log; exit 1; }
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output /tmp/crm-openapi.runtime.json \
            --prefix /api/v2/crm
      - name: Upload runtime contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-openapi-runtime-${{ github.sha }}
          path: /tmp/crm-openapi.runtime.json
          if-no-files-found: warn
          retention-days: 7
      - name: Synchronize committed contract and generated client
        run: |
          set -euo pipefail
          cp /tmp/crm-openapi.runtime.json docs/crm/contracts/openapi/crm-openapi.json
          cd apps/web
          npm ci
          npm run crm:generate-api-types
          cd ../..
          if git diff --quiet -- docs/crm/contracts/openapi/crm-openapi.json apps/web/lib/api/generated/crm-api-types.ts; then
            echo 'Generated CRM contract artifacts are already synchronized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/crm/contracts/openapi/crm-openapi.json apps/web/lib/api/generated/crm-api-types.ts
          git commit -m 'chore(crm): synchronize CRM-007 generated API contract'
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-contract-bootstrap-diagnostics-${{ github.sha }}
          path: |
            /tmp/crm007-openapi-backend.log
            /tmp/platform-openapi.json
          if-no-files-found: warn
          retention-days: 7
      - name: Stop backend
        if: always()
        run: if [ -f /tmp/crm007-openapi-backend.pid ]; then kill "$(cat /tmp/crm007-openapi-backend.pid)" 2>/dev/null || true; fi
