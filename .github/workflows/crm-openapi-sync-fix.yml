name: CRM OpenAPI Sync Fix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm-openapi-sync-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Correct sync validation command
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/crm-openapi-sync.yml')
          text = path.read_text(encoding='utf-8')
          text = text.replace('          npm run typecheck\n', '')
          path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/crm-openapi-sync-fix.yml
          git config user.name 'snad-ci-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/crm-openapi-sync.yml
          git commit -m 'ci(crm): correct OpenAPI sync validation command'
          git push origin HEAD:${{ github.head_ref }}
