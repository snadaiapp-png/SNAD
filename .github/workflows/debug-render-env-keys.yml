name: Debug Render Env Keys

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Find Database URL
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: List Render databases
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          
          echo "=== List ALL Render resources ==="
          curl -sS --max-time 30 "https://api.render.com/v1/services" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              if isinstance(d, list):
                  print(f'Total services: {len(d)}')
                  for s in d:
                      sid = s.get('id', '?')
                      name = s.get('name', '?')
                      stype = s.get('type', '?')
                      status = s.get('status', '?')
                      url = s.get('serviceUrl', '?')
                      print(f'  id={sid} name={name} type={stype} status={status} url={url}')
                      
                      # If it's a database, get connection details
                      if stype == 'psql' or 'postgres' in stype.lower() or 'database' in name.lower():
                          print(f'    >>> DATABASE FOUND <<<')
                          # Try to get connection strings
                          for field in ['connectionStrings', 'database', 'internalDatabaseUrl', 'externalDatabaseUrl', 'dsn']:
                              val = s.get(field, '')
                              if val:
                                  if isinstance(val, dict):
                                      print(f'    {field}: {json.dumps(val)[:80]}...')
                                  else:
                                      print(f'    {field}: {str(val)[:80]}...')
              else:
                  print(f'Response: {json.dumps(d, indent=2)[:500]}')
          except Exception as e:
              print(f'Error: {e}')
          "
          
          echo ""
          echo "=== Get service env vars with full details ==="
          curl -sS --max-time 30 "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              if isinstance(d, list):
                  print(f'Total env vars: {len(d)}')
                  for item in d:
                      ev = item.get('envVar', item) if isinstance(item, dict) else {}
                      key = ev.get('key', '?')
                      val = ev.get('value', '')
                      # Print all keys and check for DB-related ones
                      if any(x in key.lower() for x in ['data', 'db', 'jdbc', 'postgres', 'sql', ' datasource']):
                          print(f'  *** {key}: length={len(str(val))} starts_with={str(val)[:20]}...')
                      else:
                          print(f'  {key}: length={len(str(val))}')
              elif isinstance(d, dict):
                  for k, v in d.items():
                      print(f'  {k}: length={len(str(v))}')
          except Exception as e:
              print(f'Error: {e}')
          "
