name: CRM-007 Stabilize

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm007-stabilize.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm007-stabilize
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  stabilize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Merge current main and patch final CRM-007 surface
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          git merge --no-edit origin/main
          python3 - <<'PY'
          from pathlib import Path

          service = Path('apps/sanad-platform/src/main/java/com/sanad/platform/crm/party/application/AddressCommunicationOperationsService.java')
          text = service.read_text(encoding='utf-8')
          text = text.replace('crm.code() : "ROW_PROCESSING_FAILED"', 'crm.code().name() : "ROW_PROCESSING_FAILED"')
          service.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/crm-api-contract-validation.yml')
          text = workflow.read_text(encoding='utf-8')
          text = text.replace("EXPECTED_CRM_PATHS: '65'", "EXPECTED_CRM_PATHS: '72'")
          text = text.replace("EXPECTED_CRM_OPERATIONS: '87'", "EXPECTED_CRM_OPERATIONS: '95'")
          marker = "              ('/contacts/{contactId}/communication-methods','post','Idempotency-Key'),\n"
          additions = marker + "              ('/addresses/import','post','Idempotency-Key'),\n              ('/communication-methods/import','post','Idempotency-Key'),\n"
          if "('/addresses/import','post','Idempotency-Key')" not in text:
              text = text.replace(marker, additions)
          workflow.write_text(text, encoding='utf-8')

          contract_test = Path('apps/sanad-platform/src/test/java/com/sanad/platform/crm/contract/CrmOpenApiContractTest.java')
          text = contract_test.read_text(encoding='utf-8')
          text = text.replace('EXPECTED_PATHS = 65', 'EXPECTED_PATHS = 72')
          text = text.replace('EXPECTED_OPERATIONS = 87', 'EXPECTED_OPERATIONS = 95')
          create_marker = '                "/accounts/{accountId}/communication-methods", "/contacts/{contactId}/communication-methods"}) {'
          create_value = '                "/accounts/{accountId}/communication-methods", "/contacts/{contactId}/communication-methods",\n                "/addresses/import", "/communication-methods/import"}) {'
          text = text.replace(create_marker, create_value)
          idem_marker = '                "/accounts/{accountId}/communication-methods", "/contacts/{contactId}/communication-methods"}) {'
          text = text.replace(idem_marker, create_value)
          contract_test.write_text(text, encoding='utf-8')

          config = Path('apps/sanad-platform/src/main/java/com/sanad/platform/crm/web/CrmOpenApiConfiguration.java')
          text = config.read_text(encoding='utf-8')
          marker = '            CRM_PREFIX + "/contacts/{contactId}/communication-methods");'
          replacement = '            CRM_PREFIX + "/contacts/{contactId}/communication-methods",\n            CRM_PREFIX + "/addresses/import",\n            CRM_PREFIX + "/communication-methods/import");'
          text = text.replace(marker, replacement)
          config.write_text(text, encoding='utf-8')
          PY
      - name: Compile backend before contract generation
        working-directory: apps/sanad-platform
        run: mvn --batch-mode --no-transfer-progress -DskipTests compile
      - name: Generate runtime CRM contract
        run: |
          set -euo pipefail
          nohup mvn -q -f apps/sanad-platform/pom.xml -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            >/tmp/crm007-stabilize-backend.log 2>&1 &
          echo $! >/tmp/crm007-stabilize-backend.pid
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm007-stabilize-backend.pid)" 2>/dev/null; then
              cat /tmp/crm007-stabilize-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then break; fi
            sleep 2
          done
          test -s /tmp/platform-openapi.json
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output docs/crm/contracts/openapi/crm-openapi.json \
            --prefix /api/v2/crm \
            --expected-paths 72 \
            --expected-operations 95
      - name: Generate TypeScript contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
      - name: Remove temporary CRM-007 workflows
        run: |
          set -euo pipefail
          git rm -f --ignore-unmatch \
            .github/workflows/crm007-contract-bootstrap.yml \
            .github/workflows/crm007-final-contract-cleanup.yml \
            .github/workflows/crm007-final-sync.yml \
            .github/workflows/crm007-final-test-sync.yml \
            .github/workflows/crm007-final-workflow-hotfix.yml \
            .github/workflows/crm007-focused-policy-sync.yml \
            .github/workflows/crm007-governance-hotfix.yml \
            .github/workflows/crm007-lifecycle-history-hotfix.yml \
            .github/workflows/crm007-operations-contract-sync.yml \
            .github/workflows/crm007-workflow-sweeper.yml \
            .github/workflows/crm007-stabilize.yml
      - name: Commit and push stabilized head
        run: |
          set -euo pipefail
          if [ -f /tmp/crm007-stabilize-backend.pid ]; then kill "$(cat /tmp/crm007-stabilize-backend.pid)" 2>/dev/null || true; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(crm): stabilize CRM-007 exact-head candidate'
          git push origin HEAD:${{ github.head_ref }}
