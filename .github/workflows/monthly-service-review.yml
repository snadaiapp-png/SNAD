name: Monthly Service Review

on:
  schedule:
    - cron: '15 5 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  open-review:
    name: Open monthly SLA/SLO and incident review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Open review issue when absent
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const previous = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth() - 1, 1));
            const period = `${previous.getUTCFullYear()}-${String(previous.getUTCMonth() + 1).padStart(2, '0')}`;
            const title = `[Service Review] ${period}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            if (issues.some(issue => issue.title === title)) {
              core.info(`${title} already exists`);
              return;
            }
            const body = [
              `# SANAD Monthly Service Review — ${period}`,
              '',
              'Complete by the fifth business day using:',
              '`docs/operations/reliability/templates/MONTHLY-SERVICE-REPORT.md`',
              '',
              '- [ ] Record evidence sources and exact query/run identifiers.',
              '- [ ] Report all cataloged services and missing telemetry.',
              '- [ ] Calculate SLO result and error-budget consumption.',
              '- [ ] List SEV0–SEV3 incidents, MTTA, MTTR and open actions.',
              '- [ ] Record approved exclusions and approvers.',
              '- [ ] Record deferred risks that affected service.',
              '- [ ] Apply release restrictions for exhausted budgets.',
              '- [ ] Obtain Project Owner approval.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              assignees: ['snadaiapp-png']
            });
