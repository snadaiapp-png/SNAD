name: Post-Merge Main Verification

# ============================================================
# SANAD Platform — Post-Merge Verification on main branch
# ------------------------------------------------------------
# Per PM Directive §1.2 and §11-§14: FAIL-CLOSED workflow.
# - No || true, no set +e, no allow-failure.
# - Manifest generated on success AND failure (if: always()).
# - No hardcoded PASS values — reads actual step outcomes.
# - Smoke tests are operational (curl, not file checks).
# ============================================================

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: 'Exact SHA to verify (defaults to main HEAD)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: post-merge-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-main:
    name: Post-Merge Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERIFICATION_SHA: ${{ github.sha }}
    outputs:
      result: ${{ steps.manifest.outputs.result }}
      failed_gate: ${{ steps.manifest.outputs.failed_gate }}
    steps:
      - name: Record verification metadata
        id: metadata
        shell: bash
        run: |
          echo "start_timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "=== Post-Merge Verification Metadata ==="
          echo "Exact Main SHA: ${{ github.sha }}"
          echo "Trigger Type: ${{ github.event_name }}"
          echo "Workflow Run ID: ${{ github.run_id }}"
          echo "Start Timestamp UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Actor: ${{ github.actor }}"
          echo "=========================================="

      - name: Checkout exact main SHA
        id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Node.js 24
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Java 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Maven
        id: setup-maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      # --- Clean Dependency Installation ---
      - name: Clean dependency installation (frontend)
        id: frontend-deps
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci

      - name: Clean dependency installation (backend)
        id: backend-deps
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress dependency:go-offline

      # --- Frontend Checks ---
      - name: Frontend Lint
        id: frontend-lint
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm run lint

      - name: Frontend Type Check
        id: frontend-typecheck
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npx tsc --noEmit

      - name: Frontend Unit Tests
        id: frontend-tests
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm test -- --reporter=verbose 2>&1 | tee "$RUNNER_TEMP/postmerge-vitest.log"

      - name: Frontend Production Build
        id: frontend-build
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm run build

      # --- Brand Governance (all fail-closed) ---
      - name: SDS Compliance Check
        id: sds-compliance
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-design-system-compliance.py

      - name: Logo Governance Check
        id: logo-governance
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-logo-governance.py

      - name: Brand Name Governance Check
        id: brand-name
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-brand-name-governance.py

      - name: Performance Budget Check (Fail-Closed)
        id: performance-budget
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-performance-budget.py

      # --- Backend Checks ---
      - name: Backend Compile
        id: backend-compile
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress compile

      - name: Backend Unit Tests
        id: backend-tests
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress test

      # --- Security Baseline (fail-closed) ---
      - name: Workflow Security Validator
        id: workflow-security
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -f scripts/ci/check_workflow_security.py ]; then
            echo "::error::Workflow security script not found: scripts/ci/check_workflow_security.py"
            exit 1
          fi
          python3 scripts/ci/check_workflow_security.py

      - name: Secret Scan (Current Tree)
        id: secret-scan
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          # Verify no secrets in the current tree using gitleaks if available
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --no-git --verbose --config .gitleaks.toml
          else
            echo "gitleaks not installed — running Python-based secret pattern check"
            python3 -c "
          import re, sys, os
          from pathlib import Path
          patterns = [
              (r'AKIA[0-9A-Z]{16}', 'AWS Access Key'),
              (r'ghp_[a-zA-Z0-9]{36}', 'GitHub PAT'),
              (r'sk-[a-zA-Z0-9]{20}', 'OpenAI API Key'),
              (r'-----BEGIN (RSA |EC )?PRIVATE KEY-----', 'Private Key'),
          ]
          violations = []
          for f in Path('.').rglob('*'):
              if f.is_file() and '.git/' not in str(f) and 'node_modules' not in str(f) and '.next' not in str(f):
                  try:
                      content = f.read_text(encoding='utf-8', errors='ignore')
                      for pat, name in patterns:
                          if re.search(pat, content):
                              violations.append(f'{f}: {name}')
                  except: pass
          if violations:
              for v in violations: print(f'  SECRET FOUND: {v}')
              sys.exit(1)
          print('Secret scan: PASS — 0 secrets found')
          "
          fi

      # --- Operational Smoke Tests ---
      - name: Smoke Test — Backend Health (Operational)
        id: smoke-backend
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          echo "Starting backend for smoke test..."
          # Start backend in background
          mvn --batch-mode --no-transfer-progress spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081" &
          BACKEND_PID=$!

          # Wait for backend to be ready (max 60s)
          for i in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8081/actuator/health &>/dev/null; then
              echo "Backend is ready after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "::error::Backend did not start within 60s"
              kill $BACKEND_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Verify health response
          RESPONSE=$(curl --fail --silent --show-error http://127.0.0.1:8081/actuator/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d.get('status') == 'UP', f'Health status is not UP: {d}'
          print('Backend health: PASS — status is UP')
          "

          # Cleanup
          kill $BACKEND_PID 2>/dev/null || true
          wait $BACKEND_PID 2>/dev/null || true

      - name: Smoke Test — Frontend Auth Route (Operational)
        id: smoke-frontend
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          echo "Starting frontend production server for smoke test..."
          npm run start -- --port 3001 &
          FRONTEND_PID=$!

          # Wait for frontend to be ready (max 60s)
          for i in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3001/auth/login &>/dev/null; then
              echo "Frontend is ready after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "::error::Frontend did not start within 60s"
              kill $FRONTEND_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Verify auth route returns HTML
          STATUS=$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3001/auth/login)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Auth route returned HTTP $STATUS, expected 200"
            kill $FRONTEND_PID 2>/dev/null || true
            exit 1
          fi
          echo "Frontend auth route: PASS — HTTP 200"

          # Verify SnadLogo is in the HTML
          BODY=$(curl --silent http://127.0.0.1:3001/auth/login)
          if echo "$BODY" | grep -qi "snad\|سند"; then
            echo "SnadLogo/brand name in HTML: PASS"
          else
            echo "::error::Brand name SNAD/سند not found in auth page HTML"
            kill $FRONTEND_PID 2>/dev/null || true
            exit 1
          fi

          # Cleanup
          kill $FRONTEND_PID 2>/dev/null || true
          wait $FRONTEND_PID 2>/dev/null || true

      # --- Generate Manifest (always, even on failure) ---
      - name: Generate Verification Manifest
        id: manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          START_TS="${{ steps.metadata.outputs.start_timestamp_utc }}"
          END_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Determine overall result from step outcomes
          STEPS_JSON='{"frontend_deps":"${{ steps.frontend-deps.outcome }}","backend_deps":"${{ steps.backend-deps.outcome }}","frontend_lint":"${{ steps.frontend-lint.outcome }}","frontend_typecheck":"${{ steps.frontend-typecheck.outcome }}","frontend_tests":"${{ steps.frontend-tests.outcome }}","frontend_build":"${{ steps.frontend-build.outcome }}","sds_compliance":"${{ steps.sds-compliance.outcome }}","logo_governance":"${{ steps.logo-governance.outcome }}","brand_name":"${{ steps.brand-name.outcome }}","performance_budget":"${{ steps.performance-budget.outcome }}","backend_compile":"${{ steps.backend-compile.outcome }}","backend_tests":"${{ steps.backend-tests.outcome }}","workflow_security":"${{ steps.workflow-security.outcome }}","secret_scan":"${{ steps.secret-scan.outcome }}","smoke_backend":"${{ steps.smoke-backend.outcome }}","smoke_frontend":"${{ steps.smoke-frontend.outcome }}"}'

          # Find first failed gate
          FAILED_GATE=$(echo "$STEPS_JSON" | python3 -c "
          import json, sys
          steps = json.loads(sys.stdin.read())
          failed = [k for k, v in steps.items() if v == 'failure']
          print(failed[0] if failed else '')
          ")

          # Determine overall result
          if [ -n "$FAILED_GATE" ]; then
            RESULT="FAIL"
          else
            RESULT="PASS"
          fi

          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "failed_gate=$FAILED_GATE" >> "$GITHUB_OUTPUT"

          # Build passed/failed/skipped lists
          PASSED=$(echo "$STEPS_JSON" | python3 -c "
          import json, sys
          steps = json.loads(sys.stdin.read())
          print(json.dumps([k for k, v in steps.items() if v == 'success']))
          ")
          FAILED=$(echo "$STEPS_JSON" | python3 -c "
          import json, sys
          steps = json.loads(sys.stdin.read())
          print(json.dumps([k for k, v in steps.items() if v == 'failure']))
          ")
          SKIPPED=$(echo "$STEPS_JSON" | python3 -c "
          import json, sys
          steps = json.loads(sys.stdin.read())
          print(json.dumps([k for k, v in steps.items() if v in ('skipped', 'cancelled')]))
          ")

          cat > "$RUNNER_TEMP/verification-manifest.json" << MANIFEST
          {
            "verificationType": "post-merge-main",
            "exactMainSha": "${{ github.sha }}",
            "triggerType": "${{ github.event_name }}",
            "workflowRunId": "${{ github.run_id }}",
            "startTimestampUtc": "$START_TS",
            "completionTimestampUtc": "$END_TS",
            "actor": "${{ github.actor }}",
            "ref": "${{ github.ref }}",
            "result": "$RESULT",
            "failedGate": "$FAILED_GATE",
            "passedChecks": $PASSED,
            "failedChecks": $FAILED,
            "skippedChecks": $SKIPPED
          }
          MANIFEST

          echo "=== Verification Manifest ==="
          cat "$RUNNER_TEMP/verification-manifest.json"
          echo "============================="

      - name: Upload Verification Manifest
        id: upload-manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-verification-${{ github.run_id }}
          path: ${{ runner.temp }}/verification-manifest.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload Vitest Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-vitest-${{ github.run_id }}
          path: ${{ runner.temp }}/postmerge-vitest.log
          if-no-files-found: warn
          retention-days: 30

      - name: Record completion
        if: always()
        shell: bash
        run: |
          echo "=== Post-Merge Verification Complete ==="
          echo "Exact Main SHA: ${{ github.sha }}"
          echo "Workflow Run ID: ${{ github.run_id }}"
          echo "Completion Timestamp UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Result: ${{ steps.manifest.outputs.result }}"
          echo "Failed Gate: ${{ steps.manifest.outputs.failed_gate }}"
          echo "=========================================="
          # If any step failed, ensure workflow fails
          if [ "${{ steps.manifest.outputs.result }}" = "FAIL" ]; then
            exit 1
          fi
