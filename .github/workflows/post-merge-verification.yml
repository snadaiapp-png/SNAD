name: Post-Merge Main Verification

# ============================================================
# SNAD Platform — Post-Merge Verification on main branch
# ------------------------------------------------------------
# Per PM Directive: FAIL-CLOSED, operational smoke tests,
# truthful manifest with actual step outcomes, evidence upload
# in all paths, final gate that reads actual results.
# ============================================================

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-main:
    name: Post-Merge Verification
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Record start metadata
        id: metadata
        shell: bash
        run: |
          echo "start_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "=== Post-Merge Verification Started ==="
          echo "Exact Main SHA: ${{ github.sha }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      - name: Checkout exact main SHA
        id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Node.js 24
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Java 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Maven
        id: setup-maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      # === Clean Dependency Installation ===
      - name: Frontend dependencies
        id: frontend-deps
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci

      - name: Backend dependencies
        id: backend-deps
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress dependency:go-offline

      # === Frontend Checks ===
      - name: Frontend lint
        id: frontend-lint
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm run lint

      - name: Frontend type check
        id: frontend-typecheck
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npx tsc --noEmit

      - name: Frontend unit tests
        id: frontend-tests
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm test -- --reporter=verbose 2>&1 | tee "$RUNNER_TEMP/vitest.log"

      - name: Frontend production build
        id: frontend-build
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm run build

      # === Brand Governance ===
      - name: SDS compliance check
        id: sds-compliance
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-design-system-compliance.py

      - name: Logo governance check
        id: logo-governance
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-logo-governance.py

      - name: Brand name governance check
        id: brand-name
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-brand-name-governance.py

      - name: Performance budget check
        id: performance-budget
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 scripts/ci/check-performance-budget.py

      # === Backend Checks ===
      - name: Backend compile
        id: backend-compile
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress compile

      - name: Backend unit tests
        id: backend-tests
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress test

      # === Security Validation (Section 2: separated) ===
      - name: Workflow security validation
        id: workflow-security
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          test -f scripts/ci/check_workflow_security.py
          python3 scripts/ci/check_workflow_security.py

      - name: Secret scanning
        id: secret-scan
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running secret scan..."
          test -f scripts/ci/scan_secrets.py
          python3 -m py_compile scripts/ci/scan_secrets.py
          python3 scripts/ci/scan_secrets.py \
            --repository-root . \
            --report "$RUNNER_TEMP/secret-scan-report.json" \
            --commit-sha "${{ github.sha }}" \
            --workflow-run-id "${{ github.run_id }}"

      # === Operational Smoke Tests (Section 3) ===
      - name: Smoke test — Backend health (operational)
        id: smoke-backend
        shell: bash
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          echo "Starting backend for operational smoke test..."
          echo "Application Port: 8081"
          echo "Management Port: 8082"
          echo "Health Endpoint: http://127.0.0.1:8082/actuator/health"

          # Create evidence files before potential failure
          : > "$RUNNER_TEMP/backend.log"
          printf '%s\n' '{"status":"NOT_AVAILABLE"}' > "$RUNNER_TEMP/backend-health.json"
          printf '%s\n' '{"result":"FAIL","failureType":"NOT_COMPLETED"}' > "$RUNNER_TEMP/backend-smoke-metadata.json"

          cleanup_backend() {
            kill "$BACKEND_PID" 2>/dev/null || true
            wait "$BACKEND_PID" 2>/dev/null || true
          }
          trap cleanup_backend EXIT

          SPRING_PROFILES_ACTIVE=local \
            SERVER_PORT=8081 \
            MANAGEMENT_SERVER_PORT=8082 \
            mvn --batch-mode --no-transfer-progress spring-boot:run \
            > "$RUNNER_TEMP/backend.log" 2>&1 &

          BACKEND_PID=$!

          echo "Waiting for backend to be ready..."
          BACKEND_READY=false
          for i in $(seq 1 60); do
            if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              echo "::error::Backend process terminated before readiness (PROCESS_EXITED)"
              tail -200 "$RUNNER_TEMP/backend.log" || true
              exit 1
            fi
            if curl --fail --silent --show-error http://127.0.0.1:8082/actuator/health > /dev/null 2>&1; then
              echo "Backend is ready after $((i*3))s"
              BACKEND_READY=true
              break
            fi
            sleep 3
          done

          if [ "$BACKEND_READY" = "false" ]; then
            echo "::error::Backend did not become ready within 90s (STARTUP_TIMEOUT)"
            tail -200 "$RUNNER_TEMP/backend.log" || true
            exit 1
          fi

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/backend-health.json" \
              --write-out '%{http_code}' \
              http://127.0.0.1:8082/actuator/health
          )"

          python3 ${{ github.workspace }}/scripts/ci/validate_backend_smoke.py \
            --health-file "$RUNNER_TEMP/backend-health.json" \
            --metadata-file "$RUNNER_TEMP/backend-smoke-metadata.json" \
            --http-status "$HTTP_STATUS" \
            --application-port 8081 \
            --management-port 8082 \
            --health-url "http://127.0.0.1:8082/actuator/health"

      - name: Smoke test — Frontend auth route (operational)
        id: smoke-frontend
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail
          echo "Starting frontend production server for operational smoke test..."

          # Create evidence files before potential failure
          : > "$RUNNER_TEMP/frontend.log"
          printf '%s\n' '<html>NOT_AVAILABLE</html>' > "$RUNNER_TEMP/frontend-auth.html"
          printf '%s\n' '{"result":"FAIL","failureType":"NOT_COMPLETED"}' > "$RUNNER_TEMP/frontend-smoke-metadata.json"

          cleanup_frontend() {
            kill "$FRONTEND_PID" 2>/dev/null || true
            wait "$FRONTEND_PID" 2>/dev/null || true
          }
          trap cleanup_frontend EXIT

          PORT=3001 npm run start \
            > "$RUNNER_TEMP/frontend.log" 2>&1 &

          FRONTEND_PID=$!

          echo "Waiting for frontend to be ready..."
          FRONTEND_READY=false
          for i in $(seq 1 90); do
            if ! kill -0 "$FRONTEND_PID" 2>/dev/null; then
              echo "::error::Frontend process terminated before readiness (PROCESS_EXITED)"
              tail -200 "$RUNNER_TEMP/frontend.log" || true
              exit 1
            fi
            if curl --fail --silent --show-error http://localhost:3001/auth/login > /dev/null 2>&1; then
              echo "Frontend is ready after $((i*2))s"
              FRONTEND_READY=true
              break
            fi
            sleep 2
          done

          if [ "$FRONTEND_READY" = "false" ]; then
            echo "::error::Frontend did not become ready within 180s (STARTUP_TIMEOUT)"
            tail -200 "$RUNNER_TEMP/frontend.log" || true
            exit 1
          fi

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/frontend-auth.html" \
              --write-out '%{http_code}' \
              http://localhost:3001/auth/login
          )"

          python3 ${{ github.workspace }}/scripts/ci/validate_frontend_smoke.py \
            --html-file "$RUNNER_TEMP/frontend-auth.html" \
            --metadata-file "$RUNNER_TEMP/frontend-smoke-metadata.json" \
            --http-status "$HTTP_STATUS" \
            --url "http://localhost:3001/auth/login" \
            --port 3001

      # === Generate Truthful Manifest (Section 4) ===
      - name: Generate verification manifest
        id: manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          START_TS="${{ steps.metadata.outputs.start_ts }}"
          END_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          # Read ACTUAL step outcomes — no hardcoded PASS
          declare -A STEPS
          STEPS[frontend_deps]="${{ steps.frontend-deps.outcome }}"
          STEPS[backend_deps]="${{ steps.backend-deps.outcome }}"
          STEPS[frontend_lint]="${{ steps.frontend-lint.outcome }}"
          STEPS[frontend_typecheck]="${{ steps.frontend-typecheck.outcome }}"
          STEPS[frontend_tests]="${{ steps.frontend-tests.outcome }}"
          STEPS[frontend_build]="${{ steps.frontend-build.outcome }}"
          STEPS[sds_compliance]="${{ steps.sds-compliance.outcome }}"
          STEPS[logo_governance]="${{ steps.logo-governance.outcome }}"
          STEPS[brand_name]="${{ steps.brand-name.outcome }}"
          STEPS[performance_budget]="${{ steps.performance-budget.outcome }}"
          STEPS[backend_compile]="${{ steps.backend-compile.outcome }}"
          STEPS[backend_tests]="${{ steps.backend-tests.outcome }}"
          STEPS[workflow_security]="${{ steps.workflow-security.outcome }}"
          STEPS[secret_scan]="${{ steps.secret-scan.outcome }}"
          STEPS[smoke_backend]="${{ steps.smoke-backend.outcome }}"
          STEPS[smoke_frontend]="${{ steps.smoke-frontend.outcome }}"
          
          # Build JSON from actual outcomes
          python3 -c "
          import json, sys
          steps = {
              'frontend_deps': '${{ steps.frontend-deps.outcome }}',
              'backend_deps': '${{ steps.backend-deps.outcome }}',
              'frontend_lint': '${{ steps.frontend-lint.outcome }}',
              'frontend_typecheck': '${{ steps.frontend-typecheck.outcome }}',
              'frontend_tests': '${{ steps.frontend-tests.outcome }}',
              'frontend_build': '${{ steps.frontend-build.outcome }}',
              'sds_compliance': '${{ steps.sds-compliance.outcome }}',
              'logo_governance': '${{ steps.logo-governance.outcome }}',
              'brand_name': '${{ steps.brand-name.outcome }}',
              'performance_budget': '${{ steps.performance-budget.outcome }}',
              'backend_compile': '${{ steps.backend-compile.outcome }}',
              'backend_tests': '${{ steps.backend-tests.outcome }}',
              'workflow_security': '${{ steps.workflow-security.outcome }}',
              'secret_scan': '${{ steps.secret-scan.outcome }}',
              'smoke_backend': '${{ steps.smoke-backend.outcome }}',
              'smoke_frontend': '${{ steps.smoke-frontend.outcome }}',
          }
          passed = [k for k,v in steps.items() if v == 'success']
          failed = [k for k,v in steps.items() if v == 'failure']
          skipped = [k for k,v in steps.items() if v in ('skipped','cancelled')]
          failed_gate = failed[0] if failed else None
          result = 'FAIL' if failed else 'PASS'
          checks_json = {k: {'status': v.upper(), 'evidence': f'step outcome: {v}'} for k,v in steps.items()}
          manifest = {
              'verificationType': 'post-merge-main',
              'exactMainSha': '${{ github.sha }}',
              'workflowRunId': '${{ github.run_id }}',
              'triggerType': '${{ github.event_name }}',
              'startedAtUtc': '$START_TS',
              'completedAtUtc': '$END_TS',
              'actor': '${{ github.actor }}',
              'result': result,
              'failedGate': failed_gate,
              'checks': checks_json,
              'passedChecks': passed,
              'failedChecks': failed,
              'skippedChecks': skipped,
          }
          with open('$RUNNER_TEMP/verification-manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          "
          
          echo "result=$(python3 -c "import json; d=json.load(open('$RUNNER_TEMP/verification-manifest.json')); print(d['result'])")" >> "$GITHUB_OUTPUT"

      # === Upload Evidence (Section 5: always, if-no-files-found: error) ===
      - name: Upload verification manifest
        id: upload-manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-manifest-${{ github.run_id }}
          path: ${{ runner.temp }}/verification-manifest.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload secret scan report
        id: upload-secret-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report-${{ github.run_id }}
          path: ${{ runner.temp }}/secret-scan-report.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload vitest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-log-${{ github.run_id }}
          path: ${{ runner.temp }}/vitest.log
          if-no-files-found: error
          retention-days: 30

      - name: Upload backend smoke evidence
        id: upload-backend-evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-smoke-log-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/backend.log
            ${{ runner.temp }}/backend-health.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload frontend smoke evidence
        id: upload-frontend-evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-smoke-log-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/frontend.log
            ${{ runner.temp }}/frontend-auth.html
          if-no-files-found: error
          retention-days: 30

      # === Final Gate (Section 8) ===
      - name: Final gate
        id: final-gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Final Gate ==="
          
          # Check manifest result
          MANIFEST_RESULT="${{ steps.manifest.outputs.result }}"
          echo "Manifest result: $MANIFEST_RESULT"
          if [ "$MANIFEST_RESULT" = "FAIL" ] || [ -z "$MANIFEST_RESULT" ]; then
            echo "::error::Manifest result is FAIL or empty"
            exit 1
          fi
          
          # Check all artifact uploads
          echo "Manifest upload: ${{ steps.upload-manifest.outcome }}"
          echo "Secret report upload: ${{ steps.upload-secret-report.outcome }}"
          echo "Backend evidence upload: ${{ steps.upload-backend-evidence.outcome }}"
          echo "Frontend evidence upload: ${{ steps.upload-frontend-evidence.outcome }}"
          
          if [ "${{ steps.upload-manifest.outcome }}" != "success" ]; then
            echo "::error::Manifest artifact upload failed"
            exit 1
          fi
          if [ "${{ steps.upload-secret-report.outcome }}" != "success" ]; then
            echo "::error::Secret scan report upload failed"
            exit 1
          fi
          if [ "${{ steps.upload-backend-evidence.outcome }}" != "success" ]; then
            echo "::error::Backend smoke evidence upload failed"
            exit 1
          fi
          if [ "${{ steps.upload-frontend-evidence.outcome }}" != "success" ]; then
            echo "::error::Frontend smoke evidence upload failed"
            exit 1
          fi
          
          echo "All critical checks passed. All artifacts uploaded. Workflow SUCCESS."
          exit 0
