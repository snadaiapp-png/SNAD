name: Diagnose CRM-007 4ced Closure State

on:
  pull_request:
    paths:
      - .github/workflows/diag-crm007-4ced-closure-state.yml

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_SHA: 4cedf631a3e61f39039615d93cd03c3111213eb9
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query exact-SHA closure workflows
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/crm007-diag"

          query_workflow() {
            local workflow="$1"
            local output="$2"
            local raw="$RUNNER_TEMP/crm007-diag/${workflow}.raw.json"
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?branch=main&per_page=100" \
              > "$raw"
            jq --arg sha "$RELEASE_SHA" \
              '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.created_at) | reverse' \
              "$raw" > "$output"
          }

          query_workflow crm007-current-main-closure-trigger.yml "$RUNNER_TEMP/crm007-diag/trigger.json"
          query_workflow crm-exact-sha-production-orchestrator.yml "$RUNNER_TEMP/crm007-diag/orchestrator.json"
          query_workflow publish-render-image.yml "$RUNNER_TEMP/crm007-diag/image.json"
          query_workflow crm-idempotency-production-reconciliation.yml "$RUNNER_TEMP/crm007-diag/reconciliation.json"
          query_workflow crm-g1-production-closure.yml "$RUNNER_TEMP/crm007-diag/g1.json"
          query_workflow crm-007-final-production-closure.yml "$RUNNER_TEMP/crm007-diag/crm007.json"

          jq -n \
            --arg release_sha "$RELEASE_SHA" \
            --slurpfile trigger "$RUNNER_TEMP/crm007-diag/trigger.json" \
            --slurpfile orchestrator "$RUNNER_TEMP/crm007-diag/orchestrator.json" \
            --slurpfile image "$RUNNER_TEMP/crm007-diag/image.json" \
            --slurpfile reconciliation "$RUNNER_TEMP/crm007-diag/reconciliation.json" \
            --slurpfile g1 "$RUNNER_TEMP/crm007-diag/g1.json" \
            --slurpfile crm007 "$RUNNER_TEMP/crm007-diag/crm007.json" \
            '{release_sha:$release_sha,trigger:$trigger[0],orchestrator:$orchestrator[0],image:$image[0],reconciliation:$reconciliation[0],g1:$g1[0],crm007:$crm007[0]}' \
            > "$RUNNER_TEMP/crm007-diag/summary.json"

          jq '{release_sha,
               trigger:[.trigger[]|{id,event,status,conclusion,created_at,updated_at}],
               orchestrator:[.orchestrator[]|{id,event,status,conclusion,created_at,updated_at}],
               image:[.image[]|{id,event,status,conclusion,created_at,updated_at}],
               reconciliation:[.reconciliation[]|{id,event,status,conclusion,created_at,updated_at}],
               g1:[.g1[]|{id,event,status,conclusion,created_at,updated_at}],
               crm007:[.crm007[]|{id,event,status,conclusion,created_at,updated_at}]}' \
            "$RUNNER_TEMP/crm007-diag/summary.json" \
            | tee "$RUNNER_TEMP/crm007-diag/compact-summary.json"

          {
            echo '## CRM-007 exact-SHA diagnostic'
            echo ''
            echo '```json'
            cat "$RUNNER_TEMP/crm007-diag/compact-summary.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-4ced-closure-state-${{ github.run_id }}
          path: ${{ runner.temp }}/crm007-diag
          retention-days: 7
