# ============================================================
# SANAD Platform — Backup Verification
# ============================================================
# Verifies production database integrity: checks Flyway schema
# version against the expected level, counts records in
# critical tables, and produces a manifest artifact.
#
# Canonical secret model: PRODUCTION_DATABASE_URL
# This single JDBC URL is parsed to extract connection params.
# Do NOT require separate DATABASE_HOST/PORT/NAME/USERNAME/
# PASSWORD secrets when PRODUCTION_DATABASE_URL is available.
# ============================================================

name: Backup Verify

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: backup-verify
  cancel-in-progress: true

env:
  EXPECTED_FLYWAY_VERSION: "15"
  BASELINE_TENANTS: "1"
  BASELINE_USERS: "1"
  BASELINE_ORGANIZATIONS: "1"
  BASELINE_MEMBERSHIPS: "1"
  BASELINE_ROLES: "1"
  BASELINE_ACCESS_CAPABILITIES: "1"
  BASELINE_ROLE_CAPABILITIES: "1"

jobs:
  verify-database:
    name: Verify Production Database
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - name: Verify PRODUCTION_DATABASE_URL exists
        shell: bash
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_DATABASE_URL:-}" ]; then
            echo "::error::Missing protected Production value: PRODUCTION_DATABASE_URL"
            exit 1
          fi
          echo "PRODUCTION_DATABASE_URL: PRESENT"

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      # -------------------------------------------------------
      # Parse PRODUCTION_DATABASE_URL (JDBC format):
      # jdbc:postgresql://host:port/dbname?user=xxx&password=xxx
      # or PostgreSQL URI: postgresql://user:pass@host:port/dbname
      # -------------------------------------------------------
      - name: Parse database URL and verify Flyway schema version
        id: flyway
        shell: bash
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail

          # Parse the JDBC URL into psql-compatible connection parameters
          # Supports: jdbc:postgresql://host:port/dbname?user=xxx&password=xxx
          # and: postgresql://user:pass@host:port/dbname

          db_url="${PRODUCTION_DATABASE_URL}"

          # Strip jdbc: prefix if present
          clean_url="${db_url#jdbc:}"

          # Extract host, port, dbname, user, password from URL
          # Format: postgresql://user:password@host:port/dbname?params
          if echo "$clean_url" | grep -q '@'; then
            # Format: postgresql://user:pass@host:port/dbname
            user_part=$(echo "$clean_url" | sed -E 's|postgresql://([^@]+)@.*|\1|')
            DB_USER=$(echo "$user_part" | cut -d: -f1)
            DB_PASS=$(echo "$user_part" | cut -d: -f2 -s)
            host_part=$(echo "$clean_url" | sed -E 's|postgresql://[^@]+@([^/]+).*|\1|')
            DB_HOST=$(echo "$host_part" | cut -d: -f1)
            DB_PORT=$(echo "$host_part" | cut -d: -f2 -s)
            DB_NAME=$(echo "$clean_url" | sed -E 's|postgresql://[^@]+@[^/]+/([^?]+).*|\1|')
          else
            # Format: postgresql://host:port/dbname?user=xxx&password=xxx
            host_part=$(echo "$clean_url" | sed -E 's|postgresql://([^/]+).*|\1|')
            DB_HOST=$(echo "$host_part" | cut -d: -f1)
            DB_PORT=$(echo "$host_part" | cut -d: -f2 -s)
            DB_NAME=$(echo "$clean_url" | sed -E 's|postgresql://[^/]+/([^?]+).*|\1|')
            DB_USER=$(echo "$clean_url" | grep -oP 'user=\K[^&]+' || echo "")
            DB_PASS=$(echo "$clean_url" | grep -oP 'password=\K[^&]+' || echo "")
          fi

          # Mask all extracted values
          echo "::add-mask::${DB_HOST}"
          echo "::add-mask::${DB_PORT}"
          echo "::add-mask::${DB_NAME}"
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASS}"

          export PGPASSWORD="$DB_PASS"

          current_version=$(psql \
            -h "$DB_HOST" \
            -p "${DB_PORT:-5432}" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            -t -A \
            -c "SELECT version FROM flyway_schema_history WHERE success = true ORDER BY installed_rank DESC LIMIT 1;" \
            2>/dev/null || echo "QUERY_FAILED")

          if [ "$current_version" = "QUERY_FAILED" ]; then
            echo "flyway_check=failed" >> "$GITHUB_OUTPUT"
            echo "current_version=unknown" >> "$GITHUB_OUTPUT"
            echo "::error::Could not query Flyway schema version"
            exit 1
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"

          if [ "$current_version" = "${{ env.EXPECTED_FLYWAY_VERSION }}" ]; then
            echo "flyway_check=passed" >> "$GITHUB_OUTPUT"
            echo "Flyway version OK: $current_version"
          else
            echo "flyway_check=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Flyway version MISMATCH: $current_version (expected ${{ env.EXPECTED_FLYWAY_VERSION }})"
          fi

          # Verify V15 ADMIN capabilities
          admin_caps=$(psql \
            -h "$DB_HOST" \
            -p "${DB_PORT:-5432}" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            -t -A \
            -c "SELECT COUNT(*) FROM role_capabilities WHERE role_id IN (SELECT id FROM roles WHERE code = 'ADMIN');" \
            2>/dev/null || echo "-1")
          echo "admin_capabilities=$admin_caps" >> "$GITHUB_OUTPUT"
          echo "ADMIN capabilities count: $admin_caps"

      - name: Check critical table record counts
        id: counts
        shell: bash
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail

          db_url="${PRODUCTION_DATABASE_URL}"
          clean_url="${db_url#jdbc:}"

          if echo "$clean_url" | grep -q '@'; then
            user_part=$(echo "$clean_url" | sed -E 's|postgresql://([^@]+)@.*|\1|')
            DB_USER=$(echo "$user_part" | cut -d: -f1)
            DB_PASS=$(echo "$user_part" | cut -d: -f2 -s)
            host_part=$(echo "$clean_url" | sed -E 's|postgresql://[^@]+@([^/]+).*|\1|')
            DB_HOST=$(echo "$host_part" | cut -d: -f1)
            DB_PORT=$(echo "$host_part" | cut -d: -f2 -s)
            DB_NAME=$(echo "$clean_url" | sed -E 's|postgresql://[^@]+@[^/]+/([^?]+).*|\1|')
          else
            host_part=$(echo "$clean_url" | sed -E 's|postgresql://([^/]+).*|\1|')
            DB_HOST=$(echo "$host_part" | cut -d: -f1)
            DB_PORT=$(echo "$host_part" | cut -d: -f2 -s)
            DB_NAME=$(echo "$clean_url" | sed -E 's|postgresql://[^/]+/([^?]+).*|\1|')
            DB_USER=$(echo "$clean_url" | grep -oP 'user=\K[^&]+' || echo "")
            DB_PASS=$(echo "$clean_url" | grep -oP 'password=\K[^&]+' || echo "")
          fi

          export PGPASSWORD="$DB_PASS"

          query_count() {
            local table="$1"
            psql \
              -h "$DB_HOST" \
              -p "${DB_PORT:-5432}" \
              -U "$DB_USER" \
              -d "$DB_NAME" \
              -t -A \
              -c "SELECT COUNT(*) FROM $table;" \
              2>/dev/null || echo "-1"
          }

          check_deviation() {
            local name="$1"
            local current="$2"
            local baseline="$3"
            if [ "$baseline" -eq 0 ] || [ "$current" -eq -1 ]; then
              echo "$name: $current (baseline comparison skipped)"
              return 0
            fi
            deviation=$(awk -v c="$current" -v b="$baseline" 'BEGIN {
              if (b == 0) { print 0; exit }
              diff = (c - b) / b * 100
              if (diff < 0) diff = -diff
              printf "%.1f", diff
            }')
            if awk -v d="$deviation" 'BEGIN { exit (d > 50) ? 1 : 0 }'; then
              echo "$name: $current (baseline: $baseline, deviation: ${deviation}%) — OK"
              return 0
            else
              echo "$name: $current (baseline: $baseline, deviation: ${deviation}%) — WARNING: >50% deviation!"
              return 1
            fi
          }

          overall_ok="true"
          warnings=""

          tenants_count=$(query_count "tenants")
          echo "tenants_count=$tenants_count" >> "$GITHUB_OUTPUT"
          if ! check_deviation "tenants" "$tenants_count" "${{ env.BASELINE_TENANTS }}"; then
            warnings="${warnings}tenants: ${tenants_count} (>50%% deviation)\n"
            overall_ok="false"
          fi

          users_count=$(query_count "users")
          echo "users_count=$users_count" >> "$GITHUB_OUTPUT"
          if ! check_deviation "users" "$users_count" "${{ env.BASELINE_USERS }}"; then
            warnings="${warnings}users: ${users_count} (>50%% deviation)\n"
            overall_ok="false"
          fi

          orgs_count=$(query_count "organizations")
          echo "organizations_count=$orgs_count" >> "$GITHUB_OUTPUT"
          if ! check_deviation "organizations" "$orgs_count" "${{ env.BASELINE_ORGANIZATIONS }}"; then
            warnings="${warnings}organizations: ${orgs_count} (>50%% deviation)\n"
            overall_ok="false"
          fi

          memberships_count=$(query_count "organization_memberships")
          echo "memberships_count=$memberships_count" >> "$GITHUB_OUTPUT"
          if ! check_deviation "memberships" "$memberships_count" "${{ env.BASELINE_MEMBERSHIPS }}"; then
            warnings="${warnings}memberships: ${memberships_count} (>50%% deviation)\n"
            overall_ok="false"
          fi

          roles_count=$(query_count "roles")
          echo "roles_count=$roles_count" >> "$GITHUB_OUTPUT"
          if ! check_deviation "roles" "$roles_count" "${{ env.BASELINE_ROLES }}"; then
            warnings="${warnings}roles: ${roles_count} (>50%% deviation)\n"
            overall_ok="false"
          fi

          capabilities_count=$(query_count "access_capabilities")
          echo "access_capabilities_count=$capabilities_count" >> "$GITHUB_OUTPUT"
          if ! check_deviation "access_capabilities" "$capabilities_count" "${{ env.BASELINE_ACCESS_CAPABILITIES }}"; then
            warnings="${warnings}access_capabilities: ${capabilities_count} (>50%% deviation)\n"
            overall_ok="false"
          fi

          role_caps_count=$(query_count "role_capabilities")
          echo "role_capabilities_count=$role_caps_count" >> "$GITHUB_OUTPUT"
          if ! check_deviation "role_capabilities" "$role_caps_count" "${{ env.BASELINE_ROLE_CAPABILITIES }}"; then
            warnings="${warnings}role_capabilities: ${role_caps_count} (>50%% deviation)\n"
            overall_ok="false"
          fi

          echo "warnings=${warnings}" >> "$GITHUB_OUTPUT"
          echo "counts_ok=$overall_ok" >> "$GITHUB_OUTPUT"

      - name: Create verification manifest
        id: manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          flyway_ok="${{ steps.flyway.outputs.flyway_check || 'unknown' }}"
          counts_ok="${{ steps.counts.outputs.counts_ok || 'unknown' }}"

          if [ "$flyway_ok" = "passed" ] && [ "$counts_ok" = "true" ]; then
            overall_status="PASSED"
          else
            overall_status="FAILED"
          fi

          jq -n \
            --arg ts "$timestamp" \
            --arg flyway_version "${{ steps.flyway.outputs.current_version || 'unknown' }}" \
            --arg expected_flyway "${{ env.EXPECTED_FLYWAY_VERSION }}" \
            --arg flyway_check "$flyway_ok" \
            --arg counts_check "$counts_ok" \
            --arg overall "$overall_status" \
            --arg tenants "${{ steps.counts.outputs.tenants_count || 'N/A' }}" \
            --arg users "${{ steps.counts.outputs.users_count || 'N/A' }}" \
            --arg organizations "${{ steps.counts.outputs.organizations_count || 'N/A' }}" \
            --arg memberships "${{ steps.counts.outputs.memberships_count || 'N/A' }}" \
            --arg roles "${{ steps.counts.outputs.roles_count || 'N/A' }}" \
            --arg access_capabilities "${{ steps.counts.outputs.access_capabilities_count || 'N/A' }}" \
            --arg role_capabilities "${{ steps.counts.outputs.role_capabilities_count || 'N/A' }}" \
            --arg admin_caps "${{ steps.flyway.outputs.admin_capabilities || 'N/A' }}" \
            '{
              timestamp: $ts,
              verification: {
                overall_status: $overall,
                flyway: {
                  current_version: $flyway_version,
                  expected_version: ($expected_flyway | tonumber),
                  check: $flyway_check
                },
                admin_capabilities_count: ($admin_caps | tonumber? // -1),
                record_counts: {
                  tenants: ($tenants | tonumber? // -1),
                  users: ($users | tonumber? // -1),
                  organizations: ($organizations | tonumber? // -1),
                  memberships: ($memberships | tonumber? // -1),
                  roles: ($roles | tonumber? // -1),
                  access_capabilities: ($access_capabilities | tonumber? // -1),
                  role_capabilities: ($role_capabilities | tonumber? // -1)
                },
                counts_check: $counts_check
              }
            }' > backup-verify-manifest.json

          echo "overall_status=$overall_status" >> "$GITHUB_OUTPUT"
          echo "Manifest created — overall status: $overall_status"

      - name: Upload manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-verify-manifest-${{ github.run_id }}
          path: backup-verify-manifest.json
          if-no-files-found: error
          retention-days: 90

      - name: Create verification failure issue
        if: always() && steps.manifest.outputs.overall_status == 'FAILED'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
          flyway_version="${{ steps.flyway.outputs.current_version || 'unknown' }}"
          flyway_check="${{ steps.flyway.outputs.flyway_check || 'unknown' }}"
          warnings="${{ steps.counts.outputs.warnings || 'None' }}"

          existing=$(gh issue list \
            --label "backup-verify" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          issue_body="## Backup Verification Failed\n\n**Timestamp:** $timestamp\n**Workflow run:** ${{ github.run_id }}\n\n### Flyway Schema Version\n- Current: $flyway_version\n- Expected: ${{ env.EXPECTED_FLYWAY_VERSION }}\n- Check: $flyway_check\n\n### Record Count Warnings\n${warnings}\n\n*Auto-created by backup-verify workflow.*"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "## Updated Verification — $timestamp\n\nFlyway: $flyway_check\n\n*Updated by backup-verify workflow (run ${{ github.run_id }}).*" 2>/dev/null || true
          else
            gh issue create \
              --title "Backup Verification Failed — $timestamp" \
              --body "$issue_body" \
              --label "backup-verify" \
              --label "P2" 2>/dev/null || true
          fi

      - name: Close verification issue on success
        if: success() && steps.manifest.outputs.overall_status == 'PASSED'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          existing=$(gh issue list \
            --label "backup-verify" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing" ]; then
            timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
            gh issue comment "$existing" --body "Verification PASSED at $timestamp. Closing." 2>/dev/null || true
            gh issue close "$existing" --reason "completed" 2>/dev/null || true
          fi

      - name: Write verification summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          overall="${{ steps.manifest.outputs.overall_status || 'UNKNOWN' }}"
          flyway_version="${{ steps.flyway.outputs.current_version || 'N/A' }}"
          flyway_check="${{ steps.flyway.outputs.flyway_check || 'N/A' }}"

          {
            echo "## Database Backup Verification"
            echo ""
            echo "**Overall: $overall**"
            echo ""
            echo "### Flyway Schema Version"
            echo ""
            echo "| Check | Current | Expected |"
            echo "|-------|---------|----------|"
            echo "| Flyway | $flyway_check | ${{ env.EXPECTED_FLYWAY_VERSION }} |"
            echo ""
            echo "### Record Counts"
            echo ""
            echo "| Table | Count | Baseline |"
            echo "|-------|-------|----------|"
            printf '| tenants | %s | %s |\n' "${{ steps.counts.outputs.tenants_count || 'N/A' }}" "${{ env.BASELINE_TENANTS }}"
            printf '| users | %s | %s |\n' "${{ steps.counts.outputs.users_count || 'N/A' }}" "${{ env.BASELINE_USERS }}"
            printf '| organizations | %s | %s |\n' "${{ steps.counts.outputs.organizations_count || 'N/A' }}" "${{ env.BASELINE_ORGANIZATIONS }}"
            printf '| memberships | %s | %s |\n' "${{ steps.counts.outputs.memberships_count || 'N/A' }}" "${{ env.BASELINE_MEMBERSHIPS }}"
            printf '| roles | %s | %s |\n' "${{ steps.counts.outputs.roles_count || 'N/A' }}" "${{ env.BASELINE_ROLES }}"
            printf '| access_capabilities | %s | %s |\n' "${{ steps.counts.outputs.access_capabilities_count || 'N/A' }}" "${{ env.BASELINE_ACCESS_CAPABILITIES }}"
            printf '| role_capabilities | %s | %s |\n' "${{ steps.counts.outputs.role_capabilities_count || 'N/A' }}" "${{ env.BASELINE_ROLE_CAPABILITIES }}"
            echo ""
            echo "- Verified at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Secret model: PRODUCTION_DATABASE_URL (canonical)"
          } >> "$GITHUB_STEP_SUMMARY"
