name: Render API Deploy
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    name: Deploy via Render API
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Trigger deploy
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt..."
            RESPONSE=$(curl -s --max-time 30 -X POST -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json" -d '{}' "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
            DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            if [ -n "$DEPLOY_ID" ]; then
              echo "Deploy ID: $DEPLOY_ID"
              break
            fi
            echo "Response: $RESPONSE"
            sleep 10
          done
          test -n "$DEPLOY_ID" || { echo "::error::Failed"; exit 1; }
          for i in $(seq 1 80); do
            sleep 15
            STATUS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status')
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "live" ] && { echo "LIVE"; exit 0; }
            [ "$STATUS" = "update_failed" ] && { echo "FAILED"; exit 1; }
            [ "$STATUS" = "build_failed" ] && { echo "BUILD FAILED"; exit 1; }
          done
          echo "TIMEOUT"; exit 1
      - name: Test health API
        shell: bash
        run: |
          set -euo pipefail
          sleep 15
          echo "Backend: $(curl -s --max-time 30 -o /dev/null -w '%{http_code}' https://sanad-backend-mcrj.onrender.com/actuator/health)"
          echo "Health API (unauth): $(curl -s --max-time 30 -o /dev/null -w '%{http_code}' https://sanad-backend-mcrj.onrender.com/api/v1/control-plane/health)"
