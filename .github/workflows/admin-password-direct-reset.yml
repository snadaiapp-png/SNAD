# ============================================================
# SANAD Platform — Direct Admin Password Reset via Database
# ============================================================
# Connects directly to the production PostgreSQL database
# and resets the admin password. No deployment required.
#
# This workflow is ONE-TIME USE ONLY.
# Delete it after successful recovery.
# ============================================================

name: Direct Admin Password Reset

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-password-reset
  cancel-in-progress: false

jobs:
  reset:
    name: Direct Password Reset
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production

    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      BOOTSTRAP_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in RENDER_API_KEY RENDER_SERVICE_ID ADMIN_PASSWORD ADMIN_EMAIL; do
            val="${!name:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing secret: ${name}"
              missing=$((missing + 1))
            else
              echo "PRESENT: ${name} (length: ${#val})"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Fetch DB credentials from Render and reset password
        id: db-reset
        shell: bash
        run: |
          set -euo pipefail

          # Mask all sensitive values
          set +x
          echo "::add-mask::${RENDER_API_KEY}"
          echo "::add-mask::${ADMIN_EMAIL}"
          echo "::add-mask::${ADMIN_PASSWORD}"

          # ---- Step A: Fetch current env vars from Render ----
          RENDER_ENV=$(curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")

          # Normalize: unwrap envVar wrapper if present
          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/render-env-flat.json

          # Extract database connection info
          DB_RAW_URL=$(jq -r '.[] | select(.key == "DATABASE_URL") | .value' /tmp/render-env-flat.json)
          DB_USERNAME=$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value' /tmp/render-env-flat.json)
          DB_PASSWORD=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value' /tmp/render-env-flat.json)

          echo "DB_RAW_URL length: ${#DB_RAW_URL}"
          echo "DB_USERNAME length: ${#DB_USERNAME}"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
          echo "DB_RAW_URL contains @: $(echo "$DB_RAW_URL" | grep -c '@')"

          if [ -z "$DB_RAW_URL" ]; then
            echo "::error::DATABASE_URL missing from Render env vars"
            exit 1
          fi

          echo "::add-mask::${DB_RAW_URL}"
          echo "::add-mask::${DB_USERNAME}"
          echo "::add-mask::${DB_PASSWORD}"

          # ---- Step B: Parse connection parameters ----
          # We pass individual components to Python to avoid URL encoding issues
          # (the DB password may contain special chars like @ which break URL parsing)

          if echo "$DB_RAW_URL" | grep -q '^jdbc:postgresql://'; then
            BASE_URL=$(echo "$DB_RAW_URL" | sed 's|^jdbc:postgresql://||')
            if echo "$BASE_URL" | grep -q '@'; then
              # Embedded credentials: user:pass@host:port/db
              # Let Python handle this complex URL
              export DB_CONN_URL="postgresql://${BASE_URL}"
              export DB_USE_URL="true"
            else
              # Separate credentials - extract host:port and dbname
              export DB_HOST=$(echo "$BASE_URL" | cut -d'/' -f1 | cut -d':' -f1)
              export DB_PORT=$(echo "$BASE_URL" | cut -d'/' -f1 | cut -d':' -f2 -s)
              export DB_NAME=$(echo "$BASE_URL" | cut -d'/' -f2 | cut -d'?' -f1)
              export DB_USE_URL="false"
              if [ -z "$DB_PORT" ]; then
                export DB_PORT="5432"
              fi
              echo "DB_HOST length: ${#DB_HOST}"
              echo "DB_PORT: ${DB_PORT}"
              echo "DB_NAME: ${DB_NAME}"
            fi
          elif echo "$DB_RAW_URL" | grep -q '^postgres'; then
            # Already PostgreSQL format - pass as URL
            export DB_CONN_URL="$DB_RAW_URL"
            export DB_USE_URL="true"
          else
            # Unknown format
            export DB_CONN_URL="$DB_RAW_URL"
            export DB_USE_URL="true"
          fi

          # ---- Step C: Reset password using Python ----
          pip install bcrypt psycopg2-binary -q 2>/dev/null || pip3 install bcrypt psycopg2-binary -q

          export ADMIN_EMAIL
          export ADMIN_PASSWORD
          export DB_USERNAME
          export DB_PASSWORD

          python3 << 'PYSCRIPT'
          import psycopg2
          import bcrypt
          import os
          import sys

          admin_email = os.environ["ADMIN_EMAIL"]
          admin_password = os.environ["ADMIN_PASSWORD"]
          db_use_url = os.environ.get("DB_USE_URL", "false") == "true"

          print(f"Connecting to production database...")
          try:
              if db_use_url:
                  pg_url = os.environ.get("DB_CONN_URL", "")
                  print(f"Using connection URL (length: {len(pg_url)})")
                  conn = psycopg2.connect(pg_url, connect_timeout=15)
              else:
                  db_host = os.environ.get("DB_HOST", "")
                  db_port = os.environ.get("DB_PORT", "5432")
                  db_name = os.environ.get("DB_NAME", "postgres")
                  db_user = os.environ.get("DB_USERNAME", "")
                  db_pass = os.environ.get("DB_PASSWORD", "")
                  print(f"Using keyword args: host={db_host}, port={db_port}, db={db_name}, user_len={len(db_user)}, pass_len={len(db_pass)}")
                  conn = psycopg2.connect(
                      host=db_host,
                      port=int(db_port),
                      dbname=db_name,
                      user=db_user,
                      password=db_pass,
                      connect_timeout=15,
                      sslmode="require"
                  )
              conn.autocommit = True
              cur = conn.cursor()

              # Find the admin user by email (case-insensitive)
              cur.execute(
                  "SELECT id, email, status, must_change_password, tenant_id FROM users WHERE LOWER(email) = LOWER(%s) LIMIT 1",
                  (admin_email,)
              )
              user = cur.fetchone()

              if user:
                  user_id, email, status, must_change, tenant_id = user
                  print(f"Found user: id={user_id}, email={email}, status={status}, must_change_password={must_change}, tenant_id={tenant_id}")

                  # Generate BCrypt hash
                  hashed = bcrypt.hashpw(admin_password.encode('utf-8'), bcrypt.gensalt(12))
                  password_hash = hashed.decode('utf-8')
                  print(f"BCrypt hash generated (length: {len(password_hash)})")

                  # Update password and force change on next login
                  cur.execute(
                      """UPDATE users
                         SET password_hash = %s,
                             must_change_password = true,
                             password_set_at = NOW(),
                             password_set_by = 'direct-db-reset',
                             status = 'ACTIVE',
                             session_version = session_version + 1
                         WHERE id = %s""",
                      (password_hash, user_id)
                  )
                  print(f"Password updated for user {user_id} (rows: {cur.rowcount})")

                  # Revoke all refresh tokens
                  cur.execute("DELETE FROM refresh_tokens WHERE user_id = %s", (user_id,))
                  print(f"Refresh tokens revoked for user {user_id}")

                  # Verify
                  cur.execute(
                      "SELECT id, email, status, must_change_password, password_set_by FROM users WHERE id = %s",
                      (user_id,)
                  )
                  verified = cur.fetchone()
                  print(f"Verified: id={verified[0]}, email={verified[1]}, status={verified[2]}, must_change={verified[3]}, set_by={verified[4]}")

                  # Output for next steps
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f"tenant_id={tenant_id}\n")
                      f.write(f"user_id={user_id}\n")
                      f.write(f"email={email}\n")
                      f.write(f"reset_success=true\n")
              else:
                  print(f"No user found with email: {admin_email}")
                  print("Listing all users:")
                  cur.execute("SELECT id, email, status, tenant_id FROM users ORDER BY created_at LIMIT 20")
                  for row in cur.fetchall():
                      print(f"  id={row[0]}, email={row[1]}, status={row[2]}, tenant_id={row[3]}")
                  sys.exit(1)

              cur.close()
              conn.close()
              print("Database password reset complete!")
          except Exception as e:
              print(f"Database error: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          PYSCRIPT

          # ---- Step D: Clean up Render env vars (disable bootstrap) ----
          echo "Cleaning up Render env vars..."

          jq 'del(.[] | select(.key | startswith("BOOTSTRAP_")))' /tmp/render-env-flat.json > /tmp/render-env-no-bootstrap.json

          jq -n '[{"key":"BOOTSTRAP_ENABLED","value":"false"},{"key":"BOOTSTRAP_FORCE_RESET","value":"false"}]' > /tmp/bootstrap-disabled.json

          jq -s '.[0] + .[1]' /tmp/render-env-no-bootstrap.json /tmp/bootstrap-disabled.json > /tmp/render-clean-env.json

          CLEAN_COUNT=$(jq 'length' /tmp/render-clean-env.json)
          echo "Pushing ${CLEAN_COUNT} env vars with bootstrap DISABLED..."

          HTTP_STATUS=$(curl --silent --output /tmp/render-clean-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            --data @/tmp/render-clean-env.json)

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::warning::Failed to clean env vars (HTTP ${HTTP_STATUS})"
          else
            echo "Render env vars cleaned (HTTP ${HTTP_STATUS})"
          fi
          set -x
          rm -f /tmp/render-*.json /tmp/render-*-response.txt

      - name: Verify admin login
        shell: bash
        run: |
          set -euo pipefail
          set +x

          BASE_URL="https://sanad-backend-mcrj.onrender.com"
          TENANT_ID="${{ steps.db-reset.outputs.tenant_id }}"

          if [ -z "$TENANT_ID" ]; then
            TENANT_ID="$BOOTSTRAP_TENANT_ID"
          fi

          echo "Testing login at ${BASE_URL}..."
          echo "Using tenant_id: ${TENANT_ID}"

          LOGIN_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_PASSWORD" \
            --arg tid "$TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          LOGIN_STATUS=$(curl -sS \
            -o /tmp/login_verify.json \
            -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$LOGIN_PAYLOAD" \
            --max-time 30)

          echo "Login response: HTTP ${LOGIN_STATUS}"

          if [ "$LOGIN_STATUS" = "200" ]; then
            echo "PASSWORD RESET SUCCESSFUL - Admin login works!"
          else
            echo "Login response body:"
            cat /tmp/login_verify.json 2>/dev/null | jq . 2>/dev/null || cat /tmp/login_verify.json 2>/dev/null
            echo ""
            echo "::warning::Login returned HTTP ${LOGIN_STATUS}. Password was updated in DB."
            echo "The app may need a restart or cache clear to pick up the new password."
          fi
          set -x
          rm -f /tmp/login_verify.json

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f /tmp/render-*.json /tmp/render-*-response.txt /tmp/login_verify.json

      - name: Reset summary
        if: success()
        run: |
          {
            echo "## Direct Admin Password Reset Complete"
            echo ""
            echo "- Method: Direct database password hash update"
            echo "- Bootstrap env vars: CLEANED (disabled)"
            echo "- Password reset: DONE"
            echo "- Refresh tokens: REVOKED"
            echo ""
            echo "Email: ${{ steps.db-reset.outputs.email }}"
            echo "User ID: ${{ steps.db-reset.outputs.user_id }}"
            echo "Tenant ID: ${{ steps.db-reset.outputs.tenant_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
