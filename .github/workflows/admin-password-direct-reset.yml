# ============================================================
# SANAD Platform — Direct Admin User Creation & Password Reset
# ============================================================
# Creates the admin user directly in the production database
# if they don't exist, or resets their password if they do.
# Also ensures tenant, role, and membership exist.
# No deployment required.
#
# This workflow is ONE-TIME USE ONLY.
# Delete it after successful recovery.
# ============================================================

name: Direct Admin Password Reset

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-password-reset
  cancel-in-progress: false

jobs:
  reset:
    name: Direct Password Reset
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production

    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      BOOTSTRAP_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in RENDER_API_KEY RENDER_SERVICE_ID ADMIN_PASSWORD ADMIN_EMAIL; do
            val="${!name:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing secret: ${name}"
              missing=$((missing + 1))
            else
              echo "PRESENT: ${name} (length: ${#val})"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Create admin user and reset password
        id: db-reset
        shell: bash
        run: |
          set -euo pipefail
          set +x

          echo "::add-mask::${RENDER_API_KEY}"
          echo "::add-mask::${ADMIN_EMAIL}"
          echo "::add-mask::${ADMIN_PASSWORD}"

          # ---- Fetch DB credentials from Render ----
          RENDER_ENV=$(curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")

          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/render-env-flat.json

          DB_RAW_URL=$(jq -r '.[] | select(.key == "DATABASE_URL") | .value' /tmp/render-env-flat.json)
          DB_USERNAME=$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value' /tmp/render-env-flat.json)
          DB_PASSWORD=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value' /tmp/render-env-flat.json)

          echo "DB_RAW_URL length: ${#DB_RAW_URL}"
          echo "DB_USERNAME length: ${#DB_USERNAME}"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"

          if [ -z "$DB_RAW_URL" ]; then
            echo "::error::DATABASE_URL missing from Render env vars"
            exit 1
          fi

          echo "::add-mask::${DB_RAW_URL}"
          echo "::add-mask::${DB_USERNAME}"
          echo "::add-mask::${DB_PASSWORD}"

          # ---- Parse JDBC URL into components ----
          if echo "$DB_RAW_URL" | grep -q '^jdbc:postgresql://'; then
            BASE_URL=$(echo "$DB_RAW_URL" | sed 's|^jdbc:postgresql://||')
            export DB_HOST=$(echo "$BASE_URL" | cut -d'/' -f1 | cut -d':' -f1)
            export DB_PORT=$(echo "$BASE_URL" | cut -d'/' -f1 | cut -d':' -f2 -s)
            export DB_NAME=$(echo "$BASE_URL" | cut -d'/' -f2 | cut -d'?' -f1)
            if [ -z "$DB_PORT" ]; then export DB_PORT="5432"; fi
          else
            echo "::error::Unexpected DATABASE_URL format"
            exit 1
          fi

          echo "DB_HOST: ${DB_HOST}"
          echo "DB_PORT: ${DB_PORT}"
          echo "DB_NAME: ${DB_NAME}"

          # ---- Install dependencies ----
          pip install bcrypt psycopg2-binary -q 2>/dev/null || pip3 install bcrypt psycopg2-binary -q

          # ---- Export env vars for Python ----
          export ADMIN_EMAIL
          export ADMIN_PASSWORD
          export DB_USERNAME
          export DB_PASSWORD
          export BOOTSTRAP_TENANT_ID

          # ---- Run the user creation / password reset script ----
          python3 << 'PYSCRIPT'
          import psycopg2
          import psycopg2.extras
          import bcrypt
          import os
          import sys
          import uuid
          from datetime import datetime, timezone

          # Register UUID adapter so psycopg2 can handle uuid.UUID objects
          psycopg2.extras.register_uuid()

          db_host = os.environ.get("DB_HOST", "")
          db_port = os.environ.get("DB_PORT", "5432")
          db_name = os.environ.get("DB_NAME", "postgres")
          db_user = os.environ.get("DB_USERNAME", "")
          db_pass = os.environ.get("DB_PASSWORD", "")
          admin_email = os.environ["ADMIN_EMAIL"]
          admin_password = os.environ["ADMIN_PASSWORD"]
          tenant_id_str = os.environ.get("BOOTSTRAP_TENANT_ID", "")

          print(f"Connecting to production database...")
          try:
              conn = psycopg2.connect(
                  host=db_host,
                  port=int(db_port),
                  dbname=db_name,
                  user=db_user,
                  password=db_pass,
                  connect_timeout=15,
                  sslmode="require"
              )
              conn.autocommit = True
              cur = conn.cursor()

              # ---- Step 1: Ensure tenant exists ----
              tenant_id = None
              if tenant_id_str:
                  try:
                      tenant_id = uuid.UUID(tenant_id_str.strip())
                  except ValueError:
                      print(f"Invalid BOOTSTRAP_TENANT_ID: {tenant_id_str}")

              if tenant_id:
                  cur.execute("SELECT id, name, status FROM tenants WHERE id = %s", (tenant_id,))
                  tenant_row = cur.fetchone()
                  if tenant_row:
                      print(f"Found tenant: id={tenant_row[0]}, name={tenant_row[1]}, status={tenant_row[2]}")
                      if tenant_row[2] != 'ACTIVE':
                          cur.execute("UPDATE tenants SET status = 'ACTIVE' WHERE id = %s", (tenant_id,))
                          print(f"Tenant activated: {tenant_id}")
                  else:
                      print(f"Tenant {tenant_id} not found — creating it")
                      cur.execute(
                          "INSERT INTO tenants (id, name, subdomain, status, created_at, updated_at) VALUES (%s, %s, %s, %s, %s, %s)",
                          (tenant_id, "SANAD Platform", "sanad", "ACTIVE", datetime.now(timezone.utc), datetime.now(timezone.utc))
                      )
                      print(f"Tenant created: {tenant_id}")
              else:
                  # Find or create any active tenant
                  cur.execute("SELECT id, name, status FROM tenants WHERE status = 'ACTIVE' LIMIT 1")
                  tenant_row = cur.fetchone()
                  if tenant_row:
                      tenant_id = tenant_row[0]
                      print(f"Using existing tenant: id={tenant_id}, name={tenant_row[1]}")
                  else:
                      tenant_id = uuid.uuid4()
                      cur.execute(
                          "INSERT INTO tenants (id, name, subdomain, status, created_at, updated_at) VALUES (%s, %s, %s, %s, %s, %s)",
                          (tenant_id, "SANAD Platform", "sanad", "ACTIVE", datetime.now(timezone.utc), datetime.now(timezone.utc))
                      )
                      print(f"Created new tenant: id={tenant_id}")

              # ---- Step 2: Find or create admin user ----
              normalized_email = admin_email.strip().lower()
              cur.execute(
                  "SELECT id, email, status, must_change_password FROM users WHERE tenant_id = %s AND LOWER(email) = LOWER(%s) LIMIT 1",
                  (tenant_id, normalized_email)
              )
              user = cur.fetchone()

              # Generate BCrypt hash
              hashed = bcrypt.hashpw(admin_password.encode('utf-8'), bcrypt.gensalt(12))
              password_hash = hashed.decode('utf-8')
              print(f"BCrypt hash generated (length: {len(password_hash)})")

              if user:
                  user_id, email, status, must_change = user
                  print(f"Found existing user: id={user_id}, email={email}, status={status}")
                  # Update password and force change
                  cur.execute(
                      """UPDATE users
                         SET password_hash = %s,
                             must_change_password = true,
                             password_set_at = %s,
                             password_set_by = 'direct-db-reset',
                             status = 'ACTIVE',
                             session_version = session_version + 1
                         WHERE id = %s""",
                      (password_hash, datetime.now(timezone.utc), user_id)
                  )
                  print(f"Password updated for existing user {user_id}")
              else:
                  # Create new admin user
                  user_id = uuid.uuid4()
                  now = datetime.now(timezone.utc)
                  cur.execute(
                      """INSERT INTO users
                         (id, tenant_id, email, display_name, status, password_hash,
                          must_change_password, password_set_at, password_set_by, session_version,
                          created_at, updated_at)
                         VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s)""",
                      (user_id, tenant_id, normalized_email, "SANAD Admin", "ACTIVE",
                       password_hash, True, now, "direct-db-reset", 1, now, now)
                  )
                  print(f"Created new admin user: id={user_id}, email={normalized_email}")

              # ---- Step 3: Ensure ADMIN role exists ----
              cur.execute("SELECT id, code, status FROM roles WHERE tenant_id = %s AND code = 'ADMIN' LIMIT 1", (tenant_id,))
              admin_role = cur.fetchone()
              if admin_role:
                  role_id = admin_role[0]
                  print(f"Found ADMIN role: id={role_id}, status={admin_role[2]}")
                  if admin_role[2] != 'ACTIVE':
                      cur.execute("UPDATE roles SET status = 'ACTIVE' WHERE id = %s", (role_id,))
                      print(f"ADMIN role activated")
              else:
                  role_id = uuid.uuid4()
                  now = datetime.now(timezone.utc)
                  cur.execute(
                      "INSERT INTO roles (id, tenant_id, code, name, description, status, created_at, updated_at) VALUES (%s, %s, %s, %s, %s, %s, %s, %s)",
                      (role_id, tenant_id, "ADMIN", "Administrator", "Tenant-wide administrative access", "ACTIVE", now, now)
                  )
                  print(f"Created ADMIN role: id={role_id}")

              # ---- Step 4: Ensure user-role assignment exists ----
              cur.execute(
                  "SELECT id, status FROM user_role_assignments WHERE tenant_id = %s AND user_id = %s AND role_id = %s AND organization_id IS NULL LIMIT 1",
                  (tenant_id, user_id, role_id)
              )
              role_assignment = cur.fetchone()
              if role_assignment:
                  if role_assignment[1] != 'ACTIVE':
                      cur.execute("UPDATE user_role_assignments SET status = 'ACTIVE' WHERE id = %s", (role_assignment[0],))
                      print(f"Role assignment activated")
                  else:
                      print(f"Role assignment already active")
              else:
                  assignment_id = uuid.uuid4()
                  now = datetime.now(timezone.utc)
                  cur.execute(
                      "INSERT INTO user_role_assignments (id, tenant_id, user_id, role_id, organization_id, status, created_at, updated_at) VALUES (%s, %s, %s, %s, %s, %s, %s, %s)",
                      (assignment_id, tenant_id, user_id, role_id, None, "ACTIVE", now, now)
                  )
                  print(f"Created role assignment: user {user_id} -> ADMIN")

              # ---- Step 5: Ensure organization and membership ----
              cur.execute("SELECT id, name FROM organizations WHERE tenant_id = %s LIMIT 1", (tenant_id,))
              org = cur.fetchone()
              if not org:
                  org_id = uuid.uuid4()
                  now = datetime.now(timezone.utc)
                  cur.execute(
                      "INSERT INTO organizations (id, tenant_id, name, description, status, created_at, updated_at) VALUES (%s, %s, %s, %s, %s, %s, %s)",
                      (org_id, tenant_id, "Default Organization", "Default organization created during admin setup", "ACTIVE", now, now)
                  )
                  print(f"Created organization: id={org_id}")
              else:
                  org_id = org[0]
                  print(f"Found organization: id={org_id}, name={org[1]}")

              # Ensure membership
              cur.execute(
                  "SELECT id, status FROM organization_memberships WHERE tenant_id = %s AND organization_id = %s AND email = %s LIMIT 1",
                  (tenant_id, org_id, normalized_email)
              )
              membership = cur.fetchone()
              if membership:
                  if membership[1] != 'ACTIVE':
                      cur.execute("UPDATE organization_memberships SET status = 'ACTIVE', user_id = %s WHERE id = %s", (user_id, membership[0]))
                      print(f"Membership activated")
                  else:
                      # Check if user_id is set
                      cur.execute("UPDATE organization_memberships SET user_id = %s WHERE id = %s AND user_id IS NULL", (user_id, membership[0]))
                      print(f"Membership already active")
              else:
                  membership_id = uuid.uuid4()
                  now = datetime.now(timezone.utc)
                  cur.execute(
                      "INSERT INTO organization_memberships (id, tenant_id, organization_id, email, display_name, user_id, status, created_at, updated_at) VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s)",
                      (membership_id, tenant_id, org_id, normalized_email, "SANAD Admin", user_id, "ACTIVE", now, now)
                  )
                  print(f"Created organization membership")

              # ---- Step 6: Revoke all refresh tokens ----
              cur.execute("DELETE FROM refresh_tokens WHERE user_id = %s", (user_id,))
              print(f"Refresh tokens revoked")

              # ---- Step 7: Verify ----
              cur.execute(
                  "SELECT id, email, status, must_change_password, password_set_by FROM users WHERE id = %s",
                  (user_id,)
              )
              verified = cur.fetchone()
              print(f"\n=== VERIFICATION ===")
              print(f"User ID: {verified[0]}")
              print(f"Email: {verified[1]}")
              print(f"Status: {verified[2]}")
              print(f"Must change password: {verified[3]}")
              print(f"Password set by: {verified[4]}")

              # Output for next steps
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"tenant_id={tenant_id}\n")
                  f.write(f"user_id={user_id}\n")
                  f.write(f"email={verified[1]}\n")
                  f.write(f"reset_success=true\n")

              cur.close()
              conn.close()
              print("\nDatabase admin user creation/reset complete!")

          except Exception as e:
              print(f"Database error: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          PYSCRIPT

          # ---- Clean up Render env vars (disable bootstrap) ----
          echo "Cleaning up Render env vars..."

          jq 'del(.[] | select(.key | startswith("BOOTSTRAP_")))' /tmp/render-env-flat.json > /tmp/render-env-no-bootstrap.json

          jq -n '[{"key":"BOOTSTRAP_ENABLED","value":"false"},{"key":"BOOTSTRAP_FORCE_RESET","value":"false"}]' > /tmp/bootstrap-disabled.json

          jq -s '.[0] + .[1]' /tmp/render-env-no-bootstrap.json /tmp/bootstrap-disabled.json > /tmp/render-clean-env.json

          CLEAN_COUNT=$(jq 'length' /tmp/render-clean-env.json)
          echo "Pushing ${CLEAN_COUNT} env vars with bootstrap DISABLED..."

          HTTP_STATUS=$(curl --silent --output /tmp/render-clean-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            --data @/tmp/render-clean-env.json)

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::warning::Failed to clean env vars (HTTP ${HTTP_STATUS})"
          else
            echo "Render env vars cleaned (HTTP ${HTTP_STATUS})"
          fi
          set -x
          rm -f /tmp/render-*.json /tmp/render-*-response.txt

      - name: Verify admin login
        shell: bash
        run: |
          set -euo pipefail
          set +x

          BASE_URL="https://sanad-backend-mcrj.onrender.com"
          TENANT_ID="${{ steps.db-reset.outputs.tenant_id }}"

          if [ -z "$TENANT_ID" ]; then
            TENANT_ID="$BOOTSTRAP_TENANT_ID"
          fi

          echo "Testing login at ${BASE_URL}..."
          echo "Using tenant_id: ${TENANT_ID}"

          LOGIN_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_PASSWORD" \
            --arg tid "$TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          LOGIN_STATUS=$(curl -sS \
            -o /tmp/login_verify.json \
            -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$LOGIN_PAYLOAD" \
            --max-time 30)

          echo "Login response: HTTP ${LOGIN_STATUS}"

          if [ "$LOGIN_STATUS" = "200" ]; then
            echo "PASSWORD RESET SUCCESSFUL - Admin login works!"
            echo "User info from response:"
            jq '.user | {id, email, status, tenantId}' /tmp/login_verify.json 2>/dev/null || echo "(could not parse response)"
          else
            echo "Login response body:"
            cat /tmp/login_verify.json 2>/dev/null | jq . 2>/dev/null || cat /tmp/login_verify.json 2>/dev/null
            echo ""
            echo "::warning::Login returned HTTP ${LOGIN_STATUS}."
            echo "The user was created/updated in the database. The app may need a restart to pick up changes."
            echo "Also, the Supabase pooler might need a few seconds to propagate."
          fi
          set -x
          rm -f /tmp/login_verify.json

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f /tmp/render-*.json /tmp/render-*-response.txt /tmp/login_verify.json

      - name: Reset summary
        if: success()
        run: |
          {
            echo "## Admin User Creation / Password Reset Complete"
            echo ""
            echo "- Method: Direct database user creation + password reset"
            echo "- Bootstrap env vars: CLEANED (disabled)"
            echo "- Admin user: CREATED/UPDATED"
            echo "- ADMIN role: ENSURED"
            echo "- Organization membership: ENSURED"
            echo "- Refresh tokens: REVOKED"
            echo ""
            echo "Email: ${{ steps.db-reset.outputs.email }}"
            echo "User ID: ${{ steps.db-reset.outputs.user_id }}"
            echo "Tenant ID: ${{ steps.db-reset.outputs.tenant_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
