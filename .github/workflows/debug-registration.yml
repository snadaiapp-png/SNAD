name: Debug Registration 500

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Debug Registration Error
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Check backend health
        run: |
          curl -sS --max-time 60 "https://sanad-backend-mcrj.onrender.com/actuator/health" || echo "Backend unreachable"
      
      - name: Try registration and capture response
        run: |
          RESPONSE=$(curl -sS --max-time 30 -X POST "https://sanad-backend-mcrj.onrender.com/api/v1/auth/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"debug-test@snad.app","password":"DebugTest@2026","displayName":"Debug","organizationName":"Debug Org","subdomain":"debug-snad-001","mobileNumber":"0500000000","regionCode":"SA","countryCode":"+966","acceptTerms":true}')
          echo "Response: $RESPONSE"
      
      - name: Get Render service logs
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Render API credentials not configured"
            exit 0
          fi
          echo "Fetching Render service logs..."
          curl -sS --max-time 30 "https://api.render.com/v1/services/$RENDER_SERVICE_ID/logs?limit=50" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" 2>&1 | head -100 || echo "Failed to fetch logs"
