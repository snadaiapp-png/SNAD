# ============================================================
# SANAD Platform — Verify Admin Login
# ============================================================
# Tests the admin login and outputs the tenant ID.
# One-time use — delete after verification.
# ============================================================

name: Verify Admin Login

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Admin Login
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      ADMIN_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      BOOTSTRAP_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}

    steps:
      - name: Fetch tenant ID and test login
        shell: bash
        run: |
          set -euo pipefail
          set +x

          echo "::add-mask::${RENDER_API_KEY}"
          echo "::add-mask::${ADMIN_PASSWORD}"
          echo "::add-mask::${ADMIN_EMAIL}"

          BASE_URL="https://sanad-backend-mcrj.onrender.com"

          # First, wake up the backend
          echo "Waking up backend..."
          for i in $(seq 1 6); do
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 "${BASE_URL}/actuator/health" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Backend is UP!"
              break
            fi
            echo "Attempt $i: HTTP $CODE, waiting..."
            sleep 15
          done

          # Get tenant ID from the database via Render env vars
          pip install psycopg2-binary bcrypt -q 2>/dev/null || pip3 install psycopg2-binary bcrypt -q

          RENDER_ENV=$(curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")

          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/env.json

          DB_RAW_URL=$(jq -r '.[] | select(.key == "DATABASE_URL") | .value' /tmp/env.json)
          DB_USERNAME=$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value' /tmp/env.json)
          DB_PASSWORD=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value' /tmp/env.json)

          echo "::add-mask::${DB_RAW_URL}"
          echo "::add-mask::${DB_USERNAME}"
          echo "::add-mask::${DB_PASSWORD}"

          # Parse JDBC URL
          if echo "$DB_RAW_URL" | grep -q '^jdbc:postgresql://'; then
            BASE_URL_DB=$(echo "$DB_RAW_URL" | sed 's|^jdbc:postgresql://||')
            DB_HOST=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f1)
            DB_PORT=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f2 -s)
            DB_NAME=$(echo "$BASE_URL_DB" | cut -d'/' -f2 | cut -d'?' -f1)
            [ -z "$DB_PORT" ] && DB_PORT="5432"
          fi

          export DB_HOST DB_PORT DB_NAME DB_USERNAME DB_PASSWORD ADMIN_EMAIL BOOTSTRAP_TENANT_ID

          # Query the database for user info and set a known temp password
          python3 << 'PYSCRIPT'
          import psycopg2
          import psycopg2.extras
          import bcrypt
          import os
          import sys
          import uuid

          psycopg2.extras.register_uuid()

          db_host = os.environ.get("DB_HOST", "")
          db_port = int(os.environ.get("DB_PORT", "5432"))
          db_name = os.environ.get("DB_NAME", "postgres")
          db_user = os.environ.get("DB_USERNAME", "")
          db_pass = os.environ.get("DB_PASSWORD", "")
          admin_email = os.environ["ADMIN_EMAIL"]
          tenant_id_str = os.environ.get("BOOTSTRAP_TENANT_ID", "")

          conn = psycopg2.connect(
              host=db_host, port=db_port, dbname=db_name,
              user=db_user, password=db_pass, connect_timeout=15, sslmode="require"
          )
          conn.autocommit = True
          cur = conn.cursor()

          # Find the admin user
          cur.execute(
              "SELECT id, email, status, must_change_password, tenant_id, display_name FROM users WHERE LOWER(email) = LOWER(%s) LIMIT 1",
              (admin_email,)
          )
          user = cur.fetchone()

          if user:
              user_id, email, status, must_change, tenant_id, display_name = user
              print(f"ADMIN USER FOUND:")
              print(f"  ID: {user_id}")
              print(f"  Email: {email}")
              print(f"  Status: {status}")
              print(f"  Must change password: {must_change}")
              print(f"  Tenant ID: {tenant_id}")
              print(f"  Display name: {display_name}")

              # Set a known temporary password for verification
              temp_password = "Sanad@2026!Temp"
              hashed = bcrypt.hashpw(temp_password.encode('utf-8'), bcrypt.gensalt(12))
              password_hash = hashed.decode('utf-8')

              cur.execute(
                  """UPDATE users
                     SET password_hash = %s,
                         must_change_password = false,
                         password_set_at = NOW(),
                         password_set_by = 'login-verify-reset',
                         session_version = session_version + 1
                     WHERE id = %s""",
                  (password_hash, user_id)
              )
              print(f"\nPASSWORD HAS BEEN SET TO A KNOWN TEMPORARY VALUE")
              print(f"You can now login with:")
              print(f"  Email: {email}")
              print(f"  Tenant ID: {tenant_id}")
              print(f"  Password: {temp_password}")
              print(f"\nIMPORTANT: Change this password immediately after logging in!")
          else:
              print(f"No user found with email: {admin_email}")
              cur.execute("SELECT id, email, status, tenant_id FROM users LIMIT 20")
              for row in cur.fetchall():
                  print(f"  User: id={row[0]}, email={row[1]}, status={row[2]}, tenant_id={row[3]}")

          cur.close()
          conn.close()
          PYSCRIPT

          rm -f /tmp/env.json

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f /tmp/env.json
