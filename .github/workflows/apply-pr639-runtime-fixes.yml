name: Apply PR639 Runtime Fixes

on:
  push:
    branches:
      - fix/crm-idempotency-baseline-reconciliation
    paths:
      - .github/workflows/apply-pr639-runtime-fixes.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/crm-idempotency-baseline-reconciliation
          fetch-depth: 0

      - name: Apply exact verified patches
        run: python3 .github/scripts/apply_pr639_runtime_fixes.py

      - name: Commit patched source and tests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'fix(crm): stabilize root redirect and nullable PostgreSQL filters'
          git push origin HEAD:fix/crm-idempotency-baseline-reconciliation
