name: Apply PR639 Runtime Fixes

on:
  push:
    branches:
      - fix/crm-idempotency-baseline-reconciliation
    paths:
      - .github/workflows/apply-pr639-runtime-fixes.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/crm-idempotency-baseline-reconciliation
          fetch-depth: 0

      - name: Apply exact verified patches
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          next_config = Path('apps/web/next.config.ts')
          next_config.write_text('''import type { NextConfig } from "next";

const nextConfig: NextConfig = {
  async redirects() {
    return [
      {
        source: "/crm",
        destination: "/crm/overview",
        permanent: false,
      },
    ];
  },
};

export default nextConfig;
''', encoding='utf-8')

