name: Fix DATABASE_URL

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: 'DATABASE_URL (jdbc:postgresql://...)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  fix:
    name: Fix DATABASE_URL on Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      DATABASE_URL: ${{ inputs.database_url }}
    steps:
      - name: Validate DATABASE_URL format
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DATABASE_URL" =~ ^jdbc:postgresql:// ]] || {
            echo "::error::DATABASE_URL must start with jdbc:postgresql://"
            echo "Got: $DATABASE_URL"
            exit 1
          }
          echo "DATABASE_URL format OK"

      - name: Set DATABASE_URL on Render
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting DATABASE_URL on Render ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"DATABASE_URL\",\"value\":\"$DATABASE_URL\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Verify DATABASE_URL
        shell: bash
        run: |
          set -euo pipefail
          DB_URL=$(curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq -r '[.[]? | (.envVar // .) | select(.key == "DATABASE_URL") | .value] | first // "MISSING"')
          echo "DATABASE_URL length: ${#DB_URL}"
          echo "DATABASE_URL preview: ${DB_URL:0:40}..."

      - name: Trigger deploy
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Triggering deploy ==="
          curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            | jq -r '.id // empty' | xargs echo "Deploy ID:"
