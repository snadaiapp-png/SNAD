name: One-shot Web Dependency Security Autofix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/web-dependency-security-autofix.yml

permissions:
  contents: write

concurrency:
  group: web-dependency-security-autofix
  cancel-in-progress: false

jobs:
  update:
    if: github.head_ref == 'fix/render-only-production-routing'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v6
        with:
          ref: fix/render-only-production-routing
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Override vulnerable transitive production dependencies
        working-directory: apps/web
        shell: bash
        run: |
          set -euo pipefail
          npm pkg set overrides.postcss=8.5.10 overrides.sharp=0.35.3
          npm install
          npm audit --omit=dev --audit-level=high
          npm run build

      - name: Remove one-shot workflow and commit generated lockfile
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/web-dependency-security-autofix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/package.json apps/web/package-lock.json .github/workflows/web-dependency-security-autofix.yml
          git commit -m 'fix(web): override vulnerable production dependencies'
          git push origin HEAD:fix/render-only-production-routing
