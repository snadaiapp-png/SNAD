name: Patch CRM Reconciliation Workflow Context

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-closure-exact-sha.yml'

permissions:
  contents: write

jobs:
  patch:
    name: Patch isolated reconciliation branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      AUTHORIZED_MAIN_SHA: 098a6124c4274a8de65188d1622b336e9d3a2fb4
      TARGET_BRANCH: fix/crm-reconciliation-runner-temp-context
      TARGET_PATH: .github/workflows/crm-idempotency-production-reconciliation.yml
    steps:
      - name: Validate authorized refs
        shell: bash
        run: |
          set -euo pipefail
          MAIN_SHA="$(gh api "/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          test "$MAIN_SHA" = "$AUTHORIZED_MAIN_SHA" || { echo "::error::main moved from authorized SHA"; exit 1; }
          BRANCH_SHA="$(gh api "/repos/${GITHUB_REPOSITORY}/git/ref/heads/${TARGET_BRANCH}" --jq '.object.sha')"
          test -n "$BRANCH_SHA"

      - name: Patch exact invalid context usage
        shell: bash
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}?ref=${TARGET_BRANCH}" > "$RUNNER_TEMP/file.json"
          BLOB_SHA="$(jq -r '.sha' "$RUNNER_TEMP/file.json")"
          jq -r '.content' "$RUNNER_TEMP/file.json" | tr -d '\n' | base64 -d > "$RUNNER_TEMP/workflow.yml"

          python - "$RUNNER_TEMP/workflow.yml" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")
          expression = "$" + "{{ runner.temp }}"
          invalid = f"      EVIDENCE_DIR: {expression}/crm-idempotency-reconciliation\n"
          anchor = '          set -euo pipefail\n          mkdir -p "$EVIDENCE_DIR"\n'
          fixed = (
              '          set -euo pipefail\n'
              '          EVIDENCE_DIR="$RUNNER_TEMP/crm-idempotency-reconciliation"\n'
              '          echo "EVIDENCE_DIR=$EVIDENCE_DIR" >> "$GITHUB_ENV"\n'
              '          mkdir -p "$EVIDENCE_DIR"\n'
          )

          if invalid in text:
              if text.count(invalid) != 1 or text.count(anchor) != 1:
                  raise SystemExit("Expected exact single invalid context and initialization anchor")
              text = text.replace(invalid, "", 1).replace(anchor, fixed, 1)
              path.write_text(text, encoding="utf-8")
              print("patched")
          elif 'echo "EVIDENCE_DIR=$EVIDENCE_DIR" >> "$GITHUB_ENV"' in text and invalid not in text:
              print("already-fixed")
          else:
              raise SystemExit("Workflow is neither in the expected invalid nor fixed state")
          PY

          python - "$RUNNER_TEMP/workflow.yml" <<'PY'
          from pathlib import Path
          import sys
          text = Path(sys.argv[1]).read_text(encoding="utf-8")
          invalid = "      EVIDENCE_DIR: $" + "{{ runner.temp }}/crm-idempotency-reconciliation\n"
          assert invalid not in text
          assert text.count('echo "EVIDENCE_DIR=$EVIDENCE_DIR" >> "$GITHUB_ENV"') == 1
          PY

          CURRENT_CONTENT="$(jq -r '.content' "$RUNNER_TEMP/file.json" | tr -d '\n')"
          NEW_CONTENT="$(base64 -w0 "$RUNNER_TEMP/workflow.yml")"
          if [ "$CURRENT_CONTENT" = "$NEW_CONTENT" ]; then
            echo "Branch already contains the exact fix."
            exit 0
          fi

          jq -n \
            --arg message 'fix(ci): initialize reconciliation evidence after runner starts' \
            --arg content "$NEW_CONTENT" \
            --arg branch "$TARGET_BRANCH" \
            --arg sha "$BLOB_SHA" \
            '{message:$message,content:$content,branch:$branch,sha:$sha}' \
            > "$RUNNER_TEMP/update.json"
          gh api --method PUT "/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}" --input "$RUNNER_TEMP/update.json" > "$RUNNER_TEMP/update-response.json"
          test -n "$(jq -r '.commit.sha // empty' "$RUNNER_TEMP/update-response.json")"
          jq '{commit_sha:.commit.sha,content_sha:.content.sha}' "$RUNNER_TEMP/update-response.json"

      - name: Verify branch file
        shell: bash
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}?ref=${TARGET_BRANCH}" --jq '.content' \
            | tr -d '\n' | base64 -d > "$RUNNER_TEMP/verified.yml"
          python - "$RUNNER_TEMP/verified.yml" <<'PY'
          from pathlib import Path
          import sys
          text = Path(sys.argv[1]).read_text(encoding="utf-8")
          invalid = "      EVIDENCE_DIR: $" + "{{ runner.temp }}/crm-idempotency-reconciliation\n"
          assert invalid not in text
          assert text.count('echo "EVIDENCE_DIR=$EVIDENCE_DIR" >> "$GITHUB_ENV"') == 1
          print("verified")
          PY
