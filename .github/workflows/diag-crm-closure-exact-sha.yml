name: Observe Exact-SHA CRM Closure

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-closure-exact-sha.yml'

permissions:
  contents: read
  actions: write

jobs:
  observe:
    name: Read exact-SHA closure runs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 098a6124c4274a8de65188d1622b336e9d3a2fb4
      TARGET_WORKFLOW: crm-idempotency-production-reconciliation.yml
    steps:
      - name: Validate main and workflow state
        shell: bash
        run: |
          set -euo pipefail
          MAIN_SHA="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          test "$MAIN_SHA" = "$TARGET_SHA" || { echo "::error::main moved from the authorized merge SHA"; exit 1; }
          gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}" > "$RUNNER_TEMP/workflow.json"
          test "$(jq -r '.state' "$RUNNER_TEMP/workflow.json")" = "active" || { echo "::error::Target reconciliation workflow is not active"; exit 1; }
          jq '{id,name,path,state}' "$RUNNER_TEMP/workflow.json"

      - name: Dispatch reconciliation only when absent
        shell: bash
        run: |
          set -euo pipefail
          gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}/runs?head_sha=${TARGET_SHA}&per_page=20" \
            > "$RUNNER_TEMP/reconciliation-runs.json"
          EXISTING="$(jq '[.workflow_runs[] | select(.head_sha == env.TARGET_SHA)] | length' "$RUNNER_TEMP/reconciliation-runs.json")"
          if [ "$EXISTING" = "0" ]; then
            jq -n --arg ref main '{ref:$ref}' > "$RUNNER_TEMP/dispatch.json"
            CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/dispatch-response.txt" -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              -H 'Content-Type: application/json' \
              --data @"$RUNNER_TEMP/dispatch.json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}/dispatches")"
            test "$CODE" = "204" || { echo "::error::Reconciliation dispatch returned ${CODE}"; exit 1; }
            echo "Reconciliation dispatched on main at exact SHA ${TARGET_SHA}."
          else
            echo "Exact-SHA reconciliation already exists; no duplicate dispatch."
          fi

      - name: Read relevant workflow runs
        shell: bash
        run: |
          set -euo pipefail
          sleep 3
          gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&per_page=100" \
            > "$RUNNER_TEMP/all-runs.json"
          gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}/runs?head_sha=${TARGET_SHA}&per_page=20" \
            > "$RUNNER_TEMP/reconciliation-runs.json"
          jq -n \
            --slurpfile all "$RUNNER_TEMP/all-runs.json" \
            --slurpfile reconciliation "$RUNNER_TEMP/reconciliation-runs.json" \
            '{target_sha:env.TARGET_SHA,runs:(([$all[0].workflow_runs[] | select(.name | test("Publish Render Backend Image|CRM-G1|CRM-007"; "i"))] + [$reconciliation[0].workflow_runs[] | select(.head_sha == env.TARGET_SHA)]) | unique_by(.id) | sort_by(.created_at) | map({id,name,path,event,status,conclusion,head_sha,created_at,updated_at,html_url}))}' \
            | tee "$RUNNER_TEMP/closure-runs.json"

      - name: Read failed steps when present
        shell: bash
        run: |
          set -euo pipefail
          jq -r '.runs[] | select(.status == "completed" and .conclusion != "success") | .id' "$RUNNER_TEMP/closure-runs.json" > "$RUNNER_TEMP/failed-run-ids.txt"
          printf '{"failed_runs":[' > "$RUNNER_TEMP/failed-steps.json"
          FIRST=true
          while IFS= read -r run_id; do
            [ -n "$run_id" ] || continue
            gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
              > "$RUNNER_TEMP/jobs-${run_id}.json"
            if [ "$FIRST" = false ]; then printf ',' >> "$RUNNER_TEMP/failed-steps.json"; fi
            FIRST=false
            jq -c --arg run_id "$run_id" '{run_id:($run_id|tonumber),jobs:[.jobs[] | {id,name,status,conclusion,failed_steps:[.steps[] | select(.conclusion == "failure") | {number,name,status,conclusion}]}]}' \
              "$RUNNER_TEMP/jobs-${run_id}.json" >> "$RUNNER_TEMP/failed-steps.json"
          done < "$RUNNER_TEMP/failed-run-ids.txt"
          printf ']}' >> "$RUNNER_TEMP/failed-steps.json"
          cat "$RUNNER_TEMP/failed-steps.json"

      - name: Upload sanitized observation
        uses: actions/upload-artifact@v4
        with:
          name: crm-closure-observation-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/workflow.json
            ${{ runner.temp }}/closure-runs.json
            ${{ runner.temp }}/failed-steps.json
          if-no-files-found: error
          retention-days: 1
