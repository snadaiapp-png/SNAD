name: Render Runtime Log Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/render-runtime-log-diagnostics.yml'

permissions:
  contents: read

jobs:
  logs:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: false

      - name: Mask Render environment values
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > env.json
          jq -r '.[]? | (.envVar // .) | .value // empty' env.json | while IFS= read -r value; do
            [ -z "$value" ] || echo "::add-mask::$value"
          done

      - name: Install pinned Render CLI
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/render-oss/cli@ecbf8c98b30e95df4545d70b23a256e8d8a81461
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/render" version

      - name: Fetch failed deployment runtime logs
        shell: bash
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/render" logs \
            --resources "$RENDER_SERVICE_ID" \
            --start 2026-07-03T21:10:00Z \
            --end 2026-07-03T21:29:30Z \
            --type app \
            --limit 1000 \
            --direction forward \
            --output json > runtime-logs.jsonl
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          lines = []
          for raw in Path('runtime-logs.jsonl').read_text(errors='replace').splitlines():
              raw = raw.strip()
              if not raw:
                  continue
              try:
                  obj = json.loads(raw)
                  message = str(obj.get('message', ''))
                  ts = str(obj.get('timestamp', ''))
                  level = str(obj.get('level', ''))
              except json.JSONDecodeError:
                  message, ts, level = raw, '', ''
              message = re.sub(r'(?i)(jdbc:postgresql|postgresql|https?)://[^\s"\']+', r'\1://[REDACTED]', message)
              message = re.sub(r'(?i)(password|secret|token|api[_-]?key)\s*[=:]\s*\S+', r'\1=[REDACTED]', message)
              lines.append((ts, level, message))

          print(f'LOG_RECORDS={len(lines)}')
          important = re.compile(r'(?i)(error|exception|caused by|failed|fatal|killed|outofmemory|oom|cannot|refused|timeout|port|flyway|database|postgres|startup)')
          selected = [row for row in lines if important.search(row[2]) or important.search(row[1])]
          if not selected:
              selected = lines[-120:]
          for ts, level, message in selected[-250:]:
              print(f'{ts} {level} {message}')
          PY
