name: Render Runtime Log Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/render-runtime-log-diagnostics.yml'

permissions:
  contents: read

jobs:
  logs:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_CLI_VERSION: '2.21.0'
    steps:
      - name: Mask Render environment values
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > env.json
          jq -r '.[]? | (.envVar // .) | .value // empty | select(length >= 8)' env.json | while IFS= read -r value; do
            echo "::add-mask::$value"
          done

      - name: Install pinned Render CLI release
        shell: bash
        run: |
          set -euo pipefail
          asset="cli_${RENDER_CLI_VERSION}_linux_amd64.zip"
          url="https://github.com/render-oss/cli/releases/download/v${RENDER_CLI_VERSION}/${asset}"
          curl --fail-with-body --location --silent --show-error "$url" -o render-cli.zip
          unzip -q render-cli.zip -d render-cli
          binary=$(find render-cli -type f -name 'cli_v*' | head -n 1)
          test -n "$binary"
          chmod +x "$binary"
          echo "RENDER_CLI=$PWD/$binary" >> "$GITHUB_ENV"
          "$binary" --version

      - name: Fetch failed deployment runtime logs
        shell: bash
        run: |
          set -euo pipefail
          "$RENDER_CLI" logs \
            --resources "$RENDER_SERVICE_ID" \
            --start 2026-07-03T21:10:00Z \
            --end 2026-07-03T21:29:30Z \
            --type app \
            --limit 1000 \
            --direction forward \
            --output json > runtime-logs.jsonl
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          lines = []
          for raw in Path('runtime-logs.jsonl').read_text(errors='replace').splitlines():
              raw = raw.strip()
              if not raw:
                  continue
              try:
                  obj = json.loads(raw)
                  message = str(obj.get('message', ''))
                  ts = str(obj.get('timestamp', ''))
                  level = str(obj.get('level', ''))
              except json.JSONDecodeError:
                  message, ts, level = raw, '', ''
              message = re.sub(r'(?i)(jdbc:postgresql|postgresql|https?)://[^\s"\']+', r'\1://[REDACTED]', message)
              message = re.sub(r'(?i)(password|secret|token|api[_-]?key)\s*[=:]\s*\S+', r'\1=[REDACTED]', message)
              lines.append((ts, level, message))

          print(f'LOG_RECORDS={len(lines)}')
          important = re.compile(r'(?i)(error|exception|caused by|failed|fatal|killed|outofmemory|oom|cannot|refused|timeout|port|flyway|database|postgres|startup|terminated|exit)')
          selected = [row for row in lines if important.search(row[2]) or important.search(row[1])]
          if not selected:
              selected = lines[-120:]
          for ts, level, message in selected[-250:]:
              print(f'{ts} {level} {message}')
          PY
