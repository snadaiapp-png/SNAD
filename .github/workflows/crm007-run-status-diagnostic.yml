name: CRM-007 Run Status Diagnostic

on:
  push:
    branches:
      - diag/crm007-run-status
    paths:
      - .github/workflows/crm007-run-status-diagnostic.yml

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/crm007-run-status
      - name: Capture dispatcher and CRM-007 runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/diagnostics
          capture_runs() {
            local workflow="$1" output="$2"
            curl --fail-with-body --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?per_page=20" \
              | jq '{captured_at:(now|todate),runs:[.workflow_runs[] | {id,status,conclusion,event,head_sha,head_branch,run_number,created_at,updated_at,html_url}]}' \
              > "evidence/diagnostics/${output}"
          }
          capture_runs crm-007-final-production-closure.yml crm007-run-status.json
          capture_runs dispatch-crm007-once.yml crm007-dispatcher-status.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evidence/diagnostics/crm007-run-status.json evidence/diagnostics/crm007-dispatcher-status.json
          git commit -m 'docs(diag): refresh CRM-007 action status after REST dispatch'
          git push origin HEAD:diag/crm007-run-status

          echo 'Status refresh generation: 2'
