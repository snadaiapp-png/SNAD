name: CRM Authenticated Acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/**'
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/security/**'
      - 'apps/sanad-platform/src/main/resources/**'
      - 'apps/sanad-platform/src/test/resources/**'
      - 'apps/sanad-platform/pom.xml'
      - 'apps/web/app/crm/**'
      - 'apps/web/e2e/**'
      - 'apps/web/lib/api/**'
      - 'apps/web/package.json'
      - 'apps/web/package-lock.json'
      - 'apps/web/playwright*.config.ts'
      - 'scripts/crm/**'
      - 'docs/crm/**'
      - '.github/workflows/crm-authenticated-acceptance.yml'
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/**'
      - 'apps/sanad-platform/src/main/resources/**'
      - 'apps/sanad-platform/src/test/resources/**'
      - 'apps/web/app/crm/**'
      - 'apps/web/e2e/**'
      - 'apps/web/lib/api/**'
      - 'apps/web/playwright*.config.ts'
      - 'scripts/crm/**'
      - '.github/workflows/crm-authenticated-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-authenticated-acceptance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  authenticated-acceptance:
    name: CRM Authenticated Acceptance (PostgreSQL + Spring Boot + Next.js + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sanad_test
          POSTGRES_PASSWORD: sanad_test_pass
          POSTGRES_DB: sanad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sanad_test -d sanad_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: jdbc:postgresql://127.0.0.1:5432/sanad_test
      DATABASE_USERNAME: sanad_test
      DATABASE_PASSWORD: sanad_test_pass
      DATABASE_NAME: sanad_test
      SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/sanad_test
      SPRING_DATASOURCE_USERNAME: sanad_test
      SPRING_DATASOURCE_PASSWORD: sanad_test_pass
      SPRING_PROFILES_ACTIVE: crm-acceptance
      SPRING_FLYWAY_OUT_OF_ORDER: 'true'
      FLYWAY_ENABLED: 'true'
      FLYWAY_BASELINE_ON_MIGRATE: 'true'
      FLYWAY_VALIDATE_ON_MIGRATE: 'true'
      JPA_DDL_AUTO: validate
      SERVER_PORT: '8080'
      JWT_ISSUER: sanad-platform-ci
      JWT_ACCESS_TOKEN_TTL: 60m
      REFRESH_TOKEN_TTL: 720h
      COOKIE_SECURE: 'false'
      COOKIE_SAME_SITE: lax
      BOOTSTRAP_ENABLED: 'false'
      SANAD_CORS_ALLOWED_ORIGINS: http://127.0.0.1:3001
      SANAD_CRM_IMPORT_WORKER_ENABLED: 'true'
      SANAD_CRM_IMPORT_WORKER_INITIAL_DELAY_MS: '2000'
      SANAD_CRM_IMPORT_WORKER_DELAY_MS: '2000'
      CRM_CUSTOM_FIELD_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SECURITY_NOTIFICATION_PROVIDER: disabled
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
      CRM_TENANT_A_EMAIL: tenant-a-admin@snad-crm-acceptance.example
      CRM_TENANT_A_PASSWORD: TestPass123!
      CRM_TENANT_B_EMAIL: tenant-b-admin@snad-crm-acceptance.example
      CRM_TENANT_B_PASSWORD: TestPass123!
      CRM_READONLY_EMAIL: tenant-a-readonly@snad-crm-acceptance.example
      CRM_READONLY_PASSWORD: TestPass123!
      CRM_LEAD_WRITER_EMAIL: tenant-a-lead-writer@snad-crm-acceptance.example
      CRM_LEAD_WRITER_PASSWORD: TestPass123!
      CRM_IMPORT_READER_EMAIL: tenant-a-import-reader@snad-crm-acceptance.example
      CRM_IMPORT_READER_PASSWORD: TestPass123!
    steps:
      - name: Checkout exact SHA
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate per-run secrets
        shell: bash
        run: |
          set -euo pipefail
          echo "JWT_SECRET=$(openssl rand -base64 48 | tr -d '\n')" >> "$GITHUB_ENV"
          echo "SANAD_CONTROL_PLANE_TENANT_ID=$(uuidgen)" >> "$GITHUB_ENV"

      - name: Validate acceptance inputs
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/crm/validate_seed_uuids.py \
            apps/sanad-platform/src/test/resources/sql/crm-acceptance-seed.sql
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/crm-authenticated-acceptance.yml"); puts "workflow YAML valid"'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build Spring Boot backend
        working-directory: apps/sanad-platform
        run: mvn --batch-mode --no-transfer-progress -DskipTests -Dmaven.test.skip=true clean package

      - name: Run Flyway migrations
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress flyway:migrate \
            -Dflyway.url="$DATABASE_URL" \
            -Dflyway.user="$DATABASE_USERNAME" \
            -Dflyway.password="$DATABASE_PASSWORD" \
            -Dflyway.locations=classpath:db/migration \
            -Dflyway.baselineOnMigrate=true \
            -Dflyway.validateOnMigrate=true \
            -Dflyway.outOfOrder=true \
            -Dflyway.baselineVersion=0

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Seed CRM acceptance data
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          PGPASSWORD="$DATABASE_PASSWORD" psql \
            -h 127.0.0.1 -U "$DATABASE_USERNAME" -d "$DATABASE_NAME" \
            -v ON_ERROR_STOP=1 \
            -f src/test/resources/sql/crm-acceptance-seed.sql

      - name: Validate seeded identities and roles
        shell: bash
        run: |
          set -euo pipefail
          query() {
            PGPASSWORD="$DATABASE_PASSWORD" psql \
              -h 127.0.0.1 -U "$DATABASE_USERNAME" -d "$DATABASE_NAME" \
              -v ON_ERROR_STOP=1 -Atc "$1"
          }
          test "$(query "SELECT COUNT(*) FROM tenants WHERE id IN ('11111111-1111-4111-8111-111111111111','22222222-2222-4222-8222-222222222222')")" = "2"
          test "$(query "SELECT COUNT(*) FROM users WHERE email LIKE '%@snad-crm-acceptance.example'")" = "5"
          test "$(query "SELECT COUNT(*) FROM organization_memberships WHERE tenant_id IN ('11111111-1111-4111-8111-111111111111','22222222-2222-4222-8222-222222222222')")" = "5"
          test "$(query "SELECT COUNT(*) FROM roles WHERE tenant_id IN ('11111111-1111-4111-8111-111111111111','22222222-2222-4222-8222-222222222222')")" -ge "5"

      - name: Start Spring Boot backend
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/crm-acceptance"
          BACKEND_LOG="$RUNNER_TEMP/crm-acceptance/backend.log"
          JAR_PATH="$(find apps/sanad-platform/target -name 'sanad-platform-*.jar' ! -name '*-sources.jar' | head -n1)"
          test -n "$JAR_PATH"
          java -jar "$JAR_PATH" --spring.profiles.active=crm-acceptance --spring.flyway.out-of-order=true > "$BACKEND_LOG" 2>&1 &
          BACKEND_PID=$!
          echo "pid=$BACKEND_PID" >> "$GITHUB_OUTPUT"
          echo "log=$BACKEND_LOG" >> "$GITHUB_OUTPUT"
          for i in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null; then exit 0; fi
            if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              tail -120 "$BACKEND_LOG" || true
              exit 1
            fi
            sleep 3
          done
          tail -120 "$BACKEND_LOG" || true
          exit 1

      - name: Smoke-test seeded logins
        shell: bash
        run: |
          set -euo pipefail
          for email in "$CRM_TENANT_A_EMAIL" "$CRM_TENANT_B_EMAIL" "$CRM_READONLY_EMAIL" "$CRM_LEAD_WRITER_EMAIL" "$CRM_IMPORT_READER_EMAIL"; do
            curl --fail --silent --show-error \
              -X POST http://127.0.0.1:8080/api/v1/auth/login \
              -H 'Content-Type: application/json' \
              -d "{\"email\":\"$email\",\"password\":\"TestPass123!\"}" \
              | python3 -c 'import json,sys; assert json.load(sys.stdin).get("accessToken")'
          done

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install acceptance-only accessibility package
        working-directory: apps/web
        run: npm install --no-save --no-package-lock @axe-core/playwright@4.10.2

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Build Next.js production bundle
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8080
        run: npm run build

      - name: Start Next.js frontend
        id: frontend
        working-directory: apps/web
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:8080
        shell: bash
        run: |
          set -euo pipefail
          FRONTEND_LOG="$RUNNER_TEMP/crm-acceptance/frontend.log"
          NEXT_TELEMETRY_DISABLED=1 NODE_ENV=production \
            ./node_modules/.bin/next start -H 127.0.0.1 -p 3001 > "$FRONTEND_LOG" 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"
          echo "log=$FRONTEND_LOG" >> "$GITHUB_OUTPUT"
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3001/ >/dev/null; then exit 0; fi
            sleep 2
          done
          tail -100 "$FRONTEND_LOG" || true
          exit 1

      - name: Run CRM Playwright acceptance tests
        working-directory: apps/web
        env:
          SANAD_BACKEND_BASE_URL: http://127.0.0.1:8080
        run: npx playwright test --config=playwright.crm-acceptance.config.ts --reporter=html,list

      - name: Stop services
        if: always()
        shell: bash
        run: |
          kill ${{ steps.frontend.outputs.pid }} 2>/dev/null || true
          kill ${{ steps.backend.outputs.pid }} 2>/dev/null || true

      - name: Upload CRM Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-playwright-report-${{ github.run_id }}
          path: apps/web/crm-playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload CRM test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-playwright-results-${{ github.run_id }}
          path: apps/web/test-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-service-logs-${{ github.run_id }}
          path: ${{ runner.temp }}/crm-acceptance/*.log
          if-no-files-found: warn
          retention-days: 14
