name: CRM Contact 500 Stack Trace

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/crm-contact-500-stacktrace.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-contact-500-stacktrace
  cancel-in-progress: false

jobs:
  reproduce:
    name: Reproduce scoped Contact Create and capture Render error
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      WEB_BASE_URL: https://snad-app.vercel.app
      PROD_JDBC_URL: ${{ secrets.PROD_JDBC_URL }}
      PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
      CRM_TENANT_A_EMAIL: ${{ secrets.CRM_TENANT_A_EMAIL || secrets.AUTH_SMOKE_TENANT_A_EMAIL }}
      CRM_TENANT_A_PASSWORD: ${{ secrets.CRM_TENANT_A_PASSWORD || secrets.AUTH_SMOKE_TENANT_A_PASSWORD }}
      AUTH_TENANT_A_ID: ${{ secrets.AUTH_SMOKE_TENANT_A_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Checkout exact current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Reproduce and collect redacted evidence
        shell: bash
        run: |
          set -euo pipefail

          for value in \
            "$PROD_JDBC_URL" "$PROD_DB_USER" "$PROD_DB_PASSWORD" \
            "$CRM_TENANT_A_EMAIL" "$CRM_TENANT_A_PASSWORD" \
            "$RENDER_API_KEY" "$RENDER_SERVICE_ID"; do
            test -n "$value" || { echo "::error::A required Production secret is missing"; exit 1; }
            echo "::add-mask::$value"
          done
          [[ "$PROD_JDBC_URL" == jdbc:postgresql://* ]]
          [[ "$RENDER_SERVICE_ID" == srv-* ]]
          if [ -n "$AUTH_TENANT_A_ID" ]; then
            echo "::add-mask::$AUTH_TENANT_A_ID"
          fi

          EVIDENCE_DIR="$RUNNER_TEMP/crm-contact-500-stacktrace"
          rm -rf "$EVIDENCE_DIR"
          mkdir -p "$EVIDENCE_DIR"
          STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RELEASE_SHA="$(git rev-parse HEAD)"
          CORRELATION_ID="$(cat /proc/sys/kernel/random/uuid)"

          PSQL_URL="${PROD_JDBC_URL#jdbc:}"
          export PGPASSWORD="$PROD_DB_PASSWORD"

          TENANT_ID=""
          if [ -n "$AUTH_TENANT_A_ID" ]; then
            AUTH_MATCH_COUNT="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -At \
              -v tenant_id="$AUTH_TENANT_A_ID" -v email="$CRM_TENANT_A_EMAIL" <<'SQLAUTH'
          SELECT count(*)
            FROM users
           WHERE tenant_id = :'tenant_id'::uuid
             AND lower(email) = lower(:'email')
             AND status = 'ACTIVE';
          SQLAUTH
            )"
            if [ "$AUTH_MATCH_COUNT" = "1" ]; then
              TENANT_ID="$AUTH_TENANT_A_ID"
            fi
          fi

          if [ -z "$TENANT_ID" ]; then
            mapfile -t MATCHING_TENANTS < <(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -At \
              -v email="$CRM_TENANT_A_EMAIL" <<'SQLTENANTS'
          SELECT DISTINCT tenant_id
            FROM users
           WHERE lower(email) = lower(:'email')
             AND status = 'ACTIVE'
           ORDER BY tenant_id;
          SQLTENANTS
            )
            test "${#MATCHING_TENANTS[@]}" = "1" || {
              jq -n --argjson count "${#MATCHING_TENANTS[@]}" \
                '{result:"FAIL",reason:"AMBIGUOUS_ACTIVE_LOGIN_IDENTITY",matching_tenant_count:$count}' \
                > "$EVIDENCE_DIR/login-scope.json"
              echo "::error::Unable to resolve one tenant for the diagnostic identity"
              exit 1
            }
            TENANT_ID="${MATCHING_TENANTS[0]}"
          fi
          echo "::add-mask::$TENANT_ID"

          jq -n \
            --arg release "$RELEASE_SHA" \
            --arg started "$STARTED_AT" \
            --arg correlation "$CORRELATION_ID" \
            '{release_sha:$release,started_at_utc:$started,correlation_id:$correlation,request_path:"/api/platform/api/v1/crm/contacts",tenant_scope:"EXPLICIT_REDACTED"}' \
            > "$EVIDENCE_DIR/run-context.json"

          LOGIN_BODY="$(jq -n --arg email "$CRM_TENANT_A_EMAIL" --arg password "$CRM_TENANT_A_PASSWORD" --arg tenantId "$TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tenantId}')"
          LOGIN_STATUS="$(curl --silent --show-error --max-time 45 \
            -D "$EVIDENCE_DIR/login-response-headers.txt" \
            -o "$RUNNER_TEMP/login-response.json" -w '%{http_code}' \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "X-Correlation-ID: ${CORRELATION_ID}-login" \
            --data "$LOGIN_BODY" \
            "$WEB_BASE_URL/api/platform/api/v1/auth/login")"
          jq -n --arg status "$LOGIN_STATUS" '{http_status:($status|tonumber),tenant_scope:"EXPLICIT_REDACTED"}' \
            > "$EVIDENCE_DIR/login-result.json"
          jq '{code,error,message,referenceId}' "$RUNNER_TEMP/login-response.json" \
            > "$EVIDENCE_DIR/login-response-redacted.json" 2>/dev/null || printf '{}\n' > "$EVIDENCE_DIR/login-response-redacted.json"
          test "$LOGIN_STATUS" = "200" || {
            echo "::error::Scoped Production diagnostic login failed with HTTP $LOGIN_STATUS"
            exit 1
          }

          ACCESS_TOKEN="$(jq -r '.accessToken // .data.accessToken // empty' "$RUNNER_TEMP/login-response.json")"
          test -n "$ACCESS_TOKEN" || { echo "::error::Login response did not contain an access token"; exit 1; }
          echo "::add-mask::$ACCESS_TOKEN"

          SUFFIX="$(date -u +%Y%m%d%H%M%S)"
          CONTACT_BODY="$(jq -n \
            --arg given "Diagnostic${SUFFIX}" \
            --arg family "Contact500" \
            --arg email "crm-contact-diagnostic-${SUFFIX}@example.invalid" \
            '{givenName:$given,familyName:$family,primaryEmail:$email,preferredLocale:"ar-SA",timeZone:"Asia/Riyadh",consentSummary:"UNKNOWN"}')"
          printf '%s\n' "$CONTACT_BODY" > "$EVIDENCE_DIR/contact-request-body.json"

          CONTACT_STATUS="$(curl --silent --show-error --max-time 45 \
            -D "$EVIDENCE_DIR/contact-response-headers.txt" \
            -o "$EVIDENCE_DIR/contact-response-body.json" -w '%{http_code}' \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "X-Correlation-ID: ${CORRELATION_ID}" \
            --data "$CONTACT_BODY" \
            "$WEB_BASE_URL/api/platform/api/v1/crm/contacts")"
          jq -n --arg status "$CONTACT_STATUS" --arg correlation "$CORRELATION_ID" \
            '{http_status:($status|tonumber),correlation_id:$correlation}' \
            > "$EVIDENCE_DIR/contact-result.json"

          CONTACT_ID=""
          if [ "$CONTACT_STATUS" = "201" ]; then
            CONTACT_ID="$(jq -r '.id // .contactId // .data.id // empty' "$EVIDENCE_DIR/contact-response-body.json")"
            if [ -n "$CONTACT_ID" ]; then
              ARCHIVE_STATUS="$(curl --silent --show-error --max-time 45 \
                -o "$EVIDENCE_DIR/contact-archive-response.json" -w '%{http_code}' \
                -X PATCH -H 'Accept: application/json' \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -H "X-Correlation-ID: ${CORRELATION_ID}-archive" \
                "$WEB_BASE_URL/api/platform/api/v1/crm/contacts/${CONTACT_ID}/archive")"
              jq -n --arg status "$ARCHIVE_STATUS" '{http_status:($status|tonumber)}' \
                > "$EVIDENCE_DIR/contact-archive-result.json"
            fi
          fi

          curl --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            > "$RUNNER_TEMP/render-service.json"
          RENDER_OWNER_ID="$(jq -r '(.service // .).ownerId // (.service // .).owner.id // empty' "$RUNNER_TEMP/render-service.json")"
          test -n "$RENDER_OWNER_ID" || { echo "::error::Render owner ID unavailable"; exit 1; }

          END_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          curl --get --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            --data-urlencode "ownerId=${RENDER_OWNER_ID}" \
            --data-urlencode "resource=${RENDER_SERVICE_ID}" \
            --data-urlencode "startTime=${STARTED_AT}" \
            --data-urlencode "endTime=${END_TIME}" \
            --data-urlencode "limit=200" \
            https://api.render.com/v1/logs \
            > "$RUNNER_TEMP/render-logs-raw.json"

          export REDACT_EMAIL="$CRM_TENANT_A_EMAIL"
          export REDACT_PASSWORD="$CRM_TENANT_A_PASSWORD"
          export REDACT_TOKEN="$ACCESS_TOKEN"
          export REDACT_TENANT="$TENANT_ID"
          export FILTER_CORRELATION="$CORRELATION_ID"
          python3 - <<'PY'
          import json, os, re
          from pathlib import Path

          source = Path(os.environ['RUNNER_TEMP']) / 'render-logs-raw.json'
          target = Path(os.environ['RUNNER_TEMP']) / 'crm-contact-500-stacktrace' / 'render-contact-error-redacted.json'
          raw = source.read_text(encoding='utf-8', errors='replace')
          for value in (
              os.environ.get('REDACT_EMAIL',''),
              os.environ.get('REDACT_PASSWORD',''),
              os.environ.get('REDACT_TOKEN',''),
              os.environ.get('REDACT_TENANT',''),
          ):
              if value:
                  raw = raw.replace(value, '[REDACTED]')
          raw = re.sub(r'(?i)Bearer\s+[A-Za-z0-9._~+/-]+=*', 'Bearer [REDACTED]', raw)
          data = json.loads(raw)
          entries = data if isinstance(data, list) else data.get('logs') or data.get('items') or [data]
          correlation = os.environ['FILTER_CORRELATION']
          terms = (correlation, '/api/v1/crm/contacts', 'crm_contacts', 'BadSqlGrammarException', 'PSQLException', 'SQLState', 'legal_name')
          def flatten(value):
              if isinstance(value, dict):
                  return ' '.join(flatten(item) for item in value.values())
              if isinstance(value, list):
                  return ' '.join(flatten(item) for item in value)
              return str(value)
          matched = [entry for entry in entries if any(term.lower() in flatten(entry).lower() for term in terms)]
          target.write_text(json.dumps({'correlation_id': correlation, 'matched_entries': matched}, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

          jq -n \
            --arg release "$RELEASE_SHA" \
            --arg started "$STARTED_AT" \
            --arg completed "$END_TIME" \
            --arg status "$CONTACT_STATUS" \
            --arg correlation "$CORRELATION_ID" \
            '{release_sha:$release,started_at_utc:$started,completed_at_utc:$completed,contact_create_http:($status|tonumber),correlation_id:$correlation}' \
            > "$EVIDENCE_DIR/summary.json"

          find "$EVIDENCE_DIR" -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum \
            > "$EVIDENCE_DIR/SHA256SUMS.txt"

          test "$CONTACT_STATUS" = "201" || {
            echo "::error::Contact Create reproduced HTTP $CONTACT_STATUS; inspect immutable stack-trace artifact"
            exit 1
          }

      - name: Upload immutable stack-trace evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-contact-500-stacktrace-${{ github.run_id }}
          path: ${{ runner.temp }}/crm-contact-500-stacktrace
          if-no-files-found: error
          retention-days: 90
