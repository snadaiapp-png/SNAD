name: Self-Hosted Backend Deploy

# ============================================================
# SANAD Platform — Self-Hosted Backend Deployment
# ------------------------------------------------------------
# Deploys the SANAD backend to a self-hosted server via SSH.
# The server must have Docker, Docker Compose, and the repo cloned.
#
# Prerequisites:
#   - SSH key stored as GitHub Secret: SELF_HOSTED_SSH_KEY
#   - Server host stored as GitHub Secret: SELF_HOSTED_SERVER
#   - Server user stored as GitHub Secret: SELF_HOSTED_USER
#   - Docker Compose installed on the server
#   - /srv/sanad/config/.env configured on the server
#
# This workflow runs on push to main after tests pass.
# ============================================================

on:
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/**'
      - '.github/workflows/self-hosted-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'snadaiapp-png/SNAD'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SELF_HOSTED_SERVER }}
          username: ${{ secrets.SELF_HOSTED_USER }}
          key: ${{ secrets.SELF_HOSTED_SSH_KEY }}
          script: |
            cd /srv/sanad/repo
            git pull origin main
            cd apps/sanad-platform
            docker compose -f docker-compose.self-hosted.yml \
              --env-file /srv/sanad/config/.env \
              up -d --build
            
            # Wait for health check
            for i in $(seq 1 30); do
              HEALTH=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000")
              if [ "$HEALTH" = "200" ]; then
                echo "✅ Backend healthy after $i attempts"
                exit 0
              fi
              echo "  [$i] Health: $HEALTH"
              sleep 5
            done
            
            echo "❌ Backend failed health check"
            docker compose -f docker-compose.self-hosted.yml logs --tail 50 backend
            exit 1
