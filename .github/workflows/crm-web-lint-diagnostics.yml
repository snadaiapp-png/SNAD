name: CRM Web Lint Diagnostics

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/crm-web-lint-diagnostics.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Capture lint output
        id: lint
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-web-lint-diagnostics
          path: apps/web/lint.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce lint result
        if: steps.lint.outputs.exit_code != '0'
        run: exit 1
