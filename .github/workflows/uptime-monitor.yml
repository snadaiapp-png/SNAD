name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: uptime-monitor
  cancel-in-progress: true

env:
  BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_BASE_URL || 'https://sanad-backend-mcrj.onrender.com' }}
  FRONTEND_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}

jobs:
  health-check:
    name: Render Backend and Vercel Frontend Health Ping
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate monitoring targets
        shell: bash
        run: |
          set -euo pipefail
          test "${BACKEND_URL%/}" = 'https://sanad-backend-mcrj.onrender.com' || {
            echo '::error::BACKEND_URL must be the production Render origin.'
            exit 1
          }
          test "${FRONTEND_URL%/}" = 'https://snad-app.vercel.app' || {
            echo '::error::FRONTEND_URL must be the production Vercel origin.'
            exit 1
          }

      - name: Check backend health
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          URL="${BACKEND_URL%/}/actuator/health"
          STATUS="000"

          for ATTEMPT in 1 2 3 4; do
            STATUS=$(curl --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              --output /dev/null --write-out '%{http_code}' \
              "$URL" || true)
            STATUS="${STATUS:-000}"

            if [ "$STATUS" = "200" ]; then
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              echo "attempts=$ATTEMPT" >> "$GITHUB_OUTPUT"
              echo "Backend healthy on attempt $ATTEMPT"
              exit 0
            fi

            echo "Backend returned HTTP $STATUS on attempt $ATTEMPT/4"
            [ "$ATTEMPT" = "4" ] || sleep 10
          done

          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "attempts=4" >> "$GITHUB_OUTPUT"

      - name: Check frontend health
        id: frontend
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl --silent --show-error --location \
            --connect-timeout 10 --max-time 30 \
            --output /dev/null --write-out '%{http_code}' \
            "${FRONTEND_URL%/}/" || true)
          STATUS="${STATUS:-000}"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          case "$STATUS" in
            200|301|302) echo "healthy=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "healthy=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create or update incident on failure
        if: steps.backend.outputs.healthy != 'true' || steps.frontend.outputs.healthy != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          gh label create incident --description 'Service incident' --color d73a4a 2>/dev/null || true
          EXISTING=$(gh issue list --label incident --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null)
          BODY="Health check failed at $TIMESTAMP. Backend HTTP: ${{ steps.backend.outputs.status }}. Frontend HTTP: ${{ steps.frontend.outputs.status }}."

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY" || true
          else
            gh issue create --title "Incident: frontend/backend connection unavailable" --body "$BODY" --label incident || true
          fi

      - name: Close incident after recovery
        if: steps.backend.outputs.healthy == 'true' && steps.frontend.outputs.healthy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          EXISTING=$(gh issue list --label incident --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Services recovered at $(date -u +'%Y-%m-%d %H:%M:%S UTC')." || true
            gh issue close "$EXISTING" --reason completed || true
          fi

      - name: Final health enforcement
        if: always()
        shell: bash
        env:
          BACKEND_HEALTHY: ${{ steps.backend.outputs.healthy }}
          FRONTEND_HEALTHY: ${{ steps.frontend.outputs.healthy }}
        run: |
          set -euo pipefail
          test "$BACKEND_HEALTHY" = "true"
          test "$FRONTEND_HEALTHY" = "true"
