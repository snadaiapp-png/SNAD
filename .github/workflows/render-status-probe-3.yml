name: Render Deployment Status Probe 3 Refresh

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/render-status-probe-3.yml

permissions:
  contents: read

jobs:
  probe:
    name: Read current Render deployment state
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Read current provider state
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
            > /tmp/deploys.json

          jq '[.[]? | (.deploy // .)]' /tmp/deploys.json > /tmp/deploys-flat.json
          jq -e 'length > 0' /tmp/deploys-flat.json >/dev/null
          jq '.[0]' /tmp/deploys-flat.json > /tmp/latest.json

          deployment_id=$(jq -r '.id // "unknown"' /tmp/latest.json)
          deployment_status=$(jq -r '.status // "unknown"' /tmp/latest.json)
          deployment_commit=$(jq -r '.commit.id // .commitId // "unknown"' /tmp/latest.json)
          updated_at=$(jq -r '.updatedAt // "unknown"' /tmp/latest.json)
          finished_at=$(jq -r '.finishedAt // "unknown"' /tmp/latest.json)

          echo "LATEST_DEPLOYMENT_ID=$deployment_id"
          echo "LATEST_STATUS=$deployment_status"
          echo "LATEST_COMMIT=$deployment_commit"
          echo "UPDATED_AT=$updated_at"
          echo "FINISHED_AT=$finished_at"
