name: CRM-009 One-Time Finalization V2

on:
  push:
    branches:
      - feature/crm-009-workflow-ai-implementation-20260723
    paths:
      - '.github/workflows/crm-009-finalize-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm-009-one-time-finalization-v2
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890
  BASE_SHA: 74c6618a60ecd983086553cf75f71b5a6c8d2c9a
  EXPECTED_CRM_PATHS: '107'
  EXPECTED_CRM_OPERATIONS: '140'

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout latest branch
        uses: actions/checkout@v4
        with:
          ref: feature/crm-009-workflow-ai-implementation-20260723
          fetch-depth: 0
          persist-credentials: true

      - name: Apply deterministic final patches
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          e2e = Path('apps/web/e2e/crm-integration-workspace.spec.ts')
          text = e2e.read_text(encoding='utf-8')
          old = '''if (request.method() === "POST" && path.endsWith("/cancel")) {
      expect(request.headers()["if-match"]).toBe('"1"');'''
          new = '''if (request.method() === "POST" && path.endsWith("/cancel")) {
      expect(request.headers()["idempotency-key"]).toBeTruthy();
      expect(request.headers()["if-match"]).toBe('"1"');'''
          if old not in text:
              raise SystemExit('Playwright cancellation assertion marker missing')
          e2e.write_text(text.replace(old, new), encoding='utf-8')

          contract = Path('.github/workflows/crm-api-contract-validation.yml')
          text = contract.read_text(encoding='utf-8')
          text = text.replace("EXPECTED_CRM_PATHS: '104'", "EXPECTED_CRM_PATHS: '107'")
          text = text.replace("EXPECTED_CRM_OPERATIONS: '137'", "EXPECTED_CRM_OPERATIONS: '140'")
          marker = "            ('/transfers/{transferId}/cancel','post','If-Match')"
          if "('/integrations/workflows','post','Idempotency-Key')" not in text:
              addition = """            ('/transfers/{transferId}/cancel','post','If-Match'),
            ('/integrations/ai','post','Idempotency-Key'),
            ('/integrations/{requestId}/confirm','post','Idempotency-Key'),
            ('/integrations/{requestId}/confirm','post','If-Match'),
            ('/integrations/{requestId}/reject','post','Idempotency-Key'),
            ('/integrations/{requestId}/reject','post','If-Match'),
            ('/integrations/workflows','post','Idempotency-Key'),
            ('/integrations/workflows/{requestId}/cancel','post','Idempotency-Key'),
            ('/integrations/workflows/{requestId}/cancel','post','If-Match')"""
              if marker not in text:
                  raise SystemExit('Contract required-header insertion marker missing')
              text = text.replace(marker, addition)
          contract.write_text(text, encoding='utf-8')
          PY

      - name: Restore accidentally deleted uploaded assets
        run: git checkout "$BASE_SHA" -- upload/pasted_image_*.png

      - name: Remove superseded temporary sync workflows
        run: |
          rm -f .github/workflows/crm-009-contract-sync.yml
          rm -f .github/workflows/crm-009-finalize-artifacts.yml

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile backend and tests
        working-directory: apps/sanad-platform
        run: mvn -B -ntp -DskipTests compile test-compile

      - name: Start backend for runtime OpenAPI
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081" \
            >/tmp/crm-009-finalize-v2-backend.log 2>&1 &
          echo $! >/tmp/crm-009-finalize-v2-backend.pid

      - name: Generate exact runtime CRM contract
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-009-finalize-v2-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-009-finalize-v2-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              break
            fi
            sleep 2
          done
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output docs/crm/contracts/openapi/crm-openapi.json \
            --prefix /api/v2/crm \
            --expected-paths "$EXPECTED_CRM_PATHS" \
            --expected-operations "$EXPECTED_CRM_OPERATIONS"

      - name: Run focused backend gates
        working-directory: apps/sanad-platform
        run: mvn -B -ntp -Dtest='CrmOpenApiContractTest,PlatformApiCountTest,ServiceJwtProviderTest' test

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Generate TypeScript and verify frontend
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts
          npm run lint

      - name: Commit exact finalization output
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No finalization changes required'
            exit 0
          fi
          git commit -m 'chore(crm-009): finalize contracts tests and branch scope'
          git push origin HEAD:feature/crm-009-workflow-ai-implementation-20260723

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-009-finalize-v2-backend.pid ]; then
            kill "$(cat /tmp/crm-009-finalize-v2-backend.pid)" 2>/dev/null || true
          fi
