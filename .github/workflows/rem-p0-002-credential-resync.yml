name: REM-P0-002 Credential Resynchronization

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/rem-p0-002-credential-resync.yml
      - scripts/operations/rem_p0_002_credential_resync.py
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: rem-p0-002-credential-resynchronization
  cancel-in-progress: false

jobs:
  resynchronize:
    name: One-time production credential reset and acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment: Production
    env:
      PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      AUTH_SMOKE_TENANT_ID: ${{ secrets.AUTH_SMOKE_TENANT_A_ID || secrets.BOOTSTRAP_TENANT_ID }}
      AUTH_SMOKE_EMAIL: ${{ secrets.AUTH_SMOKE_TENANT_A_EMAIL || secrets.SANAD_ADMIN_EMAIL }}
      AUTH_SMOKE_PASSWORD: ${{ secrets.AUTH_SMOKE_TENANT_A_PASSWORD || secrets.SANAD_ADMIN_PASSWORD }}

    steps:
      - name: Checkout current controls
        uses: actions/checkout@v6

      - name: Compile resync and synthetic programs
        run: |
          python3 -m py_compile \
            scripts/operations/rem_p0_002_credential_resync.py \
            scripts/operations/bff_auth_session_synthetic.py

      - name: Resynchronize credential, disable bootstrap, and run acceptance
        run: python3 scripts/operations/rem_p0_002_credential_resync.py

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rem-p0-002-credential-resync-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90

      - name: Record successful synchronization
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const body = [
              '## REM-P0-002 production credential synchronized',
              '',
              '- Official bootstrap force-reset: **PASS**',
              '- Bootstrap disabled and cleanup deployment live: **PASS**',
              '- Backend routing: **PASS**',
              '- Authentication journeys: **5/5 PASS**',
              `- Observation start: \`${now}\``,
              `- Evidence: ${runUrl}`,
              '',
              'The 72-hour consecutive observation window has started. REM-P0-002 remains open until all remaining acceptance conditions are complete.'
            ].join('\n');
            for (const issue_number of [516, 534, 535, 537]) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number, body});
            }
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: 537, state: 'closed', state_reason: 'completed'});

      - name: Record synchronization failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## REM-P0-002 production credential synchronization failed',
              '',
              `- Evidence: ${runUrl}`,
              '- Bootstrap cleanup was enforced by the resync runner.',
              '- Observation window has not started or must be reset.',
              '- REM-P0-002 remains open.'
            ].join('\n');
            for (const issue_number of [516, 534, 535, 537]) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number, body});
            }
