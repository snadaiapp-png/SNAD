name: REM-P0-002 Credential Resynchronization

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/rem-p0-002-credential-resync.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: rem-p0-002-credential-resynchronization
  cancel-in-progress: false

jobs:
  resynchronize:
    name: One-time production credential reset and acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Production
    env:
      PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      AUTH_SMOKE_TENANT_ID: ${{ secrets.AUTH_SMOKE_TENANT_A_ID || secrets.BOOTSTRAP_TENANT_ID }}
      AUTH_SMOKE_EMAIL: ${{ secrets.AUTH_SMOKE_TENANT_A_EMAIL || secrets.SANAD_ADMIN_EMAIL }}
      AUTH_SMOKE_PASSWORD: ${{ secrets.AUTH_SMOKE_TENANT_A_PASSWORD || secrets.SANAD_ADMIN_PASSWORD }}

    steps:
      - name: Checkout current controls
        uses: actions/checkout@v6

      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID AUTH_SMOKE_TENANT_ID AUTH_SMOKE_EMAIL AUTH_SMOKE_PASSWORD; do
            test -n "${!name:-}" || { echo "::error::Missing protected production value: $name"; exit 1; }
            echo "::add-mask::${!name}"
          done
          [[ "$PRODUCTION_WEB_BASE_URL" == https://* ]]

      - name: Resynchronize credential through the production bootstrap service
        id: resync
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          API="https://api.render.com/v1/services/${RENDER_SERVICE_ID}"
          AUTH_HEADER="Authorization: Bearer ${RENDER_API_KEY}"
          ACCEPT_HEADER="Accept: application/json"

          put_var() {
            local key="$1"
            local value="$2"
            local payload
            payload="$(jq -cn --arg value "$value" '{value:$value}')"
            curl --fail-with-body --silent --show-error --max-time 30 \
              -X PUT \
              -H "$AUTH_HEADER" \
              -H "$ACCEPT_HEADER" \
              -H 'Content-Type: application/json' \
              --data "$payload" \
              "${API}/env-vars/${key}" >/dev/null
          }

          trigger_deploy() {
            local response
            response="$(curl --fail-with-body --silent --show-error --max-time 60 \
              -X POST \
              -H "$AUTH_HEADER" \
              -H "$ACCEPT_HEADER" \
              -H 'Content-Type: application/json' \
              --data '{"clearCache":"do_not_clear"}' \
              "${API}/deploys")"
            jq -r '.id // .deploy.id // empty' <<< "$response"
          }

          wait_deploy() {
            local deploy_id="$1"
            local deadline=$((SECONDS + 1500))
            while [ "$SECONDS" -lt "$deadline" ]; do
              local response record status
              response="$(curl --fail-with-body --silent --show-error --max-time 30 \
                -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" \
                "${API}/deploys?limit=50")"
              record="$(jq -c --arg id "$deploy_id" '[.[]? | (.deploy // .) | select(.id == $id)] | first // empty' <<< "$response")"
              if [ -n "$record" ] && [ "$record" != "null" ]; then
                status="$(jq -r '.status // empty' <<< "$record")"
                case "$status" in
                  live) return 0 ;;
                  build_failed|update_failed|canceled|deactivated) echo "::error::Render deployment failed: $status"; return 1 ;;
                esac
              fi
              sleep 10
            done
            echo "::error::Render deployment did not become live within the deadline."
            return 1
          }

          cleanup_bootstrap() {
            set +e
            put_var SANAD_SECURITY_BOOTSTRAP_ENABLED false
            put_var SANAD_SECURITY_BOOTSTRAP_FORCE_RESET false
            cleanup_id="$(trigger_deploy)"
            if [ -n "$cleanup_id" ]; then
              wait_deploy "$cleanup_id"
              cleanup_status=$?
            else
              cleanup_status=1
            fi
            jq -n \
              --arg deployId "${cleanup_id:-UNKNOWN}" \
              --argjson success "$([ "${cleanup_status:-1}" -eq 0 ] && echo true || echo false)" \
              '{bootstrapEnabled:false,forceReset:false,cleanupDeployId:$deployId,cleanupDeployLive:$success}' \
              > evidence/rem-p0-002-bootstrap-cleanup.json
            set -e
          }
          trap cleanup_bootstrap EXIT

          put_var SANAD_SECURITY_BOOTSTRAP_ENABLED true
          put_var SANAD_SECURITY_BOOTSTRAP_FORCE_RESET true
          put_var SANAD_SECURITY_BOOTSTRAP_TENANT_ID "$AUTH_SMOKE_TENANT_ID"
          put_var SANAD_SECURITY_BOOTSTRAP_ADMIN_EMAIL "$AUTH_SMOKE_EMAIL"
          put_var SANAD_SECURITY_BOOTSTRAP_ADMIN_PASSWORD "$AUTH_SMOKE_PASSWORD"
          put_var SANAD_SECURITY_BOOTSTRAP_ADMIN_DISPLAY_NAME "SANAD Synthetic Operator"
          put_var SANAD_SECURITY_BOOTSTRAP_AUDIT_ACTOR "rem-p0-002-credential-resync"

          deploy_id="$(trigger_deploy)"
          test -n "$deploy_id" || { echo "::error::Render did not return a deployment ID."; exit 1; }
          wait_deploy "$deploy_id"

          jq -n \
            --arg deployId "$deploy_id" \
            --arg tenant "$AUTH_SMOKE_TENANT_ID" \
            --arg actor "rem-p0-002-credential-resync" \
            '{finding:"REM-P0-002",operation:"credential-bootstrap-force-reset",deployId:$deployId,tenantId:$tenant,auditActor:$actor,result:"PASS"}' \
            > evidence/rem-p0-002-credential-resync.json

      - name: Wait for backend and BFF readiness
        shell: bash
        run: |
          set -euo pipefail
          passed=false
          for attempt in $(seq 1 60); do
            code="$(curl -sS --show-error --max-time 30 -o "$RUNNER_TEMP/backend.json" -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/system/backend-status" || true)"
            if [ "$code" = "200" ] && jq -e '.configured == true and .reachable == true and .statusCode == 200' "$RUNNER_TEMP/backend.json" >/dev/null 2>&1; then
              passed=true
              break
            fi
            sleep 5
          done
          test "$passed" = true
          jq '. + {result:"PASS"}' "$RUNNER_TEMP/backend.json" > evidence/rem-p0-002-post-resync-routing.json

      - name: Run five production authentication journeys
        env:
          AUTH_SYNTHETIC_ITERATIONS: '5'
          AUTH_SYNTHETIC_EVIDENCE_PATH: evidence/rem-p0-002-post-resync-synthetic.json
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/operations/bff_auth_session_synthetic.py
          python3 scripts/operations/bff_auth_session_synthetic.py

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rem-p0-002-credential-resync-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90

      - name: Record successful synchronization
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## REM-P0-002 production credential synchronized',
              '',
              '- Official production bootstrap force-reset: **PASS**',
              '- Bootstrap disabled after the one-time operation: **PASS**',
              '- Post-reset backend routing: **PASS**',
              '- Authentication journeys: **5/5 PASS**',
              `- Evidence: ${runUrl}`,
              '',
              'The 72-hour consecutive observation window may now begin. The finding remains open until all remaining acceptance criteria are satisfied.'
            ].join('\n');
            for (const issue_number of [516, 534, 535, 537]) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number, body});
            }
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: 537, state: 'closed', state_reason: 'completed'});

      - name: Record synchronization failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## REM-P0-002 production credential synchronization failed',
              '',
              `- Workflow evidence: ${runUrl}`,
              '- Bootstrap cleanup was attempted automatically.',
              '- Observation window has not started or must be reset.',
              '- REM-P0-002 remains open.'
            ].join('\n');
            for (const issue_number of [516, 534, 535, 537]) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number, body});
            }
