# ============================================================
# SANAD Platform — Render Environment Recovery
# DEFECT-004: JWT_SECRET Preservation
# ============================================================
# Recovers Render environment variables after accidental deletion.
# Preserves JWT_SECRET by fetching it from Render before overwriting.
# ============================================================

name: Render Env Recovery

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Commit SHA to deploy after recovery'
        required: true
        default: 'main'
      force_new_jwt_secret:
        description: 'Force generate new JWT_SECRET (invalidates all sessions)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  recover-env:
    name: Restore Render Environment
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target commit
        id: commit
        run: |
          if [ "${{ github.event.inputs.target_commit }}" = "main" ]; then
            SHA=$(git rev-parse origin/main)
          else
            SHA="${{ github.event.inputs.target_commit }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Target commit: ${SHA:0:7}"

      - name: Fetch current JWT_SECRET from Render
        id: jwt
        if: github.event.inputs.force_new_jwt_secret == 'false'
        run: |
          CURRENT_JWT=$(curl --silent \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/env-vars" \
            | jq -r '.[] | select(.key == "JWT_SECRET") | .value // empty' 2>/dev/null || echo "")
          
          if [ -n "$CURRENT_JWT" ] && [ ${#CURRENT_JWT} -ge 32 ]; then
            echo "preserved=true" >> $GITHUB_OUTPUT
            echo "jwt_secret=$CURRENT_JWT" >> $GITHUB_OUTPUT
            echo "✅ Preserved existing JWT_SECRET (${#CURRENT_JWT} chars)"
          else
            echo "preserved=false" >> $GITHUB_OUTPUT
            NEW_JWT=$(openssl rand -base64 48)
            echo "jwt_secret=$NEW_JWT" >> $GITHUB_OUTPUT
            echo "⚠️  Could not fetch JWT_SECRET; generated new one (will invalidate sessions)"
          fi

      - name: Generate new JWT_SECRET if forced
        id: jwt-new
        if: github.event.inputs.force_new_jwt_secret == 'true'
        run: |
          NEW_JWT=$(openssl rand -base64 48)
          echo "jwt_secret=$NEW_JWT" >> $GITHUB_OUTPUT
          echo "⚠️  Generated new JWT_SECRET (force_new_jwt_secret=true)"

      - name: Build and push env vars
        run: |
          # Determine JWT_SECRET to use
          if [ "${{ github.event.inputs.force_new_jwt_secret }}" = "true" ]; then
            JWT="${{ steps.jwt-new.outputs.jwt_secret }}"
          else
            JWT="${{ steps.jwt.outputs.jwt_secret }}"
          fi

          # Build env vars payload
          jq -n \
            --arg jwt "$JWT" \
            --arg db_url "${{ secrets.PRODUCTION_DATABASE_URL }}" \
            --arg db_user "postgres.eyoupksefusnslvdnflt" \
            --arg db_pass "${{ secrets.DATABASE_PASSWORD }}" \
            '[
              {"key": "SPRING_PROFILES_ACTIVE", "value": "prod"},
              {"key": "SERVER_PORT", "value": "8080"},
              {"key": "JWT_SECRET", "value": $jwt},
              {"key": "DATABASE_DRIVER", "value": "org.postgresql.Driver"},
              {"key": "DATABASE_URL", "value": $db_url},
              {"key": "DATABASE_USERNAME", "value": $db_user},
              {"key": "DATABASE_PASSWORD", "value": $db_pass},
              {"key": "JPA_DDL_AUTO", "value": "validate"},
              {"key": "FLYWAY_ENABLED", "value": "true"},
              {"key": "SANAD_CORS_ALLOWED_ORIGINS", "value": "https://snad-app.vercel.app"},
              {"key": "BOOTSTRAP_ENABLED", "value": "false"},
              {"key": "BOOTSTRAP_FORCE_RESET", "value": "false"},
              {"key": "BOOTSTRAP_TENANT_ID", "value": "958bbb1c-eece-4839-bca8-a5bfa14e6ac1"},
              {"key": "BOOTSTRAP_ADMIN_EMAIL", "value": "snad@app.com"},
              {"key": "LOG_LEVEL_ROOT", "value": "INFO"},
              {"key": "LOG_LEVEL_SANAD", "value": "INFO"},
              {"key": "MANAGEMENT_ENDPOINTS", "value": "health"},
              {"key": "SHUTDOWN_TIMEOUT", "value": "30s"},
              {"key": "DATABASE_POOL_MAX", "value": "5"},
              {"key": "DATABASE_POOL_MIN", "value": "1"},
              {"key": "DATABASE_POOL_TIMEOUT", "value": "30000"}
            ]' > /tmp/render-env-vars.json

          echo "Pushing $(jq length /tmp/render-env-vars.json) env vars to Render..."

          HTTP_STATUS=$(curl --silent --output /tmp/render-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/env-vars" \
            --data @/tmp/render-env-vars.json)

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Failed to push env vars (HTTP $HTTP_STATUS)"
            cat /tmp/render-response.txt | head -3
            rm -f /tmp/render-env-vars.json /tmp/render-response.txt
            exit 1
          fi

          echo "✅ Env vars pushed (HTTP $HTTP_STATUS)"
          rm -f /tmp/render-env-vars.json /tmp/render-response.txt

      - name: Trigger deploy
        run: |
          SHA="${{ steps.commit.outputs.sha }}"
          echo "Triggering deploy of ${SHA:0:7}..."
          
          DEPLOY_HTTP=$(curl --silent --output /tmp/deploy-response.txt --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            --data "{\"commitId\":\"$SHA\"}")
          
          if [ "$DEPLOY_HTTP" != "200" ] && [ "$DEPLOY_HTTP" != "201" ]; then
            echo "❌ Deploy trigger failed (HTTP $DEPLOY_HTTP)"
            rm -f /tmp/deploy-response.txt
            exit 1
          fi
          
          DEPLOY_ID=$(jq -r '.id // "unknown"' /tmp/deploy-response.txt 2>/dev/null || echo "unknown")
          echo "✅ Deploy triggered: $DEPLOY_ID"
          rm -f /tmp/deploy-response.txt

      - name: Summary
        run: |
          echo "## Render Env Recovery Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${SHA:0:7}\`" >> $GITHUB_STEP_SUMMARY
          echo "- JWT_SECRET preserved: ${{ steps.jwt.outputs.preserved || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
