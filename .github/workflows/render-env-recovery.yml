name: Render Environment Recovery

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: Commit to deploy after env vars are restored
        required: true
        default: "e1a8e54c960cdad08af766b1ba79a2dd0be01049"
      database_username:
        description: DATABASE_USERNAME (Supabase session pooler user)
        required: true
      database_password:
        description: DATABASE_PASSWORD
        required: true

permissions:
  contents: write

jobs:
  restore-env-and-deploy:
    name: Restore Render environment variables and deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - name: Validate required secrets and inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" || { echo "::error::RENDER_API_KEY missing"; exit 1; }
          test -n "$RENDER_SERVICE_ID" || { echo "::error::RENDER_SERVICE_ID missing"; exit 1; }
          test -n "$PRODUCTION_DATABASE_URL" || { echo "::error::PRODUCTION_DATABASE_URL missing"; exit 1; }
          test -n "${{ inputs.database_username }}" || { echo "::error::database_username missing"; exit 1; }
          test -n "${{ inputs.database_password }}" || { echo "::error::database_password missing"; exit 1; }

      - name: Restore all Render environment variables
        shell: bash
        run: |
          set -euo pipefail
          
          # Generate a new JWT secret (64 bytes base64)
          JWT_SECRET=$(openssl rand -base64 48)
          
          # Build the env vars payload
          # PRODUCTION_DATABASE_URL is the JDBC URL from Supabase
          cat > /tmp/env-vars.json << 'ENVJSON'
          [
            {"key": "SPRING_PROFILES_ACTIVE", "value": "prod"},
            {"key": "SERVER_PORT", "value": "8080"},
            {"key": "JWT_SECRET", "value": "JWT_SECRET_PLACEHOLDER"},
            {"key": "DATABASE_DRIVER", "value": "org.postgresql.Driver"},
            {"key": "DATABASE_URL", "value": "DATABASE_URL_PLACEHOLDER"},
            {"key": "DATABASE_USERNAME", "value": "DATABASE_USERNAME_PLACEHOLDER"},
            {"key": "DATABASE_PASSWORD", "value": "DATABASE_PASSWORD_PLACEHOLDER"},
            {"key": "JPA_DDL_AUTO", "value": "validate"},
            {"key": "FLYWAY_ENABLED", "value": "true"},
            {"key": "CORS_ALLOWED_ORIGINS", "value": "https://snad-app.vercel.app"},
            {"key": "BOOTSTRAP_ENABLED", "value": "true"},
            {"key": "BOOTSTRAP_FORCE_RESET", "value": "true"},
            {"key": "BOOTSTRAP_ADMIN_EMAIL", "value": "snad@app.com"},
            {"key": "BOOTSTRAP_ADMIN_PASSWORD", "value": "12345678"},
            {"key": "LOG_LEVEL_ROOT", "value": "INFO"},
            {"key": "LOG_LEVEL_SANAD", "value": "INFO"},
            {"key": "MANAGEMENT_ENDPOINTS", "value": "health"},
            {"key": "SHUTDOWN_TIMEOUT", "value": "30s"},
            {"key": "DATABASE_POOL_MAX", "value": "5"},
            {"key": "DATABASE_POOL_MIN", "value": "1"},
            {"key": "DATABASE_POOL_TIMEOUT", "value": "30000"}
          ]
          ENVJSON
          
          # Replace placeholders with actual values
          sed -i "s|JWT_SECRET_PLACEHOLDER|${JWT_SECRET}|g" /tmp/env-vars.json
          sed -i "s|DATABASE_URL_PLACEHOLDER|${PRODUCTION_DATABASE_URL}|g" /tmp/env-vars.json
          sed -i "s|DATABASE_USERNAME_PLACEHOLDER|${{ inputs.database_username }}|g" /tmp/env-vars.json
          sed -i "s|DATABASE_PASSWORD_PLACEHOLDER|${{ inputs.database_password }}|g" /tmp/env-vars.json
          
          # Set all env vars on Render (PUT replaces ALL)
          echo "Setting Render environment variables..."
          HTTP_STATUS=$(curl --silent --output /tmp/render-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" \
            --data @/tmp/env-vars.json)
          
          echo "Render API response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Failed to set Render env vars: $HTTP_STATUS"
            cat /tmp/render-response.txt
            exit 1
          fi
          echo "Environment variables restored successfully"

      - name: Trigger deploy of target commit
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggering deploy of commit ${{ inputs.target_commit }}..."
          HTTP_STATUS=$(curl --silent --output /tmp/deploy-response.txt --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            --data "{\"commitId\":\"${{ inputs.target_commit }}\"}")
          
          echo "Deploy API response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Failed to trigger deploy: $HTTP_STATUS"
            cat /tmp/deploy-response.txt
            exit 1
          fi
          echo "Deploy triggered successfully"
