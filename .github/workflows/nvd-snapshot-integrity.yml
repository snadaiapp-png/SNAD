name: NVD Snapshot Integrity

on:
  workflow_dispatch:
  schedule:
    - cron: '43 2 * * *'

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: nvd-snapshot-integrity
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: '12.1.0'
  MAX_AGE_HOURS: '48'

jobs:
  verify:
    name: Verify Latest Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pytest pyyaml boto3
          command -v gh >/dev/null
          command -v aws >/dev/null

      - name: Select and validate storage backend
        id: backend
        shell: bash
        env:
          CONFIGURED_BACKEND: ${{ vars.NVD_SNAPSHOT_BACKEND }}
          ROLE_ARN: ${{ vars.NVD_SNAPSHOT_READER_ROLE }}
          REGION: ${{ vars.NVD_SNAPSHOT_REGION }}
          BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
        run: |
          set -euo pipefail
          BACKEND="${CONFIGURED_BACKEND:-github-releases}"
          case "$BACKEND" in
            github-releases|s3) ;;
            *) echo "::error::Unsupported backend: $BACKEND"; exit 1 ;;
          esac
          if [[ "$BACKEND" == 's3' ]]; then
            [[ -n "$ROLE_ARN" && -n "$REGION" && -n "$BUCKET" ]] || {
              echo '::error::S3 snapshot variables are incomplete'
              exit 1
            }
          fi
          echo "name=$BACKEND" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        if: steps.backend.outputs.name == 's3'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ vars.NVD_SNAPSHOT_READER_ROLE }}
          aws-region: ${{ vars.NVD_SNAPSHOT_REGION }}
          audience: sts.amazonaws.com
          role-session-name: snad-nvd-integrity-${{ github.run_id }}
          role-duration-seconds: 1800
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify AWS identity and bucket controls
        if: steps.backend.outputs.name == 's3'
        shell: bash
        env:
          EXPECTED_ACCOUNT: ${{ vars.NVD_SNAPSHOT_AWS_ACCOUNT_ID }}
          BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
        run: |
          set -euo pipefail
          IDENTITY=$(aws sts get-caller-identity --output json)
          ACCOUNT=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["Account"])' <<< "$IDENTITY")
          [[ -z "$EXPECTED_ACCOUNT" || "$ACCOUNT" == "$EXPECTED_ACCOUNT" ]] || {
            echo '::error::Unexpected AWS account assumed through OIDC'
            exit 1
          }
          VERSIONING=$(aws s3api get-bucket-versioning --bucket "$BUCKET" --query Status --output text)
          [[ "$VERSIONING" == 'Enabled' ]] || { echo '::error::Bucket versioning is not enabled'; exit 1; }
          aws s3api get-bucket-encryption --bucket "$BUCKET" >/dev/null

      - name: Download latest verified snapshot
        id: download
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_SNAPSHOT_BUCKET: ${{ vars.NVD_SNAPSHOT_BUCKET }}
          NVD_SNAPSHOT_PREFIX: ${{ vars.NVD_SNAPSHOT_PREFIX }}
          NVD_SNAPSHOT_REGION: ${{ vars.NVD_SNAPSHOT_REGION }}
          NVD_SNAPSHOT_ENDPOINT: ${{ vars.NVD_SNAPSHOT_ENDPOINT }}
        run: |
          set -euo pipefail
          DEST="${{ runner.temp }}/snapshot-download"
          python3 scripts/security/download_nvd_snapshot.py \
            --backend '${{ steps.backend.outputs.name }}' \
            --destination "$DEST" \
            --repository '${{ github.repository }}' \
            --max-age-hours "$MAX_AGE_HOURS" \
            --github-output "$GITHUB_OUTPUT"

      - name: Verify snapshot contract, checksums, age, and offline usability
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/security/verify_nvd_snapshot.py \
            --archive '${{ steps.download.outputs.archive_path }}' \
            --manifest '${{ steps.download.outputs.manifest_path }}' \
            --checksums '${{ steps.download.outputs.checksums_path }}' \
            --expected-snapshot-id '${{ steps.download.outputs.snapshot_id }}' \
            --expected-dc-version "$DEPENDENCY_CHECK_VERSION" \
            --min-size 52428800 \
            --max-age-hours "$MAX_AGE_HOURS" \
            --run-smoke \
            --smoke-extract-dir '${{ runner.temp }}/smoke-extract' \
            | tee '${{ runner.temp }}/snapshot-verification.log'
          grep -q '^verification_result=valid$' '${{ runner.temp }}/snapshot-verification.log'

      - name: Upload integrity evidence
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nvd-snapshot-integrity-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/snapshot-download/download-evidence.json
            ${{ runner.temp }}/snapshot-download/bundle/manifest.json
            ${{ runner.temp }}/snapshot-download/bundle/SHA256SUMS
            ${{ runner.temp }}/snapshot-verification.log
            ${{ runner.temp }}/offline-smoke-test.log
          if-no-files-found: warn
          retention-days: 14

      - name: Final enforcement
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          [[ '${{ steps.download.outcome }}' == 'success' ]] || { echo '::error::Snapshot download failed'; exit 1; }
          [[ '${{ steps.verify.outcome }}' == 'success' ]] || { echo '::error::Snapshot verification failed'; exit 1; }
          [[ '${{ steps.upload.outcome }}' == 'success' ]] || { echo '::error::Integrity evidence upload failed'; exit 1; }
          echo 'Snapshot integrity verification PASSED.'
