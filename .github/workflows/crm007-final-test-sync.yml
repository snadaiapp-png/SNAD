name: CRM-007 Final Test Sync

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm007-final-test-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Include lifecycle test in final verification
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          final=Path('.github/workflows/crm007-final-verification.yml')
          text=final.read_text(encoding='utf-8')
          text=text.replace(
            'AddressCommunicationHttpIntegrationTest,AddressCommunicationOperationsHttpIntegrationTest,CommunicationPolicyHttpIntegrationTest,CrmAddressCommunicationMigrationUpgradeTest,CrmOpenApiContractTest',
            'AddressCommunicationHttpIntegrationTest,AddressCommunicationLifecycleIntegrationTest,AddressCommunicationOperationsHttpIntegrationTest,CommunicationPolicyHttpIntegrationTest,CrmAddressCommunicationMigrationUpgradeTest,CrmOpenApiContractTest')
          text=text.replace(
            "            'AddressCommunicationHttpIntegrationTest',\n",
            "            'AddressCommunicationHttpIntegrationTest',\n            'AddressCommunicationLifecycleIntegrationTest',\n")
          text=text.replace('total < 20','total < 22')
          final.write_text(text,encoding='utf-8')
          focused=Path('.github/workflows/crm007-focused-acceptance.yml')
          if focused.exists():
              text=focused.read_text(encoding='utf-8')
              text=text.replace(
                'AddressCommunicationHttpIntegrationTest,AddressCommunicationOperationsHttpIntegrationTest,CommunicationPolicyHttpIntegrationTest',
                'AddressCommunicationHttpIntegrationTest,AddressCommunicationLifecycleIntegrationTest,AddressCommunicationOperationsHttpIntegrationTest,CommunicationPolicyHttpIntegrationTest')
              text=text.replace(
                "            'AddressCommunicationHttpIntegrationTest',\n",
                "            'AddressCommunicationHttpIntegrationTest',\n            'AddressCommunicationLifecycleIntegrationTest',\n")
              text=text.replace('total < 13','total < 15')
              focused.write_text(text,encoding='utf-8')
          PY
          git rm .github/workflows/crm007-final-test-sync.yml
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/crm007-final-verification.yml
          git add .github/workflows/crm007-focused-acceptance.yml || true
          git commit -am 'ci(crm): verify implicit lifecycle reconciliation'
          for attempt in 1 2 3; do
            if git push origin HEAD:${{ github.head_ref }}; then exit 0; fi
            git pull --rebase origin "${{ github.head_ref }}"
          done
          exit 1
