name: Render Backend Logs

on:
  workflow_dispatch:
    inputs:
      lines:
        description: 'Number of log lines to fetch'
        required: false
        type: string
        default: '100'

permissions:
  contents: read

jobs:
  logs:
    name: Fetch Render backend logs
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      LINES: ${{ inputs.lines }}
    steps:
      - name: Fetch service logs
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Recent service events ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/events?limit=20" \
            | jq '[.[]? | {type: .type, timestamp: .timestamp, details: .details}]'

      - name: List recent deploys
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Recent deploys ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
            | jq '[.[]? | .deploy // . | {id, status, commit: .commit.id[0:7], createdAt, finishedAt}]'

      - name: Test forgot-password with verbose output
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Testing forgot-password with verbose output ==="
          curl --verbose --max-time 30 \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"snad.ai.app@gmail.com"}' \
            https://sanad-backend-mcrj.onrender.com/api/v1/auth/forgot-password 2>&1 | tail -30
