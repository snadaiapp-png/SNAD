name: Fly.io Deploy

# ============================================================
# SANAD Platform — Deploy to Fly.io (alternative to Render)
# ------------------------------------------------------------
# Fly.io free tier: 3 shared-cpu-1x 256MB VMs OR 1x 512MB VM
# More resources than Render free tier → faster Spring Boot startup
#
# PREREQUISITES (one-time setup by user):
# 1. Install flyctl: curl -L https://fly.io/install.sh | sh
# 2. Sign up at https://fly.io
# 3. Create app: flyctl apps create sanad-backend
# 4. Get API token: flyctl tokens create deploy -a sanad-backend
# 5. Add GitHub secret: FLY_API_TOKEN
# 6. Set env vars: flyctl secrets set -a sanad-backend \
#      DATABASE_URL="jdbc:postgresql://..." \
#      DATABASE_USERNAME="..." DATABASE_PASSWORD="..." \
#      JWT_SECRET="..." SANAD_CONTROL_PLANE_TENANT_ID="..." \
#      SECURITY_NOTIFICATION_PROVIDER="http" \
#      SECURITY_NOTIFICATION_ENDPOINT="https://snad-app.vercel.app/api/email-proxy" \
#      SECURITY_NOTIFICATION_BEARER_TOKEN="..." \
#      SECURITY_NOTIFICATION_FROM="..."
# ============================================================

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm Fly.io deployment'
        required: true
        type: string
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.confirm == 'deploy'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Validate prerequisites
        shell: bash
        run: |
          set -euo pipefail
          test -n "${FLY_API_TOKEN:-}" || { echo "::error::FLY_API_TOKEN secret is required. Get it from: flyctl tokens create deploy -a sanad-backend"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Deploying to Fly.io ==="
          flyctl deploy --remote-only --strategy=rolling --wait

      - name: Wait for health check
        shell: bash
        run: |
          set -euo pipefail
          APP_URL="https://sanad-backend.fly.dev"
          echo "Waiting for $APP_URL/actuator/health to become UP..."
          for attempt in $(seq 1 60); do
            status=$(curl --silent --show-error --output /tmp/health.json --write-out '%{http_code}' \
              --max-time 15 "$APP_URL/actuator/health" || true)
            if [ "$status" = "200" ]; then
              echo "Health UP after ${attempt} attempts"
              jq '.' /tmp/health.json
              exit 0
            fi
            echo "Attempt ${attempt}: HTTP ${status}; waiting 15s..."
            sleep 15
          done
          echo "::error::Fly.io app did not become healthy within 15 minutes"
          exit 1

      - name: Verify security boundary
        shell: bash
        run: |
          set -euo pipefail
          APP_URL="https://sanad-backend.fly.dev"
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$APP_URL/actuator/health")
          [ "$code" = "200" ] || { echo "::error::Health check failed: $code"; exit 1; }
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$APP_URL/actuator/env")
          [ "$code" = "404" ] || { echo "::error::Env endpoint should be 404 but got $code"; exit 1; }
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$APP_URL/api/v1/auth/me")
          [ "$code" = "401" ] || { echo "::error::Auth endpoint should be 401 but got $code"; exit 1; }
          echo "=== Fly.io deployment verified ==="
          echo "App URL: $APP_URL"
