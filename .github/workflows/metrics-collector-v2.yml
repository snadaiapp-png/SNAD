name: Metrics Collector

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/metrics-collector-v2.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/metrics-collector-v2.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: metrics-collector-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_URL: ${{ vars.PRODUCTION_BASE_URL }}
  FRONTEND_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || 'https://snad-app.vercel.app' }}

jobs:
  collect-metrics:
    name: Collect Platform Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate metric targets
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from urllib.parse import urlparse

          for name in ("BACKEND_URL", "FRONTEND_URL"):
              value = os.environ.get(name, "").rstrip("/")
              parsed = urlparse(value)
              if parsed.scheme != "https" or not parsed.netloc or parsed.username or parsed.password:
                  raise SystemExit(
                      f"{name} must be a credential-free HTTPS origin. "
                      "Configure PRODUCTION_BASE_URL with the active tunnel URL."
                  )
          PY

      - name: Check platform endpoints
        id: probes
        shell: bash
        run: |
          set -euo pipefail
          BACKEND_URL="${BACKEND_URL%/}"
          FRONTEND_URL="${FRONTEND_URL%/}"
          results_json='{}'
          all_ok='true'

          probe() {
            local name="$1"
            local method="$2"
            local url="$3"
            local body="$4"
            local expected_csv="$5"
            local require_up_body="$6"
            local status_code='000'
            local available='false'
            local elapsed_ms=0
            local response_file
            response_file=$(mktemp)

            for attempt in 1 2 3 4; do
              : > "$response_file"
              local start_ms end_ms
              start_ms=$(date +%s%3N)

              if [ "$method" = 'POST' ]; then
                status_code=$(curl --silent --show-error --location \
                  --request POST \
                  --header 'Content-Type: application/json' \
                  --header 'ngrok-skip-browser-warning: any-value' \
                  --data "$body" \
                  --connect-timeout 10 --max-time 30 \
                  --output "$response_file" --write-out '%{http_code}' \
                  "$url" || true)
              else
                status_code=$(curl --silent --show-error --location \
                  --request GET \
                  --header 'ngrok-skip-browser-warning: any-value' \
                  --connect-timeout 10 --max-time 30 \
                  --output "$response_file" --write-out '%{http_code}' \
                  "$url" || true)
              fi

              status_code="${status_code:-000}"
              end_ms=$(date +%s%3N)
              elapsed_ms=$((end_ms - start_ms))

              if printf ',%s,' "$expected_csv" | grep -q ",$status_code,"; then
                if [ "$require_up_body" = 'true' ] && ! grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' "$response_file"; then
                  available='false'
                else
                  available='true'
                fi
                break
              fi

              case "$status_code" in
                000|502|503|504) [ "$attempt" = '4' ] || sleep 10 ;;
                *) break ;;
              esac
            done

            rm -f "$response_file"
            [ "$available" = 'true' ] || all_ok='false'
            echo "$name: HTTP $status_code (${elapsed_ms}ms) available=$available"

            results_json=$(printf '%s' "$results_json" | jq \
              --arg name "$name" \
              --arg method "$method" \
              --arg code "$status_code" \
              --arg ms "$elapsed_ms" \
              --arg avail "$available" \
              --arg expected "$expected_csv" \
              '. + { ($name): {
                method: $method,
                status_code: ($code | tonumber),
                response_time_ms: ($ms | tonumber),
                available: ($avail == "true"),
                expected_statuses: $expected
              } }')
          }

          probe backend_health GET "$BACKEND_URL/actuator/health" '' '200' true
          probe frontend GET "$FRONTEND_URL/" '' '200,301,302' false
          probe bff_auth_boundary GET "$FRONTEND_URL/api/platform/api/v1/auth/me" '' '401' false
          probe login_contract POST "$BACKEND_URL/api/v1/auth/login" '{}' '400,401' false
          probe organizations_protection GET "$BACKEND_URL/api/v1/organizations" '' '401,403' false

          printf '%s\n' "$results_json" > metrics-probes.json
          jq empty metrics-probes.json
          echo "all_ok=$all_ok" >> "$GITHUB_OUTPUT"

      - name: Assemble metrics JSON
        if: always()
        id: assemble
        shell: bash
        env:
          ALL_OK: ${{ steps.probes.outputs.all_ok }}
        run: |
          set -euo pipefail
          safe_results='{}'
          healthy='false'
          if [ -s metrics-probes.json ] && jq empty metrics-probes.json >/dev/null 2>&1; then
            safe_results=$(cat metrics-probes.json)
            healthy="${ALL_OK:-false}"
          fi

          jq -n \
            --arg timestamp "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg run_id "${{ github.run_id }}" \
            --arg tested_sha "${{ github.sha }}" \
            --arg healthy "$healthy" \
            --argjson probes "$safe_results" \
            '{timestamp:$timestamp, run_id:$run_id, tested_sha:$tested_sha,
              overall_healthy:($healthy == "true"), probes:$probes}' > metrics.json
          echo "overall_healthy=$healthy" >> "$GITHUB_OUTPUT"

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.run_id }}
          path: |
            metrics.json
            metrics-probes.json
          if-no-files-found: error
          retention-days: 30

      - name: Write metrics summary
        if: always()
        shell: bash
        run: |
          {
            echo '## SANAD Frontend/Local-Backend Metrics'
            echo ''
            echo '| Probe | HTTP | Response Time | Available |'
            echo '|---|---:|---:|---|'
            if [ -f metrics.json ]; then
              jq -r '.probes | to_entries[] | "| \(.key) | \(.value.status_code) | \(.value.response_time_ms)ms | \(if .value.available then "OK" else "FAIL" end) |"' metrics.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Final enforcement
        if: always()
        shell: bash
        env:
          OVERALL_HEALTHY: ${{ steps.assemble.outputs.overall_healthy }}
        run: |
          set -euo pipefail
          test "${OVERALL_HEALTHY:-false}" = 'true'
