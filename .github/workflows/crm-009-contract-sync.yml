name: CRM-009 One-Time Contract Sync

on:
  push:
    branches:
      - feature/crm-009-workflow-ai-implementation-20260723
    paths:
      - '.github/workflows/crm-009-contract-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm-009-contract-sync-${{ github.ref }}
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890
  EXPECTED_CRM_PATHS: '107'
  EXPECTED_CRM_OPERATIONS: '140'

jobs:
  sync-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/crm-009-workflow-ai-implementation-20260723
          fetch-depth: 0
          persist-credentials: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Start backend
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081" \
            >/tmp/crm-009-contract-sync-backend.log 2>&1 &
          echo $! >/tmp/crm-009-contract-sync-backend.pid

      - name: Fetch and filter runtime OpenAPI
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm-009-contract-sync-backend.pid)" 2>/dev/null; then
              cat /tmp/crm-009-contract-sync-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then
              break
            fi
            sleep 2
          done
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output docs/crm/contracts/openapi/crm-openapi.json \
            --prefix /api/v2/crm \
            --expected-paths "$EXPECTED_CRM_PATHS" \
            --expected-operations "$EXPECTED_CRM_OPERATIONS"

      - name: Generate TypeScript contract
        working-directory: apps/web
        run: |
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts

      - name: Commit synchronized artifacts
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/crm/contracts/openapi/crm-openapi.json apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo 'Contract artifacts already synchronized'
            exit 0
          fi
          git commit -m 'chore(crm-009): synchronize runtime OpenAPI and generated types'
          git push origin HEAD:feature/crm-009-workflow-ai-implementation-20260723

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/crm-009-contract-sync-backend.pid ]; then
            kill "$(cat /tmp/crm-009-contract-sync-backend.pid)" 2>/dev/null || true
          fi
