name: Patch CRM Render Host On PR

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/patch-crm-render-host-on-pr.yml'
      - '.github/workflows/crm-g1-production-closure.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Replace the single legacy fallback
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/crm-g1-production-closure.yml')
          text = path.read_text(encoding='utf-8')
          old = 'https://streak-train-empower.ngrok-free.dev/actuator/health'
          new = 'https://sanad-backend-mcrj.onrender.com/actuator/health'
          count = text.count(old)
          if count == 0:
              raise SystemExit(0)
          if count != 1:
              raise SystemExit(f'Expected one legacy fallback; found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          git diff --check
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/crm-g1-production-closure.yml
          git commit -m 'ops: point CRM production health gate to Render'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
