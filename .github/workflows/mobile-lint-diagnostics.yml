name: Mobile Lint Diagnostics

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-lint-diagnostics.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Mobile ESLint Evidence
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run ESLint and preserve output
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log
      - name: Upload ESLint evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-lint-${{ github.sha }}
          path: apps/mobile/lint.log
          retention-days: 7
      - name: Fail when ESLint fails
        if: steps.lint.outcome == 'failure'
        run: exit 1
