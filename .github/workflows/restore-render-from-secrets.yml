name: Restore Render from GitHub Secrets

# ============================================================
# SANAD Platform — Restore Render env vars from GitHub Secrets
# ------------------------------------------------------------
# This workflow reads DB credentials from GitHub secrets and
# restores all required env vars on Render.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      resend_api_key:
        description: 'Resend API key (re_xxxxxxxx)'
        required: true
        type: string
      email_from:
        description: 'Sender email (e.g. onboarding@resend.dev)'
        required: true
        type: string
        default: 'onboarding@resend.dev'

permissions:
  contents: read

jobs:
  restore:
    name: Restore Render env vars from GitHub secrets
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      CONTROL_PLANE_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}
      RESEND_API_KEY: ${{ inputs.resend_api_key }}
      EMAIL_FROM: ${{ inputs.email_from }}
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${PRODUCTION_DATABASE_URL:-}" || { echo "::error::PRODUCTION_DATABASE_URL secret missing"; exit 1; }
          test -n "${DATABASE_USERNAME:-}" || { echo "::error::DATABASE_USERNAME secret missing"; exit 1; }
          test -n "${CONTROL_PLANE_TENANT_ID:-}" || { echo "::error::BOOTSTRAP_TENANT_ID secret missing"; exit 1; }
          echo "All GitHub secrets available"

      - name: Fetch DATABASE_PASSWORD from Render (if still there)
        id: db_password
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking if DATABASE_PASSWORD still exists on Render ==="
          PWD=$(curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq -r '[.[]? | (.envVar // .) | select(.key == "DATABASE_PASSWORD") | .value] | first // empty')
          if [ -n "$PWD" ]; then
            echo "::add-mask::$PWD"
            echo "value=$PWD" >> "$GITHUB_OUTPUT"
            echo "DATABASE_PASSWORD found on Render"
          else
            echo "::error::DATABASE_PASSWORD is not on Render. It must be provided manually."
            exit 1
          fi

      - name: Fetch JWT_SECRET from Render (if still there)
        id: jwt
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking if JWT_SECRET still exists on Render ==="
          JWT=$(curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq -r '[.[]? | (.envVar // .) | select(.key == "JWT_SECRET") | .value] | first // empty')
          if [ -n "$JWT" ]; then
            echo "::add-mask::$JWT"
            echo "value=$JWT" >> "$GITHUB_OUTPUT"
            echo "JWT_SECRET found on Render"
          else
            echo "::warning::JWT_SECRET not on Render — generating new one"
            NEW_JWT=$(openssl rand -base64 48)
            echo "::add-mask::$NEW_JWT"
            echo "value=$NEW_JWT" >> "$GITHUB_OUTPUT"
            echo "New JWT_SECRET generated"
          fi

      - name: Restore all env vars on Render
        env:
          DATABASE_PASSWORD: ${{ steps.db_password.outputs.value }}
          JWT_SECRET: ${{ steps.jwt.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Restoring all env vars on Render ==="

          ENV_VARS=$(cat <<EOF
          [
            {"key":"SPRING_PROFILES_ACTIVE","value":"prod"},
            {"key":"SERVER_PORT","value":"8080"},
            {"key":"JWT_SECRET","value":"$JWT_SECRET"},
            {"key":"DATABASE_DRIVER","value":"org.postgresql.Driver"},
            {"key":"DATABASE_URL","value":"$PRODUCTION_DATABASE_URL"},
            {"key":"DATABASE_USERNAME","value":"$DATABASE_USERNAME"},
            {"key":"DATABASE_PASSWORD","value":"$DATABASE_PASSWORD"},
            {"key":"JPA_DDL_AUTO","value":"validate"},
            {"key":"FLYWAY_ENABLED","value":"true"},
            {"key":"SANAD_CORS_ALLOWED_ORIGINS","value":"https://snad-app.vercel.app"},
            {"key":"BOOTSTRAP_ENABLED","value":"false"},
            {"key":"SANAD_CONTROL_PLANE_TENANT_ID","value":"$CONTROL_PLANE_TENANT_ID"},
            {"key":"LOG_LEVEL_ROOT","value":"WARN"},
            {"key":"LOG_LEVEL_SANAD","value":"INFO"},
            {"key":"LAZY_INIT","value":"true"},
            {"key":"MANAGEMENT_ENDPOINTS","value":"health"},
            {"key":"SHUTDOWN_TIMEOUT","value":"30s"},
            {"key":"DATABASE_POOL_MAX","value":"3"},
            {"key":"DATABASE_POOL_MIN","value":"1"},
            {"key":"DATABASE_POOL_TIMEOUT","value":"30000"},
            {"key":"SECURITY_NOTIFICATION_PROVIDER","value":"resend"},
            {"key":"SECURITY_NOTIFICATION_FROM","value":"$EMAIL_FROM"},
            {"key":"SECURITY_NOTIFICATION_RESEND_API_KEY","value":"$RESEND_API_KEY"},
            {"key":"SECURITY_NOTIFICATION_ENDPOINT","value":"https://snad-app.vercel.app/api/email-proxy"},
            {"key":"SECURITY_NOTIFICATION_BEARER_TOKEN","value":"legacy-not-used"},
            {"key":"APPLICATION_BASE_URL","value":"https://snad-app.vercel.app"}
          ]
          EOF
          )

          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "$ENV_VARS" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }
          echo "All env vars restored"

      - name: Verify env vars
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Verifying env vars ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq '[.[]? | (.envVar // .) | .key] | sort'

      - name: Trigger Render deploy
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Triggering Render deploy ==="
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          echo "Deploy triggered: $DEPLOY_ID"
