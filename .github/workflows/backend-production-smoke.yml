name: Backend Production Smoke

# ============================================================
# SANAD Platform - Backend Production Smoke Test
# ------------------------------------------------------------
# Verifies the production backend deployment is live and
# healthy. Manual trigger only until backend is provisioned.
#
# Requires repository variable: BACKEND_PRODUCTION_URL
# Optional repository variable: FRONTEND_PRODUCTION_URL
# ============================================================

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend production URL (overrides BACKEND_PRODUCTION_URL var)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: backend-smoke
  cancel-in-progress: true

jobs:
  verify-backend:
    name: Verify Backend Production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BACKEND_URL: ${{ inputs.backend_url || vars.BACKEND_PRODUCTION_URL }}
      FRONTEND_URL: ${{ vars.FRONTEND_PRODUCTION_URL || 'https://snad-app.vercel.app' }}

    steps:
      - name: Validate backend URL is set
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: BACKEND_PRODUCTION_URL repository variable is not set"
            echo "and no backend_url input was provided."
            echo ""
            echo "Set the repository variable in:"
            echo "  GitHub → Settings → Secrets and variables → Actions → Variables"
            echo "  Name:  BACKEND_PRODUCTION_URL"
            echo "  Value: https://sanad-backend.onrender.com"
            exit 1
          fi
          echo "Backend URL: ${BACKEND_URL}"

      - name: Verify health endpoint
        run: |
          for attempt in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              --max-time 10 "${BACKEND_URL}/actuator/health" || true)
            if [ "$code" = "200" ]; then
              echo "Health endpoint UP (attempt ${attempt})"
              exit 0
            fi
            echo "Attempt ${attempt}: health HTTP ${code}; waiting..."
            sleep 10
          done
          echo "Health endpoint did not become ready."
          exit 1

      - name: Verify liveness endpoint
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            "${BACKEND_URL}/actuator/health/liveness")
          [ "$code" = "200" ] || { echo "Liveness failed: HTTP ${code}"; exit 1; }
          echo "Liveness OK"

      - name: Verify readiness endpoint
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            "${BACKEND_URL}/actuator/health/readiness")
          [ "$code" = "200" ] || { echo "Readiness failed: HTTP ${code}"; exit 1; }
          echo "Readiness OK"

      - name: Verify env endpoint is NOT exposed
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            "${BACKEND_URL}/actuator/env")
          [ "$code" = "404" ] || { echo "Env should be 404 but got ${code}"; exit 1; }
          echo "Env correctly NOT exposed"

      - name: Verify Swagger UI is disabled
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            "${BACKEND_URL}/swagger-ui.html")
          [ "$code" = "404" ] || { echo "Swagger UI should be 404 but got ${code}"; exit 1; }
          echo "Swagger UI correctly disabled"

      - name: Verify frontend production page
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            "${FRONTEND_URL}")
          [ "$code" = "200" ] || { echo "Frontend failed: HTTP ${code}"; exit 1; }
          echo "Frontend OK (${FRONTEND_URL})"

      - name: Verify CORS allows frontend origin
        run: |
          # Send a CORS preflight from the frontend origin
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            -X OPTIONS \
            -H "Origin: ${FRONTEND_URL}" \
            -H "Access-Control-Request-Method: GET" \
            "${BACKEND_URL}/api/v1/organizations" || true)
          echo "CORS preflight from ${FRONTEND_URL} returned HTTP ${code}"
          # Spring returns 200 or 403 depending on CORS evaluation
          # 200 = allowed, 403 = blocked
          if [ "$code" = "403" ]; then
            echo "ERROR: CORS blocked the frontend origin"
            exit 1
          fi
          echo "CORS allows frontend origin"
