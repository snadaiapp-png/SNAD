name: Quick Fix Provider

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider: http, resend, or disabled'
        required: true
        type: string
        default: 'http'

permissions:
  contents: read

jobs:
  fix:
    name: Update SECURITY_NOTIFICATION_PROVIDER
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PROVIDER: ${{ inputs.provider }}
    steps:
      - name: Update provider
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Setting SECURITY_NOTIFICATION_PROVIDER=$PROVIDER ==="
          RESPONSE=$(curl --silent --show-error --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "[{\"key\":\"SECURITY_NOTIFICATION_PROVIDER\",\"value\":\"$PROVIDER\"}]" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          HTTP_CODE="${RESPONSE: -3}"
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "::error::Failed"; exit 1; }

      - name: Trigger deploy
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Triggering deploy ==="
          curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            | jq -r '.id // empty' | xargs echo "Deploy ID:"
