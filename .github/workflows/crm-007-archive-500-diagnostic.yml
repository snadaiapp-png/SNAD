name: CRM-007 Archive 500 Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-007-archive-500-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    name: Capture Render application log for failed archive request
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Capture exception evidence
        shell: bash
        run: |
          set -euo pipefail
          for value in "$RENDER_API_KEY" "$RENDER_SERVICE_ID"; do
            test -n "$value" || { echo "::error::A required Production value is missing"; exit 1; }
            echo "::add-mask::$value"
          done
          EVIDENCE_DIR="$RUNNER_TEMP/crm-007-archive-diagnostic"
          rm -rf "$EVIDENCE_DIR" && mkdir -p "$EVIDENCE_DIR"

          # Failed request details
          REQUEST_ID="0126b1f1-25d6-4eac-810e-8af4857411b2"
          # Time window: the CRM-007 run started at 22:57:49 and failed at 22:58:40
          START_TIME="2026-07-21T22:57:00Z"
          END_TIME="2026-07-21T22:59:00Z"

          jq -n --arg requestId "$REQUEST_ID" --arg startTime "$START_TIME" --arg endTime "$END_TIME" \
            '{request_id:$requestId,start_time:$startTime,end_time:$endTime}' > "$EVIDENCE_DIR/diagnostic-context.json"

          # Get service owner ID
          curl --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" > "$RUNNER_TEMP/render-service.json"
          OWNER_ID="$(jq -r '(.service // .).ownerId // (.service // .).owner.id // empty' "$RUNNER_TEMP/render-service.json")"
          test -n "$OWNER_ID" || { echo "::error::Could not determine Render owner ID"; exit 1; }

          # Fetch logs for the time window
          curl --get --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            --data-urlencode "ownerId=${OWNER_ID}" \
            --data-urlencode "resource=${RENDER_SERVICE_ID}" \
            --data-urlencode "startTime=${START_TIME}" \
            --data-urlencode "endTime=${END_TIME}" \
            --data-urlencode "limit=500" \
            https://api.render.com/v1/logs > "$RUNNER_TEMP/render-logs-raw.json"

          # Redact sensitive values and filter for the specific request
          python3 - <<'PY'
          import json, os, re
          from pathlib import Path

          runner_temp = Path(os.environ['RUNNER_TEMP'])
          evidence_dir = runner_temp / 'crm-007-archive-diagnostic'
          request_id = '0126b1f1-25d6-4eac-810e-8af4857411b2'

          # Read and redact logs
          raw = (runner_temp / 'render-logs-raw.json').read_text(encoding='utf-8', errors='replace')

          # Redact tokens, credentials, etc.
          raw = re.sub(r'(?i)Bearer\s+[A-Za-z0-9._~+/-]+=*', 'Bearer [REDACTED]', raw)
          raw = re.sub(r'password["\s:=]+[^\s,}]+', 'password=[REDACTED]', raw, flags=re.IGNORECASE)

          data = json.loads(raw)
          entries = data if isinstance(data, list) else data.get('logs') or data.get('items') or [data]

          # Save all logs for context
          (evidence_dir / 'render-logs-all.json').write_text(
              json.dumps(entries[:100], ensure_ascii=False, indent=2), encoding='utf-8')

          # Filter for the specific request ID
          matched = []
          exception_entries = []
          for entry in entries:
              flat = json.dumps(entry, ensure_ascii=False).lower()
              if request_id.lower() in flat:
                  matched.append(entry)
              # Also capture any exception/error entries
              if any(term in flat for term in ['exception', 'error', '500', 'internal', 'sql', 'psql', 'constraint', 'null']):
                  exception_entries.append(entry)

          # Save matched entries
          (evidence_dir / 'render-logs-matched.json').write_text(
              json.dumps({'request_id': request_id, 'matched_count': len(matched), 'entries': matched},
                         ensure_ascii=False, indent=2), encoding='utf-8')

          # Save exception-related entries
          (evidence_dir / 'render-logs-exceptions.json').write_text(
              json.dumps({'count': len(exception_entries), 'entries': exception_entries[:50]},
                         ensure_ascii=False, indent=2), encoding='utf-8')

          # Extract stack traces from matched entries
          stacktraces = []
          for entry in matched:
              msg = json.dumps(entry, ensure_ascii=False)
              # Look for Java exception patterns
              for pattern in [
                  r'([\w.]+Exception(?:\([\w.]+\))?)',
                  r'PSQLException[:\s]+([^\n"]+)',
                  r'ERROR:\s+([^\n"]+)',
                  r'SQLSTATE[:\s]+([\w]+)',
                  r'Caused by:\s+([^\n]+)',
                  r'at\s+([\w.]+)\([\w.]+:\d+\)',
              ]:
                  found = re.findall(pattern, msg)
                  if found:
                      stacktraces.append({'pattern': pattern, 'matches': found[:20]})

          (evidence_dir / 'exception-analysis.json').write_text(
              json.dumps({'request_id': request_id, 'stacktrace_fragments': stacktraces},
                         ensure_ascii=False, indent=2), encoding='utf-8')

          print(f"Total log entries: {len(entries)}")
          print(f"Entries matching request ID: {len(matched)}")
          print(f"Exception-related entries: {len(exception_entries)}")
          print(f"Stacktrace fragments found: {len(stacktraces)}")
          if matched:
              print("\n--- Matched entries (first 3) ---")
              for e in matched[:3]:
                  print(json.dumps(e, ensure_ascii=False)[:500])
          PY

          find "$EVIDENCE_DIR" -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$EVIDENCE_DIR/SHA256SUMS.txt"

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-archive-500-diagnostic-${{ github.run_id }}
          path: ${{ runner.temp }}/crm-007-archive-diagnostic
          if-no-files-found: error
          retention-days: 90
