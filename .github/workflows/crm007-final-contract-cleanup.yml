name: CRM-007 Final Contract Cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm007-final-contract-cleanup.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crm007-final-contract-cleanup
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Start compilable backend
        working-directory: apps/sanad-platform
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress -DskipTests compile
          nohup mvn -q -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=local \
            -Dspring-boot.run.arguments="--server.port=8081 --management.endpoints.web.exposure.include=health" \
            >/tmp/crm007-cleanup-backend.log 2>&1 &
          echo $! >/tmp/crm007-cleanup-backend.pid
      - name: Generate approved 72/95 contract
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/crm007-cleanup-backend.pid)" 2>/dev/null; then
              cat /tmp/crm007-cleanup-backend.log
              exit 1
            fi
            code="$(curl -sS -o /tmp/platform-openapi.json -w '%{http_code}' http://localhost:8081/v3/api-docs || true)"
            if [ "$code" = '200' ] && [ -s /tmp/platform-openapi.json ]; then break; fi
            sleep 2
          done
          test -s /tmp/platform-openapi.json
          python3 scripts/crm/filter-runtime-openapi.py \
            --input /tmp/platform-openapi.json \
            --output /tmp/crm-openapi.runtime.json \
            --prefix /api/v2/crm \
            --expected-paths 72 \
            --expected-operations 95
          cp /tmp/crm-openapi.runtime.json docs/crm/contracts/openapi/crm-openapi.json
      - name: Synchronize generated TypeScript
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run crm:generate-api-types
          npx tsc --noEmit --skipLibCheck lib/api/generated/crm-api-types.ts
      - name: Remove temporary CRM-007 workflows
        run: |
          set -euo pipefail
          git rm -f --ignore-unmatch \
            .github/workflows/crm007-contract-bootstrap.yml \
            .github/workflows/crm007-compile-hotfix.yml \
            .github/workflows/crm007-operations-contract-sync.yml \
            .github/workflows/crm007-policy-contract-sync.yml \
            .github/workflows/crm007-focused-policy-sync.yml \
            .github/workflows/crm007-governance-hotfix.yml \
            .github/workflows/crm007-final-contract-cleanup.yml
      - name: Commit final generated artifacts and cleanup
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/crm/contracts/openapi/crm-openapi.json
          git add apps/web/lib/api/generated/crm-api-types.ts
          if git diff --cached --quiet; then
            echo 'No contract or cleanup changes were required.'
            exit 0
          fi
          git commit -m 'chore(crm): finalize CRM-007 contract artifacts and cleanup'
          git push origin HEAD:${{ github.head_ref }}
      - name: Stop backend
        if: always()
        run: if [ -f /tmp/crm007-cleanup-backend.pid ]; then kill "$(cat /tmp/crm007-cleanup-backend.pid)" 2>/dev/null || true; fi
      - name: Upload cleanup diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-cleanup-diagnostics-${{ github.sha }}
          path: |
            /tmp/crm007-cleanup-backend.log
            /tmp/platform-openapi.json
          if-no-files-found: warn
          retention-days: 7
