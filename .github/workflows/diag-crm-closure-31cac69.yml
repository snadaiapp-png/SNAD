name: Extract CRM-007 Code Fix

on:
  pull_request:
    paths:
      - '.github/workflows/diag-crm-closure-31cac69.yml'

permissions:
  contents: write

jobs:
  extract:
    name: Copy reviewed Java and PostgreSQL test only
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      AUTHORIZED_MAIN_SHA: 31cac69fc1a336ffa29288929be7d086fc76a121
      SOURCE_REF: fix/crm007-nullable-exclusion-final
      SOURCE_SHA: 2afd685dba4951d3508d2fc6108c39ff1a2c8987
      TARGET_REF: fix/crm007-nullable-exclusion-clean
    steps:
      - name: Validate immutable source and target
        shell: bash
        run: |
          set -euo pipefail
          MAIN_SHA="$(gh api "/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          SOURCE_HEAD="$(gh api "/repos/${GITHUB_REPOSITORY}/git/ref/heads/${SOURCE_REF}" --jq '.object.sha')"
          TARGET_HEAD="$(gh api "/repos/${GITHUB_REPOSITORY}/git/ref/heads/${TARGET_REF}" --jq '.object.sha')"
          test "$MAIN_SHA" = "$AUTHORIZED_MAIN_SHA" || { echo "::error::main moved"; exit 1; }
          test "$SOURCE_HEAD" = "$SOURCE_SHA" || { echo "::error::source branch moved"; exit 1; }
          test "$TARGET_HEAD" = "$AUTHORIZED_MAIN_SHA" || { echo "::error::target branch is not clean current main"; exit 1; }

      - name: Copy only approved source files
        shell: bash
        run: |
          set -euo pipefail
          files=(
            'apps/sanad-platform/src/main/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationRepository.java'
            'apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationNullableFilterPostgresTest.java'
          )
          for path in "${files[@]}"; do
            gh api "/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${SOURCE_REF}" > "$RUNNER_TEMP/source.json"
            gh api "/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${TARGET_REF}" > "$RUNNER_TEMP/target.json"
            SOURCE_CONTENT="$(jq -r '.content' "$RUNNER_TEMP/source.json" | tr -d '\n')"
            TARGET_SHA="$(jq -r '.sha' "$RUNNER_TEMP/target.json")"
            jq -n \
              --arg message 'fix(crm): type nullable mutation exclusions as PostgreSQL UUID' \
              --arg content "$SOURCE_CONTENT" \
              --arg branch "$TARGET_REF" \
              --arg sha "$TARGET_SHA" \
              '{message:$message,content:$content,branch:$branch,sha:$sha}' \
              > "$RUNNER_TEMP/update.json"
            gh api --method PUT "/repos/${GITHUB_REPOSITORY}/contents/${path}" --input "$RUNNER_TEMP/update.json" > "$RUNNER_TEMP/update-response.json"
            test -n "$(jq -r '.commit.sha // empty' "$RUNNER_TEMP/update-response.json")"
          done

      - name: Verify exact content and scope
        shell: bash
        run: |
          set -euo pipefail
          files=(
            'apps/sanad-platform/src/main/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationRepository.java'
            'apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/infrastructure/JdbcAddressCommunicationNullableFilterPostgresTest.java'
          )
          for path in "${files[@]}"; do
            SOURCE_BLOB="$(gh api "/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${SOURCE_REF}" --jq '.sha')"
            TARGET_BLOB="$(gh api "/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${TARGET_REF}" --jq '.sha')"
            test "$SOURCE_BLOB" = "$TARGET_BLOB" || { echo "::error::content mismatch: ${path}"; exit 1; }
          done
          echo 'Exact Java and PostgreSQL regression test copied; no workflow file copied.'
