name: Render Production Preflight

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Governance issue to close after successful verification
        required: true
        default: "52"

permissions:
  contents: read
  issues: write

env:
  EXPECTED_REPOSITORY: snadaiapp-png/SNAD
  EXPECTED_BRANCH: main
  EXPECTED_SERVICE_NAME: ${{ vars.RENDER_SERVICE_NAME || 'sanad-backend' }}
  PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}

jobs:
  provider-preflight:
    name: Verify Render production identity and configuration
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Checkout infrastructure contract
        uses: actions/checkout@v4

      - name: Validate protected configuration inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"
          [[ "$PRODUCTION_BASE_URL" == https://* ]]

      - name: Read authoritative Render service
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" > /tmp/render-service.json

          jq -e \
            --arg id "$RENDER_SERVICE_ID" \
            --arg name "$EXPECTED_SERVICE_NAME" \
            --arg repo "$EXPECTED_REPOSITORY" \
            --arg branch "$EXPECTED_BRANCH" '
              (.id == $id) and
              (.name == $name) and
              ((.repo // "") | endswith($repo)) and
              (.branch == $branch)
            ' /tmp/render-service.json >/dev/null

          provider_url=$(jq -r '.serviceDetails.url // .url // empty' /tmp/render-service.json)
          test -n "$provider_url"

          provider_url="${provider_url%/}"
          configured_url="${PRODUCTION_BASE_URL%/}"
          [ "$provider_url" = "$configured_url" ] || {
            echo "::error::PRODUCTION_BASE_URL does not match the authoritative Render service URL."
            echo "Configured host: ${configured_url#https://}"
            echo "Provider host: ${provider_url#https://}"
            exit 1
          }

          echo "AUTHORITATIVE_RENDER_URL=$provider_url" >> "$GITHUB_ENV"
          jq '{id, name, type, repo, branch, providerUrl: (.serviceDetails.url // .url)}' \
            /tmp/render-service.json > render-service-evidence.json

      - name: Verify environment-key policy
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json

          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          jq '[.[].key] | sort' /tmp/render-env-normalized.json > render-env-keys-evidence.json

          required=(SPRING_PROFILES_ACTIVE DATABASE_URL DATABASE_USERNAME DATABASE_PASSWORD JWT_SECRET)
          forbidden=(BOOTSTRAP_ENABLED BOOTSTRAP_TENANT_ID BOOTSTRAP_TENANT_NAME BOOTSTRAP_TENANT_SUBDOMAIN BOOTSTRAP_ADMIN_EMAIL BOOTSTRAP_ADMIN_PASSWORD BOOTSTRAP_ADMIN_DISPLAY_NAME BOOTSTRAP_AUDIT_ACTOR SANAD_SECURITY_BOOTSTRAP_ENABLED SANAD_SECURITY_BOOTSTRAP_TENANT_ID SANAD_SECURITY_BOOTSTRAP_TENANT_NAME SANAD_SECURITY_BOOTSTRAP_TENANT_SUBDOMAIN SANAD_SECURITY_BOOTSTRAP_ADMIN_EMAIL SANAD_SECURITY_BOOTSTRAP_ADMIN_PASSWORD SANAD_SECURITY_BOOTSTRAP_ADMIN_DISPLAY_NAME)

          for key in "${required[@]}"; do
            jq -e --arg key "$key" 'any(.[]; .key == $key)' /tmp/render-env-normalized.json >/dev/null || {
              echo "::error::Required Render environment key is missing: $key"
              exit 1
            }
          done

          for key in "${forbidden[@]}"; do
            if jq -e --arg key "$key" 'any(.[]; .key == $key)' /tmp/render-env-normalized.json >/dev/null; then
              echo "::error::Temporary bootstrap key must be removed: $key"
              exit 1
            fi
          done

          bootstrap_value=$(jq -r '.[] | select(.key == "BOOTSTRAP_ENABLED" or .key == "SANAD_SECURITY_BOOTSTRAP_ENABLED") | .value // empty' /tmp/render-env-normalized.json)
          if [ -n "$bootstrap_value" ]; then
            [ "$bootstrap_value" = "false" ] || {
              echo "::error::Bootstrap must be disabled (BOOTSTRAP_ENABLED/SANAD_SECURITY_BOOTSTRAP_ENABLED must equal false or be absent)."
              exit 1
            }
          fi

      - name: Verify production health and identity URL
        shell: bash
        run: |
          set -euo pipefail
          health_url="${AUTHORITATIVE_RENDER_URL%/}/actuator/health"
          health_file=/tmp/render-health.json
          healthy=false

          # Render free services can be suspended after inactivity. Poll long enough
          # for a cold start instead of failing the production gate on the first request.
          for attempt in $(seq 1 36); do
            http_status=$(curl \
              --silent \
              --show-error \
              --location \
              --connect-timeout 10 \
              --max-time 20 \
              --output "$health_file" \
              --write-out '%{http_code}' \
              "$health_url" || true)

            if [ "$http_status" = "200" ] && jq -e '.status == "UP"' "$health_file" >/dev/null 2>&1; then
              healthy=true
              echo "Render production health is UP after attempt $attempt."
              break
            fi

            echo "Health attempt $attempt/36 returned HTTP ${http_status:-000}; waiting for service readiness."
            sleep 10
          done

          [ "$healthy" = "true" ] || {
            echo "::error::Production health did not become UP within the preflight window."
            if [ -s "$health_file" ]; then
              jq -c '{status: (.status // "UNKNOWN")}' "$health_file" 2>/dev/null || true
            fi
            exit 1
          }

          jq '{status}' "$health_file" > render-health-evidence.json

      - name: Upload sanitized evidence
        uses: actions/upload-artifact@v4
        with:
          name: render-production-preflight-${{ github.run_id }}
          path: |
            render-service-evidence.json
            render-env-keys-evidence.json
            render-health-evidence.json
          retention-days: 30

      - name: Record provider approval and close governance issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "Render production preflight passed for service \`$EXPECTED_SERVICE_NAME\` (ID retained in protected configuration). Repository \`$EXPECTED_REPOSITORY\`, branch \`$EXPECTED_BRANCH\`, authoritative provider URL, required environment-key policy, bootstrap removal, and production health were verified by workflow run $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID. No secret values were recorded."
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed

      - name: Write gate summary
        shell: bash
        run: |
          {
            echo "## Render Production Preflight"
            echo "- Service identity: VERIFIED"
            echo "- Repository and branch: VERIFIED"
            echo "- Provider URL identity: VERIFIED"
            echo "- Managed signing key presence: VERIFIED"
            echo "- Temporary bootstrap keys absent: VERIFIED"
            echo "- Bootstrap disabled: VERIFIED"
            echo "- Production health: VERIFIED"
            echo "- Issue #${{ inputs.issue_number }}: CLOSED"
          } >> "$GITHUB_STEP_SUMMARY"
