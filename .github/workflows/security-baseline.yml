name: Security Baseline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Current Tree Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan current repository tree for secrets
        run: |
          set -euo pipefail

          REPORT_DIR="${RUNNER_TEMP}/gitleaks-report"
          rm -rf "$REPORT_DIR"
          mkdir -p "$REPORT_DIR"

          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            -v "$REPORT_DIR:/report" \
            zricethezav/gitleaks:v8.24.3 detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --no-git \
            --redact \
            --report-format=json \
            --report-path=/report/findings.json \
            --exit-code=1
          SCAN_STATUS=$?
          set -e

          python3 - "$REPORT_DIR/findings.json" <<'PY'
          import json
          import pathlib
          import sys

          report_path = pathlib.Path(sys.argv[1])

          if not report_path.exists():
              print("Gitleaks findings: 0")
              raise SystemExit(0)

          findings = json.loads(report_path.read_text(encoding="utf-8"))
          print(f"Gitleaks findings: {len(findings)}")

          for index, finding in enumerate(findings, start=1):
              print(
                  "Finding "
                  f"{index}: "
                  f"RuleID={finding.get('RuleID', 'unknown')} "
                  f"File={finding.get('File', 'unknown')} "
                  f"StartLine={finding.get('StartLine', 'unknown')} "
                  f"EndLine={finding.get('EndLine', 'unknown')} "
                  f"Fingerprint={finding.get('Fingerprint', 'unknown')}"
              )
          PY

          if [ "$SCAN_STATUS" -ne 0 ]; then
            echo "Gitleaks enforcement failed."
            exit "$SCAN_STATUS"
          fi

          echo "Gitleaks enforcement passed."

      - name: Synthetic negative control — default rules must detect AWS AKIA
        run: |
          set -euo pipefail

          CANARY_DIR="${RUNNER_TEMP}/gitleaks-canary"
          rm -rf "$CANARY_DIR"
          mkdir -p "$CANARY_DIR"

          PREFIX='AKIA'
          SUFFIX='XSCQAUTO81234567'
          printf '%s%s\n' "$PREFIX" "$SUFFIX" > "$CANARY_DIR/canary.txt"

          set +e
          docker run --rm \
            -v "$CANARY_DIR:/scan" \
            -v "$PWD/.gitleaks.toml:/config/.gitleaks.toml:ro" \
            zricethezav/gitleaks:v8.24.3 detect \
            --source=/scan \
            --config=/config/.gitleaks.toml \
            --no-git \
            --redact \
            --exit-code=1
          CANARY_STATUS=$?
          set -e

          rm -rf "$CANARY_DIR"

          if [ "$CANARY_STATUS" -eq 0 ]; then
            echo "ERROR: synthetic negative control was not detected."
            exit 1
          fi

          echo "Synthetic negative control detected successfully."

  frontend-production-audit:
    name: Frontend Production Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Fail on high or critical production vulnerabilities
        run: npm audit --omit=dev --audit-level=high

  backend-container-hardening:
    name: Backend Container Hardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        working-directory: apps/sanad-platform
        run: docker build -t sanad-backend:security-ci .
      - name: Verify non-root runtime and health check
        run: |
          runtime_user=$(docker inspect --format '{{.Config.User}}' sanad-backend:security-ci)
          healthcheck=$(docker inspect --format '{{json .Config.Healthcheck.Test}}' sanad-backend:security-ci)
          test "$runtime_user" = "sanad"
          test "$healthcheck" != "null"
          docker run --rm --entrypoint sh sanad-backend:security-ci -c 'test "$(id -u)" != "0"'
      - name: Verify no sensitive runtime environment defaults
        run: |
          env_json=$(docker inspect --format '{{json .Config.Env}}' sanad-backend:security-ci)
          ! printf '%s' "$env_json" | grep -Eiq '(password|secret|token|private[_-]?key)='

  workflow-security-policy:
    name: Workflow Security Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml pytest -q

      - name: Run workflow security scanner tests
        run: python3 -m pytest tests/ci/test_workflow_security_policy.py -q

      - name: Run workflow security scanner
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/ci/check_workflow_security.py | tee workflow-security-report.txt

      - name: Upload workflow security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-security-report-${{ github.run_id }}
          path: workflow-security-report.txt
          if-no-files-found: error
          retention-days: 7

  security-gate-summary:
    name: Security Gate Summary
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - frontend-production-audit
      - backend-container-hardening
      - workflow-security-policy
    steps:
      - name: Publish result
        run: |
          {
            echo '## SANAD Security Baseline'
            echo ''
            echo '- Current-tree secret scan: PASSED'
            echo '- Synthetic negative control (AWS AKIA canary): DETECTED'
            echo '- Frontend production dependency audit: PASSED'
            echo '- Backend non-root runtime: PASSED'
            echo '- Backend health-check configuration: PASSED'
            echo '- Sensitive default environment check: PASSED'
            echo '- Workflow security policy: PASSED'
            echo '- Scope: deterministic repository security gate'
            echo '- Production SAST, DAST, container CVE scan and penetration testing remain required before commercial GO'
          } >> "$GITHUB_STEP_SUMMARY"
