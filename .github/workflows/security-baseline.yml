name: Security Baseline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Current Tree Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan current repository tree for secrets
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.3 detect \
            --source=/repo \
            --no-git \
            --redact \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --exit-code=1
      - name: Upload redacted Gitleaks diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-redacted-diagnostics
          path: gitleaks-report.json
          if-no-files-found: error
          retention-days: 1
      - name: Enforce secret scan result
        if: steps.gitleaks.outcome == 'failure'
        run: exit 1

  frontend-production-audit:
    name: Frontend Production Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Fail on high or critical production vulnerabilities
        run: npm audit --omit=dev --audit-level=high

  backend-container-hardening:
    name: Backend Container Hardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        working-directory: apps/sanad-platform
        run: docker build -t sanad-backend:security-ci .
      - name: Verify non-root runtime and health check
        run: |
          runtime_user=$(docker inspect --format '{{.Config.User}}' sanad-backend:security-ci)
          healthcheck=$(docker inspect --format '{{json .Config.Healthcheck.Test}}' sanad-backend:security-ci)
          test "$runtime_user" = "sanad"
          test "$healthcheck" != "null"
          docker run --rm --entrypoint sh sanad-backend:security-ci -c 'test "$(id -u)" != "0"'
      - name: Verify no sensitive runtime environment defaults
        run: |
          env_json=$(docker inspect --format '{{json .Config.Env}}' sanad-backend:security-ci)
          ! printf '%s' "$env_json" | grep -Eiq '(password|secret|token|private[_-]?key)='

  security-gate-summary:
    name: Security Gate Summary
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - frontend-production-audit
      - backend-container-hardening
    steps:
      - name: Publish result
        run: |
          {
            echo '## SANAD Security Baseline'
            echo ''
            echo '- Current-tree secret scan: PASSED'
            echo '- Frontend production dependency audit: PASSED'
            echo '- Backend non-root runtime: PASSED'
            echo '- Backend health-check configuration: PASSED'
            echo '- Sensitive default environment check: PASSED'
            echo '- Scope: deterministic repository security gate'
            echo '- Production SAST, DAST, container CVE scan and penetration testing remain required before commercial GO'
          } >> "$GITHUB_STEP_SUMMARY"
