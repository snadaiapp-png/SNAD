name: Security Baseline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  filesystem-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan repository dependencies and files
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            aquasec/trivy:0.58.2 fs \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            /workspace

  backend-image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        working-directory: apps/sanad-platform
        run: docker build -t sanad-backend:security-ci .
      - name: Scan backend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.58.2 image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            sanad-backend:security-ci
