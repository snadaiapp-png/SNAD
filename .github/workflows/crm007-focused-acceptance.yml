name: CRM-007 Focused Acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/party/**'
      - 'apps/sanad-platform/src/main/java/com/sanad/platform/crm/web/CrmAddressCommunication**'
      - 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/party/AddressCommunication**'
      - 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/web/CrmAddressCommunication**'
      - 'apps/sanad-platform/src/main/resources/db/migration/V20260717_4__crm_addresses_communication_methods.sql'
      - 'apps/sanad-platform/src/main/resources/db/migration/V20260717_5__crm_addresses_communication_capabilities.sql'
      - 'apps/web/lib/api/address-communication.ts'
      - 'apps/web/app/crm/components/address-communication-workspace.tsx'
      - 'apps/web/app/crm/(operational)/accounts/[accountId]/layout.tsx'
      - 'apps/web/app/crm/(operational)/contacts/[contactId]/layout.tsx'
      - '.github/workflows/crm007-focused-acceptance.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm007-focused-${{ github.ref }}
  cancel-in-progress: false

env:
  JWT_SECRET: ci-only-non-production-validation-key-1234567890

jobs:
  backend:
    name: CRM-007 backend acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/sanad-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compile
        run: mvn --batch-mode --no-transfer-progress -DskipTests compile
      - name: Run focused unit and HTTP tests
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress \
            -Dtest='AddressCommunicationUseCasesTest,AddressCommunicationHttpIntegrationTest,AddressCommunicationOperationsHttpIntegrationTest' test
      - name: Run PostgreSQL clean and upgrade tests
        run: |
          set -euo pipefail
          docker version
          mvn --batch-mode --no-transfer-progress \
            -Dtest='CrmAddressCommunicationMigrationUpgradeTest' test
      - name: Inspect focused testcase elements
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          names={
            'AddressCommunicationUseCasesTest',
            'AddressCommunicationHttpIntegrationTest',
            'AddressCommunicationOperationsHttpIntegrationTest',
            'CrmAddressCommunicationMigrationUpgradeTest',
          }
          total=failures=errors=skipped=0
          found=set()
          for path in Path('target/surefire-reports').glob('TEST-*.xml'):
              root=ET.parse(path).getroot()
              suite=root.attrib.get('name','').split('.')[-1]
              if suite not in names: continue
              found.add(suite)
              total += len(root.findall('testcase'))
              failures += int(root.attrib.get('failures','0'))
              errors += int(root.attrib.get('errors','0'))
              skipped += int(root.attrib.get('skipped','0'))
          print(f'found={sorted(found)} cases={total} failures={failures} errors={errors} skipped={skipped}')
          if found != names or total < 12 or failures or errors or skipped:
              raise SystemExit(1)
          PY
      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-focused-backend-${{ github.sha }}
          path: apps/sanad-platform/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14

  web:
    name: CRM-007 web acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
