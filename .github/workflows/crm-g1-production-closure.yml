name: CRM G1 Production Closure

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/crm-g1-production-closure.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: crm-g1-production-closure
  cancel-in-progress: false

jobs:
  verify:
    name: Flyway-only read-only post-Render CRM-G1 closure
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: Production
      url: https://snad-app.vercel.app
    env:
      WEB_BASE_URL: https://snad-app.vercel.app
      RENDER_BASE_URL: https://sanad-backend-mcrj.onrender.com
      PROD_JDBC_URL: ${{ secrets.PROD_JDBC_URL }}
      PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      CRM_TENANT_A_EMAIL: ${{ secrets.CRM_TENANT_A_EMAIL || secrets.AUTH_SMOKE_TENANT_A_EMAIL }}
      CRM_TENANT_A_PASSWORD: ${{ secrets.CRM_TENANT_A_PASSWORD || secrets.AUTH_SMOKE_TENANT_A_PASSWORD }}
      CRM_TENANT_B_EMAIL: ${{ secrets.CRM_TENANT_B_EMAIL || secrets.AUTH_SMOKE_TENANT_B_EMAIL }}
      CRM_TENANT_B_PASSWORD: ${{ secrets.CRM_TENANT_B_PASSWORD || secrets.AUTH_SMOKE_TENANT_B_PASSWORD }}
      CRM_TENANT_A_FINGERPRINT: 6a86207bfa8aa7320ce9ddeaf26e8524a6df9a33f88ce42c197b451709377e8c
      CRM_TENANT_B_FINGERPRINT: e38f1f2b98f0106c2a7efb833dd356c7c86be85f7b7190e79beae749df714b47

    steps:
      - name: Checkout exact current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Execute read-only production closure proof
        id: closure
        shell: bash
        run: |
          set -euo pipefail

          for value in \
            "$PROD_JDBC_URL" "$PROD_DB_USER" "$PROD_DB_PASSWORD" \
            "$VERCEL_TOKEN" "$VERCEL_TEAM_ID" "$RENDER_API_KEY" "$RENDER_SERVICE_ID" \
            "$CRM_TENANT_A_EMAIL" "$CRM_TENANT_A_PASSWORD" \
            "$CRM_TENANT_B_EMAIL" "$CRM_TENANT_B_PASSWORD"; do
            test -n "$value" || { echo "::error::A required Production secret is missing"; exit 1; }
            echo "::add-mask::$value"
          done
          [[ "$PROD_JDBC_URL" == jdbc:postgresql://* ]]
          [[ "$RENDER_SERVICE_ID" == srv-* ]]
          test "${CRM_TENANT_A_EMAIL,,}" != "${CRM_TENANT_B_EMAIL,,}"

          RELEASE_SHA="$(git rev-parse HEAD)"
          REMOTE_MAIN_SHA="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$RELEASE_SHA" = "$REMOTE_MAIN_SHA" || { echo "::error::Checkout is not current main"; exit 1; }

          EVIDENCE_DIR="$RUNNER_TEMP/crm-g1-readonly-evidence"
          rm -rf "$EVIDENCE_DIR"
          mkdir -p "$EVIDENCE_DIR"
          STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          jq -n --arg release "$RELEASE_SHA" --arg started "$STARTED_AT" --arg run "$RUN_URL" \
            '{schema:"snad.crm-g1.production-closure.v2",result:"IN_PROGRESS",release_sha:$release,started_at_utc:$started,workflow_run:$run,database_mode:"READ_ONLY",migration_action:"NONE"}' \
            > "$EVIDENCE_DIR/run-context.json"

          HOST="${WEB_BASE_URL#https://}"
          VERCEL_READY=false
          for attempt in $(seq 1 120); do
            curl --fail-with-body --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v13/deployments/${HOST}?teamId=${VERCEL_TEAM_ID}" \
              > "$RUNNER_TEMP/vercel.json"
            LIVE_SHA="$(jq -r '.meta.githubCommitSha // empty' "$RUNNER_TEMP/vercel.json")"
            STATE="$(jq -r '.readyState // .state // empty' "$RUNNER_TEMP/vercel.json")"
            TARGET="$(jq -r '.target // empty' "$RUNNER_TEMP/vercel.json")"
            if [ "$LIVE_SHA" = "$RELEASE_SHA" ] && [ "$STATE" = "READY" ] && [ "$TARGET" = "production" ]; then
              VERCEL_READY=true
              break
            fi
            sleep 10
          done
          test "$VERCEL_READY" = "true" || { echo "::error::Vercel did not reach exact main SHA"; exit 1; }
          jq '{deployment_id:(.id // .uid),url:.url,state:(.readyState // .state),target:.target,git_sha:.meta.githubCommitSha,git_ref:.meta.githubCommitRef}' \
            "$RUNNER_TEMP/vercel.json" > "$EVIDENCE_DIR/vercel-deployment.json"
          VERCEL_DEPLOYMENT_ID="$(jq -r '.deployment_id' "$EVIDENCE_DIR/vercel-deployment.json")"

          curl --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" > "$RUNNER_TEMP/render-service.json"
          RENDER_OWNER_ID="$(jq -r '(.service // .).ownerId // (.service // .).owner.id // empty' "$RUNNER_TEMP/render-service.json")"
          test -n "$RENDER_OWNER_ID"

          RENDER_READY=false
          for attempt in $(seq 1 180); do
            curl --fail-with-body --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=20" \
              > "$RUNNER_TEMP/render-deploys.json"
            jq --arg expected "ghcr.io/snadaiapp-png/snad-backend:${RELEASE_SHA}" \
              '[if type == "array" then .[] else (.deploys // .items // [])[] end | (.deploy // .) | select(.status == "live" and (.image.ref // .imageRef) == $expected)] | sort_by(.finishedAt // .updatedAt // .createdAt) | reverse | first // empty' \
              "$RUNNER_TEMP/render-deploys.json" > "$RUNNER_TEMP/render-live.json"
            if [ "$(jq -r '.id // empty' "$RUNNER_TEMP/render-live.json")" != "" ]; then
              RENDER_READY=true
              break
            fi
            sleep 10
          done
          test "$RENDER_READY" = "true" || { echo "::error::Render did not reach the exact immutable main image"; exit 1; }
          jq --arg expectedSha "$RELEASE_SHA" \
            '{deployment_id:.id,status:.status,image_ref:(.image.ref // .imageRef),image_digest:(.image.digest // null),source_sha:$expectedSha,created_at:.createdAt,finished_at:.finishedAt}' \
            "$RUNNER_TEMP/render-live.json" > "$EVIDENCE_DIR/render-deployment.json"
          RENDER_DEPLOYMENT_ID="$(jq -r '.deployment_id' "$EVIDENCE_DIR/render-deployment.json")"
          RENDER_IMAGE_DIGEST="$(jq -r '.image_digest // empty' "$EVIDENCE_DIR/render-deployment.json")"

          for path in /actuator/health /actuator/health/liveness /actuator/health/readiness; do
            CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/health.json" -w '%{http_code}' "${RENDER_BASE_URL}${path}")"
            test "$CODE" = "200"
            jq -e '.status == "UP"' "$RUNNER_TEMP/health.json" >/dev/null
            jq -n --arg path "$path" --arg code "$CODE" '{path:$path,http_status:($code|tonumber),status:"UP"}' >> "$EVIDENCE_DIR/render-health.ndjson"
          done

          BACKEND_STATUS_CODE="$(curl --silent --show-error --max-time 45 -o "$EVIDENCE_DIR/backend-status.json" -w '%{http_code}' "${WEB_BASE_URL}/api/system/backend-status")"
          test "$BACKEND_STATUS_CODE" = "200"
          jq -e '.configured == true and .reachable == true and .statusCode == 200' "$EVIDENCE_DIR/backend-status.json" >/dev/null
          AUTH_ME_CODE="$(curl --silent --show-error --max-time 45 -o /dev/null -w '%{http_code}' "${WEB_BASE_URL}/api/platform/api/v1/auth/me")"
          test "$AUTH_ME_CODE" = "401"

          PSQL_URL="${PROD_JDBC_URL#jdbc:}"
          export PGPASSWORD="$PROD_DB_PASSWORD"
          export PGOPTIONS='-c default_transaction_read_only=on'

          psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -P pager=off -Atc \
            "SELECT version || '|' || type || '|' || success || '|' || installed_on
               FROM flyway_schema_history
              WHERE version IN ('20260717.6','20260718.1','20260721.1')
              ORDER BY installed_rank" > "$EVIDENCE_DIR/flyway-proof.txt"
          grep -Eq '^20260717\.6\|BASELINE\|t(rue)?\|' "$EVIDENCE_DIR/flyway-proof.txt"
          grep -Eq '^20260718\.1\|SQL\|t(rue)?\|' "$EVIDENCE_DIR/flyway-proof.txt"
          grep -Eq '^20260721\.1\|SQL\|t(rue)?\|' "$EVIDENCE_DIR/flyway-proof.txt"
          test "$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc "SELECT count(*) FROM flyway_schema_history WHERE success=false")" = "0"

          CONTACT_COLUMNS="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT count(*) FROM information_schema.columns WHERE table_schema='public' AND table_name='crm_contacts' AND column_name IN ('legal_name','preferred_name','middle_name','pronouns','source')")"
          CONTACT_RELATIONSHIP_TABLES="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('crm_contact_relationship_roles','crm_contact_account_relationships','crm_contact_relationship_history','crm_contact_ownership_history')")"
          G1_COUNTS="$(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -Atc \
            "SELECT
               (SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('crm_tasks','crm_notes','crm_assignments','crm_transfers','crm_audit_logs','crm_reports','crm_phone_numbers','crm_contact_lookup_index')) || '|' ||
               (SELECT count(*) FROM pg_indexes WHERE schemaname='public' AND tablename IN ('crm_tasks','crm_notes','crm_assignments','crm_transfers','crm_audit_logs','crm_reports','crm_phone_numbers','crm_contact_lookup_index') AND indexname LIKE 'idx_crm_%') || '|' ||
               (SELECT count(*) FROM pg_constraint c JOIN pg_class t ON t.oid=c.conrelid WHERE c.contype='f' AND c.confrelid='tenants'::regclass AND t.relname IN ('crm_tasks','crm_notes','crm_assignments','crm_transfers','crm_audit_logs','crm_reports','crm_phone_numbers','crm_contact_lookup_index'))")"
          test "$CONTACT_COLUMNS" = "5"
          test "$CONTACT_RELATIONSHIP_TABLES" = "4"
          test "$G1_COUNTS" = "8|26|8"
          psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -P pager=off \
            -f scripts/crm/verify-g1-tenant-isolation.sql > "$EVIDENCE_DIR/catalog-isolation.txt"
          jq -n --argjson columns "$CONTACT_COLUMNS" --argjson relationships "$CONTACT_RELATIONSHIP_TABLES" \
            --arg g1 "$G1_COUNTS" '{contact_reconciliation_columns:$columns,contact_relationship_tables:$relationships,crm_g1_counts:$g1,result:"PASS"}' \
            > "$EVIDENCE_DIR/schema-postconditions.json"

          mapfile -t A_CANDIDATES < <(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -At -v email="$CRM_TENANT_A_EMAIL" <<'SQLA'
          SELECT DISTINCT tenant_id FROM users WHERE lower(email)=lower(:'email') AND status='ACTIVE' ORDER BY tenant_id;
          SQLA
          )
          mapfile -t B_CANDIDATES < <(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -At -v email="$CRM_TENANT_B_EMAIL" <<'SQLB'
          SELECT DISTINCT tenant_id FROM users WHERE lower(email)=lower(:'email') AND status='ACTIVE' ORDER BY tenant_id;
          SQLB
          )
          TENANT_A_ID=""
          TENANT_B_ID=""
          A_MATCHES=0
          B_MATCHES=0
          for candidate in "${A_CANDIDATES[@]}"; do
            echo "::add-mask::$candidate"
            if [ "$(printf '%s' "$candidate" | sha256sum | awk '{print $1}')" = "$CRM_TENANT_A_FINGERPRINT" ]; then TENANT_A_ID="$candidate"; A_MATCHES=$((A_MATCHES+1)); fi
          done
          for candidate in "${B_CANDIDATES[@]}"; do
            echo "::add-mask::$candidate"
            if [ "$(printf '%s' "$candidate" | sha256sum | awk '{print $1}')" = "$CRM_TENANT_B_FINGERPRINT" ]; then TENANT_B_ID="$candidate"; B_MATCHES=$((B_MATCHES+1)); fi
          done
          test "$A_MATCHES" = "1" && test "$B_MATCHES" = "1" && test "$TENANT_A_ID" != "$TENANT_B_ID"
          echo "::add-mask::$TENANT_A_ID"
          echo "::add-mask::$TENANT_B_ID"

          login() {
            local label="$1" email="$2" password="$3" tenant="$4"
            local body status token resolved
            body="$(jq -n --arg email "$email" --arg password "$password" --arg tenantId "$tenant" '{email:$email,password:$password,tenantId:$tenantId}')"
            status="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/login-${label}.json" -w '%{http_code}' -H 'Accept: application/json' -H 'Content-Type: application/json' --data "$body" "${WEB_BASE_URL}/api/platform/api/v1/auth/login")"
            test "$status" = "200"
            token="$(jq -r '.accessToken // .data.accessToken // empty' "$RUNNER_TEMP/login-${label}.json")"
            resolved="$(jq -r '.user.tenantId // .data.user.tenantId // empty' "$RUNNER_TEMP/login-${label}.json")"
            test -n "$token" && test "$resolved" = "$tenant"
            echo "::add-mask::$token" >&2
            printf '%s' "$token"
          }
          TOKEN_A="$(login a "$CRM_TENANT_A_EMAIL" "$CRM_TENANT_A_PASSWORD" "$TENANT_A_ID")"
          TOKEN_B="$(login b "$CRM_TENANT_B_EMAIL" "$CRM_TENANT_B_PASSWORD" "$TENANT_B_ID")"

          CONTACT_CORRELATION_ID="$(cat /proc/sys/kernel/random/uuid)"
          SUFFIX="$(date -u +%Y%m%d%H%M%S)"
          CONTACT_BODY="$(jq -n --arg given "Closure${SUFFIX}" --arg family "Contact" --arg email "crm-g1-closure-${SUFFIX}@example.invalid" '{givenName:$given,familyName:$family,primaryEmail:$email,preferredLocale:"ar-SA",timeZone:"Asia/Riyadh",consentSummary:"UNKNOWN"}')"
          printf '%s\n' "$CONTACT_BODY" > "$EVIDENCE_DIR/contact-request-body.json"
          CREATE_CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/contact-create.json" -w '%{http_code}' -H 'Accept: application/json' -H 'Content-Type: application/json' -H "Authorization: Bearer ${TOKEN_A}" -H "X-Correlation-ID: ${CONTACT_CORRELATION_ID}" --data "$CONTACT_BODY" "${WEB_BASE_URL}/api/platform/api/v1/crm/contacts")"
          test "$CREATE_CODE" = "201"
          CONTACT_ID="$(jq -r '.id // .contactId // .data.id // empty' "$RUNNER_TEMP/contact-create.json")"
          test -n "$CONTACT_ID"
          echo "::add-mask::$CONTACT_ID"
          DETAIL_A_CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/contact-detail-a.json" -w '%{http_code}' -H 'Accept: application/json' -H "Authorization: Bearer ${TOKEN_A}" "${WEB_BASE_URL}/api/platform/api/v1/crm/contacts/${CONTACT_ID}")"
          test "$DETAIL_A_CODE" = "200"
          test "$(jq -r '.id // .contactId // .data.id // empty' "$RUNNER_TEMP/contact-detail-a.json")" = "$CONTACT_ID"
          DETAIL_B_CODE="$(curl --silent --show-error --max-time 45 -o "$RUNNER_TEMP/contact-detail-b.json" -w '%{http_code}' -H 'Accept: application/json' -H "Authorization: Bearer ${TOKEN_B}" "${WEB_BASE_URL}/api/platform/api/v1/crm/contacts/${CONTACT_ID}")"
          test "$DETAIL_B_CODE" = "404"
          ARCHIVE_CODE="$(curl --silent --show-error --max-time 45 -X PATCH -o "$RUNNER_TEMP/contact-archive.json" -w '%{http_code}' -H 'Accept: application/json' -H "Authorization: Bearer ${TOKEN_A}" "${WEB_BASE_URL}/api/platform/api/v1/crm/contacts/${CONTACT_ID}/archive")"
          test "$ARCHIVE_CODE" = "200"
          jq -n --arg create "$CREATE_CODE" --arg detailA "$DETAIL_A_CODE" --arg detailB "$DETAIL_B_CODE" --arg archive "$ARCHIVE_CODE" \
            --arg contactHash "$(printf '%s' "$CONTACT_ID" | sha256sum | awk '{print $1}')" --arg correlation "$CONTACT_CORRELATION_ID" \
            '{create_http:($create|tonumber),tenant_a_detail_http:($detailA|tonumber),tenant_b_isolation_http:($detailB|tonumber),archive_http:($archive|tonumber),contact_id_sha256:$contactHash,correlation_id:$correlation,result:"PASS"}' \
            > "$EVIDENCE_DIR/contact-and-isolation.json"

          sleep 10
          END_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          curl --get --fail-with-body --silent --show-error --max-time 45 \
            -H "Authorization: Bearer ${RENDER_API_KEY}" -H 'Accept: application/json' \
            --data-urlencode "ownerId=${RENDER_OWNER_ID}" --data-urlencode "resource=${RENDER_SERVICE_ID}" \
            --data-urlencode "startTime=${STARTED_AT}" --data-urlencode "endTime=${END_TIME}" \
            --data-urlencode "type=request" --data-urlencode "statusCode=500" --data-urlencode "path=/api/v1/crm/contacts" --data-urlencode "limit=100" \
            https://api.render.com/v1/logs > "$EVIDENCE_DIR/render-contact-500-logs.json"
          CONTACT_500_COUNT="$(jq 'if type=="array" then length else (.logs // .items // []) | length end' "$EVIDENCE_DIR/render-contact-500-logs.json")"
          test "$CONTACT_500_COUNT" = "0"

          jq -n --arg release "$RELEASE_SHA" --arg started "$STARTED_AT" --arg completed "$END_TIME" --arg run "$RUN_URL" \
            --arg vercel "$VERCEL_DEPLOYMENT_ID" --arg render "$RENDER_DEPLOYMENT_ID" --arg digest "$RENDER_IMAGE_DIGEST" \
            '{schema:"snad.crm-g1.production-closure.v2",result:"PASS",release_sha:$release,started_at_utc:$started,completed_at_utc:$completed,workflow_run:$run,vercel_deployment_id:$vercel,render_deployment_id:$render,render_image_digest:($digest|if length>0 then . else null end),flyway_20260721_1:"SQL / true",contact_create:"201",contact_detail:"200",tenant_isolation:"404",database_mode:"READ_ONLY",migration_action:"NONE"}' \
            > "$EVIDENCE_DIR/execution-summary.json"
          find "$EVIDENCE_DIR" -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$EVIDENCE_DIR/SHA256SUMS.txt"

          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "vercel_deployment_id=$VERCEL_DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "render_deployment_id=$RENDER_DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "render_image_digest=$RENDER_IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "evidence_dir=$EVIDENCE_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload immutable CRM-G1 evidence
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-g1-production-closure-${{ github.run_id }}
          path: ${{ runner.temp }}/crm-g1-readonly-evidence
          if-no-files-found: error
          retention-days: 90

      - name: Create CRM-G1 evidence pull request
        id: evidence
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.closure.outputs.release_sha }}
          VERCEL_DEPLOYMENT_ID: ${{ steps.closure.outputs.vercel_deployment_id }}
          RENDER_DEPLOYMENT_ID: ${{ steps.closure.outputs.render_deployment_id }}
          RENDER_IMAGE_DIGEST: ${{ steps.closure.outputs.render_image_digest }}
          RUN_URL: ${{ steps.closure.outputs.run_url }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/crm/evidence
          cat > docs/crm/evidence/CRM-G1-FINAL-PRODUCTION-CLOSURE.md <<EOF
          # CRM-G1 Final Production Closure

          | Field | Evidence |
          |---|---|
          | Result | PASS |
          | Release SHA | ${RELEASE_SHA} |
          | Flyway | 20260721.1 / SQL / true |
          | Database execution | Read-only; no migrate, repair, history edit, or manual SQL |
          | Contact Create | HTTP 201 |
          | Contact Detail | HTTP 200 |
          | Tenant B isolation | HTTP 404 |
          | Vercel deployment | ${VERCEL_DEPLOYMENT_ID} |
          | Render deployment | ${RENDER_DEPLOYMENT_ID} |
          | Render image digest | ${RENDER_IMAGE_DIGEST:-not-returned-by-api} |
          | Workflow | ${RUN_URL} |
          | Artifact | ${ARTIFACT_URL} |
          | Artifact digest | ${ARTIFACT_DIGEST} |

          CRM-007 remains open until its final workflow and evidence PR both succeed.
          EOF
          branch="evidence/crm-g1-final-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add docs/crm/evidence/CRM-G1-FINAL-PRODUCTION-CLOSURE.md
          git commit -m "docs(crm): record final G1 production closure evidence"
          git push --set-upstream origin "$branch"
          PR_URL="$(gh pr create --base main --head "$branch" --title "CRM-G1: final production closure evidence (${GITHUB_RUN_ID})" --body "CRM-G1 passed the Flyway-only read-only post-Render closure gate. CRM-007 remains open pending its chained final workflow.")"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          gh issue comment 571 --repo "$GITHUB_REPOSITORY" --body "CRM-G1 SUCCESS. Run: ${RUN_URL}. Release: ${RELEASE_SHA}. Flyway 20260721.1 = SQL / true. Contact Create/Detail/Tenant Isolation = 201/200/404. Evidence PR: ${PR_URL}. Artifact: ${ARTIFACT_URL}. CRM-007 remains open pending the chained final gate."

      - name: Publish result
        if: always()
        env:
          STATUS: ${{ job.status }}
          PR_URL: ${{ steps.evidence.outputs.pr_url }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "## CRM-G1 Production Closure"
            echo "- Status: ${STATUS}"
            echo "- Evidence artifact: ${ARTIFACT_URL:-not-created}"
            echo "- Evidence PR: ${PR_URL:-not-created}"
          } >> "$GITHUB_STEP_SUMMARY"
