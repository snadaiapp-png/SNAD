name: CRM-006 Exact Web Source Bundle

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/crm006-source-bundle.yml'

permissions:
  contents: read

jobs:
  bundle:
    name: Package exact CRM-006 merge web source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_SHA: d0fe9bdd2aec9f080450b509e9d1a53c9d0ec275
    steps:
      - name: Checkout exact merge SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0
      - name: Verify SHA is contained in current main
        run: |
          set -euo pipefail
          git fetch origin main
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
      - name: Create deterministic web source bundle
        run: |
          set -euo pipefail
          rm -rf crm006-bundle
          mkdir -p crm006-bundle
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --exclude='apps/web/.next' \
            --exclude='apps/web/node_modules' \
            -czf crm006-bundle/apps-web-source.tar.gz apps/web
          sha256sum crm006-bundle/apps-web-source.tar.gz > crm006-bundle/apps-web-source.tar.gz.sha256
          printf '%s\n' "$RELEASE_SHA" > crm006-bundle/release-sha.txt
      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: crm006-web-source-${{ env.RELEASE_SHA }}
          path: crm006-bundle/
          if-no-files-found: error
          retention-days: 7
