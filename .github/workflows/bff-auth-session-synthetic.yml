name: BFF Auth Session Synthetic

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bff-auth-session-synthetic.yml
  workflow_dispatch:
  schedule:
    - cron: '23 * * * *'

permissions:
  contents: read
  issues: write

concurrency:
  group: bff-auth-session-synthetic
  cancel-in-progress: false

jobs:
  synthetic:
    name: Login, refresh, identity and logout through production BFF
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Resolve coherent identity and run production journey
        shell: bash
        env:
          PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
          DEDICATED_TENANT_ID: ${{ secrets.AUTH_SMOKE_TENANT_A_ID }}
          DEDICATED_EMAIL: ${{ secrets.AUTH_SMOKE_TENANT_A_EMAIL }}
          DEDICATED_PASSWORD: ${{ secrets.AUTH_SMOKE_TENANT_A_PASSWORD }}
          CRM_EMAIL: ${{ secrets.CRM_TENANT_A_EMAIL }}
          CRM_PASSWORD: ${{ secrets.CRM_TENANT_A_PASSWORD }}
          PROD_JDBC_URL: ${{ secrets.PROD_JDBC_URL }}
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          AUTH_SYNTHETIC_ITERATIONS: '1'
          AUTH_SYNTHETIC_EVIDENCE_PATH: ${{ runner.temp }}/auth-session-synthetic-evidence.json
        run: |
          set -euo pipefail
          dedicated_count=0
          for value in "$DEDICATED_TENANT_ID" "$DEDICATED_EMAIL" "$DEDICATED_PASSWORD"; do
            [ -n "$value" ] && dedicated_count=$((dedicated_count + 1))
          done

          if [ "$dedicated_count" -eq 3 ]; then
            AUTH_SMOKE_TENANT_ID="$DEDICATED_TENANT_ID"
            AUTH_SMOKE_EMAIL="$DEDICATED_EMAIL"
            AUTH_SMOKE_PASSWORD="$DEDICATED_PASSWORD"
            IDENTITY_SOURCE="DEDICATED"
          elif [ "$dedicated_count" -ne 0 ]; then
            echo "::error::Partial AUTH_SMOKE_TENANT_A identity is forbidden"
            exit 1
          else
            for value in "$CRM_EMAIL" "$CRM_PASSWORD" "$PROD_JDBC_URL" "$PROD_DB_USER" "$PROD_DB_PASSWORD"; do
              test -n "$value" || { echo "::error::A protected CRM identity input is missing"; exit 1; }
              echo "::add-mask::$value"
            done
            [[ "$PROD_JDBC_URL" == jdbc:postgresql://* ]] || { echo "::error::Invalid PostgreSQL JDBC URL"; exit 1; }
            PSQL_URL="${PROD_JDBC_URL#jdbc:}"
            export PGPASSWORD="$PROD_DB_PASSWORD"
            mapfile -t MATCHES < <(psql "$PSQL_URL" -U "$PROD_DB_USER" -X -v ON_ERROR_STOP=1 -At \
              -v email="$CRM_EMAIL" <<'SQL'
          SELECT tenant_id || '|' || platform_admin
            FROM users
           WHERE lower(email)=lower(:'email') AND status='ACTIVE'
           ORDER BY tenant_id;
          SQL
            )
            test "${#MATCHES[@]}" -eq 1 || { echo "::error::CRM identity must resolve to exactly one active tenant"; exit 1; }
            IFS='|' read -r AUTH_SMOKE_TENANT_ID PLATFORM_ADMIN <<< "${MATCHES[0]}"
            case "${PLATFORM_ADMIN,,}" in false|f) ;; *) echo "::error::CRM identity must not be a platform administrator"; exit 1 ;; esac
            AUTH_SMOKE_EMAIL="$CRM_EMAIL"
            AUTH_SMOKE_PASSWORD="$CRM_PASSWORD"
            IDENTITY_SOURCE="CRM_LIMITED"
          fi

          for value in "$AUTH_SMOKE_TENANT_ID" "$AUTH_SMOKE_EMAIL" "$AUTH_SMOKE_PASSWORD"; do
            test -n "$value"
            echo "::add-mask::$value"
          done
          export AUTH_SMOKE_TENANT_ID AUTH_SMOKE_EMAIL AUTH_SMOKE_PASSWORD
          echo "Identity source selected: $IDENTITY_SOURCE"
          python3 scripts/operations/bff_auth_session_synthetic.py

      - name: Upload sanitized synthetic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bff-auth-session-evidence-${{ github.run_id }}
          path: ${{ runner.temp }}/auth-session-synthetic-evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Open or update authentication incident
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const title = '[Synthetic Incident] Production BFF authentication journey failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            const body = [
              'The hourly production BFF authentication synthetic failed.',
              '',
              `Run: ${runUrl}`,
              `Commit: ${context.sha}`,
              '',
              'Treat HTTP 502, 503, 504, timeout, login, refresh, identity, cookie or logout failures as bad events under the active incident and error-budget policy.',
              'Do not paste credentials, access tokens, refresh tokens or cookies into this issue.',
            ].join('\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Close recovered authentication incident
        if: success()
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const title = '[Synthetic Incident] Production BFF authentication journey failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Recovery observed with one coherent least-privilege identity. Run: ${runUrl}. Continue observation-window requirements before closing REM-P0-002.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
