name: Render Live Status PR

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/render-live-status-pr.yml'

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
    steps:
      - name: Read active Render deployment
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"
          auth=(-H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json")
          curl --fail-with-body --silent --show-error "${auth[@]}" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" > deploys.json
          latest_id=$(jq -r '.[0] | (.deploy // .).id // empty' deploys.json)
          test -n "$latest_id"
          curl --fail-with-body --silent --show-error "${auth[@]}" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$latest_id" > deploy-detail.json
          curl --silent --show-error "${auth[@]}" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/events?limit=20" > service-events.json || echo '[]' > service-events.json
          latest_status=$(jq -r '(.deploy // .).status // "unknown"' deploy-detail.json)
          latest_commit=$(jq -r '(.deploy // .).commit.id // (.deploy // .).commitId // "unknown"' deploy-detail.json)
          created_at=$(jq -r '(.deploy // .).createdAt // "unknown"' deploy-detail.json)
          finished_at=$(jq -r '(.deploy // .).finishedAt // "pending"' deploy-detail.json)
          reason=$(jq -r '(.deploy // .).reason // "none"' deploy-detail.json)
          health_code=not_configured
          readiness_code=not_configured
          if [ -n "${PRODUCTION_BASE_URL:-}" ]; then
            health_code=$(curl --silent --show-error --output health.json --write-out '%{http_code}' --max-time 15 "$PRODUCTION_BASE_URL/actuator/health" || true)
            readiness_code=$(curl --silent --show-error --output readiness.json --write-out '%{http_code}' --max-time 15 "$PRODUCTION_BASE_URL/actuator/health/readiness" || true)
          fi
          echo "DEPLOY_ID=$latest_id"
          echo "STATUS=$latest_status"
          echo "COMMIT=$latest_commit"
          echo "CREATED_AT=$created_at"
          echo "FINISHED_AT=$finished_at"
          echo "REASON=$reason"
          echo "HEALTH_HTTP=$health_code"
          echo "READINESS_HTTP=$readiness_code"
          echo 'EVENTS_BEGIN'
          jq -c '.[0:10] | map((.event // .) | {id,type,timestamp,details})' service-events.json
          echo 'EVENTS_END'
