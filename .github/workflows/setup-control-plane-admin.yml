# =============================================================================
# Setup Control Plane Admin — DEPRECATED
# =============================================================================
#
# GOVERNANCE NOTICE (Stage 27 Security Baseline Hardening)
# -------------------------------------------------------
# This workflow previously connected directly to the production PostgreSQL
# database via psycopg2 to query and create Control Plane admin users. That
# pattern violates the SNAD Workflow Security Policy:
#
#   - production_psycopg2_access: no workflow may use psycopg2 against the
#     Production environment.
#
# The approved replacement is the secure, token-gated HTTP bootstrap endpoint
# added in PR #416:
#
#   POST /api/v1/internal/control-plane/bootstrap-admin
#   Header: X-Control-Plane-Bootstrap-Token: <token>
#
# That endpoint runs inside the backend process (which already holds the
# production DATABASE_URL) and is protected by:
#   1. CONTROL_PLANE_BOOTSTRAP_ENABLED must be true.
#   2. A constant-time comparison of the X-Control-Plane-Bootstrap-Token header
#      against the server-side CONTROL_PLANE_BOOTSTRAP_TOKEN env var.
#   3. Admin credentials are read from server-side env vars only — never from
#      the request body.
#
# To provision the Control Plane admin, run the workflow:
#   .github/workflows/control-plane-bootstrap-admin-http.yml
#
# This file is retained as a documentation placeholder so that operators who
# remember the old workflow name are redirected to the safe replacement. It
# does NOT execute any database operations and does NOT run in the Production
# environment.
# =============================================================================
name: Setup Control Plane Admin (DEPRECATED)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deprecated-notice:
    name: Print deprecation notice
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "========================================================"
          echo "  Setup Control Plane Admin (DEPRECATED)"
          echo "========================================================"
          echo ""
          echo "This workflow has been replaced by the secure HTTP"
          echo "bootstrap endpoint added in PR #416."
          echo ""
          echo "To provision the Control Plane admin, run the workflow:"
          echo "  Control Plane Bootstrap Admin (HTTP)"
          echo "  (.github/workflows/control-plane-bootstrap-admin-http.yml)"
          echo ""
          echo "That workflow calls the backend endpoint:"
          echo "  POST /api/v1/internal/control-plane/bootstrap-admin"
          echo ""
          echo "Direct psycopg2 access to the production database and"
          echo "direct password_hash mutation are forbidden by the"
          echo "SNAD Workflow Security Policy."
          echo ""
          echo "No database operations will be performed by this workflow."
          exit 0
