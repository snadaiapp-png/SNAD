name: CRM 002G Apply Final Fixes

on:
  push:
    branches:
      - crm/002g-execute-final-acceptance-gate

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[crm-002g-fixes-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: crm/002g-execute-final-acceptance-gate
          fetch-depth: 0

      - name: Apply reviewed corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one match, found {count}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          # Keep the canonical host visible to tests so strict URL assertions use
          # the same origin as the browser and the BFF CSRF check.
          replace_once(
              "apps/web/playwright.crm-acceptance.config.ts",
              'const BASE_URL = configuredBaseUrl.replace("127.0.0.1", "localhost");\n',
              'const BASE_URL = configuredBaseUrl.replace("127.0.0.1", "localhost");\nprocess.env.PLAYWRIGHT_BASE_URL = BASE_URL;\n',
          )

          # The shell title describes the application. Validate the overview title
          # inside the operational content instead of treating the first h1 as the
          # route-specific title.
          replace_once(
              "apps/web/e2e/crm-authenticated-acceptance.spec.ts",
              '    // The overview page renders KPI metric tiles. The h1 is "CRM Overview".\n    await expect(page.locator("h1").first()).toContainText(/CRM Overview|نظرة عامة/i);\n',
              '    // The shell h1 names the CRM application; the route-specific title\n    // is rendered inside the operational content region.\n    await expect(page.locator("#crm-operational-content")).toContainText(/CRM Overview|نظرة عامة/i);\n',
          )

          # WCAG AA: the muted token is 3.45:1 on the white sidebar. Section
          # labels are small bold text and therefore use the secondary text token.
          replace_once(
              "apps/web/app/crm/crm-command-center.module.css",
              '  color: var(--snad-text-muted);\n}\n\n/* ============================================================================\n *  Content area',
              '  color: var(--snad-text-secondary);\n}\n\n/* ============================================================================\n *  Content area',
          )

          java_path = Path("apps/sanad-platform/src/main/java/com/sanad/platform/security/config/CrmAcceptanceBootstrapConfig.java")
          java = java_path.read_text(encoding="utf-8")
          java = java.replace(
              'import org.springframework.context.annotation.Bean;\n',
              'import org.springframework.boot.ApplicationRunner;\nimport org.springframework.context.annotation.Bean;\nimport org.springframework.jdbc.core.JdbcTemplate;\n',
              1,
          )
          marker = '\n}\n'
          bean = '''\n\n    /**\n     * CRM endpoints that do not carry an organizationId are evaluated against\n     * tenant-wide role grants. The deterministic acceptance seed initially links\n     * users to their primary organization for membership coverage; normalize only\n     * the five acceptance grants to tenant scope before browser tests execute.\n     */\n    @Bean\n    ApplicationRunner crmAcceptanceTenantWideRoleGrants(JdbcTemplate jdbcTemplate) {\n        return args -> jdbcTemplate.update(\"\"\"\n                UPDATE user_role_assignments\n                   SET organization_id = NULL\n                 WHERE id IN (\n                     'a0000000-0000-4000-8000-000000000001',\n                     'a0000000-0000-4000-8000-000000000002',\n                     'a0000000-0000-4000-8000-000000000003',\n                     'a0000000-0000-4000-8000-000000000004',\n                     'a0000000-0000-4000-8000-000000000005'\n                 )\n                \"\"\");\n    }\n'''
          if java.count(marker) < 1 or "crmAcceptanceTenantWideRoleGrants" in java:
              raise SystemExit("Unexpected acceptance bootstrap configuration state")
          java = java.rsplit(marker, 1)[0] + bean + marker
          java_path.write_text(java, encoding="utf-8")
          PY

          git diff --check
          git status --short

      - name: Commit corrections and remove transient workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SNAD CRM Acceptance Bot"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/crm-002g-apply-final-fixes.yml
          git add \
            apps/web/playwright.crm-acceptance.config.ts \
            apps/web/e2e/crm-authenticated-acceptance.spec.ts \
            apps/web/app/crm/crm-command-center.module.css \
            apps/sanad-platform/src/main/java/com/sanad/platform/security/config/CrmAcceptanceBootstrapConfig.java
          git commit -m "fix(crm): close final authenticated acceptance gaps [crm-002g-fixes-applied]"
          git push origin HEAD:crm/002g-execute-final-acceptance-gate
