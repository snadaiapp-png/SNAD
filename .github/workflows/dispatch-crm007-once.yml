name: Dispatch CRM-007 Once

on:
  push:
    branches:
      - diag/crm007-run-status
    paths:
      - .github/workflows/dispatch-crm007-once.yml

permissions:
  contents: write
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/crm007-run-status
      - name: Dispatch CRM-007 and record API result
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: af0afe8e9704f82522584c2d9b17d4ac80848427
        shell: bash
        run: |
          set -u
          mkdir -p evidence/diagnostics
          CURRENT_MAIN_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          test "$CURRENT_MAIN_SHA" = "$EXPECTED_SHA" || { echo "::error::Current main moved"; exit 1; }

          jq -n --arg ref main '{ref:$ref}' > "$RUNNER_TEMP/dispatch.json"
          HTTP_CODE="$(curl --silent --show-error --max-time 45 \
            -o "$RUNNER_TEMP/dispatch-response.json" -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -H 'Content-Type: application/json' \
            --data @"$RUNNER_TEMP/dispatch.json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/crm-007-final-production-closure.yml/dispatches")"

          jq -n --arg code "$HTTP_CODE" --arg response "$(cat "$RUNNER_TEMP/dispatch-response.json")" \
            '{http_code:($code|tonumber),response:$response}' \
            > evidence/diagnostics/crm007-dispatch-response.json

          RUN_ID=""
          if [ "$HTTP_CODE" = "204" ]; then
            for attempt in $(seq 1 30); do
              RUN_ID="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/crm-007-final-production-closure.yml/runs?event=workflow_dispatch&per_page=10" --jq ".workflow_runs[] | select(.head_sha == \"${EXPECTED_SHA}\") | .id" | head -n1)"
              if [ -n "$RUN_ID" ]; then break; fi
              sleep 2
            done
          fi

          if [ -n "$RUN_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}" \
              --jq '{id,status,conclusion,event,head_sha,run_number,created_at,updated_at,html_url}' \
              > evidence/diagnostics/crm007-dispatched-run.json
          else
            jq -n --arg code "$HTTP_CODE" '{id:null,status:"NOT_CREATED",dispatch_http_code:($code|tonumber)}' \
              > evidence/diagnostics/crm007-dispatched-run.json
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evidence/diagnostics/crm007-dispatch-response.json evidence/diagnostics/crm007-dispatched-run.json
          git commit -m 'docs(diag): record CRM-007 dispatch response'
          git push origin HEAD:diag/crm007-run-status

          test "$HTTP_CODE" = "204" || exit 1
          test -n "$RUN_ID" || exit 1
