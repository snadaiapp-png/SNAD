name: CRM-007 PostgreSQL Acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/resources/db/migration/V20260717_4__crm_addresses_communication_methods.sql'
      - 'apps/sanad-platform/src/main/resources/db/migration/V20260717_5__crm_addresses_communication_capabilities.sql'
      - 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/web/CrmAddressCommunicationMigrationUpgradeTest.java'
      - '.github/workflows/crm007-postgres-acceptance.yml'
  push:
    branches: [main]
    paths:
      - 'apps/sanad-platform/src/main/resources/db/migration/V20260717_4__crm_addresses_communication_methods.sql'
      - 'apps/sanad-platform/src/main/resources/db/migration/V20260717_5__crm_addresses_communication_capabilities.sql'
      - 'apps/sanad-platform/src/test/java/com/sanad/platform/crm/web/CrmAddressCommunicationMigrationUpgradeTest.java'
      - '.github/workflows/crm007-postgres-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm007-postgres-${{ github.ref }}
  cancel-in-progress: false

jobs:
  postgres:
    name: CRM-007 PostgreSQL clean and upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/sanad-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify Docker
        run: |
          set -euo pipefail
          docker version
          docker info
      - name: Run CRM-007 migration acceptance
        run: |
          set -euo pipefail
          mvn --batch-mode --no-transfer-progress \
            -Dtest='CrmAddressCommunicationMigrationUpgradeTest' test
          report='target/surefire-reports/TEST-com.sanad.platform.crm.web.CrmAddressCommunicationMigrationUpgradeTest.xml'
          test -f "$report"
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          path='target/surefire-reports/TEST-com.sanad.platform.crm.web.CrmAddressCommunicationMigrationUpgradeTest.xml'
          root=ET.parse(path).getroot()
          cases=len(root.findall('testcase'))
          failures=int(root.attrib.get('failures','0'))
          errors=int(root.attrib.get('errors','0'))
          skipped=int(root.attrib.get('skipped','0'))
          print(f'CRM-007 PostgreSQL cases={cases} failures={failures} errors={errors} skipped={skipped}')
          if cases < 2 or failures or errors or skipped:
              raise SystemExit(1)
          PY
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm007-postgres-reports-${{ github.sha }}
          path: apps/sanad-platform/target/surefire-reports/
          if-no-files-found: error
          retention-days: 14
