# ============================================================
# SANAD Platform — Trigger Render Deploy (no wait, no verify)
# ------------------------------------------------------------
# Just triggers a deploy on Render without waiting or verifying.
# Use this when production-release.yml times out during the wait.
# ============================================================

name: Trigger Render Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        default: ''
        type: string

permissions:
  contents: read

jobs:
  trigger-deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    if: github.event.inputs.confirm == 'deploy'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Trigger deploy via Render API
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggering deploy on Render (no wait, no cache clear)..."
          
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          
          test -n "$DEPLOY_ID" || {
            echo "::error::Failed to trigger deploy"
            echo "Response: $RESPONSE"
            exit 1
          }
          
          echo "::notice::Deploy triggered: $DEPLOY_ID"
          echo "Check Render dashboard for build status."
          echo "The deploy will go live automatically when the build completes."
