# ============================================================
# SANAD — NVD Snapshot Bootstrap (Initial Cold Build)
# ============================================================
# EXEC-PROMPT-010R12F Section 18.1 — one-time initial bootstrap
# of the NVD database. Runs ONLY on the self-hosted publisher
# runner with a 24-hour timeout (cold download of ~360K records).
#
# R12F: separated from the incremental publisher because:
#   - Bootstrap needs a long timeout (1440 min)
#   - Bootstrap may start from empty (no LKG)
#   - Incremental must NOT cold bootstrap
#
# This workflow shares the same concurrency group as the
# incremental publisher to enforce single-writer.
# ============================================================

name: NVD Snapshot Bootstrap

on:
  workflow_dispatch:
  # R12F: NO schedule — bootstrap is one-time, manual only.

permissions:
  contents: read
  actions: read
  id-token: write
  packages: write

concurrency:
  group: snad-nvd-snapshot-single-writer
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: "12.1.0"
  PYTHONUNBUFFERED: "1"
  CANONICAL_DIR: /var/lib/snad/dependency-check-data/canonical
  WORK_DIR_BASE: /var/lib/snad/dependency-check-data/work
  LKG_DIR: /var/lib/snad/dependency-check-data/lkg

jobs:
  bootstrap:
    name: Initial NVD Database Bootstrap
    runs-on:
      - self-hosted
      - linux
      - x64
      - snad-nvd-publisher
    # R12F: 24-hour timeout for initial cold download.
    timeout-minutes: 1440
    environment: nvd-publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify runner environment
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner name: ${{ runner.name }}"
          test -d /var/lib/snad/dependency-check-data || {
            echo "::error::Persistent directory /var/lib/snad/dependency-check-data does not exist."
            exit 1
          }
          mkdir -p "${{ env.CANONICAL_DIR }}" "${{ env.WORK_DIR_BASE }}" "${{ env.LKG_DIR }}"
          for cmd in java mvn python3 tar zstd; do
            command -v "$cmd" >/dev/null 2>&1 || {
              echo "::error::Required command '$cmd' not found."
              exit 1
            }
          done

      - name: Verify NVD_API_KEY present
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY is required in nvd-publisher environment."
            exit 1
          fi
          echo "NVD_API_KEY is configured."

      - name: Verify storage backend configured
        shell: bash
        run: |
          BACKEND="${{ vars.NVD_SNAPSHOT_BACKEND }}"
          if [ -z "$BACKEND" ]; then
            echo "::error::NVD_SNAPSHOT_BACKEND is not set."
            exit 1
          fi
          echo "Storage backend: $BACKEND"

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml pytest
          if [ "${{ vars.NVD_SNAPSHOT_BACKEND }}" = "s3" ]; then
            python3 -m pip install --quiet boto3
          fi

      - name: Run Bootstrap
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          NVD_SNAPSHOT_BACKEND: ${{ vars.NVD_SNAPSHOT_BACKEND }}
        run: |
          set -euo pipefail
          WORK_DIR="${{ env.WORK_DIR_BASE }}/${{ github.run_id }}"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          python3 scripts/security/publish_nvd_snapshot.py \
            --mode bootstrap \
            --work-dir "$WORK_DIR" \
            --canonical-dir "${{ env.CANONICAL_DIR }}" \
            --lkg-dir "${{ env.LKG_DIR }}" \
            --publisher-commit-sha "${{ github.sha }}" \
            --publisher-run-id "${{ github.run_id }}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NVD Snapshot Bootstrap — R12F"
            echo ""
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**SHA:** \`${{ github.sha }}\`"
            echo "**Mode:** Bootstrap (initial cold build)"
            echo "**Timeout:** 1440 minutes (24 hours)"
            echo ""
            echo "Bootstrap performs a one-time full NVD database download."
            echo "Subsequent updates use the incremental publisher (6-hour schedule)."
          } >> "$GITHUB_STEP_SUMMARY"
