# ============================================================
# SANAD — NVD Snapshot Bootstrap (GitHub-hosted, GitHub Releases)
# ============================================================
# R12H: Uses GitHub-hosted runner with GitHub Releases as storage.
# No self-hosted runner required. No S3/OIDC required.
#
# Bootstrap downloads the full NVD database (~360K records, 60-90 min),
# validates it, runs an offline smoke test, then publishes an immutable
# snapshot to GitHub Releases.
#
# The snapshot is stored as a GitHub Release with:
#   - tag: nvd-snapshot-<snapshot_id>
#   - assets: archive.tar.zst, manifest.json, SHA256SUMS
# The latest.json pointer is stored on a special release:
#   - tag: nvd-snapshot-latest
# ============================================================

name: NVD Snapshot Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: snad-nvd-snapshot-single-writer
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: "12.1.0"
  PYTHONUNBUFFERED: "1"
  NVD_SNAPSHOT_BACKEND: github-releases

jobs:
  bootstrap:
    name: Initial NVD Database Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: nvd-publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml pytest
          sudo apt-get install -y zstd || true

      - name: Verify NVD_API_KEY present
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY is required in nvd-publisher environment."
            exit 1
          fi
          echo "NVD_API_KEY is configured."

      - name: Run Bootstrap
        shell: bash
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          NVD_SNAPSHOT_BACKEND: github-releases
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          WORK_DIR="${{ runner.temp }}/nvd-work"
          CANONICAL_DIR="${{ runner.temp }}/nvd-canonical"
          LKG_DIR="${{ runner.temp }}/nvd-lkg"
          rm -rf "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"
          mkdir -p "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"

          python3 scripts/security/publish_nvd_snapshot.py \
            --mode bootstrap \
            --update-timeout-minutes 300 \
            --work-dir "$WORK_DIR" \
            --canonical-dir "$CANONICAL_DIR" \
            --lkg-dir "$LKG_DIR" \
            --publisher-commit-sha "${{ github.sha }}" \
            --publisher-run-id "${{ github.run_id }}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NVD Snapshot Bootstrap — GitHub Releases Backend"
            echo ""
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**SHA:** \`${{ github.sha }}\`"
            echo "**Mode:** Bootstrap (initial cold build)"
            echo "**Backend:** GitHub Releases"
            echo "**Runner:** GitHub-hosted (ubuntu-latest)"
            echo ""
            echo "| Timeout | Value |"
            echo "|---------|-------|"
            echo "| Workflow timeout | 360 minutes |"
            echo "| Maven update timeout | 300 minutes |"
            echo "| Reserved post-update budget | 60 minutes |"
          } >> "$GITHUB_STEP_SUMMARY"
