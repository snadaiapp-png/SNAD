# ============================================================
# SANAD — NVD Snapshot Bootstrap (GitHub-hosted, Datafeed)
# ============================================================
# R12J: Uses GitHub-hosted runner with GitHub Releases as storage.
# Consumes a verified NVD Data Feed from the Feed Mirror Publisher.
# Does NOT have NVD_API_KEY. Does NOT contact NVD API directly.
#
# Architecture:
#   Feed Mirror Publisher → GitHub Releases (feed)
#   → Bootstrap downloads feed
#   → Local HTTP server serves feed to Dependency-Check
#   → odc.mv.db built without direct NVD API access
#   → Published to GitHub Releases (snapshot)
# ============================================================

name: NVD Snapshot Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: snad-nvd-snapshot-single-writer
  cancel-in-progress: false

env:
  DEPENDENCY_CHECK_VERSION: "12.1.0"
  PYTHONUNBUFFERED: "1"
  NVD_SNAPSHOT_BACKEND: github-releases
  NVD_SOURCE_MODE: datafeed

jobs:
  bootstrap:
    name: Initial NVD Database Bootstrap (Datafeed)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    environment: nvd-publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml pytest
          sudo apt-get install -y zstd || true

      - name: Run Bootstrap (Datafeed Mode)
        shell: bash
        env:
          NVD_SNAPSHOT_BACKEND: github-releases
          NVD_SOURCE_MODE: datafeed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          WORK_DIR="${{ runner.temp }}/nvd-work"
          CANONICAL_DIR="${{ runner.temp }}/nvd-canonical"
          LKG_DIR="${{ runner.temp }}/nvd-lkg"
          rm -rf "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"
          mkdir -p "$WORK_DIR" "$CANONICAL_DIR" "$LKG_DIR"

          python3 scripts/security/publish_nvd_snapshot.py \
            --mode bootstrap \
            --source-mode datafeed \
            --update-timeout-minutes 240 \
            --work-dir "$WORK_DIR" \
            --canonical-dir "$CANONICAL_DIR" \
            --lkg-dir "$LKG_DIR" \
            --publisher-commit-sha "${{ github.sha }}" \
            --publisher-run-id "${{ github.run_id }}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NVD Snapshot Bootstrap — R12J (Datafeed Mode)"
            echo ""
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**SHA:** \`${{ github.sha }}\`"
            echo "**Mode:** Bootstrap (datafeed source)"
            echo "**Backend:** GitHub Releases"
            echo "**NVD_API_KEY:** NOT USED (datafeed mode)"
            echo "**Direct NVD API:** PROHIBITED"
          } >> "$GITHUB_STEP_SUMMARY"
