name: SANAD Setup Control Plane Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-secrets:
    name: Setup Control Plane Secrets from Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      GH_PAT: ${{ secrets.Z_GITHUB_TOKEN }}
      EXISTING_IDENTITY_B_EMAIL: ${{ secrets.IDENTITY_B_EMAIL }}
      EXISTING_IDENTITY_B_PASSWORD: ${{ secrets.IDENTITY_B_PASSWORD }}
    steps:
      - name: Fetch Render env vars
        shell: bash
        run: |
          set -Eeuo pipefail
          
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            > /tmp/render-env.json
          
          [ "$(jq 'length' /tmp/render-env.json)" -lt 100 ] || {
            echo "::error::Cannot prove complete Render environment pagination."
            exit 1
          }
          
          jq '[.[]? | (.envVar // .) | {key, value}]' /tmp/render-env.json > /tmp/render-env-flat.json
          
          # Print all keys for debugging (values not printed for security)
          echo "=== Render env var keys ==="
          jq -r '.[].key' /tmp/render-env-flat.json | sort | head -50

      - name: Extract CONTROL_PLANE_TENANT_ID
        shell: bash
        run: |
          set -Eeuo pipefail
          TENANT_ID=$(jq -r '.[] | select(.key == "SANAD_CONTROL_PLANE_TENANT_ID") | .value // empty' /tmp/render-env-flat.json)
          
          test -n "$TENANT_ID" || {
            echo "::error::SANAD_CONTROL_PLANE_TENANT_ID not found in Render env"
            jq -r '.[].key' /tmp/render-env-flat.json | grep -i tenant || true
            exit 1
          }
          
          echo "::add-mask::$TENANT_ID"
          echo "CONTROL_PLANE_TENANT_ID=$TENANT_ID" > /tmp/secrets-to-set.txt
          echo "✅ CONTROL_PLANE_TENANT_ID extracted"

      - name: Extract CONTROL_PLANE_NON_ADMIN_EMAIL
        shell: bash
        run: |
          set -Eeuo pipefail
          EMAIL=$(jq -r '.[] | select(.key == "SANAD_IDENTITY_B_EMAIL" or .key == "IDENTITY_B_EMAIL") | .value // empty' /tmp/render-env-flat.json)
          
          if [ -z "$EMAIL" ]; then
            EMAIL="$EXISTING_IDENTITY_B_EMAIL"
          fi
          
          test -n "$EMAIL" || {
            echo "::error::Identity B email not found"
            exit 1
          }
          
          echo "::add-mask::$EMAIL"
          echo "CONTROL_PLANE_NON_ADMIN_EMAIL=$EMAIL" >> /tmp/secrets-to-set.txt
          echo "✅ CONTROL_PLANE_NON_ADMIN_EMAIL extracted"

      - name: Extract CONTROL_PLANE_NON_ADMIN_PASSWORD
        shell: bash
        run: |
          set -Eeuo pipefail
          PASSWORD=$(jq -r '.[] | select(.key == "SANAD_IDENTITY_B_PASSWORD" or .key == "IDENTITY_B_PASSWORD") | .value // empty' /tmp/render-env-flat.json)
          
          if [ -z "$PASSWORD" ]; then
            PASSWORD="$EXISTING_IDENTITY_B_PASSWORD"
          fi
          
          test -n "$PASSWORD" || {
            echo "::error::Identity B password not found"
            exit 1
          }
          
          echo "::add-mask::$PASSWORD"
          echo "CONTROL_PLANE_NON_ADMIN_PASSWORD=$PASSWORD" >> /tmp/secrets-to-set.txt
          echo "✅ CONTROL_PLANE_NON_ADMIN_PASSWORD extracted"

      - name: Extract IDENTITY_B_TENANT_ID from Render env (or query DB)
        shell: bash
        run: |
          set -Eeuo pipefail
          
          # First, try Render env vars
          TENANT_B_ID=$(jq -r '.[] | select(.key == "SANAD_IDENTITY_B_TENANT_ID" or .key == "IDENTITY_B_TENANT_ID" or .key == "SANAD_NON_ADMIN_TENANT_ID" or .key == "AUTH_SMOKE_TENANT_B_ID") | .value // empty' /tmp/render-env-flat.json)
          
          if [ -n "$TENANT_B_ID" ]; then
            echo "✅ Found Identity B tenant ID in Render env"
            echo "::add-mask::$TENANT_B_ID"
            echo "IDENTITY_B_TENANT_ID=$TENANT_B_ID" >> /tmp/secrets-to-set.txt
            exit 0
          fi
          
          echo "Identity B tenant ID not in Render env vars. Trying DB query..."
          
          # Get DATABASE_URL from Render env (the full JDBC URL)
          DB_URL=$(jq -r '.[] | select(.key == "DATABASE_URL") | .value // empty' /tmp/render-env-flat.json)
          DB_USER=$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value // empty' /tmp/render-env-flat.json)
          DB_PASS=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value // empty' /tmp/render-env-flat.json)
          
          echo "::add-mask::$DB_URL"
          echo "::add-mask::$DB_USER"
          echo "::add-mask::$DB_PASS"
          
          test -n "$DB_URL" || { echo "::error::DATABASE_URL not in Render env"; exit 1; }
          test -n "$DB_USER" || { echo "::error::DATABASE_USERNAME not in Render env"; exit 1; }
          test -n "$DB_PASS" || { echo "::error::DATABASE_PASSWORD not in Render env"; exit 1; }
          
          # Parse JDBC URL: jdbc:postgresql://host:port/dbname?params
          # Or: postgresql://host:port/dbname
          # Or: host:port/dbname
          if echo "$DB_URL" | grep -qE "^jdbc:postgresql://|^postgresql://"; then
            # Strip prefix
            CLEAN_URL=$(echo "$DB_URL" | sed -E 's|^(jdbc:)?postgresql://||')
            DB_HOST=$(echo "$CLEAN_URL" | sed -E 's|^[^@]*@||; s|:.*||; s|/.*||')
            DB_PORT=$(echo "$CLEAN_URL" | sed -E 's|.*:([0-9]+).*|\1|; s|^[^:]*$|5432|')
            DB_NAME=$(echo "$CLEAN_URL" | sed -E 's|.*/([^?]+).*|\1|')
            # Extract user:pass from URL if present
            URL_USER=$(echo "$CLEAN_URL" | sed -nE 's|^([^@]*)@.*|\1|p' | cut -d: -f1)
            URL_PASS=$(echo "$CLEAN_URL" | sed -nE 's|^([^@]*)@.*|\1|p' | cut -d: -f2-)
            [ -n "$URL_USER" ] && DB_USER="$URL_USER"
            [ -n "$URL_PASS" ] && DB_PASS="$URL_PASS"
          else
            # Plain host or host:port/dbname
            DB_HOST=$(echo "$DB_URL" | sed -E 's|:.*||; s|/.*||')
            DB_PORT=$(echo "$DB_URL" | sed -E 's|.*:([0-9]+).*|\1|; s|^[^:]*$|5432|')
            DB_NAME=$(echo "$DB_URL" | sed -E 's|.*/([^?]+).*|\1|; s|^[^/]*$|sanad|')
          fi
          
          echo "DB Host: $DB_HOST"
          echo "DB Port: $DB_PORT"
          echo "DB Name: $DB_NAME"
          echo "DB User: $DB_USER"
          
          # Install psql
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client >/dev/null 2>&1
          
          # Get Identity B email
          EMAIL_FOR_QUERY=$(grep "^CONTROL_PLANE_NON_ADMIN_EMAIL=" /tmp/secrets-to-set.txt | cut -d= -f2-)
          
          # Query Identity B's tenant_id
          export PGPASSWORD="$DB_PASS"
          
          TENANT_B_ID=$(psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -t -A -c \
            "SELECT tenant_id FROM users WHERE LOWER(email) = LOWER('$EMAIL_FOR_QUERY') LIMIT 1" 2>&1)
          
          TENANT_B_ID=$(echo "$TENANT_B_ID" | tr -d '[:space:]')
          
          test -n "$TENANT_B_ID" || {
            echo "::error::Identity B tenant_id is empty — user '$EMAIL_FOR_QUERY' not found in DB"
            echo "psql output: $TENANT_B_ID"
            exit 1
          }
          
          echo "::add-mask::$TENANT_B_ID"
          echo "IDENTITY_B_TENANT_ID=$TENANT_B_ID" >> /tmp/secrets-to-set.txt
          echo "✅ IDENTITY_B_TENANT_ID extracted from DB"

      - name: Set GitHub Secrets via API
        shell: bash
        env:
          Z_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          set -Eeuo pipefail
          
          echo "=== Setting GitHub Secrets via GitHub API ==="
          
          # Install pynacl for encryption
          pip install pynacl >/dev/null 2>&1
          
          # Get repo public key for encrypting secrets
          KEY_RESPONSE=$(curl -sS -H "Authorization: token $Z_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/snadaiapp-png/SNAD/environments/production/secrets/public-key")
          
          PUBLIC_KEY=$(echo "$KEY_RESPONSE" | jq -r '.key')
          KEY_ID=$(echo "$KEY_RESPONSE" | jq -r '.key_id')
          
          test -n "$PUBLIC_KEY" || { echo "::error::Failed to fetch public key: $KEY_RESPONSE"; exit 1; }
          
          # Write public key to file using printf (no trailing newline)
          printf '%s' "$PUBLIC_KEY" > /tmp/public-key.b64
          
          while IFS='=' read -r KEY VALUE; do
            [ -n "$KEY" ] && [ -n "$VALUE" ] || continue
            echo "Setting secret: $KEY"
            
            # Encrypt the secret value with the public key using Python + pynacl
            ENCRYPTED=$(python3 << PYEOF
          import base64
          from nacl import public
          with open('/tmp/public-key.b64') as f:
              pk_b64 = f.read().strip()
          pk_bytes = base64.b64decode(pk_b64)
          pk = public.PublicKey(pk_bytes)
          sealed = public.SealedBox(pk).encrypt("${VALUE}".encode())
          print(base64.b64encode(sealed).decode())
          PYEOF
          )
            
            # Set the secret via API
            HTTP_CODE=$(curl -sS -o /tmp/api-response.json -w "%{http_code}" -X PUT \
              -H "Authorization: token $Z_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/snadaiapp-png/SNAD/environments/production/secrets/$KEY" \
              -d "{\"encrypted_value\": \"$ENCRYPTED\", \"key_id\": \"$KEY_ID\"}")
            
            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "204" ]; then
              echo "  ✅ $KEY set (HTTP $HTTP_CODE)"
            else
              echo "  ❌ $KEY failed (HTTP $HTTP_CODE): $(cat /tmp/api-response.json)"
              exit 1
            fi
          done < /tmp/secrets-to-set.txt

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f /tmp/render-env.json /tmp/render-env-flat.json /tmp/secrets-to-set.txt
          echo "Cleanup complete"
