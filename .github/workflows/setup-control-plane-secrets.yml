name: SANAD Setup Control Plane Secrets

# ============================================================
# One-time workflow to create the missing GitHub Secrets required
# by health-production-verification.yml and commercial-go-live.yml
# ============================================================
# This workflow reads env vars from Render (via RENDER_API_KEY +
# RENDER_SERVICE_ID secrets that already exist), then creates the
# missing GitHub Secrets with the correct names:
#   - CONTROL_PLANE_TENANT_ID (from Render SANAD_CONTROL_PLANE_TENANT_ID)
#   - CONTROL_PLANE_NON_ADMIN_EMAIL (from Render env or = IDENTITY_B_EMAIL)
#   - CONTROL_PLANE_NON_ADMIN_PASSWORD (from Render env or = IDENTITY_B_PASSWORD)
#   - CONTROL_PLANE_NON_ADMIN_TENANT_ID (queried from production DB)
# ============================================================

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-secrets:
    name: Setup Control Plane Secrets from Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      GH_TOKEN: ${{ secrets.Z_GITHUB_TOKEN }}
      EXISTING_IDENTITY_B_EMAIL: ${{ secrets.IDENTITY_B_EMAIL }}
      EXISTING_IDENTITY_B_PASSWORD: ${{ secrets.IDENTITY_B_PASSWORD }}
    steps:
      - name: Fetch Render env vars
        shell: bash
        run: |
          set -Eeuo pipefail
          
          echo "::group::Fetch Render service env vars"
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            > /tmp/render-env.json
          
          [ "$(jq 'length' /tmp/render-env.json)" -lt 100 ] || {
            echo "::error::Cannot prove complete Render environment pagination."
            exit 1
          }
          
          # Normalize env var format (Render returns [{key, value}] shape)
          jq '[.[]? | (.envVar // .) | {key, value}]' /tmp/render-env.json > /tmp/render-env-flat.json
          echo "::endgroup::"

      - name: Extract CONTROL_PLANE_TENANT_ID
        shell: bash
        run: |
          set -Eeuo pipefail
          TENANT_ID=$(jq -r '.[] | select(.key == "SANAD_CONTROL_PLANE_TENANT_ID") | .value // empty' /tmp/render-env-flat.json)
          
          test -n "$TENANT_ID" || {
            echo "::error::SANAD_CONTROL_PLANE_TENANT_ID not found in Render env"
            exit 1
          }
          
          echo "::add-mask::$TENANT_ID"
          echo "CONTROL_PLANE_TENANT_ID=$TENANT_ID" > /tmp/secrets-to-set.txt
          echo "✅ CONTROL_PLANE_TENANT_ID extracted (length: ${#TENANT_ID})"

      - name: Extract CONTROL_PLANE_NON_ADMIN_EMAIL (Identity B email)
        shell: bash
        run: |
          set -Eeuo pipefail
          # Try Render env first, fallback to existing IDENTITY_B_EMAIL secret
          EMAIL=$(jq -r '.[] | select(.key == "SANAD_IDENTITY_B_EMAIL" or .key == "IDENTITY_B_EMAIL") | .value // empty' /tmp/render-env-flat.json)
          
          if [ -z "$EMAIL" ]; then
            EMAIL="$EXISTING_IDENTITY_B_EMAIL"
          fi
          
          test -n "$EMAIL" || {
            echo "::error::Identity B email not found in Render env or existing secrets"
            exit 1
          }
          
          echo "::add-mask::$EMAIL"
          echo "CONTROL_PLANE_NON_ADMIN_EMAIL=$EMAIL" >> /tmp/secrets-to-set.txt
          echo "✅ CONTROL_PLANE_NON_ADMIN_EMAIL extracted"

      - name: Extract CONTROL_PLANE_NON_ADMIN_PASSWORD (Identity B password)
        shell: bash
        run: |
          set -Eeuo pipefail
          # Try Render env first, fallback to existing IDENTITY_B_PASSWORD secret
          PASSWORD=$(jq -r '.[] | select(.key == "SANAD_IDENTITY_B_PASSWORD" or .key == "IDENTITY_B_PASSWORD") | .value // empty' /tmp/render-env-flat.json)
          
          if [ -z "$PASSWORD" ]; then
            PASSWORD="$EXISTING_IDENTITY_B_PASSWORD"
          fi
          
          test -n "$PASSWORD" || {
            echo "::error::Identity B password not found in Render env or existing secrets"
            exit 1
          }
          
          echo "::add-mask::$PASSWORD"
          echo "CONTROL_PLANE_NON_ADMIN_PASSWORD=$PASSWORD" >> /tmp/secrets-to-set.txt
          echo "✅ CONTROL_PLANE_NON_ADMIN_PASSWORD extracted"

      - name: Query CONTROL_PLANE_NON_ADMIN_TENANT_ID from production DB
        shell: bash
        run: |
          set -Eeuo pipefail
          
          # Extract DB host/port/name from PRODUCTION_DATABASE_URL
          # Format: jdbc:postgresql://host:port/dbname
          DB_HOST=$(echo "$PRODUCTION_DATABASE_URL" | sed -n 's|.*//\([^:]*\):.*|\1|p')
          DB_PORT=$(echo "$PRODUCTION_DATABASE_URL" | sed -n 's|.*:\([0-9]*\)/.*|\1|p')
          DB_NAME=$(echo "$PRODUCTION_DATABASE_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')
          
          echo "DB Host: $DB_HOST"
          echo "DB Port: $DB_PORT"
          echo "DB Name: $DB_NAME"
          
          # Read password from PRODUCTION_DATABASE_URL (embedded)
          DB_PASSWORD=$(echo "$PRODUCTION_DATABASE_URL" | sed -n 's|.*://\([^:]*\):\([^@]*\)@.*|\2|p')
          
          # If no embedded password, use DATABASE_USERNAME env (no password)
          if [ -z "$DB_PASSWORD" ] || [ "$DB_PASSWORD" = "$PRODUCTION_DATABASE_URL" ]; then
            echo "No embedded password in DATABASE_URL — using DATABASE_PASSWORD secret if available"
            DB_PASSWORD="${DATABASE_PASSWORD:-}"
          fi
          
          # Install psql
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client >/dev/null 2>&1
          
          # Query Identity B's tenant_id by their email
          export PGPASSWORD="$DB_PASSWORD"
          
          EMAIL_FOR_QUERY=$(grep "^CONTROL_PLANE_NON_ADMIN_EMAIL=" /tmp/secrets-to-set.txt | cut -d= -f2-)
          echo "::add-mask::$EMAIL_FOR_QUERY"
          
          TENANT_QUERY="SELECT tenant_id FROM users WHERE LOWER(email) = LOWER(\$1) LIMIT 1"
          
          NON_ADMIN_TENANT_ID=$(psql -h "$DB_HOST" -p "$DB_PORT" -U "$DATABASE_USERNAME" -d "$DB_NAME" \
            -t -A -c "$TENANT_QUERY" \
            -v 1="$EMAIL_FOR_QUERY" 2>&1) || {
            echo "::error::Failed to query Identity B tenant_id from production DB"
            echo "Output: $NON_ADMIN_TENANT_ID"
            exit 1
          }
          
          # Trim whitespace
          NON_ADMIN_TENANT_ID=$(echo "$NON_ADMIN_TENANT_ID" | tr -d '[:space:]')
          
          test -n "$NON_ADMIN_TENANT_ID" || {
            echo "::error::Identity B tenant_id is empty — user not found in DB"
            exit 1
          }
          
          echo "::add-mask::$NON_ADMIN_TENANT_ID"
          echo "CONTROL_PLANE_NON_ADMIN_TENANT_ID=$NON_ADMIN_TENANT_ID" >> /tmp/secrets-to-set.txt
          echo "✅ CONTROL_PLANE_NON_ADMIN_TENANT_ID extracted"

      - name: Set GitHub Secrets
        shell: bash
        run: |
          set -Eeuo pipefail
          
          echo "::group::Setting GitHub Secrets"
          while IFS='=' read -r KEY VALUE; do
            [ -n "$KEY" ] && [ -n "$VALUE" ] || continue
            echo "Setting secret: $KEY"
            echo "$VALUE" | gh secret set "$KEY" --repo snadaiapp-png/SNAD --env production
            echo "  ✅ $KEY set"
          done < /tmp/secrets-to-set.txt
          echo "::endgroup::"

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f /tmp/render-env.json /tmp/render-env-flat.json /tmp/secrets-to-set.txt
          echo "Cleanup complete"
