# ============================================================
# SANAD — EXEC-PROMPT-010R12D Acceptance Orchestrator
# ============================================================
# Executes the reviewed in-repository orchestrator with the
# automatic GitHub token. It has no production environment and
# no access to application, database, Render, or admin secrets.
#
# Safety behavior:
# - The push trigger runs the job only when the merge commit
#   contains [EXEC-PROMPT-010R12D-ORCHESTRATION].
# - The job continuously verifies that main still points to the
#   immutable candidate SHA. Any drift terminates the chain.
# - Only one orchestrator run per ref may execute at a time.
#   New requests never cancel the active acceptance chain.
# ============================================================

name: R12B Acceptance Orchestrator

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/r12b-acceptance-orchestrator.yml'

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  orchestrate:
    name: NVD, OWASP, Baseline and Attestation
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[EXEC-PROMPT-010R12D-ORCHESTRATION]')
    runs-on: ubuntu-latest
    # R12E: reduced from 355 to 120 minutes. R12B no longer dispatches
    # NVD builds — it resolves a pre-published snapshot (minutes), then
    # runs OWASP (~45 min) and baseline workflows (~40 min) with
    # attestation headroom (~20 min).
    timeout-minutes: 120

    steps:
      - name: Checkout immutable candidate SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install storage backend dependencies (R12E)
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml
          BACKEND="${{ vars.NVD_SNAPSHOT_BACKEND }}"
          if [ "$BACKEND" = "s3" ]; then
            python3 -m pip install --quiet boto3
          elif [ "$BACKEND" = "ghcr" ]; then
            # ORAS CLI for GHCR OCI artifacts
            curl -sLO https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz
            tar xzf oras_1.2.2_linux_amd64.tar.gz -C /usr/local/bin/ oras
            rm oras_1.2.2_linux_amd64.tar.gz
          fi

      - name: Verify orchestrator syntax and candidate SHA
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/ops/r12a_dispatch_and_attest.py
          test "${#GITHUB_SHA}" -eq 40
          echo "Baseline candidate SHA: ${GITHUB_SHA}"

      - name: Execute R12B acceptance chain with SHA drift guard
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          read_main_sha() {
            python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/branches/main",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)
          print(payload["commit"]["sha"])
          PY
          }

          read_associated_pr_number() {
            python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/commits/{sha}/pulls",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              pull_requests = json.load(response)

          merged_pull_requests = [
              pull_request
              for pull_request in pull_requests
              if pull_request.get("merged_at")
          ]
          if not merged_pull_requests:
              # R12L: allow manual workflow_dispatch when no PR is associated
              # (e.g. direct merge to main). Use PR number 0 to indicate
              # "no associated PR" — the orchestrator handles this gracefully.
              print("0")
          else:
              merged_pull_requests.sort(
                  key=lambda pull_request: pull_request["merged_at"],
                  reverse=True,
              )
              print(merged_pull_requests[0]["number"])
          PY
          }

          expected_sha="${GITHUB_SHA}"
          initial_main_sha="$(read_main_sha)"
          if [[ "${initial_main_sha}" != "${expected_sha}" ]]; then
            echo "::error::main SHA drift before execution: expected=${expected_sha} actual=${initial_main_sha}"
            exit 42
          fi

          corrective_pr_number="$(read_associated_pr_number)"
          echo "Associated corrective PR: #${corrective_pr_number}"

          guard_status_file="$(mktemp)"
          python3 scripts/ops/r12a_dispatch_and_attest.py \
            --merge-sha "${expected_sha}" \
            --pr-number "${corrective_pr_number}" \
            --issue 101 \
            --poll-interval-seconds 60 \
            --max-poll-minutes 345 \
            --pending-timeout-minutes 15 &
          orchestrator_pid=$!

          (
            while kill -0 "${orchestrator_pid}" 2>/dev/null; do
              current_main_sha="$(read_main_sha)"
              if [[ "${current_main_sha}" != "${expected_sha}" ]]; then
                echo "::error::main SHA drift detected: expected=${expected_sha} actual=${current_main_sha}"
                kill -TERM "${orchestrator_pid}" 2>/dev/null || true
                echo 42 > "${guard_status_file}"
                exit 42
              fi
              sleep 5
            done
            echo 0 > "${guard_status_file}"
          ) &
          guard_pid=$!

          set +e
          wait "${orchestrator_pid}"
          orchestrator_status=$?
          wait "${guard_pid}"
          guard_wait_status=$?
          set -e

          guard_status="$(cat "${guard_status_file}" 2>/dev/null || echo "${guard_wait_status}")"
          rm -f "${guard_status_file}"

          if [[ "${guard_status}" != "0" ]]; then
            echo "::error::R12B terminated by SHA drift guard"
            exit "${guard_status}"
          fi
          exit "${orchestrator_status}"
