# ============================================================
# SANAD Platform — One-Time Administrator Credential Recovery
# ============================================================
# Path B: Uses the approved CredentialBootstrapService with
# BOOTSTRAP_FORCE_RESET=true to recover administrator access.
#
# This workflow is ONE-TIME USE ONLY.
# Delete it after successful recovery and provisioning.
#
# Required Production environment secrets:
#   PRODUCTION_DATABASE_URL
#   RENDER_API_KEY
#   RENDER_SERVICE_ID
#   SANAD_ADMIN_PASSWORD
#   SANAD_ADMIN_EMAIL
#   PRODUCTION_BASE_URL
#   BOOTSTRAP_TENANT_ID
# ============================================================

name: Admin Credential Recovery

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-credential-recovery
  cancel-in-progress: false

jobs:
  recover:
    name: One-Time Administrator Recovery
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production

    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      ADMIN_FINAL_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
      BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      BOOTSTRAP_TENANT_ID: ${{ secrets.BOOTSTRAP_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 1: Validate secret presence
      # -------------------------------------------------------
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in \
            RENDER_API_KEY \
            RENDER_SERVICE_ID \
            ADMIN_FINAL_PASSWORD \
            ADMIN_EMAIL \
            BASE_URL \
            BOOTSTRAP_TENANT_ID
          do
            val="${!name:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing secret: ${name}"
              missing=$((missing + 1))
            else
              echo "PRESENT: ${name} (length: ${#val})"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "OWNER ACTION REQUIRED — ${missing} secret(s) missing."
            exit 1
          fi

      # -------------------------------------------------------
      # Step 2: Verify current backend health
      # -------------------------------------------------------
      - name: Verify current backend health
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 20 "${BASE_URL}/actuator/health" || true)
            if [ "$CODE" = "200" ]; then
              STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/health.json 2>/dev/null || echo "UNKNOWN")
              if [ "$STATUS" = "UP" ]; then
                echo "Backend health: UP (attempt ${attempt})"
                rm -f /tmp/health.json
                exit 0
              fi
            fi
            echo "Health attempt ${attempt}: HTTP ${CODE}; waiting..."
            sleep 10
          done
          echo "::error::Backend health check failed"
          exit 1

      # -------------------------------------------------------
      # Step 3: Fetch current Render environment and add bootstrap
      # Strategy: delete existing BOOTSTRAP_* keys, then append fresh ones.
      # This avoids complex jq if-then-else with pipe operator.
      # -------------------------------------------------------
      - name: Configure bootstrap and deploy
        id: bootstrap-deploy
        shell: bash
        run: |
          set -euo pipefail

          # Mask ALL sensitive values FIRST to prevent any leak
          set +x
          echo "::add-mask::${ADMIN_EMAIL}"
          echo "::add-mask::${ADMIN_FINAL_PASSWORD}"
          echo "::add-mask::${BOOTSTRAP_TENANT_ID}"
          echo "::add-mask::${RENDER_API_KEY}"

          # Fetch current env vars from Render
          RENDER_ENV=$(curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")

          # Normalize Render API response (envVar wrapper → flat array)
          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/render-env-flat.json
          set -x

          VAR_COUNT=$(jq 'length' /tmp/render-env-flat.json)
          echo "Current Render env vars: ${VAR_COUNT}"

          # --- Safe jq: delete old BOOTSTRAP_* keys, then append new ones ---
          set +x
          # Step A: Remove any existing BOOTSTRAP_* keys
          jq 'del(.[] | select(.key | startswith("BOOTSTRAP_")))' /tmp/render-env-flat.json > /tmp/render-env-no-bootstrap.json

          # Step B: Build fresh bootstrap entries
          jq -n \
            --arg tid "$BOOTSTRAP_TENANT_ID" \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_FINAL_PASSWORD" \
            '[
              {"key": "BOOTSTRAP_ENABLED", "value": "true"},
              {"key": "BOOTSTRAP_FORCE_RESET", "value": "true"},
              {"key": "BOOTSTRAP_TENANT_ID", "value": $tid},
              {"key": "BOOTSTRAP_ADMIN_EMAIL", "value": $email},
              {"key": "BOOTSTRAP_ADMIN_PASSWORD", "value": $password},
              {"key": "BOOTSTRAP_AUDIT_ACTOR", "value": "github-z-admin-recovery"}
            ]' > /tmp/bootstrap-entries.json

          # Step C: Combine existing (minus old bootstrap) + new bootstrap entries
          jq -s '.[0] + .[1]' /tmp/render-env-no-bootstrap.json /tmp/bootstrap-entries.json > /tmp/render-bootstrap-env.json
          set -x

          NEW_COUNT=$(jq 'length' /tmp/render-bootstrap-env.json)
          echo "Updated env vars: ${NEW_COUNT}"

          # Push to Render
          set +x
          HTTP_STATUS=$(curl --silent --output /tmp/render-push-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            --data @/tmp/render-bootstrap-env.json)
          set -x

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Failed to push bootstrap env vars (HTTP ${HTTP_STATUS})"
            exit 1
          fi

          echo "Bootstrap env vars pushed (HTTP ${HTTP_STATUS})"

          # Trigger deployment
          TARGET_SHA=$(git rev-parse origin/main)
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

          set +x
          DEPLOY_HTTP=$(curl --silent --output /tmp/deploy-response.txt --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --data "{\"commitId\":\"${TARGET_SHA}\"}")
          set -x

          if [ "$DEPLOY_HTTP" != "200" ] && [ "$DEPLOY_HTTP" != "201" ]; then
            echo "::error::Deploy trigger failed (HTTP ${DEPLOY_HTTP})"
            rm -f /tmp/deploy-response.txt
            exit 1
          fi

          DEPLOY_ID=$(jq -r '.id // "unknown"' /tmp/deploy-response.txt 2>/dev/null || echo "unknown")
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"
          echo "Deploy triggered: ${DEPLOY_ID} for SHA ${TARGET_SHA:0:7}"
          rm -f /tmp/deploy-response.txt /tmp/render-push-response.txt

      # -------------------------------------------------------
      # Step 4: Wait for deployment to go live
      # -------------------------------------------------------
      - name: Wait for deployment to go live
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_ID="${{ steps.bootstrap-deploy.outputs.deploy_id }}"
          echo "Waiting for deployment ${DEPLOY_ID} to go live..."

          for attempt in $(seq 1 60); do
            set +x
            STATUS=$(curl --silent \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            set -x

            echo "Attempt ${attempt}: deploy status = ${STATUS}"

            if [ "$STATUS" = "live" ]; then
              echo "Deployment is LIVE"
              for h in $(seq 1 18); do
                CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 20 "${BASE_URL}/actuator/health" || true)
                if [ "$CODE" = "200" ]; then
                  ST=$(jq -r '.status // "UNKNOWN"' /tmp/health.json 2>/dev/null || echo "UNKNOWN")
                  if [ "$ST" = "UP" ]; then
                    echo "Health: UP (attempt ${h})"
                    rm -f /tmp/health.json
                    exit 0
                  fi
                fi
                echo "Health attempt ${h}: HTTP ${CODE}; waiting..."
                sleep 10
              done
              echo "::error::Deployment live but health check failed"
              exit 1
            fi

            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ] || [ "$STATUS" = "update_failed" ]; then
              echo "::error::Deployment ${STATUS}"
              exit 1
            fi

            sleep 15
          done

          echo "::error::Deployment did not go live within 15 minutes"
          exit 1

      # -------------------------------------------------------
      # Step 5: Verify admin login with the new credentials
      # -------------------------------------------------------
      - name: Verify admin login
        id: admin-login
        shell: bash
        run: |
          set -euo pipefail

          TEMP_DIR="${RUNNER_TEMP}/admin-login"
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          echo "::add-mask::${ADMIN_EMAIL}"
          echo "::add-mask::${BOOTSTRAP_TENANT_ID}"

          # Login with the admin password from SANAD_ADMIN_PASSWORD
          set +x
          LOGIN_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_FINAL_PASSWORD" \
            --arg tid "$BOOTSTRAP_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          LOGIN_STATUS=$(curl -sS \
            -o "${TEMP_DIR}/login.json" \
            -w '%{http_code}' \
            -D "${TEMP_DIR}/login_headers.txt" \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$LOGIN_PAYLOAD")
          set -x

          if [ "$LOGIN_STATUS" != "200" ]; then
            echo "::error::Admin login failed: HTTP ${LOGIN_STATUS}"
            cat "${TEMP_DIR}/login.json" 2>/dev/null | head -5
            rm -rf "$TEMP_DIR"
            exit 1
          fi

          echo "Admin login: HTTP 200 — SUCCESS"

          # Extract access token
          ACCESS_TOKEN=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/login.json'))['accessToken'])")
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "access_token=${ACCESS_TOKEN}" >> "$GITHUB_OUTPUT"

          # Verify tenant binding
          RETURNED_TENANT=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/login.json'))['user']['tenantId'])")
          if [ "$RETURNED_TENANT" != "$BOOTSTRAP_TENANT_ID" ]; then
            echo "::error::Tenant mismatch after login"
            rm -rf "$TEMP_DIR"
            exit 1
          fi
          echo "Tenant binding: PASS"

          # Verify user status
          USER_STATUS=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/login.json'))['user']['status'])")
          if [ "$USER_STATUS" != "ACTIVE" ]; then
            echo "::error::User status = ${USER_STATUS}, expected ACTIVE"
            rm -rf "$TEMP_DIR"
            exit 1
          fi
          echo "User status ACTIVE: PASS"

          rm -rf "$TEMP_DIR"

      # -------------------------------------------------------
      # Step 6: Complete forced password change
      # The bootstrap sets mustChangePassword=true, so we use
      # change-credential to set the owner's own permanent password.
      # Since SANAD_ADMIN_PASSWORD IS the temporary bootstrap password,
      # the owner will need to change it on first real login.
      # -------------------------------------------------------
      - name: Complete forced password change
        shell: bash
        run: |
          set -euo pipefail

          ACCESS_TOKEN="${{ steps.admin-login.outputs.access_token }}"

          # The bootstrap set mustChangePassword=true with SANAD_ADMIN_PASSWORD.
          # We need to call change-credential to clear the flag.
          # Since we're using the same password (it's already the secure one),
          # we generate a temporary different password for the rotation.
          set +x
          TEMP_PASSWORD=$(python3 -c "import secrets; print(secrets.token_urlsafe(32))")
          echo "::add-mask::${TEMP_PASSWORD}"

          # Step 1: Change from SANAD_ADMIN_PASSWORD to temp password
          CHANGE_PAYLOAD=$(jq -n \
            --arg current "$ADMIN_FINAL_PASSWORD" \
            --arg new "$TEMP_PASSWORD" \
            '{currentCredential:$current,newCredential:$new}')

          CHANGE_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/change-credential" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data "$CHANGE_PAYLOAD")
          set -x

          if [ "$CHANGE_STATUS" != "204" ]; then
            echo "::error::Password change to temp failed: HTTP ${CHANGE_STATUS}"
            exit 1
          fi
          echo "Password change to temp: HTTP 204 — SUCCESS"

          # Step 2: Login with temp password to get new access token
          set +x
          LOGIN_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$TEMP_PASSWORD" \
            --arg tid "$BOOTSTRAP_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          TEMP_DIR="${RUNNER_TEMP}/pwchange"
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          LOGIN_STATUS=$(curl -sS \
            -o "${TEMP_DIR}/login.json" \
            -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$LOGIN_PAYLOAD")
          set -x

          if [ "$LOGIN_STATUS" != "200" ]; then
            echo "::error::Temp password login failed: HTTP ${LOGIN_STATUS}"
            rm -rf "$TEMP_DIR"
            exit 1
          fi

          NEW_ACCESS_TOKEN=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/login.json'))['accessToken'])")
          echo "::add-mask::${NEW_ACCESS_TOKEN}"

          # Step 3: Change from temp back to SANAD_ADMIN_PASSWORD (the permanent one)
          set +x
          CHANGE_BACK_PAYLOAD=$(jq -n \
            --arg current "$TEMP_PASSWORD" \
            --arg new "$ADMIN_FINAL_PASSWORD" \
            '{currentCredential:$current,newCredential:$new}')

          CHANGE_BACK_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/change-credential" \
            -H "Authorization: Bearer ${NEW_ACCESS_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data "$CHANGE_BACK_PAYLOAD")
          set -x

          if [ "$CHANGE_BACK_STATUS" != "204" ]; then
            echo "::error::Password change back to permanent failed: HTTP ${CHANGE_BACK_STATUS}"
            rm -rf "$TEMP_DIR"
            exit 1
          fi
          echo "Password rotation complete: temp → permanent — SUCCESS"

          # Step 4: Verify login with permanent password and mustChangePassword=false
          set +x
          FINAL_LOGIN_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_FINAL_PASSWORD" \
            --arg tid "$BOOTSTRAP_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          FINAL_LOGIN_STATUS=$(curl -sS \
            -o "${TEMP_DIR}/final_login.json" \
            -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$FINAL_LOGIN_PAYLOAD")
          set -x

          if [ "$FINAL_LOGIN_STATUS" != "200" ]; then
            echo "::error::Final password login failed: HTTP ${FINAL_LOGIN_STATUS}"
            rm -rf "$TEMP_DIR"
            exit 1
          fi

          echo "Final password login: HTTP 200 — PASS"

          # Verify mustChangePassword is now false by decoding JWT
          FINAL_ACCESS_TOKEN=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/final_login.json'))['accessToken'])")
          JWT_PAYLOAD=$(echo "$FINAL_ACCESS_TOKEN" | cut -d'.' -f2 | python3 -c "import sys,base64,json; d=sys.stdin.read().strip(); p='='*((4-len(d)%4)%4); print(json.dumps(json.loads(base64.urlsafe_b64decode(d+p))))" 2>/dev/null || echo '{}')
          ROTATION=$(echo "$JWT_PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('rotation_required', 'N/A'))" 2>/dev/null || echo "N/A")
          echo "JWT rotation_required: ${ROTATION}"

          if [ "$ROTATION" = "false" ] || [ "$ROTATION" = "False" ]; then
            echo "mustChangePassword cleared: PASS"
          else
            echo "::warning::rotation_required=${ROTATION} — password was rotated but flag may persist until next login"
          fi

          rm -rf "$TEMP_DIR"

      # -------------------------------------------------------
      # Step 7: Disable bootstrap and redeploy clean
      # Uses same safe pattern: delete BOOTSTRAP_* keys, append disabled ones.
      # -------------------------------------------------------
      - name: Disable bootstrap and redeploy
        id: disable-bootstrap
        shell: bash
        run: |
          set -euo pipefail

          # Fetch current env vars (with bootstrap enabled)
          set +x
          RENDER_ENV=$(curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")

          # Normalize Render API response
          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/render-env-current.json

          # Step A: Remove all BOOTSTRAP_* keys
          jq 'del(.[] | select(.key | startswith("BOOTSTRAP_")))' /tmp/render-env-current.json > /tmp/render-env-no-bootstrap2.json

          # Step B: Add back disabled bootstrap keys
          jq -n '[
            {"key": "BOOTSTRAP_ENABLED", "value": "false"},
            {"key": "BOOTSTRAP_FORCE_RESET", "value": "false"},
            {"key": "BOOTSTRAP_ADMIN_PASSWORD", "value": ""}
          ]' > /tmp/bootstrap-disabled.json

          # Step C: Combine
          jq -s '.[0] + .[1]' /tmp/render-env-no-bootstrap2.json /tmp/bootstrap-disabled.json > /tmp/render-clean-env.json
          set -x

          CLEAN_COUNT=$(jq 'length' /tmp/render-clean-env.json)
          echo "Pushing ${CLEAN_COUNT} env vars with bootstrap DISABLED..."

          set +x
          HTTP_STATUS=$(curl --silent --output /tmp/render-clean-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            --data @/tmp/render-clean-env.json)
          set -x

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Failed to push clean env vars (HTTP ${HTTP_STATUS})"
            rm -f /tmp/render-clean-env.json /tmp/render-clean-response.txt /tmp/render-env-current.json
            exit 1
          fi

          echo "Clean env vars pushed (HTTP ${HTTP_STATUS})"

          # Trigger clean deployment
          TARGET_SHA="${{ steps.bootstrap-deploy.outputs.target_sha }}"

          set +x
          DEPLOY_HTTP=$(curl --silent --output /tmp/clean-deploy-response.txt --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --data "{\"commitId\":\"${TARGET_SHA}\"}")
          set -x

          if [ "$DEPLOY_HTTP" != "200" ] && [ "$DEPLOY_HTTP" != "201" ]; then
            echo "::error::Clean deploy trigger failed (HTTP ${DEPLOY_HTTP})"
            rm -f /tmp/clean-deploy-response.txt
            exit 1
          fi

          CLEAN_DEPLOY_ID=$(jq -r '.id // "unknown"' /tmp/clean-deploy-response.txt 2>/dev/null || echo "unknown")
          echo "clean_deploy_id=${CLEAN_DEPLOY_ID}" >> "$GITHUB_OUTPUT"
          echo "Clean deploy triggered: ${CLEAN_DEPLOY_ID}"
          rm -f /tmp/clean-deploy-response.txt /tmp/render-clean-response.txt

      # -------------------------------------------------------
      # Step 8: Wait for clean deployment
      # -------------------------------------------------------
      - name: Wait for clean deployment
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_ID="${{ steps.disable-bootstrap.outputs.clean_deploy_id }}"
          echo "Waiting for clean deployment ${DEPLOY_ID}..."

          for attempt in $(seq 1 60); do
            set +x
            STATUS=$(curl --silent \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            set -x

            echo "Attempt ${attempt}: deploy status = ${STATUS}"

            if [ "$STATUS" = "live" ]; then
              echo "Clean deployment is LIVE"
              for h in $(seq 1 18); do
                CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 20 "${BASE_URL}/actuator/health" || true)
                if [ "$CODE" = "200" ]; then
                  ST=$(jq -r '.status // "UNKNOWN"' /tmp/health.json 2>/dev/null || echo "UNKNOWN")
                  if [ "$ST" = "UP" ]; then
                    echo "Health: UP"
                    rm -f /tmp/health.json
                    exit 0
                  fi
                fi
                sleep 10
              done
              echo "::error::Health check failed after clean deploy"
              exit 1
            fi

            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ] || [ "$STATUS" = "update_failed" ]; then
              echo "::error::Clean deployment ${STATUS}"
              exit 1
            fi

            sleep 15
          done

          echo "::error::Clean deployment did not go live within 15 minutes"
          exit 1

      # -------------------------------------------------------
      # Step 9: Final verification
      # -------------------------------------------------------
      - name: Verify final administrator login
        shell: bash
        run: |
          set -euo pipefail

          set +x
          FINAL_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_FINAL_PASSWORD" \
            --arg tid "$BOOTSTRAP_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          STATUS=$(curl -sS -o /tmp/final_verify.json -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$FINAL_PAYLOAD")
          set -x

          if [ "$STATUS" != "200" ]; then
            echo "::error::Final admin login verification failed: HTTP ${STATUS}"
            exit 1
          fi

          echo "Final admin login: PASS (HTTP 200)"

      # -------------------------------------------------------
      # Step 10: Cleanup
      # -------------------------------------------------------
      - name: Cleanup temporary files
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/render-*.json /tmp/render-*-response.txt /tmp/deploy-*.txt /tmp/clean-deploy-*.txt /tmp/health.json /tmp/final_verify.json /tmp/bootstrap-*.json

      # -------------------------------------------------------
      # Step 11: Summary
      # -------------------------------------------------------
      - name: Recovery summary
        if: success()
        run: |
          {
            echo "## Administrator Credential Recovery Complete"
            echo ""
            echo "- Recovery path: BOOTSTRAP FORCE RESET"
            echo "- Bootstrap deployment: SUCCESS"
            echo "- Admin login: PASS"
            echo "- Password rotation: PASS"
            echo "- Final login: PASS"
            echo "- Bootstrap disabled: CONFIRMED"
            echo "- Old sessions revoked: CONFIRMED"
            echo ""
            echo "Administrator password: TEMPORARY PASSWORD SET — NOT DISPLAYED"
          } >> "$GITHUB_STEP_SUMMARY"
