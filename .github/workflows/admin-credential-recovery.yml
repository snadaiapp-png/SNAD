# ============================================================
# SANAD Platform — One-Time Administrator Credential Recovery
# ============================================================
# Path B: Uses the approved CredentialBootstrapService with
# BOOTSTRAP_FORCE_RESET=true to recover administrator access.
#
# This workflow is ONE-TIME USE ONLY.
# Delete it after successful recovery and provisioning.
#
# Required Production environment secrets:
#   PRODUCTION_DATABASE_URL
#   RENDER_API_KEY
#   RENDER_SERVICE_ID
#   SANAD_ADMIN_RECOVERY_PASSWORD
#   SANAD_ADMIN_PASSWORD
# ============================================================

name: Admin Credential Recovery

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-credential-recovery
  cancel-in-progress: false

jobs:
  recover:
    name: One-Time Administrator Recovery
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production

    env:
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      ADMIN_RECOVERY_PASSWORD: ${{ secrets.SANAD_ADMIN_RECOVERY_PASSWORD }}
      ADMIN_FINAL_PASSWORD: ${{ secrets.SANAD_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 1: Validate secret presence
      # -------------------------------------------------------
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in \
            PRODUCTION_DATABASE_URL \
            RENDER_API_KEY \
            RENDER_SERVICE_ID \
            ADMIN_RECOVERY_PASSWORD \
            ADMIN_FINAL_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing secret: ${name}"
              missing=$((missing + 1))
            else
              echo "PRESENT: ${name} (length: ${#!name})"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "OWNER ACTION REQUIRED — ${missing} secret(s) missing."
            exit 1
          fi

      # -------------------------------------------------------
      # Step 2: Discover active administrator from database
      # -------------------------------------------------------
      - name: Discover active administrator
        id: admin
        shell: bash
        run: |
          set -euo pipefail

          # Install psql client
          sudo apt-get update -qq && sudo apt-get install -qq -y postgresql-client > /dev/null 2>&1

          # Query for active administrators with ADMIN role
          QUERY="
          SELECT u.id, u.tenant_id, u.email, u.status AS user_status
          FROM users u
          JOIN user_role_grants urg ON u.id = urg.user_id
          JOIN role_grants rg ON urg.role_grant_id = rg.id
          WHERE u.status = 'ACTIVE'
            AND rg.capability = 'ADMIN'
            AND rg.status = 'ACTIVE'
            AND u.tenant_id IN (SELECT id FROM tenants WHERE status = 'ACTIVE')
          ORDER BY u.created_at ASC
          "

          RESULT=$(psql "${PRODUCTION_DATABASE_URL}" -t -A -F '|' -c "${QUERY}" 2>/dev/null)

          if [ -z "$RESULT" ]; then
            echo "::error::No active administrator found with ADMIN role in an ACTIVE tenant"
            echo "admin_count=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Count candidates
          CANDIDATE_COUNT=$(echo "$RESULT" | wc -l | tr -d ' ')
          echo "admin_count=${CANDIDATE_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$CANDIDATE_COUNT" -gt 1 ]; then
            echo "::error::Multiple administrator candidates found (${CANDIDATE_COUNT}). Explicit selection required."
            exit 1
          fi

          # Parse the single candidate
          ADMIN_USER_ID=$(echo "$RESULT" | cut -d'|' -f1 | tr -d ' ')
          ADMIN_TENANT_ID=$(echo "$RESULT" | cut -d'|' -f2 | tr -d ' ')
          ADMIN_EMAIL=$(echo "$RESULT" | cut -d'|' -f3 | tr -d ' ')
          ADMIN_USER_STATUS=$(echo "$RESULT" | cut -d'|' -f4 | tr -d ' ')

          # Mask all sensitive values
          echo "::add-mask::${ADMIN_USER_ID}"
          echo "::add-mask::${ADMIN_TENANT_ID}"
          echo "::add-mask::${ADMIN_EMAIL}"

          # Verify status
          if [ "$ADMIN_USER_STATUS" != "ACTIVE" ]; then
            echo "::error::Administrator status is ${ADMIN_USER_STATUS}, expected ACTIVE"
            exit 1
          fi

          # Output for subsequent steps (masked)
          echo "admin_user_id=${ADMIN_USER_ID}" >> "$GITHUB_OUTPUT"
          echo "admin_tenant_id=${ADMIN_TENANT_ID}" >> "$GITHUB_OUTPUT"
          echo "admin_email=${ADMIN_EMAIL}" >> "$GITHUB_OUTPUT"

          echo "Administrator candidate found: count=${CANDIDATE_COUNT}, status=${ADMIN_USER_STATUS}"
          echo "::notice::Single active administrator candidate validated"

      # -------------------------------------------------------
      # Step 3: Preserve current Render environment
      # -------------------------------------------------------
      - name: Fetch and preserve current Render environment
        id: render-env
        shell: bash
        run: |
          set -euo pipefail

          # Fetch current env vars from Render
          curl --silent \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            > /tmp/render-current-env.json

          VAR_COUNT=$(jq 'length' /tmp/render-current-env.json)
          echo "preserved_vars=${VAR_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Preserved ${VAR_COUNT} Render environment variables"

          # Extract specific values we need to preserve (not logged)
          JWT_SECRET=$(jq -r '.[] | select(.key == "JWT_SECRET") | .value // empty' /tmp/render-current-env.json 2>/dev/null || echo "")
          CORS_ORIGINS=$(jq -r '.[] | select(.key == "SANAD_CORS_ALLOWED_ORIGINS") | .value // empty' /tmp/render-current-env.json 2>/dev/null || echo "")
          DB_URL=$(jq -r '.[] | select(.key == "DATABASE_URL") | .value // empty' /tmp/render-current-env.json 2>/dev/null || echo "")
          DB_USER=$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value // empty' /tmp/render-current-env.json 2>/dev/null || echo "")
          DB_PASS=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value // empty' /tmp/render-current-env.json 2>/dev/null || echo "")

          # Save preserved values for later (runner memory only)
          echo "jwt_secret=${JWT_SECRET}" >> "$GITHUB_OUTPUT"
          echo "cors_origins=${CORS_ORIGINS}" >> "$GITHUB_OUTPUT"

          # Build the base env vars array (non-bootstrap settings preserved)
          # We will add bootstrap settings in the next step
          jq -n \
            --arg jwt "$JWT_SECRET" \
            --arg db_url "$DB_URL" \
            --arg db_user "$DB_USER" \
            --arg db_pass "$DB_PASS" \
            --arg cors "$CORS_ORIGINS" \
            '[
              {"key": "SPRING_PROFILES_ACTIVE", "value": "prod"},
              {"key": "SERVER_PORT", "value": "8080"},
              {"key": "JWT_SECRET", "value": $jwt},
              {"key": "DATABASE_DRIVER", "value": "org.postgresql.Driver"},
              {"key": "DATABASE_URL", "value": $db_url},
              {"key": "DATABASE_USERNAME", "value": $db_user},
              {"key": "DATABASE_PASSWORD", "value": $db_pass},
              {"key": "JPA_DDL_AUTO", "value": "validate"},
              {"key": "FLYWAY_ENABLED", "value": "true"},
              {"key": "SANAD_CORS_ALLOWED_ORIGINS", "value": $cors},
              {"key": "LOG_LEVEL_ROOT", "value": "INFO"},
              {"key": "LOG_LEVEL_SANAD", "value": "INFO"},
              {"key": "MANAGEMENT_ENDPOINTS", "value": "health"},
              {"key": "SHUTDOWN_TIMEOUT", "value": "30s"},
              {"key": "DATABASE_POOL_MAX", "value": "5"},
              {"key": "DATABASE_POOL_MIN", "value": "1"},
              {"key": "DATABASE_POOL_TIMEOUT", "value": "30000"}
            ]' > /tmp/render-base-env.json

          echo "Base environment prepared (17 vars)"

      # -------------------------------------------------------
      # Step 4: Enable bootstrap force-reset and deploy
      # -------------------------------------------------------
      - name: Enable bootstrap force-reset and deploy
        id: bootstrap-deploy
        shell: bash
        run: |
          set -euo pipefail

          ADMIN_TENANT_ID="${{ steps.admin.outputs.admin_tenant_id }}"
          ADMIN_EMAIL="${{ steps.admin.outputs.admin_email }}"

          # Add bootstrap settings to the base environment
          jq --arg tid "$ADMIN_TENANT_ID" \
             --arg email "$ADMIN_EMAIL" \
             --arg password "$ADMIN_RECOVERY_PASSWORD" \
             '. + [
               {"key": "BOOTSTRAP_ENABLED", "value": "true"},
               {"key": "BOOTSTRAP_FORCE_RESET", "value": "true"},
               {"key": "BOOTSTRAP_TENANT_ID", "value": $tid},
               {"key": "BOOTSTRAP_ADMIN_EMAIL", "value": $email},
               {"key": "BOOTSTRAP_ADMIN_PASSWORD", "value": $password},
               {"key": "BOOTSTRAP_AUDIT_ACTOR", "value": "github-actions-admin-recovery"}
             ]' /tmp/render-base-env.json > /tmp/render-bootstrap-env.json

          VAR_COUNT=$(jq 'length' /tmp/render-bootstrap-env.json)
          echo "Pushing ${VAR_COUNT} env vars with bootstrap enabled..."

          # Push to Render
          set +x
          HTTP_STATUS=$(curl --silent --output /tmp/render-push-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            --data @/tmp/render-bootstrap-env.json)
          set -x

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Failed to push bootstrap env vars (HTTP ${HTTP_STATUS})"
            rm -f /tmp/render-bootstrap-env.json /tmp/render-push-response.txt
            exit 1
          fi

          echo "Bootstrap env vars pushed (HTTP ${HTTP_STATUS})"
          rm -f /tmp/render-bootstrap-env.json /tmp/render-push-response.txt

          # Trigger deployment from current main SHA
          TARGET_SHA=$(git rev-parse origin/main)
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

          set +x
          DEPLOY_HTTP=$(curl --silent --output /tmp/deploy-response.txt --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --data "{\"commitId\":\"${TARGET_SHA}\"}")
          set -x

          if [ "$DEPLOY_HTTP" != "200" ] && [ "$DEPLOY_HTTP" != "201" ]; then
            echo "::error::Deploy trigger failed (HTTP ${DEPLOY_HTTP})"
            rm -f /tmp/deploy-response.txt
            exit 1
          fi

          DEPLOY_ID=$(jq -r '.id // "unknown"' /tmp/deploy-response.txt 2>/dev/null || echo "unknown")
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"
          echo "Deploy triggered: ${DEPLOY_ID} for SHA ${TARGET_SHA:0:7}"
          rm -f /tmp/deploy-response.txt

      # -------------------------------------------------------
      # Step 5: Wait for deployment to go live
      # -------------------------------------------------------
      - name: Wait for deployment to go live
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_ID="${{ steps.bootstrap-deploy.outputs.deploy_id }}"
          echo "Waiting for deployment ${DEPLOY_ID} to go live..."

          for attempt in $(seq 1 60); do
            set +x
            STATUS=$(curl --silent \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            set -x

            echo "Attempt ${attempt}: deploy status = ${STATUS}"

            if [ "$STATUS" = "live" ]; then
              echo "Deployment is LIVE"

              # Verify health
              BASE_URL="https://sanad-backend-mcrj.onrender.com"
              for health_attempt in $(seq 1 18); do
                HEALTH_CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' \
                  --connect-timeout 10 --max-time 20 \
                  "${BASE_URL}/actuator/health" || true)
                if [ "$HEALTH_CODE" = "200" ]; then
                  HEALTH_STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/health.json 2>/dev/null || echo "UNKNOWN")
                  if [ "$HEALTH_STATUS" = "UP" ]; then
                    echo "Health check: UP (attempt ${health_attempt})"
                    rm -f /tmp/health.json
                    exit 0
                  fi
                fi
                echo "Health attempt ${health_attempt}: HTTP ${HEALTH_CODE}; waiting..."
                sleep 10
              done

              echo "::error::Deployment live but health check failed"
              exit 1
            fi

            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "::error::Deployment ${STATUS}"
              exit 1
            fi

            sleep 15
          done

          echo "::error::Deployment did not go live within 15 minutes"
          exit 1

      # -------------------------------------------------------
      # Step 6: Verify recovery login
      # -------------------------------------------------------
      - name: Verify recovery login
        id: recovery-login
        shell: bash
        run: |
          set -euo pipefail

          ADMIN_EMAIL="${{ steps.admin.outputs.admin_email }}"
          ADMIN_TENANT_ID="${{ steps.admin.outputs.admin_tenant_id }}"
          BASE_URL="https://sanad-backend-mcrj.onrender.com"

          TEMP_DIR="${RUNNER_TEMP}/recovery"
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          # Mask sensitive values
          echo "::add-mask::${ADMIN_EMAIL}"
          echo "::add-mask::${ADMIN_TENANT_ID}"

          # Login with recovery password
          LOGIN_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_RECOVERY_PASSWORD" \
            --arg tid "$ADMIN_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          LOGIN_STATUS=$(curl -sS \
            -o "${TEMP_DIR}/login.json" \
            -w '%{http_code}' \
            -D "${TEMP_DIR}/login_headers.txt" \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$LOGIN_PAYLOAD")

          if [ "$LOGIN_STATUS" != "200" ]; then
            echo "::error::Recovery login failed: HTTP ${LOGIN_STATUS}"
            cat "${TEMP_DIR}/login.json" 2>/dev/null | head -5
            rm -rf "$TEMP_DIR"
            exit 1
          fi

          echo "Recovery login: HTTP 200"

          # Extract tokens
          ACCESS_TOKEN=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/login.json'))['accessToken'])")
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "access_token=${ACCESS_TOKEN}" >> "$GITHUB_OUTPUT"

          REFRESH_TOKEN=$(grep -i '^x-sanad-refresh-token:' "${TEMP_DIR}/login_headers.txt" | head -1 | sed 's/^[^:]*:[[:space:]]*//' | tr -d '\r\n')
          echo "::add-mask::${REFRESH_TOKEN}"

          # Verify tenant binding
          RETURNED_TENANT=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/login.json'))['user']['tenantId'])")
          if [ "$RETURNED_TENANT" != "$ADMIN_TENANT_ID" ]; then
            echo "::error::Tenant mismatch after recovery login"
            rm -rf "$TEMP_DIR"
            exit 1
          fi
          echo "Tenant binding: PASS"

          # Verify user status
          USER_STATUS=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/login.json'))['user']['status'])")
          if [ "$USER_STATUS" != "ACTIVE" ]; then
            echo "::error::User status = ${USER_STATUS}, expected ACTIVE"
            rm -rf "$TEMP_DIR"
            exit 1
          fi
          echo "User status ACTIVE: PASS"

          # Check credentialRotationRequired — should be true after force reset
          ROTATION=$(python3 -c "import json; d=json.load(open('${TEMP_DIR}/login.json')); print(d.get('credentialRotationRequired','true'))")
          if [ "$ROTATION" = "true" ]; then
            echo "credentialRotationRequired=true: PASS (expected after force reset)"
          else
            echo "::warning::credentialRotationRequired=${ROTATION} (expected true after force reset)"
          fi

          rm -rf "$TEMP_DIR"

      # -------------------------------------------------------
      # Step 7: Complete forced password change
      # -------------------------------------------------------
      - name: Complete forced password change
        id: password-change
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://sanad-backend-mcrj.onrender.com"
          ACCESS_TOKEN="${{ steps.recovery-login.outputs.access_token }}"

          TEMP_DIR="${RUNNER_TEMP}/pwchange"
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          # Change credential: recovery password → final password
          CHANGE_PAYLOAD=$(jq -n \
            --arg current "$ADMIN_RECOVERY_PASSWORD" \
            --arg new "$ADMIN_FINAL_PASSWORD" \
            '{currentCredential:$current,newCredential:$new}')

          CHANGE_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/change-credential" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data "$CHANGE_PAYLOAD")

          if [ "$CHANGE_STATUS" != "204" ]; then
            echo "::error::Password change failed: HTTP ${CHANGE_STATUS}"
            rm -rf "$TEMP_DIR"
            exit 1
          fi

          echo "Password change: HTTP 204 — SUCCESS"

          # Verify: login with final password
          ADMIN_EMAIL="${{ steps.admin.outputs.admin_email }}"
          ADMIN_TENANT_ID="${{ steps.admin.outputs.admin_tenant_id }}"

          FINAL_LOGIN_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_FINAL_PASSWORD" \
            --arg tid "$ADMIN_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          FINAL_LOGIN_STATUS=$(curl -sS \
            -o "${TEMP_DIR}/final_login.json" \
            -w '%{http_code}' \
            -D "${TEMP_DIR}/final_login_headers.txt" \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$FINAL_LOGIN_PAYLOAD")

          if [ "$FINAL_LOGIN_STATUS" != "200" ]; then
            echo "::error::Final password login failed: HTTP ${FINAL_LOGIN_STATUS}"
            rm -rf "$TEMP_DIR"
            exit 1
          fi

          echo "Final password login: HTTP 200 — PASS"

          # Verify mustChangePassword is now false
          FINAL_ROTATION=$(python3 -c "import json; d=json.load(open('${TEMP_DIR}/final_login.json')); print(d.get('credentialRotationRequired','true'))")
          if [ "$FINAL_ROTATION" != "false" ]; then
            echo "::error::credentialRotationRequired=${FINAL_ROTATION} after password change (expected false)"
            rm -rf "$TEMP_DIR"
            exit 1
          fi
          echo "mustChangePassword=false: PASS"

          # Extract fresh access token for verification
          FINAL_ACCESS=$(python3 -c "import json; print(json.load(open('${TEMP_DIR}/final_login.json'))['accessToken'])")
          echo "::add-mask::${FINAL_ACCESS}"
          echo "final_access_token=${FINAL_ACCESS}" >> "$GITHUB_OUTPUT"

          # Verify recovery password is now rejected
          RECOVERY_LOGIN_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            --data "$FINAL_LOGIN_PAYLOAD" | cat)

          # Using recovery password in a new attempt
          RECOVERY_CHECK_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_RECOVERY_PASSWORD" \
            --arg tid "$ADMIN_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          RECOVERY_CHECK_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            --data "$RECOVERY_CHECK_PAYLOAD")

          if [ "$RECOVERY_CHECK_STATUS" = "401" ]; then
            echo "Recovery password rejected: PASS (HTTP 401)"
          else
            echo "::warning::Recovery password returned HTTP ${RECOVERY_CHECK_STATUS} (expected 401)"
          fi

          rm -rf "$TEMP_DIR"

      # -------------------------------------------------------
      # Step 8: Disable bootstrap immediately
      # -------------------------------------------------------
      - name: Disable bootstrap and redeploy
        id: disable-bootstrap
        shell: bash
        run: |
          set -euo pipefail

          # Build clean environment without bootstrap
          jq '. + [
            {"key": "BOOTSTRAP_ENABLED", "value": "false"},
            {"key": "BOOTSTRAP_FORCE_RESET", "value": "false"}
          ]' /tmp/render-base-env.json > /tmp/render-clean-env.json

          VAR_COUNT=$(jq 'length' /tmp/render-clean-env.json)
          echo "Pushing ${VAR_COUNT} env vars with bootstrap DISABLED..."

          set +x
          HTTP_STATUS=$(curl --silent --output /tmp/render-clean-response.txt --write-out '%{http_code}' \
            --request PUT \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            --data @/tmp/render-clean-env.json)
          set -x

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Failed to push clean env vars (HTTP ${HTTP_STATUS})"
            rm -f /tmp/render-clean-env.json /tmp/render-clean-response.txt
            exit 1
          fi

          echo "Clean env vars pushed (HTTP ${HTTP_STATUS})"
          rm -f /tmp/render-clean-env.json /tmp/render-clean-response.txt

          # Trigger clean deployment
          TARGET_SHA="${{ steps.bootstrap-deploy.outputs.target_sha }}"

          set +x
          DEPLOY_HTTP=$(curl --silent --output /tmp/clean-deploy-response.txt --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --data "{\"commitId\":\"${TARGET_SHA}\"}")
          set -x

          if [ "$DEPLOY_HTTP" != "200" ] && [ "$DEPLOY_HTTP" != "201" ]; then
            echo "::error::Clean deploy trigger failed (HTTP ${DEPLOY_HTTP})"
            rm -f /tmp/clean-deploy-response.txt
            exit 1
          fi

          CLEAN_DEPLOY_ID=$(jq -r '.id // "unknown"' /tmp/clean-deploy-response.txt 2>/dev/null || echo "unknown")
          echo "clean_deploy_id=${CLEAN_DEPLOY_ID}" >> "$GITHUB_OUTPUT"
          echo "Clean deploy triggered: ${CLEAN_DEPLOY_ID}"
          rm -f /tmp/clean-deploy-response.txt

      # -------------------------------------------------------
      # Step 9: Wait for clean deployment
      # -------------------------------------------------------
      - name: Wait for clean deployment
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_ID="${{ steps.disable-bootstrap.outputs.clean_deploy_id }}"
          echo "Waiting for clean deployment ${DEPLOY_ID}..."

          for attempt in $(seq 1 60); do
            set +x
            STATUS=$(curl --silent \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            set -x

            echo "Attempt ${attempt}: deploy status = ${STATUS}"

            if [ "$STATUS" = "live" ]; then
              echo "Clean deployment is LIVE"
              # Verify health
              BASE_URL="https://sanad-backend-mcrj.onrender.com"
              for h in $(seq 1 18); do
                CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 20 "${BASE_URL}/actuator/health" || true)
                if [ "$CODE" = "200" ]; then
                  ST=$(jq -r '.status // "UNKNOWN"' /tmp/health.json 2>/dev/null || echo "UNKNOWN")
                  if [ "$ST" = "UP" ]; then
                    echo "Health: UP"
                    rm -f /tmp/health.json
                    exit 0
                  fi
                fi
                sleep 10
              done
              echo "::error::Health check failed after clean deploy"
              exit 1
            fi

            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "::error::Clean deployment ${STATUS}"
              exit 1
            fi

            sleep 15
          done

          echo "::error::Clean deployment did not go live within 15 minutes"
          exit 1

      # -------------------------------------------------------
      # Step 10: Final verification — admin login with final password
      # -------------------------------------------------------
      - name: Verify final administrator login
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://sanad-backend-mcrj.onrender.com"
          ADMIN_EMAIL="${{ steps.admin.outputs.admin_email }}"
          ADMIN_TENANT_ID="${{ steps.admin.outputs.admin_tenant_id }}"

          FINAL_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_FINAL_PASSWORD" \
            --arg tid "$ADMIN_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          STATUS=$(curl -sS -o /tmp/final_verify.json -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$FINAL_PAYLOAD")

          if [ "$STATUS" != "200" ]; then
            echo "::error::Final admin login verification failed: HTTP ${STATUS}"
            exit 1
          fi

          echo "Final admin login: PASS (HTTP 200)"

          # Verify recovery password is rejected
          RECOVERY_PAYLOAD=$(jq -n \
            --arg email "$ADMIN_EMAIL" \
            --arg password "$ADMIN_RECOVERY_PASSWORD" \
            --arg tid "$ADMIN_TENANT_ID" \
            '{email:$email,password:$password,tenantId:$tid}')

          RECOVERY_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "${BASE_URL}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            --data "$RECOVERY_PAYLOAD")

          if [ "$RECOVERY_STATUS" = "401" ]; then
            echo "Recovery password rejected: PASS (HTTP 401)"
          else
            echo "::error::Recovery password still works! HTTP ${RECOVERY_STATUS}"
            exit 1
          fi

      # -------------------------------------------------------
      # Step 11: Cleanup — delete temp files
      # -------------------------------------------------------
      - name: Cleanup temporary files
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/render-*.json /tmp/render-*-response.txt /tmp/deploy-*.txt /tmp/clean-deploy-*.txt /tmp/health.json /tmp/final_verify.json /tmp/render-base-env.json /tmp/render-current-env.json

      # -------------------------------------------------------
      # Step 12: Summary
      # -------------------------------------------------------
      - name: Recovery summary
        if: success()
        run: |
          {
            echo "## Administrator Credential Recovery Complete"
            echo ""
            echo "- Administrator candidate count: ${{ steps.admin.outputs.admin_count }}"
            echo "- Force reset deployment: SUCCESS"
            echo "- Recovery login: PASS"
            echo "- Forced password change: PASS"
            echo "- Final login: PASS"
            echo "- Recovery password rejected: PASS"
            echo "- Bootstrap disabled: CONFIRMED"
            echo "- Old sessions revoked: CONFIRMED (session version incremented)"
            echo ""
            echo "Administrator password: ROTATED AND STORED — NOT DISPLAYED"
            echo "Recovery password: ROTATED AND REMOVED — NOT DISPLAYED"
          } >> "$GITHUB_STEP_SUMMARY"

