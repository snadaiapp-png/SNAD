name: REM-P0-002 Production Rollout

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/rem-p0-002-production-rollout.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: rem-p0-002-production-rollout
  cancel-in-progress: false

jobs:
  rollout:
    name: Deploy exact main SHA and verify production auth journey
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: Production
    env:
      PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      AUTH_SMOKE_TENANT_ID: ${{ secrets.AUTH_SMOKE_TENANT_A_ID }}
      AUTH_SMOKE_EMAIL: ${{ secrets.AUTH_SMOKE_TENANT_A_EMAIL }}
      AUTH_SMOKE_PASSWORD: ${{ secrets.AUTH_SMOKE_TENANT_A_PASSWORD }}

    steps:
      - name: Checkout exact main SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate protected configuration and exact SHA
        shell: bash
        run: |
          set -euo pipefail
          for name in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID AUTH_SMOKE_TENANT_ID AUTH_SMOKE_EMAIL AUTH_SMOKE_PASSWORD; do
            test -n "${!name:-}" || { echo "::error::Missing Production secret: $name"; exit 1; }
            echo "::add-mask::${!name}"
          done
          [[ "$PRODUCTION_WEB_BASE_URL" == https://* ]] || { echo "::error::Production web URL must use HTTPS"; exit 1; }
          REMOTE_MAIN_SHA="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$REMOTE_MAIN_SHA" = "$GITHUB_SHA" || {
            echo "::error::Workflow SHA $GITHUB_SHA is not the current main SHA $REMOTE_MAIN_SHA"
            exit 1
          }

      - name: Deploy exact SHA to Vercel Production
        id: vercel
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          TEAM_QUERY="?teamId=${VERCEL_TEAM_ID}"
          LIST_URL="https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=production&limit=100&teamId=${VERCEL_TEAM_ID}"

          curl --fail-with-body --silent --show-error --max-time 30 \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "$LIST_URL" > "$RUNNER_TEMP/vercel-list.json"

          DEPLOYMENT_ID="$(jq -r --arg sha "$GITHUB_SHA" '
            [.deployments[]? | select(
              (.meta.githubCommitSha // "") == $sha and
              (.target // "") == "production" and
              ((.readyState // .state // "") == "READY")
            )] | sort_by(.createdAt) | last | .uid // empty
          ' "$RUNNER_TEMP/vercel-list.json")"

          if [ -z "$DEPLOYMENT_ID" ]; then
            curl --fail-with-body --silent --show-error --max-time 30 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}${TEAM_QUERY}" \
              > "$RUNNER_TEMP/vercel-project.json"
            PROJECT_NAME="$(jq -r '.name // empty' "$RUNNER_TEMP/vercel-project.json")"
            test -n "$PROJECT_NAME"

            jq -n \
              --arg name "$PROJECT_NAME" \
              --arg project "$VERCEL_PROJECT_ID" \
              --arg sha "$GITHUB_SHA" \
              '{
                name:$name,
                project:$project,
                target:"production",
                gitSource:{type:"github",org:"snadaiapp-png",repo:"SNAD",ref:"main",sha:$sha},
                gitMetadata:{
                  remoteUrl:"https://github.com/snadaiapp-png/SNAD",
                  commitRef:"main",
                  commitSha:$sha,
                  dirty:"false",
                  ci:"true",
                  ciType:"github-actions"
                },
                meta:{githubCommitSha:$sha,remediation:"REM-P0-002"}
              }' > "$RUNNER_TEMP/vercel-create.json"

            curl --fail-with-body --silent --show-error --max-time 60 \
              -X POST \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H 'Content-Type: application/json' \
              --data @"$RUNNER_TEMP/vercel-create.json" \
              "https://api.vercel.com/v13/deployments${TEAM_QUERY}" \
              > "$RUNNER_TEMP/vercel-created.json"
            DEPLOYMENT_ID="$(jq -r '.id // .uid // empty' "$RUNNER_TEMP/vercel-created.json")"
            test -n "$DEPLOYMENT_ID" || { cat "$RUNNER_TEMP/vercel-created.json"; exit 1; }
          fi

          MATCH=""
          for attempt in $(seq 1 150); do
            curl --fail-with-body --silent --show-error --max-time 30 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "$LIST_URL" > "$RUNNER_TEMP/vercel-list.json"
            MATCH="$(jq -c --arg id "$DEPLOYMENT_ID" --arg sha "$GITHUB_SHA" '
              [.deployments[]? | select(
                (.uid // "") == $id and
                (.meta.githubCommitSha // "") == $sha and
                (.target // "") == "production"
              )] | last // empty
            ' "$RUNNER_TEMP/vercel-list.json")"
            if [ -n "$MATCH" ] && [ "$MATCH" != "null" ]; then
              STATE="$(jq -r '.readyState // .state // empty' <<< "$MATCH")"
              case "$STATE" in
                READY) break ;;
                ERROR|CANCELED) echo "::error::Vercel deployment failed: $STATE"; exit 1 ;;
              esac
            fi
            sleep 10
          done

          test -n "$MATCH" && test "$MATCH" != "null"
          VERCEL_SHA="$(jq -r '.meta.githubCommitSha // empty' <<< "$MATCH")"
          VERCEL_STATE="$(jq -r '.readyState // .state // empty' <<< "$MATCH")"
          VERCEL_URL="$(jq -r '.url // empty' <<< "$MATCH")"
          test "$VERCEL_SHA" = "$GITHUB_SHA"
          test "$VERCEL_STATE" = "READY"
          test -n "$VERCEL_URL"

          jq -n --arg sha "$GITHUB_SHA" --argjson deployment "$MATCH" '{
            schema_version:"1.0",
            finding:"REM-P0-002",
            release_sha:$sha,
            deployment_id:$deployment.uid,
            deployment_url:$deployment.url,
            target:$deployment.target,
            ready_state:($deployment.readyState // $deployment.state),
            deployed_commit_sha:$deployment.meta.githubCommitSha,
            result:(if ($deployment.meta.githubCommitSha == $sha and $deployment.target == "production" and (($deployment.readyState // $deployment.state) == "READY")) then "PASS" else "FAIL" end)
          }' > evidence/rem-p0-002-vercel-deployment.json

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "deployment_url=$VERCEL_URL" >> "$GITHUB_OUTPUT"

      - name: Verify production backend routing snapshot
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            CODE="$(curl -sS --show-error --max-time 30 -o "$RUNNER_TEMP/backend-status.json" -w '%{http_code}' "${PRODUCTION_WEB_BASE_URL}/api/system/backend-status" || true)"
            if [ "$CODE" = "200" ] && jq -e '.configured == true and .reachable == true and .statusCode == 200' "$RUNNER_TEMP/backend-status.json" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          test "$CODE" = "200"
          jq -e '.configured == true and .reachable == true and .statusCode == 200' "$RUNNER_TEMP/backend-status.json" >/dev/null
          jq --arg sha "$GITHUB_SHA" '{release_sha:$sha,configured,reachable,statusCode,targetHost,checkedAt,result:"PASS"}' "$RUNNER_TEMP/backend-status.json" > evidence/rem-p0-002-backend-routing.json

      - name: Run five consecutive production BFF authentication journeys
        shell: bash
        env:
          AUTH_SYNTHETIC_ITERATIONS: '5'
          AUTH_SYNTHETIC_EVIDENCE_PATH: evidence/rem-p0-002-initial-synthetic.json
        run: |
          set -euo pipefail
          python3 scripts/operations/bff_auth_session_synthetic.py

      - name: Upload rollout and synthetic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rem-p0-002-production-rollout-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90

      - name: Record successful rollout and start observation window
        if: success()
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_ID: ${{ steps.vercel.outputs.deployment_id }}
          DEPLOYMENT_URL: ${{ steps.vercel.outputs.deployment_url }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const body = [
              '## REM-P0-002 exact-SHA Production rollout passed',
              '',
              `- Release SHA: \`${context.sha}\``,
              `- Vercel deployment ID: \`${process.env.DEPLOYMENT_ID}\``,
              `- Deployment URL: \`${process.env.DEPLOYMENT_URL}\``,
              `- Production alias: \`${process.env.PRODUCTION_WEB_BASE_URL}\``,
              '- Initial production synthetic: **5/5 consecutive journeys passed**',
              `- Observation window start: \`${now}\``,
              `- Workflow evidence: ${runUrl}`,
              '',
              'REM-P0-002 remains open until 72 consecutive hourly scheduled synthetic runs, log review, lockout/audit evidence, SLO reporting, owner acceptance, and tunnel dependency disposition are complete.'
            ].join('\n');
            for (const issue_number of [516, 534, 535]) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number, body});
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 537,
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Record failed rollout
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## REM-P0-002 Production rollout failed',
              '',
              `- Attempted SHA: \`${context.sha}\``,
              `- Workflow: ${runUrl}`,
              '- Observation window has not started or must be reset.',
              '- REM-P0-002 remains open.'
            ].join('\n');
            for (const issue_number of [516, 534, 535, 537]) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number, body});
            }
