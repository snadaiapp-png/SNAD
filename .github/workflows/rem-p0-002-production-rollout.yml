name: CRM-007 Exact-SHA Production Rollout

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/rem-p0-002-production-rollout.yml

permissions:
  contents: read

env:
  RELEASE_SHA: 083ea46bec989a27f60d7f6ca0085230188470b9

jobs:
  rollout:
    if: github.head_ref == 'ops/crm-007-production-rollout'
    name: Deploy CRM-007 merge SHA and verify production runtime
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: Production
    env:
      PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      AUTH_SMOKE_TENANT_ID: ${{ secrets.AUTH_SMOKE_TENANT_A_ID }}
      AUTH_SMOKE_EMAIL: ${{ secrets.AUTH_SMOKE_TENANT_A_EMAIL }}
      AUTH_SMOKE_PASSWORD: ${{ secrets.AUTH_SMOKE_TENANT_A_PASSWORD }}
    steps:
      - name: Checkout rollout definition
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate protected configuration and release ancestry
        shell: bash
        run: |
          set -euo pipefail
          for name in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID AUTH_SMOKE_TENANT_ID AUTH_SMOKE_EMAIL AUTH_SMOKE_PASSWORD; do
            test -n "${!name:-}" || { echo "::error::Missing Production secret: $name"; exit 1; }
            echo "::add-mask::${!name}"
          done
          git cat-file -e "${RELEASE_SHA}^{commit}"
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main
          test "$(git show -s --format=%s "$RELEASE_SHA")" = "feat(crm): add normalized addresses and communication methods (#546)"
          mkdir -p evidence

      - name: Deploy exact CRM-007 merge SHA to Vercel Production
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          TEAM_QUERY="?teamId=${VERCEL_TEAM_ID}"
          LIST_URL="https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=production&limit=100&teamId=${VERCEL_TEAM_ID}"
          curl --fail-with-body --silent --show-error --max-time 30 \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" "$LIST_URL" > "$RUNNER_TEMP/vercel-list.json"
          DEPLOYMENT_ID="$(jq -r --arg sha "$RELEASE_SHA" '[.deployments[]? | select((.meta.githubCommitSha // "") == $sha and (.target // "") == "production" and ((.readyState // .state // "") == "READY"))] | sort_by(.createdAt) | last | .uid // empty' "$RUNNER_TEMP/vercel-list.json")"
          if [ -z "$DEPLOYMENT_ID" ]; then
            curl --fail-with-body --silent --show-error --max-time 30 \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}${TEAM_QUERY}" > "$RUNNER_TEMP/project.json"
            PROJECT_NAME="$(jq -r '.name' "$RUNNER_TEMP/project.json")"
            jq -n --arg name "$PROJECT_NAME" --arg project "$VERCEL_PROJECT_ID" --arg sha "$RELEASE_SHA" '{name:$name,project:$project,target:"production",gitSource:{type:"github",org:"snadaiapp-png",repo:"SNAD",ref:"main",sha:$sha},gitMetadata:{remoteUrl:"https://github.com/snadaiapp-png/SNAD",commitRef:"main",commitSha:$sha,dirty:"false",ci:"true",ciType:"github-actions"},meta:{githubCommitSha:$sha,gate:"CRM-G3D"}}' > "$RUNNER_TEMP/create.json"
            curl --fail-with-body --silent --show-error --max-time 60 -X POST \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" -H 'Content-Type: application/json' \
              --data @"$RUNNER_TEMP/create.json" "https://api.vercel.com/v13/deployments${TEAM_QUERY}" > "$RUNNER_TEMP/created.json"
            DEPLOYMENT_ID="$(jq -r '.id // .uid // empty' "$RUNNER_TEMP/created.json")"
            test -n "$DEPLOYMENT_ID" || { cat "$RUNNER_TEMP/created.json"; exit 1; }
          fi
          MATCH=""
          for attempt in $(seq 1 150); do
            curl --fail-with-body --silent --show-error --max-time 30 -H "Authorization: Bearer ${VERCEL_TOKEN}" "$LIST_URL" > "$RUNNER_TEMP/vercel-list.json"
            MATCH="$(jq -c --arg id "$DEPLOYMENT_ID" --arg sha "$RELEASE_SHA" '[.deployments[]? | select((.uid // "") == $id and (.meta.githubCommitSha // "") == $sha and (.target // "") == "production")] | last // empty' "$RUNNER_TEMP/vercel-list.json")"
            if [ -n "$MATCH" ] && [ "$MATCH" != null ]; then
              STATE="$(jq -r '.readyState // .state // empty' <<< "$MATCH")"
              case "$STATE" in READY) break ;; ERROR|CANCELED) echo "::error::Vercel deployment failed: $STATE"; exit 1 ;; esac
            fi
            sleep 10
          done
          test "$(jq -r '.meta.githubCommitSha' <<< "$MATCH")" = "$RELEASE_SHA"
          test "$(jq -r '.target' <<< "$MATCH")" = production
          test "$(jq -r '.readyState // .state' <<< "$MATCH")" = READY
          jq -n --arg release_sha "$RELEASE_SHA" --argjson deployment "$MATCH" '{release_sha:$release_sha,deployment_id:$deployment.uid,deployment_url:$deployment.url,target:$deployment.target,state:($deployment.readyState // $deployment.state),deployed_sha:$deployment.meta.githubCommitSha,result:"PASS"}' > evidence/crm-007-vercel-production.json
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Verify BFF routing and authenticated CRM-007 database reads
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import http.cookiejar, json, os, urllib.error, urllib.parse, urllib.request, uuid
          base=os.environ['PRODUCTION_WEB_BASE_URL'].rstrip('/')
          tenant=os.environ['AUTH_SMOKE_TENANT_ID']
          email=os.environ['AUTH_SMOKE_EMAIL']
          password=os.environ['AUTH_SMOKE_PASSWORD']
          jar=http.cookiejar.CookieJar(); opener=urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))
          evidence={'release_sha':os.environ['RELEASE_SHA'],'base_url':base,'checks':[]}
          def call(method,path,payload=None,token=None):
              data=None if payload is None else json.dumps(payload).encode()
              headers={'Accept':'application/json','Origin':base,'X-Request-Id':f'crm007-prod-{uuid.uuid4()}'}
              if data is not None: headers['Content-Type']='application/json'
              if token: headers['Authorization']=f'Bearer {token}'
              req=urllib.request.Request(base+path,data=data,headers=headers,method=method)
              try:
                  with opener.open(req,timeout=30) as r: return r.status, r.read()
              except urllib.error.HTTPError as e: return e.code, e.read()
          status,body=call('GET','/api/system/backend-status')
          assert status==200, (status,body[:500])
          backend=json.loads(body); assert backend.get('configured') is True and backend.get('reachable') is True and backend.get('statusCode')==200, backend
          evidence['checks'].append({'name':'backend-routing','status':status,'result':'PASS','targetHost':backend.get('targetHost')})
          status,body=call('POST','/api/platform/api/v1/auth/login',{'email':email,'password':password,'tenantId':tenant})
          assert status==200, (status,body[:500])
          login=json.loads(body); token=login['accessToken']
          status,body=call('GET','/api/platform/api/v2/crm/accounts?limit=1',token=token)
          assert status==200, (status,body[:1000])
          accounts=json.loads(body).get('data') or []
          assert accounts and accounts[0].get('id'), 'production smoke tenant has no CRM account for CRM-007 read verification'
          account_id=accounts[0]['id']
          for name,path in [
              ('account-addresses',f'/api/platform/api/v2/crm/accounts/{account_id}/addresses?limit=1'),
              ('account-communication-methods',f'/api/platform/api/v2/crm/accounts/{account_id}/communication-methods?limit=1')]:
              status,body=call('GET',path,token=token)
              assert status==200, (name,status,body[:1000])
              parsed=json.loads(body); assert isinstance(parsed.get('data'),list), (name,parsed)
              evidence['checks'].append({'name':name,'status':status,'rows':len(parsed['data']),'result':'PASS'})
          status,_=call('POST','/api/platform/api/v1/auth/logout',{},token=token)
          assert status==204, status
          evidence['checks'].append({'name':'logout','status':status,'result':'PASS'})
          evidence['result']='PASS'
          open('evidence/crm-007-production-smoke.json','w').write(json.dumps(evidence,indent=2,sort_keys=True))
          print(json.dumps(evidence,indent=2,sort_keys=True))
          PY

      - name: Upload CRM-G3D production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-production-rollout-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90
