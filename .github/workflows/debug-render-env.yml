name: Debug Render Env

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Debug Render env vars
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 3
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Dump ALL Render env vars (keys + lengths)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== ALL Render env vars ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq '[.[]? | (.envVar // .) | {key, valueLength: ((.value // "") | length)}] | sort_by(.key)'

      - name: Check if SECURITY_NOTIFICATION_RESEND_API_KEY exists
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking RESEND_API_KEY ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq '[.[]? | (.envVar // .) | select(.key | test("RESEND"; "i"))]'

      - name: Check if JWT_SECRET exists
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking JWT_SECRET ==="
          curl --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            | jq '[.[]? | (.envVar // .) | select(.key == "JWT_SECRET") | {key, valueLength: ((.value // "") | length)}]'
