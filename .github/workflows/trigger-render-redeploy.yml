name: CRM-007 Render Production Release

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml
      - scripts/production/verify-flyway.sh

permissions:
  contents: read

env:
  TARGET_SHA: 083ea46bec989a27f60d7f6ca0085230188470b9

jobs:
  release:
    if: github.head_ref == 'ops/crm-007-production-rollout'
    name: Deploy exact CRM-007 commit to Render and verify Flyway
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 55
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
    steps:
      - name: Validate release target and protected configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in RENDER_API_KEY RENDER_SERVICE_ID PRODUCTION_BASE_URL; do
            test -n "${!name:-}" || { echo "::error::Missing Production value: $name"; exit 1; }
            case "$name" in PRODUCTION_BASE_URL) ;; *) echo "::add-mask::${!name}" ;; esac
          done
          remote_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$remote_main" = "$TARGET_SHA" || { echo "::error::Target is not current main: $remote_main"; exit 1; }

      - name: Checkout exact CRM-007 merge SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null

      - name: Validate Render environment and capture database username
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          test "$(jq 'length' /tmp/render-env.json)" -lt 100
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          for key in SPRING_PROFILES_ACTIVE DATABASE_URL DATABASE_USERNAME DATABASE_PASSWORD JWT_SECRET FLYWAY_ENABLED; do
            jq -e --arg key "$key" 'any(.[]; .key == $key and ((.value // "") | length > 0))' /tmp/render-env-normalized.json >/dev/null || { echo "::error::Missing Render env: $key"; exit 1; }
          done
          username="$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value' /tmp/render-env-normalized.json)"
          echo "::add-mask::$username"
          echo "DATABASE_USERNAME=$username" >> "$GITHUB_ENV"

      - name: Capture previous live Render commit
        id: previous
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=20" > /tmp/render-deploys.json
          previous="$(jq -r '[.[]? | (.deploy // .) | select((.status // "") == "live")][0].commit.id // empty' /tmp/render-deploys.json)"
          echo "sha=$previous" >> "$GITHUB_OUTPUT"

      - name: Trigger exact Render commit
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg commit "$TARGET_SHA" '{commitId:$commit,clearCache:"do_not_clear"}' > /tmp/render-request.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" -H "Content-Type: application/json" \
            --data @/tmp/render-request.json "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" > /tmp/render-created.json
          deploy_id="$(jq -r '(.deploy // .).id // empty' /tmp/render-created.json)"
          test -n "$deploy_id"
          echo "id=$deploy_id" >> "$GITHUB_OUTPUT"

      - name: Wait for exact Render deployment
        shell: bash
        run: |
          set -euo pipefail
          deploy_id='${{ steps.deploy.outputs.id }}'
          for attempt in $(seq 1 270); do
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" > /tmp/render-state.json
            status="$(jq -r '(.deploy // .).status // "pending"' /tmp/render-state.json)"
            commit="$(jq -r '(.deploy // .).commit.id // (.deploy // .).commitId // empty' /tmp/render-state.json)"
            echo "Render status=$status commit=$commit"
            case "$status" in
              live) test "$commit" = "$TARGET_SHA"; exit 0 ;;
              build_failed|update_failed|canceled|deactivated) cat /tmp/render-state.json; exit 1 ;;
            esac
            sleep 10
          done
          exit 1

      - name: Wait for backend readiness
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 72); do
            code="$(curl -sS -o /tmp/readiness.json -w '%{http_code}' --max-time 20 "$PRODUCTION_BASE_URL/actuator/health/readiness" || true)"
            if [ "$code" = 200 ] && jq -e '.status == "UP"' /tmp/readiness.json >/dev/null 2>&1; then exit 0; fi
            sleep 5
          done
          exit 1

      - name: Verify CRM-007 production Flyway state
        run: bash scripts/production/verify-flyway.sh

      - name: Write Render release evidence
        shell: bash
        run: |
          mkdir -p evidence
          jq -n --arg release_sha "$TARGET_SHA" --arg deployment '${{ steps.deploy.outputs.id }}' --arg previous '${{ steps.previous.outputs.sha }}' \
            '{release_sha:$release_sha,render_deployment_id:$deployment,previous_live_commit:$previous,status:"live",readiness:"UP",flyway:"PASS",result:"PASS"}' \
            > evidence/crm-007-render-production.json

      - name: Upload Render and database evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-render-production-${{ github.run_id }}
          path: evidence/
          if-no-files-found: warn
          retention-days: 90

      - name: Roll back failed release
        if: failure() && steps.previous.outputs.sha != ''
        shell: bash
        run: |
          jq -n --arg commit '${{ steps.previous.outputs.sha }}' '{commitId:$commit,clearCache:"do_not_clear"}' > /tmp/rollback.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" -H "Content-Type: application/json" \
            --data @/tmp/rollback.json "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" > /tmp/render-rollback.json
