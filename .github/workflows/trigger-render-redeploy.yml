name: CRM-007 Render Credential Whitespace Check

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: ff4fba0bec7873ee11b760fbf43c4e562ba11eaf

jobs:
  inspect:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Inspect Render credential boundaries
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Record non-secret whitespace characteristics
        shell: bash
        run: |
          set -euo pipefail
          test "$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')" = "$TARGET_SHA"
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          mkdir -p whitespace-evidence
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          python3 - <<'PY'
          import json
          items={x.get('key',''):x.get('value','') for x in json.load(open('/tmp/render-env-normalized.json'))}
          result={}
          for key in ('DATABASE_URL','DATABASE_USERNAME','DATABASE_PASSWORD'):
              value=items.get(key,'')
              result[key.lower()]={
                  'present':bool(value),
                  'has_outer_whitespace':value!=value.strip(),
                  'leading_whitespace':bool(value[:1].isspace()),
                  'trailing_whitespace':bool(value[-1:].isspace()),
                  'length':len(value),
                  'trimmed_length':len(value.strip()),
              }
          result['username_trimmed_is_sanad_app']=items.get('DATABASE_USERNAME','').strip()=='sanad_app'
          open('whitespace-evidence/render-credential-whitespace.json','w').write(json.dumps(result,indent=2,sort_keys=True))
          print(json.dumps(result,indent=2,sort_keys=True))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: crm-007-render-credential-whitespace-${{ github.run_id }}
          path: whitespace-evidence/
          if-no-files-found: error
          retention-days: 30
