name: CRM-007 Final Production Verification

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: ff4fba0bec7873ee11b760fbf43c4e562ba11eaf

jobs:
  database:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Apply and verify CRM-007 Flyway migrations
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Validate target and protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          remote_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$remote_main" = "$TARGET_SHA"

      - name: Checkout exact production SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null

      - name: Read masked database configuration
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          url="$(jq -r '.[] | select(.key=="DATABASE_URL") | .value // empty' /tmp/render-env-normalized.json)"
          user="$(jq -r '.[] | select(.key=="DATABASE_USERNAME") | .value // empty' /tmp/render-env-normalized.json)"
          password="$(jq -r '.[] | select(.key=="DATABASE_PASSWORD") | .value // empty' /tmp/render-env-normalized.json)"
          test -n "$url" && test -n "$user" && test -n "$password"
          for value in "$url" "$user" "$password"; do echo "::add-mask::$value"; done
          raw="${url#jdbc:}"; raw="${raw#postgresql://}"; host_port="${raw%%/*}"; db_part="${raw#*/}"; db_name="${db_part%%\?*}"; pg_host="${host_port%%:*}"; pg_port="${host_port#*:}"; [ "$pg_port" != "$host_port" ] || pg_port=5432
          {
            printf 'DATABASE_URL=%s\nDATABASE_USERNAME=%s\nDATABASE_PASSWORD=%s\n' "$url" "$user" "$password"
            printf 'PGHOST=%s\nPGPORT=%s\nPGDATABASE=%s\nPGUSER=%s\n' "$pg_host" "$pg_port" "$db_name" "$user"
          } >> "$GITHUB_ENV"

      - name: Record pre-migration counts
        shell: bash
        run: |
          set -euo pipefail
          export PGPASSWORD="$DATABASE_PASSWORD"
          mkdir -p production-evidence
          psql --no-psqlrc -v ON_ERROR_STOP=1 -Atc "SELECT json_build_object('accounts',COUNT(*)) FROM crm_accounts" > production-evidence/pre-accounts.json
          psql --no-psqlrc -v ON_ERROR_STOP=1 -Atc "SELECT json_build_object('contacts',COUNT(*)) FROM crm_contacts" > production-evidence/pre-contacts.json
          psql --no-psqlrc -v ON_ERROR_STOP=1 -Atc "SELECT json_build_object('legacy_addresses',COUNT(*)) FROM crm_account_addresses" > production-evidence/pre-addresses.json

      - name: Apply pending migrations through Flyway
        working-directory: apps/sanad-platform
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -ntp -DskipTests package dependency:build-classpath -Dmdep.outputFile=/tmp/flyway-cp.txt
          cat > /tmp/ProductionFlyway.java <<'JAVA'
          import com.sanad.platform.config.migration.V15__seed_rbac_roles_and_capabilities;
          import org.flywaydb.core.Flyway;
          public final class ProductionFlyway {
            public static void main(String[] args) {
              var result = Flyway.configure()
                  .dataSource(args[0], args[1], args[2])
                  .locations("classpath:db/migration")
                  .javaMigrations(new V15__seed_rbac_roles_and_capabilities())
                  .load().migrate();
              System.out.println("migrationsExecuted=" + result.migrationsExecuted);
              System.out.println("targetSchemaVersion=" + result.targetSchemaVersion);
            }
          }
          JAVA
          cp="target/classes:$(cat /tmp/flyway-cp.txt)"
          javac -cp "$cp" /tmp/ProductionFlyway.java
          java -cp "/tmp:$cp" ProductionFlyway "$DATABASE_URL" "$DATABASE_USERNAME" "$DATABASE_PASSWORD" | tee /tmp/flyway-migrate.log

      - name: Verify production migration evidence
        shell: bash
        run: |
          set -euo pipefail
          export PGPASSWORD="$DATABASE_PASSWORD"
          history="$(psql --no-psqlrc -v ON_ERROR_STOP=1 -AtF '|' -c "SELECT version,type,description,success FROM flyway_schema_history WHERE version IN ('20260717.100','20260717.101') ORDER BY installed_rank")"
          grep -q '^20260717.100|SQL|crm addresses communication methods|t$' <<< "$history"
          grep -q '^20260717.101|SQL|crm addresses communication capabilities|t$' <<< "$history"
          tables="$(psql --no-psqlrc -v ON_ERROR_STOP=1 -Atc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('crm_party_addresses','crm_party_address_history','crm_communication_policies','crm_communication_methods','crm_communication_method_history')")"
          capabilities="$(psql --no-psqlrc -v ON_ERROR_STOP=1 -Atc "SELECT COUNT(*) FROM capabilities WHERE code IN ('CRM.ADDRESS.READ','CRM.ADDRESS.WRITE','CRM.ADDRESS.ADMIN','CRM.COMMUNICATION.READ','CRM.COMMUNICATION.WRITE','CRM.COMMUNICATION.ADMIN','CRM.COMMUNICATION.SENSITIVE.READ','CRM.COMMUNICATION.EXPORT')")"
          failed="$(psql --no-psqlrc -v ON_ERROR_STOP=1 -Atc "SELECT COUNT(*) FROM flyway_schema_history WHERE success=FALSE")"
          duplicates="$(psql --no-psqlrc -v ON_ERROR_STOP=1 -Atc "SELECT COUNT(*) FROM (SELECT version FROM flyway_schema_history WHERE version IS NOT NULL GROUP BY version HAVING COUNT(*)>1) d")"
          test "$tables" = 5; test "$capabilities" = 8; test "$failed" = 0; test "$duplicates" = 0
          jq -n --arg sha "$TARGET_SHA" --arg history "$history" --argjson tables "$tables" --argjson capabilities "$capabilities" \
            '{release_sha:$sha,flyway_history:($history|split("\n")),tables_verified:$tables,capabilities_verified:$capabilities,failed_migrations:0,duplicate_versions:0,result:"PASS"}' \
            > production-evidence/crm-007-production-database.json

      - name: Upload sanitized database evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-production-database-${{ github.run_id }}
          path: production-evidence/
          if-no-files-found: warn
          retention-days: 90

  web:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Verify exact Vercel production and runtime smoke
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      WEB_BASE_URL: ${{ vars.WEB_PRODUCTION_BASE_URL || vars.PRODUCTION_WEB_BASE_URL || 'https://snad-app.vercel.app' }}
    steps:
      - name: Verify exact-SHA Vercel Production deployment
        shell: bash
        run: |
          set -euo pipefail
          for value in "$VERCEL_TOKEN" "$VERCEL_PROJECT_ID" "$VERCEL_TEAM_ID"; do test -n "$value"; echo "::add-mask::$value"; done
          mkdir -p production-evidence
          list="https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=production&limit=100&teamId=${VERCEL_TEAM_ID}"
          found=""
          for attempt in $(seq 1 30); do
            curl -fsS -H "Authorization: Bearer $VERCEL_TOKEN" "$list" > /tmp/list.json
            found="$(jq -c --arg sha "$TARGET_SHA" '[.deployments[]? | select((.meta.githubCommitSha // "") == $sha and (.target // "") == "production" and ((.readyState // .state // "") == "READY"))] | sort_by(.createdAt) | last // empty' /tmp/list.json)"
            [ -n "$found" ] && [ "$found" != null ] && break
            sleep 5
          done
          test "$(jq -r '.meta.githubCommitSha' <<< "$found")" = "$TARGET_SHA"
          test "$(jq -r '.readyState // .state' <<< "$found")" = READY
          jq -n --arg sha "$TARGET_SHA" --argjson deployment "$found" '{release_sha:$sha,deployment_id:$deployment.uid,deployment_url:$deployment.url,target:$deployment.target,state:($deployment.readyState // $deployment.state),deployed_sha:$deployment.meta.githubCommitSha,result:"PASS"}' > production-evidence/crm-007-vercel-production.json

      - name: Verify frontend, BFF v1/v2, backend health, and CRM-007 OpenAPI
        shell: bash
        run: |
          set -euo pipefail
          test "$(curl -sSL -o /tmp/home -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/")" = 200
          test "$(curl -sSL -o /tmp/accounts -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/crm/accounts")" = 200
          test "$(curl -sSL -o /tmp/contacts -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/crm/contacts")" = 200
          test "$(curl -sS -o /tmp/status.json -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/system/backend-status")" = 200
          jq -e '.configured==true and .reachable==true and .statusCode==200' /tmp/status.json >/dev/null
          test "$(curl -sS -o /tmp/auth -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/platform/api/v1/auth/me")" = 401
          v2="$(curl -sS -o /tmp/v2 -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/platform/api/v2/crm/accounts/00000000-0000-0000-0000-000000000001/addresses?limit=1")"
          test "$v2" = 401
          backend="$(jq -r '.target' /tmp/status.json)"
          test "$(curl -sS -H 'ngrok-skip-browser-warning: any-value' -o /tmp/health.json -w '%{http_code}' --max-time 60 "$backend/actuator/health")" = 200
          jq -e '.status=="UP"' /tmp/health.json >/dev/null
          curl -fsS -H 'ngrok-skip-browser-warning: any-value' --max-time 60 "$backend/v3/api-docs" > /tmp/openapi.json
          jq -e '.paths["/api/v2/crm/accounts/{accountId}/addresses"].get and .paths["/api/v2/crm/accounts/{accountId}/communication-methods"].get' /tmp/openapi.json >/dev/null
          jq -n --arg sha "$TARGET_SHA" --argjson status "$(cat /tmp/status.json)" --arg v2 "$v2" '{release_sha:$sha,frontend_http:200,accounts_http:200,contacts_http:200,backend_status:$status,anonymous_auth_http:401,anonymous_crm_v2_http:($v2|tonumber),backend_health:"UP",crm007_openapi:true,result:"PASS"}' > production-evidence/crm-007-production-smoke.json

      - name: Upload sanitized web evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-production-web-${{ github.run_id }}
          path: production-evidence/
          if-no-files-found: warn
          retention-days: 90
