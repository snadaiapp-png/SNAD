name: CRM-007 Production Database Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: ff4fba0bec7873ee11b760fbf43c4e562ba11eaf

jobs:
  database:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Diagnose and apply CRM-007 Flyway migrations
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Validate target and checkout exact production SHA
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          remote_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$remote_main" = "$TARGET_SHA"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run JDBC/Flyway with sanitized diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p production-evidence
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          database_url="$(jq -r '.[] | select(.key=="DATABASE_URL") | .value // empty' /tmp/render-env-normalized.json)"
          database_user="$(jq -r '.[] | select(.key=="DATABASE_USERNAME") | .value // empty' /tmp/render-env-normalized.json)"
          database_password="$(jq -r '.[] | select(.key=="DATABASE_PASSWORD") | .value // empty' /tmp/render-env-normalized.json)"
          test -n "$database_url" && test -n "$database_user" && test -n "$database_password"
          for value in "$database_url" "$database_user" "$database_password"; do echo "::add-mask::$value"; done

          cd apps/sanad-platform
          mvn -q -DskipTests package dependency:build-classpath -Dmdep.outputFile=/tmp/flyway-cp.txt
          cat > /tmp/ProductionFlyway.java <<'JAVA'
          import com.sanad.platform.config.migration.V15__seed_rbac_roles_and_capabilities;
          import org.flywaydb.core.Flyway;
          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.sql.Connection;
          import java.sql.DriverManager;
          import java.sql.ResultSet;
          import java.sql.Statement;

          public final class ProductionFlyway {
            private static long scalar(Connection c,String sql)throws Exception{
              try(Statement s=c.createStatement();ResultSet r=s.executeQuery(sql)){r.next();return r.getLong(1);}
            }
            private static long safeCount(Connection c,String table)throws Exception{
              return scalar(c,"SELECT CASE WHEN to_regclass('public."+table+"') IS NULL THEN -1 ELSE (SELECT COUNT(*) FROM "+table+") END");
            }
            private static String history(Connection c)throws Exception{
              StringBuilder b=new StringBuilder();
              try(Statement s=c.createStatement();ResultSet r=s.executeQuery("SELECT version,type,description,success FROM flyway_schema_history WHERE version IN ('20260717.100','20260717.101') ORDER BY installed_rank")){
                while(r.next()){if(b.length()>0)b.append("\\n");b.append(r.getString(1)).append('|').append(r.getString(2)).append('|').append(r.getString(3)).append('|').append(r.getBoolean(4));}
              }
              return b.toString();
            }
            private static String esc(String v){return v.replace("\\","\\\\").replace("\"","\\\"").replace("\n","\\n");}
            public static void main(String[] a)throws Exception{
              String url=a[0],user=a[1],password=a[2],sha=a[3];
              long preAccounts,preContacts,preLegacy;
              try(Connection c=DriverManager.getConnection(url,user,password)){
                preAccounts=safeCount(c,"crm_accounts");preContacts=safeCount(c,"crm_contacts");preLegacy=safeCount(c,"crm_account_addresses");
              }
              var result=Flyway.configure().dataSource(url,user,password).locations("classpath:db/migration")
                  .javaMigrations(new V15__seed_rbac_roles_and_capabilities()).load().migrate();
              try(Connection c=DriverManager.getConnection(url,user,password)){
                String h=history(c);
                long tables=scalar(c,"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('crm_party_addresses','crm_party_address_history','crm_communication_policies','crm_communication_methods','crm_communication_method_history')");
                long caps=scalar(c,"SELECT COUNT(*) FROM capabilities WHERE code IN ('CRM.ADDRESS.READ','CRM.ADDRESS.WRITE','CRM.ADDRESS.ADMIN','CRM.COMMUNICATION.READ','CRM.COMMUNICATION.WRITE','CRM.COMMUNICATION.ADMIN','CRM.COMMUNICATION.SENSITIVE.READ','CRM.COMMUNICATION.EXPORT')");
                long failed=scalar(c,"SELECT COUNT(*) FROM flyway_schema_history WHERE success=FALSE");
                long dup=scalar(c,"SELECT COUNT(*) FROM (SELECT version FROM flyway_schema_history WHERE version IS NOT NULL GROUP BY version HAVING COUNT(*)>1) d");
                long postAccounts=safeCount(c,"crm_accounts"),postContacts=safeCount(c,"crm_contacts"),postLegacy=safeCount(c,"crm_account_addresses"),canonical=safeCount(c,"crm_party_addresses");
                if(!h.contains("20260717.100|SQL|crm addresses communication methods|true")||!h.contains("20260717.101|SQL|crm addresses communication capabilities|true"))throw new IllegalStateException("CRM-007 Flyway history is incomplete");
                if(tables!=5||caps!=8||failed!=0||dup!=0)throw new IllegalStateException("Production database invariants failed");
                if(preAccounts>=0&&postAccounts!=preAccounts)throw new IllegalStateException("Account count changed");
                if(preContacts>=0&&postContacts!=preContacts)throw new IllegalStateException("Contact count changed");
                if(preLegacy>=0&&postLegacy!=preLegacy)throw new IllegalStateException("Legacy address count changed");
                if(preLegacy>=0&&canonical<preLegacy)throw new IllegalStateException("Address backfill incomplete");
                String json="{\"release_sha\":\""+esc(sha)+"\",\"migrations_executed\":"+result.migrationsExecuted+",\"target_schema_version\":\""+esc(String.valueOf(result.targetSchemaVersion))+"\",\"flyway_history\":\""+esc(h)+"\",\"tables_verified\":"+tables+",\"capabilities_verified\":"+caps+",\"failed_migrations\":"+failed+",\"duplicate_versions\":"+dup+",\"pre_accounts\":"+preAccounts+",\"post_accounts\":"+postAccounts+",\"pre_contacts\":"+preContacts+",\"post_contacts\":"+postContacts+",\"pre_legacy_addresses\":"+preLegacy+",\"post_legacy_addresses\":"+postLegacy+",\"canonical_addresses\":"+canonical+",\"result\":\"PASS\"}";
                Files.writeString(Path.of("../../production-evidence/crm-007-production-database.json"),json);
                System.out.println("CRM-007 production Flyway verification: PASS");
              }
            }
          }
          JAVA
          cp="target/classes:$(cat /tmp/flyway-cp.txt)"
          javac -cp "$cp" /tmp/ProductionFlyway.java
          set +e
          java -cp "/tmp:$cp" ProductionFlyway "$database_url" "$database_user" "$database_password" "$TARGET_SHA" > /tmp/database-run.log 2>&1
          rc=$?
          set -e
          python3 - "$database_url" "$database_user" "$database_password" <<'PY'
          import pathlib,re,sys
          path=pathlib.Path('/tmp/database-run.log')
          text=path.read_text(errors='replace') if path.exists() else ''
          for secret in sys.argv[1:]:
              if secret:text=text.replace(secret,'***')
          text=re.sub(r'jdbc:postgresql://[^\s]+','jdbc:postgresql://***',text)
          text=re.sub(r'postgresql://[^\s]+','postgresql://***',text)
          pathlib.Path('../../production-evidence/database-diagnostic.log').write_text(text)
          print('\n'.join(text.splitlines()[-80:]))
          PY
          exit "$rc"

      - name: Upload database evidence or diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-production-database-${{ github.run_id }}
          path: production-evidence/
          if-no-files-found: error
          retention-days: 90
