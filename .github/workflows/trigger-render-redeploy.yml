name: CRM-007 Render Deployment Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: 083ea46bec989a27f60d7f6ca0085230188470b9

jobs:
  diagnose:
    if: github.head_ref == 'ops/crm-007-production-rollout'
    name: Diagnose CRM-007 Render deployment
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Fetch recent Render deployments and matching failure
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          mkdir -p render-diagnostic
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=20" > render-diagnostic/deploys.json
          deploy_id="$(jq -r --arg sha "$TARGET_SHA" '[.[]? | (.deploy // .) | select((.commit.id // .commitId // "") == $sha and (.status // "") != "live")][0].id // empty' render-diagnostic/deploys.json)"
          test -n "$deploy_id" || { jq -r '.[]? | (.deploy // .) | [.id,.status,(.commit.id // .commitId // "")] | @tsv' render-diagnostic/deploys.json; exit 1; }
          echo "$deploy_id" > render-diagnostic/deploy-id.txt
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" > render-diagnostic/deploy-detail.json
          for accept in text/plain application/json text/event-stream '*/*'; do
            code="$(curl -sS -o render-diagnostic/deploy-logs.txt -w '%{http_code}' --max-time 30 \
              -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: $accept" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id/logs" || true)"
            echo "$accept $code" >> render-diagnostic/log-attempts.txt
            if [ "$code" = 200 ] && [ -s render-diagnostic/deploy-logs.txt ]; then break; fi
          done
          curl -sS --max-time 30 \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/events?limit=50" > render-diagnostic/events.json || true
          jq '{id:(.deploy // .).id,status:(.deploy // .).status,commit:((.deploy // .).commit.id // (.deploy // .).commitId),reason:((.deploy // .).reason // null),finishedAt:((.deploy // .).finishedAt // null)}' render-diagnostic/deploy-detail.json

      - name: Upload Render diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-render-diagnostic-${{ github.run_id }}
          path: render-diagnostic/
          if-no-files-found: error
          retention-days: 30
