name: CRM-007 Authenticated Production Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: ff4fba0bec7873ee11b760fbf43c4e562ba11eaf
  WEB_BASE_URL: https://snad-app.vercel.app

jobs:
  smoke:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Verify authenticated CRM-007 endpoints on active production backend
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Validate target and obtain masked smoke identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')" = "$TARGET_SHA"
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          value() { jq -r --arg key "$1" '.[] | select(.key==$key) | .value // empty' /tmp/render-env-normalized.json | tail -1; }
          tenant="$(value AUTH_SMOKE_TENANT_A_ID)"; [ -n "$tenant" ] || tenant="$(value BOOTSTRAP_TENANT_ID)"; [ -n "$tenant" ] || tenant="$(value SANAD_CONTROL_PLANE_TENANT_ID)"
          email="$(value AUTH_SMOKE_TENANT_A_EMAIL)"; [ -n "$email" ] || email="$(value BOOTSTRAP_ADMIN_EMAIL)"
          password="$(value AUTH_SMOKE_TENANT_A_PASSWORD)"; [ -n "$password" ] || password="$(value BOOTSTRAP_ADMIN_PASSWORD)"
          test -n "$tenant" && test -n "$email" && test -n "$password" || { echo "::error::No production smoke identity is configured"; exit 1; }
          for secret in "$tenant" "$email" "$password"; do echo "::add-mask::$secret"; done
          {
            echo "SMOKE_TENANT_B64=$(printf %s "$tenant" | base64 -w0)"
            echo "SMOKE_EMAIL_B64=$(printf %s "$email" | base64 -w0)"
            echo "SMOKE_PASSWORD_B64=$(printf %s "$password" | base64 -w0)"
          } >> "$GITHUB_ENV"

      - name: Execute authenticated CRM-007 production smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p production-evidence
          tenant="$(printf %s "$SMOKE_TENANT_B64" | base64 -d)"; email="$(printf %s "$SMOKE_EMAIL_B64" | base64 -d)"; password="$(printf %s "$SMOKE_PASSWORD_B64" | base64 -d)"
          for secret in "$tenant" "$email" "$password"; do echo "::add-mask::$secret"; done
          test "$(curl -sSL -o /tmp/home -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/")" = 200
          test "$(curl -sS -o /tmp/status.json -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/system/backend-status")" = 200
          jq -e '.configured==true and .reachable==true and .statusCode==200' /tmp/status.json >/dev/null
          jq -n --arg tenant "$tenant" --arg email "$email" --arg password "$password" '{tenantId:$tenant,email:$email,password:$password}' > /tmp/login.json
          login="$(curl -sS -o /tmp/login-response.json -w '%{http_code}' --max-time 60 -X POST "$WEB_BASE_URL/api/platform/api/v1/auth/login" -H 'Content-Type: application/json' -H "Origin: $WEB_BASE_URL" --data @/tmp/login.json)"
          test "$login" = 200 || { echo "::error::Login failed with HTTP $login"; exit 1; }
          token="$(jq -r '.accessToken // empty' /tmp/login-response.json)"; test -n "$token"; echo "::add-mask::$token"
          accounts="$(curl -sS -o /tmp/accounts.json -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/platform/api/v2/crm/accounts?limit=1" -H "Authorization: Bearer $token")"
          test "$accounts" = 200
          account_id="$(jq -r '.data[0].id // empty' /tmp/accounts.json)"; test -n "$account_id"
          addresses="$(curl -sS -o /tmp/addresses.json -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/platform/api/v2/crm/accounts/$account_id/addresses?limit=1" -H "Authorization: Bearer $token")"
          communications="$(curl -sS -o /tmp/communications.json -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/platform/api/v2/crm/accounts/$account_id/communication-methods?limit=1" -H "Authorization: Bearer $token")"
          test "$addresses" = 200; test "$communications" = 200
          jq -e '.data|type=="array"' /tmp/addresses.json >/dev/null; jq -e '.data|type=="array"' /tmp/communications.json >/dev/null
          jq -n --arg sha "$TARGET_SHA" --argjson backend "$(cat /tmp/status.json)" --argjson address_rows "$(jq '.data|length' /tmp/addresses.json)" --argjson communication_rows "$(jq '.data|length' /tmp/communications.json)" '{release_sha:$sha,backend_status:$backend,login_http:200,accounts_http:200,addresses_http:200,communications_http:200,address_rows:$address_rows,communication_rows:$communication_rows,result:"PASS"}' > production-evidence/crm-007-authenticated-smoke.json

      - name: Upload sanitized smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-authenticated-production-smoke-${{ github.run_id }}
          path: production-evidence/
          if-no-files-found: warn
          retention-days: 90
