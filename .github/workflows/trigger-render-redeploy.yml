name: CRM-007 Supabase Route Resolution

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: ff4fba0bec7873ee11b760fbf43c4e562ba11eaf

jobs:
  inspect:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Resolve current Supabase pooler routing identity
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Inspect non-secret database route metadata
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          remote_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$remote_main" = "$TARGET_SHA"
          mkdir -p route-evidence
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          python3 - <<'PY'
          import json,urllib.parse
          items={x.get('key',''):x.get('value','') for x in json.load(open('/tmp/render-env-normalized.json'))}
          url=items.get('SPRING_DATASOURCE_URL') or items.get('DATABASE_URL') or ''
          raw=url[5:] if url.startswith('jdbc:') else url
          p=urllib.parse.urlparse(raw)
          host=(p.hostname or '').lower()
          direct_ref=''
          parts=host.split('.')
          if len(parts)>=4 and parts[0]=='db' and parts[-2:] == ['supabase','co']:
              direct_ref=parts[1]
          result={
            'host_is_pooler':'pooler.supabase.com' in host,
            'host_is_direct':host.startswith('db.') and host.endswith('.supabase.co'),
            'direct_project_ref_present':bool(direct_ref),
            'port':p.port,
            'database_name':(p.path or '').lstrip('/'),
            'query_keys':sorted(urllib.parse.parse_qs(p.query).keys()),
            'database_username_is_sanad_app':items.get('DATABASE_USERNAME')=='sanad_app',
            'spring_username_present':bool(items.get('SPRING_DATASOURCE_USERNAME')),
            'relevant_environment_keys':sorted(k for k in items if any(token in k.upper() for token in ('SUPABASE','DATABASE','DATASOURCE','POSTGRES','PROJECT_REF'))),
          }
          open('route-evidence/supabase-route-shape.json','w').write(json.dumps(result,indent=2,sort_keys=True))
          print(json.dumps(result,indent=2,sort_keys=True))
          PY

      - name: Upload route evidence
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-supabase-route-${{ github.run_id }}
          path: route-evidence/
          if-no-files-found: error
          retention-days: 30
