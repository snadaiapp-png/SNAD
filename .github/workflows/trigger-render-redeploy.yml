name: CRM-007 Final Production Verification

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: ff4fba0bec7873ee11b760fbf43c4e562ba11eaf
  WEB_BASE_URL: https://snad-app.vercel.app

jobs:
  database:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Apply and verify CRM-007 Flyway migrations
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Validate target and protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          remote_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$remote_main" = "$TARGET_SHA"

      - name: Checkout exact production SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Apply Flyway and write sanitized production evidence through JDBC
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          database_url="$(jq -r '.[] | select(.key=="DATABASE_URL") | .value // empty' /tmp/render-env-normalized.json)"
          database_user="$(jq -r '.[] | select(.key=="DATABASE_USERNAME") | .value // empty' /tmp/render-env-normalized.json)"
          database_password="$(jq -r '.[] | select(.key=="DATABASE_PASSWORD") | .value // empty' /tmp/render-env-normalized.json)"
          test -n "$database_url" && test -n "$database_user" && test -n "$database_password"
          for value in "$database_url" "$database_user" "$database_password"; do echo "::add-mask::$value"; done

          cd apps/sanad-platform
          mvn -B -ntp -DskipTests package dependency:build-classpath -Dmdep.outputFile=/tmp/flyway-cp.txt
          cat > /tmp/ProductionFlyway.java <<'JAVA'
          import com.sanad.platform.config.migration.V15__seed_rbac_roles_and_capabilities;
          import org.flywaydb.core.Flyway;
          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.sql.Connection;
          import java.sql.DriverManager;
          import java.sql.ResultSet;
          import java.sql.Statement;
          import java.util.LinkedHashMap;
          import java.util.Map;

          public final class ProductionFlyway {
            private static long scalar(Connection connection, String sql) throws Exception {
              try (Statement statement = connection.createStatement(); ResultSet result = statement.executeQuery(sql)) {
                if (!result.next()) throw new IllegalStateException("Query returned no row");
                return result.getLong(1);
              }
            }
            private static String text(Connection connection, String sql) throws Exception {
              try (Statement statement = connection.createStatement(); ResultSet result = statement.executeQuery(sql)) {
                StringBuilder value = new StringBuilder();
                while (result.next()) {
                  if (!value.isEmpty()) value.append("\\n");
                  value.append(result.getString(1)).append('|').append(result.getString(2)).append('|')
                      .append(result.getString(3)).append('|').append(result.getBoolean(4));
                }
                return value.toString();
              }
            }
            private static long safeCount(Connection connection, String table) throws Exception {
              try (Statement statement = connection.createStatement(); ResultSet result = statement.executeQuery(
                  "SELECT CASE WHEN to_regclass('public." + table + "') IS NULL THEN -1 ELSE (SELECT COUNT(*) FROM " + table + ") END")) {
                result.next();
                return result.getLong(1);
              }
            }
            private static String jsonEscape(String value) {
              return value.replace("\\", "\\\\").replace("\"", "\\\"").replace("\n", "\\n");
            }
            public static void main(String[] args) throws Exception {
              String url=args[0], user=args[1], password=args[2], releaseSha=args[3];
              long preAccounts, preContacts, preLegacyAddresses;
              try (Connection connection=DriverManager.getConnection(url,user,password)) {
                preAccounts=safeCount(connection,"crm_accounts");
                preContacts=safeCount(connection,"crm_contacts");
                preLegacyAddresses=safeCount(connection,"crm_account_addresses");
              }
              var migration = Flyway.configure()
                  .dataSource(url,user,password)
                  .locations("classpath:db/migration")
                  .javaMigrations(new V15__seed_rbac_roles_and_capabilities())
                  .load().migrate();
              try (Connection connection=DriverManager.getConnection(url,user,password)) {
                String history=text(connection,"SELECT version,type,description,success FROM flyway_schema_history WHERE version IN ('20260717.100','20260717.101') ORDER BY installed_rank");
                if (!history.contains("20260717.100|SQL|crm addresses communication methods|true")) throw new IllegalStateException("Missing successful migration 20260717.100");
                if (!history.contains("20260717.101|SQL|crm addresses communication capabilities|true")) throw new IllegalStateException("Missing successful migration 20260717.101");
                long tables=scalar(connection,"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('crm_party_addresses','crm_party_address_history','crm_communication_policies','crm_communication_methods','crm_communication_method_history')");
                long capabilities=scalar(connection,"SELECT COUNT(*) FROM capabilities WHERE code IN ('CRM.ADDRESS.READ','CRM.ADDRESS.WRITE','CRM.ADDRESS.ADMIN','CRM.COMMUNICATION.READ','CRM.COMMUNICATION.WRITE','CRM.COMMUNICATION.ADMIN','CRM.COMMUNICATION.SENSITIVE.READ','CRM.COMMUNICATION.EXPORT')");
                long failed=scalar(connection,"SELECT COUNT(*) FROM flyway_schema_history WHERE success=FALSE");
                long duplicates=scalar(connection,"SELECT COUNT(*) FROM (SELECT version FROM flyway_schema_history WHERE version IS NOT NULL GROUP BY version HAVING COUNT(*)>1) d");
                long postAccounts=safeCount(connection,"crm_accounts");
                long postContacts=safeCount(connection,"crm_contacts");
                long postLegacyAddresses=safeCount(connection,"crm_account_addresses");
                long canonicalAddresses=safeCount(connection,"crm_party_addresses");
                if (tables!=5 || capabilities!=8 || failed!=0 || duplicates!=0) throw new IllegalStateException("Production verification invariant failed");
                if (preAccounts>=0 && postAccounts!=preAccounts) throw new IllegalStateException("Account count changed");
                if (preContacts>=0 && postContacts!=preContacts) throw new IllegalStateException("Contact count changed");
                if (preLegacyAddresses>=0 && postLegacyAddresses!=preLegacyAddresses) throw new IllegalStateException("Legacy address count changed");
                if (preLegacyAddresses>=0 && canonicalAddresses<preLegacyAddresses) throw new IllegalStateException("Canonical address backfill is incomplete");
                Files.createDirectories(Path.of("../../production-evidence"));
                String json="{\n"
                    +"  \"release_sha\": \""+jsonEscape(releaseSha)+"\",\n"
                    +"  \"migrations_executed\": "+migration.migrationsExecuted+",\n"
                    +"  \"target_schema_version\": \""+jsonEscape(String.valueOf(migration.targetSchemaVersion))+"\",\n"
                    +"  \"flyway_history\": \""+jsonEscape(history)+"\",\n"
                    +"  \"tables_verified\": "+tables+",\n"
                    +"  \"capabilities_verified\": "+capabilities+",\n"
                    +"  \"failed_migrations\": "+failed+",\n"
                    +"  \"duplicate_versions\": "+duplicates+",\n"
                    +"  \"pre_accounts\": "+preAccounts+",\n"
                    +"  \"post_accounts\": "+postAccounts+",\n"
                    +"  \"pre_contacts\": "+preContacts+",\n"
                    +"  \"post_contacts\": "+postContacts+",\n"
                    +"  \"pre_legacy_addresses\": "+preLegacyAddresses+",\n"
                    +"  \"post_legacy_addresses\": "+postLegacyAddresses+",\n"
                    +"  \"canonical_addresses\": "+canonicalAddresses+",\n"
                    +"  \"result\": \"PASS\"\n}"
                    ;
                Files.writeString(Path.of("../../production-evidence/crm-007-production-database.json"),json);
                System.out.println("CRM-007 production Flyway verification: PASS");
              }
            }
          }
          JAVA
          cp="target/classes:$(cat /tmp/flyway-cp.txt)"
          javac -cp "$cp" /tmp/ProductionFlyway.java
          java -cp "/tmp:$cp" ProductionFlyway "$database_url" "$database_user" "$database_password" "$TARGET_SHA"

      - name: Upload sanitized database evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-production-database-${{ github.run_id }}
          path: production-evidence/
          if-no-files-found: warn
          retention-days: 90

  smoke:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Verify production frontend, BFF v2, backend, and CRM-007 OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Execute public production smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p production-evidence
          test "$(curl -sSL -o /tmp/home -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/")" = 200
          test "$(curl -sSL -o /tmp/accounts -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/crm/accounts")" = 200
          test "$(curl -sSL -o /tmp/contacts -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/crm/contacts")" = 200
          test "$(curl -sS -o /tmp/status.json -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/system/backend-status")" = 200
          jq -e '.configured==true and .reachable==true and .statusCode==200' /tmp/status.json >/dev/null
          test "$(curl -sS -o /tmp/auth -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/platform/api/v1/auth/me")" = 401
          v2="$(curl -sS -o /tmp/v2 -w '%{http_code}' --max-time 60 "$WEB_BASE_URL/api/platform/api/v2/crm/accounts/00000000-0000-0000-0000-000000000001/addresses?limit=1")"
          test "$v2" = 401
          target_host="$(jq -r '.targetHost' /tmp/status.json)"
          backend="https://${target_host}"
          test "$(curl -sS -H 'ngrok-skip-browser-warning: any-value' -o /tmp/health.json -w '%{http_code}' --max-time 60 "$backend/actuator/health")" = 200
          jq -e '.status=="UP"' /tmp/health.json >/dev/null
          curl -fsS -H 'ngrok-skip-browser-warning: any-value' --max-time 60 "$backend/v3/api-docs" > /tmp/openapi.json
          jq -e '.paths["/api/v2/crm/accounts/{accountId}/addresses"].get and .paths["/api/v2/crm/accounts/{accountId}/communication-methods"].get' /tmp/openapi.json >/dev/null
          jq -n --arg sha "$TARGET_SHA" --argjson status "$(cat /tmp/status.json)" --arg v2 "$v2" '{release_sha:$sha,frontend_http:200,accounts_http:200,contacts_http:200,backend_status:$status,anonymous_auth_http:401,anonymous_crm_v2_http:($v2|tonumber),backend_health:"UP",crm007_openapi:true,result:"PASS"}' > production-evidence/crm-007-production-smoke.json

      - name: Upload sanitized smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-production-smoke-${{ github.run_id }}
          path: production-evidence/
          if-no-files-found: warn
          retention-days: 90
