name: CRM-007 Render Datasource Shape

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/trigger-render-redeploy.yml

permissions:
  contents: read

env:
  TARGET_SHA: ff4fba0bec7873ee11b760fbf43c4e562ba11eaf

jobs:
  inspect:
    if: github.head_ref == 'ops/crm-007-final-production'
    name: Inspect approved Render datasource shape
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Validate target and inspect non-secret datasource characteristics
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" && test -n "$RENDER_SERVICE_ID"
          echo "::add-mask::$RENDER_API_KEY"; echo "::add-mask::$RENDER_SERVICE_ID"
          remote_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          test "$remote_main" = "$TARGET_SHA"
          mkdir -p datasource-evidence
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" > /tmp/render-env.json
          jq '[.[]? | (.envVar // .)]' /tmp/render-env.json > /tmp/render-env-normalized.json
          python3 - <<'PY'
          import json,urllib.parse
          items={x.get('key',''):x.get('value','') for x in json.load(open('/tmp/render-env-normalized.json'))}
          url=items.get('SPRING_DATASOURCE_URL') or items.get('DATABASE_URL') or ''
          raw=url[5:] if url.startswith('jdbc:') else url
          parsed=urllib.parse.urlparse(raw)
          host=(parsed.hostname or '').lower()
          category='render' if 'render.com' in host else 'supabase' if 'supabase' in host else 'neon' if 'neon' in host else 'other'
          result={
            'spring_url_present':bool(items.get('SPRING_DATASOURCE_URL')),
            'spring_user_present':bool(items.get('SPRING_DATASOURCE_USERNAME')),
            'spring_password_present':bool(items.get('SPRING_DATASOURCE_PASSWORD')),
            'database_url_present':bool(items.get('DATABASE_URL')),
            'database_user_present':bool(items.get('DATABASE_USERNAME')),
            'database_password_present':bool(items.get('DATABASE_PASSWORD')),
            'url_has_username':bool(parsed.username),
            'url_has_password':bool(parsed.password),
            'host_category':category,
          }
          open('datasource-evidence/render-datasource-shape.json','w').write(json.dumps(result,indent=2,sort_keys=True))
          print(json.dumps(result,indent=2,sort_keys=True))
          PY

      - name: Upload datasource shape evidence
        uses: actions/upload-artifact@v4
        with:
          name: crm-007-render-datasource-shape-${{ github.run_id }}
          path: datasource-evidence/
          if-no-files-found: error
          retention-days: 30
