name: Render Live Release Trigger

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/render-live-release-trigger.yml

permissions:
  contents: read

jobs:
  inspect-render-cli:
    name: Discover Render runtime log command
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Install Render CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/render-oss/cli/main/bin/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Inspect available log commands
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '=== render --help ==='
            render --help || true
            echo '=== render logs --help ==='
            render logs --help || true
            echo '=== render services --help ==='
            render services --help || true
            echo '=== render deploys --help ==='
            render deploys --help || true
          } | tee render-cli-help.txt

      - name: Upload CLI help
        uses: actions/upload-artifact@v4
        with:
          name: render-cli-help-${{ github.run_id }}
          path: render-cli-help.txt
          retention-days: 7
