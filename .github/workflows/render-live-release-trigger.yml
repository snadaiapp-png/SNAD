name: Render Live Release Trigger

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/render-live-release-trigger.yml

permissions:
  contents: read

jobs:
  deploy-render:
    name: Deploy merged fix to Render
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 50
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      TARGET_SHA: 689f4216c7bb2caf602c043c17147591fc66ad26
    steps:
      - name: Verify exact current main
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"
          remote_main=$(git ls-remote "https://github.com/$GITHUB_REPOSITORY.git" refs/heads/main | awk '{print $1}')
          [ "$remote_main" = "$TARGET_SHA" ] || { echo "::error::main moved from the approved fix"; exit 1; }

      - name: Install Render CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/render-oss/cli/main/bin/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Deploy exact commit and wait
        shell: bash
        run: |
          set -euo pipefail
          render deploys create "$RENDER_SERVICE_ID" \
            --clear-cache \
            --commit "$TARGET_SHA" \
            --wait \
            --output json \
            --confirm > render-deployment.json
          jq -e '(.status // "") == "live"' render-deployment.json >/dev/null
          jq '{id,status,commit:(.commit.id // .commitId // null),createdAt,startedAt,finishedAt}' render-deployment.json

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-deployment-${{ github.run_id }}
          path: render-deployment.json
          if-no-files-found: warn
          retention-days: 90
