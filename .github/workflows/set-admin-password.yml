name: Set Admin Password
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      ADMIN_EMAIL: ${{ secrets.SANAD_ADMIN_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - name: Set password
        shell: bash
        run: |
          set -euo pipefail
          set +x
          pip install bcrypt psycopg2-binary -q 2>/dev/null || pip3 install bcrypt psycopg2-binary -q

          RENDER_ENV=$(curl --silent -H "Authorization: Bearer ${RENDER_API_KEY}" -H "Accept: application/json" "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars")
          echo "$RENDER_ENV" | jq 'if .[0].envVar then [.[] | .envVar] else . end' > /tmp/env.json

          DB_RAW_URL=$(jq -r '.[] | select(.key == "DATABASE_URL") | .value' /tmp/env.json)
          DB_USER=$(jq -r '.[] | select(.key == "DATABASE_USERNAME") | .value' /tmp/env.json)
          DB_PASS=$(jq -r '.[] | select(.key == "DATABASE_PASSWORD") | .value' /tmp/env.json)

          BASE_URL_DB=$(echo "$DB_RAW_URL" | sed 's|^jdbc:postgresql://||')
          DB_HOST=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f1)
          DB_PORT=$(echo "$BASE_URL_DB" | cut -d'/' -f1 | cut -d':' -f2 -s)
          DB_NAME=$(echo "$BASE_URL_DB" | cut -d'/' -f2 | cut -d'?' -f1)
          [ -z "$DB_PORT" ] && DB_PORT="5432"

          export DB_HOST DB_PORT DB_NAME DB_USER DB_PASS ADMIN_EMAIL

          python3 << 'PYSCRIPT'
          import psycopg2, psycopg2.extras, bcrypt, os
          psycopg2.extras.register_uuid()

          conn = psycopg2.connect(
              host=os.environ["DB_HOST"], port=int(os.environ.get("DB_PORT","5432")),
              dbname=os.environ.get("DB_NAME","postgres"),
              user=os.environ["DB_USER"], password=os.environ["DB_PASS"],
              connect_timeout=15, sslmode="require")
          conn.autocommit = True
          cur = conn.cursor()

          new_password = "Snad2026ProdSec"
          hashed = bcrypt.hashpw(new_password.encode(), bcrypt.gensalt(12)).decode()

          cur.execute(
              "UPDATE users SET password_hash=%s, must_change_password=false, session_version=session_version+1 WHERE LOWER(email)=LOWER(%s)",
              (hashed, os.environ["ADMIN_EMAIL"]))
          print(f"Password set (rows: {cur.rowcount})")
          cur.execute("DELETE FROM refresh_tokens WHERE user_id IN (SELECT id FROM users WHERE LOWER(email)=LOWER(%s))", (os.environ["ADMIN_EMAIL"],))
          print("Tokens revoked")
          cur.close(); conn.close()
          PYSCRIPT
          rm -f /tmp/env.json
