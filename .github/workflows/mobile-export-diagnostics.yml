name: Mobile Export Diagnostics

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-export-diagnostics.yml"

permissions:
  contents: read

jobs:
  export:
    name: Mobile Universal Export Evidence
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Run universal web export and preserve output
        id: export
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run export:web 2>&1 | tee export.log
      - name: Upload export diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-export-log-${{ github.sha }}
          path: apps/mobile/export.log
          retention-days: 7
      - name: Upload export output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-export-output-${{ github.sha }}
          path: apps/mobile/dist
          if-no-files-found: ignore
          retention-days: 7
      - name: Fail when export fails
        if: steps.export.outcome == 'failure'
        run: exit 1
