# Gitleaks configuration for SANAD Platform
#
# This configuration extends the default Gitleaks rule set.

[extend]
  useDefault = true

[allowlist]
description = "Build artifacts, CI test files, and template files"
paths = [
  '''target/''',
  '''\.next/''',
  '''\.github/workflows/''',
  '''docs/tenant-isolation/''',
  '''application-tenant-postgres-test''',
  '''application-prod\.yml''',
  '''application\.yml''',
  '''src/test/''',
  '''\.env\.example''',
  '''\.gitleaks\.toml''',
  '''render\.yaml''',
  '''snad-init\.ps1''',
  '''docker-compose''',
]
