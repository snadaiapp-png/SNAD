# Gitleaks configuration for SANAD Platform
#
# Stage 04A.3.6.2 — Secret-scan integrity restoration.
#
# This configuration extends the default Gitleaks rule set. The ONLY paths
# excluded from scanning are build artifacts produced by the build tooling
# itself (Maven target/, Next.js .next/). All other paths — including
# .github/workflows, src/test, src/main, application*.yml, docker-compose*,
# render.yaml, docs, scripts — are SCANNED.
#
# False positives are resolved by either:
#   1. Replacing the literal with a non-secret value (e.g. a GitHub
#      expression derived from github.run_id), or
#   2. A narrow per-fingerprint allowlist with documented justification.
#
# Global regex or directory-wide exclusions are FORBIDDEN and are
# enforced by scripts/ci/check_gitleaks_policy.py.

[extend]
  useDefault = true

[allowlist]
description = "Build artifacts only — generated by Maven and Next.js"
paths = [
  '''^apps/sanad-platform/target/''',
  '''^apps/web/\.next/''',
]
