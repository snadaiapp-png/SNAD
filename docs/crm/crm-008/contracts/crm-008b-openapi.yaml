openapi: 3.1.0
info:
  title: SNAD CRM Ownership API
  version: 2026-07-23
  description: >-
    Governed CRM-008 ownership surface. Tenant and actor identity are derived
    exclusively from the authenticated session. No request schema accepts tenantId.
servers:
  - url: /api/v2/crm
security:
  - bearerAuth: []
tags:
  - name: Teams
  - name: Queues
  - name: Territories
  - name: Assignment Rules
  - name: Assignments
  - name: Transfers
  - name: My Work
paths:
  /teams:
    get:
      tags: [Teams]
      operationId: listSalesTeams
      x-capability: CRM.TEAM.READ
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
        - { name: status, in: query, schema: { $ref: '#/components/schemas/TeamStatus' } }
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [Teams]
      operationId: createSalesTeam
      x-capability: CRM.TEAM.ADMIN
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTeamRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleSuccess' }
        default: { $ref: '#/components/responses/Problem' }
  /teams/{teamId}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Teams]
      operationId: getSalesTeam
      x-capability: CRM.TEAM.READ
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
    patch:
      tags: [Teams]
      operationId: updateSalesTeam
      x-capability: CRM.TEAM.ADMIN
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTeamRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /teams/{teamId}/memberships:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Teams]
      operationId: listTeamMemberships
      x-capability: CRM.TEAM.READ
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [Teams]
      operationId: addTeamMembership
      x-capability: CRM.TEAM.ADMIN
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddTeamMembershipRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /teams/{teamId}/memberships/{membershipId}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
      - $ref: '#/components/parameters/MembershipId'
    patch:
      tags: [Teams]
      operationId: updateTeamMembership
      x-capability: CRM.TEAM.ADMIN
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTeamMembershipRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
    delete:
      tags: [Teams]
      operationId: endTeamMembership
      x-capability: CRM.TEAM.ADMIN
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - { name: reason, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 100 } }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /queues:
    get:
      tags: [Queues]
      operationId: listQueues
      x-capability: CRM.QUEUE.READ
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/QueueStatus' } }
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [Queues]
      operationId: createQueue
      x-capability: CRM.QUEUE.ADMIN
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateQueueRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /queues/{queueId}:
    parameters:
      - $ref: '#/components/parameters/QueueId'
    get:
      tags: [Queues]
      operationId: getQueue
      x-capability: CRM.QUEUE.READ
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
    patch:
      tags: [Queues]
      operationId: updateQueue
      x-capability: CRM.QUEUE.ADMIN
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateQueueRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /queues/{queueId}/items:
    parameters:
      - $ref: '#/components/parameters/QueueId'
    get:
      tags: [Queues]
      operationId: listQueueItems
      x-capability: CRM.QUEUE.READ
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
  /queues/{queueId}/items/{itemId}/claim:
    parameters:
      - $ref: '#/components/parameters/QueueId'
      - $ref: '#/components/parameters/ItemId'
    post:
      tags: [Queues]
      operationId: claimQueueItem
      x-capability: CRM.QUEUE.CLAIM
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyUuid'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClaimQueueItemRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /queues/{queueId}/items/{itemId}/release:
    parameters:
      - $ref: '#/components/parameters/QueueId'
      - $ref: '#/components/parameters/ItemId'
    post:
      tags: [Queues]
      operationId: releaseQueueItem
      x-capability: CRM.QUEUE.CLAIM
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReleaseQueueItemRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /queues/{queueId}/memberships:
    parameters:
      - $ref: '#/components/parameters/QueueId'
    get:
      tags: [Queues]
      operationId: listQueueMemberships
      x-capability: CRM.QUEUE.READ
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
  /territories:
    get:
      tags: [Territories]
      operationId: listTerritories
      x-capability: CRM.TERRITORY.READ
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/TerritoryStatus' } }
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [Territories]
      operationId: createTerritory
      x-capability: CRM.TERRITORY.ADMIN
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTerritoryRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /territories/{territoryId}:
    parameters:
      - $ref: '#/components/parameters/TerritoryId'
    get:
      tags: [Territories]
      operationId: getTerritory
      x-capability: CRM.TERRITORY.READ
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
    patch:
      tags: [Territories]
      operationId: updateTerritory
      x-capability: CRM.TERRITORY.ADMIN
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTerritoryRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /territories/{territoryId}/assignments:
    parameters:
      - $ref: '#/components/parameters/TerritoryId'
    post:
      tags: [Territories]
      operationId: createTerritoryAssignment
      x-capability: CRM.TERRITORY.ADMIN
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignTerritoryRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /territories/{territoryId}/assignments/{assignmentId}:
    parameters:
      - $ref: '#/components/parameters/TerritoryId'
      - $ref: '#/components/parameters/TerritoryAssignmentId'
    delete:
      tags: [Territories]
      operationId: deactivateTerritoryAssignment
      x-capability: CRM.TERRITORY.ADMIN
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /assignment-rules:
    get:
      tags: [Assignment Rules]
      operationId: listAssignmentRules
      x-capability: CRM.ASSIGNMENT_RULE.READ
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/RuleStatus' } }
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [Assignment Rules]
      operationId: createAssignmentRule
      x-capability: CRM.ASSIGNMENT_RULE.ADMIN
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRuleRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /assignment-rules/{ruleId}:
    parameters:
      - $ref: '#/components/parameters/RuleId'
    get:
      tags: [Assignment Rules]
      operationId: getAssignmentRuleWithVersions
      description: Returns the rule and its immutable version list.
      x-capability: CRM.ASSIGNMENT_RULE.READ
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /assignment-rules/{ruleId}/versions:
    parameters:
      - $ref: '#/components/parameters/RuleId'
    post:
      tags: [Assignment Rules]
      operationId: createAssignmentRuleVersion
      x-capability: CRM.ASSIGNMENT_RULE.ADMIN
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VersionDefinitionRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /assignment-rules/{ruleId}/versions/{version}/activate:
    parameters:
      - $ref: '#/components/parameters/RuleId'
      - { name: version, in: path, required: true, schema: { type: integer, minimum: 1 } }
    patch:
      tags: [Assignment Rules]
      operationId: activateAssignmentRuleVersion
      x-capability: CRM.ASSIGNMENT_RULE.ADMIN
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /assignment-rules/{ruleId}/simulate:
    parameters:
      - $ref: '#/components/parameters/RuleId'
    post:
      tags: [Assignment Rules]
      operationId: simulateAssignmentRule
      x-capability: CRM.ASSIGNMENT_RULE.ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SimulateRuleRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleSuccess' }
        default: { $ref: '#/components/responses/Problem' }
  /assignments/{recordType}/{recordId}:
    parameters:
      - $ref: '#/components/parameters/RecordType'
      - $ref: '#/components/parameters/RecordId'
    get:
      tags: [Assignments]
      operationId: getCurrentAssignment
      x-capability: CRM.ASSIGNMENT.READ
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /assignments/reassign:
    post:
      tags: [Assignments]
      operationId: reassignRecord
      x-capability: CRM.ASSIGNMENT.WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReassignRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /assignments/bulk-reassign:
    post:
      tags: [Assignments]
      operationId: bulkReassignRecords
      x-capability: CRM.ASSIGNMENT.ADMIN
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkReassignRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleSuccess' }
        default: { $ref: '#/components/responses/Problem' }
  /ownership-history/{recordType}/{recordId}:
    parameters:
      - $ref: '#/components/parameters/RecordType'
      - $ref: '#/components/parameters/RecordId'
    get:
      tags: [Assignments]
      operationId: listOwnershipHistory
      x-capability: CRM.OWNERSHIP_HISTORY.READ
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
  /transfers:
    get:
      tags: [Transfers]
      operationId: listTransfers
      x-capability: CRM.TRANSFER.READ
      parameters:
        - { name: direction, in: query, schema: { type: string, enum: [INCOMING, OUTGOING, ALL] } }
        - { name: state, in: query, schema: { $ref: '#/components/schemas/TransferState' } }
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ListSuccess' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [Transfers]
      operationId: createTransfer
      x-capability: CRM.TRANSFER.REQUEST
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTransferRequest' }
      responses:
        '201': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /transfers/{transferId}/submit:
    parameters:
      - $ref: '#/components/parameters/TransferId'
    post:
      tags: [Transfers]
      operationId: submitTransfer
      x-capability: CRM.TRANSFER.REQUEST
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmitTransferRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /transfers/{transferId}/approve:
    parameters:
      - $ref: '#/components/parameters/TransferId'
    post:
      tags: [Transfers]
      operationId: decideTransfer
      description: Approves or rejects; execution remains internal-only.
      x-capability: CRM.TRANSFER.APPROVE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DecideTransferRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /transfers/{transferId}/cancel:
    parameters:
      - $ref: '#/components/parameters/TransferId'
    post:
      tags: [Transfers]
      operationId: cancelTransfer
      x-capability: CRM.TRANSFER.REQUEST
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CancelTransferRequest' }
      responses:
        '200': { $ref: '#/components/responses/SingleWithEtag' }
        default: { $ref: '#/components/responses/Problem' }
  /my-work:
    get:
      tags: [My Work]
      operationId: getMyWork
      x-capability: CRM.ASSIGNMENT.READ
      responses:
        '200': { $ref: '#/components/responses/SingleSuccess' }
        default: { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RequestId: { name: X-Request-ID, in: header, schema: { type: string, format: uuid } }
    CorrelationId: { name: X-Correlation-ID, in: header, schema: { type: string, format: uuid } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 1, maxLength: 255 } }
    IdempotencyKeyUuid: { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid } }
    IfMatch: { name: If-Match, in: header, required: true, schema: { type: string } }
    PageSize: { name: pageSize, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
    Cursor: { name: cursor, in: query, schema: { type: string, format: uuid } }
    TeamId: { name: teamId, in: path, required: true, schema: { type: string, format: uuid } }
    MembershipId: { name: membershipId, in: path, required: true, schema: { type: string, format: uuid } }
    QueueId: { name: queueId, in: path, required: true, schema: { type: string, format: uuid } }
    ItemId: { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
    TerritoryId: { name: territoryId, in: path, required: true, schema: { type: string, format: uuid } }
    TerritoryAssignmentId: { name: assignmentId, in: path, required: true, schema: { type: string, format: uuid } }
    RuleId: { name: ruleId, in: path, required: true, schema: { type: string, format: uuid } }
    RecordType: { name: recordType, in: path, required: true, schema: { $ref: '#/components/schemas/RecordType' } }
    RecordId: { name: recordId, in: path, required: true, schema: { type: string, format: uuid } }
    TransferId: { name: transferId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    SingleSuccess:
      description: Successful governed response.
      headers:
        X-Request-ID: { schema: { type: string, format: uuid } }
        X-Correlation-ID: { schema: { type: string, format: uuid } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SingleEnvelope' }
    SingleWithEtag:
      description: Successful governed response with strong validator.
      headers:
        ETag: { required: true, schema: { type: string } }
        X-Request-ID: { schema: { type: string, format: uuid } }
        X-Correlation-ID: { schema: { type: string, format: uuid } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SingleEnvelope' }
    ListSuccess:
      description: Successful governed list response.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ListEnvelope' }
    Problem:
      description: RFC 7807 error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
  schemas:
    Uuid: { type: string, format: uuid }
    RecordType: { type: string, enum: [ACCOUNT, CONTACT, LEAD, OPPORTUNITY, ACTIVITY, TASK] }
    OwnerType: { type: string, enum: [USER, TEAM, QUEUE] }
    TeamStatus: { type: string, enum: [ACTIVE, SUSPENDED, ARCHIVED] }
    QueueStatus: { type: string, enum: [ACTIVE, DRAINING, ARCHIVED] }
    TerritoryStatus: { type: string, enum: [ACTIVE, ARCHIVED] }
    RuleStatus: { type: string, enum: [ACTIVE, INACTIVE, ARCHIVED] }
    TransferState: { type: string, enum: [DRAFT, SUBMITTED, UNDER_REVIEW, APPROVED, REJECTED, CANCELLED, COMPLETED, FAILED] }
    Meta:
      type: object
      required: [requestId, correlationId, timestamp]
      properties:
        requestId: { type: string, format: uuid }
        correlationId: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
    SingleEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta: { $ref: '#/components/schemas/Meta' }
    ListEnvelope:
      type: object
      required: [data, page, meta]
      properties:
        data: { type: array, items: {} }
        page:
          type: object
          required: [hasMore, limit]
          properties:
            nextCursor: { type: [string, 'null'] }
            hasMore: { type: boolean }
            limit: { type: integer }
        meta: { $ref: '#/components/schemas/Meta' }
    Problem:
      type: object
      required: [type, title, status, detail, code, requestId, correlationId, timestamp]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
        code: { type: string }
        requestId: { type: string, format: uuid }
        correlationId: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        fieldErrors: { type: array, items: { type: object } }
    CreateTeamRequest:
      type: object
      required: [code, displayName]
      properties:
        code: { type: string, maxLength: 64 }
        displayName: { type: string, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 1000 }
        managerUserId: { type: [string, 'null'], format: uuid }
        defaultQueueId: { type: [string, 'null'], format: uuid }
        defaultTerritoryId: { type: [string, 'null'], format: uuid }
    UpdateTeamRequest:
      type: object
