      summary: Activate a user
      description: Sets the user status to ACTIVE.
      operationId: activateUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        required: true
        schema:
          type: string
          format: uuid
