      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeCredentialRequest'
        required: true
      responses:
        '200':
          description: OK
  /api/v1/auth/admin-reset-password/{userId}:
    post:
      tags:
      - Authentication
      summary: Send an administrator-issued, single-use set-password link
      operationId: adminResetPassword
      parameters:
      - name: userId
        in: path
        required: true
