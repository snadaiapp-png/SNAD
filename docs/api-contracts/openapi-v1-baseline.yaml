# SNAD OpenAPI v1 Baseline
# ----------------------------------------------------------------------------
# This file is the canonical API contract baseline for the SNAD platform.
# It was generated FROM THE RUNNING APPLICATION (Spring Boot + springdoc)
# by Stage 03A — NOT hand-written. Any change to the application that
# breaks this baseline will fail the api-contract CI job.
#
# To regenerate after an INTENTIONAL non-breaking change, run:
#   bash scripts/dev/capture-openapi-baseline.sh
# and commit the result along with an updated metadata file.
# ----------------------------------------------------------------------------
openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost
  description: Generated server url
tags:
- name: Authentication
  description: Secure account and session management.
- name: Authentication
  description: Login, logout, refresh, password recovery, and session management.
- name: Organizations
  description: Create and manage Organization aggregates belonging to Tenants. An Organization is the operational container for future ERP, CRM, HRM, Accounting, and Commerce modules.
- name: Users
  description: Manage tenant-scoped platform users. Every operation requires tenantId.
- name: Organization Memberships
  description: Manage memberships (invitations) for an Organization. Every endpoint is tenant-scoped via the required tenantId query parameter.
paths:
  /api/v1/users/{userId}:
    get:
      tags:
      - Users
      summary: Get a user
      description: Returns a user only when it belongs to the requested tenant.
      operationId: getUser
      parameters:
      - name: userId
        in: path
        description: User UUID
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Missing or invalid identifier
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      tags:
      - Users
      summary: Update a user
      description: Updates email and display name within the tenant scope.
      operationId: updateUser
      parameters:
      - name: userId
        in: path
        description: User UUID
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation failed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Email already exists in tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/organizations/{id}:
    get:
      tags:
      - Organizations
      summary: Get an Organization by ID
      description: Fetch a single Organization scoped to a specific Tenant. The tenantId query parameter is required. If the (tenantId, id) pair does not match any Organization, a 404 is returned.
      operationId: getOrganization
      parameters:
      - name: id
        in: path
        description: Organization UUID
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Organization found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          description: Bad Request - missing required tenantId query parameter
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Organization Not Found - no Organization with the given id exists under the given tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      tags:
      - Organizations
      summary: Update an Organization's name and description
      description: Updates the mutable fields of an Organization. The tenant relationship and status are NOT changed. If the new name conflicts with another organization under the same tenant, a 409 Conflict is returned.
      operationId: updateOrganization
      parameters:
      - name: id
        in: path
        description: Organization UUID
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
        required: true
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          description: Bad Request - request body failed validation or tenantId missing
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Organization Not Found - no Organization with the given id exists under this tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Organization Already Exists - another organization under the same tenant already uses the new name
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/access/roles/{roleId}:
    get:
      tags:
      - role-controller
      operationId: get
      parameters:
      - name: tenantId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
    put:
      tags:
      - role-controller
      operationId: update
      parameters:
      - name: tenantId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
  /api/v1/access/capabilities/{capabilityId}:
    get:
      tags:
      - capability-controller
      operationId: get_1
      parameters:
      - name: capabilityId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
    put:
      tags:
      - capability-controller
      operationId: update_1
      parameters:
      - name: capabilityId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
  /api/v1/users:
    get:
      tags:
      - Users
      summary: List users
      description: 'Lists users belonging only to the requested tenant. Stage 03A: paginated.'
      operationId: listUsers
      parameters:
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      - name: params
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/PageRequestParams'
      responses:
        '200':
          description: User list (paginated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '400':
          description: Missing or invalid tenantId / pagination
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      tags:
      - Users
      summary: Create a user
      description: Creates a tenant-scoped user. Default status is INVITED.
      operationId: createUser
      parameters:
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation failed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Tenant not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Email already exists in tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/organizations:
    get:
      tags:
      - Organizations
      summary: List Organizations for a Tenant
      description: Returns all Organizations belonging to the specified Tenant. The tenantId query parameter is required. If the tenant has no organizations, an empty array is returned.
      operationId: listOrganizations
      parameters:
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      - name: params
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/PageRequestParams'
      responses:
        '200':
          description: Organization list (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationResponse'
        '400':
          description: Bad Request - missing required tenantId query parameter
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      tags:
      - Organizations
      summary: Create a new Organization
      description: Registers a new Organization under an existing Tenant. The Organization is created with status ACTIVE. The (tenantId, name) pair must be unique; otherwise a 409 is returned.
      operationId: createOrganization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
        required: true
      responses:
        '201':
          description: Organization created successfully
          headers:
            Location:
              description: URI of the newly created Organization resource
              style: simple
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          description: Bad Request - request body failed validation (missing tenantId, blank name, name or description too long)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Tenant Not Found - the referenced tenantId does not exist
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Organization Already Exists - an Organization with the same name already exists under the same Tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/organizations/{organizationId}/memberships:
    get:
      tags:
      - Organization Memberships
      summary: List all memberships for an organization
      operationId: listMemberships
      parameters:
      - name: organizationId
        in: path
        description: Organization UUID
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      - name: params
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/PageRequestParams'
      responses:
        '200':
          description: Membership list (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationMembershipResponse'
        '400':
          description: Missing tenantId
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Organization not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      tags:
      - Organization Memberships
      summary: Invite a member to an organization
      description: Creates a new membership with status INVITED. The (tenantId, organizationId, email) tuple must be unique.
      operationId: inviteMember
      parameters:
      - name: organizationId
        in: path
        description: Organization UUID
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        description: Tenant UUID (scope)
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteOrganizationMemberRequest'
        required: true
      responses:
        '201':
          description: Member invited successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembershipResponse'
        '400':
          description: Bad Request - validation failed or missing tenantId
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Tenant or Organization not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Membership already exists for this email
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/auth/reset-password:
    post:
      tags:
