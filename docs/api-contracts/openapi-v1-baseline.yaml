      tags:
      - Users
      summary: Suspend a user
      description: Sets the user status to SUSPENDED.
      operationId: suspendUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: tenantId
        in: query
        required: true
        schema:
