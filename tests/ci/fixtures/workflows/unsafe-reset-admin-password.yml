name: Reset Admin Password (One-Time)
on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'New admin password'
        required: true
        type: string
permissions:
  contents: read
jobs:
  reset:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - run: |
          pip install psycopg2-binary bcrypt -q
          python3 << 'PYSCRIPT'
          import psycopg2, bcrypt, os
          conn = psycopg2.connect(host=os.environ["DB_HOST"], dbname=os.environ["DB_NAME"], user=os.environ["DB_USER"], password=os.environ["DB_PASS"])
          cur = conn.cursor()
          cur.execute("SELECT id, email, status, tenant_id FROM users WHERE LOWER(email) = LOWER(%s)", (admin_email,))
          user = cur.fetchone()
          if user:
              user_id, email, status, tenant_id = user
              print(f"user_id={user_id} tenant_id={tenant_id}")
              hashed = bcrypt.hashpw(new_password.encode(), bcrypt.gensalt(12))
              cur.execute("UPDATE users SET password_hash=%s, session_version=session_version+1 WHERE id=%s", (hashed.decode(), user_id))
              cur.execute("DELETE FROM refresh_tokens WHERE user_id=%s", (user_id,))
          else:
              cur.execute("SELECT id, email, status FROM users LIMIT 20")
