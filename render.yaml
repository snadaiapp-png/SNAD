# Render Blueprint for SANAD Backend
# ============================================================
# GitHub Actions builds immutable GHCR images. Render pulls and
# runs the published image; all credentials remain in Render.
# ============================================================

services:
  - type: web
    name: sanad-backend
    runtime: image
    image:
      url: ghcr.io/snadaiapp-png/snad-backend:latest
    region: frankfurt
    plan: free
    healthCheckPath: /actuator/health
    maxShutdownDelaySeconds: 30
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_OPTS
        value: -Xms64m -Xmx128m -XX:MaxDirectMemorySize=32m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -Xss256k -XX:TieredStopAtLevel=1 -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JPA_DDL_AUTO
        value: validate
      - key: FLYWAY_ENABLED
        value: "true"
      - key: SANAD_CORS_ALLOWED_ORIGINS
        value: https://snad-app.vercel.app
      - key: BOOTSTRAP_ENABLED
        value: "false"
      - key: SANAD_CONTROL_PLANE_TENANT_ID
        sync: false
      - key: LOG_LEVEL_ROOT
        value: WARN
      - key: LOG_LEVEL_SANAD
        value: INFO
      - key: LAZY_INIT
        value: "true"
      - key: MANAGEMENT_ENDPOINTS
        value: health
      - key: SHUTDOWN_TIMEOUT
        value: 30s
      - key: DATABASE_POOL_MAX
        value: "3"
      - key: DATABASE_POOL_MIN
        value: "1"
      - key: DATABASE_POOL_TIMEOUT
        value: "30000"
      - key: SECURITY_NOTIFICATION_PROVIDER
        value: resend
      - key: SECURITY_NOTIFICATION_FROM
        sync: false
      - key: SECURITY_NOTIFICATION_RESEND_API_KEY
        sync: false
      - key: SECURITY_NOTIFICATION_ENDPOINT
        value: https://snad-app.vercel.app/api/email-proxy
      - key: APPLICATION_BASE_URL
        value: https://snad-app.vercel.app
