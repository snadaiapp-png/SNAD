# Render Blueprint for SANAD Platform
# ============================================================
# This file defines the Render infrastructure as code.
# Secrets are wired via fromDatabase references — no manual
# password copying required.
#
# Apply with:
#   render blueprint apply
#
# Region: frankfurt (see ADR-028 for rationale)
# Auto-deploy: OFF (manual until first release verified)
# ============================================================

databases:
  - name: sanad-database
    databaseName: sanad
    user: sanad
    region: frankfurt
    plan: basic-256mb
    ipAllowList: []

services:
  - type: web
    name: sanad-backend
    runtime: docker
    branch: main
    region: frankfurt
    plan: starter
    rootDir: apps/sanad-platform
    dockerfilePath: apps/sanad-platform/Dockerfile
    dockerContext: apps/sanad-platform
    healthCheckPath: /actuator/health
    autoDeployTrigger: "off"
    maxShutdownDelaySeconds: 30
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DDL_AUTO
        value: validate
      - key: FLYWAY_ENABLED
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: https://snad-app.vercel.app
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_SANAD
        value: INFO
      - key: MANAGEMENT_ENDPOINTS
        value: health
      - key: SHUTDOWN_TIMEOUT
        value: 30s
      - key: DATABASE_POOL_MAX
        value: "20"
      - key: DATABASE_POOL_MIN
        value: "5"
      - key: DATABASE_POOL_TIMEOUT
        value: "30000"
      # Database credentials wired via fromDatabase — no manual copying
      - key: DATABASE_USERNAME
        fromDatabase:
          name: sanad-database
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: sanad-database
          property: password
      # Render provides the internal connection string as postgresql://host:port/db
      # The backend accepts this via the RENDER_DATABASE_URL env var and converts
      # it to JDBC format at startup (see application-prod.yml).
      - key: RENDER_DATABASE_URL
        fromDatabase:
          name: sanad-database
          property: connectionString
