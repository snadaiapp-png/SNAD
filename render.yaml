# Render Blueprint for SANAD Backend (Free Pilot)
# ============================================================
# This Blueprint deploys only the Spring Boot backend on Render.
# PostgreSQL is hosted externally on Supabase.
#
# Pilot constraints:
# - Render backend plan: free
# - Supabase PostgreSQL: external Session Pooler on port 5432
# - Auto-deploy: OFF
# - Secrets are entered in Render Dashboard and never committed
# ============================================================

services:
  - type: web
    name: sanad-backend
    runtime: docker
    branch: main
    region: frankfurt
    plan: free
    rootDir: apps/sanad-platform
    dockerfilePath: apps/sanad-platform/Dockerfile
    dockerContext: apps/sanad-platform
    healthCheckPath: /actuator/health
    autoDeployTrigger: "off"
    maxShutdownDelaySeconds: 30
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JPA_DDL_AUTO
        value: validate
      - key: FLYWAY_ENABLED
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: https://snad-app.vercel.app
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_SANAD
        value: INFO
      - key: MANAGEMENT_ENDPOINTS
        value: health
      - key: SHUTDOWN_TIMEOUT
        value: 30s
      - key: DATABASE_POOL_MAX
        value: "5"
      - key: DATABASE_POOL_MIN
        value: "1"
      - key: DATABASE_POOL_TIMEOUT
        value: "30000"
