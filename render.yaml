# Render Blueprint for SANAD Backend
# ============================================================
# GitHub is the release authority. Render stores runtime secrets.
# Automatic deploy is intentionally disabled; the protected production
# workflow deploys an exact, reviewed main commit.
# ============================================================

services:
  - type: web
    name: sanad-backend
    runtime: docker
    repo: https://github.com/snadaiapp-png/SNAD
    branch: main
    region: frankfurt
    plan: free
    rootDir: apps/sanad-platform
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: "off"
    # Stage 05A.2.9.1 — Render automatically sets RENDER_GIT_COMMIT
    # at runtime. The application logs this value plus the JAR
    # implementation version at startup for provenance verification.
    # No explicit envVar needed — Render injects it automatically.
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JPA_DDL_AUTO
        value: validate
      - key: FLYWAY_ENABLED
        value: "true"
      - key: SANAD_CORS_ALLOWED_ORIGINS
        value: https://snad-app.vercel.app
      - key: BOOTSTRAP_ENABLED
        value: "false"
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_SANAD
        value: INFO
      - key: MANAGEMENT_ENDPOINTS
        value: health
      - key: SHUTDOWN_TIMEOUT
        value: 30s
      - key: DATABASE_POOL_MAX
        value: "5"
      - key: DATABASE_POOL_MIN
        value: "1"
      - key: DATABASE_POOL_TIMEOUT
        value: "30000"

      # Secure account-recovery email. The Gmail App Password is entered
      # only in Render as a secret and is never committed to GitHub.
      - key: SECURITY_NOTIFICATION_PROVIDER
        value: smtp
      - key: SECURITY_NOTIFICATION_FROM
        value: snad.ai.app@gmail.com
      - key: APPLICATION_BASE_URL
        value: https://snad-app.vercel.app
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        value: snad.ai.app@gmail.com
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
        value: "true"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
        value: "true"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED
        value: "true"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT
        value: "10000"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT
        value: "15000"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT
        value: "15000"
