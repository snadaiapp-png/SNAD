# Render Blueprint for SANAD Backend
# ============================================================
# Uses pre-built Docker image from GitHub Container Registry.
# This bypasses Maven build on Render (which fails due to 512MB RAM limit).
# The image is built and pushed by .github/workflows/build-and-deploy.yml
# ============================================================

services:
  - type: web
    name: sanad-backend
    runtime: docker
    repo: https://github.com/snadaiapp-png/SNAD
    branch: main
    region: frankfurt
    plan: free
    rootDir: apps/sanad-platform
    dockerfilePath: Dockerfile
    dockerContext: .
    
    healthCheckPath: /actuator/health
    autoDeployTrigger: "off"
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JPA_DDL_AUTO
        value: validate
      - key: FLYWAY_ENABLED
        value: "true"
      - key: SANAD_CORS_ALLOWED_ORIGINS
        value: https://snad-app.vercel.app
      - key: BOOTSTRAP_ENABLED
        value: "false"
      - key: SANAD_CONTROL_PLANE_TENANT_ID
        sync: false
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_SANAD
        value: INFO
      - key: MANAGEMENT_ENDPOINTS
        value: health
      - key: SHUTDOWN_TIMEOUT
        value: 30s
      - key: DATABASE_POOL_MAX
        value: "5"
      - key: DATABASE_POOL_MIN
        value: "1"
      - key: DATABASE_POOL_TIMEOUT
        value: "30000"
      - key: SECURITY_NOTIFICATION_PROVIDER
        value: http
      - key: SECURITY_NOTIFICATION_FROM
        sync: false
      - key: SECURITY_NOTIFICATION_ENDPOINT
        value: https://snad-app.vercel.app/api/email-proxy
      - key: SECURITY_NOTIFICATION_BEARER_TOKEN
        sync: false
      - key: APPLICATION_BASE_URL
        value: https://snad-app.vercel.app
        value: http.gmail.com
        value: "587"
        sync: false
        sync: false
        value: "true"
        value: "true"
        value: "true"
        value: "10000"
        value: "15000"
        value: "15000"
