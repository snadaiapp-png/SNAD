# Render Blueprint for SANAD Backend (Free Pilot)
# ============================================================
# Secrets are entered in Render Dashboard and never committed.
# Administrative bootstrap variables are temporary dashboard-only values and
# must be removed immediately after the one-time enrollment succeeds.
# ============================================================

services:
  - type: web
    name: sanad-backend
    runtime: docker
    branch: main
    region: frankfurt
    plan: free
    rootDir: apps/sanad-platform
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: "off"
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JPA_DDL_AUTO
        value: validate
      - key: FLYWAY_ENABLED
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: https://snad-app.vercel.app
      - key: BOOTSTRAP_ENABLED
        value: "false"
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_SANAD
        value: INFO
      - key: MANAGEMENT_ENDPOINTS
        value: health
      - key: SHUTDOWN_TIMEOUT
        value: 30s
      - key: DATABASE_POOL_MAX
        value: "5"
      - key: DATABASE_POOL_MIN
        value: "1"
      - key: DATABASE_POOL_TIMEOUT
        value: "30000"
