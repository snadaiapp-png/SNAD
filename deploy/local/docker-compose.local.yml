services:
  postgres:
    image: postgres:16-alpine
    container_name: sanad-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sanad}
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME must be set}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
    expose:
      - "5432"
    volumes:
      - sanad_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${POSTGRES_DB:-sanad}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sanad_private

  backend:
    build:
      context: ../../apps/sanad-platform
      dockerfile: Dockerfile
      args:
        RENDER_GIT_COMMIT: ${GIT_COMMIT:-local-cloudflare}
    image: sanad-backend:local
    container_name: sanad-local-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sanad}
      DATABASE_USERNAME: ${DATABASE_USERNAME:?DATABASE_USERNAME must be set}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
      DATABASE_DRIVER: org.postgresql.Driver
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      SANAD_CORS_ALLOWED_ORIGINS: ${SANAD_CORS_ALLOWED_ORIGINS:?SANAD_CORS_ALLOWED_ORIGINS must be set}
      APPLICATION_BASE_URL: ${APPLICATION_BASE_URL:?APPLICATION_BASE_URL must be set}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-None}
      COOKIE_SECURE: "true"
      BOOTSTRAP_ENABLED: ${BOOTSTRAP_ENABLED:-false}
      BOOTSTRAP_TENANT_ID: ${BOOTSTRAP_TENANT_ID:-}
      BOOTSTRAP_TENANT_NAME: ${BOOTSTRAP_TENANT_NAME:-}
      BOOTSTRAP_TENANT_SUBDOMAIN: ${BOOTSTRAP_TENANT_SUBDOMAIN:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-SANAD Admin}
      SANAD_CONTROL_PLANE_TENANT_ID: ${SANAD_CONTROL_PLANE_TENANT_ID:-}
      SECURITY_NOTIFICATION_PROVIDER: ${SECURITY_NOTIFICATION_PROVIDER:-resend}
      SECURITY_NOTIFICATION_FROM: ${SECURITY_NOTIFICATION_FROM:-}
      SECURITY_NOTIFICATION_RESEND_API_KEY: ${SECURITY_NOTIFICATION_RESEND_API_KEY:-}
      SECURITY_NOTIFICATION_ENDPOINT: ${SECURITY_NOTIFICATION_ENDPOINT:-https://snad-app.vercel.app/api/email-proxy}
      SECURITY_NOTIFICATION_BEARER_TOKEN: ${SECURITY_NOTIFICATION_BEARER_TOKEN:-}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-2}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30000}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-WARN}
      LOG_LEVEL_SANAD: ${LOG_LEVEL_SANAD:-INFO}
      MANAGEMENT_ENDPOINTS: health
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx2048m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8}
    ports:
      - "127.0.0.1:${BACKEND_DEBUG_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    security_opt:
      - no-new-privileges:true
    networks:
      - sanad_private

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sanad-local-cloudflared
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set}
    security_opt:
      - no-new-privileges:true
    networks:
      - sanad_private

volumes:
  sanad_local_pgdata:
    name: sanad_local_pgdata

networks:
  sanad_private:
    name: sanad_local_private
    driver: bridge
