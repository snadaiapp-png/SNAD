services:
  postgres:
    image: postgres:16-alpine
    container_name: sanad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sanad}
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME must be set}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - sanad-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${POSTGRES_DB:-sanad}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sanad-backend:exec-032a
    container_name: sanad-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set and contain at least 32 bytes}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sanad}
      DATABASE_USERNAME: ${DATABASE_USERNAME:?DATABASE_USERNAME must be set}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
      DATABASE_DRIVER: org.postgresql.Driver
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      SANAD_CORS_ALLOWED_ORIGINS: ${SANAD_CORS_ALLOWED_ORIGINS:-https://snad-app.vercel.app}
      # DEFECT-029 remediation: align the default SameSite value to 'lax'
      # with application-prod.yml (which already defaults to 'lax').
      # Previously this file defaulted to 'None', which:
      #   1. Required COOKIE_SECURE=true to be respected by browsers
      #      (cross-site cookies with SameSite=None MUST be Secure).
      #   2. Allowed the refresh cookie to be sent on cross-site requests,
      #      widening the CSRF attack surface.
      # 'lax' is the safer default — the cookie is only sent on same-site
      # requests and top-level cross-site navigations (GET). The frontend
      # and backend are both served from same-site subdomains of
      # *.vercel.app and *.onrender.com respectively, which is sufficient
      # for 'lax' to work for the silent-refresh flow.
      # Operators who need cross-site cookie transmission (rare) can
      # override via the COOKIE_SAME_SITE env var.
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_SECURE: "true"
      BOOTSTRAP_ENABLED: ${BOOTSTRAP_ENABLED:-false}
      BOOTSTRAP_TENANT_ID: ${BOOTSTRAP_TENANT_ID:-}
      BOOTSTRAP_TENANT_NAME: ${BOOTSTRAP_TENANT_NAME:-}
      BOOTSTRAP_TENANT_SUBDOMAIN: ${BOOTSTRAP_TENANT_SUBDOMAIN:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-SANAD Admin}
      BOOTSTRAP_AUDIT_ACTOR: ${BOOTSTRAP_AUDIT_ACTOR:-credential-bootstrap}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_SANAD: ${LOG_LEVEL_SANAD:-INFO}
      MANAGEMENT_ENDPOINTS: health
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Dfile.encoding=UTF-8"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  sanad-pgdata:
