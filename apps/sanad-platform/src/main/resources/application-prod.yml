# ============================================================
# SANAD Platform — `prod` production profile
# ------------------------------------------------------------
# All externalized settings are resolved from environment
# variables. No credentials are hardcoded.
#
# Mandatory validation is handled by ProductionDatabaseProperties
# (@ConfigurationProperties + @Validated + @NotBlank).
# Startup fails with a clear message if DATABASE_URL,
# DATABASE_USERNAME, or DATABASE_PASSWORD are missing.
# ============================================================

sanad:
  database:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}

spring:
  datasource:
    # DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD can be set explicitly.
    # If RENDER_DATABASE_URL is set instead, RenderDatabaseUrlConverter
    # (EnvironmentPostProcessor) will parse it and set these properties
    # at startup, unless explicitly overridden here.
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    hikari:
      pool-name: SanadProdHikariCP
      maximum-pool-size: ${DATABASE_POOL_MAX:20}
      minimum-idle: ${DATABASE_POOL_MIN:5}
      connection-timeout: ${DATABASE_POOL_TIMEOUT:30000}
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true

  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://snad-app.vercel.app}

management:
  server:
    port: ${SERVER_PORT:8080}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health}
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: false
    java:
      enabled: false
    os:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sanad.platform: ${LOG_LEVEL_SANAD:INFO}
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
