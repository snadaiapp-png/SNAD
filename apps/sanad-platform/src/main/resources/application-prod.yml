# ============================================================
# SANAD Platform — `prod` production profile
# ------------------------------------------------------------
# Activated with: --spring.profiles.active=prod
#                or SPRING_PROFILES_ACTIVE=prod
#
# All externalized settings are resolved from environment
# variables. No credentials are hardcoded.
#
# Startup will fail fast if mandatory variables are missing.
# ============================================================

spring:
  datasource:
    url: ${DATABASE_URL:?DATABASE_URL must be set in production}
    username: ${DATABASE_USERNAME:?DATABASE_USERNAME must be set in production}
    password: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in production}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    hikari:
      pool-name: SanadProdHikariCP
      maximum-pool-size: ${DATABASE_POOL_MAX:20}
      minimum-idle: ${DATABASE_POOL_MIN:5}
      connection-timeout: ${DATABASE_POOL_TIMEOUT:30000}
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

management:
  server:
    port: ${SERVER_PORT:8080}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health}
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: false
    java:
      enabled: false
    os:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sanad.platform: ${LOG_LEVEL_SANAD:INFO}
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
