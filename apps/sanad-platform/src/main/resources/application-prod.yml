# ============================================================
# SANAD Platform — production profile (simple, reliable)
# ============================================================

sanad:
  database:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  control-plane:
    tenant-id: ${SANAD_CONTROL_PLANE_TENANT_ID:}
  cors:
    allowed-origins: ${SANAD_CORS_ALLOWED_ORIGINS:}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      issuer: ${JWT_ISSUER:sanad-platform}
    refresh:
      refresh-token-ttl: ${REFRESH_TOKEN_TTL:168h}
    login-rate-limit:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window: ${LOGIN_RATE_LIMIT_WINDOW:5m}
    cookie:
      secure: true
      same-site: ${COOKIE_SAME_SITE:lax}
      domain: ${COOKIE_DOMAIN:}
    bootstrap:
      enabled: ${BOOTSTRAP_ENABLED:false}
      force-reset: ${BOOTSTRAP_FORCE_RESET:false}
      tenant-id: ${BOOTSTRAP_TENANT_ID:}
      tenant-name: ${BOOTSTRAP_TENANT_NAME:}
      tenant-subdomain: ${BOOTSTRAP_TENANT_SUBDOMAIN:}
      admin-email: ${BOOTSTRAP_ADMIN_EMAIL:}
      admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
      admin-display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:SANAD Admin}
      audit-actor: ${BOOTSTRAP_AUDIT_ACTOR:credential-bootstrap}

spring:
  main:
    lazy-initialization: ${LAZY_INIT:true}
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:${DATABASE_DRIVER:org.postgresql.Driver}}
    hikari:
      pool-name: SanadProdHikariCP
      maximum-pool-size: ${DATABASE_POOL_MAX:5}
      minimum-idle: ${DATABASE_POOL_MIN:1}
      connection-timeout: ${DATABASE_POOL_TIMEOUT:30000}
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}
    validate-migration-naming: ${FLYWAY_VALIDATE_MIGRATION_NAMING:false}
    clean-disabled: true

  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  server:
    port: ${SERVER_PORT:8080}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health}
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: false
    java:
      enabled: false
    os:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sanad.platform: ${LOG_LEVEL_SANAD:INFO}
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
