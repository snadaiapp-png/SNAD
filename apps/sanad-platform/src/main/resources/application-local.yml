# ============================================================
# SANAD Platform — `local` profile
# ------------------------------------------------------------
# Activated with: --spring.profiles.active=local
#                or SPRING_PROFILES_ACTIVE=local
#
# Used for developer laptops and for the automated validation
# performed by Z.ai. Switches the datasource to H2 in-memory so
# the application starts with zero external dependencies while
# still exercising the full Spring Boot + JPA + Flyway stack.
# ============================================================

spring:
  datasource:
    # PostgreSQL mode plus lower-case identifiers keeps JDBC column labels
    # identical to PostgreSQL, so JSON contracts do not vary between gates.
    # VALUE is a valid PostgreSQL alias used by the CRM custom-field queries;
    # H2 reserves it unless explicitly listed as a non-keyword.
    url: jdbc:h2:mem:sanad;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Flyway stays enabled so local and integration tests exercise the
  # complete migration chain, including the unified CRM migration.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false

  # H2 console (dev-only convenience)
  h2:
    console:
      enabled: true
      path: /h2-console

sanad:
  security:
    jwt:
      # No committed secret — JwtTokenProvider generates an ephemeral HMAC key
      # at startup when the secret is empty. This is safe for local development
      # because tokens are not shared across restarts or between machines.
      # Production must set JWT_SECRET via environment variable.
      secret: ${JWT_SECRET:}
  crm:
    # Tests invoke the import worker explicitly to avoid scheduler races.
    import-worker-enabled: false
    # Test-only AES-256 key (32 zero bytes). Production must set a distinct
    # CRM_CUSTOM_FIELD_ENCRYPTION_KEY secret through the deployment secret manager.
    custom-field-encryption-key: ${CRM_CUSTOM_FIELD_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

logging:
  level:
    root: INFO
    com.sanad.platform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,beans,env,loggers,metrics

# Expose the H2 console via Actuator's web exposure
springdoc:
  swagger-ui:
    enabled: true
