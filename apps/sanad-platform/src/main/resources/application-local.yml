# ============================================================
# SANAD Platform — `local` profile
# ------------------------------------------------------------
# Activated with: --spring.profiles.active=local
#                or SPRING_PROFILES_ACTIVE=local
#
# Used for developer laptops and automated validation. The local
# profile exercises the platform migrations through V49 on H2.
# PostgreSQL-specific CRM runtime migrations start at V50 and are
# validated separately by the crm-platform PostgreSQL runtime gate.
# ============================================================

spring:
  datasource:
    url: jdbc:h2:mem:sanad;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    target: "49"
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false

  h2:
    console:
      enabled: true
      path: /h2-console

sanad:
  security:
    jwt:
      secret: ${JWT_SECRET:}

logging:
  level:
    root: INFO
    com.sanad.platform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,beans,env,loggers,metrics

springdoc:
  swagger-ui:
    enabled: true
