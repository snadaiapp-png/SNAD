# ============================================================
# SANAD Platform — `local` profile
# ------------------------------------------------------------
# Activated with: --spring.profiles.active=local
#                or SPRING_PROFILES_ACTIVE=local
#
# Used for developer laptops and for the automated validation
# performed by Z.ai. Switches the datasource to H2 in-memory so
# the application starts with zero external dependencies while
# still exercising the full Spring Boot + JPA + Flyway stack.
# ============================================================

spring:
  datasource:
    url: jdbc:h2:mem:sanad;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Flyway stays enabled so we exercise the migration engine even
  # though no migration files exist yet. It will simply create the
  # flyway_schema_history table and report "No migrations found".
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false

  # H2 console (dev-only convenience)
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    com.sanad.platform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG

management:
  endpoint:
    health:
      show-details: always

# Expose the H2 console via Actuator's web exposure
springdoc:
  swagger-ui:
    enabled: true
