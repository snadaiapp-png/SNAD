# ============================================================
# SANAD Platform — Base application configuration
# ------------------------------------------------------------
# Profile-agnostic defaults. Environment-specific overrides live in:
#   - application-dev.yml    (shared dev environment with PostgreSQL)
#   - application-local.yml  (developer laptop; H2 in-memory for fast startup)
#
# The default profile (no profile set) intentionally points at a
# PostgreSQL database so that the production-style wiring is
# exercised even before a profile is chosen. Use `local` to start
# the app without any external dependencies.
# ============================================================

spring:
  application:
    name: sanad-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # PostgreSQL datasource — prepared for dev/prod.
  # Override via environment variables in real environments.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sanad}
    username: ${SPRING_DATASOURCE_USERNAME:sanad}
    password: ${SPRING_DATASOURCE_PASSWORD:sanad}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SanadHikariCP
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  # Flyway — enabled by default. No migrations yet; will create
  # the flyway_schema_history table on first connect.
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  # Graceful shutdown
  lifecycle:
    timeout-per-shutdown-phase: 30s

# Server
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# Spring Boot Actuator
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8080}
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# springdoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.sanad.platform
  default-produces-media-type: application/json

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://snad-app.vercel.app}

# Security (EXEC-PROMPT-032A)
sanad:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-min-32-bytes-long}
      access-token-ttl: 15m
      issuer: sanad-platform
    refresh:
      refresh-token-ttl: 168h
    login-rate-limit:
      max-attempts: 5
      window: 5m

# Logging
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sanad.platform: ${LOG_LEVEL_SANAD:INFO}
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
