# ============================================================
# SANAD Platform — Base application configuration
# ============================================================

spring:
  application:
    name: sanad-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sanad}
    username: ${SPRING_DATASOURCE_USERNAME:sanad}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SanadHikariCP
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8080}
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.sanad.platform
  default-produces-media-type: application/json

sanad:
  cors:
    # Single source of truth: SANAD_CORS_ALLOWED_ORIGINS environment variable.
    # The legacy CORS_ALLOWED_ORIGINS key is no longer supported.
    allowed-origins: ${SANAD_CORS_ALLOWED_ORIGINS:https://snad-app.vercel.app}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      access-token-ttl: 15m
      issuer: sanad-platform
    refresh:
      refresh-token-ttl: 168h
    login-rate-limit:
      max-attempts: 20
      window: 1m
    cookie:
      secure: ${COOKIE_SECURE:true}
      same-site: ${COOKIE_SAME_SITE:lax}
      domain: ${COOKIE_DOMAIN:}
    bootstrap:
      enabled: ${BOOTSTRAP_ENABLED:false}
      force-reset: ${BOOTSTRAP_FORCE_RESET:false}
      tenant-id: ${BOOTSTRAP_TENANT_ID:}
      tenant-name: ${BOOTSTRAP_TENANT_NAME:}
      tenant-subdomain: ${BOOTSTRAP_TENANT_SUBDOMAIN:}
      admin-email: ${BOOTSTRAP_ADMIN_EMAIL:}
      admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
      admin-display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:SANAD Admin}
      audit-actor: ${BOOTSTRAP_AUDIT_ACTOR:credential-bootstrap}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sanad.platform: ${LOG_LEVEL_SANAD:INFO}
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
