# SNAD Platform — container development profile
# Uses real PostgreSQL and fail-closed security configuration from environment.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SanadContainerHikariCP
      maximum-pool-size: ${DATABASE_POOL_MAX:10}
      minimum-idle: ${DATABASE_POOL_MIN:2}
      connection-timeout: ${DATABASE_POOL_TIMEOUT:30000}
      validation-timeout: 5000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    validate-on-migrate: true
    clean-disabled: true
  mail:
    host: ${SPRING_MAIL_HOST:mailpit}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,diskSpace
        liveness:
          include: livenessState,ping
  metrics:
    tags:
      application: ${spring.application.name}
      environment: container

sanad:
  cors:
    allowed-origins: ${SANAD_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
  security:
    cookie:
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAME_SITE:lax}
    bootstrap:
      enabled: ${BOOTSTRAP_ENABLED:false}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sanad.platform: ${LOG_LEVEL_SANAD:INFO}
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
