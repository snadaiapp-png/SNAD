# ============================================================
# SANAD Platform — tenant-postgres-test profile
# ------------------------------------------------------------
# Stage 04A.3 §4 — Mandatory PostgreSQL profile for all tenant
# isolation certification tests. This profile MUST NOT use H2.
#
# Used by CI tenant-isolation job with:
#   -Dspring.profiles.active=tenant-postgres-test
#   -Ddatabase.url="${DATABASE_URL}"
#   -Ddatabase.username="${DATABASE_USERNAME}"
#   -Ddatabase.password="${DATABASE_PASSWORD}"
#   -Ddatabase.driver="${DATABASE_DRIVER}"
# ============================================================

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/sanad_tenant_isolation}
    username: ${DATABASE_USERNAME:sanad_runtime_app}
    password: ${DATABASE_PASSWORD:ci-runtime-only}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    hikari:
      pool-name: SanadTenantTestCP
      maximum-pool-size: 1
      minimum-idle: 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-pg-only
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8080}
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

sanad:
  cors:
    allowed-origins: ${SANAD_CORS_ALLOWED_ORIGINS:https://snad-app.vercel.app}
  security:
    jwt:
      secret: ${JWT_SECRET:ci-only-non-production-key-1234567890}
      access-token-ttl: 15m
      issuer: sanad-platform
    refresh:
      refresh-token-ttl: 168h
    login-rate-limit:
      max-attempts: 20
      window: 1m
    cookie:
      secure: false
      same-site: lax
      domain: ""
    bootstrap:
      enabled: false
      force-reset: false
      tenant-id: ""
      tenant-name: ""
  tenant:
    rls:
      enabled: true
  database:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}

logging:
  level:
    org:
      hibernate:
        SQL: warn
        type:
          descriptor:
            sql:
              BasicBinder: warn
      springframework:
        security: warn
        web: warn
      flywaydb: info
    com:
      sanad:
        platform: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId}] [%X{tenantId}] [%X{userId}] %logger{36} - %msg%n"
