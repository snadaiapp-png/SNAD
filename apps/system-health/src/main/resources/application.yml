server:
  port: ${PORT:8090}
  shutdown: graceful

spring:
  application:
    name: sanad-system-health
  lifecycle:
    timeout-per-shutdown-phase: 20s

info:
  app:
    name: SANAD System Health
    version: 0.1.0-SNAPSHOT
    boundary: independent-application

management:
  server:
    port: ${MANAGEMENT_PORT:${PORT:8090}}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  pattern:
    level: "%5p [app=sanad-system-health]"
