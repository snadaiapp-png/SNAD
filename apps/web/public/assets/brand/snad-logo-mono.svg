<?xml version="1.0" encoding="UTF-8"?>
<!--
  ============================================================================
  SNAD | سند — Monochrome Logo (single color)
  ----------------------------------------------------------------------------
  Single-color version for stamps, embossing, single-color print, and
  contexts where color is not available. Inherit color via CSS `color`
  property or `fill="currentColor"`.

  Usage: <img src="snad-logo-mono.svg" style="filter: ..."> or
         inline SVG with <svg color="..."> to set the color.
  ============================================================================
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 280 80"
     role="img"
     aria-label="SNAD سند"
     width="280"
     height="80">
  <title>SNAD | سند — Monochrome Logo</title>

  <!-- All elements use currentColor — inherit from parent -->
  <rect x="4" y="12" width="56" height="56" rx="14" ry="14"
        fill="none"
        stroke="currentColor"
        stroke-width="3"/>
  <path d="M 20 44 Q 20 30 32 30 Q 44 30 44 42 Q 44 50 36 50 Q 32 50 32 46"
        stroke="currentColor"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <circle cx="48" cy="56" r="3.5" fill="currentColor"/>
  <text x="72" y="42"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="26"
        font-weight="800"
        letter-spacing="2"
        fill="currentColor">SNAD</text>
  <text x="72" y="64"
        font-family="Tajawal, 'IBM Plex Sans Arabic', 'Noto Sans Arabic', sans-serif"
        font-size="18"
        font-weight="700"
        fill="currentColor"
        direction="rtl">سند</text>
</svg>
