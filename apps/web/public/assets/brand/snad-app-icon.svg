<?xml version="1.0" encoding="UTF-8"?>
<!--
  ============================================================================
  SNAD | سند — App Icon (favicon / home screen icon)
  ----------------------------------------------------------------------------
  Square app icon for favicons, home screen icons, and social media.

  The icon uses the petroleum green background with the gold "س" mark
  and gold accent dot — the signature SNAD brand elements.
  ============================================================================
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-label="SNAD"
     width="512"
     height="512">
  <title>SNAD App Icon</title>

  <!-- Background: petroleum green with rounded corners -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0E3D38"/>

  <!-- Arabic letter "س" — gold, centered, scaled -->
  <path d="M 160 288 Q 160 192 256 192 Q 352 192 352 288 Q 352 352 288 352 Q 256 352 256 320"
        stroke="#D4AF37"
        stroke-width="32"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Gold accent dot -->
  <circle cx="384" cy="384" r="28" fill="#D4AF37"/>
</svg>
