<?xml version="1.0" encoding="UTF-8"?>
<!--
  ============================================================================
  SNAD | سند — White Logo (for dark backgrounds)
  ----------------------------------------------------------------------------
  White version of the primary logo for use on dark backgrounds.
  The gold accent dot remains gold; all other elements are white.

  Usage: Place on backgrounds darker than #0E3D38 or on photographic
  backgrounds where the standard logo would not be legible.
  ============================================================================
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 280 80"
     role="img"
     aria-label="SNAD سند"
     width="280"
     height="80">
  <title>SNAD | سند — White Logo</title>

  <!-- Icon mark: transparent background, white outline -->
  <rect x="4" y="12" width="56" height="56" rx="14" ry="14"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="2"/>

  <!-- Arabic letter "س" — white -->
  <path d="M 20 44 Q 20 30 32 30 Q 44 30 44 42 Q 44 50 36 50 Q 32 50 32 46"
        stroke="#FFFFFF"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Gold accent dot (kept gold for brand recognition) -->
  <circle cx="48" cy="56" r="3.5" fill="#D4AF37"/>

  <!-- Wordmark: SNAD (white) -->
  <text x="72" y="42"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="26"
        font-weight="800"
        letter-spacing="2"
        fill="#FFFFFF">SNAD</text>

  <!-- Wordmark: سند (white) -->
  <text x="72" y="64"
        font-family="Tajawal, 'IBM Plex Sans Arabic', 'Noto Sans Arabic', sans-serif"
        font-size="18"
        font-weight="700"
        fill="#FFFFFF"
        direction="rtl">سند</text>
</svg>
